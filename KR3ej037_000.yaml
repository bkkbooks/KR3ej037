兒毒下及赤滯下如魚腦白頭翁丸方白頭翁三分黃連六分研石榴皮三分有毒除石榴皮用犀角屑三分上三物以水二升煮取八合兒生四十日以五合為三服大者則加藥肘後乳母方扁豆莖一升炙令乾乃切之人參三兩上以水三升煎取一大升半去滓取汁煮粟米粥與乳母食之良常遍蓋覆乳勿冷佳又法乳母常食粥仍欲乳兒先捻去少許即當佳肘後近效方療小兒三歲即患痢初患膿少血多四日膿多血少日夜四十餘行朱子丸方服即效生地黃汁五小合羊腎脂一小合上先溫腎脂令暖分三四服立效乳母須禁食並有乳母方在前千金黃柏湯治小兒夏月傷暴寒寒折大熱熱入胃下赤白滯如魚腦壯熱頭痛身熱手足煩此太陽之氣外傷於寒使熱氣便入胃也服此方良若誤以利藥下之或以溫脾湯下之則熱劇以利藥下之便數去赤汁如爛肉者或下之不瘥後以澀熱藥斷之下既不止倍增壯熱者服之即效或是溫病熱盛復遇暴寒折之熱入腹中下血如魚腦者服之良黃柏黃連白頭翁一作白蘞升麻當歸牡蠣石榴皮黃芩寄生甘草炙各二分犀角艾葉各一分上十二味㕮咀以水三升煮取一升二合百日兒至二百日一服三合二百餘日至期歲一服三合半千金治小兒赤白滯下雜方薤白一把豉一升以水三升煮取二升分三服柏葉麻子末各一升以水五升煮三沸百日兒每服三合亂髮灰鹿角灰等分三歲兒以水和服三錢匕日三牛角䚡灰水和服三方寸匕搗石榴汁服之燒蜂房灰水和服之生地黃汁白蘘荷根汁各五合微火上煎單服生地黃汁一合聖惠吳藍散治小兒膿血痢如魚腦腹痛吳藍川升麻赤芍藥龍骨各一兩梔子仁半兩上件藥搗粗羅為散每服一錢水一小盞入豉三七粒煎至五分去滓不計時候量兒大小分減溫服樗根皮散治小兒膿血痢如魚腦困重臭樗根皮一分銼炒微黃枳殼去瓤麩炒微黃黃連去須微炒蕪荑微炒赤芍藥各半兩上件藥搗粗羅為散每服一錢以水一小盞入豉三十粒蔥白一莖煎至六分去滓不計時候量兒大小分減溫服人參散治小兒膿血痢多時不瘥腹痛羸瘦不欲飲食人參去蘆頭當歸銼微炒地榆微炙銼阿膠搗碎炒令黃燥黃連去須微炒子芩黃柏微炙銼赤芍藥蕪荑微炒厚朴去粗皮塗生薑汁炙令香熟各半兩上件藥搗粗羅為散每服一錢以水一小盞入薤白一莖豉五十粒煎至五分去滓不計時候量兒大小分減溫服雞屎礬丸治小兒膿血痢不瘥漸加瘦弱雞屎礬燒灰龍骨阿膠搗碎炒令黃燥黃連去須微炒各一兩胡粉一分炒微黃上件藥搗羅為末煎釅醋為膏和丸如緑豆大每服以暖漿水下七丸日三四服量兒大小以意加減養生必用黃連阿膠丸治熱痢下重膿血疼痛腹中痛不可忍老人産婦虛勞人小兒並宜服黃連去須各兩半白茯苓白芍藥阿膠杵碎慢火炒如珠子白色別杵為細末各半兩上上三物為細末斟酌米醋多少熬膠得所和勻入臼杵萬下衆手丸如緑豆大每服自二十丸為始止於五十丸食前溫米飲下日二三以知為度未知加藥更丸一等如黃米大與小兒服燔發散治腸澼下膿血白石脂一分發燒甘草炙各二分上為末米汁和二刀圭日二服張渙健胃丹治泄利兼膿血日漸羸瘦黃連一兩去須微炒白礬一分枯令汁盡烏梅肉炒龍骨白石脂神麯炒乾薑各半兩上件搗羅為細末醋煮麵糊和丸黍米大每服十粒米飲下量兒大小加減青橘丹治冷熱相交赤白相雜膿血青橘皮湯浸去白焙當歸湯洗焙黃連乾薑各一兩厚朴生薑制肉豆蔻各半兩上件搗羅為細末白麵和丸黍米大每服十粒米飲下食前長沙醫者王充傳通神丸治小兒大人痢疾下膿血裡急腰重臍腹疼痛沒藥五靈脂乳香各研細炒一錢巴豆七枚去皮心膜壓出油上四味同研令細勻滴水為丸如粟米大每服一粒生木瓜研水下不拘時候五色痢形證論歌曰五色之痢最多端見此方知有五般青色只因驚積聚黃多食積在脾間白色冷虛腸胃患赤為積熱最難安雞肝隱積多成片黑血相和不易安唇搐胸高兼露齒臉紅筋出每居前急安臟腑和湯散醫者留心按古賢又歌曰五色之痢莫言奇四歲之前始有之青色只因驚積聚黃因食積毒於脾赤黑已知心腎病白多殘害是脾為三七以前無變動休令多睡飲餐遲此疾且須和五臟補榮衛方漸漸安愈如目腫不進飲食楊云是惡候只與調胃散補之漢東王先生鮓湯丸治小兒瀉痢五色膿血如爛魚腸並無大便只是膿血腸中攪痛粉霜輕粉硇砂各一錢硃砂抄一錢匕白丁香匙抄四錢乳香半錢別研巴豆七粒去皮心不出油上為末蒸棗肉丸每服嬰孩三丸如粟米大二三歲如大麻子大四五歲亦如麻子大並旋成丸煎鮓湯吞下一日二服間調胃氣藥與之三十六種內治下五色惡物心神煩熱不止方地榆白茯苓黃柏炙各一兩上為末每服一錢水一盞煎至五分去滓分三服三霜丸治小兒赤白或五色積痢巴豆去皮揀選白色肥好者三錢研細先用白絹包三二十重次用白紙外面包定大石壓令油盡取二錢輕者為用真輕粉粉霜各二錢上三味同研勻極細別取好黃蠟三錢酒煮三二十沸取出去酒令淨再熔入藥和之如有煮酒蠟亦堪用和成劑油單內盛如服食旋丸如小緑豆大三歲以下如粟米大每服三五丸溫熟水下量兒大小加減吉氏家傳治五色痢兼渴不止方茯苓宣黃連黃柏各等分上件取黃柏末以漿水打如麵糊良久和前二味為丸如緑豆大三歲米飲下七丸殺疳熟水下五丸至聖丸治五色痢厚朴去皮薑製黃柏略去皮以雞子白塗炙黃熟如干再上當歸酒浸上三味等分細末煉蜜為丸如梧桐子大小兒細丸厚朴湯下每服四十丸加減定粉散治疳痢五色痢定粉龍骨黃丹煅過各二錢訶子三個煨熟取肉上為末每服半錢粥飲下三歲