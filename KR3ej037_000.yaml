所常主也又曰諸脈者皆屬於目目得血而能視五臟六腑精氣皆上注於目而為之精故白睛屬肺黑睛屬肝瞳人屬腎上下胞屬脾兩眥屬心而內眥又屬膀胱五腑五色各有所司心主赤赤甚心實熱也用導赤散赤微者心虛熱也用生犀散肝主青青甚者肝熱也用瀉青丸淡青者肝虛也用地黃丸脾主黃黃甚者脾熱也用瀉黃散淡黃者脾虛也用異功散目無睛光及白睛多黑睛少者肝腎俱不足也用地黃丸加鹿茸晝視通明夜視罔見者因稟陽氣衰弱遇夜陰盛則陽愈衰故不能視也用沖和養胃湯凡赤脈翳物從上而下者屬足太陽經用東垣選奇湯從下而上者屬足陽明經用局方流氣飲蓋翳膜者風熱內蘊也邪氣未定謂之熱翳而浮於外邪氣已定謂之冰翳而沉於內邪氣既深謂之陷翳宜升發之退翳之藥佐之若上眼皮下出黑白翳者屬太陽寒水從外至內者屬少陽風熱從下至上緑色者屬足陽明及肺腎合病也疳眼者因肝火濕熱上衝脾氣有虧不能上升清氣故生白翳睫閉不開眵淚如糊久而膿流遂至損目用益氣聰明湯茯苓瀉濕湯及四味肥兒丸目閉不開者因乳食失節或過服寒涼之藥使陽氣下陷不能升舉故目不開用柴胡復生湯若胃氣虧損眼睫無力而不能開者用補中益氣湯暴赤腫痛者肝火熾盛也用龍膽瀉肝湯多淚羞明者肝心積熱也用生犀散亦有肝腎虛熱者用地黃丸風沿爛眼者膈有積熱也用清胃散時時作癢者濃潰生蟲也用點藥紫蘇膏眼睫連札者肝經風熱也用柴胡清肝散若生下目黃壯熱大小便祕結乳食不思面赤眼閉者皆由在胎時感母熱毒所致兒服瀉黃散母服地黃丸若乳母膏粱積熱致兒目黃者令母服清胃散若肢體面目爪甲皆黃小便如屋塵色者難治又有痘疹後餘毒未盡上侵於目者屬腎肝虛也用滋陰腎氣丸前證多宜審治其母兼調其兒初生眼不開胎赤並見初生門目赤腫痛曾熱極挾風則目赤腫痛晝夜不開驚啼不已先用九仙散水薑蔥煎服次三解散溫米泔水調下及點以黃連膏若夫天行時證暴赤腫痛晝夜苦甚久則昏蒙治法先以九仙散解表次以小柴胡湯去半夏加大黃薄荷竹葉生地黃水煎服並投草龍膽散及點以黃連膏貼以清涼膏有孩兒胃氣素虛脾氣實盛眼胞赤腫羞澀不開遽按苦寒之劑以退赤腫反傷脾胃不吐則瀉或四肢微冷復以溫藥調治則目疾轉加宜先用㕮咀五苓散水薑燈心煎服次投瀉黃散自愈有心脾蘊熱經久及肝受邪熱致兩目羞明眼胞浮腫微有紫色大腑閉或流利小便澀或通順先以百解散發表次投明目飲自然平復仍忌酒葷三五日有小兒薄劣多致塵埃入目揩摩成腫發熱作痛啼哭不已宜用闢塵膏治之立效湯導赤散治心熱小便赤眼目赤腫赤芍藥羌活防風各半兩大黃甘草各一錢上為末燈心黑豆同煎食後服余平生無赤眼之患用之如神大人小兒可通用凡眼赤澀之初只用自己小便張目溺出用一指接抹眼中便閉目少頃即效此以真氣逼去邪熱也本治小兒赤熱腫眼大黃白礬各等分上為末同冷水調作罨子貼眼立效小防風湯治小兒熱毒眼患大黃蒸山梔子甘草炙赤芍藥川當歸洗防風羌活各等分上銼碎每服五錢水一鍾煎至五分食後服小流氣飲治小兒風毒眼患蟬蛻去足甘草羌活天麻川當歸防風大黃薄荷赤芍藥杏仁各等分上銼碎每服五錢水一鍾煎至五分食後服小菊花膏治小兒積毒眼患黃連黃芩大黃菊花羌活蒼朮米泔浸荊芥穗防風上各等分為末煉蜜和膏如小指頂大每服一餅細嚼白湯咽下不拘時服通頂散治眼疼風熱腫脹作楚瓜蒂藜蘆各一錢皂角肉半錢麝香少許研上為細末研勻每少許吹入鼻中九仙散解諸目疾不拘歲月遠近並宜先服柴胡去蘆蒼朮米泔浸刮去粗皮銼炒燥各二兩赤芍藥荊芥甘草各六錢半麻黃銼去節湯泡濾焙乾川芎薄荷連梗各半兩旋覆花去老梗三錢上碎每服二錢水一盞姜二片蔥一根煎七分不拘時溫服三解散一名寧心湯主上焦蘊熱傷風面紅目赤狂躁氣急渴水驚啼煩悶丹毒口瘡痰嗽搐掣人參去蘆防風去蘆天麻茯神去皮木鬱金無以山梔仁代白附子大黃各二錢半赤芍藥黃芩殭蠶各五錢全蠍十五尾去尖毒枳殼水浸去瓤麩炒二錢粉草六錢上焙為末每服半錢至一錢用溫薄荷湯無時調下或燈心湯草龍膽散治暴赤火眼晝夜澀痛作腫淚多草龍膽木賊去節荊芥菊花防風去蘆草決明半生半炒甘草七味各半兩上銼每服二錢水一盞煎七分無時溫服痛甚加羌活乳香同煎明目飲治心脾蘊熱肝受風邪致兩目羞明經久不愈山梔仁淨香附各一兩夏枯草去梗半兩上銼每服二錢水一盞蜜一匙煎七分無時溫服金波散治時行赤眼腫痛成翳有熱多淚淨黃連一兩硼砂寒水石大黃各二錢海螵蛸銅青各一錢玄明粉二錢半全蠍去尖毒七枚麝香一字上除玄明粉麝香餘七味銼曬為末仍入玄明粉麝香乳鉢內同前藥末杵勻每用一字至半錢溫淨湯或涼水調化澄清去滓無時頻洗有風夾蟲作癢入輕粉取效仍忌酒葷三五日黃連膏治時行火眼赤腫澀痛晝夜煩啼淨黃連二錢半上件細銼雞子一枚箸嘴札開一頭大處取清瓦盞盛入黃連和勻釀一時見黃色以絹濾過成膏患者仰面臥外令人挑一字許頻點目內覺口中有苦味滿舌上藥之驗也豆瘡餘毒攻眼眵多有熱用之驗清涼膏治暴赤火眼腫痛及血癤作疼發熱大黃淨黃連黃柏赤葛細辛和葉薄荷葉風化朴硝七味各一兩上前六味或曬或焙為末臨入朴硝乳鉢內同杵勻每用一錢至二錢冷水加薑汁調塗太陽或新汲井水調妙熱癤以涼米湯水調搽患處闢塵膏治小兒塵埃入目揩成腫熱作痛啼哭不已上以油煙細墨新汲井水濃磨入玄明粉半錢和勻為膏用筆多點目內三五次即效仍忌飲酒一晝宵速效飲治長成小兒因他物或跌著觸損兩目血脹腫痛荊芥穗薄荷葉微炒草決明微炒各一兩甘草三錢生用上為粗末和半生半炒芝麻等分抄二錢掌中盛干嚼之味盡吐去滓如此法投三五次即效薛小兒目赤作痛咬牙寒熱余謂肝經風熱用柴胡飲子一劑而赤痛止又用四物參耆白朮柴胡而寒熱退又用補中益氣湯而飲食加一小兒眼素白或青患眼赤作痛服降火之劑眼如血貫脈洪大或浮緩按之皆微細用十全大補湯加柴胡山梔數劑外證漸退而脈漸斂又數劑而愈一小兒患眼赤痛服大黃之藥更加寒熱如瘧余謂脾胃復傷用四君升麻柴胡炮薑釣藤鉤而寒熱愈又用補中益氣湯間服而目疾痊一小兒目痛恪服瀉火治肝之藥反加羞明隱澀睡中驚悸悲啼此肝經血虛火動傷肺也用五味異功散加山梔補脾肺清肺金用地黃丸滋腎水生肝血而安仍兼服四味肥兒丸而瘥龍膽瀉肝湯方見疝生犀飲方見心生熟地黃散治眼初患之時因誤築打蹙肝受驚風致目腫赤痛癢生地黃洗熟地黃各一兩麥門冬去心五錢當歸枳殼米泔浸去瓤麩炒甘草炙防風杏仁湯泡去皮尖麩炒赤赤芍藥各二錢半上每服一錢黑豆七粒水煎服犀角飲治脾火眼疼犀角一兩鎊射干草龍膽炒黃芩炒各五錢人參二兩茯苓二錢五分釣藤鉤七錢半甘草三錢上每服一錢水煎東垣廣大重明湯治兩瞼或兩眥赤爛熱腫疼痛及眼胞癢極抓之至破爛赤腫眼楞生瘡痂目多眵淚隱澀難開草龍膽防風生甘草根細辛苗葉各一錢上用水一碗半煎龍膽至七分入余藥再煎至半碗熱洗日五七次洗畢閣眼須臾瘥東垣助陽和血補氣湯治發後熱壅白睛紅多眵淚癮澀此過服涼藥而真氣不能通九竅也防風七分黃耆一錢蔓荊子白芷各二分升麻七分炙甘草柴胡當歸身酒洗各五分水一鍾煎至半鍾稍熱服潔古方治眼赤暴發腫防風羌活黃芩炒黃連炒各等分上銼每服一錢水煎如大便祕加大黃二分痛甚加川當歸地黃各二分煩躁不得臥加梔子仁三分保命點眼藥除昏退翳截赤定痛當歸黃連各二錢防風二錢五分細辛五分甘草一錢上水一大碗文武火熬滴水中不散為度入熟蜜少許點用柴胡復生湯治紅赤羞明淚多眵少腦頂沉重睛珠痛應太陽眼睫無力常欲垂閉久視則痠疼翳下陷者藁本蔓荊子川芎羌活獨活白芷各二分半白芍藥炒炙甘草薄荷桔梗各四分蒼朮茯苓黃芩炒各五分柴胡六分五味子十二粒杵上每服二錢水煎食後服黃連羊肝丸治目中赤脈洪甚眵多黃連為末不以多少白羊肝一具先以竹刀將羊肝刮下如糊除去筋膜再擂細入黃連末丸桐子大每服十丸茶清送下外障小兒病目生翳不可輕用點藥只以服藥內消為主看赤脈上下內外分經處治已見雜病第七卷及前薛氏總論茲不贅録薛一女子年十四因恚怒先月經不行寒熱脅痛後兩目生翳青緑色從外至內余謂寒熱脅痛足厥陰之證也翳從外眥起足少陽之證也左關脈弦數按之而澀肝經風熱兼血滯也遂以加味逍遙散加防風龍膽草四服而寒熱脅痛頓減用六味丸月餘而翳消一小兒十五歲兩目白翳腹膈遍身似疥非疥晡熱口乾形體骨立此肝疳之證也用六味肥兒丸而痊後陰莖作癢小便澄白瘡疥益焮狀如大風用大蘆薈四味肥兒丸諸證漸愈又用大蕪荑湯而痊一小兒九歲素有肝火兩目生翳服蘆薈肥兒等丸隨愈至十四歲後遇用心過度飲食不節即夜視不明用補中益氣湯人參補胃湯四味肥兒丸而愈一小兒眼每生翳皆因乳母恚怒而作用九味蘆薈丸柴胡梔子散母子並服而愈一小兒乳哺失節服藥過劑腹脹少食大便不調兩眼生花服治眼之藥漸生浮翳余用異功散加當歸柴胡飲食漸進便利漸調少佐以九味蘆薈丸其眼漸明乃用人參補胃湯肥兒丸而痊一小兒十二歲傷寒咳嗽發熱服發散之藥目漸不明服降火等藥飲食日少目漸生翳余謂中氣虛用人參補胃湯飲食漸進又用千金補肝丸及熏眼之法而痊一女子十二歲目生白翳面黃浮腫口乾便泄用四味肥兒丸而痊本事方治太陽寒水陷翳膜遮睛防風白蒺藜各一兩羌活一兩半甘菊花三兩上為末每服二錢入鹽少許百沸湯點服保命羚羊角散治冰翳久不去羚羊角屑升麻細辛各等分甘草減半上為末一半煉蜜丸桐子大每服五七十丸一半泔水煎吞送丸子焮發陷翳亦羚羊角散之類用之在人消息若陰虛有熱者兼服神仙退云丸東垣補陽湯治陽不勝其陰乃陰盛陽虛則九竅不通令青白翳見於大眥乃足太陽少陰經中郁遏厥陰肝經之陽氣不得上通於目故青翳內阻也當於太陽少陰經中是九泉之下以益肝中陽氣沖天上行此乃先補其陽後於足太陰標中瀉足厥陰之火下伏於陽中內經曰陰盛陽虛則當先補其陽後瀉其陰每日空心服升陽湯臨臥服瀉陰丸須預期調養體氣和平天氣晴明服之補其陽使上升通於肝經之末利空竅於目矣羌活獨活當歸身酒洗焙乾甘草稍熟地黃人參黃耆白朮各一兩澤瀉橘紅各半兩生地黃炒白茯苓知母炒黃色各三錢柴胡二兩防風白芍藥各五錢肉桂一錢上每服五錢水煎空心服候藥力行盡方可飲食東垣羌活退翳湯柴胡甘草黃耆各三錢羌活黃連五味子升麻當歸身各二錢防風一錢五分黃芩黃柏酒浸芍藥草龍膽酒洗各五錢石膏二錢五分上分二服水煎入酒少許臨臥熱服忌言語謙甫五秀重明丸治眼翳膜遮睛隱澀昏花常服清利頭目甘菊花五百朵荊芥五百穗木賊去節五百根楮實五百枚上為末煉蜜丸桐子大每服五十丸白湯送下鎮肝散去痰熱退翳胡黃連梔子仁各一兩甘草微炙馬牙硝青葙子各半兩以上搗羅為細末次用真珠末研牛黃研各二錢半上件都拌勻細研每服一錢水八分入荊芥薄荷各少許煎四分去滓溫服食後井泉石散治眼疳邪熱攻於眼目漸生障翳致損睛瞳井泉石一兩石決明甘菊花夜明砂微炒黃連去須晚蠶砂微炒各半兩上件搗羅為細末每服一錢用米泔一盞入生豬肝少許煎五分肝爛為度放溫時時服乳食後羅氏煮肝散治小兒疳眼翳膜羞明不見服十日必退如大人雀目者一服效夜明砂青蛤粉穀精草各一兩上件為細末每服一錢五七歲以上二錢㹠豬肝一大片批開糝藥在內攤勻麻線纏定以米泔半碗煮肝熟取出肝湯傾碗內熏眼分肝作三服嚼訖卻用肝湯下一日三服不拘時候大人雀目空心服至夜便見物如患多時日二服龍臘飲子治疳眼流膿生疳翳濕熱為病神效不治寒濕為病者青蛤粉蛇蛻皮穀精草各半兩羌活草龍膽各三錢麻黃二錢半黃芩炒升麻各二錢鬱金甘草炙各半錢上為細末每服二錢食後茶清調下灸雀目疳眼法小兒雀目夜不見物灸手大指甲後一寸內廉橫紋頭白肉際各一壯炷如小麥大小兒疳眼灸合谷二穴各一壯炷如小麥大在手大指次指兩骨間陷中內障東垣人參補胃湯治勞役飲食不節內障眼痛神效黃耆根人參各一兩炙甘草八錢蔓荊子白芍藥炒黃柏酒拌炒四次各三錢上每服二三錢水煎稍熱服臨臥三五服沖和養胃湯治內障初起視覺微昏空中有黑花神水變淡緑色次則視岐睹則成二神水變淡白色久則不睹神水變純白色柴胡七錢人參當歸炙甘草乾生薑升麻葛根白朮羌活各一兩防風五錢黃耆一兩五錢白茯苓三錢白芍藥六錢五味子二錢上每服二錢水煎服滋陰腎氣丸治神水寬大漸散昏如霧露中行漸睹空中有黑花視物二體久則光不收及內障神水淡白色者熟地黃三兩當歸尾牡丹皮五味子乾山藥柴胡各五錢茯苓澤瀉各二錢半生地黃酒炒四兩上為末煉蜜丸如桐子大辰砂為衣每服十丸空心滾湯化下瀉熱黃連湯治內障有眵淚眊矂黃芩黃連大黃並酒洗柴胡各一兩升麻五錢龍膽草三錢上每服一錢水煎午前服千金補肝散治目失明青羊肝一具去膜薄切以火燒新瓦上炙乾決明子一錢半蓼香一合熬令香上為末每服方寸匕日二服久而有驗局方菊睛丸治脾腎不足眼花昏暗枸杞子肉蓯蓉酒浸炒巴戟去心各一兩甘菊花四兩上為末煉蜜丸梧子大每服十丸空心白湯送下真珠膏專治眼病久不瘥𥉂𥉂不見物真珠末細研甘菊花為末香豉炒黃為末井泉石細研各二錢半上拌勻用白蜜一合鯉魚膽一枚同藥慢火熬成膏入好龍腦一錢同拌勻每用少許時時點眼中生熟地黃散見前雀盲千金治雀盲方地膚子五兩決明子一升上為末煮米飲和丸每服二三十丸世傳方治雀盲蒼朮米泔浸去皮切片焙四兩上為末豬肝二兩批開摻藥在內用麻絲扎定以粟米一合水一碗砂鍋內煮熟熏眼候溫臨臥每服三錢大效聖惠方治雀盲不計時月用蒼朮一兩為末每服一錢復明散治小兒每至日暮即不見物乃雀目也蒼朮米泔浸刮去皮銼片焙乾二兩穀精草一兩地膚子決明子黃芩各半兩上件搗羅為細末每服一錢水八分入荊芥少許煎五分去滓溫服食後眼白多初虞世曰眼白多多屬虛山茱萸丸主之山茱萸二兩熟地黃牡丹皮牛膝茯苓澤瀉各一兩鹿茸半兩上為末煉蜜丸如梧子大食後鹽湯下二十丸薛一小兒白睛多吐痰發搐先用抑青丸四服而痰搐止後用地黃丸年許而黑睛多一小兒白睛多三歲不能行語聲不暢兩足非熱則冷大便不實朝用補中益氣湯加五味子乾山藥以補脾肺夕用地黃丸加五味子牛膝鹿茸補肝腎不三月而瘥一小兒眼白腿軟兩足熱面似愁容服地黃丸兩月餘漸健服年餘白睛漸黑出痘無恙通睛湯氏牛黃丸治小兒通睛皆因失誤築打觸著頭面額角兼倒撲令兒肝受驚風遂使兩目鬥睛名曰通睛宜服此牛黃白附子炮肉桂全蠍芎藭石膏煅各一錢白芷硃砂各二錢研藿香半兩麝香一分上為末煉蜜丸如芡實大三歲以下每服一丸薄荷湯下乳食後忌油麵豬肉眼札薛小兒雀盲眼札服煮肝丸而目明服四味肥兒丸而目不札一小兒發搐目扎屬肝膽經風熱先用柴胡清肝散治其肝後用地黃丸補其腎而愈一小兒因驚眼札或搐先用加味小柴胡湯加蕪荑黃連以清肝熱又用六味地黃丸以滋腎生肝而痊一小兒兩目連札或色赤或時拭眉此肝經風熱欲作肝疳也用四味肥兒丸加龍膽草而瘥目睛瞤動目直目動俱見驚搐門胎黃見初生門小便不通曾嬰兒小便不通者有陰陽二證陰閉者為冷濕乘虛入里因而不通名曰陰閉以白芍藥湯加南木香及用炒鹽以絹帕兜令帶熱尉臍四圍並投五苓散入靈砂末鹽湯空心調服其效尤速陽閉者因暴熱所逼澀而不通名曰陽閉又有癃閉與淋不同內經宣明五氣篇曰膀胱不利為癃蓋癃者乃內臟氣虛受熱壅滯宣化不行非澀非痛但閉不通腹脹緊滿但以㕮咀五苓散加車前子燈心之類及投木通散玉露飲益元散皆可用之或貼姜豉餅於臍上取效不拘陰陽二證悉能療之並與萬安飲尤妙薛東垣云小便不利有在氣在血之異夫小便者足太陽膀胱之所主長生於申申者金也金能生水肺中伏熱水不能生是絶小便之源也治法用清燥金之正化氣薄之藥茯苓豬苓澤瀉琥珀燈心通草車前瞿麥萹蓄之類皆為淡滲能泄肺中之熱而滋水之化源也若不渴熱在下焦是熱澀其流而溺不泄也須用氣味俱厚陰中之陰藥治之二者之病一居上焦在氣分而必渴一居下焦在血分而不渴血中有濕故不渴也二者之殊至易分別耳竊謂前證若津液偏滲於腸胃大便瀉利而小便澀少者宜分利若熱蘊於下焦津液燥而小便不行者宜滲泄若脾胃氣澀不能通調水道者宜順氣若乳母肝心二經有熱者用梔子清肝散肝經怒火者用柴胡梔子散若因父母曾服燥劑而致者用四物麥門甘草數而黃者用四物加山茱萸黃柏知母五味麥門肺虛而短少者用補中益氣加山藥麥門陰挺痿痹而頻數者用地黃丸熱結膀胱而不利者用五淋散脾肺燥不能化生者用黃芩清肺飲膀胱陰虛陽無以生而淋瀝者用滋腎丸若膀胱陽虛陰無以化而淋瀝者用六味丸若因乳母厚味酒面積熱者用清胃散五淋散仍參諸淋覽之一小兒十四歲肢體倦怠發熱晡熱口乾作渴吐痰如湧小便淋瀝或面目赤色躁不欲衣此稟賦腎虛陰躁也用補中益氣湯加減八味丸而愈一兒五歲小便不利用五苓散分利淡泄之藥益加不通小便陰囊漸腫先兄謂前藥復損真陰也用六味丸料加牛膝肉桂車前子佐以補中益氣湯而痊一兒八歲先小便澀滯服五苓散益甚加木通車前之類腹脹吐痰加枳殼海金砂而胸滿陰腫遍身發浮余用六味丸煎送滋腎丸而痊此皆稟父氣所致其作濕熱痰氣治之而歿者多矣一兒八歲先因小便黃赤服五苓導赤等散後患便血余以為稟賦虛熱也用六味丸及補中益氣湯而痊錢捻頭散治小便不通玄胡索川苦楝各等分上同為細末每服半錢或一錢捻頭湯調下量大小多少與之食前服捻頭湯即沸湯中滴油數點是湯木通散治心經伏熱小便不通啼叫木通一兩牽牛子炒半兩滑石一兩上為末燈心蔥白水煎服冬葵子散治小兒腹急悶冬葵子一兩木通半兩上為末每服一錢水煎張葵石散治小便不通悶亂者葵根一握銼滑石木通各一兩牽牛子半兩炒上件搗為粗末每服一錢以水一大盞入燈心蔥白各少許煎六分去滓放溫服乳食前車前散治熱盛積於小腸甚則尿血牡蠣燒為粉半兩車前子甘草炙微黃銼川朴硝各一分上件藥搗羅為散每服一錢以水一小盞煎至五分去滓溫服不拘時量兒大小加減芎黃散治臟腑有熱小便澀兼大便不通芎藭一兩川大黃銼微炒郁李仁湯浸去皮微炒各七錢半上件搗羅為散每服一錢以溫水調下量兒大小加減硃砂丹治證同前硃砂細研水飛續隨子各半兩膩粉一錢上件藥都研令勻煉蜜和如黍米大每服七粒以溫水下量兒大小加減乳食後硃砂散治心神煩躁小便赤澀不通硃砂一兩另研細滑石犀角屑各半兩黃芩甘草炙微赤銼車前子各七錢半上件藥搗羅為散入硃砂同拌勻每服半錢煎竹葉湯調下食前曾白芍藥散見疝五苓散見驚玉露飲益元散萬安飲俱見積熱木通散見驚清肺散治渴而小便閉或黃或澀五苓散加琥珀半錢燈心通草車前子炒各二錢半瞿麥半錢木通萹蓄各一兩七錢半上為粗末每服三錢水煎食前服薛八正散治蘊熱咽乾口燥大渴引飲心忪面熱煩躁不寧目赤睛疼或咽舌生瘡小便赤閉或熱淋血淋車前子瞿麥炒大黃麵裹煨山梔滑石萹蓄木通甘草炙各一兩上為末每服二三錢入燈心水煎食前服梔子仁散治小便不通臍腹脹悶心神煩熱梔子仁五枚茅根冬葵子各半兩甘草炙二錢上為末每服一錢水煎空心服滋腎丸梔子清肝散柴胡梔子散即柴胡清肝散三方並見發熱淋曾巢氏病源曰諸淋皆腎虛所致腎與膀胱為表裡主水下入小腸通於胞行於陰而為溲腎氣通於陰下流之道也淋有五名曰膏曰冷曰熱曰血曰石各具於後膏淋見小便有肥脂似膏而浮於小便之上此腎虛不能制其肥液而下行也冷淋先戰栗而後小便此亦腎虛而下焦受冷冷氣入胞與正氣交爭故小便澀而戰栗熱淋下焦有熱熱氣傳於腎流入於胞其溺黃多而澀間有鮮血而同來者血淋熱之極也心者血之主外行經絡內行臟腑熱盛則失其常道心與小腸為表裡故下流而入於胞則為血淋石淋腎主水水結則化為石腎為熱所乘遇小便則莖中痛不得流利痛引小腹則沙石從小便出甚至塞痛令人昏悶遍身有汗而後醒此痛之使然蓋五淋者雖曰腎虛所致然小腸為受盛之府氣通於膀胱膀胱為津液之府氣通於腎余化下流而不通皆曰腎氣不足熱入膀胱水道澀而不利出入起數臍腹急痛蘊作有時或如豆汁膏血並以局方五淋散下龍腦雞蘇丸自然平愈及香芎丸補腎地黃丸與之疏導補益為上薛夫小兒諸淋者腎與膀胱熱也二經相為表裡俱主水道水入小腸下行於胞則為溺若膀胱熱則津液內涸水道不通腎氣熱則小便淋瀝或少腹引臍而痛夫淋有五石淋者腎熱化石內塞水道痛引膀胱氣淋者肺氣壅熱小腹脹滿小便澀滯熱淋者三焦有熱傳入腎膀胱流入於胞小便赤澀血淋者心熱血散失其常經溢滲入胞寒淋者膀胱氣冷與正氣交爭寒戰氣解是也亦有因妊母肝熱及乳母恚怒者當分五臟蓄熱治之若心臟有熱者導亦散加黃連肝臟有熱者柴胡梔子散大便不通瀉青丸脾臟有熱者瀉黃散脾氣不足者異功散脾氣下陷補中益氣湯肺臟有熱者瀉白散肺氣虛熱異功散加炒黑山梔腎臟有熱者地黃丸或因乳母肝經熱者用梔子清肝散恚怒者用柴胡清肝散乳母厚味者用加味清胃散心小腸熱者用清心蓮子飲或兒早近色欲小便澀滯或作痛及更去後大小便牽痛者皆屬肝腎不足也用六味地黃丸補中益氣湯加牛膝車前肉桂未應當參五臟所勝不可輕用滲泄寒涼之藥大損胃氣仍參前小便不通證覽之一小兒小便不通服五苓之類不應頦間及左腮色赤乃肝腎虛熱也用四物山梔及地黃丸而愈後因感冒誤汗小便仍不利余用補中益氣湯加麥門五味而安一小兒小便不利莖中澀痛時或尿血此稟父腎熱為患也先用五淋散以疏導又用滋腎丸地黃丸補肝腎漸愈後出痘色紫小便短赤頦間右腮或赤或白用補中益氣湯六味地黃丸前證並愈丹鄭廉使之子年十六初生七個月患淋病五七日必一發其發則大痛水道下狀如黍如粟者約一杯許然後定診其脈輕則澀重則弦視其形瘦而長其色青而蒼意其父必因多服下部藥遺毒在胎留於子之命門而然遂以紫雪和黃柏末丸桐子大曬極干熱湯下百丸以食物壓之又半日痛大作腰連腹水道乃行下如黍如粟者一大碗許其病減十分之八後又與陳皮一兩桔梗木通各半兩作一帖與之又下如黍粟者一合許而安父得燥熱且能病子況母得之者乎豫書此以證東垣紅瘤之事此亦熱在血分也五淋散赤茯苓去皮赤芍藥炒山梔子去殼甘草生當歸去蘆黃芩炒車前子淡竹葉燈心木通去皮節滑石水飛葵子葶藶炒上㕮咀用蔥白一莖水煎入車前草杵搗取汁用五苓散調化食前服或硝石末調化服白淋白茅根燈心煎湯服有氣淋小腹脹滿尿後有餘瀝木通煎湯服熱淋小便赤而淋瀝臍下痛新水煎服或黃芩煎湯服石淋莖內痛尿澀有砂石令人悶絶滑石膈紙炒焦為細末葵子煎湯服局方五淋散治膀胱有熱水道不通淋瀝不出或尿如豆汁或成砂石或如膏或熱怫便血赤茯苓六錢當歸甘草各五錢赤芍藥山梔子各二錢上㕮咀每服三錢水一小盞入燈心煎服導赤散治小兒血淋生地黃木通各二錢黃芩甘草生用各一錢上為末每服一錢井水入燈心煎服仍以米飲調油發灰空心灌下葵子散治小兒諸淋葵子車前子木通桑白皮炒瞿麥赤茯苓山梔子炙甘草各等分上水一盞煎服香芎丸治諸淋證若患風閉尤效淨香附鹽水炒川芎赤茯苓去皮各半兩海金砂滑石各一兩枳殼泡去瓤麩炒黃澤瀉石韋去老梗取葉檳榔不過火各二錢半上銼曬為末糯米粉煮為清糊丸麻仁大每服三十三丸至五十五丸或七十七丸並用麥門冬熟水空心送下若小便澀痛滴三五點者取流水用火微溫入鹽少許調勻空心咽下木通散見驚清心蓮子飲治小兒上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀或欲成淋並宜服之黃芩車前子甘草炙麥門冬去心地骨皮各半兩黃耆蜜炙白茯苓石蓮肉去心人參各七錢半上銼碎每服五錢水一盞煎至六分去滓食前服如發熱加柴胡薄荷金沙散治小便淋瀝不通鬱金海金砂滑石甘草各等分上為末每服一錢煎地膚子湯調下燈心木通亦可又方冬瓜最治實熱小便不通內熱口渴立效散治小兒諸淋不通莖中作痛木通甘草王不留行胡荽滑石海金砂山梔子檳榔各等分上每服一錢水煎治血淋神效方紫草連翹車前子各等分水煎服又方海螵蛸生地黃白茯苓上等分為末柏葉車前草煎湯調下治氣淋赤芍藥一兩檳榔一枚麵裹煨上為末燈心同棗子煎湯調下張石燕丹治小便淋澀痛悶石燕燒赤醋淬放冷細研瞿麥滑石各一兩木通銼海蛤細研各半兩上件搗羅為細末煉蜜和如黍米大每服十粒以蔥白湯下食前量兒大小加減石韋散治諸淋澀水道中痛臍下妨悶石韋去毛一兩冬葵子木通銼赤茯苓各半兩車前子瞿麥榆白皮滑石甘草各二錢半上件藥搗羅為散每服一錢以水一小盞入蔥白五寸煎至六分去滓溫服如人行十里再服量兒大小加減葵子散治腎熱水結化為石淋甚者水道中澀痛不可忍冬葵子一兩石楠榆白皮銼石韋去毛木通銼各半兩上件藥搗羅為散每服半錢以蔥白湯調下日二服量兒大小加減滑石散滑石栝蔞根石韋去毛各等分上件藥搗羅為散每服半錢煎大麥飲清調下日二服量兒大小加減蒲黃散治膀胱熱甚血淋水道澀痛蒲黃冬葵子生地黃各半兩上件藥搗羅為細末每服一錢以水一大盞煎至六分去滓溫服量兒大小加減遺尿原病式云遺尿不禁者為冷內經云不約為遺溺仁齊曰小便者津液之餘也腎主水膀胱為津液之府腎與膀胱俱虛而冷氣乘之故不能拘制其水出而不禁謂之遺尿睡里自出者謂之尿床此皆腎與膀胱俱虛而挾冷所致也以雞腸散主之亦有熱客於腎部干於足厥陰之經挺孔鬱結極甚而氣血不能宣通則痿痹而神無所用故液滲入膀胱而旋溺遺失不能收禁也薛氏用六味地黃丸脾肺氣虛者用補中益氣湯加補骨脂山茱萸曾氏謂乃心腎傳送失度小腸膀胱關鍵不能約束有睡夢而遺者皆是下元虛冷所致亦因稟受陽氣不足用三因方家韭子丸治之及參苓白朮散補腎地黃丸然又當實土以存水乃免滲泄之患所謂補腎不如補脾是也平胃散倍加益智仁銼碎薑棗燒鹽煎空心溫服雞腸散雞腸一具男用雌雞女用雄雞燒存性牡蠣茯苓去皮桑螵蛸炒各五錢桂去粗皮龍腎各二錢半上為極細末仍以雞䏶胵一具雞腸一具燒存性研極細末每用前藥末一錢用溫酒調化食前服張雞腸散治因膀胱有熱服冷藥過多小便不能禁止或遺尿病雞腸草龍骨麥門冬去心焙白茯苓桑螵蛸各半兩牡蠣粉七錢半上件藥搗為粗散每服一錢水一小盞入生薑少許棗二枚煎至六分去滓溫服量兒大小加減按此與前方蓋一方而傳寫之訛竊詳用雞腸較是而張氏婁氏薛氏皆主用草今兩存之益智丸治脾腎虛熱心氣不足遺尿白濁益智仁茯苓茯神各等分上為末煉蜜丸桐子大每服五六十丸空心白滾湯下破故紙散治膀胱虛冷夜間遺尿或小便不禁用破故紙為末每服一錢熱湯調下又方破故紙炒為末黃柏湯調下外臺療小兒睡中遺尿不自覺桂末雄雞肝等分搗丸如小豆大溫水下日三服初虞世治小兒遺尿薏苡仁一合去心不去殼敲碎入鹽一小撮同炒黃色用水二鍾煎至半鍾空心服之纍效三因家韭子丸方見雜病小便不禁尿白便濁仁齊曰小兒尿白如米泔狀由乳哺失節有傷於脾致令清白不分而色白也久則成疳此亦心膈伏熱兼而得之全嬰方云小便初出微赤良久白濁者乃熱疳之邪也初出黃白久白濁者乃冷疳之候也冷者益黃散主之熱者牛黃丸主之冷熱者蘆薈丸主之純下白濁者厚朴丸主之諸失津液欲成疳而小便白者茯苓散主之薛氏曰小便如泔或良久變白亦有脾虛食積濕熱下注者先用茯苓散五七服次用四味肥兒丸若乳食少思或肚腹脹大小便頻數此脾虛元氣下陷也朝用五味異功散夕用四味肥兒丸若肥體色黃小便不調發黃脫落鼻下瘡痍嗜土少食大便青褐者用梔子茯苓湯仍審其乳母飲食七情治之一小兒發熱懶食小便良久變白余用四味肥兒丸即愈或誤以為積熱用清涼祛逐之劑形體頓弱虛證悉至小便如疳用補中益氣湯及四味肥兒丸而愈一小兒面色痿黃眼胞微腫作渴腹脹飲食少思小便澄白大便不實此脾疳之證也用四君子加山梔蕪荑兼用四味肥兒丸而愈一小兒白濁兩耳內耳外生瘡膿水淋漓用大蘆薈丸而愈後遍身如疥肌體消瘦發熱作渴大便酸臭小便白濁用九味蘆薈丸五味異功散而愈一小兒白濁發熱口乾體瘦骨立余謂腎經虛羸朝用補中益氣湯夕用六味地黃丸而愈後兩目或生白翳面黃浮腫小便仍白此變肝脾疳證用四味肥兒丸月餘漸瘥益黃散方見脾臟牛黃丸方見疳積蘆薈丸方見疳君朴丸治小兒小便白濁久則黃瘦不長肌肉使君子煨去殼厚朴制黃連各一兩木香三錢上為末蒸餅糊丸桐子大每服一二十丸米湯下茯苓散治乳食傷脾或心經伏熱小便白濁三稜煨蓬莪朮煨砂仁赤茯苓各半兩青皮陳皮滑石甘草各一錢半上為末每服一錢燈心湯調下三稜散治小兒尿白久則成疳宜補脾消食化積三稜炒蓬莪朮炒各一兩益智仁甘草神麯炒麥芽橘皮各半兩上為末每服一錢白湯點下清心蓮子飲見前又方用大甘草頭煎湯服梔子茯苓湯即大蕪荑湯方見疳香砂丸治嬰孩小便白濁香附子炒一兩縮砂去殼五錢三稜煨蓬莪朮煨陳皮麥蘖炒蘆薈各五錢半上為極細末煮麵糊丸如黍米大用米飲鹽湯食前服疝曾按內經大奇論曰腎脈大急沉肝脈大急沉皆為疝證心脈搏滑急為心疝肺脈沉搏為肺疝蓋疝者寒氣結聚之所為故令臍腹絞痛者是也又巢元方曰諸疝者陰氣積於內復為寒氣所傷榮衛不調二氣虛弱風冷入腹而成故脈經云急者緊也緊則為寒為實為痛血為寒泣音澀則為瘕氣為寒聚則為疝皆因本臟氣虛外感於寒濕內傷於生冷遂使臍腹絞刺激搏而痛無有定處倉卒之際不堪忍者謂之疝也並宜先用五苓散沸湯調服和解輕則但以白芍藥湯烏梅散釣藤膏為治重者金茱丸散氣丸未有不愈也仁齊㿗疝者陰核氣結腫大而釣痛也多因小兒啼怒不止動陰氣故陰氣下系結聚不散而得之或胎婦啼泣過傷令兒生下小腸氣閉亦變此證惟是陰氣不得流行加以風冷入焉白水聚焉故水氣上乘於肺先喘急而後疝痛其狀有如李者亦有稀軟者亦有並腎腫大者亦有大硬者臍下痛楚皆不能忍用藥行心氣逐腎邪利其大小二便更無補法薛小兒陰腫疝氣者多屬肝腎氣虛及坐臥寒濕之地或風邪所傷血氣相搏或啼叫氣逆水道不行或稟父肝經虛熱或妊娠肝氣鬱結或乳母怒動肝火而致者若兒肝經熱用梔子清肝散兒啼躁怒用勻氣散乳母恚怒用柴胡清肝散肝火氣逆用加味逍遙散小腹作痛小便澀滯用龍膽瀉肝湯久坐冷地小便不利用四苓散加柴胡山梔車前子不時寒熱者加味小柴胡湯經云肝氣熱則莖痿宗筋弛縱腎莖腫脹或出白液癢痛或裡急筋縮挺縱不收或精隨便下者此名筋疝俱屬肝火不繫於腎宜詳治之茱萸內消丸治小兒陰㿗偏大上攻臍腹㽲痛膚囊腫脹或生瘡瘍時出黃水川楝子炒一兩半大腹皮五味子海藻洗玄胡索各一兩二錢半桔梗青皮山茱萸去核各一兩木香七錢半蘹香炒桂心川烏頭炮去皮臍吳茱萸桃仁麩炒另研食茱萸各五錢上為細末酒糊為丸如麻子大每服三十丸空心溫酒送下當歸散治小兒㿗疝牽牛微炒取仁辣桂各半兩當歸大黃各二錢半全蠍一錢半桃仁湯泡去皮尖二錢半上銼碎每服三錢水一鍾入蜜半匙煎至五分食前服以利為度川楝丸治小兒㿗疝小腹痛引腰脊攣曲身不能直木香檳榔三稜蓬莪朮炮青皮去白陳皮去白川楝肉芫花米醋浸炒各半兩辣桂牽牛生取仁各三錢巴豆不去油一錢上為細末飛麵糊為丸如麻子大每服三丸空心用生薑湯送下五苓散方見驚搐曾白芍藥湯治冷疝腹痛及誤汗誤下即壞證傷寒是也並宜先服次投對證之劑白芍藥一兩半澤瀉去粗皮七錢半甘草二錢炙薄桂去粗皮一錢半上件㕮咀每服二錢水一盞煎七分空心溫服誤汗誤下加人參南木香各二錢臍下痛入生薑及鹽同煎或加釣藤亦好烏梅散治腹疼及初生嬰孩臍下冷痛疝氣等疾烏梅去核玄胡索粉草半生半炙各五錢乳香沒藥釣藤各二錢半上件㕮咀每服二錢水一盞煎七分空心溫服金鈴散治疝氣腹痛投諸藥後愈而復作宜服金鈴子肉六錢三稜炮銼莪朮醋煮銼青皮去白陳皮去白各二錢半赤茯苓去皮蘹香各半兩南木香二錢甘草炙四錢檳榔枳殼去瓤麩炒黃釣藤和鉤各三錢上除檳榔木香不過火余銼焙仍同檳榔木香為末每服半錢至一錢仍用炒蘹香煎無灰酒空心調服不飲酒者煎炒蘹香湯調下釣藤膏方見夜啼金茱丸治冷疝氣痛及膚囊浮腫金鈴子肉一兩家園茱萸半兩上研末酒煮麵糊丸麻仁大每服三十丸至五十丸空心溫鹽湯下溫酒亦可兒小者丸粟粒大丸數下法同前散氣丸理諸疝氣小便利或不通臍下作痛不可忍者海藻湯浸洗七次焙乾澤瀉去粗皮蘹香炒車前子焙蘿蔔子瓦上慢火干焙川楝肉用斑蝥九枚去翅足同炒少時去斑蝥大腹皮淨洗焙乾各一兩上銼焙為末酒煮麵糊丸緑豆大每服三十丸至五十丸南木香煎酒空心下或防風牡丹皮煎酒下不能飲者於木香湯防風丹皮湯中各少入酒並空心投亦可再用鹽炒蘹香煎湯尤妙湯治小腸疝氣家傳妙方芫花醋浸炒木香檳榔三稜各半兩茯苓青皮全蠍桂枝附子硇砂各二錢半上為末將硇砂浸澄去土頓在湯瓶上候成膏子和糖醋打麵糊為丸如豆大每服三十丸空心溫酒下未效再服勻氣散主調補通利後及冷疝腹痛氣滯不和桔梗二兩銼炒陳皮去白一兩縮砂仁蘹香各半兩白姜二錢半炮粉草四錢炙上銼焙為末每服半錢或一錢空心沸湯調服冷疝腹痛燒鹽湯調下木香飲治小兒小腸氣痛川楝肉十個用巴豆七粒同炒令黃色去巴豆不用入蘹香半兩玄胡索半兩南木香二錢使君子五枚去殼上為極細末用米飲食前調服梔子清肝散柴胡清肝散二方並見發熱龍膽瀉肝湯治肝經濕熱不利下部生瘡兩拗腫痛或腹中作痛小便澀滯等證龍膽草酒拌炒黃澤瀉車前子炒木通生地黃酒拌當歸酒拌山梔黃芩炒甘草各三分上水煎食前服四苓散即五苓去桂小柴胡湯方見發熱陰腫全嬰方云小兒陰腫核腫者由兒啼怒氣逆不順乘虛而行陰核偏大又因甘肥不節生冷過度致生疳氣氣結不行流入陰中或傷暑毒或觸風邪使血氣與邪氣相搏停結不散則成陰腫也仁齊云若腎經氣虛或坐石不起冷氣凝之或近地經久風邪濕氣傷之不為陰腫幾希矣間有啼叫怒氣閉繫於下結聚不散加以水竇不行亦能發為此疾治用桃仁丸主之丹溪謂脫囊腫大墜下不收用紫蘇莖葉為末水調荷葉包之一人傳此方用野白紫蘇為末濕則摻之干則香油調敷雖皮潰子墜皆有神效此用紫蘇蓋亦同功也曾巢元方論曰諸筋會於陰器邪客於厥陰少陰之經與冷氣相搏則陰囊腫痛而引縮經中雖分四證曰腸㿗氣㿗水㿗卵㿗然小兒患此若治之不早則成痼疾如腰曲腹痛冷汗自出而陰囊二子吊縮入腹痛止方出名為內吊用烏梅散勻氣散金茱丸金鈴散為治有陰莖全縮不見有陰囊光腫不痛此因肝腎氣虛宜以橘子仁煎湯調下金鈴散勻氣散皆可投之內經曰㿗癃疝膚脹者陰亦盛而脈脹不通故曰㿗癃疝由是觀之乃陰氣盛而致有此吊縮者筋急也筋遇寒則引縮遇熱則弛張故三因所用方法以寬小腸氣疏風為治然小兒此證多因坐陰潤之地感風濕而得用當歸散加檳榔蒼朮水姜煎服並青木香湯釣藤膏外以立消散敷之有外腎無故而膚囊腫大不燥不痛光亮如吹此名氣虛所致以勻氣散調治三因方家韭子丸主之一證外腎膚囊赤腫通明及女兒陰戶腫脹乃心熱之所傳皆以木通散導赤散為治或用薏苡仁煎湯調五苓散及以外消散敷之並投天花散用無灰酒煎下不能飲者水煎少入酒同服亦好張渙曰小兒足少陰之經虛而受風邪者衝於下經則成陰腫病桃仁丹主之桃仁丹桃仁七錢半湯浸去皮尖雙仁者麩炒微黃牡丹皮白蒺藜微炒去刺桂心各半兩郁李仁二錢半湯浸去皮微炒上件藥搗羅為細末煉蜜和黍米大每服十粒以溫酒下乳食前量兒大小加減亦可水煎服胡連散治陰腫生瘡胡黃連去須胡粉各半兩白礬枯二錢半上搗羅為細末每用少許以生油調塗患處湯小兒陰腫由啼叫怒氣閉縱於下成此疾宜海蛤散海蛤三錢蘹香炒七錢半薏苡仁白朮檳榔各半兩上為末食前溫酒調下大小加減桃仁丸桃仁去皮尖麩炒三錢桂枝去皮牽牛炒頭末蒺藜牡丹皮各二錢上為細末煉蜜丸如黍米大用青皮木香蔥白入鹽少許同煎湯食前服三白散治小兒解初中腫疾四肢膚囊浮脹大小便不利皆因膀胱蘊熱風濕相乘桑根白皮炒白朮木通去皮節陳皮去白白牽牛半生半炒甘草炙各五錢上㕮咀用水煎食前服丹脫囊即外腎腫大木通甘草當歸黃連黃芩上水煎服錢蚯蚓散治腎子腫硬成疝用干蚯蚓為末唾調敷常避風冷濕地先用花椒蔥湯避風處洗卻用此敷之纍驗世治小兒囊腫如升用甘草煎汁調地龍末塗之立退纍效敷藥方牡蠣粉二分乾地龍碾末一分上用津唾調敷外腎熱者雞子清調敷牡蠣散治小兒外腎腫大莖物通明用牡蠣粉研十分細先以唾津塗腫處次以牡蠣粉摻又方治小兒卵腫研桃仁唾調敷曾烏梅散勻氣散金茱丸金鈴散方並見疝當歸散見痢牡蠣大黃湯治三五歲小兒感受溫濕之氣侵襲膀胱致陰莖膚囊浮腫作痛牡蠣用熟黃泥包裹炭火煆透出地上候冷用大黃紙裹水浸透煨過候冷用二味各一兩上銼研為末每服一錢無灰溫酒空心調服不能飲者溫湯調少入酒同服青木香湯治小兒陰莖無故而腫或痛縮因陽明經有風熱濕氣相搏法當寬此一經自愈蓋陽明受病不能養其宗筋故也咳嗽痰喘亦宜服之青木香去蘆枳殼浸去穰麩炒各半兩甘草二錢半上每服二錢水一盞煎七分不拘時溫服立消散治膀胱久受熱毒致陰器膚囊赤腫脹痛赤小豆赤芍藥生枳殼商陸風化朴硝另研後入各半兩上件不過火銼曬為末柏枝煎湯候冷調二錢或三錢塗腫處仍服㕮咀五苓散加車前子薏苡仁水煎木通散見驚天花散治外腎膚囊腫痛天花粉二兩甘草三錢上銼每服二錢無灰酒一盞煎七分空心溫服不能飲用水煎少入酒同服偏墜田小兒狐疝氣偏有大小時時上下者蜘蛛十四枚熬焦桂枝半兩二物為散每服八分日再酒調下蜜丸亦通黑散黃連黃芩大黃黃柏各二錢上同燒存性為極細末雄豬膽汁蜜同調敷偏墜亦宜防葵丸令兒坐於土中午時灸印下偏墜之處七壯防葵丸未詳小兒偏墜若非胎中所有在後生者於莖下腎囊前中間弦子上灸七壯立愈明胎産疝卵偏墜囊縫後十字紋上灸三壯春灸夏瘥夏灸冬瘥陰瘡臘茶散治小兒陰囊生瘡疼痛水出久不瘥臘茶五倍子各五錢膩粉少許上為末先用蔥椒湯洗後用香油調敷一方治陰囊生瘡疼痛上先用川椒荊芥槐枝柳枝蛇床子煎湯洗後用朴硝為末雞子清調敷一方治陰生瘡膿水不幹上用烏賊魚骨為細末乾摻患處一方用紫蘇葉煎湯淋洗及作細末摻之妙一方治小兒陰生瘡不幹上用輕粉密陀僧為末貼之如癢加山梔子訶子燒存性研同前藥為末先將米泔水洗淨然後敷貼此藥不寐薛經曰陽明胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也又曰胃不和則臥不安夫人身之衛氣晝則行於陽夜則行於陰陽主動陰主靜寤則魂魄志意散於腑臟發於耳目動於肢體而為人身指使之用寐則神氣各歸五宮而為默運之妙矣若脾胃氣盛則腑臟調和水穀之精各各融化以為平和之氣若胃氣一逆則氣血不得其宜腑臟不得其所不寐之證由此生焉當用四君遠志酸棗仁肝腎虛熱者六味丸心血不足者真珠母丸思慮過度者歸脾湯精神短乏者人參養榮湯病後餘熱者酸棗仁湯膽虛不得眠者人參竹葉湯肝火不寧者加味小柴胡湯振悸不得眠者四君生薑酸棗仁夜啼驚哭不寐各詳別證當參求之仲景酸棗湯治虛勞虛煩不得眠酸棗仁炒一錢甘草知母炒茯苓芎藭生薑各五分上水煎服本事鱉甲丸治膽虛不得眠四肢無力鱉甲酸棗仁炒羌活黃耆炒牛膝酒炒人參各一兩五味子五錢上為末煉蜜丸梧子大每服三四十丸溫酒下聖惠治骨蒸勞熱煩心不得眠用酸棗仁三錢水煎熟下地黃汁一蛤蜊殼服之本事真珠母丸治肝膽二經因虛內受風邪臥則魂散而不守狀若驚悸真珠別研細七錢半當歸熟地黃各一兩半人參酸棗仁炒柏子仁各一兩犀角屑茯神沉香龍齒研各半兩上為末煉蜜丸小豆大辰砂為衣每服二十丸白湯下日午夜臥各一服人參竹葉湯治虛煩不得眠人參竹葉甘草各二錢半夏小麥麥門冬各一錢五分上每服二三錢姜二片粳米一撮水煎服人參養榮湯見盜汗歸脾湯見驚悸咽喉心鑑咽喉為一身之總要與胃氣相接呼吸之所從出若胸膈之間蘊積熱毒致生風痰壅滯不散發而為咽喉之病喉內生瘡或狀如肉腐為腄為痛窒塞不通吐咽不下甚則生出重舌治之尤宜先去風痰以通咽膈然後解其熱毒遲則有不救之患又有熱毒衝於上齶而生瘡謂之懸癰及腑寒亦能令人咽閉吞吐不利臨病詳審治之咽喉之疾本傷熱毒上攻也四時受熱藏心腑之間一旦所觸上攻咽喉所謂腎傷寒也然其證有單肉蛾雙肉蛾有重舌木舌痄腮有懸癰腫脹有裡外皆腫甚者上攻頭面皆腫大法先洗去口中舌上白胎其次掃去風涎如是單雙肉蛾可針則針有不可針者則用熏摻藥退後方依次用服藥如是木舌服藥之外仍用摻藥痄腮則用塗藥輕者但服藥而自退不須用針及藥點其瘡而自消也薛小兒喉痹因膏粱積熱或稟賦有熱或乳母七情之火飲食之毒當分其邪蓄表裡與證之輕重經之所主而治之若左腮色青赤者肝膽經風熱也用柴胡梔子散右腮色赤者肺經有熱也用瀉白散額間色赤者心與小腸經熱也用導赤散若兼青色風熱相搏也用加味逍遙散鼻間色黃脾胃經有熱也用瀉黃散若兼青色木乘土位也用加味逍遙散兼赤色心傳土位也用柴胡梔子散頦間色赤腎經有熱也用地黃丸凡此積熱內蘊二便不通者當疏利之風邪外客而發寒熱者當發散之外感風邪大便閉結煩渴痰盛者當內疏外解若因乳母膏粱積熱者母服東垣清胃散若因乳母恚怒肝火者母服加味逍遙散稟賦陰虐者兒服地黃丸大概當用輕和之劑以治其本切不可用峻利之藥以傷真氣也一小兒喉間腫痛驚悸飲水服驚風降火之藥益甚仍欲攻風痰余曰驚悸飲水心經虛證蓋胃為五臟之本先用五味異功散以補胃加桔梗甘草以消毒諸證頓退後用牛蒡子湯加柴胡而愈一小兒發熱引冷大便黃色手足並熱不能吮乳視口內無患捫其喉間則哭此喉內作痛乃脾胃實熱也用瀉黃清胃二散各一劑母子並服而愈後因乳母飲酒兒躁不安口內流涎仍用前二散而愈一小兒喉間腫痛發熱咳嗽大便祕結此肝與大腸有熱也先用牛蒡子湯加硝黃一服大便隨通乃去硝黃再劑頓愈審其母有肝火發熱用柴胡清肝散母子並服而痊甘桔湯治嬰孩感冒風熱火氣熏逼痘瘡蘊毒上攻咽喉腫痛痰氣不順咳嗽失音人參去蘆半兩桔梗蜜浸炒一兩甘草半生半炙三錢上銼散用水煎不拘時候服立效散治嬰孩小兒咽喉痹痛不能吞咽硼砂龍腦雄黃朴硝各半錢上為極細末乾摻吹喉散治嬰孩咽喉腫痛氣塞不通甘草生二錢半朴硝一兩上為極細末乾摻喉中如腫甚者用小竹管吹入喉內牛蒡湯主傷風發熱煩躁鼻塞氣喘痰嗽驚啼及諸瘡赤紫丹毒咽喉腫痛牛蒡子三兩略炒細研大黃一兩半防風去蘆薄荷去老梗各一兩荊芥去根梗四兩甘草一兩一錢半上㕮咀每服二錢水一盞煎七分無時溫服化毒湯解風熱上攻咽喉腫痛飲食不便桔梗銼炒半兩薄荷葉荊芥穗甘草各二錢半山豆根取淨皮一錢半以上五味俱焙為末牙硝硼砂朴硝雄黃硃砂各二錢以上五味乳鉢細研上五味焙為末五味研為末同一處再研勻每用一字至半錢乾點舌上化下或以溫湯濃調少與含咽亦可備急散治小兒諸般骨哽咽喉腫痛五倍子一兩研先春茶末半兩上二味和勻抄一錢溫湯半盞調化無時少與咽下依法服餌不過三五次即效如骨出或刺破處血來多者硼砂末六錢水煎消毒散飲調服血止痛住腫消食進牛蒡子湯牛蒡子炒杵玄參升麻桔梗炒犀角鎊黃芩木通甘草各等分上每服一二錢水煎拔萃桔梗湯治熱腫喉痹桔梗炒甘草炒連翹梔子炒薄荷黃芩各等分上為末每服一二錢水煎服消毒飲解急驚風毒赤紫丹瘤壯熱狂躁睡臥不安胸膈滿悶咽喉腫痛九道有血妄行及遍身瘡疥牛蒡子六兩荊芥穗二兩甘草一兩上銼每服二錢水一盞煎七分無時溫服柴胡飲見積熱東垣人參安胃散見吐利三因玉鑰匙九味蘆薈丸見疳濟生犀角地黃湯見吐血五味異功散見吐利柴胡清肝散見發熱集之三心臟部一心錢心主驚實則叫哭發熱飲水而搐虛則困臥悸動不安心病多叫哭驚悸手足動搖發熱飲水視其睡口中氣溫或合面睡及上竄咬牙皆心熱也導赤散主之心氣熱則心胸亦熱欲言不能而有就冷之意故合面臥心氣實則氣上下行澀若合面臥則氣不得通故喜仰臥使氣得上下通也瀉心湯主之心病見冬火旺心勝腎也當補腎治心輕者心病退重者下竄不語腎怯虛也補腎地黃丸治心瀉心湯潔心主熱自病或大熱瀉心湯主之實則煩熱黃連瀉心湯主之虛則驚悸生犀散主之肺乘心微邪喘而壯熱瀉白散主之肝乘心虛邪風熱煎大羌活湯下大青丸主之脾乘心實邪泄瀉身熱瀉黃散主之腎乘心賊邪恐怖惡寒安神丸主之劉凡心臟得病必先調其肝腎兩臟腎者心之鬼肝氣通則心氣和肝氣滯則心氣乏此心病先求於肝清其源也五臟受病必先傳其所勝水能勝火則腎之受邪必傳於心故先治其腎逐其邪也故當退腎氣益肝氣兩方或診其脈肝腎兩臟俱和而心自生疾然後審其心家虛實治之薛仰面臥者因其心胸實熱故喜仰面而向虛也合面臥者因心胸虛熱故喜合臥而就實也實則調治心肝虛則調補脾肺二者別之盡其狀矣其咬牙等證多有雷同不必拘泥如用瀉心導赤等劑邪氣雖去而病仍作當調補元氣或反甚急溫補元氣其心氣冬見或亥子時病益甚或下竄不語者乃腎水虛而心火甚也用地黃丸其乳下嬰兒須母服之若叫哭發熱作渴飲水抽搐有力仰面而睡者屬心經實熱用瀉心湯導赤散若發熱飲湯抽搐乏力驚竄咬牙合面而睡者屬心經虛熱用補心散若喘嗽面赤壯熱飲水肺乘心也用瀉白散若搖頭札目身熱抽搐肝乘心也用柴胡清肝散若合目昏睡泄瀉身熱脾乘心也用瀉黃散若竄視驚悸咬牙足熱腎乘心也用安神丸海心苦緩急食酸以收之五味子心欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之人參黃耆甘草心虛以炒鹽補之虛則補其母肝乃心之母以生薑補肝如無他證錢氏安神丸是也安神丸錢氏治心虛疳熱神思恍忽麥門冬去心焙馬牙硝白茯苓乾山藥寒水石研甘草各半兩硃砂一兩研龍腦一字研上末之煉蜜為丸芡實大每服半丸沙糖水化下無時八物定志丸海藏補益心神安定魂魄治痰去胸中邪熱理肺腎人參一兩半菖蒲遠志去心茯神去心茯苓去皮各一兩硃砂二錢白朮麥門冬去心各半兩牛黃二錢另研上為細末煉蜜丸如桐子大米飲湯下三十丸無時髓竭不足加生地黃當歸肺氣不足加天門冬麥門冬五味子心氣不足加上黨參茯神菖蒲脾氣不足加白朮白芍藥益智肝氣不足加天麻川芎腎氣不足加熟地黃遠志牡丹皮膽氣不足加細辛酸棗仁地榆神昏不足加硃砂預知子茯神心實以甘草瀉之如無他證重則瀉心湯輕則導赤散瀉心湯錢氏瀉丁心黃連一兩去須上為極細末每服一字至半錢一錢臨臥溫水調下海藏云易老單方瀉心湯出於此乃實邪也實則瀉其子導赤散錢氏瀉丙小腸生乾地黃木通甘草各等分上同為末每服三錢水一盞入竹葉同煎至五分食後溫服一本不用甘草用黃芩薛瀉心散導赤散瀉心小腸實火之劑蓋心為脾母脾為心子然心既病則脾土益虛矣用者審之生犀散錢氏治心經虛熱生犀錯取末二錢地骨皮自採佳赤芍藥柴胡根乾葛銼各一兩甘草炙半兩上為粗末每服一二錢水一盞煎至七分溫服食後薛前方云治心經虛熱其所用藥多屬瀉心瀉肝脾之劑虛熱二字恐魯魚也如心經自病而血虛熱者用祕旨安神丸脾虛奪心之氣而熱者用祕旨補脾湯肝木不能生心火而虛熱者用地黃丸祕旨安神丸治心血虛而睡中驚悸或受驚嚇而作人參半夏湯泡酸棗仁炒茯神各一錢當歸酒洗橘紅赤芍藥炒各七分五味子五粒甘草炙三分上為末薑汁糊丸芡實大每服一丸生薑湯化下發熱辨證錢風溫熱壯熱相似潮熱時間發熱過時即止來日依時又熱此欲發驚候也壯熱者一向熱而不已甚則發驚癇也風溫者身不熱而口中氣熱又有風溫證者但溫而不熱傷寒熱口熱呵缺頓悶項急曾云傷寒熱十指稍冷鼻流清涕發熱無汗面慘凌振右腮有紫紋痘瘡熱噴嚏悸動耳尖冷曾云麻豆熱面赤足冷身發壯熱呵缺頓悶咳嗽腰疼時或作驚腹痛目痢及中指獨冷者是也變蒸熱唇上白泡珠起耳冷曾云變蒸熱溫溫微熱氣粗驚少哯乳瀉黃上唇尖有小泡如水珠子即變蒸也不須用藥攻治疳熱面黃吃炭土羸瘦鼻下赤爛驚風熱發搐悸癇脈數煩躁顛呌恍忽曾云驚風熱遍身發熱面光自汗心悸不寧脈數煩躁治法與急驚證同所用藥餌必先解表楊小兒之病惟熱居多夫熱有潮熱驚熱夜熱餘熱食熱疳熱壯熱煩熱積熱風熱虛熱客熱癖熱寒熱血熱瘡疹熱十六者大同而小異熱之始發必有所因也其潮熱發歇有時驚熱顛叫恍忽夜熱夕發旦止餘熱寒邪未盡食熱肚腹先發疳熱骨蒸盜汗壯熱一向不止煩熱心躁不安積熱頰赤口瘡風熱汗出身熱虛熱困倦少力客熱來去不定痰熱涎嗽飲水寒熱發如瘧狀血熱辰巳發熱瘡疹熱耳鼻尖冷諸證得之各有所歸其間或有三兩證交互者宜隨其輕重而處治之薛小兒之熱有肝心脾肺腎五臟之不同虛實溫壯四者之不一及表裡血氣陰陽浮陷與夫風濕痰食各當詳之心熱者額上先赤心煩心痛掌中熱而噦或壯熱飲水巳午時益甚肝熱者左頰先赤便難轉筋尋衣捻物多怒多驚四肢困倦寅卯時益甚脾熱者鼻上先赤怠惰嗜臥身熱飲水遇夜益甚肺熱者在頰先赤手掐眉目喘咳寒熱飲水日西熱甚腎熱者頦下先赤兩足熱甚骨蘇蘇如蟲蝕熱甚不能起於床夜間益甚仍當辨其虛實實則面赤氣粗口燥唇腫作渴飲冷大小便難或掀衣露體煩啼暴叫伸體而臥睡不露睛手足指熱宜用表下虛則面色青白恍忽神緩口中虛冷噓氣軟弱喜熱惡寒泄瀉多尿或乍涼乍溫怫鬱驚惕上盛下泄夜則虛汗屈體而臥睡而露睛手足指冷宜用調補壯熱者肢體大熱熱不已則發驚癇溫熱者肢體微熱熱不已則發驚搐陰虛則內熱陽盛則外熱以手輕捫之則熱重按之不熱此皮毛血脈之熱熱在表也重按之筋骨之分則熱輕手則不熱此筋骨之熱熱在裡也不輕不重按之而熱此肌肉之熱熱在表裡之間也以虛實分屬表裡而言之壯熱惡風寒為元氣不充表之虛熱也壯熱不惡風寒為外邪所客表之實熱也壯熱飲湯為津液短少里之虛熱也壯熱飲水為內火銷爍里之實熱也若夫內外皆熱則喘而渴齒乾煩冤腹滿四肢熱逢風寒如炙於火能冬不能夏是皆陽盛陰虛也脈尺寸俱滿為重實尺寸俱弱為重虛脈洪大或緩而滑或數而鼓此熱盛拒陰雖形證似寒實非寒也熱而脈數按之不鼓此寒盛格陽雖形證似熱實非熱也發熱惡熱大渴不止煩躁肌熱不欲近衣其脈洪大按之無力成兼目痛鼻乾者此血虛發躁也當補其血如不能食而熱自汗者氣虛也當補其氣仲景論內外不足發熱自汗之證禁不可發汗如飲食勞役雖病發熱誤發其汗則表必虛也身熱而汗出者風也發熱身疼而身重黃者濕也憎寒發熱惡風自汗脈浮胸痞者痰也發熱頭痛脈數者食也寸口脈微為陽不足陰氣上入陽中則惡寒尺脈弱為陰不足陽氣下入陰中則發熱陰陽不歸其分則寒熱交爭也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也晝則發熱煩躁夜則安靜是重陽無陰也當亟瀉其陽峻補其陰至若身熱脈弦數戰栗而不惡寒者疸瘧也發熱惡寒脈浮數者溫病也若四肢發熱口舌咽乾是火熱乘土位濕熱相合故煩躁悶亂也若身體沉重走注疼痛乃濕熱相搏風熱鬱而不得伸也五臟熱錢肝熱手尋衣領及亂捻物瀉青丸主之壯熱飲水喘悶瀉白散主之薛肝熱者左頰先赤便難轉筋多怒多驚四肢困倦寅卯時益甚宜瀉青丸柴胡飲子心熱視其睡口中氣溫或合面睡及上竄咬牙皆心熱也導赤散主之心氣熱則心胸亦熱欲言不能而有就冷之意故合面臥薛心熱者額上先赤心煩心痛掌中熱而噦或壯熱飲水巳午時益甚宜瀉心湯導赤散安神丸脾熱則目黃肚大怠惰嗜臥身熱飲水四肢不收瀉黃散主之薛脾熱者鼻上先赤其熱在肌肉遇夜益甚肺熱手掐眉目鼻面甘桔湯主之咳嗽寒熱壯熱飲水涼膈散主之若肺虛熱唇深紅色少服瀉白散薛肺熱者右頰先赤日西熱甚輕則用瀉白散重則用涼膈散及地骨皮散腎熱兩足不喜衣覆地黃丸主之薛腎熱者頦下先赤兩足熱甚骨酥酥如蟲蝕熱甚不能起於床夜間益甚宜用滋腎丸瀉青丸見肝臟瀉心湯導赤散安神丸並見心臟瀉黃散見脾臟瀉白散見肺臟梔子清肝散一名柴胡梔子散治三焦及足少陽經風熱發熱耳內作癢生瘡或出水疼痛或胸乳間作痛寒熱往來柴胡梔子炒牡丹皮各一錢茯苓川芎芍藥當歸牛蒡子炒各七分甘草三分上水煎服柴胡清肝散治肝膽三焦風熱怒火或乍寒乍熱往來寒熱發熱或頭髮瘡毒等證柴胡一錢半黃芩炒人參川芎各一錢山梔炒一錢半連翹甘草各五分桔梗八分上水煎服柴胡飲子解肌熱蒸熱積熱或汗後餘熱脈洪實弦數大便堅實黃芩七分甘草四分大黃八分芍藥七分柴胡人參各五分當歸一錢上每服一錢姜水煎龍腦飲子此瀉脾經熱可代瀉黃散用治小兒蘊熱咽喉腫痛赤眼口瘡心煩鼻衄咽乾多渴睡臥不寧及除痰熱咳嗽中暑煩躁一切風壅甘草四兩炙大梔子三兩炒藿香葉半兩石膏一兩縮砂栝蔞各七錢半上為末每服一錢蜜水調服不拘時治傷寒餘毒潮熱虛汗加竹葉煎服滋腎丸治腎熱黃柏酒拌炒焦三錢知母二錢肉桂五分上為末熟水丸桐子大每服二十丸至三十丸食前百沸湯下實熱小兒實熱者頭昏頰赤口內熱小便赤澀狀如豆汁大便堅硬或祕澀不通腹急宜四順飲子大黃朴硝湯八珍散略挨動臟腑即安楊實則面赤濃黃氣粗口熱燥渴唇腫大小便難掀揭露衣煩啼暴叫宜四順清涼飲加柴胡薛氏又有伸體而臥睡不露睛手足指熱等證按實中宜分表裡表實宜汗裡實宜下半表半裡宜和解今一以利下為主非通論也治法並方更於後表裡條內求之云岐云小兒實熱在內者四順飲之類在上者吐之丹溪云小兒熱病六一散妙藥也茅先生三解牛黃散治實熱潮熱白殭蠶全蠍炙防風白附子桔梗川大黃甘草炙白茯苓川黃芩人參川鬱金皂角水煮等分未服半錢一錢薄荷蜜湯調牛黃涼膈丸治風壅痰實蘊積不散頭痛面赤心煩潮熱痰涎壅塞咽膈不利精神恍忽睡臥不安口乾多渴唇焦咽痛頷頰赤腫口舌生瘡牛黃一兩一分甘草爁十兩寒水石牙硝枯石膏各二十兩紫石英飛腦麝各五兩膽星柒兩半末之蜜丸每兩作三十丸溫薄荷人參湯嚼一丸食後服常服半丸治急驚並薄荷水化虛熱虛熱者因患後平復血氣未勻四體羸弱時多發熱治宜調氣補虛其熱自退如錢氏白朮散異功散四君子湯之類或未退人參生犀散治之楊虛則面色青白恍忽神緩口中清冷噓氣軟弱泄瀉多尿夜出虛汗宜惺惺散薛又有喜熱惡寒乍涼乍溫怫鬱驚惕上盛下泄屈體而臥睡而露睛手足指冷等證曾虛熱因病後發熱無時一日三五次者此客熱乘虛而作先以胃苓湯加黃耆末溫米清湯調服次投錢氏白朮散或固真湯帶涼服及用溫鹽湯參入涼水送下黑錫丹固守元氣海藏云風熱邪熱四君子湯加生薑荊芥煎云岐云小兒客熱在內先用導赤散次用益黃散薛氏以虛實分屬表裡及熱盛拒陰寒盛格陽血虛氣虛發熱等證俱仲景東垣諸聖醫辨證妙法宜詳玩而熟記之則虛熱似實熱之證庶幾不至誤認而全活衆矣錢朱監簿子五歲忽發熱醫曰此心熱也腮赤而唇紅煩躁引飲遂用牛黃丸三服以一物瀉心湯下之來日不愈反加無力而不能食又下之便利黃沫錢曰心經虛而有留熱在內必被涼藥下之致此虛勞之病也錢先用白朮散生胃中津液次以生犀散治之朱曰大便黃沫如何曰胃氣正即瀉自止虛熱也朱曰醫用瀉心湯如何錢曰瀉心湯者黃連一物耳黃連性寒多服則利能寒脾胃也坐久衆醫至皆曰實熱錢曰虛熱若實熱何以瀉心湯下之不安又加面黃頰赤五心煩躁不食而引飲醫曰既虛熱何大便黃沫錢笑曰便黃沫者服瀉心湯多故也錢與胡黃連丸治愈鄭人齊郎中者家好收藥散施其子忽臟熱齊自取青金膏三服並一服餌之服畢至三更瀉五行其子困睡齊言子睡多驚又與青金膏一服又瀉三行加口乾身熱齊言尚有微熱未盡又與青金膏其妻曰用藥十餘行未安莫生他病否召錢氏至曰已成虛羸先用前白朮散時時服之後服香瓜丸十三日愈嘉靖甲寅敬臣之女年十二患脾胃素弱自夏入秋時瀉時止小腹微痛至八九月間遂成疳積之證發熱凡二十餘日不止汗泄熱解汗已復熱自中脘至小腹膨脹堅直大便溏氣喘咳嗽作噯俱晝輕夜重徹夜煩躁不睡鼻塞眼暗讝語其母以為必死矣立齊先生診之曰脈浮大而無根此大虛證也非獨參湯不可乃用參一兩加熟附三分煨生薑三片日進二劑仍並渣煎服之大下疳積其氣則腥腹漸寬熱漸減脈漸斂然手猶尋捻不已鼻孔出血先生曰此肝證也煎六味丸料與之一服如脫乃晝服獨參姜附湯夜服六味丸料脈漸有根諸證漸退先此手足恆熱至是乃始覺寒先生喜曰此病邪盡退而真氣見矣然猶飲食不進乃單用六君子湯加炮姜遂能食咳嗽獨甚與補中益氣湯嗽遂止夜始有睡凡弱女之得生皆先生力也向非先生卓有定見專治其本而其末自愈則為丘中之骨必矣敬書施療之顛末以告同患此者幸無所誤亦推廣先生一念之仁於萬一云爾王敬臣書惺惺散方見痘疹錢氏白朮散方見渴異功散方見吐瀉人參生犀散見後條固真湯見慢驚黑錫丹見雜病頭痛當歸補血湯治肌熱躁熱目赤面紅煩渴晝夜不息其脈洪大而虛重按全無此脈虛血虛也若誤服白虎湯必死宜此主之黃耆三錢當歸一錢上水煎服補中益氣湯治中氣虛弱體疲食少或發熱煩渴等證人參黃耆各八分白朮甘草陳皮各五分升麻柴胡各二分當歸三分上薑棗水煎空心午前服加味逍遙散去牡丹皮山梔即逍遙散治肝脾血虛等證當歸甘草炙芍藥酒炒茯苓白朮炒柴胡各一錢牡丹皮山梔炒各七分上水煎服愚按前方若乳母肝脾血虛內熱寒熱遍身搔癢肢體作疼頭目昏重怔忡頰赤口燥咽乾或發熱盜汗食少不寐或口舌生瘡耳內作痛胸乳腹脹小便不利致兒為患尤宜用之又治婦人陰虛發熱兒飲其乳以致患瘡者表裡錢身熱不飲水者熱在外身熱飲水者熱在內海四順飲子治熱在內而不厥連翹飲治熱在外而不厥薛壯熱惡風寒為元氣不充表之虛熱也壯熱不惡風寒為外邪所客表之實熱也壯熱飲湯為津液短少里之虛熱也壯熱飲水為內火銷爍里之實熱也按傷風惡風傷寒惡寒豈可以惡風寒為元氣不充而不惡風寒為外邪所客乎薛氏之意本圓而語則滯癡人前豈可說夢須以東垣外感內傷辨細別之則無失矣表熱薛云熱而二便調和風邪蘊結於裡而發者用惺惺散加麻黃汗之敗毒散治傷風瘟疫風濕頭目昏眩四肢作痛憎寒壯熱項強睛疼或惡寒咳嗽鼻塞聲重柴胡前胡川芎枳殼炒羌活獨活茯苓桔梗人參各一兩甘草半兩上每服二錢生薑薄荷水煎消風散治小兒解脫致令風邪客於皮毛入於臟腑則令惡風發熱胸膈痰涎目澀多睡即消風丸見風癇清解散治感風發熱頭疼鼻塞涕流及溫壯悉主之北參防風天麻北前胡茯苓北梗枳殼銼甘草各二錢細辛柴胡各一錢半川芎三錢上末每一錢水小盞薄荷干三葉略煎溫和服集驗荊術散治小兒傷風傷寒或瘡或疹此藥無寒無熱疏風順氣一切諸熱證荊芥穗赤芍藥各一兩蒼朮二兩制甘草半兩炒細末隨大小一二錢又名沖和散傷風傷寒壯熱咳嗽鼻塞聲重生薑蔥白湯下傷風潮熱或變蒸發熱薄荷湯下風熱傷肺鼻涕氣粗紫蘇湯下暴卒急驚風熱宜急驚門疏風散久病後急慢驚熱保嬰全蠍散發汗去節麻黃湯調盜汗自汗牡蠣浮麥湯調丹毒風熱煎四順飲湯調眼暴赤熱腫煎羌活黃芩生地黃湯調口舌腮項熱腫生瘡煎防風牛蒡子湯調咽喉重舌煎升麻枳殼大黃防風薄荷湯調人參羌活散治傷寒發熱頭痛身疼或潮熱煩渴痰實咳嗽羌活白獨活柴胡川芎人參甘草炙白茯苓枳殼各一兩前胡桔梗地骨皮天麻酒浸焙各半兩㕮咀每一錢水半盞姜一片棗半個薄荷一葉煎溫服無時瘡疹未發亦可服羌活散治傷風時氣頭痛發熱身體煩疼痰壅咳嗽失音鼻塞聲重及解時行下痢赤白人參去蘆羌活赤茯苓去皮柴胡去蘆前胡去蘆川芎獨活桔梗銼炒枳殼蒼朮各如前制甘草各一兩上銼每服二錢水一盞姜二片薄荷三葉煎七分無時溫服發散風邪入蔥白同煎痢證姜倉米煎人參辛梗湯治小兒傷風發熱鼻塞咳嗽時行瘡疹人參七分細辛五分桔梗乾葛升麻白朮茯苓柴胡各七分薄荷甘草各五分每服水一鍾姜三片煎五分不拘時服紅綿散治小兒四時感冒寒風遍身發熱變蒸諸驚胎驚丹毒等熱並皆治之及急慢驚風亦宜服之人參二錢半天麻洗殭蠶炒麻黃去節全蠍去毒各二錢甘草炙辰砂一錢半細研上件為末然後入硃砂和勻再乳極細每服半錢用水半盞煎數沸入干胭脂少許再煎一沸溫溫服不拘時惺惺散見痘裡熱四順清涼飲治小兒血脈壅實臟腑蓄熱頰赤作渴五心煩熱睡臥不安四肢驚掣及因乳哺不時寒溫失度令兒血氣不順腸胃不調大小便澀欲發驚癇或風熱結核頭面生瘡目赤咽痛瘡疹餘毒一切壅滯挾熱泄瀉不止加木香煨大黃赤芍藥當歸甘草大黃各等分銼碎三歲小兒用二錢水六分薄荷二葉煎八九沸去滓不拘時服小便不通加燈心木通大黃朴硝湯治小兒驚熱涎風前後不通川大黃蒸甘草生朴硝各一兩上銼碎每服二錢水半盞入蜜少許煎至三分不拘時服柴胡飲子治傷寒五六日發熱潮熱大便祕乳母多服柴胡人參芍藥當歸黃芩大黃甘草炙各半兩㕮咀隨大小加減姜煎五和湯主宣利臟腑積熱調和榮衛當歸酒洗赤茯苓去皮各半兩甘草炙大黃枳殼水浸潤去穰銼片麥麩炒微黃各七錢半上件㕮咀每二錢水一盞煎七分無時溫服寬熱飲主伏熱在裡風壅滿氣促昏悶或脾胃停滯日久飲食減少面黃脈實發熱無時並宜服之枳殼去穰一兩銼片巴豆十五粒作二片去殼膜心同炒枳殼見微黃色去巴豆大黃一兩粉草七錢半玄明粉二錢半上前三味銼焙為末臨入玄明粉乳鉢內同前藥末杵勻無時調服半錢至一錢兒小者抄一字並用姜蜜湯或薄荷湯三黃丸治三焦積熱眼目赤腫頭項腫痛口舌生瘡心膈煩躁不美飲食大小便祕澀五臟實熱或下鮮血瘡癤熱證黃連黃芩大黃煨各等分上為末煉蜜丸桐子大每服三十丸白滾湯下量大小加減服表裡俱熱七寶散治小兒溫壯伏熱傷寒煩躁面赤氣喘夜熱曉涼此藥涼心臟消風熱川大黃蒸赤芍藥甘草炙川當歸各二錢半麻黃白朮荊芥穗各二錢上為末一歲一錢水半盞蔥白一寸薄荷一葉煎至三分不拘時溫服雙解飲子即通聖散合六一散方見傷寒太陽病發熱條白虎湯治傷寒或吐或下後七八日邪毒不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲數升者宜服之又治夏月中暑汗出惡風寒身熱而渴知母三兩甘草一兩炙石膏八兩另研糯米三合上每服二三錢水煎至米熟為度半表半裡熱小柴胡湯治傷寒溫熱身熱惡風頭痛項強四肢煩疼往來寒熱脅痛耳聾嘔噦痰實中暑瘧疾並服之方見傷寒少陽病愚按前方若肝膽經風熱肝火瘰癧寒熱往來日晡發熱潮熱不欲飲食或怒火口苦耳聾咳嗽或脅痛胠滿小便不利或泄瀉吐酸苦水或肢體搐動唇目抽掣及乳母有前證致兒為患者並宜服之餘熱餘熱者謂寒邪未盡傳經之遺熱也仁齊曰傷寒汗下後而熱又來乃表裡俱虛氣不歸元陽浮於外不可再用涼藥蓋熱去則寒起古人戒之法當和胃氣使陽氣收斂歸內其熱自止宜以參苓白朮散主之曾有小兒熱證用表裡藥後其熱俱退既退復熱者何也療病至此難以概舉或再解表攻裡或施涼劑熱見愈甚以陰陽辨之何者為是推其原乃表裡俱虛而陽浮於外陰伏於內所以又發熱宜用溫平之藥和其里則體熱自除投錢氏白朮散去木香加扁豆水煎及黃耆六一湯安神散自然平復若日久汗多煩渴食減脈微緩喜飲熱可服真武湯雖附子性溫取其收斂陽氣內有芍藥性寒一寒一溫停分得宜用之無不驗矣薛汗後血虛而熱益甚者六神散加粳米汗後氣虛而惡寒發熱者補中益氣湯汗後陰虛陽無所附而熱者用四物湯加參耆汗後陽虛陰無所附而熱者用四君湯加芎歸實脾散治小兒餘熱不除川芎茯苓甘草白朮上銼散用水煎食遠服參苓白朮散主脾胃虛弱飲食不進多困少氣中滿痞噫嘔吐逆此藥不寒不熱性味和平常服調脾悅色順正去邪人參去蘆白茯苓去皮粉草白朮白扁豆如前制山藥去黑皮縮砂仁薏苡仁桔梗銼炒各一兩蓮子肉去心上銼焙為末每服半錢至一錢用棗湯空心調服或溫米湯亦可安神散治吐瀉諸病後心虛煩悶觸物易驚氣鬱生涎涎與氣搏睡不得寧預防變生他證人參白茯苓半夏制甘草炙陳皮去白枳實制各五錢上銼每服二錢水一盞姜二片棗一枚竹茹小團煎七分無時溫服有微熱渴入麥門冬去心同煎簡易凝神散治小兒經汗下熱去復作收斂胃氣清涼肌表神效人參白朮白茯苓山藥炒各一兩扁豆粳米知母生地黃甘草各半兩淡竹葉地骨皮麥門冬各一分細末每二錢水小盞姜二片棗一枚煎無時錢氏白朮散見渴黃耆六一湯見自汗真武湯見自汗六神散見夜啼壯熱壯熱者一向不止由血氣壅實五臟生熱蒸尉於內則眠臥不安精神恍忽熏發於外則表裡俱熱煩躁喘粗甚則發驚癇也輕劑火府丹地黃煎重劑雙解飲七寶散大黃朴硝湯地黃煎治小兒壯熱煩心眠臥不安生地黃汁一升白沙蜜三合酥三合生門冬汁三合上重湯煮至成膏每服數匙火府丹治小兒壯熱生地黃木通甘草黃芩上水一鍾煎服金蓮飲子治小兒蘊積壯熱赤眼口瘡心煩躁悶咽乾多渴潮熱不止防風甘草炙連翹柴胡去蘆山梔子各半兩上為末每服二錢用水六分煎至三分食後服黃龍湯治發熱不退或寒熱往來柴胡五錢黃芩炒甘草炙各二錢赤芍藥三錢上每服一錢薑棗水煎牛黃膏治壯熱咽喉涎響或不省人事或左右手偏搐或唇口眼鼻顫動此熱涎內蓄風邪外感也宜急服之蠍尾四十九枚巴豆肉去油膜一錢半梅花腦半匙辰砂研二錢鬱金三錢皂角水煮牛黃少許麝香一匙上為末每服一匙蜜水調下量兒虛實用之梔子仁湯治陽毒壯熱百節疼痛下後熱不退者梔子仁酒炒赤芍藥大青知母各一兩升麻黃芩酒炒石膏各二兩柴胡一兩半甘草五錢杏仁二兩浸去皮麩炒微黃上每服三錢生薑三片水煎服六物黃芩湯治壯熱腹大短氣往來寒熱飲食不化黃芩酒炒大青甘草炙麥門冬去心石膏各半兩桂一錢上每服一二錢水煎服五物人參飲治壯熱咳嗽心腹脹滿人參甘草各半兩麥門冬去心生地黃各一兩半茅根半握上每服二三錢水煎服溫壯溫壯與壯熱相類而有小異一向熱而不止是壯熱也但溫溫然不甚盛是溫壯也若大便臭而黃者此腹內有伏熱以四順飲子治之若糞白而酸臭則挾宿食不消當服紫霜丸輕者少服重者節乳哺增加丸藥當取微利可也紫霜丸見癖積柴苓湯治小兒溫壯伏熱來去柴胡三錢半麥門冬去心人參去蘆赤茯苓甘草各二錢半黃芩五錢上銼散用水煎入小麥二十粒竹葉三片二黃犀角散治溫壯心熱神不安大腑祕結犀角屑大黃酒浸蒸釣藤鉤梔子仁甘草黃芩各半兩上為末每服五分熱湯調下量兒加減牛黃散治溫壯常熱或寒熱往來牛黃研甘草各半兩柴胡梔子酒炒龍膽草酒炒黃芩炒各二錢半上為末每服半錢以金銀薄荷湯調下驚熱驚熱者遍身發熱或熱而不甚面青自汗睡夢虛驚顛叫恍忽有因驚而生熱者有因熱而生驚者錢氏導赤散涼驚丸安神散之類皆其治也七寶散見前天竺黃散治小兒驚風熱天竺黃研川鬱金山梔子白殭蠶炒去絲嘴蟬殼去土甘草各等分上為末一歲半錢熟水薄荷湯皆可服不拘時甘露散治小兒驚熱通利小腸去驚涎清心腑止煩渴安神穩睡加硃砂名加朱甘露散寒水石研軟而微青中有細紋者是石膏研各二兩堅白有牆壁如無以方解石代之生甘草末一兩上件為末和勻量兒大小或一錢或半錢熱月冷服寒月熱服用薄荷湯調或燈心湯調被驚心熱不安臥皆可服小便不通快麥門冬燈心湯若驚熱入硃砂少許不拘時服一方有赤茯苓一兩蘇沈方用滑石不是石膏錢氏名玉露散每服一字或半錢或一錢食後溫白湯調下辰砂金箔散治小兒心膈邪熱神志不寧驚惕煩渴恍忽怔忡夜臥不安齒齦腫爛及痰實咳嗽咽膈不利辰砂另研桔梗各二錢半人參白茯苓各一錢半蛤粉四錢飛研牙硝枯一錢半甘草炙一錢二分半片腦一分半半金箔一片上為末一歲半錢薄荷湯調不拘時百晬小兒臟腑多熱睡臥不穩大便不利蜜湯調一字本治小兒驚熱全蠍天南星取心為末一錢人參三錢蛇蛻三錢上為末薄荷蜜湯調下骨蒸熱小兒一歲至十歲衣絮皆不得著新綿又不得冬月以火烘衣被勿令食桃杏楊梅果實又不得食炙爆熱面之類皆令兒體熱或因傷寒後食肉太早令兒體熱者有之或作骨蒸者宜服生犀散克效湯地骨皮飲七寶散金蓮飲子治之曾骨蒸熱身體虛羸遇晚而發有熱無寒醒後渴汗方止此乃疳病之餘毒傳作骨蒸或腹內有癖塊有時微痛用參苓白朮散薑棗三稜煎湯調服或投化癖丸先療脾虛宿滯次以柴胡飲為治仍忌雞酒羊面毒物人參生犀散治小兒骨蒸肌瘦頰赤口乾日晡潮熱夜有盜汗五心煩躁四肢困倦及大病瘥後餘毒不解或傷寒病後食羊肉體熱不思食羚羊角鎊地骨皮秦艽去土麥門冬去心枳殼麩炒川大黃蒸柴胡去蘆赤茯苓去皮赤芍藥桑白皮炒黃耆人參鱉甲去裙醋炙黃各等分上銼碎每服二錢水半盞烏梅半個煎至三分不拘時服地骨皮飲治小兒骨蒸潮熱往來心膈煩悸及傷寒後氣未解柴胡去蘆地骨皮各二兩知母甘草炙鱉甲醋炙黃黃芩人參各二錢半赤茯苓半兩上銼碎一歲二錢水六分薑梅各一片煎三分不拘時服柴胡飲治骨蒸疳氣五心煩熱日晡轉盛口乾無味渴多身瘦胸滿痰緊小便黃色食減神昏北柴胡人參當歸酒洗黃芩赤芍藥甘草炙各一兩大黃桔梗去蘆銼炒北五味去梗半夏各半兩上銼每服二錢水一盞烏梅小角姜二片煎七分無時溫服鄭氏犀角飲治小兒骨蒸潮熱盜汗肌瘦犀角屑鱉甲醋炙柴胡知母各半兩地骨皮胡黃連各一兩川大黃桃枝各半兩㕮咀三歲一錢水半盞煎服無時靈犀飲治骨蒸潮熱盜汗咳嗽可食多渴面黃肌瘦肚急氣粗虛熱餘熱通用犀角屑胡黃連各半兩白茯苓人參川芎秦艽甘草羌活柴胡桔梗地骨皮各一兩㕮咀三歲一錢水半盞烏梅竹葉各少許煎克效湯見潮熱化癖丸見癖煩熱五心熱甚煩躁不安手足時欲露出小便赤澀謂之煩熱八珍飲子七寶散皆可服之若唇深紅飲水不止以竹葉石膏湯加朱甘露散治之一粒金丹治小兒五臟蘊熱胸膈煩悶五心煩熱人參犀角玳瑁琥珀防風各一錢茯苓寒水石煅甘草各二錢龍腦硃砂水飛各半錢上為細末入麝半錢用陳米糊丸芡實大金箔二十五片為衣麥門冬去心煎湯下絳雪丹治小兒煩熱芒硝一兩硃砂一兩上為末飯丸芡實大三歲一丸沙糖水化下地黃煎丸治小兒風壅上膈熱煩鼻衄口瘡咽喉腫痛口舌生瘡或血熱五心常熱多渴飲水生地黃熟地黃各一兩薄荷葉一兩一錢甘草微炙山梔仁玄參各七錢半片腦半錢上為末煉蜜為丸如芡實大每服一丸白湯磨化乳後服竹葉石膏湯治小兒虛羸少氣氣逆欲吐四體煩熱石膏三兩半夏洗人參各七錢半麥門冬去心一兩甘草炙七錢半淡竹葉半把上銼碎每服二錢用水六分粳米三四十粒生薑二片煎至三分去滓不拘時服加朱甘露散見驚熱潮熱熱有作止每日應時而發謂之潮熱如潮信之不失其期也錢氏云假如潮熱是一臟實一臟虛而內發虛熱也法當補母而瀉本臟則愈且如日中發潮熱者是心虛也肝為心之母則宜先補肝肝實而後瀉心心得母氣則內平以潮熱愈也醫見潮熱妄謂其實乃以大黃朴硝輩諸冷藥利之利既多矣不能禁約而津液內竭縱取一時之瘥鮮有不成疳病而身瘦也薛潮熱有風寒疳積食癖之分陰陽虛實五臟之異如汗出身熱呵缺面赤者風熱也傷寒時疫陰陽相勝外感熱也肌瘦口乾骨蒸盜汗疳熱也大小便祕澀汗下不解積熱也腹背先熱夜發旦止食熱也涎嗽飲水乳食不消癖熱也又有煩熱者氣粗喘促心躁不安頰赤口瘡兼發癇證瘡疹熱者耳鼻尖冷血熱者巳午間發至夜則涼虛熱者困倦少力發於病後陽邪干心則來去不定陰陽相勝則寒熱如瘧前證在小兒有因乳母或妊娠七情厚味遺熱或飲食停積衣衾過暖及頻浴熱湯而為患若寅卯辰時熱而力盛飲水者肝經實熱也用柴胡清肝散熱而力怯飲湯者肝經虛熱也用六味地黃丸巳午時熱心經也實用導赤散虛用祕旨安神丸申酉戌時熱肺經也實用瀉白散虛用祕旨保脾湯亥子丑時熱腎經也用地黃丸大凡壯熱飲水大便祕結屬實熱用二黃犀角散下之熱渴飲湯大便如常屬血虛用四物湯補之若下後陰虛陽無所附而仍熱用四物參耆汗後陽虛陰無所生而仍熱用四君芎歸若汗下後煩渴面赤血虛發躁也當歸補血湯若見驚搐等證肝血虛而內生風也用四物天麻釣藤鉤頰赤口乾小便赤澀大便焦黃表裡俱實熱也用清涼飲子如大便已利或熱未止表邪未解也惺惺散未應加麻黃微汗之既汗而仍熱此表裡俱虛氣不歸源陽浮於外而虛熱也六神散加粳米陽氣下陷於陰中而發熱者用補中益氣湯若乳下嬰兒當兼治其母曾氏先用百解散發表次以當歸散及三解散治之脈實者以大柴胡湯下之虛浮數者百解散微汗之若發熱而嘔者小柴胡湯和解之錢地骨皮散治虛熱潮作亦治傷寒壯熱及餘熱知母甘草炙半夏洗七次銀柴胡去蘆人參地骨皮赤茯苓各等分如有驚熱加蟬蛻天麻黃芩若加秦艽名秦艽飲子上為細末每服二錢生薑三片水煎食後溫服量大小加減海藏云地骨皮散即小柴胡湯加減法自汗者地骨皮散無汗者柴胡湯三黃湯仲景所用錢氏改諸丸散加減並出古法生犀散見心部田犀角散治小兒骨蒸肌瘦頰赤口乾晚潮熱夜有盜汗五心煩躁四肢困倦飲食雖多不生肌肉犀角末地骨皮麥門冬枳殼麩炒大黃蒸柴胡茯苓赤芍藥黃耆桑白皮人參鱉甲醋塗炙各等分上為粗末每二錢入青蒿少許水煎量兒大小加減一鍾煎八分食後溫服丹小兒潮熱盜汗胡黃連柴胡等為細末煉蜜丸芡實大每二丸酒化開入少水煎小沸服錢秦艽散治潮熱減食蒸瘦秦艽去頭切焙甘草炙各一兩薄荷葉切焙半兩上為粗末每服二錢水一鍾煎八分食後溫服潔潮熱有時胸滿短氣者桃枝丸見積熱人參芎歸散治小兒虛勞內熱潮熱或遍身瘡北參當歸遠志浸取肉薑製焙北前胡柴胡地骨皮防風北桔梗枳殼制半夏曲各一錢半川芎赤芍藥茯苓麥門冬去心各二錢甘草三錢焙上銼細每服二錢水小盞姜三片紫蘇葉三四葉發瘡者兼服豬肚黃連丸方見疳門別作小丸不惟治瘡治渴其發熱而脹者可與服二十丸十味人參散治潮熱身體倦怠柴胡甘草人參茯苓半夏白朮黃芩當歸芍藥葛根上㕮咀水一鍾姜三片煎服薛方柴胡清肝散見肝熱六味地黃丸見腎導赤散見心部祕旨安神丸見心部瀉白散見肺部祕旨保脾湯見脾部二黃犀角散見溫壯四物湯見失血當歸補血湯見虛熱六神散見夜啼曾氏方百解散主和解百病虛慢陰證不宜乾葛二兩半升麻赤芍藥各二兩黃芩一兩麻黃制七錢半薄桂去粗皮二錢半甘草一兩半上碎每服二錢水一盞姜二片蔥一根煎七分無時溫服有風熱盛加薄荷同煎當歸散順調氣血和解表裡爽利心腹疏理百病及治溫熱停積自痢煩躁不寧當歸去蘆酒洗赤芍藥各二兩甘草半生半炙一兩大黃半生半泡一兩二錢川芎麻黃制各半兩上碎每服二錢水一盞姜二片煎七分無時溫服三解散一名寧心湯主上焦蘊熱傷風面紅目赤狂躁氣急渴水驚啼煩悶丹毒口瘡痰嗽搐掣人參防風各去蘆天麻茯神去皮木根鬱金如無山梔仁代白附子大黃各二錢半赤芍藥黃芩殭蠶各五錢全蠍十五尾去尖毒枳殼二錢如前制粉草六錢上碎焙為末每服半錢至一錢用溫薄荷湯無時調下或燈心湯大柴胡湯解利風熱痰嗽腹脹及里證未解柴胡去蘆四兩黃芩芍藥各一兩半大黃半夏如前制各七錢半枳實如前制七錢甘草一兩小方故加用上碎每服二錢水一盞姜二片煎七分無時溫服小柴胡湯半表半裡熱晝熱全嬰方小兒每早食後發熱夜則涼世醫多謂虛勞或為疳熱不知此血熱證也宜龍膽丸地黃膏之類時時與服節瘥接全嬰方所云血熱者巳午發熱遇夜則涼與東垣所謂夜則發熱晝則明瞭不同然東垣所云血熱者指陰虛而生內熱也夜則發熱晝則明瞭取其晝陽夜陰也鄭氏所云血熱者指小兒血盛實而言也蓋謂巳午者心火用事之時也心主血血氣行至巳午則陽氣盛陽氣與正氣相搏故至期而發熱非其時者非血熱也薛一小兒寅卯時發熱或兼搐有痰服抱龍瀉青二丸而愈後復患服前藥兼咳嗽氣喘不時發搐面赤色或青黃或浮腫或流涎豫謂咳嗽氣喘脾肺氣虛也不時發搐肝木乘脾也面青黃肝入心脾也浮腫流涎脾氣虛也用益智丸以養心血補中益氣湯以補脾氣而愈一小兒巳午時發熱驚悸發時形氣倦怠面黃懶食流涎飲湯豫謂心氣不足所致不信反服涼心之藥更加吐瀉睡而露睛手足並冷幾至慢脾風先用六君薑桂湯佐以地黃丸而愈一小兒申酉時發熱面赤腹中作痛或用峻利之劑下之致發搐吐痰作渴腹痛按之即止此脾胃傷而變證也用七味白朮散補中益氣湯頓安龍膽丸治小兒食後多發熱或夜則涼此血熱證疳熱皆可治宣黃連去毛赤芍藥各半兩草龍膽去苗青皮去穰各二錢半檳榔一個大者麝香少許上為末豬膽汁少入麵糊為丸蘿蔔子大每三二十丸米飲空心服六合湯治小兒血熱每日巳午間發熱遇夜則涼當歸大黃川芎熟地黃上為末三歲一錢水半盞煎至三分無時服豬膽丸治小兒每日早飯後發熱夜則身涼此血熱也胡黃連二錢半宣黃連赤芍藥各半兩上為末豬膽汁和成劑入在膽中懸用漿水煮熟取出飯為丸如豆大三歲三十丸米湯送下日三服無時夜熱海藏云夜熱屬陰四順飲之類此血熱在夜也脈經云小腸有宿食嘗暮發熱明日復止此宿食夜熱也薛治一小兒亥子時發熱形氣倦怠面黃懶食流涎飲湯用益黃散而愈後復發服前藥及清熱之劑病發不時嗜臥露睛作渴少食大便頻黃此脾虛而肝木勝之兼元氣下陷也用補中益氣湯佐以地黃丸而愈又治一小兒夜間發熱腹脹此脾虛肝盛朝用五味異功散夕用四味肥兒丸熱止乃朝用六味地黃丸夕用異功散而痊錢朱監簿子五歲夜發熱曉即如故衆醫有作傷寒治者有作熱治者以涼藥解之不愈其候多涎而喜睡他醫以鐵粉丸下涎其病益甚至五日大引飲錢曰不可下之乃取白朮散一兩煎藥汁三升使任意取足服朱生曰飲多不作瀉否錢曰無生水不作瀉縱多不足怪也但不可下耳朱生曰先治何病錢曰止瀉治痰退熱清神皆此藥也至晚服盡錢視曰更可服三升又煎白朮散三升服盡得稍愈第三日又服白朮散三升其子不渴無涎又投阿膠散二服而安湯風痰熱晚熱早涼吃水無時此候乃痰作潮而生風熱即宜金星丸下之或氣弱者不可下宜奪命散以控下涎次服惺惺散加南星白附子四順飲見裡熱益黃散見脾補中益氣湯見虛熱地黃丸見腎異功散見吐瀉四味肥兒丸見疳白朮散見渴金星丸治風熱結聚喉內痰鳴喘粗咳嗽面紅腮腫咽膈壅塞發熱狂躁多渴鬱金末雄黃另研各一分膩粉半分巴豆七枚去油上為末米醋糊丸麻子大薄荷臘茶下奪命散見驚惺惺散見痘四物二連湯治血虛勞五心煩熱晝則明瞭夜則發熱脅肋並一身盡熱日晡肌熱當歸生地黃白芍藥川芎黃連胡黃連各等分上水煎服積熱久熱也疳熱亦久但兼面黃吃炭土鼻下爛也三因小兒積熱者表裡俱熱遍身皆熱頰赤口乾小便赤大便焦黃先以四順清涼飲子利動臟腑則熱去既去復熱者內熱已解而表熱未解也當用惺惺散紅綿散加麻黃微發汗表熱乃去表熱去後又發熱者何也世醫到此盡不能曉或再用涼藥或再解表或以謂不可醫誤致夭傷者甚多此表裡俱虛氣不歸元而陽浮於外所以再發熱非熱證也只用六神散入粳米煎和其胃氣則收陽歸內身體便涼熱重者用銀白散曾積熱眼胞浮腫面黃足冷發熱從頭至肚愈甚或聞飲食之氣噁心及腸疼嘔吐治法詳載傷積論中按曾氏所謂積熱乃指腹中有癖而熱與久積之積不同不妨並存之清涼飲子裡熱惺惺散痘疹紅綿散白殭蠶炒二兩天麻生用一兩南星切薄片油浸黃二兩蘇木節另研二兩半上為末每服一錢水一小盞入紅綿少許同煎至六分溫服凡小兒風熱頭目不清並宜服之若傷寒有表證發熱者每服入去節麻黃末五分有裡熱心燥渴者入滑石末半錢同煎服之六神散人參白茯苓乾山藥白朮白扁豆甘草炙各等分上為末每服一大錢水一小盞棗一枚姜二片同煎至五分服此藥用處甚多治胃冷加附子治風證加天麻治痢加鶯粟殼銀白散乾山藥白朮白茯苓各半兩人參白扁豆知母甘草炙升麻各等分上為末每服一大錢水一小盞棗一枚生薑二片同煎溫服不拘時候桃枝丸疏取積熱及結胸又名桃符丸巴豆霜大黃黃柏各一錢輕粉硇砂各半錢上細末麵糊丸粟米大煎桃枝湯下一晬兒五七丸五七歲二三十丸未晬兒二三丸臨臥服梔豉飲子治小兒畜熱在中身熱狂躁昏迷不食梔子仁七枚豆豉半兩上用水三盞煎至二盞看多少服之無時或吐不吐立效梔子湯治小兒積熱心臟小便赤腫口內生瘡梔子仁木通當歸尾白芷各二錢防風甘草各一錢上為細末麥門冬煎湯送下三黃丸裡熱曾玉露飲治頰赤咽乾心煩躁睡不穩身熱頭痛兼中暑發渴昏悶小便不通驚氣入腎夢中咬牙加金珠散薄荷湯空心調服寒水石中有細紋手可碎者石膏潔白堅硬而有牆壁者各一兩甘草三錢曬乾天陰火焙上除前二味外甘草銼曬或焙同為細末每服半錢至一錢溫湯無時調服或麥門熟水益元散解暑毒利小便理煩渴除驚悸滑石六兩粉草一兩細銼上二味或曬或焙研為細末每服一錢至二錢溫熱水無時調服涼水亦可萬安飲推陳致新除邪輔正和益脾胃宣通氣血調順飲食疏解風寒寧心化痰去煩理熱不拘證在表裡並宜可投常服百病不生真元益固補養諸虛亦有奇驗此與宣明論當歸飲相類不遠治法最多其藥品之外惟加枳殼半夏人參去蘆當歸酒洗大黃生用柴胡去蘆枳殼去瓤炒半夏炮裂芍藥洗淨黃芩防風去蘆甘草十味各一兩滑石末六兩上銼除滑石末臨入和勻每服二錢水一盞姜二片煎七分無時溫服或加棗一枚同煎調胃散桃枝丸取積熱後服之人參三錢白朮二錢半甘草炙白茯苓鶯粟子各一錢白附子半分藿香丁香各半錢上為末紫蘇湯下半錢或一錢寒熱寒熱者證如瘧狀陰陽相勝也先寒而後熱陽不足先熱而後寒陰不足寒多而熱少陰勝陽也熱多而寒少陽勝陰也寒熱相半陰陽交攻也寒熱隔日陰陽乍離也陽盛發熱陰盛發寒也其有頭疼汗出者有嘔吐不食者有憎寒而飲水者壯熱而飲湯者有筋骨疼痛者或瀉或祕或內寒而外熱或內熱而外寒又有寒而腹中痛熱而腹中鳴是有食積也治法因於食積者當用白餅子下之次行補助以錢氏白朮散寒多熱少者小柴胡湯加桂熱多寒少者白虎湯加桂寒熱相半者並用小柴胡湯主之薛經曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒寒熱往來此乃陰陽相勝也故寒氣並於陰則發寒陽氣並於陽則發熱寸口脈微為陽不足陰氣上入陽中則惡寒尺脈弱為陰不足陽氣下入陰中則發熱陽不足則先寒後熱陰不足則先熱後寒陰陽不歸其分則寒熱交爭也又上盛則發熱下盛則發寒陽勝則乍熱陰勝則乍寒陰陽相勝虛實不調故邪氣更作而寒熱往來或乍寒乍熱也少陽膽者肝之府界乎太陽陽明之間半表半裡之分陰陽之氣易於相乘故寒熱多主肝膽經證以小柴胡湯加減調之若只見寒熱起居如常久而不愈及大病後元氣未復悉屬陰虛生熱陽虛生寒宜用八珍湯補之甚者十全大補湯有食積為病亦令寒熱用保和丸消之若兼嘔吐泄瀉用六君子湯厥冷飲熱人參理中丸作渴不止七味白朮散食積既消而寒熱尚作者肝邪乘脾所勝侮所不勝也用異功散加柴胡山梔其瘧證寒熱詳見瘧門白餅子癖白朮散渴小柴胡湯半表半裡熱白虎湯表裡俱熱八珍湯虛羸十全大補湯虛羸保和丸宿食六君子湯脾人參理中丸吐瀉異功散吐瀉變蒸熱變蒸者陰陽水火蒸於血氣而使形體成就是五臟之變氣而七情之所由生也蓋兒生之日至三十二日一變每變蒸畢即覺性情有異於前何者長生臟腑意智故也何謂三十二日長骨添精神人有三百六十五骨以象天數以應期歲以分十二經絡故初生至三十二日一變生癸屬足少陰腎臟精與志六十四日二變一蒸生壬屬足太陽膀胱其發耳與骫冷至九十六日三變生丁屬手少陰心經心藏神其性為喜一百二十八日四變二蒸生丙屬手太陽小腸其發汗出而微驚一百六十日五變生乙屬足厥陰肝肝藏魂喜哭一百九十二日六變三蒸生甲屬足少陽膽其發目不閉而赤二百二十四日七變生辛屬手太陰肺肺藏魄生聲二百五十六日八變四蒸生庚屬手陽明大腸其髮膚熱而汗或不汗二百八十八日九變生已屬足太陰脾脾藏意智至三百二十日十變五蒸生戊屬足陽明胃其發不食腸痛而吐乳又手厥陰心包絡手少陽三焦此二經俱無形狀故不變而不蒸也前十變五蒸乃天地之數以生成之然後始生齒能言知喜怒故云始全也太倉云氣入四肢長碎骨於十變後六十四日為一大蒸計三百八十四日長其經脈手足手受血故能持握足受血故能行立經云變且蒸謂蒸畢而足一歲之日有餘也師曰不汗而熱者發其汗大吐者微止不可別治又六十四日為二大蒸計四百四十八日又六十四日三大蒸計五百一十二日共五百七十六日變蒸既畢兒乃成人也變者變生五臟也蒸者蒸養六腑也所以成人變者上氣蒸者體熱每經一變一蒸情能既異輕則發熱微汗其狀似驚重則壯熱脈亂而數或吐或汗或煩啼躁渴輕者五日解重者七八日解其候與傷寒相似亦有變蒸之餘續感寒邪者但變蒸則耳冷骫冷上唇發泡狀如泡珠若寒邪搏之則寒熱交爭腹中作痛而啼叫之聲日夜不絶變者易也蒸於肝則目眩微赤蒸於肺則嚏嗽毛聳凡五臟六腑筋脈骨節循環各有證應其治法和平之劑微表之熱實者微利之或不治亦自愈湯千金變蒸論云凡兒生三十二日一變六十四日再變變且蒸九十六日三變一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百二十日小蒸畢後六十四日大蒸蒸後六十四日復大蒸蒸後一百二十八日復大蒸凡小兒自生三十二日一變再變為一蒸凡十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是榮其血脈改其五臟故一變竟輒覺情態有異其變蒸之候變者上氣蒸者體熱變蒸有輕重其輕者體熱而微驚耳冷尻冷上唇頭白泡起如魚目珠子微汗出重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯目白睛微赤黑睛微白又云目白者重赤黑者微變蒸畢自精明矣此其證也單變小微兼蒸小劇凡蒸平者五日而衰遠者十日而衰先期五日後期五日為十日之中熱乃除耳或違日數不歇切不可妄治及灸剌海藏云言變蒸通一十八次蓋前三百二十日為十小蒸後二百五十六日為十大蒸也哯乎典切不嘔而吐也無若身熱耳熱尻亦熱此乃他病可作別治薛變蒸治法平和者微表之實熱者微利之古方紫霜丸黑散子柴胡湯皆可有寒無熱並吐瀉不乳多啼者當歸散調氣散主之前證蓋小兒所不免者雖勿藥亦可也前藥峻厲非惟臟腑不勝亦且反傷氣血余嘗見一小兒至一變發熱有痰投抱龍丸一粒卒至不救慎之慎之其有不熱不驚略無證候而暗變者蓋受胎氣壯實故也紫陽黑散治小兒變蒸壯熱亦治傷寒發熱麻黃二錢半去節大黃一錢同銼炒黑為末杏仁去皮尖二錢半上件同一處搗和並略燒存性再以杏仁研膏和之密器盛每服一豆許乳汁調和灌之紫霜丸癖積柴胡湯治變蒸骨熱心煩啼叫不已人參甘草微炙麥門冬去心各二錢龍膽草酒炒黑防風各一錢柴胡五分上每服一錢水煎當歸散治變蒸有寒無熱當歸二錢木香官桂辣者甘草炙人參各一錢上每服一錢薑棗水煎調氣散治變蒸吐瀉不乳多啼欲發慢驚木香香附子人參橘皮藿香甘草炙各一錢上為末每服一錢薑棗水煎服幼科類萃此方有製厚朴一錢平和飲子治嬰兒變蒸於三日後三日進一服可免百病百日內宜服人參去蘆甘草炙冬半錢白茯苓一錢去皮升麻二分煨上㕮咀用水煎不以時候服稟受弱者加白朮一錢肥大壯實者不用參杏膏治小兒變蒸潮熱人參去蘆杏仁去皮尖川升麻煨各半錢甘草二錢炙上為極細末百日以前每服一字用麥門冬去心煎湯食遠調服心痛小兒心痛當於大人心痛門參用之心痛吐水者蟲痛心痛不吐水者冷心痛錢氏靈礬散治小兒蟲咬心痛欲絶五靈脂二錢白礬火飛半錢上同研每服一二錢水一鍾煎至五分溫服無時當吐出蟲聖惠治小兒心痛但覺兒將手數數摩心腹即啼是心痛不可忍宜服芍藥散方赤芍藥人參去蘆白朮黃芩川大黃微炒銼當歸以上各一分上搗羅為粗散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服茅先生治小兒心痛金鈴散金鈴子炮去皮核蓬莪朮炮各一兩茴香木香炮荊三稜炮各半兩上為末每服一錢半錢用熱酒調下煩躁薛仲景云火入於肺則煩入於腎則躁夫心者君火也火王則金燔水虧而火獨存故肺腎合而為躁也活人云但煩熱者虛煩也諸虛煩熱與傷寒相似但不惡寒身不疼故知非傷寒也頭不痛脈不緊故知非裡實也不可發汗攻下當與竹葉湯兼嘔者與橘皮湯又心虛則先煩而後渴翕翕發熱其脈浮緊而大是也蓋煩者心中煩擾而內熱故屬陽躁者肢體躁動或裸身欲入井中為外熱故屬陰外熱者無根之火也是以為虛在小兒當辨其咨煎不安是煩咨啀不定是躁咨煎者心經有熱精神恍惚煩滿生驚咨啀者心經有風煩躁驚搐也熱甚者黃連解毒湯輕者導赤散風熱者至寶丹脈數而實便閉有熱者神芎丸此皆實熱之治法也若煩而頭痛短氣口乾咽燥不渴者虛也用四君加芎歸因藥攻伐而作渴者用竹茹湯煩而不得眠者酸棗仁湯心神顛倒煩熱欲吐者硃砂安神丸面戴陽目內赤六脈洪大按之全無者血虛發躁用當歸補血湯若躁而裸體欲入井中脈沉細或浮大按之如無者此皆陰盛發躁也宜用參附湯有回生之功清熱解毒丸治五臟積熱毒氣上攻胸臆煩悶咽喉腫痛赤眼壅腫頭面發熱唇口乾燥兩頰生瘡精神恍惚心忪悶亂坐臥不寧及傷暑毒面赤身熱心煩躁而渴飲食不下寒水石石膏各八兩青黛四兩上研末入青黛和勻蒸餅七個水調為丸如芡實大每服一丸食後新汲水化下或細嚼生薑湯下如中諸毒並宜服之及驚風潮熱痰涎壅塞心胸煩躁頰赤多渴坐臥不穩每服半粒量大小加減竹茹湯吐橘皮湯橘皮一兩半甘草炙竹茹各半兩人參二錢五分上每服五錢姜水煎食前服黃連解毒湯治時疾三日汗已解若煩悶乾嘔口燥呻吟發熱不臥黃連炒三錢黃柏炒半兩梔子炒四枚黃芩炒二錢上每服二三錢水煎未效再服亦治熱痢導赤散心至寶丹治諸驚癇心熱及卒中客忤煩躁風涎搐搦或傷寒狂語伏熱嘔吐生犀角鎊生玳瑁鎊琥珀硃砂水飛雄黃水飛各一兩金箔五十片一半為衣銀箔五十片片腦一匙麝香一錢牛黃半兩安息香一兩半為末酒掬去砂取一兩酒煎成膏上各另研為末和勻入安息香膏如干入熟蜜少許丸桐子大每服一二丸人參湯化下量兒加減用之神芎丸治風熱壅滯頭目昏眩口舌生瘡牙齒疳蝕或遍身瘡疥咬牙驚惕怔忡煩躁作渴或大便澀滯或積熱腹滿驚風潮搐等證大黃生黃芩各二兩生牽牛末一兩滑石四兩黃連薄荷葉川芎各半兩上為末水糊丸如桐子大每服三四丸溫水下酸棗仁湯酸棗仁去殼取仁甘草炙生地黃梔子仁麥門冬人參當歸身各等分上銼細加燈心水一盞煎七分去滓溫服不拘時硃砂安神丸心當歸補血湯虛熱注夏薛脾為太陰位屬坤土喜燥而惡濕故凡脾胃之氣不足者遇長夏潤溽之令則不能升舉清陽健運中氣又復少陽相火之時熱傷元氣則肢體怠惰不收兩腳痿弱嗜臥發熱精神不足飲食少思口中無味呼吸短乏氣促目中視物𥉂𥉂小便赤數大便不調名曰注夏此皆稟賦陰虛元氣不足之證丹溪補陰論言之詳矣育子者其可不知冬月養陽之道乎治法用補中益氣湯去升麻柴胡加炒黑黃柏主之若因勞役發熱血虛脈大者用當歸補血湯氣血兩虛者八珍湯肝腎陰虧者地黃丸大便作瀉者人參理中湯若乳母肝火乘脾寒熱少食者柴胡梔子散胃火作渴者竹葉石膏湯小兒多因乳母之氣不調而致當戒怒氣調飲食適寒溫則可以遠病矣又如今人夏月皆以香薷湯浸冷代茶飲之殊不知香薷利水大損元陽厚朴克伐大瀉真氣況脾性喜溫而惡寒夏月陰盛於內冷啜傷脾若胃強有火濕熱為病之人固無大害其脾胃虛弱中氣不足者必為腹痛少食泄瀉寒中之疾矣此大人亦所當戒者況小兒乎慎之慎之補中益氣湯虛熱當歸補血湯虛熱八珍湯虛羸地黃丸腎人參理中湯吐瀉柴胡梔子散發熱竹葉石膏湯發熱清暑益氣湯治暑邪干衛身熱自汗黃耆蒼朮泔浸去皮各一錢升麻七分人參白朮陳皮炒神麯炒澤瀉各五分甘草黃柏酒浸炒當歸身麥門冬去心青皮炒葛根各三分五味子九粒杵上水煎服清燥湯治小兒自汗或因熱傷元氣大小便祕澀黃耆炒蒼朮各五分白朮陳皮澤瀉人參白茯苓升麻麥門冬去心當歸身生地黃神麯炒豬苓黃柏酒拌炒各三分五味子五粒杵黃連炒甘草炙各二分上姜一片水一鍾煎服舌舌者心之候脾之脈絡於舌也二經有熱無所於泄而發於舌如舌絡微緊時時舒舌謂之弄舌附舌下近舌根生形如舌而小謂之重舌舌漸漸腫大塞滿口中謂之木舌曾凡為此證是脾與心肝屢受極熱有所謂重舌木舌又謂之舌黃鵝口名雖異皆熱也大抵重舌生於舌下挺露如舌故曰重舌然脾之絡脈系舌傍肝之絡脈系舌本心之絡脈系舌根凡此三經或為濕熱風寒所中則舌捲縮或舒長或腫滿宜消黃散緑袍散主之及當歸散羌活散與服當歸散發熱羌活散發熱弄舌錢弄舌者脾臟微熱令舌絡微緊時時舒舌治勿用冷藥及下之當少與瀉黃散漸服之田氏云若肥實者用牛黃散治之或欲飲水醫疑為熱用冷藥下之者非也飲水者脾胃津液少故也又加面黃肌瘦五心煩熱即為疳宜加胡黃連輩若大病未已用藥後弄舌者凶薛小兒舌微露而即收者名弄舌此屬心脾虧損用溫脾散補之舌舒長而良久不收者名吐舌乃心脾積熱用瀉黃散主之或兼口舌生瘡作渴飲冷屬胃經實熱亦用前散作渴飲熱屬胃經虛熱用四君子湯食少作渴或大便不實脾胃虛弱也用七味白朮散口角流涎或腮頰患腫胃虛風熱也先用人參安胃散次用七味白朮散若午後甚者脾血虛也四物多加參朮茯苓未應用補中益氣湯及審五臟相勝若因疳瘦所致當參諸疳門瀉黃散脾溫脾散腹脹白朮散渴人參安胃散脾四物湯失血補中益氣湯虛羸重舌湯重舌附舌下近舌根生形如舌而小謂之重舌其著舌下如此者名重舌其著頰裡及上齶如此者名重齶其著齒齦上如此者名重齦皆刺之出血可也治法用苦竹瀝漬黃柏末點舌上如不愈後用真蒲黃敷之不過三次愈用真蒲黃微炒紙鋪地上出火氣研細每挑些糝舌下更以溫水蘸熟帛裹指輕輕按之按罷摻藥馬牙硝塗舌下日三度先用新水揉口並舌上下後用皂莢針燒灰入腦子少許每用半字糝舌上下出涎立效亦治木舌燒烏賊魚骨細研和雞子黃敷喉及舌上亂髮灰細研以半錢敷舌下日不住用之桑白皮煮汁塗乳飲之張烏魚散治小兒重舌烏魚骨一兩蜣螂燒灰蒲黃各五錢枯白礬二錢五分上為極細末用雞子黃謂塗舌下咽津無妨青液散治小兒重舌及口瘡青黛朴硝各一錢龍腦一字上為細末用蜜調鵝翎蘸少許敷之當歸連翹湯治小兒心脾有熱致生重舌當歸尾連翹川白芷各三錢大黃煨甘草各一錢上㕮咀用水一盞煎食前服一捻金散治小兒重舌及木舌雄黃二錢硼砂一錢腦子少許甘草半錢上為細末乾摻舌上或用蜜湯調鵝翎刷咽緑袍散治重舌及滿口內外瘡毒咽膈不利薄荷葉去老梗荊芥穗二味各五錢青黛玄明粉硼砂三味各二錢半百藥煎甘草二味各三錢上銼焙為末除玄粉硼砂二味在乳鉢內細杵同前藥末再杵勻用一字至半錢乾點舌上令其自化或新汲水入蜜調點舌上亦好木舌木舌者舌腫漸漸粗大滿口不急治即塞殺人也曾木舌者舌腫硬而妨乳食此為風熱盛也以當歸散瀉黃散玉露飲皆可服之次消黃散點擦舌上蓋舌者心之管心熱則生瘡破裂肝壅則血出如湧脾閉則白胎如雪熱則腫滿風則強木口合不開四肢壯熱氣喘語塞即其候也治法涼解上焦及心肝脾三經邪熱疏風化痰初用百解散加五和湯水姜燈心煎投次以牛蒡湯同當歸散入生地黃水姜煎服治法用局方中紫雪二錢半竹瀝半合和之時時抹入口中自消百草霜滑石芒硝為末酒調敷瀉黃散脾玉露飲積熱消黃散治風熱上攻舌硬腫大不消風化朴硝真蒲黃各半兩上蒲黃曬乾為末同朴硝乳鉢內細研勻每用一字或半錢點揩舌上下百解散急驚五和湯失血牛蒡湯咽喉川硝散治小兒木舌朴硝一兩真紫雪五錢食鹽二錢半上為細末每服五分入竹瀝三兩點用白湯調塗舌上咽津無妨舌白苔丹溪云舌上生如微粒桑白皮汁敷之三兩次妙舌上瘡本草治小兒舌上瘡飲乳不得以白礬和雞子置醋中塗足底二七即愈千金方以蜂房燒灰屋間塵各等分和勻敷之又以桑白汁塗乳與兒飲之又以羊蹄骨中生體和胡粉敷之外臺小品以烏賊魚骨燒末雞子黃和塗之嬰孺燒葵根為灰每日少許敷之張雞峰方野薔薇根銼碎每用一匙頭以水二盞煎至六分去滓熱含冷即吐了治口舌生瘡久不瘥舌上血出千金翼治舌上黑有數孔出血如湧泉此心臟病也方戎鹽黃芩黃柏大黃各五兩人參桂心各二兩甘草一兩炙上七味末之煉蜜丸如梧子每服十丸日三服仍燒鐵烙之諸失血證曾小兒九道出血何為而然蓋人之所有者血與氣也心者血之主肺者氣之主氣主詬之血主濡之榮養百骸灌溉絲脈升降上下榮衛諧和自然順適一或不調疾由生矣或外為六淫所侵內因七情所沮氣乃留而不行血乃壅而不濡內外抑鬱不能流注以榮於身必有妄動之患叔和以芤脈為失血之義在七表屬陽故也陽明主乎多氣多血未有不因熱而得蓋氣血俱熱熱鬱內逼失其常度是以妄行有在襁褓患此證者固非七情所傷皆因乳母執著不自寬釋及啖辛辣之物流於乳絡兒飲之後停滯不散鬱蒸於內亦能動血或居重幃暖閣火氣熏逼不令常見風日積溫成熱熱種則湧泄或吐或衄或大小腑亦多血來者有氣虛而邪熱乘之則血不得循流故道滲於諸經亦生走失之證其面㿠白脈沉微血淡紫口氣緩是也又況嬰孩脆弱易虛易實因熱內攻血隨氣行或壅而上逆或下而忘返遂有吐血衄血瀉血溺血之證然而血不苟動因氣使之風不自生因熱而起由是而論可以類推治法先明虛實審得病源隨經施治藥餌無瘥則不失其機要實則小柴胡湯加生地黃絲茅根或苦參亦好並用水煎服或㕮咀五苓散合五和湯亦加絲茅根苦參水煎及投消毒飲次用局方雞蘇丸三黃丸間服虛則理中湯及人參芎歸湯皆可服間有醫者見其血盛以為熱極過投涼劑遂使血寒不能歸源而妄流其色紫黯而凝滯或成小片當服姜附之劑以溫之自然流暢毋致妄行為佳小柴胡湯潮熱五苓散驚五和湯裡熱消毒飲喉痹局方雞蘇丸大吐血三黃丸裡熱理中湯吐瀉人參芎歸湯治九道血妄行人參去蘆川芎當歸酒洗各半兩荊芥二錢半上每服二錢水一盞煎七分溫服無時黃芩丸治小兒衄血吐血下血上以黃芩為末煉蜜丸如雞頭大三歲一丸濃鹽湯下柏葉石榴花為末吹鼻治衄血吐血一方定州瓷器末治嘔血破血止血茅花湯治鼻衄不止吐血下血用茅花一大把水三盞煎濃汁一盞分二服即瘥無花根梗代之兼治血痢黑痢吐血全嬰論云夫吐血者榮衛氣逆也榮者血也衛者氣也榮衛相濟不失常道一有所勝則致妄行血者水也決之東則東流決之西則西流氣之使血其勢如此巢氏云血者是有熱氣盛而血虛熱乘於血血性得熱則流散妄行氣逆則血隨氣上故令吐血也又或飲食太飽之後脾胃內冷不能消化忽吐所食之物氣血相沖因傷肺胃亦令吐血若久嗽氣逆面目浮腫而嗽吐血者是虛損也薛清者為榮濁者為衛榮行脈中衛行脈外蓋榮者水穀之精氣也和調於五臟灑陳於六腑故能入於脈夫榮者陰血也所主在心統化在脾藏內在肝宣布在肺輸泄在腎灌溉一身滋養百脈諸經由此而生育焉然血之所統者氣也故曰氣主詬之血主濡之是以氣行則血行氣止則血止陽生陰長夫倡婦隨之道也若氣一傷則變證百出故妄行則吐衄衰涸則虛勞降下則便紅熱陷則溺赤滲於腸胃則為腸風陰虛陽搏則為崩漏此皆氣有殄戾之乖而血乃生滲溢之患也然養陰者可不先知養陽之道乎小兒患之多因稟賦積熱或食膏粱厚味或乳母七情鬱火所致治法若氣虛血弱當以人參補之陽旺則陰生血也若四物湯者獨能主血分受傷為氣不虛也若左寸關脈數而無力血虛也四物湯加參朮浮而無力氣虛也補中益氣湯尺脈數或無力腎虛也六味地黃丸右寸關脈數而有力者肺胃熱也犀角地黃湯後用四物湯加參苓白朮尺脈數而無力陰虛也用六味地黃丸若面黃目澀眵多手麻者脾肺虛也用黃耆芍藥湯四物湯治血虛發熱煩躁或晡熱作渴頭目不清若因脾虛不能生血者用四君子湯當歸熟地黃各二錢芍藥川芎各一錢上水煎服補中益氣湯虛熱六味地黃丸腎犀角地黃湯治傷寒溫病失於表汗致內有瘀血吐血面色黃大便黑及瘡痘出多以此解之犀角鎊牡丹皮各一兩生地黃八錢赤芍藥七錢上每服二錢水煎服黃耆芍藥湯治衄多歲面黃眼澀多眵手麻黃耆三兩甘草炙升麻葛根芍藥炒黃各一兩羌活半兩上每服三錢水煎服按此手足太陰陽明藥也然血虛久則陽亦虛矣故血不足則麻木陰虛火動變證百出實非風也此出升陽滋陰例人參黃耆散治虛勞客熱消瘦倦怠口燥咽乾日晡潮熱五心煩熱盜汗胸滿食少作渴咳唾時有膿血天門冬去心三兩半夏知母炒黃桑白皮赤芍藥炒黃耆炒紫菀甘草炙鱉甲醋炙以上各半兩白茯苓柴胡秦艽生地黃熟地黃地骨皮各二兩人參桔梗各一兩上銼散每服三五錢水煎服大人亦得一方有生薑柏枝飲治小兒衄血吐血柏枝乾者藕節乾者上等分為末三歲半錢藕汁入蜜沸湯調下一方白芍藥為末磨犀角汁調治咯血衄血辰膠散治小兒吐血阿膠炒蛤粉等分辰砂少許上為末和粉紅色三歲一錢藕汁和蜜調下紫參散治吐血紫參山梔子生乾地黃各一兩刺薊一分燒灰亂髮一分燒灰俱存性以上搗羅為細末次用蒲黃伏龍肝各一分並細研上件都拌勻每服半錢至一錢煎竹茹湯調下衄血衄血者是五臟熱結所為也血隨氣行通流臟腑冷熱調和不失常度無有壅滯亦不流溢血得寒而凝結得熱而流散熱乘於血血隨氣發溢於鼻竅也又有因傷寒瘟疫諸陽受病不得其汗熱無所泄故從鼻而出也春冬衄者用生地黃研取汁加生蒲黃少許沙糖井花水浸服之愈秋夏衄者用車前草一握洗淨同生姜一處研取汁入生蜜一匙先拌渣塞鼻次用新汲水和蜜並車前草生薑汁飲之即愈又方生蘿蔔取根搗自然汁仰頭滴入鼻管中即止次以新汲水和蜜蘿蔔汁飲之良薛因驚作氣散血無所羈而鼻衄者用異功散加柴胡山梔左臉青而兼赤者先用柴胡清肝散後用地黃丸右臉赤乃肺大腸實熱也用瀉白散鼻色赤乃脾胃實熱也用瀉黃散微赤乃脾經虛熱也用異功散加升麻柴胡色深黃用濟生犀角地黃湯後用楊氏地黃散淡白色用六君子湯頦間色赤用四物湯加山梔赤甚用五淋散小便赤色用六味丸補中益氣湯唇色白用六君子湯久不愈用麥門冬飲子若初病元氣未虧乳食如常發熱壯熱二便祕結作渴飲水臥不露睛者悉屬形病俱實當治邪氣若病久元氣已虧食少發熱口乾飲湯嘔吐泄瀉肢體畏寒臥而露睛者悉屬形病俱虛當補正氣為要湯氏地黃湯治榮中熱及肺壅鼻血生瘡一切丹毒生地黃赤芍藥當歸川芎各等分上㕮咀水煎去滓量大小加減服如鼻衄臨熟入生蒲黃少許生瘡加黃耆等分丹毒加防風等分同煎纍驗柴胡清肝散肝熱地黃丸腎瀉白散脾瀉黃散脾異功散吐瀉六君子湯脾五淋散淋六味丸即地黃丸腎麥門冬飲子治吐血久不愈者五味子十粒麥門冬去心黃耆各一錢當歸身人參生地黃各五分上水煎服龍膽丸治小兒衄不止黃連龍膽草各等分上為末糊丸如小豆大三歲三十丸或作散子以濃鹽水送下柏皮湯治小兒衄血柏皮山梔子各一兩甘草炙半兩上㕮咀三歲一錢水一小盞煎三分去滓服槐花散治衄血槐花炒一兩蒲黃半兩川面姜一分上搗羅為細末每服半錢新水調下膠黃散治小兒大衄口鼻耳出血不止十五六歲兒陽盛多此病阿膠一兩蒲黃半兩上為末三歲半錢生地黃汁微煎調下食前服便血尿血大便下血者是大腸熱結損傷所為也臟氣既傷風邪自入或蓄熱或積冷或濕毒於脾胃或疳食傷於臟腑因茲冷熱交擊疳濕互作致動血氣停留於內凝滯無歸滲入腸中故大便下血也或有腹脹冷氣在內攻衝亦令大便下血又因風冷乘虛客入脾胃或瘀血在於腸胃濕毒下如豆汁又疳傷於臟亦能便血若上焦心肺積熱施注大腸亦令大便下血也亡血脾弱必渴久則血虛其人必肌體萎黃頭髮不黑矣溺血者蓋心主血與小腸相合血之流行周遍經絡循環臟腑若熱聚膀胱血滲入脬故小便血出也薛經云肺朝百脈之氣肝統諸經之血又云氣主詬之血主濡之蓋榮血為水穀之精氣灌溉五臟六腑四肢百骸若脾胃有傷榮衛虛弱行失常道故上為衄血吐血下為尿血便血矣若外感風邪則血鮮為腸風內傷則血濁為臟毒又熱入大腸則大便下血熱入小腸則小便出血然小兒多因胎中受熱或乳母六淫七情厚味積熱或兒自食甘肥積熱或六淫外侵而成若因母食厚味者加味清胃散怒動肝火者加味小柴胡湯憂思鬱怒者加味歸脾湯稟父腎燥者六味地黃丸兒有積熱小便出血者實熱用清心蓮子飲虛熱用六味地黃丸大便出血者犀角地黃湯風邪外侵者倉廩散病後元氣下陷者補中益氣湯糞前見血者四君加黃連制吳茱萸糞後見血者四君加吳茱萸制黃連若嬰兒以治母為主余當臨證制宜清胃散齒小柴胡湯潮熱歸脾湯煩躁地黃丸腎清心蓮子飲尿白五倍丸治小兒大便下血如腸風臟毒上以五倍子干為末煉蜜丸如小豆大三歲三十丸米湯下訶灰散治小兒因疳大便有血上以訶子燒灰存性一半為末米湯調下食前三歲一錢桃膠丸治小兒小便出血陰莖中痛上以桃膠一塊如棗大水一盞半煎三分日進三服下石子如豆石盡止藥火府散治小兒小便出血木通生地黃甘草黃芩上為末水一盞煎六分不時溫服車前散治熱盛積於小腸甚則尿血牡蠣半兩燒為粉車前子甘草炙微黃銼川朴硝各一分上搗羅為散每服一錢以水一小盞煎至五分去滓溫服量兒大小加減不拘時候語遲五臟有五聲心聲為言若兒稍長應語而語遲由在胎時母卒驚怖內動兒臟邪乘於心心氣不和舌本無力故語遲也錢菖蒲丸治小兒心氣不足五六歲不能言石菖蒲三錢人參切去蘆焙半兩丹參二錢天門冬麥門冬去心焙各一兩赤石脂三錢直指有當歸川芎硃砂上同為細末煉蜜丸如緑豆大或麻子大溫水下五七丸至一二十丸不計時候日三四服久服取效又有病後腎虛不語者宜兼服錢氏地黃丸海藏云地黃丸足少陰也與菖蒲丸上下通經張菖蒲丹治數歲不能語菖蒲一寸九節者遠志去心桂心各一兩人參去蘆黃連去須酸棗仁各半兩上為細末煉蜜和如芡實大每服一粒至二粒煎生薑湯化下不拘時候聖惠治舌本無力語遲芍藥散赤芍藥一兩黃耆七錢半犀角鎊檳榔甘草炙微赤各半兩上為末每服一錢水一小盞煎至五分去滓量兒不計時分加減溫服錢病吐瀉及大病後雖有聲而不能言又能咽藥此非失音為腎怯不能上接於陽故也當補腎地黃丸主之失音乃猝病耳口噤不止則失音聲遲亦同雞頭丸治小兒諸病後不能語雄雞頭一個炙鳴蟬三個炙大黃取實處濕紙裹煨熟甘草銼炙各一兩黃耆切焙川芎遠志去心麥門冬去心當歸去蘆焙各七錢半人參去蘆木通各半兩上同為細末煉蜜丸小豆大平旦用米飲下五丸空心日三四兒大者加之久服取效雞蟬二物宜求死者用之不可旋殺孫真人所謂殺生求生去生更遠不可不知也明堂治五六歲兒不語者灸心俞三壯莊氏灸兩足踝各三壯汗鄭夫汗者心之所藏在內為血發外者為汗蓋汗乃心之液故人之氣血平則寧偏則病經云陰虛陽必湊則發熱而自汗陽虛而陰必乘則發厥而自汗皆由陰陽偏勝而致也小兒血氣嫩弱膚腠未密若厚衣溫暖熏蒸臟腑臟腑生熱熱搏於心為邪所勝故液不能內藏熏出肌膚則為盜汗也又或傷於冷熱冷熱交爭陰陽不順津液走泄亦令睡中汗自出其間有虛實之證虛者謂諸病後大汗後血氣尚弱液溢自汗或潮熱或寒熱發過之後身涼自汗日久令人黃瘦失治則變為骨蒸疳勞也丹溪云盜汗者謂睡而汗出也不睡則不出汗出方其睡熟也濈濈然出焉覺則止而不復出矣亦是心虛宜斂心氣益腎水使陰陽調和水火升降其汗自止錢氏云上至頭下至項謂之六陽虛汗不須治之自汗薛自汗者汗不待發表而自出也經曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾又曰陰虛而陽必輳則發熱而自汗陽虛而陰必乘則發厥而自汗束垣云表虛自汗秋冬用桂春夏用黃耆丹溪云汗者心之液也自汗之證未有不由心腎俱虛而得之者巢氏云虛勞病若陽氣偏虛則津液發泄而為汗夫心為主陽之臟火也陽主氣人身津液隨其陽氣所在之處而生亦隨其火所擾之處而泄則為自汗矣治法當用參耆甘溫益氣之藥使陽氣外固而津液內藏則汗止矣若元氣虛者夏月用六君子湯加山藥山茱萸冬月用加減八味丸十全大補湯血虛者四物加參耆有熱者當歸六黃湯氣血俱虛者十全大補湯心腎虛熱者六味九虛寒者八味丸心經血虛者團參湯胃經氣虛者六君子湯飲食勞倦者補中益氣湯嗜臥倦怠者升陽益胃湯熱傷元氣者清燥湯暑干心胞絡者清暑益氣湯外傷風邪者惺惺散虛勞羸瘦者人參養榮湯思慮傷脾者歸脾湯怒動肝火者小柴胡湯肝經虛熱者加味逍遙散肝經濕熱者龍膽瀉肝湯泄瀉脈微者人參理中湯手足汗者補中益氣湯胸腹汗者四君子湯當心一片有汗者茯苓補心湯黃汗者茵陳五苓散血汗者血餘散敷之此皆去汗之大法也仍推五臟相勝主之若汗出如油喘而不休此為命絶柔汗發黃此為脾絶汗出不流如貫珠者為絶汗數者並不治若六陽虛則汗出上至頭下至項亦多主難治曾小兒脾虛自汗多出額上沾黏人手速救胃氣全蠍觀音散用薑棗煎湯調服及沉香飲為治脾虛瀉自汗遍身冷而出有時遇瀉則無瀉過即有此候太虛急當補脾投益黃散參苓白朮散附子理中湯肺虛自汗其候右臉色多㿠白肺脈按之無力蓋久因咳嗽連聲不已痰少不活乃肺經虛氣上壅致令汗出宜令補肺散為治及以藿香飲調脾此又益母救子之義也慢驚自汗遍體俱有其冷如水此證已危金液丹固真湯主之有實證自汗外因感冒風邪發熱無間昏醒浸浸汗出當救表解肌用百解散水煎服或間投五苓散溫白湯調下錢治病有等張氏三子病大者汗遍身次者上至頂下至胸小者但額有汗衆醫以麥煎散治之不效錢曰大者與香瓜丸次者與益脾散小者與石膏湯各五日而愈香瓜丸胡黃連大黃瓜黃色者一枚大黃濕紙裹煨柴胡去蘆鱉甲醋炙黃黃柏黃連蘆薈青皮各等分上除黃瓜外同為細末將黃瓜割其頂填入諸藥至滿卻蓋口用杖子插定火內煨熟將黃瓜及藥同用麵糊丸如緑豆大每服二三丸食後冷漿或新水下大者五七丸不及十丸胃怯汗上至頂下至臍此胃虛當補胃益黃散主之錢六陽虛汗上至頂不過胸也不須治之喜汗厚衣臥而額汗出也止汗散主之止汗散用故蒲扇灰研細每服三錢溫酒調下無時薛氏方十全大補湯治諸虛不足自汗不食時發潮熱等證白茯苓人參當歸白朮黃耆炒川芎肉桂白芍藥炒熟地黃甘草炒各等分上每服三五錢加薑棗水煎服八珍湯前方去肉桂黃耆治驗見各門人參養榮湯治病後時自汗或發潮熱口乾食少心虛驚悸咳而下利前方去川芎加陳皮五味子遠志升陽益胃湯痢加減八味丸虛羸清燥湯清暑益氣湯並注夏惺惺散痘歸脾湯驚悸小柴胡湯發熱加味逍遙散女科發熱龍膽瀉肝湯雜前陰諸疾人參理中湯瀉茯苓補心湯喑茵陳五苓散黃疸曾氏方全蠍觀音散吐瀉沉香飲吐瀉益黃散脾參苓白朮散吐瀉理中湯吐瀉補肺散咳嗽藿香飲脾弱金液丹固真湯並慢驚百解散五苓散並急驚團參湯治小兒虛汗或心血液盛亦發為汗此藥收斂心氣新羅人參川當歸各三錢上銼細用雄豬心一個切三片每服二錢豬心一片井水一盞半煎至一盞食前兩次服牡蠣散治血虎自汗或病後暴虛津液不固自汗牡蠣煅黃耆生地黃各等分上銼散每服二錢或加浮麥煎撲汗方黃連牡蠣粉貝母各半兩上用米粉一升敷之血餘散治汗不止用男子亂髮一握煅存性為細末以絹袋盛置干撲之盜汗睡則汗出寤則自收也錢氏曰小兒睡而自汗出者肌肉虛也止汗散主之遍身汗出者香瓜丸主之上至胃下至臍此胃虛也當補脾益黃散主之薛自汗屬陽虛盜汗屬陰虛蓋陽為衛氣陰為榮血血之所主心也所臟肝也熱搏於心故液不能內斂而外泄於皮膚人臥則靜而為陰覺則動而為陽故曰自汗屬陽盜汗屬陰也多因心腎不交水火不能既濟腎虛則閉藏之令失守故有是證宜用六味丸十全大補湯血虛內熱者當歸六黃湯心經有熱者導赤散肝經虛熱者六味地黃丸血脫盜汗者當歸補血湯肝膽風熱者柴胡清肝散食積內熱者二陳枳實山梔胃氣虛熱者六君子湯及浮麥散血氣俱虛者人參養榮湯餘證見自汗當參覽之曾有夜睡中而汗自出者名盜汗此因陽虛所致久不已者令人羸瘠枯瘦心氣不足津液妄出故也用茯神湯加黃耆水薑棗燒鹽湯服錢黃耆散治虛熱盜汗牡蠣煅黃耆生地黃各等分上為末煎服不拘時白朮散治自汗盜汗白朮三兩小麥一合炒用水一鍾半煮乾去麥為末以綿黃耆煎湯量兒大小調服忌蘿蔔辛辣炙爆之類乳母尤忌又團參湯亦治盜汗嘗歸六黃湯治血虛盜汗內熱晡熱者當歸熟地黃各五分生地黃炒三錢黃連炒黑黃柏炒黑黃芩炒黑各三分黃耆炒五分上水煎服沉香鱉甲丹治潮熱盜汗沉香草龍膽當歸洗焙乾鱉甲童子小便浸一宿去裙襴酥炙黃綿黃耆銼各一兩川黃連川大黃微炮各半兩上件搗羅為細末煉蜜和如黍米大每服十粒用麥門冬去心煎湯下量兒大小加減蓯蓉丹治血少肌瘦盜汗肉蓯蓉酒浸一宿刮去皺皮火炙令乾鱉甲塗酥炙黃去裙襴各一兩當歸綿黃耆何首烏各半兩上件搗羅為細末煉蜜和如黍米大每服十粒溫米飲下食前量兒大小加減升麻湯治肌熱盜汗川升麻綿黃耆人參去蘆頭各一兩熟乾地黃半兩以上搗羅為細末次用天竺黃牡蠣粉各半兩研勻上件通拌勻每服半錢至一錢煎竹葉湯調下牡蠣散止盜汗牡蠣粉二兩麻黃根為末赤石脂細研糯米粉各一兩龍腦一錢研上件再研拌勻每用一匙頭新綿包每日及夜常常撲身體頭面有汗處虎杖散治實熱盜汗虎杖水煎服量多少與之無時海晉郎中子自嬰至童盜汗凡七年矣諸藥不效豫與涼膈散三黃丸三日病已蓋腎為五液化為五濕相火逼腎腎水上行乘心之虛而入手少陰心火炎上而入肺欺其不勝已也皮毛以是而開腠理玄府不閉而為汗出也出於睡中者為盜汗以其覺則無之故經曰寢汗憎風是也先以涼膈散瀉胸中相火相火退次以三黃丸瀉心火以助陰則腎水還本臟玄府閉而汗為之自已曾有小兒無疾睡中遍身汗出如水覺而經久不幹此名積證盜汗脾冷所致用三稜散水煨姜煎服次投益黃散參苓白朮散三稜散癖積有時時冷汗微出髮根如貫珠面額上濈濈然此為驚肝證宜鎮驚丸或琥珀抱龍丸及茯神湯加麻黃根水煎服取效鎮驚丸琥珀抱龍丸茯神湯三方並見驚搐噫氣薛經曰脾病則面黃善噫噫者寒氣客於胃厥逆從下上散復出於胃而為噫又善思善味其證當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收經曰脾主四肢有是者脾也又曰二陽一陰發病主驚駭背痛善噫何謂也竊謂上焦受氣於中焦中焦氣未和不能消穀故為噫耳中焦亦脾胃之分也脾土虛寒由命門火衰不能溫蒸水穀古人有服菟絲子旬日間飲食如湯沃雪亦此義也補脾宜人參理中湯補右腎宜用八味丸胃氣虛不能運化水穀者六君子加木香鬱結傷脾者加味歸脾湯木剋土者四君柴胡升麻兼嘈雜者加吳茱萸半夏治者審之理中湯吐瀉八味丸虛羸加味歸脾湯驚悸本事枳殼散治心下痞悶或作痛多噫枳殼去瓤炒白朮各半兩香附子炒一兩檳榔三錢上為末每服一錢空心米飲調下四味萸連丸治腹脹噫氣吞酸食不能化吳茱萸炒黃連炒神麯荷葉各等分上為末煮神麯糊丸桐子大每服二十丸白湯下黃連當量病微甚或炒黑炒黃用之下氣薛劉河間云腸胃鬱結穀氣內發而不能宣通於腸胃之外故喜噫下氣也若癲癇勞瘵氣下泄而不止者必死乃真氣竭絶腠理閉塞穀氣不能宣通於腸胃之外故從腸胃中泄出婁全善云下氣屬心虛經云夏脈者心也心脈不及下氣為泄者是也經又云飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行此平人也若七情內傷六淫外侵飲食不節房勞過度致脾土之陰受傷轉運之官失職不能輸化故下氣也又曰陰精所奉其人壽陽精所降其人夭陰精者乃五穀之精上榮心肺以降腎肝故曰其人壽陽精者乃胃中之清氣陷入腎肝不能升浮上輸心肺故曰其人夭若飲食過度腸胃鬱結用平胃散癲癇勞瘵用補中益氣湯心氣虛弱用補心丸心氣虛寒用補心湯脾胃虛寒用理中湯肝木乘睥用六君子湯加木香脾氣鬱結用加味歸脾湯脾氣下陷用補中益氣湯命門火衰用八味丸腎氣不足用六味地黃丸大凡噫氣下氣者其脈不及本位內經云短則氣病以其無胃氣也諸病見此脈難治但純補胃氣為善平胃散不能食補心丸即茯神散為丸方見驚悸補心湯痞理中湯吐瀉加味歸脾湯驚悸八味丸不能食尋衣撮空薛尋衣撮空許叔微謂之肝熱夫肝主筋筋脈血枯而風引之故手指為之撮斂也宜確服六味地黃丸間有回生之功錢仲陽用瀉青丸此治肝經實熱蓋尋衣撮空皆病後之敗證耳求其實熱則百無一二矣治者審之王海藏治血脫尋衣撮空摸床手揚搖頭錯語失神脈弦浮而虛血脫內躁熱之極也氣粗鼻乾此為難治用生地黃連湯主之王少參孫女年十二歲脾胃素弱後成疳症發熱小腹膨脹堅直大便溏瀉氣喘咳嗽徹夜煩躁不睡鼻塞眼暗譫語其脈大而無根用人參一兩附子三分腹脹漸減脈漸斂然猶尋衣撮空鼻孔出血用六味地黃丸料二服如脫乃晝服獨參姜附湯及服地黃丸料脈漸有根諸證漸愈又用六君子補中益氣湯而痊一小兒停食夜驚腹痛服消食丸瀉數次尋衣撮空面青黃或色白此脾土受傷肺金休囚肝火旺而然耳先用異功散加升麻以補脾土用六味地黃丸料以滋肝血稍定各二劑漸愈卻用補中益氣湯六味地黃丸間以異功散而痊一小兒膝癰誤觸其膝出血甚多患前證惡寒面白此陽隨陰散而虛寒用十全大補湯加附子三分四劑未應用人參一兩附子五分薑棗煎服稍退又二劑頓退乃朝用異功散夕用八珍湯而安一小兒傷風表汗後患前證惡風面白手足冷用補中益氣湯加五味子汗頓止而諸證漸退又用四劑而安乃服十全大補湯而愈生地黃連湯治血脫尋衣撮空搖頭妄語川芎生地黃當歸各七錢赤芍藥梔子黃芩黃連各三錢防風一錢五分上每服三錢水煎服喜笑不休薛經曰心藏神有餘則笑不休又曰在臟為心在聲為笑在志為喜又火太過曰赫曦赫曦之紀其病笑謔狂妄又云少陰所至為喜笑又云精氣並於心則喜此數者皆言屬心火也若笑不休呻而為腹痛此水乘於火陰擊於陽陽伏熱生狂妄譫語不可聞心之損矣扁鵲云其人唇口赤色者可治青黑者死若腎水虧涸不勝心火而喜笑不休者用六味地黃丸肝火熾盛能生心火而喜笑不休者用柴胡清肝散余兼別證各從其證而參治之一小兒喜笑常作不安面赤飲冷手足並熱先用黃連瀉心湯末二服稍定又用六味地黃丸料煎服頓愈常服此丸則安月許不服仍復作又服愈矣一小兒患前證面青赤此肝心二經風熱所致也用柴胡梔子散六味地黃丸漸愈又因乳母大怒發熱先用加味柴胡湯又用加味逍遙散母子服之並愈一小兒年十四歲用心過度飲食失節患喜笑不休脈洪大而虛面色赤而或白余用補中益氣湯而愈次秋科舉飲食勞倦前證復作或兼譫語脈洪大按之微細如無用人參一兩薑棗煎服稍定又三劑而愈又因勞役用心自汗作渴煩躁似癇證先用當歸補血湯二劑頓安又十全大補湯而尋愈瘡瘍癰疽證治已詳瘍醫準繩其在小兒雖肌體柔脆而天真未鑿鮮五發之毒亦無五善七惡之診初生周晬前後遍體生瘡俗忌療治其他小小癰癤自可敷貼而消若憎寒壯熱沉困躁擾為心腹之害又當求其本而治之乳下嬰兒母子俱服是在醫師神而明之無按圖索驥之理薛氏乃掇大科癰疽證治贅附保嬰近於駢拇枝指矣若夫溯流窮源明經絡分表裡審順逆則無大小之異有專科書在又何贅焉今第以小兒所專者集為是編以至危且急殺人頃刻莫如丹毒故首列之且獨加詳焉鄭夫瘡瘍皆因臟腑不調經絡壅滯而得或由胎毒或是風化為蟲或則熱氣有盛或是驚入皮膚其大者是滯於血脈而橫出於皮膚之間若節其氣血則易破若或風纏則生癮軫或是外邪所入即多㿋癢而不定其食毒則滯死其血氣久則化為膿也或作驚瘡者驚本無物亦蹉其血氣在臟而為積在腑故出皮膚為瘡發遍身而四肢難較風瘡亦發遍身其形甚小世呼為疥熱毒瘡發處不定節滯其血故作瘡蟲窠瘡常發於脛後作其窠窠內有蟲如蟣子蓋因腹中蟯蟲隨氣而化其瘡即較而再發或片子如癬相似甚有死血癢若以藥敷較只是歸腹中須是取卻蟲方瘥及與殺蟲藥曾內經曰諸痛癢瘡瘍皆屬心火火鬱內發致有斯疾蓋心主乎血血熱生風熱鬱內甚遞相傳襲故火能生土血注陽明主肌肉風熱與血熱相搏發見皮膚其名不一有黃膿而白者土生金母歸子也始生微癢而熱輕腫痛潰爛為熱極血凝化水氣滯成膿甚至寒熱作而飲食減尤為可慮宜宣泄風毒涼心經解胃熱用當歸散加黃連升麻乾葛水薑蔥燈心煎服及三解散牛蒡湯木通散雖服塗以四黃散一抹金當歸散潮熱三解散驚牛蒡湯咽喉木通散淋四黃散治小兒身上一切熱毒瘡疾燥癢抓破有汁不幹淨黃連黃柏黃芩大黃滑石五味各半兩五倍子去蟲屑二錢半上銼曬為末用清油和調二錢至三錢塗搽患處仍服四順散消毒飲一抹金治小兒遍身生瘡潰爛如糜梨燥痛膿汁不幹藜蘆淨洗焙蛇床子去埃土紅丹水飛過三味各五錢硫黃赤石脂明白礬火飛過五倍子去蟲屑黃柏去粗皮五味二錢半輕粉五十帖上前八味或曬或焙為末仍同輕粉在乳鉢再杵勻用生肥豬膏碎切以瓦鉢和藥末爛杵塗抹患處或清油調搽亦可湯小兒血氣凝滯而有熱毒之氣乘之故結聚成癰癤腫毒也未結之先微見有紅頭㿔子隱起作疼者急用不語唾夜半頻頻塗之飲酒了不可用即消散若已結成當用天烏散貼方若內顯躁熱不寧等證即須內服漏蘆散真良方也熱甚者用青解毒丸四順清涼飲加防風連翹玄參劑亦可服五福化毒丹尤良連翹湯可服青露散掩之留小孔後用驚毒掩子收瘡口熱甚者涼膈散亦可服方類列於後胎毒瘡瘍薛寶鑑云初生芽兒一塊血也無形證也無脈有驚即系是胎驚有熱即系是胎熱嬰兒實與乳母一體凡患瘡疾但審乳母肝經有熱用加味小柴胡湯之類肝經虛熱用加味逍遙散之類腎水不能生肝用地黃丸心經積熱用柴胡梔子散心經虛熱用茯苓補心湯膏粱積熱用東垣清胃散脾經鬱熱用錢氏瀉黃散脾經虛熱用錢氏異功散若服犀角丸化毒丹外敷寒涼之藥復傷生氣乃促其危也熱毒瘡瘍因食膏梁厚味或乳母七情鬱火所致若腫腎作痛氣血凝滯也用仙方活命飲口渴便祕熱毒內蘊也用四順清涼飲佐以如聖餅腫硬色赤熱毒凝聚也用活命飲佐以隔蒜灸腫焮不消欲作膿也用托裡消毒散不成膿或成膿不潰氣血虛也用八珍湯潰而肉赤不斂脾血虛也用四物參朮肉白而不斂脾氣弱也用四君芎歸食少體倦而不斂脾氣虛也用六君當歸升麻凡藥對證無有不愈設或妄行攻毒元氣虧損則變惡證而難治矣大抵瘡瘍屬腑者易治元氣無虧者不治自愈屬臟者難治元氣虧損者則變為惡證誤行克伐元氣虧損尤難療理故切不可用峻厲之劑觀東垣丹溪云但見腫痛參之脈證虛弱便與滋補血氣無虧可保終吉若用驅逐敗毒不免有虛虛之禍矣漏蘆散治小兒癰瘡及丹毒瘡癤見丹毒當歸散見潮熱解表消毒飲治小兒瘡瘍腫高焮痛便利調和脈浮而洪有表證者用之黃耆上部酒拌炒中部米泔拌炒下部鹽水炒一錢半葛根升麻赤芍藥玄參牛蒡子炒研麻黃去根節甘草各五分連翹一錢更看是何經分野加引經藥手少陰加細辛三分足少陰加獨活七分手太陰加桔梗白芷各五分足太陰加蒼朮七分手厥陰加柴胡七分足厥陰加柴胡青皮各五分手太陽加藁本五分足太陽加羌活七分手陽明加白芷五分足陽明加升麻葛根各七分手足少陽加柴胡七分水一鍾生薑三片蔥白一根煎七分溫服不拘時攻裡消毒飲治小兒瘡瘍腫硬痛深大便祕澀脈沉而實有里證者用之栝蔞連皮子細切三錢連翹牛蒡子炒研當歸白芍藥各一錢川大黃一錢半芒硝五分甘草七分上用水一鍾煎至七分大溫服未利再服連翹散治癰癤等連翹一兩沉香黃耆各半兩白蘞川朴硝川大黃炮甘草各一分上搗為粗散每服一錢水一盞抄入麝香一錢煎五分去滓放溫食後服寄生散治毒腫甚者桑寄生獨活川大黃各一兩犀角屑朴硝甘草各半兩上搗羅為細末每服一錢水一盞煎五分去滓放溫服量兒大小加減玄參劑解諸般熱消瘡癤生地黃玄參各一兩大黃末之煉蜜丸桐子大每服一丸燈心竹葉煎湯化下入沙糖少許亦可加羌活川芎赤芍連翹防風涼膈散治小兒臟腑積熱煩躁多渴頭昏唇焦咽燥舌腫喉閉目赤鼻衄頷頰結硬口舌生瘡痰實不利涕唾稠黏睡臥不寧譫語狂妄腸胃燥結便溺赤澀一切風腫並宜服之川大黃朴硝甘草炙各一兩連翹二兩梔子仁黃芩薄荷葉去土各半兩上銼散每服二錢水一盞入竹葉七個蜜少許煎四分食後溫服大小加減四順清涼飲發熱上解表攻裡之藥皆為腫瘍挾有內證者設也潰瘍勿拘此例托裡榮衛湯治瘡瘍外無焮腫內亦便利調和乃邪客經絡宜用此藥調理黃耆炒紅花各一錢蒼朮米泔浸炒柴胡連翹羌活防風當歸身酒拌甘草炙黃芩人參各一錢桂枝七分上用水一鍾酒半鍾煎八分食遠服祕方托裡散治一應瘡毒始終常服不致內攻栝蔞大者一枚杵當歸酒拌黃耆如前法制白芍藥各一兩半皂角刺炒金銀花天花粉熟地黃各一兩上為粗末每服以三歲兒為率用藥一兩以酒一鍾入瓷器內厚紙封口再用油紙重封重湯煮之仍覆以蓋煮至藥香取出分服直至瘡愈仙方活命飲金銀花橘皮各三錢皂角刺炒穿山甲蛤粉同炒防風沒藥白芷乳香當歸各一貝母天花粉甘草節各八分上每服五錢酒煎服嬰兒每服一兩母子同服為末酒調服亦可毒在表者加麻黃散下毒在內者加大黃下之當臨時制宜此解毒回生起死妙劑神效解毒散治一切瘡毒初起腫者即消已潰仍腫者即散已潰毒不解者即愈金銀花一兩甘草節五錢黃耆皂角刺炒當歸各三錢乳香沒藥各二錢上為散每服二錢酒煎溫酒調服亦可嬰兒病乳母亦服如瘡已潰腫痛已止者去乳沒金銀花倍加黃耆甘草治發背癰癤方羌活一兩穿山甲炒焦半兩生人骨煅存性半兩麝香少許上末煎麻黃薄荷酒調如陰瘡頭平向內者服之即突出其功效不可盡述若小兒痘瘡黑陷者只一服而起萬不失一玄參丸治疹痘後餘毒不散遍身生瘡不已大能解毒玄參赤芍藥生地黃赤茯苓荊芥防風木通桔梗黃芩硃砂青黛各等分上為細末煉蜜丸芡實大每服一丸薄荷湯下大小加減服之五福化毒丹治熱毒蘊積頰赤咽乾口舌生瘡或頭面瘡癤譫語不寧方見驚搐按前方生血涼血解毒寒中之劑形病俱實者殊有良驗但一二丸即止不可過多過多則反傷元氣變證不可言也犀角消毒丸治積熱及痘疹後餘毒生瘡生地黃防風當歸犀角鎊屑荊芥穗各一兩牛蒡子杵炒赤芍藥連翹桔梗各七錢薄荷黃芩甘草各五錢上為末煉蜜丸如芡實大每服一丸薄荷湯化下按前二方善損中氣傷陰血若大人形病俱實脾胃健旺者庶可用之恐芽兒臟腑脆嫩不能勝此經云氣主噓之血主濡之氣者胃中衝和之元氣若胃氣一傷不能噓濡消散膿已成者不能腐潰膿已潰者不能生肌收斂因而難治甚致不起不可不慎也托裡消毒散治胃經虛弱或因克伐致瘡不能潰散瘡未成即消已成即潰腐肉自去新肉自生人參黃耆當歸酒拌川芎芍藥炒白朮炒茯苓各一錢金銀花白芷甘草炙連翹各五分上作二劑水煎徐徐服托裡散治瘡瘍因氣血虛不能起發腐潰收斂及惡寒發熱宜用此補托之人參氣虛倍用黃耆炒當歸血虛倍用白朮倍用茯苓芍藥酒炒各五分熟地黃二錢生者自制上作兩三劑水煎服八味茯苓補心湯治心氣不足血氣不和而患瘡證薛制茯苓酸棗仁炒各二錢五味子炒當歸各一錢人參一錢五分白朮炒一錢菖蒲五分遠志去心六分甘草炒五分上作二三服水煎外治天烏散貼方天南星赤小豆草烏黃柏上等分為末生薑自然汁調貼患處用米醋調尤佳青露散治背疽一切惡瘡圍藥不胤開白芨白蘞白薇白芷白蘚皮朴硝青黛黃柏大黃天花粉青露葉即芙蓉葉老龍皮即老松樹皮上各等分為細末生薑自然汁調塗留小孔如干再用生薑汁潤驚毒掩治瘡癤初發掩上即退已成速破蔥根七個木鱉子七個白芷三個巴豆十四個黃丹二兩香油肆兩上先用油入前四味武火熬用柳木篦攪以白芷焦黑為度用綿濾去滓再入銚用文火熬卻入黃丹熬令紫黑色成膏為度治諸般瘡癤去膿收瘡口驚毒諸般腫痛掩子蒲黃大黃黃柏連翹白芷白芨白蘞真粉牡蠣丹參各等分上為末水調塗腫處敷藥鐵箍散治一切瘡癤癰疽芙蓉葉黃柏大黃五倍子白芨上為末用水調搽四圍按前方乃寒涼解熱收斂之劑或有用白蘞商陸根者有用寒水石天花粉者有用蒼耳金銀花者有用芭蕉赤小豆者有用草烏白芷之類者皆不分寒熱溫涼之雜餌內經云先腫而後痛者形傷氣也先痛而後腫者氣傷形也又云五臟不和九竅不通六腑不和留結為癰外科精義云凡瘡腫高而軟者發於血脈腫下而堅者發於筋脈肉色不變發於骨髓蓋必有諸中而後形諸外故受證之經與所患之位各有不同豈宜一概外敷涼藥惟脾胃無虧血氣不和者庶幾有效若服化毒之類脾胃復傷血氣凝滯亦不能消矣至如疔瘡之類正欲宣拔其毒若復用前藥肌肉受寒血氣凝滯必致毒氣入內而不救治法必察其腫之高漫色之赤白痛之微甚作膿之難易出膿之稠薄生肌之遲速以別其屬陰屬陽或半陰半陽或純陰純陽而用相宜之藥以涼之熱之和之又當審受證之敷變五臟之相勝而以調補脾胃為主庶不致變惡證也神功散治瘡瘍初起腫焮者用之可消加血竭更好丹毒未砭者亦可用之黃柏炒草烏生用上各另為末等分用漱口水調敷常漱口水潤之上敷貼散腫排膿生肌收口等方並見瘍醫準繩宜於彼中查之茲不贅述丹毒聖惠凡小兒一切丹皆由風毒在於腠理熱毒搏於血蒸發其外其皮上熱而赤如丹塗之狀故謂之丹也若又不歇則肌肉壞爛若毒氣入腹則殺人也今以一方同療之故號一切丹也嬰童寶鑑小兒諸丹毒歌丹火初成似火燒天火渾身赤轉饒伊火膀邊青黑色厲從額上起根苗臀並穀道熛丹毒如帶黳紅暴火調留火發時一日甚改變無常五色標家火頰連雙腋乳天灶內踝及陰尻背並膝赤飛丹病股內臍陰尿灶招巢氏云火丹候往來如傷寒赤著身而日漸大者是也又云丹火候狀發赤如火燒須臾熛漿起是也嬰孺方云火丹者往來如傷寒赤著身體不從傷火而得名如日出時以從其處又名日丹宜同用千金漏蘆散曾經云赤紫丹瘤皆心火內鬱而發赤如丹砂心主血而火性熱血熱相搏陰滯於陽即發丹毒心虛寒則癢心實熱則痛自腹生出四肢者易治自四肢生入腹者難療先用百解散表之次以當歸散加連翹荊芥水煎服及牛蒡湯加炒麻仁研碎同煎與宣熱拔毒其次赤葛散或初用化丹湯亦好有身上發時亦如前證不甚燥癢但見出浮於遍體神昏不悅名陰濕毒證先以沖和飲加南木香水姜煎服次用當歸散雄黃散然此二證不問赤白若入腹入腎多致為害不可輕視如常自取困爾湯小兒丹毒乃熱毒之氣極與血相搏而風乘之故赤腫及遊走遍身者又名赤遊風入腎入腹則殺人也大抵丹毒雖有多種病源則一有赤丹毒遍身癢者或女子十五六而脈未通者多發丹疹皆由血有風毒乘之宜服防己散葛根白朮散治小兒赤白丹毒白朮枳殼各一錢茯苓二錢木香一錢半葛根三錢甘草二錢半上銼散用水一盞煎不拘時服犀角解毒散治小兒赤丹瘤壯熱狂燥睡臥不安胸膈悶滿咽喉腫痛遍身丹毒牛蒡子炒一兩五錢防風甘草各二錢半荊芥穗五錢犀角一錢半上銼散用水煎不拘時服防風升麻湯治小兒丹瘤赤腫防風升麻山梔去殼麥門冬去心木通甘草節各一錢上㕮咀用淡竹葉三片煎食遠服荊芥散防風天花粉羌活生地黃當歸蟬蛻各等分上水煎服百解散驚防己散漢防己半兩朴硝犀角黃芩升麻各一分黃耆各一分上㕮咀竹葉水煎量大小加減牛蒡湯咽喉化丹湯解利丹毒遍身燥癢發熱煩啼川獨活射干麻黃去根節青木香甘草黃芩薄桂刮去粗皮各五錢石膏末上銼每服二錢水一盞煎七分無時溫服治小兒一切丹毒漏蘆湯一名漏蘆散漏蘆麻黃去根節連翹川升麻黃芩白蘞甘草川芒硝各一分川大黃一兩銼微炒一方加枳實一分麩炒微黃赤芍藥一分銼上為粗末每一錢水一小盞煎至五分去滓溫服無時丹小兒黑癍紅癍瘡癢癮疹並用防風通聖散治之治小兒月內發一切丹藍葉散藍葉一兩黃芩犀角屑川大黃銼微炒柴胡去蘆梔子仁以上各一分川升麻一分半石膏一分半甘草半分微炙上為粗末每服一錢水一小盞煎至五分去滓下竹瀝半臺更煎三兩沸放溫無時量兒大小加減服後同氣怯弱者可去大黃治小兒一切丹遍身壯熱煩渴升麻散川升麻一分黃芩一分麥門冬三分去心葛根三分川大黃微炒一分川朴硝一分上為粗末每服一錢水一小盞煎至五分去滓溫服無時治小兒一切丹毒遍身赤痛大黃散川大黃半兩銼微炒防風半兩去蘆川升麻一分黃芩一分麻黃一分去根節秦艽去蘆一分川朴硝二分上同㕮咀每服一錢水一小盞煎至五分去滓溫服無時治小兒丹瘡臟腑壅熱太過心神煩悶大小便不通大黃散川大黃微炒川升麻川朴硝葵子各半兩梔子仁一分上為粗末每一錢水一小盞煎五分去滓量兒加減溫服以利為度治小兒一切丹發無常處身熱如火燒宜用升麻膏川升麻川大黃護火草蛇銜草梔子仁寒水石川芒硝藍葉生地黃芭蕉根羚羊角屑梧桐皮各半兩上細銼以竹瀝浸一宿明日漉出卻入鐺中以臘月豬脂一斤慢火熬一食久乘熱以綿濾去滓候冷成膏瓷盒盛旋取磨塗之兼以膏如棗大竹瀝化服之千金治小兒熱毒癰疽赤白諸丹毒氣瘡癤方漏蘆連翹白蘞芒硝甘草炙各一分大黃四分升麻枳實麻黃去節黃芩各一分半上以水一升煎取五合兒生一日至七日取一合分三服八日至十五日取一合半分三服十六日至二十日取二合分三服二十日至三十日取三合分三服三十日至四十日五合分三服又方治小兒丹毒大腫身熱百治不折寒水石十六分干藍青切竹瀝各一升犀角柴胡杏仁去皮尖熬研各八分生葛汁四合澄清知母十分甘草五分羖羊角六分芍藥七分梔子十一分黃芩七分蜜二升石膏十三分上水五升並竹瀝煮三升三合去滓內杏仁脂葛汁蜜微火煎二升三歲兒服二合大者量加之藥分太大嬰兒服未得又方治小兒丹數非一皆主之大黃甘草當歸川芎白芷獨活黃芩芍藥升麻沉香青木香木蘭皮各一兩芒硝三兩上以水一斗二升煮取四升去滓內硝湯中適寒溫拓之干再用瘥乃止湯張三太尉女年十五歲病此諸醫百藥俱試而不能中召余視之以生料四物湯加防風黃芩一日而愈生料四物湯治血熱生瘡遍身腫癢及脾胃常弱不禁大黃等冷藥尤宜服之生地黃赤芍藥川芎當歸防風各半兩黃芩一錢半上㕮咀水煎量大小加減忌酒面豬羊肉豆腐丹小兒赤瘤主傷血熱宜生地黃木通荊芥苦藥帶發表之類外以芭蕉油塗患處治小兒一切丹毒大赤腫身體壯熱如火巳服諸藥未減宜服藍青散方藍青知母梔子仁甘草微炙杏仁去皮尖雙仁麩炒微黃各半兩寒水石石膏犀角屑柴胡去苗黃芩各一兩赤芍藥羚羊角屑各三分上為粗末每服一錢水一盞煎至五分去滓入竹瀝蜜生葛等汁共一合更煎三兩沸放溫無時服量兒大小加減解毒散寒水石滑石石膏各等分上為末入辰砂少許量兒大小燈心湯下赤葛散治因血熱與風熱相搏遍身丹毒燥癢日久不消赤葛二兩甘草三錢上碎每服二錢無灰酒一盞煎七分無時溫服不飲酒者止用水一盞入酒一大匙同煎服泉州大智禪師文宥經進必效方載神聖治小兒頭面皮膚忽生瘡瘍火燎丹發起赤腫暈有碎小瘡及赤暈上瘡初發如錢漸暈開一二尺良久遍身入口耳到臟腑即不救此證可畏速治之此乃自積熱得甘草一兩或半兩上拍破入水一盞或半盞煎湯溫溫令乳母全口呷含漱徐徐吐淋洗病處以手掌與揩不得犯指甲仍與兒甘草湯吃一用即不暈開良久再淋三用立瘥治丹毒並土虺咬紅散子茜根半斤上為末每服二錢溫酒調下立效治小兒一切丹毒通用護火草半兩紫葛硝石各半兩上為末冷水調塗干即再塗以瘥為度治小兒一切丹毒遍身發熱硝石散硝石一兩乳香一分上為末以雞子清調塗之又方太陰玄精石一兩白礬一兩為末水調塗治小兒諸丹遍身如火纏腰即殺人蕓薹子不以多少研細酒調飲兼塗丹上一方以酒研細溫服無時治小兒一切熱毒丹及赤腫疼痛大黃馬牙硝研各一兩上先將大黃為末入牙硝同研水調塗患處干再易之簡要濟衆方治小兒丹毒從臍中起灶下黃土年深者細研上以屋漏水或新汲水和成泥貼之干即易子母祕録治小兒一切丹煩柳葉一斤上用水一斗煮三升日洗七八次緑袍散緑豆五錢大黃二錢上為極細末用生薑薄荷汁入蜜塗白玉散白玉即滑石寒水石各二錢半上為極細末用醋調塗或井水調塗亦得碧雪芒硝青黛寒水石石膏朴硝馬牙硝甘草各一錢上為極細末敷冰黃散治小兒赤瘤丹毒丹鈹刀子疏去瘤頭赤暈惡血毒汁土硝五錢大黃一錢上為極細末用新井水調勻塗湯又敷丹毒方只一夜消盡用花蕊石生薑薄荷自然汁調鵝毛刷上患處為妙胎毒發丹薛胎毒發丹者因胎毒內伏或頻浴熱湯或著烘衣或乳母飲食七情內熱助邪為患發於頭面四肢延及胸腹色赤遊走不定古人云從四肢起入腹囊者皆不治當急令人隨患處遍吮毒血各聚一處砭出之急服活命飲惟百日內忌砭以其肌肉難任也若發散過劑表虛熱而赤不退者用補中益氣湯加防風白芷寒涼過劑胃氣受傷而熱赤不退者用異功散加柴胡升麻或兼發搐等證用四君升麻當歸釣藤鉤若復用攻毒必致不起頭額間患者當臥鐮砭之一小兒患丹赤暈走徹遍身難以悉砭令人吮四肢胸背數處使毒血各凝聚而砭之先用活命飲末酒調二服又以金銀花甘草節為末用人乳汁調服漸愈月餘後兩足皆腫仍砭之服前藥而痊數日後兩足復赤或用犀角解毒丸之類致乳食不進肚腹膨脹此復傷脾胃而然也敷神功散服補中益氣湯加茯苓而痊一小兒腿如霞片遊走不定先以麻油塗患處砭出惡血其毒即散用九味解毒散而安一小兒臂患之砭出毒血而愈惑於人言服護心散以杜後患服之吐瀉腹脹患處復赤手足並冷余謂此脾胃虛弱前藥復傷用六君子湯一劑頓愈又以異功散加升麻柴胡而痊一小兒腿上患之神思如故乳食如常余謂毒發於肌表令急砭出毒血自愈不信外敷寒涼內服峻劑腹脹不乳而死一小兒患此二便不利陰囊肚腹俱脹急用砭法隨以活命飲加漏蘆木通大黃為末時用熱酒調服至兩許二便俱通諸證頓退卻去三味仍前時服而愈一小兒患此二便不利腹脹咳嗽用活命飲加漏蘆木通麻黃為末時時熱酒調服二便隨通遍身出汗諸證頓退鼻息似絶無氣以動時或似躁此邪氣去而元氣虛也急用當歸補血湯而愈砭法治丹毒赤色遊走不定令口吮毒血各聚一處用細瓷器擊碎取鋒芒者以箸頭劈開夾之甩線縛定兩指輕撮箸頭稍令瓷芒對聚血處再用箸一根頻擊刺出毒血輕者止用口吮出毒用藥敷之如患在頭者不用砭法止宜用針臥倒挑患處以出毒血遲則毒血入腹而難起矣神功散治丹毒最效若砭後毒甚者宜用如毒輕者砭後不可用恐砭處皮膚既破草烏能作痛也方見前條傷食發丹傷食發丹者因脾胃之氣未充乳食過多不能運化蘊熱於內而達於肌表也若因乳食停滯者先用保和丸消之大便祕結量加大黃通之乳食既消而丹尚作者用清中解鬱湯治之丹邪既去而乳食不思者用五味異功散補之發熱作渴或飲食少思者用七味白朮散補之大凡飲食厚味所致者赤暈或行而緩慢若飲燒酒或誤吞信石所致者遍身赤暈其行甚速又有瘡瘍發焮周圍有赤暈其熱消散或膿出自退凡此俱忌砭法皆宜安里為主不可攻伐若自吐瀉亦不可止之吐瀉中有發散之意因飲燒酒者飲冷米醋一二杯解之此神妙之法也因母多食炙爆膏粱或飲燒酒或服辛熱燥藥或鬱怒傷肝脾致兒為患者當參胎熱毒瘡瘍治之驚丹曾嬰孩生後百日之內半歲以上忽兩眼胞紅暈微起面帶青黯色向夜煩啼或臉如胭脂此伏熱在內亦有臉不紅者始因居胎之時母受重驚驚邪傷胎遞相傳襲形發於外初發時散生滿面狀如水豆腳微紅而不壯出沒休息無定次到頸項赤如硃砂名為驚丹用四聖散先洗其目次百解散加五和湯同煎與解驚熱丹毒牛蒡湯當歸散三解散黃芩四物湯皆可為治如驚丹發至胸乳間微有痰喘作搐急宜宣熱拔毒免致內流為害不淺五和湯加升麻生乾地黃水姜燈心煎服則自消除仍用前數藥調治不生他證或投萬安飲黃芩四物湯治諸瘡丹毒赤瘤燥癢黃芩一兩當歸酒洗生乾地黃赤芍藥川芎四味各半兩何首烏去粗皮草烏炮去皮玄參三味各二錢半甘草六錢薄荷二錢上㕮咀每服水一盞煎七分無時溫服四聖散初生目不開石解散驚五和湯發熱牛蒡湯咽喉當歸散三解散俱發熱五色丹聖惠夫小兒五色丹者由丹發而改變無常或青黃白黑赤此是風毒之熱有盛有衰或冷或熱故發為五色丹也孔氏家傳用小柴胡湯如法煎服以滓敷丹上良川大黃川芒硝梔子仁黃芩干藍葉商陸各等分為細末水調塗棗樹根四兩丹參三兩菊花一兩半銼細每二兩水五升煮三升避風適寒溫浴兒苧根葉一斤細銼赤小豆三合以水五升煮三升去滓避風處溫浴兒青栗球有刺者柞碎水煮浴兒蒲席灰雞白和塗牛屎敷之干即易豬槽下爛泥敷之干即易縛母豬頭骨臥枕之白丹夫白丹者由挾風冷之氣故使色白也初發癢痛微虛腫如吹奶起不痛不赤而白色也酸母草五葉草各五兩絞汁塗川大黃杵為末以馬齒莧自然汁調塗爛杵蓼葉塗爛杵蘭香葉塗醋和梁上塵塗豬脂和鹿角灰塗燒豬糞灰雞子白和塗張渙香豉散治白丹疰痛虛腫如吹方香豉二兩炒焦伏龍肝一兩上為末生油調塗之聖惠又云夫白疹者由風氣折於肌中與風相搏遂為疹也得天陰而冷則劇出風中亦劇得睛暖則滅身暖亦瘥宜用此方枳實銼上用水煮取汁洗拭丹上治小兒風熱毒腫白色或有惡核瘰癧附骨癰疽節解不舉白丹走滿身中白疹搔不已五香連翹湯青木香薰陸香雞舌香沉香麻黃黃芩各一分大黃八分麝香半分連翹海藻射干升麻枳實各二分竹瀝汁三合上水四升煮藥至一半內竹瀝煮取一升二合兒生百日至二百日一服二合二百餘日至晬一服五合外臺備急治白丹苧根三斤小豆四升上以水二斗煮日浴三四次兼治一切丹妙赤丹聖惠夫赤丹者由風毒之重故使赤也初發疹起大如連錢小者如麻豆肉上生粟色如雞冠故亦謂之茱萸丹也治小兒赤丹毒腫升麻膏川升麻白蘞漏蘆川芒硝各一兩黃芩枳殼連翹蛇銜草各一兩半梔子仁蒴藋各二兩上銼細以豬脂一斤半慢火煎諸藥令赤色去滓放冷瓷盒收旋取塗之治小兒面身卒得赤丹或癢或腫不速療之即殺人宜用此方羚羊角屑八兩上以水五升煎一升絹濾入煉了豬脂五兩和塗張渙升麻膏治赤丹初發肉如火色如雞冠又名茱萸丹川升麻白蘞漏蘆芒硝各一分連翹梔子仁各半兩上細銼以豬脂半斤慢火同煎諸藥令赤色去滓放冷塗千金云凡小兒丹初從背起遍身如細襭一宿成瘡名茱萸丹赤小豆為粉粉之如未成瘡以雞子白調敷之治小兒赤丹醋和蕎麥麵塗之唾調胡粉從外向內塗之豬脂和鍛鐵屎敷之雞白調黃米粉塗赤足蜈蚣為末入硫黃研勻水調翎掃頭焦即止天茄兒葉俗名老鴉眼睛取葉和醋擂敷以蓼子鹽湯洗了挼蓼塗之千金治小兒火丹色如朱皮中走醋研豉成膏敷鯉魚血頻頻塗研粟米塗黑丹聖惠夫黑丹者由風毒傷於肌肉故令黑色也初發癢痛或熛腫起微黑色也風化石灰二兩屋四角茅草三兩燒灰為末雞清調塗茺蔚子蛇銜草護火草各二兩杵爛雞白調塗青羊脂熟摩病上日三五度用之如無青羊白羊亦可但不及爾豬槽下泥塗又以餵豬杓子炙令熱尉之張渙祛毒丹治丹黑色癢痛腫起川升麻漏蘆芒硝各二兩黃芩梔子仁各一兩上為粗末每以水三盞煎兩匙頭末微熱以帛拓丹上以消為度天火丹聖惠夫小兒丹發肉中有如丹赤色者大者如手劇者遍身赤癢故號天火丹也本事天火丹從背起赤點用桑白皮末羊指調塗麻油五合生鯽魚半斤同杵如泥塗丹上干即易虎脂二兩黃丹一兩研為膏塗桑根白皮二兩甘菊花一兩半丹參莽草各一兩銼勻每用二兩水三升煮二升去滓溫浴兒避風以小兒埋胞衣瓶子中水一二合時時與兒服及塗身上有毒處千金治天火丹病初從髀間起小兒未滿百日犯行路灶君若熱流陰頭赤腫血出方用伏龍肝為末雞清調塗又方鯽魚肉銼五合小豆末三合杵成膏水和敷之良又諸火丹天火龍火著肉作瘡急以鹽湯噴次以山藥塗如無生者只以乾者為末水調塗又方以羊脂調赤石脂末塗之鬼火丹小兒丹發兩臂赤起如李子名鬼火丹治之方景天草五兩蛇銜草三兩杵如泥以雞血調塗戎鹽一兩附子一枚燒灰為末雄雞血調塗張氏戎鹽散戎鹽一兩附子一枚雄黃半兩水飛上同研為末每用少許以雄雞血調塗顱囟經治鬼火丹從面上起以雞清調灶下土塗立瘥野火丹聖惠小兒丹發赤斑斑如梅子遍背腹名野火丹千金凡遍身皆赤者名野火丹雄黃戎鹽各半兩為末雞白調頻塗以瘥為度灶中黃土一兩青竹葉二兩燒灰為末雞白調塗白殭蠶二七個護火草一兩杵爛塗之酒塗油塗雞清和赤豆末封之遍身者合塗之令遍家火丹聖惠小兒丹初發著兩頰兩膀上兩腋下名家火丹梓木白皮蓼葉各三兩燒灰雞白調頻頻塗之以瘥為度嬰孺方治家火丹攻喉入腹大不利方用硝石凝水石銅器中熬干研服方寸匕又方烏頭一分赤石脂三分研細雞清調塗神良殃火丹聖惠小兒丹初發兩脅及腋下腿上謂之殃火丹用川朴硝研為末每服以竹瀝調下半錢更量兒大小加減浮萍杵汁時時服之千金用伏龍肝為末生油調塗干易之若入腹及陰絞護火草汁服之張渙拔毒散川朴硝一兩梔子仁半兩為未醋調塗又方山梔子仁四兩生鯽魚半斤同杵如泥每以醋化少許塗丹上兼治神火丹神火丹聖惠小兒丹發兩膀不過一日便赤黑謂之神火丹景天草花絞汁先微揩丹上後塗之以瘥為度鯽魚半斤杵如泥塗之頻塗為良醋調梔子仁末塗熒火丹聖惠小兒丹發如灼在脅下正赤初從額起或從耳起而多痛名熒火丹赤小豆一合硝石半兩寒水石一分為末每以冷水調半錢日三服量兒加減張氏用冷水調塗灶中黃土一合生油二合同研如泥時用塗之以瘥為度若痛上陰不治即殺人也景天草杵爛以醋調塗朱田火丹聖惠小兒丹先發於背遍身一日一夜而成瘡名朱田火丹治法取棘根煮汁洗之若已成瘡用小豆末敷之未成瘡即以雞清調小豆末敷藍靛塗雞清塗天灶火丹聖惠小兒丹發兩膀里尻間正赤流至陰頭赤腫血出者是也治之方薺葉三兩赤小豆一合煅爐門上灰一兩青羊脂三兩蔥白二莖切上相和杵如膏磨之燥再磨之又方細辛一兩糯米一合景天草三兩杵如泥塗丹上瘥又方伏龍肝赤小豆等分為末雞子白調塗又桑根煮汁浴之車前子為末水調塗蠶砂一升水煮去滓洗鐵落末餳和如膏塗杵生浮萍敷千金云小兒丹從髀起小兒未滿百日犯行路灶君若熱流下至陰赤腫血出以雞清調伏龍肝敷又以鯽魚肉同赤白豆杵爛入少水和敷廢灶火丹聖惠小兒丹發從足趺起正赤者是也治之方寒水石硝石各半兩莽草一兩上為末每以新汲水調下半錢更量兒大小加減張氏用水調塗又方赤小豆一兩牛角二兩燒灰上為末雞白調塗又方五加葉根五兩燒灰以鍛鐵槽中水調塗棗樹根水煮汁浴三五次桑根煮汁洗尿灶火丹聖惠小兒丹發膝上從兩股起及臍間走入陰頭者是也治之方桑根白皮一斤銼以水七升煮四升去滓看冷熱避風浴之李樹根半斤燒灰為末取田中流水調塗以屋四角茅草燒灰為末雞白調塗以桑白皮李根同銼煎湯洗之赤流聖惠夫小兒身上或一片片赤色如胭脂及漸引此名丹毒俗謂之流若因熱而得者色赤或因風而得者色白皆腫而壯熱也可用一鈹刀散鐮去惡血毒未入腹者可療也治小兒心熱身上赤流色如胭脂皮膚壯熱升麻湯川升麻川大黃銼微炒川朴硝玄參各半兩犀角屑黃芩梔子仁木通甘草微炒各一分上為末每服一錢水一小盞煎五分去滓溫服無時量兒加減千金治赤流丹腫杵赤小豆五合水和取汁飲之一合良滓以敷五心又服黃龍湯二合並敷患上小柴胡湯去半夏名黃龍湯乳香散定疼天仙藤一兩焙乾為末乳香一錢研上每一錢溫酒下晏元獻公明效方牛黃散治小兒初生至二三歲一切風發赤白流走遍四肢方牛黃硃砂蝸牛肉全蠍白殭蠶天麻白附子乳香麝香各一分生龍腦一錢螳螂翅五對五月中採上十一味為細末每服一字薄荷水調下初生小兒洗了後用乳調少許塗口中胎疾永除張渙方治小兒赤流熱如火宜用大黃散川大黃生鬱金黃藥膩粉豬牙皂角去皮子各半兩上為末生油調塗又方護火草汁三合赤地利末三錢膩粉一錢上相和量兒大小加減服之良久瀉下血片為效其滓敷在赤處亦佳治小兒赤流半身色紅漸漸展引不止方牛膝去苗一兩甘草生半兩上銼以水一大盞煎五分去滓調伏龍肝末塗效又方大黃一兩生赤小豆半合炒紫色川朴硝三分為末雞白調敷勿令乾又方李子油三兩硃砂末一分調如膏塗之千金治小兒赤遊丹一日一夜即成瘡先從背起漸至遍身如棗大正赤色者用煮棘根洗法其法已見朱田火丹下所用敷藥並同玄胡散治小兒赤流玄胡索一兩天南星二兩朴硝半兩巴豆二七個去油上為末蕓薹汁調毛翎掃之治赤流白流火焰諸丹等方好生膽礬一錢重烏鰂魚骨一錢重蜈蚣一條全者焙麝香三十文輕粉二十文上一處乳鉢內研極細看丹多少用藥醋調令稀毛翎掃丹上立止治赤白流雄黃半兩白礬一分白芥子一分為末水調掃治小兒表裡受熱之甚忽發遍身赤腫狀似丹疹若於腹中周圍則不可救名曰赤油腫此藥如神胡荽不以多少上研取自然汁調水銀粉又曰輕粉鵝毛掃上病處須臾赤色便變為白或上有白㿔子不妨或自破亦無害乃是病去也調時不須太稠聖惠方云取摩蘿葉汁塗赤處隨手便瘥幼幼新書談氏殊聖方歌云五遊忽發遍身形恐悚令人怕怖驚乍睡剎那生滿體莫冤神鬼錯看承甘泉硝石蒼龍骨感攝消磨去痛疼更取鐵槽連底水調和頻掃便身輕宜消腫散清泉硝石白龍骨各一兩上研勻淨器收以鐵槽水調一錢掃塗立瘥身有赤處聖惠小兒因汗為風邪熱毒所傷與血氣相搏熱氣蒸發於外其肉赤而壯熱也治小兒身上有赤引於頰上或口旁眼下赤如胭脂向上皮即皴剝漸漸引多此是心熱血凝所為其治法宜以小刀子鋒頭鐮破令血出後宜服丹參散丹參黃芩枳殼去白麩炒葛根犀角鎊各一分麻黃去根節半兩上為末每一錢水一小盞入竹葉十片竹茹半錢煎五分去滓放溫量兒加減無時服治小兒身上有赤煩熱麥門冬散麥門冬去心蘆根銼葛根銼犀角屑漏蘆甘草炙微赤各半兩上為末每服一錢水一盞竹葉十片去滓放溫量兒加減無時服治小兒身上有赤或瘀腫或如火丹煩渴渾身赤壯熱鉛霜散鉛霜研緑豆粉各半兩用蕓薹菜自然汁調塗又方伏龍肝一兩為末亂頭髮二兩煅灰研水調塗赤處又方桃仁去皮研爛以面脂和塗水煮黃蒿穗濃汁入鹽少許溫服細研白礬末生油調塗杵芭蕉根汁塗杵水中苔水調塗水調芒硝末塗炒米粉令焦黑為末津唾調塗生蛇銜草搗爛塗蛇纏丹治蛇纏丹匝腰則死搗萵苣爛塗或研萵苣子塗之戴氏家傳用蘆箔上草繩經子燒灰同生油調塗廣利方杵馬齒莧敷之土鬼丹靈苑方治土鬼丹此病初發如湯泡頃刻則大連發不已或至數處便能致困宜速治之方赤足蜈蚣一條雞腸草金蕎麥各一分銅緑一錢麝香少許上為末如患者用針穿破卻用針眼上度藥在丹內上面用醋面膏子掩之如人有患不覺數日後吃食不得即先服下項藥大黃甘草各等分上為末新汲水下半錢或一錢立瘥治土鬼丹及馬汗入瘡大效烏梅焙糯米杏仁去皮尖研澱花各一兩鹽豉一兩半巴豆二十粒去心皮油煎研上為末糊丸先挑破瘡即以醋磨藥塗更以醋面蓋之服一二丸亦佳王師禁土鬼丹及蛇纏丹霹靂庚𩂍攝一氣念二十一遍吹在病處自立東南方上令病人在西北以大指掐中指本節文以第二指掐大指中節兩手皆然吹時即放手持咒四十九日於五更初向北受持可用骨火丹其瘡見骨著足踝者是也千金杵大小蒜厚封之嬰孺方刺腫上入二分以牛膽汁調大黃末塗之顱囟經二十二種丹證治灶囟丹先從頭上起滿身胤其丹赤色用豬槽下土並桃柳根皮搗末生油調敷灶尾丹從腰起黑色遍身疼痛用堂屋四角草燒灰入白礬末雞子白和塗龍火丹先從腹起至心胤黃赤色用屋脊上草燒灰松花白雞子黃豬槽內水調塗君灶丹從右手上起引似蛇行赤色用灶下土油調塗母灶丹從左腳上起用燖豬湯灶額上灰敷女灶丹從陰上起紫赤色用女兒小便生梅灶右邊磚縫上土和調塗朱黃丹從右腳起胤至遍身用屋四角草鐵匠家磨刀水調敷星子丹從頭起胤遍身如錢子大赤色用桃樹向北枝燒灰油調敷蜂子丹從頭面四向胤用灶頭上土入膩粉以雞子白調傳亂神丹天下惡證從肚內起出口內紫黑色用善火草白礬末並蜜入洗銀水調服之住火丹從背上起黃赤色用壁上土豬槽下土白礬末生薑汁生油調塗母子丹從眼眶上起用白礬蛤粉樟柳根杵汁和塗之火焰丹從前心起頭痛如火燒用善火草豬槽下土雞子黃調塗蜘蛛丹滿身病用白礬皂莢燒灰豬槽下泥和塗之佛家丹從耳起用乳香善火草瓦溜內土油調敷之神氣丹從頭背起用牯牛骨燒灰羊脂調塗熛火丹從背甲起用生麻油合豬槽下泥塗之又巢氏云丹發於背臂及穀道者名熛火丹嬰孺方治熛火丹用景天草十兩真珠一分杵為膏封丹上胡漏灶丹從臍中起用屋漏水調灶中土塗胡吹灶丹從陰上起用水茄窠下泥和苦酒塗之土灶丹從踝起用星四角茅草灶橫麻燒灰雞子白調塗野灶丹從背起用柔香茸蒴藋赤小豆末塗之立瘥神灶丹從肚起用土蜂窠杏仁膩粉生油調塗本事方十種丹瘤腫毒所起證治一飛灶丹從頂頭起先腫用蔥白研取自然汁塗二古灶丹從頭上紅腫痛用赤小豆末雞子清調塗談氏方同不拘何處皆治三鬼火丹從面起赤腫用灶心土雞子清調塗按不拘何處皆治妙四天火丹從背起赤點用桑白皮末羊脂調塗五天灶丹從兩腎赤腫黃色柳葉燒灰水調塗腎一作臂六水丹從兩脅虛腫用生鐵屑研末豬糞調塗七胡火丹從臍上起黃腫用檳榔為末米醋調塗八野火丹從兩腳赤腫用乳香末羊脂調塗九煙火丹從兩腳有赤白點用豬槽下土麻油調塗十胡漏丹從陰上起黃腫用屋漏處土羊脂調塗上此十種丹毒變易非輕治之或緩則致不救故豫不惜是方能逐一仔細辨認依此方法治之萬不失一如經三日不治攻入臟腑則終不救不可緩也赤白遊腫聖惠云夫小兒有肌肉虛者為風毒熱氣所乘熱毒搏於血氣則皮膚赤而腫起其風隨氣行遊不定故名也又云夫遊腫之狀者為青黃赤白無復定色遊走於皮膚之間肉上微光是也治小兒赤遊皮膚作片片赤腫此是風熱所致宜服犀角散犀角屑黃芩黃耆川升麻梔子仁漢防己川朴硝各一分牛黃半分研上為末煎竹葉湯調半錢無時量兒加減治小兒頭面身體赤毒腫起作片宜用升麻膏川升麻一兩犀角屑射干赤芍藥玄參黃芩梔子仁川大黃大青藍子羚羊角屑各半兩生地黃二兩上銼以豬脂一斤半於鐺中慢火熬不住手攪藥色變膏成去滓瓷合盛頻摩腫處又方黃柏末川大黃末川朴硝各半兩馬勃水銀各一分水銀於手心內用津研令星盡雞子三個去殼上同研成膏先以鈹針鈹破然後以膏塗之又方雞冠花商陸紫礦川大黃各半兩上為末以雞清入生油等分調塗干再塗又方附子去皮臍半兩川椒半兩去目石鹽三分上為末以煉了豬脂四兩相和慢火熬成膏瓷合盛候冷頻頻塗以瘥為度治遊腫攻頭面焮腫赤熱疼痛宜用鬱金散鬱金半兩赤小豆一合甜葶藶半兩伏龍肝二兩川芒硝半兩川大黃生半兩上為末以生雞子白並蜜少許調令稀稠得所塗之干再塗治遊腫赤者川大黃末二兩護火草五兩上相合杵塗之干易治赤白遊腫蕓薹子半合鹽一錢米醋一雞子殼上杵如泥看大小塗紙上貼之如走即隨處貼之不三兩上效治青白赤遊腫手近微痛川大黃生蒲黃伏龍肝各二兩上為細末水和如薄泥塗之干再用又方川大黃一兩生豉一合紫檀一兩上為末醋和塗干再用又方紫檀香二兩為末水調塗治遊腫流遍身赤色入腹即死以生豬肉敷上數數換之其肉蟲鳥不食臭惡甚也治遊腫以生布一片搵油以火燃之持照病上咒曰日遊日遊不知著脂火燎你頭咒七遍即瘥也治白遊腫杵生羊脾塗之又方栝蔞根二兩為末伏龍肝半兩細研醋調塗干再用子母祕録治小兒赤遊行於體上下至心即死以芒硝納湯中取濃汁拭丹上杵菘菜敷之取白豆末水和塗干再用千金中興治赤遊腫若遍身入心腹即殺人用灶下黃土為末油調塗勿令乾若已入腹及陰者以護火草取汁一盞服之乾者即末之水調服治赤白遊腫簇上白臭死蠶治白遊赤死者治赤遊並搗塗之治赤遊腫搗栝蔞敷之本草云赤遊白疹醋磨五毒草敷亦杵莖敷之恐毒入腹亦煮服之五毒草一名五蕺又名地圜平地生花葉如蕎麥根似狗脊丹入腹杵馬齒莧汁飲之以滓敷之又用生麻油塗之又濃煮大豆汁塗之嬰孺方主丹入腹及下至卵者不治方麻黃炒升麻各三分硝石四分上為末以井花水服方寸匕日三服一方加大黃半分劉氏家傳治走馬胎赤腫走入心腹則不救方生槐葉一握生栝蔞去皮同槐葉擂赤白豆末各三分上和塗患處其效如神丹痛搗竹萹汁及一升作一服只一二服效丹癢搗韭菜入些鹽與香油以手摩熱于丹上揩之立愈傳丹雜方治一切丹瘤以土硝為末薑汁醋調塗日三四上土硝即蜣螂土囊蠐螬窠也萆麻子五個去殼細研入白麵一錢水調微微塗之甚妙冷水杵茨菰葉莖雞翎掃腫便消研護火草汁塗研五葉草汁塗水調大黃末塗水研梔子仁塗水調黃芩末塗水研蒴藋汁塗臘脂調屋塵塗油調樺皮末塗唾調粟米粉塗水研糯米汁塗水煮白礬末塗醋調紅藍花塗煮白芷根葉塗杵鯉魚令爛塗蜜和乾薑末塗水調地龍糞塗杵大麻子汁塗燒粉家洗甕水塗水調韭畦中土塗雞清調榆根白皮塗不犯水羊脂炙塗以白粉敷之研胡荽汁塗醋磨訶子塗杵鬼目汁塗杵荏子汁塗研醬取汁塗研地黃汁塗研豆葉汁塗研海藻汁塗油調豉末塗水調青黛塗水研地龍塗水煮粟米塗酒煮石楠塗水調雞糞塗杵梧桐皮塗苦汁塗並服搗蒜塗治五色丹尤妙千金方言凡方中用雞子者皆取先破者用之它皆無力又言凡天下極冷無過藻菜但有患熱腫毒丹等取渠中藻菜細切熟搗敷丹上厚三分干即易之豫謂不可以此塗若毒在表猶可措手若抑之則外不得泄勢必入里必先服托裡藥方可施此辨小兒欲發丹毒候初生小兒蓄伏胎熱欲發丹者必先見於外但人不之察耳小兒在襁褓中無故眼生厚眵者此丹毒欲發之候也更微喘急者毒氣已甚而上乘於肺也才覺有此證急以水調龍腦飲子或藍根犀角等藥潛消其毒如渾身已有赤處即更以蕓薹等外挫其鋒消息而次第治之豫家凡兩兒初生眼有厚眵後俱發丹何宰宜人外孫女生七日眼生眵已而小腹下有赤丹一點如錢漸漸引開上至腹心而死不可不知也初虞世謂百日內發必死不治然亦有可治者不可不治也禁忌大凡小兒病諸丹腫其勢雖盛切不可遽用大黃芒硝輩決藥大下之恐毒氣乘虛入里以客為主即難施功也但用性平解毒托裡藥常調停臟腑微微通利而已此則護元氣而排外邪庶保十全也比舍陶氏子半歲病丹醫以青金丹下之太過蓄毒入里發喘生驚而死蓋嬰孺肌膚柔弱易虛易實而服藥復不能多治之固不可怠慢然亦不可躁急全在精專調護以保無虞世俗多不知此故廣記而備言之小兒丹發若預度其勢必展引至咽頸腹心陰尻諸虛處可先塗藥以護之仍砭砂其引頭所向微出惡血以泄其毒或謂當以篦子刮去惡血令盡直至清黃水出即止此必勢危氣壯而血熱者始宜之大抵此疾人受之有輕重年長氣實乃能禁當若未滿月兒而感之又重恐不可概用此法無為主簿張康道子二歲得火焰丹魯醫為砂之出惡血盞余兩日而殂不可不知也本草云大人小兒丹毒宜食鯽魚鱠及䖳䖳即水母俗名海蟄者是也然不可以宜食而恣食之反能為害鯽魚亦魚類得無不宜禁法無為南汰寺僧宋澄師傅西川文法禁火焰丹用松明五條細如箸以火點著一頭右手執之大指掐定第二指中節紋左手亦如此掐定面北立靜想北方壬癸水渺漫無際一口吸盡吹在火上再想再吹如是三次將火向自己口中試如不燒人即以松明火於小兒丹上周回焠一遭兼于丹上十字焠過即已如試得燒人疼更想吸水正旦及端午日受持疔瘡薛諸瘡惟疔毒為甚殺人亦速古云疔有十二種種各不同內三十六疔滿其數即不可救亦有不滿其數而死者乃毒氣走散故也若痘毒染人發於頭面或遍身者又非此類在小兒多因乳母食有毒之物或兒卒中飲食之毒或感四時不正之氣皆能致之其瘡多生頭面四肢形色不一或如小瘡或如水泡或痛或癢或麻木不仁外證寒熱嘔吐噁心肢體拘急大要當分邪之在表在裡急用隔蒜炙法並解毒之劑若不省人事牙關緊閉急以奪命丹為末熱酒調灌如食生冷之物或用涼水淋洗則輕者難愈重者不治其生於兩足者多有紅絲至臍生於兩手者多有紅絲至心生於唇口之內者多有紅絲入喉急用針挑出惡血以泄其毒可保無虞其在偏僻之處藥難導達者惟灸法有回生之功若投峻厲之劑是保其危矣小兒肌肉柔脆且不能言痛否灸法須將蒜切薄片著肉一面略剜少空灼艾燃蒜先置大人臂上試其冷熱得宜然後移著瘡上又別灼艾如前法試之以待相易勿令間歇飛龍奪命丹治瘡毒發背腦疽等證真蟾酥乾者酒化輕粉枯白礬寒水石銅緑乳香沒藥麝香硃砂各六錢蝸牛四十個另研如無亦可上各為末入蟾酥蝸牛或加酒少許糊丸緑豆大每服一二丸溫酒或蔥湯下重者外用隔蒜灸法時毒薛小兒時毒因感四時不正之氣致鼻面耳項或咽喉赤腫寒熱頭痛甚者恍惚不寧咽喉閉塞狀如傷寒五七日間亦能殺人脈浮數者邪在表脈沉澀者邪在裡在表用葛根牛蒡子湯在裡用梔子仁湯表裡俱病者犀角升麻湯甚則宜砭及用通氣散宣泄其毒旬日自消若不消而欲作膿者用托裡消毒散欲收斂者用托裡散若咽腫不能言頭腫不能食者必死通氣散治時毒焮痛咽喉不利取嚏以泄其毒玄胡索豬牙皂莢川芎各一錢藜蘆五分羊躑躅花三分上為細末用紙捻蘸少許紝鼻內取嚏為效犀角升麻湯治風熱口唇頰車連牙腫痛犀角鎊二錢升麻防風羌活川芎白芷各五分黃芩甘草各一錢白附子四分上每服三五錢水煎梔子仁湯治時毒腫痛大便祕結鬱金枳殼麩炒升麻山梔仁牛蒡子研碎炒大黃炒各等分上為細末每服二三錢蜜水調服葛根牛蒡子湯治時毒腫痛消毒解熱葛根管仲甘草江西豆豉牛蒡子半生半炒研碎各等分上每服三五錢水煎流注薛小兒流注乃氣流而滯血注而凝元氣不足之證也或因閃跌墮傷或因肝火氣逆或因六淫內侵或因脾虛食積或因稟賦所致結於四肢節骨界患於胸腹腰臀或結塊或漫腫或作痛悉用蔥尉之法須固元氣為主閃跌者和血定痛丸肝火者九味蘆薈丸食積者四味肥兒丸藥能對證未成自消已成自潰若膿成不潰者元氣虛也先補而針之庶使毒氣不致內攻氣血不致脫陷若膿出而反痛者氣血虛也用八珍湯作嘔少食者胃氣虛也用四君子湯欲嘔不食或腹作脹者脾氣虛也用六君子湯口噤搐搦者氣血虛極而變症也十全大補湯內熱晡熱陰血虛也四物參耆白朮表熱惡寒陽氣虛也十全大補湯熱來復去或晝見夜伏晝伏夜發者虛熱也當大補元氣若色赤腫起而膿稠者尚可治不赤硬而膿清或脈洪大寒熱發渴及不受補者皆不可治健脾滲濕飲治瘡瘍初起焮腫作痛或濕毒下注或環跳穴痛人參白朮蒼朮防己酒拌黃柏炒川芎陳皮當歸茯苓各五分木瓜不犯鐵器柴胡稍甘草各三分上姜水煎服如三五劑不退加桂少許酒煎亦可小便澀加牛膝身痛加羌活和血定痛丸一名黑丸子治流注膝風或閃跌瘀血肢節腫痛服之自消若潰而發熱與補藥兼服自效百草霜五兩赤小豆半斤川烏炮一兩五錢白蘞八兩白芨南星炮各二兩芍藥當歸牛膝各五兩骨碎補四兩上為末酒糊丸桐子大每服二三十丸白湯下神效蔥尉法治流注結核或骨癰鶴膝等證先用隔蒜灸若余腫尚存用此尉之以助氣行血散其壅滯功效甚速又治跌撲損傷止痛散血消腫之良法也其法用蔥細切搗爛炒熱頻尉患處冷則易之如鶴膝風兼服大防風湯而愈隔蒜灸法治流注及癰疽鶴膝風等證每日灸二三十壯痛者灸至不痛不痛者灸至痛其毒隨火而散蓋火以暢達拔引郁毒此從治之法有回生之功其法用大蒜去皮切三文錢厚安患處用艾壯於蒜上灸之三壯換蒜復灸未成即消已成者亦殺其毒如瘡大用蒜杵爛攤患處將艾鋪上燒之蒜敗再易如不痛或作膿或不起發及瘡屬陰證者尤當多灸凡瘡不痛不作膿不起發者皆氣血虛也多主不治惟患在頭面者不宜多灸論中嬰兒灸法見疔瘡如聖餅治流注及一切瘡瘍不能消散或潰而不斂乳香沒藥木香血竭當歸各等分麝香減半上為末用酒糊和餅二個乘熱尉之毒瘡加蟾酥當歸補血湯治流注及潰瘍肌熱面赤煩渴脈洪大而虛重按全無此血虛證也誤服白虎湯必死方見虛熱益氣養榮湯治流注氣血虛弱不能消散或四肢頸項患腫不問堅軟赤白或痛或不痛日晡發熱或潰而不斂方見後十全大補湯治諸瘡血氣虛弱不能消散潰腐收斂或寒熱汗出口眼歪斜肌瘦少食或日晡發熱自汗盜汗或朝寒暮熱瘡口不斂等證方見自汗天蛇毒薛手指頭生瘡俗名天蛇毒然五指各有經絡拇指屬手太陰肺經食指屬手陽明大腸經中指屬手厥陰心包絡經無名指屬手少陽三焦經小指屬手少陰心經亦有患於足者足趺屬肝膽胃三經大指屬肝脾二經次指屬膽經小指屬膀胱經各當隨經而治其致患之由或因胃中積熱所發或因乳母膏梁厚味所致或因濕熱下流或因風毒外中大率多由所稟足三陰之經虛故邪得以入之也其初患腫痛者先用仙方活命飲次用托裡消毒散元氣下陷重墜作痛久而不潰者用補中益氣湯若服敗毒散及敷寒涼之劑則瘡口變黑或胬肉突出或指皆黑大抵手足為氣血難到之處手屬於胃足屬於脾不可損其真氣丹溪以臀居僻位尚言氣血罕到況肢末乎故寒涼克伐之藥所宜深戒者也天泡瘡薛天泡瘡狀如水泡屬肺胃二經風熱若發熱焮痛邪在表也用人參敗毒散發熱咳嗽邪在肺也用加味瀉白散熱渴便祕邪在內也用加味清涼飲此肌膚之證當去毒水以金黃散或黃柏蚯蚓敷之當歸膏亦善既安不必服藥若因攻伐過度元氣虛而變生別證者當參各門治之柴芍參苓散治肝膽經分患天泡等瘡或熱毒瘰癧之類柴胡芍藥人參白朮茯苓陳皮當歸各五分牡丹皮山梔炒甘草各三分上每服二錢水煎服加味解毒飲治天泡瘡發熱作痛玄參連翹升麻芍藥當歸羌活生地黃牛蒡子炒各三錢茯苓甘草各二錢金銀花漏蘆各五錢上每服一二錢水煎服或為末蜜丸亦可金黃散治天泡瘡消毒止痛滑石甘草上各另為末和勻敷患處如泡挑去水敷之加黃柏尤好楊梅瘡薛楊梅瘡乃天行時毒亦有傳染而患之或稟賦所得者受證在肝故多起於下部治失其宜多致蝕傷眼目腐敗腎莖拳攣肢節初起之時上體多者先用荊防敗毒散下體多者先用龍膽瀉肝湯大便祕者用大連翹飲後用換肌消毒散若蝕傷眼目兼用九味蘆薈丸六味地黃丸肢節拳攣兼用蠲痹解毒湯若因脾胃虧損而不能愈者先用異功散後用換肌消毒散若用輕粉之藥多致敗證也按楊梅瘡起於近代多淫夫御不潔之婦傳染而致者其在小兒得之乳抱傳染者輕得之父母遺體者重治法與大人同更當求之專科薛氏治法未可盡遵用也換肌消毒散一名草薢散治楊梅瘡不拘初患日久並效土茯苓即萆薢當歸白芷甘草皂角刺薏苡仁白蘚皮木瓜不犯鐵器各等分上水煎食前並空心服又方治大人之劑如用前方未應或兒長大宜用此方土茯苓五錢當歸白芷皂角刺炒薏苡仁各一錢白蘚皮木瓜不犯鐵器木通金銀花各七分甘草連翹防風各五分茯苓芍藥各一錢炒黃耆炒二錢川芎生地黃各八分上作二三劑水煎出幼者作一劑煎分兩三次服王爛瘡聖惠云夫小兒腑臟有熱熱熏皮膚外為濕氣所乘則變生瘡其熱偏盛者其瘡發勢亦盛初生如麻子須曳王大汁潰爛如湯火所傷灼故名王爛瘡也治小兒王爛瘡一身盡如麻子有膿汁乍痛乍癢或時壯熱赤芍藥甘草白蘞各三分黃芩黃連去須黃柏微炙各半兩上為末蜜水調塗日三兩上瘥治小兒王爛瘡及惡瘡秫米竹筱上燒灰細研以田中禾下水調塗之立效治小兒王爛瘡初患一日肉色變二日夋包漿出或四畔時赤漸長若夋包漿匝身即不可治其狀如湯火燒宜速用黃連散黃連末胡粉各一兩上研勻以生油調塗之治小兒王爛瘡初起疱漿似火燒瘡宜用此方又桃仁湯浸去皮研細以面脂和塗又以艾燒灰敷干即用生油塗又十字街土並釜下土研敷之又燒牛糞灰敷又酒煎吳茱萸汁塗又酥和赤地末敷浸淫瘡治小兒身體發瘡初出甚小後有膿汁浸淫不已漸大名浸淫瘡若先從四肢起漸向頭面者難治也鯽魚一尾長三寸者豆豉一合上杵如膏塗之又療馬鞍瘡又方苦瓠一兩蛇蛻半兩燒露蜂房半兩微炙梁上塵為末油調塗又方伏龍肝三分亂髮三分燒為末豬脂和塗又方取雞冠血塗雞冠血和黃連末塗煎鯽魚膏塗生切鯽魚片和鹽貼患處燒胡燕窠水和塗之紅絲瘡有一種紅絲瘡雖非丹疹其毒實同多生於兩手中指節上男左女右則尤甚也其狀但一水泡清澄光瑩如小雞頭大其底下濈濈然數十小針孔不癢不痛都無妨礙泡邊當有一絲脈如紅絲隱隱在皮里其行甚速循臂而上過肘則危至心即死有此證者急以針迎頭挑斷或剜耳塞或嚼白梅封之絲即不行紹興庚午無為宰方梓字楚材與先子為同年秩滿代歸三日而殂詢其所以云無疾但左手中指生一小水泡耳蓋不知其為紅絲瘡也又衛提轄宜人云比鄰有女子忽中指節生一水泡色極清徹其底盡細細針孔歷歷可數傍有紅絲一縷舉家嬉笑忽有老嫗來見驚曰此紅絲瘡也當害汝命急就其泡上灼艾數十壯仍於絲上數處挑斷遂免惡核瘰癧巢氏云小兒遇風熱毒氣與血氣相搏結成頑核生於頸項遇風寒所折不消結成瘰癧久而潰膿成瘡也湯氏用宜服清涼飲子及升麻湯等千金連翹丸龍膽湯皆可服曾瘰癧一證先賢名曰九漏究其所因似熱稽考形狀非一不過隨象命名大概初發於頸項肌肉之間未成膿者從本引末可使衰去針之灸之敷之從其所因而施療然小兒幼弱豈堪針灸但以服餌塗貼之劑為治此疾多生於耳後及頸項兩旁初發止是一枚次必連生大小十數纏繞項下纍纍如貫珠逐個先腫作膿穿破輕者可愈重者難除先穴漏膿長歲不幹謂之漏項原其得病之初自是三陽感受風熱與血氣相搏而成治以百解散加當歸散水薑蔥燈心煎服次用玄參飲及牛蒡湯木通散內消丸與之宣熱化毒洗以槲皮散塗用白芨散二香散使氣血行膿干汁盡則自愈矣仍忌躁毒野味其證不致再作薛胎毒瘰癧者乃稟肝膽二經鬱火氣滯所致蓋肝膽經行人身之側若因肝火動而受患故發於肝膽二經部分當審其因而藥之或因乳母恚怒或血虛內熱者當審其所因而調其母不可用峻厲之藥恐傷元氣也一小兒落草頸間有癧五枚審其母素多怒時常寒熱或乳間作痛或脅肋微腫悉屬肝膽經證先用小柴胡湯加當歸芍藥寒熱頓退又用加味逍遙散母服兩月餘其兒亦愈一小兒因乳母肝經有熱耳前後患之用加味逍遙散治其母其兒自愈一小兒頸間耳下各結核三歲久服消毒之劑患處益甚元氣益虛診乳母素鬱怒致肝脾血虛而有熱用加味歸脾湯為主佐以加味逍遙散母熱漸退卻與兒日各數匙兩月餘而愈一小兒自落草時頸間患有四枚至五歲耳前後如貫珠元氣虛甚寒熱往來飲乳不徹此稟肝膽經氣滯之證用八珍逍遙二散與壯年婦人服之兒飲其乳半載之後兒體漸充其核漸消又服地黃丸逍遙散而全愈一小兒生下頸間瘰癧三枚將期敷藥延及耳前余謂此稟肝膽二經所致診其母肝膽脈尚洪數余謂母子一體治其母兒自愈不信另用必效散一服吐瀉並至一夕而歿熱毒瘰癧乃手足少陽足厥陰二經風熱之證或肝疳食積所致其證發於項腋或耳前後或如貫珠當分表裡虛實若焮赤腫者肝經熱毒也用人參敗毒散作痛塞熱者肝火內作也用加味小柴胡湯不痛而小便黃肝血虛也用六味地黃丸隱於肉裡而色不變者肝疳內作也用九味蘆薈丸膿成而不潰或潰而不斂者脾氣虛弱也用益氣養榮湯凡此腫焮疼痛寒熱作渴者屬病氣有餘形氣不足治宜清肝火生肝血腫硬不潰潰而不斂者屬病氣形氣俱虛治宜補腎水實脾土若因乳母恚怒肝火遺患者又當隨所因而治之一小兒膿水淋漓其核未消發熱憎寒此肝經氣血虛而有熱也用補陰八珍湯為主間以清肝益榮湯而愈後復結核小便赤澀晡熱作渴用參朮柴苓湯為主佐以六味地黃丸料加柴胡山梔及四味肥兒丸而斂一小兒十五歲患此發熱作渴日晡頰赤脈數無力屬陰虛而有熱用補陰八珍湯五十劑加參耆又二十劑而潰但膿水清稀肌肉不生此脾氣虛弱也以參耆歸術為主佐以芍藥熟地黃麥門五味氣血乃復遂進必效散一服毒下而痊一小兒患此服克治之藥致寒熱腹膨此肝脾疳證先用五味異功散加柴胡升麻佐以九味蘆薈丸漸退又用四味肥兒丸五味異功散而消一小兒九歲患此面色常青腫硬不潰肉色不變乃伐肝化痰余曰當調補肝脾不信果虛證峰起復請治仍欲伐肝余曰面帶青色肝虛而本色見也面色變白肺虛而本色見也痰涎上湧脾虛而不能攝也兩目連札肝血虛而生風也經云胃為五臟之本當先救胃氣遂用五味異功散加升麻柴胡元氣稍復乃朝用補中益氣湯夕用五味異功散佐以九味蘆薈丸面色始黃而核漸消又以四味肥兒丸間服地黃丸而愈百解散驚當歸散潮熱牛蒡湯咽喉大聖散治瘰癧消風毒腫上壅內熱多生癮疹風丹風證食煎爆多致此疾羌活荊芥升麻薄荷防風甘草大黃黃芩玄參各等分或加赤芍藥連翹上為末每二錢水一盞煎六分溫服又方用牡蠣二兩火煅為末玄參一兩甘草半兩為末每服二錢茶清調下玄參飲治瘰癧及頭上生惡核腫痛玄參升麻各五錢川烏炮裂去皮臍草烏炮裂去皮當歸酒洗川芎赤葛生干地黃赤芍藥各二錢半甘草三錢大黃半生半炮四錢上銼每服二錢水一盞姜二片煎七分無時溫服升麻湯升麻射干連翹犀角屑大黃微炮朴硝各半兩上㕮咀水煎大小加減忌酒面炙爆物木通散淋柴芍參苓飲治肝火血熱遍身搔癢或起赤暈或筋攣結核柴胡芍藥人參白朮茯苓陳皮當歸各五分牡丹皮山梔炒甘草炒各三分上薑棗水煎服清肝益榮湯治肝膽經風熱血燥筋攣結核或作瘊子柴胡龍膽草酒拌炒各五分當歸川芎芍藥各一錢熟地黃自制白朮炒木瓜不犯鐵器山梔炒茯苓薏苡仁各五分甘草三分上水煎服加味小柴胡湯治肝膽經風熱耳前後腫痛或結核焮痛或寒熱晡熱口苦耳聾等證柴胡二錢黃芩炒一錢人參半夏各七分甘草炙五分山梔牡丹皮各一錢上姜水煎徐徐服去山梔牡丹皮即小柴胡湯益氣養榮湯治氣血虛弱四肢頸項等處患腫不問腫潰日久不斂俱宜服之人參茯苓陳皮貝母香附炒當歸酒洗川芎黃耆炒熟地黃自制芍藥炒各一錢甘草炙桔梗各五分白朮炒柴胡六分上每服二三錢姜水煎必效散治瘰癧元氣無虧者宜用此方若元氣怯弱者宜先補而後服之癧毒已下便與滋補庶無他患若孕婦及虛勞氣鬱所致者尤不可服世以此方為良劑故並注之南硼砂二錢五分輕粉一錢麝香五分巴豆五粒去皮心膜白檳榔一個斑蝥四十個去頭足翅同糯米炒去米上為末取雞子二個去黃用清調藥入殼內以濕紙數重糊口甑蒸熟取出曝乾研細每服五分用炒生薑酒五更調服如毒出小便澀痛用益元散一服其毒出而不痛貼惡核方赤小豆豬牙皂莢硝石黃藥木鱉子各半兩上末雞子清調塗患處貼散瘰癧神效方白膠香降真香用心無土氣者海螵蛸上等分為末糝患處外以水紙掩之一夜而退興化李八哥傳貼瘰癧膏藥未破者即消已破者即出惡物收斂神驗良方輕粉麝香珍珠血竭沒藥乳香黃蠟銅青各六分松香八錢杏仁二十枚去皮尖萆麻子二十枚去殼以上十一味各研極細末攪和用瓷杵鉢搗成泥膏不犯鐵器不見火將膏掐敷絹上以手撲薄貼治痹癧破潰不斂者方用燒人場上紅黃土研細洗淨患處摻之神效薛驚風結核屬肝膽二經風木相火用事木旺生風熱同化其病抽掣擾動此乃風熱血燥而然耳蓋風動則肝火盛火盛則肝血內消血不能養筋故筋攣結核如貫珠然頸項兩側正屬肝膽經部分治宜滋腎水清肝火養陰血壯脾土蓋腎水旺則肝火自清肝火清則陰血自生陰血生則相火自寧火既寧則無熱傷元氣火乘土位之疾矣一小兒甫周歲項間結核兩臂反張索敗毒之藥余意此屬肝經血燥詢之果前患驚風曾服硃砂等藥遂與六味地黃丸滋其肝血數服而愈一小兒項側結核痰盛發搐服金石香燥之劑手足筋攣此肝血復傷即急驚也遂用加味小柴胡湯加釣藤鉤山梔芎歸六味丸料加五味麥門而痊一小兒每受驚項間結核發熱減食睡間四肢微抽此肝木侮脾土也用五味異功散加柴胡升麻釣藤鉤隨愈畢姻後腿臂腕間結核誤服行氣破血藥腿臂筋攣肌體消瘦如瘵證余考績到京用地黃丸生肝腎之血佐以補中益氣湯補脾肺之氣而愈一小兒耳前後結核遇驚即痰盛咬牙抽搐搖頭恪服香燥之藥以致慢驚而卒皂角子丸治肝膽經風熱項脅兩側結核皂角子用仁炒二兩連翹八錢當歸柴胡芍藥炒山梔炒川芎各一兩桔梗炒龍膽草酒拌炒黑甘草炒各四錢上為末米糊丸緑豆大量兒大小加減滾湯下人參敗毒散治小兒風熱瘙癢頑核毒瘡或解脫衣裳風邪所傷惡風發熱胸膈生痰頭目不清方見後九味柴胡湯治肝經熱毒下注患便毒腫痛或小腹脅間結核凡肝膽經部分一切瘡瘍或風毒惡核瘰癧柴胡炒黃芩炒各五分人參山梔炒半夏龍膽草炒當歸芍藥炒各三分甘草二分上水煎服若腫痛赤色元氣無虧者宜用潰後腫消痛止者不宜用大凡腫硬不潰潰後不愈者因元氣虛也午前宜用四君歸耆升麻午後宜用四君芎歸柴胡為主佐以九味蘆薈丸若飲食少思者宜用五味異功散專補胃氣若膿水清稀而見一切諸證皆因血氣內虧但溫補脾胃飲食加進血氣化生諸證自退設治瘡邪是虛其虛也禍不旋踵矣琥珀膏治瘰癧不潰或潰而不愈變成漏證琥珀木通桂心當歸白芷防風松香硃砂丁香木香木鱉子肉各二兩上先用琥珀丁香桂心硃砂木香為末其餘㕮咀以麻油二斤六兩慢火煎至白芷焦黑濾去渣徐下黃丹一斤以柳枝不住手攪至黑色滴水捻軟硬得中卻入琥珀等末攪勻於瓷器盛之用時取少許攤貼益脾清肝散治肝火侮脾飲食少思發熱或寒熱往來瘡不能消散方見後補陰八珍湯治元氣虛弱不能潰斂或內熱晡熱肌體消瘦即八珍湯加酒炒黑黃柏知母瘡疥海小兒經絡蘊熱頭面及身體生瘡四君子加栝蔞根桔梗各半錢煎服湯小兒惡瘡天氣溫和頻與澡洗更衣名曰外宣亦不宜服藥小兒不得已而服藥此乃下法若將養合宜何疾可侵更令乳哺有節勿令過飽其身乃如藥樹此養生之理也湯惡瘡方頻浴身安外宣無病春用柳條荊芥夏用棗葉槐枝秋冬用苦參俱煎湯洗浴加味羌活散治小兒四氣外搏肌膚發為癮疹憎寒發熱身癢羌活前胡各一兩人參桔梗茯苓甘草炙川芎枳殼麩炒天麻各半兩蟬蛻去須薄荷各二錢上銼碎每服三錢水一盞生薑三片煎至六分不拘時服當歸飲子治小兒心血凝滯內蘊風熱發見皮膚遍身瘡疥或腫或癢或膿水浸淫當歸去蘆赤芍藥川芎生地黃蒺藜炒去刺荊芥穗防風去蘆各一兩何首烏黃耆去蘆甘草炙各半兩上銼碎每服四錢水一盞姜三片煎六分服無時胎毒瘡疥因稟胎熱或娠毋飲食之毒七情之火初如干癬後則膿水淋漓或結靨成片如發於兩耳眉或耳前後髮際之間屬手少陽經若發於四肢屬脾胃經發於兩脅屬肝經發於額屬心經發於腦屬膀胱經發於頦頰屬腎經當隨各經所主五臟勝負及乳母食啖厚味鬱怒所傳致而調治之不可輒用化毒犀角等丸設元氣復傷轉變他證尤為難療一小兒遍身患之服牛黃解毒丸皆愈惟頭結痂作癢出水此稟腎經虛熱用地黃丸解毒散而愈一小兒患於髮際之間作癢診其母有肝火用加味逍遙散加漏蘆用牛黃解毒丸解毒散而愈解毒散一名托毒散一小兒患於左耳髮際漸延上頭作癢此稟肝膽二經熱毒用柴胡清肝散母子並服而愈後不戒膏粱復發膿水淋漓右頰赤色此胃經有熱先用清胃散仍用柴胡清肝散治肝火母子俱服又用立效散牛黃解毒丸而愈一小兒兩眉患之延及遍身四肢為患膿水淋漓寒熱往來屬肝脾積熱用清胃散小柴胡湯立效散而愈後眉間復患兩目連札小便白濁用四味肥兒丸九味蘆薈丸而愈一小兒因乳母不戒七情厚味患此久不愈母用清胃逍遙二散子用牛黃解毒丸愈後兒食甘味眉間生瘡癢痛目札用四味肥兒丸為主佐以加味逍遙散清胃散而愈一小兒遍身患之兩脅為甚子用四味肥兒丸立效散母用柴胡梔子散而愈牛黃解毒丸治胎毒瘡癤及一切瘡瘍牛黃三錢甘草金銀花一兩草紫河車五錢上為末煉蜜丸量兒服立效散治鬢瘡耳瘡及一切瘡疥定粉末松香末黃柏末黃連末枯礬末各一兩上各另為末用清油燭油調搽敷藥解毒散治一切毒瘡風疹癢痛大黃黃柏山梔寒水石各等分上為末水調搽若破而膿水淋漓用當歸膏或清燭油調尤善柴胡梔子散發熱四味肥兒丸疳九味蘆薈丸疳金黃散天泡瘡熱毒瘡疥因乳哺過早或嗜甘肥臟腑積熱或母食膏粱厚味或七情內火所致當分臟腑所屬之因病之虛實調其血氣平其所勝如肝經實熱用柴胡清肝散虛熱用六味地黃丸心經實熱用導赤散虛熱用補心湯脾經實熱用瀉黃散虛熱用補中湯肺經實熱用瀉白散虛熱用五味異功散腎經熱用六味地黃丸大凡手足冷者屬虛寒手足熱者屬實熱脈沉數有力作渴飲冷大便乾實此邪在裡宜內疏若脈浮數有力作渴飲冷此邪在表宜發散若脈浮大按舉無力或作渴飲湯乳食少思此真氣虛而發熱也調理脾胃其病自愈切不可用寒涼之劑復損真氣嬰兒宜調治乳母為主一小兒脅間患此寒熱如瘧小便頻數此稟肝火所致先用柴胡清肝散又用加味逍遙散而愈後因乳母肝火動而復發用加味逍遙散及八珍湯加牡丹皮山梔母子服之並愈一小兒腹間患此發熱便血面黃少食或作嘔或作瀉手足時冷右關脈弦數此脾土虛弱肝火為患先用五味異功散加升麻柴胡山梔益肝氣清肝火後用地黃丸滋腎水生肝血而愈一小兒腿內股患此色赤不愈發熱面色或赤或青此稟腎陰不足而木火熾盛先用柴胡梔子散以清肝心後用地黃丸以補肝腎而愈一小兒肘間患此作渴飲冷右寸關脈數而無力此胃經積熱傳於肺經也先用瀉黃瀉白二散漸愈後用五味異功散四味肥兒丸而愈一小兒嗜膏粱甘味先患背胛後沿遍身淋漓此飲食之熱而傷脾血也先用清胃瀉黃二散而愈但形氣怯弱用五味異功散而元氣復諸疳瘡疥因脾胃虧損內亡津液虛火妄動或乳母六淫七情飲食起居失宜致兒為患當分其因審其經而平之如面青寒熱或白翳遮睛肝經之證也面赤身熱或作渴驚悸心經之證也面黃體瘦或作渴泄瀉脾經之證也面白咳嗽或鼻間生瘡肺金之證也面黧體瘦或喜臥濕地腎經之證也嬰兒宜調治乳母若不審五臟勝負形病虛實妄行敗毒多致不救湯敷瘡藥方剪刀草黃連苦參上等分為末先洗淨次用麻油輕粉調敷田瘡癬治法浸淫瘡宜用苦瓠散塗之乾癬宜用羊蹄根絞自然汁調膩粉塗之濕癬宜用青金散貼之苦瓠散治小兒浸淫瘡漸展不止苦瓠二兩蛇蛻燒灰蜂房微炒各半兩梁上塵一合上為細末生油調塗攤帛上貼青金散治小兒濕癬浸淫瘡白膠香研一兩輕粉半兩青黛二錢半上研為細末干糝瘡上祕録治小兒風疹白礬十二分熱酒熔化馬尾蘸酒塗山小兒頭面爛瘡木耳舂細蜜調敷又冷水調平胃散敷俱干則易之癍疹潔古云癍疹之病焮腫於外者屬少陽相火也謂之癍小紅靨隱於皮膚中者屬少陰君火也謂之疹癍疹並出則小兒難禁然首尾俱不可下大抵安里藥多發表藥少小便祕則微疏之身溫者順身涼者逆大忌外敷寒涼內用疏導無此二者可保無虞葛根橘皮湯治發癍煩悶嘔吐清汁兼治麻痘等證葛根陳皮杏仁去皮尖麻黃去節知母炒甘草炙黃芩各半兩上每服二三錢水煎服玄參升麻湯治癍疹已發未發或身如錦紋甚則煩躁語言喉閉腫痛玄參升麻甘草上每服二三錢水煎服化癍湯人參石膏知母甘草各二錢上每服二錢水一盞入糯米半合煎六分米熟為度去滓溫服荊防敗毒散即人參敗毒散加荊芥防風人參敗毒散治瘡瘍邪氣在表應發者若憎寒壯熱項強脊疼或噁心咳嗽亦宜用之人參伏苓川芎羌活獨活前胡柴胡枳殼麩皮炒桔梗甘草炒等分上每服二三錢水煎東垣人參安胃散治癍疹因服峻厲之劑脾胃虛熱泄瀉嘔吐飲食少思等證人參一錢黃耆炒二錢生甘草炙甘草各五分白芍酒炒七分白茯苓四分陳皮三分黃連炒二分上為末每服二錢水煎服犀角消毒散治癍疹丹毒發熱痛癢及瘡疹等症牛蒡子甘草荊芥防風各五分犀角鎊末二分金銀花三分上水煎熟入犀角傾出服地龍散治小兒風熱癮疹狀如傷寒耳尖及手足冷地龍洗去土半兩焙乾穿山甲半兩以皂角灰炒令黃硃砂二錢研細上前二味為細末後入硃砂一處再研和勻每服一錢用紫草煎湯調下不拘時量兒大小加減消毒飲咽喉清涼飲子裡熱治大人小兒癮疹入腹即殺人方用蕪菁子末酒調服三錢小兒加減又酒服牛膝末三錢小兒減之又以鹽湯洗了挼蓼子敷治風腫及癮疹巴豆五十個去皮以水三升煮取一升以綿浸湯中適寒溫以拭病上隨手瘥治風疹入腹身體強腫舌乾燥硬蔓菁子三兩為末每用溫酒調一錢治風疹癢不止酪五合鹽一兩二味相和煎過摩病處立瘥又方蛇蛻皮一條水一升煎半升雞翎掃揩上即瘥又方白礬五兩為末以酒三合小便一升煎如稀膏以綿蘸藥於病上輕手揩之令熱徹入皮膚須臾消盡此方神奇能治百計不瘥者出聖惠黃水黏瘡薛小兒黃水黏瘡屬肝脾二經風熱積熱所致邪在表而痛癢者輕則犀角消毒散重則連翹防風湯邪在內而大便祕者輕則九味解毒散重則大連翹飲若頭目不清憎寒壯熱作渴便祕者表裡俱有邪也加味清涼飲若誤服克伐之藥而致發熱惡寒者肺氣傷也用四君桔梗柴胡發熱嘔吐胃氣傷也用異功散發熱作瀉脾氣虛也用六君子湯並加柴胡升麻余當隨證裁之大連翹飲治風毒熱毒發熱作痛二便不利表裡俱實柴胡梔子散治肝膽風熱生瘡作痛發熱或瘡破而膿水淋漓或發寒熱晡熱犀角消毒散治熱毒積毒發於肌表而頭面生瘡或痛或癢者方見癍疹荊防敗毒散治風熱相搏邪氣在表患瘡瘍之類寒熱作痛者方見前補中益氣湯治瘡瘍之類過服敗毒之藥致中氣虛弱發熱或寒者方見虛熱六君子湯治瘡瘍脾胃虛弱不能飲食更或嘔吐而瘡不愈者方見脾九味解毒散治熱毒胎毒而發瘡瘍之類未潰作痛者黃連炒芍藥防風甘草各三分金銀花連翹各一分當歸八分山梔四分白芷六分上作一劑水煎母子並服加味清涼飲治熱毒積毒在內患瘡瘍大便不通而欲痛作渴者當歸赤芍藥甘草炙大黃炒各三分山梔炒三分牛蒡子炒杵四分上水煎服人參消風散治諸風上攻頭目昏眩項背拘急肢體煩疼肌肉顫動耳若蟬鳴鼻塞多嚏皮膚頑麻搔癢癮疹目澀昏困人參白殭蠶茯苓防風芎藭藿香蟬蛻厚朴薑製羌活各三錢荊芥穗炙甘草陳皮各五錢上每服一二錢水煎連翹防風湯治小兒肝脾風熱時毒頭面生瘡連翹研碎防風黃連陳皮芍藥當歸獨活白蒺藜炒去刺荊芥茯苓甘草黃芩牛蒡子炒研各等分上每服二錢水煎服和肝補脾湯治風熱瘡疹脾土不及肝木太過人參陳皮川芎各五分山梔炒四分白朮茯苓芍藥各七分柴胡甘草炙各三分上分二劑水煎服益脾清肝湯治肝脾風熱瘡寒熱體痛脾胃虛弱人參白朮茯苓甘草川芎當歸黃耆各三分柴胡牡丹皮各二分上水煎服三黃散治風熱疳熱生瘡水浸淫膿流處便濕爛松香五倍子黃連黃丹海螵蛸各一錢輕粉雄黃各少許上為末用瑩肌散煎洗滲之乾者油敷立效散定粉松香黃柏黃連枯礬各一錢上為末用清燭油調搽頭面瘡薛人身諸陽之氣會於首而聚於面其有患瘡痍者因臟腑不和氣血凝滯於諸陽之經或稟賦腎陰虛肝火或受母胎毒或乳母六淫七情或食膏粱醇酒或兒食甘肥厚味所致其因不同當各辨其經絡審其所因而治之若發於目鋭眥耳前上頰抵鼻至目內眥者皆屬小腸經發於巔及頭角下頰耳後腦左右者皆屬膽經發於頰前鼻孔及人中左右者皆屬大腸經發於鼻之挾孔下唇口及承漿耳後頰車耳前髮際額顱者皆屬胃經發於目內眥上額尖至後腦項者皆屬膀胱經既察其經即當分治若稟腎火者用六味地黃丸腎胎毒者犀角消毒丸見前食積疳者四味肥兒丸疳乳母膏粱者東垣清胃散齒至於諸腑受病必兼諸臟故患於額間屬心經發熱飲冷者為實熱用導赤散心發熱飲湯者屬虛熱用養心湯左腮屬肝經或頸項徑強者為實熱用柴胡清肝散熱或咬牙頓悶者虛熱用六味地黃丸右腮屬肺經喘嗽飲冷者為實熱瀉白散肺發熱咳嗽者為火刑金用人參平肺散嗽鼻間屬胃經發熱飲冷大便黃硬者為實熱用瀉黃散脾發熱飲湯大便青白者為虛熱用異功散患於頦及耳輪者屬膀胱經腎無實證唯用地黃丸若瘡已潰久而不愈則當審其臟氣之相勝病邪之傳變而以調補脾胃為主若因乳母遺熱為患者當先治其母則兒病自愈也養心湯治心氣不足虛熱上攻而患瘡瘍者黃耆炒白茯苓半夏曲當歸川芎辣桂柏子仁酸棗仁炒五味子杵人參各三錢甘草炒四錢上每服一二錢薑棗水煎為末服亦可牛黃解毒散治胎毒頭面生癩或延及遍身癢痛不安浸淫不愈及眉煉瘡生甘草一兩牛黃五錢膏粱之子必用之金銀花一兩上各為末每服二三分乳汁調服或用甘草煎膏為丸芡實大每一丸白湯化服外敷青金散亦可拔毒散治證同前及疥癩瘡癬黃芩黃連白礬三味俱生用雄黃各五錢銅緑二錢癢甚加之松香上各另為末干糝患處或用油調搽疥瘡宜加枯礬三錢頭瘡小兒頭瘡是六陽受毒熱而攻頭成瘡也若頭上散成片常常燥癢毛髮稀少有類白屑此因積熱上攻名曰禿瘡瘡雖生於頭世人只知以藥外敷得愈不逾旬月其瘡又發何為而然蓋頭者諸陽所會之處洪範五行火曰炎上熱毒上攻兩陽相灼故瘡生於頭法當解陳莝音銼之積熱導心經之煩躁斯可矣世治久癩頭用黃連細末敷之治年久癩頭內用苦參丸食後服之外用苦參末油敷之二月愈丹又方用防風通聖散酒製除大黃另研為末再用酒拌曬乾為末每一錢水煎服日四五服至三十帖見效又方川芎片芩酒芍藥酒陳皮各半兩白朮酒當歸酒各一兩天麻酒七錢半蒼耳七錢半黃柏酒粉草酒防風各三錢上㕮咀煎服四五次服之服過睡片時小兒癩頭用燒紅炭焠長流水令熱洗之仍用芫荽子煎豬脂去滓用脂敷患處又法用胡荽子伏龍肝懸龍尾黃連白礬為末油調敷頭瘡方豬油一錢半生半熟雄黃水銀各二錢半上研和勻敷瘡上又方治小兒癩頭並身癩等證用松皮燒灰白膠香枯礬大黃黃柏油調敷患處又方用臘月馬脂油搽患處極效簡頭瘡大筍殼燒灰量瘡大小用灰調生油敷又加膩粉佳祕録小兒頭身諸瘡燒雞卵殼和豬脂敷之世治癩頭松香一兩干銚熔開安在石上候冷取起輕輕研細黑龍尾即屋塵垂掛者黃丹各三錢白芷半兩松樹皮燒灰存性水銀雄黃白礬各二錢上為末以血餘入香油煎爛調敷患處鱔攻頭瘡方用敗龜板酥炙為末以飛面少許和油調塗頂上留孔出毒不可調太柔面瘡世治小兒面瘡通面爛無全膚膿水流漓百藥不效者陳年臘豬油不入鹽者敷之神效眉煉瘡薛眉煉者謂小兒兩眉間生瘡如疥癬當求其因而藥之蓋眉屬膽經若原稟肝膽經熱或乳母肝膽經有熱者用柴胡梔子散或乳母食厚味醇酒者用加味清胃散或乳母有鬱怒者用加味逍遙散俱與乳母服子亦飲少許仍參前證主之田眉煉治法用青金散敷之如不愈燒小麥存性研細好油調塗青金散治小兒疥癬眉煉或延及遍身瘙癢或膿水淋漓經年不愈松香二兩真蛤粉五錢青黛二錢五分上為末用燭油調搽或干糝之或加輕粉枯礬各三錢以治前證及胎毒疥癩尤效耳瘡丹小兒耳後月蝕瘡蚯蚓糞燒以豬油和敷胡粉雞清和敷黃連末敷竹葉燒末豬脂和敷水銀膏治月蝕瘡多在兩耳上及竅傍隨月虛盈水銀二錢半胡粉松脂黃連去須為末各半兩豬脂四兩上先熬豬脂令沸下松脂諸藥末及水銀攪令勻瓷盒盛先以鹽湯洗淨瘡塗敷日三五度胡粉散治月蝕瘡胡粉炒微黃白礬煆虢丹煆黃連淨輕粉各二錢胭脂一錢麝香少許上末先以溫漿水入鹽洗拭後摻藥如瘡干麻油調敷湯氏云耳有五般常出黃膿者為停耳出紅膿者為膿耳出白膿者為纏耳疳臭者為五耳耳內虛鳴出青膿者為震耳證雖五般病源一也皆由風水入耳而因有積熱上壅而成若不早治久則成聾宜胭脂膏治之仍服化痰退熱等劑即愈也蔓荊子湯治內熱耳出膿汁升麻木通麥門冬赤芍藥生地黃前胡甘菊甘草桑白皮赤茯苓蔓荊子各等分上用薑棗水煎食後服清上散治上焦風熱耳出濃汁頭面瘡癤亦治胎熱眼睛腫赤糞色稠黃肚熱啼哭及身上紅腫川鬱金甘草北桔梗天花粉乾葛薄荷葉各等分上為末入蜜拌勻白湯下三五七分或一錢仍用艾葉煎濃湯溫浸足底以引其熱下行當歸龍薈丸治肝膽風熱耳中鳴出青膿名曰震耳大便祕小便黃常服宣通血氣調順陰陽當歸龍膽草柴胡各一兩青黛膽星大黃蘆薈各五錢麝香五分梔子酒黃芩酒黃連黃柏各一兩木香二錢五分上為末煉蜜丸小豆大每服二十丸薑湯送下清黃散治耳出黃膿名曰聤耳內有風熱外為水濕所幹醞久而成防風滑石飛五錢甘草炙一錢梔子酒炒三錢藿香酒黃連各二錢上為末白湯調二錢食後服清心丹治耳出紅膿名曰膿耳及舌上生瘡如楊梅狀者黃連酒炒三錢滑石飛六錢甘草辰砂飛各一錢薄荷六分犀角鎊屑二錢上為末每服一錢五分蜜拌薄荷湯下夜再服清白散治肺熱痰火上壅耳出白膿名曰纏耳兼治咳嗽桑白皮蜜炒地骨皮各三錢甘草一錢貝母二錢寒水石煅三錢天花粉酒芩天門冬各一錢半上為末以蜜水調食後服或白通草煎湯下尤妙交感丹治耳中疳臭名曰五耳或怒氣上逆上下不得宣通遂成聾聵香附子童便浸透炒三錢茯神黃連各二錢桂心甘菊花各一錢上為末每服一錢五分燈心湯下禹餘糧丸治聤耳出膿水禹餘糧煅醋焠七次海螵蛸去背上硬骨百草霜伏龍肝各二錢五分大附子去皮臍生用一枚上末以綿裹如圓眼核大安耳內日再易之如不瘥乃有蟲也龍骨散治諸膿耳枯礬龍骨胭脂胚各一錢麝香少許為細末以綿裹杖子拭去耳中膿再吹一字入耳中日再加海螵蛸一錢尤妙羊角散治耳內膿汁不幹山羊角燒存性為末每吹二三分入內一日二次三日全瘳滋陰地黃丸治耳虛鳴膿汁不幹腎陰不足熟地黃一兩白茯苓四錢山茱萸五錢甘菊四錢牡丹皮四錢何首烏黑豆蒸三次黃柏各四錢上為末煉蜜丸梧子大每三五十丸白蘞散治小兒凍耳成瘡或癢或痛黃柏白蘞各半兩上為末先以湯洗瘡後用生油調塗口瘡曾口瘡一證形與名不同故治法亦異有發於未病之前有生於已病之後大抵此疾不拘肥瘦有血氣盛者又加將養過溫或心脾二經有熱或客熱在胃熏逼上焦而成其瘡此為實證宜宣熱拔毒使無炎熾自然作效可用當歸散加升麻乾葛黃芩水薑蔥燈心煎服及投牛蒡湯拔毒飲木通散點以消黃散若口內白爛於舌上口外糜潰於唇弦瘡少而大不甚為痛常流清水此因脾胃虛熱上蒸內已先發而後形於外宜百解散疏表當歸散水薑棗煎服和胃氣理虛熱次投牛蒡湯三解散塗以緑袍散立效飲黃金散或投天竺黃散地黃膏若瘡生於口角是脾有積熱才開口則燥痛飲食多難甚至再有外風吹著便覺坼裂微有清血謂之燕吻瘡治法同前藥餌輕者用甑蓋上炊流汁塗之亦驗有口唇下成小片赤爛此因飲食膩汁淋漓不潔蓋以嬰兒皮肉脆嫩浸漬成瘡及有風熱乘之名曰承漿瘡又謂之疳蝕瘡其所因者一也治法同前證內藥劑有無故口臭糜潰而不成瘡或服涼劑或塗末藥不能療者此名元焦故叔和脈訣曰陰數脾熱並口臭是脾家有虛熱上攻於口宜服回陽散兒大者用黑錫丹早食前新汲水入鹽少許調勻送下與正元氣及參苓白朮散調元散服之以立效飲黃金散乾點潰爛處或用蒸蜜同熟水調點舌上令其自化咽下無妨仍忌毒物當歸散潮熱牛蒡子湯咽喉拔毒飲解風熱毒氣上攻頭項浮腫作痛發驚又治發癍天花粉去粗皮一兩生地黃淨洗白芷當歸尾酒洗桔梗銼片蜜水炒過甘草五味各半兩上銼每服二錢水一盞煎七分無時溫服木通散淋消黃散舌百解散驚三解散潮熱緑袍散舌立效飲主口內牙根舌上發瘡作痛致語言飲食不便淨黃連一兩北細辛去葉二錢半玄明粉二錢上細銼或曬或焙為末仍同玄明粉乳鉢內杵勻每用一字乾點患處或以一錢新汲井水調塗瘡上兒小者畏苦不肯點咽用蜜水調敷患處令其自化咽痛茶清調下黃金散解口內舌上瘡毒及治痘瘡後目生翳膜黃柏去粗皮用生蜜潤透烈日曬乾再塗蜜曬幾十數次粉草二味各一兩上銼研為細末治口瘡用藥末乾點患處或用麥門冬熟水調點舌上令其自化若痘瘡後目生翳膜湯泡澄清無時頻洗仍投糖煎散柿煎散二藥天竺黃散主上焦風熱口鼻生瘡兩目赤腫咽膈不利涎壅滯氣不通暢驚搐煩悶神思昏迷天竺黃鬱金無山梔仁代茯神去皮根甘草四味各半兩硼砂牙硝白芷川芎殭蠶去絲枳殼麩炒微黃各二錢半硃砂水飛二錢麝香一字蟬殼十五枚洗去泥土嘴足上除硼砂牙硝硃砂麝香四味乳鉢細杵餘九味焙乾為末同入乳鉢內再杵勻每服半錢或一錢溫薄荷湯無時調服或麥門冬湯地黃膏治口內舌上生瘡作痛飲食難進晝夜煩啼山梔仁緑豆粉各一兩半粉草六錢上或曬或焙為末用生地黃爛杵取汁一兩半好蜜一兩半以薄瓦器盛在銅銚中水煮成膏稠糊相似候冷亭分入前藥末同在乳鉢內再杵勻丸芡實大每以一丸至二丸麥門冬熟水無時化服兒大者每用一丸納口內含化或以新汲水調點舌上回陽散吐瀉黑錫丹大科頭痛參苓白朮散不能食調元散解顱薛諸疳口瘡因乳哺失節或母食膏粱積熱或乳母七情鬱火所致其證口舌齒齦如生瘡狀若發熱作渴飲冷額間色赤左寸脈洪數者此屬心經先用導赤散清心火次用地黃丸滋腎水若寒熱作渴左頰青赤左關脈弦洪者屬肝經先用柴胡梔子散清肝火次用六味地黃丸生肝血若兩腮黃赤牙齦腐爛大便酸臭右關脈洪數按之則緩者屬脾經用四味肥兒丸治脾火以五味異功散補脾氣若發熱咳嗽右腮色赤右寸脈洪數按之澀者屬肺經先用清肺飲治肺火用五味異功散補脾胃若發熱作渴兩頦黧色左尺脈數者屬腎經不足先用六味地黃丸以生腎水次用補中益氣湯以生肺氣又有走馬疳者因病後脾胃氣血傷損虛火上炎或痘疹餘毒上攻其患甚速急用銅碌散大蕪荑湯輕則牙齦腐爛唇吻腮腫重則牙齦蝕露頰腮透爛若飲食不入喘促痰甚此脾胃虛而肺氣敗也頰腮赤腐不知痛者此胃氣虛甚而肉死也並不治經云手少陰之經通於舌足太陰之經通於口因心脾二經有熱則口舌生瘡也當察面圖部位分經絡虛實而藥之若元氣無虧暴病口生白屑或重舌者用亂髮纏指蘸井花水揩之或刺出毒血以柳花散敷之上若腫脹或有泡者並令刺破敷前散或以青黛搽之刺後又生又刺若唇吻坼裂者用當歸膏調柳花散敷之若元氣虧損或服寒涼之藥或兼作嘔少食者此虛熱也用五味異功散加升麻柴胡若泄瀉作渴者脾胃虛弱也用七味白朮散若腹痛惡寒者脾胃虛寒也用六君薑桂若因母食酒面煎爆者用清胃散若因母飲食勞役者用補中益氣湯肝脾血虛者用加味逍遙散鬱怒內熱者用加味歸脾湯母子並服若泥用降火必變慢脾風矣仍參吐舌弄舌治之凡針重舌以線針直刺不可橫挑恐傷舌絡致言語不清也東垣清胃散治胃經有熱齒牙作痛或飲冷作渴口舌生瘡或唇口腫痛焮連頭面或重舌馬牙吐舌流涎若因服克伐之劑脾胃虛熱口舌生瘡或弄舌流涎或嘔吐困睡大便不實者用五味異功散升麻五分生地黃四分黃連牡丹皮各三分當歸稍四分上水煎服嬰兒母亦服清熱消毒散治實熱口舌生瘡及一切瘡瘍腫痛形病俱實者黃連炒山梔炒連翹當歸各五分川芎芍藥炒生地黃各六分金銀花一錢甘草二分上水煎服嬰兒母同服四君子湯治脾氣虛熱口舌生瘡或但胃氣復傷飲食少思或食而難化若作嘔泄瀉尤宜用之如兼痰嗽氣逆肢體倦怠面目浮腫宜用六君子湯六君子湯治脾胃氣虛吐瀉不食肌肉消瘦或肺虛痰嗽喘促惡寒或驚搐口直口噤諸證二立見不能食五味異功散治脾胃虛熱口舌生瘡或因誤服克伐之劑脾胃復傷而口舌生瘡或弄舌流涎吐瀉不止飲食少思或驚搐痰嗽睡而露睛手足並冷若母有病致兒患者子母並服柳葉散治熱毒口瘡黃柏炒蒲黃青黛真正者人中白煅各等分上為末敷之簡如聖散治小兒口瘡不能吃乳者江子一粒或二粒研爛不去油入硃砂黃丹敷紙絹上少許剃開小兒囟門貼在囟上如四邊起粟米泡便用溫水洗去藥恐成瘡更用菖蒲水洗其效如神世南星膏治口瘡小兒難用藥以大天南星去皮取中心龍眼大為末卻用酸醋塗腳心甚妙千治小兒口瘡飲乳不得以白礬如雞子大置醋中塗兒足底二七次即愈無牡蠣散治小兒口瘡牡蠣煅通紅取出候冷研細紙裹入土中七日出毒三錢甘草炙為末一錢上和勻時時挑少許摻口中或吐皆無害田口瘡治法乳母同兒宜服洗心散瀉心湯後用黃柏末研細糝之瀉心湯方黃連一味為末蜜水調不可煎湯治口瘡驗方黃柏蜜炙赤半兩青黛一分上二件為末頻糝口內愈鬥口瘡服涼藥不愈者此中焦氣不足虛火泛上宜附子理中湯腮癰薛腮屬足陽明胃經其生癱者多因兒食甘甜厚味脾胃積熱所致亦有乳母鬱怒兒受其患者若因熱積於內二便不通者用涼膈散風邪相搏二便如常者用漏蘆湯胃經風熱或兼咽喉腫痛用升麻防風湯若稟賦陰虛火動頦間或兩耳內生瘡或出膿不止者宜用地黃丸若因乳母肝火乘脾用加味逍遙散脾經鬱熱用加味歸脾湯膏粱積熱用東垣清胃散脾胃風熱用清咽利膈湯仍參口瘡治之升麻防風湯治胃經實熱咽痛口燥腮癰等證升麻防風黃柏炒茯苓芍藥炒陳皮各五分連翹當歸各七分上每服二錢水煎仍量大小用之清咽利膈湯治心脾蘊熱或咽喉腮舌腫痛玄參升麻桔梗炒甘草炒茯苓黃連炒黃芩炒牛蒡子炒杵防風芍藥炒各等分上每服一二錢水煎本事方治小兒毒氣攻腮赤腫可畏者皂角去核二兩天南星生用二錢糯米一合上為細末薑汁調塗立效臂癰薛臂癰之證當分經絡所屬受證之因而治之上廉屬手陽明經下廉屬手太陽經外廉屬手少陽經內廉屬手厥陰經內之上廉屬手太陰經內之下廉屬手少陰經或經絡熱鬱風邪外干氣血有乖即生癰毒若因心經有熱者導赤散加黃連心包絡有熱者柴胡梔子散肺經有熱者瀉白散大腸經有熱者大連翹飲焮腫作痛者氣血凝結也用仙方活命飲腫痛不消者欲作膿也用托裡消毒散膿熟不出者氣血虛也用托裡消毒散膿出反痛者氣血虛甚也肌肉不生者脾胃氣虛也用五味異功散不可外敷生肌散恐反助其邪而肌肉難長也白芷升麻湯治手陽明經分臂上生瘡白芷升麻桔梗各一錢黃耆炒黃芩酒炒各二錢生黃芩五分紅花甘草炙各五分上水酒半鍾煎食後溫服大連翹飲即大連翹湯治肺熱生瘡連翹𧄒麥荊芥木通赤芍藥當歸防風柴胡滑石蟬殼甘草炒山梔子黃芩各等分上為末每服二錢加紫草水煎服大便不通量加大黃腋癰薛腋癰屬足少陽手少陰手厥陰三經小兒患之多稟賦肝火所致初起先用活命飲次用柴胡梔子散五七日間作膿焮腫作痛者亦用活命飲殺其大勢雖潰亦輕而易斂若膿已成用托裡消毒散已出用托裡散如有變證當隨證治之脅癰薛脅肋者足厥陰少陽之經相火之司也乃木之主肝膽之氣不平則風火內搏榮逆血鬱熱聚為膿而癰腫之所由生也亦有稟賦母氣肝膽之熱恚怒之火而致然初患焮腫作痛者宜用柴胡梔子散未消者用仙方活命飲其熱既殺而腫不消者則必成膿也乃用托裡消毒散其膿既成以代針膏決之仍用托裡散自愈若膿出而痛止腫消則不必用藥也加味歸脾湯治小兒因乳母憂思鬱怒胸脅作痛或肝脾經分患瘡瘍之證或寒熱驚悸無寐或便血盜汗瘡口不斂等證人參黃耆炒茯神去木甘草炒白朮炒各一錢木香五分遠志去心酸棗仁龍眼肉當歸牡丹皮山梔炒各一錢上水煎乳母服兒亦服之小柴胡湯治肝膽經分一切瘡瘍發熱潮熱或飲食少思加山梔牡丹皮名加味小柴胡湯方見發熱柴胡清肝散治肝經風熱或乳母怒火患一切瘡瘍見肝熱梔子清肝散一名梔子柴胡散治三焦及足少陽經風熱生瘡或發熱耳內生瘡作癢或出水疼痛見腎熱腹癰薛腹癰者患於臍下或傍二寸許屬脾經近脅屬膽經蓋因脾經陰虛氣滯血凝或因脾虛飲食積熱所患若焮腫作痛者瀉黃散堅硬腫痛者清胃散腫痛便祕者清涼飲如此而仍痛者瘀血凝滯也活命飲既用此藥而不消則內欲作膿也用托裡消毒散若膿出而痛不減者毒未解也亦用前藥若膿出而反加痛及膿水清稀者氣血虛也用參耆托裡散若食少體倦者脾氣虛也用五味異功散加當歸柴胡升麻晡熱內熱者脾血虛也用四君當歸丹皮如有他證當隨證治之臀癰薛臀癰屬膀胱經濕熱或稟賦陰虛若腫硬作痛用內托羌活湯微腫微痛用托裡消毒散若初起大痛或五日之間似消不消似潰不潰者先用仙方活命飲後用托裡消毒散若已潰食少體倦瘡不生肌脾胃虛弱者用五味異功散加柴胡升麻稟賦陰虛小便數而不斂者加減八味丸氣虛久不生肌收口用豆豉餅及補中益氣湯培養元氣若用解熱攻毒及敷圍寒涼之劑則氣血受傷必成敗證矣內托羌活湯治尻腎生癰堅硬腫痛羌活黃柏酒製各一錢防風藁本當歸尾各五分肉桂連翹甘草炙蒼朮陳皮各三分黃耆八分上作二劑水一鍾入酒一杯煎空心服腿癰薛腿癰之證所主之經不同而所治之法亦異發於內側者屬肝脾二經發於外側者屬膽胃二經漫腫堅硬者元氣虛弱也用內補黃耆湯腫勢高焮者元氣未虛也用內托柴胡黃耆湯外並用隔蒜尉法若瘀血凝滯而不消或不作膿者用活命飲血氣虛弱而不能潰及不生肌肉者用托裡散此其梗概云爾一小兒腿內側前肷患毒潰後腫硬色黯膿清不斂面色青黃此脾虛肝旺兼寒邪襲於患處也當壯元氣為主先用異功散加柴胡升麻及蔥尉法脾氣漸復患處漸愈佐以八珍湯豆豉餅而愈一小兒腿外側痛腫肉色如故用托裡消毒散二劑而腫始赤又四劑而腫赤亦退又六劑潰而膿出清稀食少體倦用異功散加芎歸仍用托裡散補其元氣而愈一小兒漫腫堅硬肉色不變此陽氣虛而不能成膿也用托裡散如聖餅腫起色赤用托裡消毒散而膿成針之用八珍湯加肉桂漸愈因傷食吐瀉患處夭白飲食少思先用六君乾薑次用八珍湯及蔥尉法而愈一小兒患此久不愈膿水清稀面色痿黃腹大青筋此脾氣虛為肝所侮也朝用補中益氣湯夕用五味異功散元氣稍復乃佐以四味肥兒丸及蔥尉之法兩月餘而愈一小兒腿外肷腫一塊服消毒之藥其腫益甚肢體羸瘦飲食少思更加作痛余曰先腫而後痛者形傷氣也先痛而後腫者氣傷形也當補接陽氣不信仍投疏泄之藥後果歿機要云榮衛之氣充滿抑遏不能行故閉塞氣血腐而為癰者當泄之以奪盛熱之氣若人飲食疏精神衰氣血弱肌肉消薄故榮衛之氣短促而澀滯故寒搏腠理閉鬱而為癰者當補之以接虛怯之氣信矣肺癰齊氏云肺癰肺痿因脾肺氣虛腠理不密外邪所乘或母食辛辣厚味遺熱於兒或兒有病過於汗下內亡津液虛火爍肺或服克伐之藥虧損脾胃不能生肺金其證惡風咳嗽鼻塞項強呼吸不利甚則四肢微腫咳唾膿血若吐臭穢胸中隱痛脈數而實者為肺癰咳唾涎沫脈數而虛者為肺痿惡寒喘嗽者寒邪內蘊也小青龍湯咳唾膿穢者肺癰內潰也桔梗湯竊謂前證若喘咳短氣者脾肺氣虛也五味異功散咳唾膿痰左尺脈數而無力者腎氣虛也六味地黃丸咳唾膿痰右關脈數而無力者脾氣虛也七味白朮散若發熱喘嗽唾膿不食者脾肺虛甚也難治大要補脾肺滋腎水為善仍審五臟相勝乳母七情後證仿此小青龍湯治傷風冒寒咳嗽喘急肺脹胸滿鼻塞流涕或乾嘔熱咳或作渴或作噎或小便不利或小腹脹滿此仲景之法審有是證用之及時殊有良驗麻黃去節赤芍藥半夏各七錢細辛乾薑炮甘草炙桂枝各三錢五味子半兩杵附子二錢脈浮不用上每服二錢水煎桔梗湯治咳嗽膿血腥穢已成癰證桔梗炒貝母去心知母炒桑白皮炒枳殼各一錢地骨皮栝蔞仁薏苡仁杏仁杵各五分當歸黃耆炒各一錢五味子杵炒百合炒各一錢五分防己一錢甜葶藶炒五分上每服二三錢水煎服升麻湯治肺癰膿血穢臭胸乳皆痛升麻桔梗炒薏苡仁地榆條芩炒牡丹皮芍藥炒甘草各等分上每服二三錢水煎排膿散治肺癰此方排膿補肺黃耆鹽水拌炒白芷人參五味子炒研各等分上為末每服一二錢蜜湯調下射干湯治胃脘癰吐膿血射干去毛梔子仁赤茯苓升麻赤芍藥一兩三錢白朮五錢上每服三五錢水煎入地黃汁少許再煎服人參平肺散治心火克肺金傳為肺癰咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參陳皮甘草地骨皮茯苓各一錢知母炒七分五味子炒青皮天門冬去心四分桑白皮炒一錢上每服二三錢參耆補脾湯治肺癰脾氣虧損咳吐膿涎或中滿不食必服此藥補脾土以生肺金否則不治人參白朮各二錢黃耆炒二錢五分茯苓陳皮當歸各一錢升麻三分麥門冬七分桔梗炒六分甘草炙五分五味子杵四分上作三服薑棗水煎人參補肺湯治肺證咳喘短氣或腎水不足虛火上炎痰涎壅盛或吐膿血發熱小便短澀人參黃耆炒白朮茯苓陳皮當歸各一錢山茱萸乾山藥五味子杵麥門冬去心甘草炙熟地黃自制牡丹皮各五分上每服五錢水煎服腸癰張仲景云腸癰之證因飲食積熱或母食辛熱之物所致小腹按之則痛小便數似淋腹急惡寒身皮甲錯或自汗惡寒若脈遲緊未有膿者用仙方活命飲以解其毒脈洪數已有膿者服太乙膏以下其膿小腹疼痛小便不利者膿壅滯也牡丹皮散主之竊謂經云腸癰為病不可驚驚則腸斷而死故坐臥轉側之間須令徐緩時少飲薄粥及用八珍湯固其元氣靜養調理庶可保也大黃湯治腸癰小腹堅腫按之則痛肉色如常或焮赤微腫小便頻數汗出憎寒脈緊膿未成也急服之大黃炒朴硝各一錢牡丹皮栝蔞仁桃仁去皮尖各二錢每服二三錢水煎薏苡仁湯治腸癰腹中痛煩躁不安或脹滿不食小便澀滯薏苡仁牡丹皮桃仁各三兩栝蔞仁四兩上每服四錢水煎桃仁湯治腸癰腹中痛煩躁不安壅痛大便閉澀亦有繞臍生瘡者但用此藥無妨桃仁大黃炒牡丹皮芒硝犀角鎊冬瓜仁研各二錢上水煎入犀角末服牡丹皮散治腸癰腹濡而痛時下膿汁或下血牡丹皮人參天麻白茯苓黃耆炒薏苡仁桃仁白芷炒當歸川芎官桂甘草各五分木香二分上每服三五錢水煎便毒薛便癰因肝火肝疳或稟肝經熱毒若初起腫硬作痛者先用龍膽瀉肝湯一二劑腫痛不減用仙方活命飲二劑五七日不減腫尚硬亦用前二藥各一劑如不消或更痛欲成膿也用活命飲一劑卻用托裡消毒散加柴胡山梔一二劑若膿已成而不潰者血氣虛也用托裡消毒散一二劑膿已潰而痛不止者毒氣不解也用活命飲一劑若膿已出而反痛者血氣虛也用內補黃耆湯膿已潰而發熱煩躁者氣虛血脫也用當歸補血湯膿已潰而惡寒發熱者血氣俱虛也用十全大補湯膿已潰而惡寒者元氣虛也用補中益氣湯膿已潰而不生肌者脾氣虛也用六君子湯若稟賦怯弱或因飲食勞倦而為患者恆用補中益氣湯加射干自消設使不分經絡不別虛實概行攻伐虧損氣血則輕者難治重者必變瘵證甚至不起龍膽瀉肝湯疝仙方活命飲見前托裡消毒散見前內補黃耆湯薛制治潰瘍膿水出多或過服敗毒之劑致氣虛血弱發熱無寐或兼盜汗內熱或不生肌黃耆炒二錢人參白朮炒茯苓陳皮當歸各一錢半酸棗仁炒一錢五味子杵甘草炒各五分上水煎徐徐服當歸補血湯虛熱清心蓮子飲淋補中益氣湯虛熱十全大補湯汗囊癰薛囊癰屬肝經濕熱或稟胎肝熱所致初起腫痛小便赤澀者濕熱壅滯也先用龍膽瀉肝湯如不消用仙方活命飲若腫痛數日不止欲作膿也用托裡消毒散若腫未潰而小便不利者毒氣壅滯也當分利之膿已成而小便不利毒氣未解也當針泄之膿出而反痛者氣血虛也當補益之若元氣無虧雖陰囊悉潰睪丸懸露亦不為害若乳母恚怒令兒患此者加味逍遙散肝經氣血虛者八珍散加味柴胡山梔俱加漏蘆子母並服托裡清肝散人參黃耆炒當歸川芎芍藥炒白朮茯苓金銀花白芷炒甘草炒連翹柴胡各七分山梔四分上每服二三錢水煎錢氏蚯蚓散治腎子腫硬先用蔥椒湯煎洗次以干蚯蚓糞津唾調敷須避風冷濕地世傳治小兒陰囊腫大用甘草煎濃汁調蚯蚓糞塗之立效山藥膏治兩拗及小腹腫痛或癢用山藥研爛頻敷患處干則易之腳凍瘡薛足指凍瘡因受稟虛怯故寒邪易乘氣血凝滯久而不愈則潰爛成瘡治法須壯脾胃溫氣血則死肉自潰良肉自生若骨脫筋連者宜急剪去否則毒延腳面而死蓋肢末之處氣血難到又為外邪遏絶則氣血不能運行若用湯燙火烘其肉即死而不仁至春必潰腐脫落元氣無虧雖患無害如外敷寒藥內服消毒之劑則元氣受傷必成敗證凡初凍時熱手頻尉之為妙北方凍耳莫誤以手觸之其耳即落大寒能裂膚墮指信然湯氏生附散治爛腳瘡用生附末面水調敷之愈白蘞散用白蘞一兩黃柏炒黑五錢為末乾摻患處湯火瘡薛湯火之證若發熱作渴小便赤澀者內熱也用四物加山梔連翹甘草若肉未死而作痛者熱毒也用四君加芎歸山梔連翹若肉已死而不潰者氣血虛也用四君加當歸黃耆外敷當歸膏或柏葉末蠟油調搽至白色其肉自生若因煙燻將死者以生蘿蔔汁灌之即蘇若飲食後被湯火所傷發熱腹脹惡食發搐變證者當參食積驚搐門治之神效當歸膏治湯火等瘡不問已潰未潰肉雖傷而未壞者用之自愈肉已死者用之自潰新肉易生搽至肉色漸白其毒始盡生肌最速蓋當歸生地黃麻油二蠟皆主生肌止痛補血續筋與新肉相宜當歸生地黃各一兩麻油四兩黃蠟一兩白者止用五錢上先將當歸地黃入油煎枯去滓將蠟溶化候冷攪勻即成膏矣用塗患處將細紙蓋之發背癰疽杖瘡潰爛用之尤效凡死肉潰爛將脫止有些須相連者宜用利刀剪去蓋死肉有毒去遲則傷新肉死肉去盡尤宜速貼蓋新肉最畏風寒不可忽也乳香定痛散治傷損一切瘡瘍潰爛疼痛乳香沒藥各五錢滑石一兩冰片一錢上為細末搽患處痛即止豬蹄湯治一切癰疽杖瘡潰爛消腫毒去惡肉潤瘡口白芷黃芩當歸蜂房蜂兒多者為佳羌活赤芍藥生甘草各五錢上用豬蹄一隻水四五碗煮熟去油柤取清湯入前藥煎數沸去滓溫洗隨用膏藥貼之治湯火所傷方用黃蜀葵花浸油內以油敷患處或收黃蜀葵花曬乾碾末香油調敷亦可又方用定粉碾極細末臘月豬脂調敷患處又方上用萆麻子肉碾爛入蛤粉等分如干再入香油些少調搽患處翻花瘡薛翻花之證由瘡瘍潰後風寒襲於患處或肝火血燥生風或乳母肝火生風必致瘡口胬肉突出如菌或如指大小長短不同如風邪乘襲者先用補中益氣湯加防風天麻風寒凝滯者先用十宣散加羌活天麻兒肝火生風者先用加味逍遙散加天麻羌活母肝火生風者先用加味小柴胡湯次用加味逍遙散加漏蘆天麻其風邪所乘外用豆豉餅風寒所凝外用蔥尉法更用太乙膏護瘡口突肉不消更以黎蘆膏塗之如瘡口不斂而惡寒發熱者元氣虛也用補中益氣湯晡熱內熱者氣血俱虛也用八珍湯倍加參耆食少難化者脾氣虛也用五味異功散若飲食少思大便不調或肌肉消瘦小便澄白者此兼肝脾疳證也用九味蘆薈丸以清肝火用五味異功散以補脾氣外仍用尉治之法黎蘆膏治瘡口胬肉凸起或出二三寸肉者黎蘆不以多少為末以生豬脂擂和搽凸胬肉上多骨疽薛多骨疽由瘡瘍久潰脾胃虧損氣血不能營於患處邪氣陷襲久則筋爛骨腐故骨脫出非稟胎所有也當補脾胃壯元氣內用大補湯地黃丸外以附子餅蔥尉法祛散寒邪補接元氣則骨自脫瘡自斂若用克伐之劑復傷真氣鮮有不危嬰兒患之當調補乳母外用蔥尉以歲月除之尤不可用追蝕之藥漏瘡薛漏瘡之證因稟氣血不足或久病血氣虛弱或兒肝脾食積內熱不能生肌或乳母七情不和脾氣不能收斂當審其所因調補元氣佐以如聖餅蔥尉之類為善若用流氣破血追蝕等藥反為敗證矣余當參各門主之集之四心臟部二痘瘡上溯源錢氏曰夫胎在腹中月至六七則已成形食母腹中穢液入兒五臟食至十月即穢液滿胃至生時兒口中猶有不潔産母以手拭淨則無疾病俗以黃連汞粉下其臍糞之穢此亦母之不潔餘氣入兒臟中本先因微寒又遇風寒邪氣相搏而成痘疹也未出欲作之時熱動五臟則五臟之證先見初欲病時先呵缺頓悶驚悸乍涼乍熱手足冷面腮頰赤燥咳嗽噴嚏此五臟證俱見也呵缺頓悶者肝也時發驚悸者心也乍涼乍熱手足冷者脾也面赤腮頰赤咳嗽噴嚏者肺也惟腎無候以在府下不能食穢故也凡瘡疹乃五臟毒若出歸一證肝水疱肺膿庖心為癍脾為疹腎雖無證其候惡者瘡變倒靨而黑陷則歸腎也此由不慎風冷而不能食內虛所致也東垣曰癍疹始出之證必先見面燥腮亦目胞亦赤呵缺頓悶乍熱乍涼咳嗽噴嚏足稍冷多睡睡驚並瘡疹之證或生膿泡大癍或生小紅癍或生癮疹此三等不同何故俱顯上證而後乃出蓋以上諸證太陽寒水起於右腎之下煎熬左腎足太陽膀胱寒水夾脊逆流上頭下額逆手太陽丙火不得傳道逆於面上故顯是證蓋壬癸寒水克丙丁熱火故也諸癍證皆從寒水逆流而出也醫者當知此理乃敢用藥夫胞者一名赤宮一名丹田一名命門男子藏精施化婦人擊胞有孕俱為生化之源非五行也非水亦非火此天地之異名也象坤土之生萬物也夫人之始生也血海始淨一日二日精勝其血則為男子三日四日五日血脈已旺精不勝血則為女子乃二物相搏長先身生謂之神又謂之精其子在母腹十月之間隨母呼吸呼吸者陽氣也而生動作滋益精氣神飢渴皆隨母血兒隨日長筋骨皮肉血脈形氣俱足十月降生口中尚有惡血啼聲一發隨吸而下此惡血復歸命門胞中僻於一隅隱伏而不發直至兒因內傷乳食濕熱之氣下陷合於腎中二火交攻榮氣不從逆於肉理惡血乃發諸癍疹皆出於腎水其瘍後聚肉理歸於陽明故三番癍始顯之證皆足太陽壬膀胱克丙小腸其始出皆見於面終歸於陽明肉理熱化為膿者也二火熾盛反勝寒水遍身俱出此皆從足太陽傳變中來也萬氏曰痘疹之原有論穢毒者有論淫火者有論時行正病者靡有定論將謂穢毒淫火耶則一歲之中大而郡縣小而村落病者相似而死相繼未必人人若此之甚也將謂時行正病邪何以自少至老但作一度厥後再無傳染也蓋父母於子一體而分精血之毒已蓄於陽施陰化之始固不待誕生之頃咽其血而後有胎毒也況男子惜其氣以養其精女子耗其氣以養其血一失所養即貽他日之患子之受於父母者雖殊其為毒則一也豈有男子淫火起於氣為陽毒而易治女子淫火起於血為陰毒而難治之理邪至於天行正病亦有其時但觀夫年之所加及有四時不正之氣即知有是正病也然則待時而發者胎毒也或速而危或徐而持或暴而死者氣之微甚所使也發則其毒泄矣所以終身但作一度後有其氣不復傳染焉痘為胎毒昭昭矣其間或疏而輕或蜜而重或重變輕或輕變重變化叵測是又有說也疏而輕者始終如一蜜而重者變怪百出或因父母相傳而然或因疫癘相染而然或因鬼疰相著而然杳冥恍惚出於聞見思慮之所不及此與智者道之癡人前不必說夢也何者蓋痘疹之毒父母原自有之雖嘗作過一番而臟腑經絡皮毛肌肉骨髓之間餘毒猶有存者一旦分形化氣注之於子其毒亦隨之泄矣所以子之瘡瘢多肖親也加之調攝失宜放恣無忌其毒益甚瘡痘之候沉困危篤者未必非父母之所致也凡子之侏儒跛躄必肖於親況疹痘之毒乎且人受天地之氣以生天地之氣變人之氣亦變或遇遷正失守淫勝郁復之紀德令乖常眚菑迭見自然厲氣傳染證候相似所以輕則俱輕重則俱重若有主之者是則疫癘之所為也故人之癘疾而死者精靈不散遊魂往來隨氣而行常以其氣疰於平人而為之疾如瘵癩之傳染然形質龐厚福澤悠遠者不能相及苟體虛福薄之人陰陽舛亂之歲則膏肓之堅臺駘之祟互相染著反復變化術不能禁工不能治也此非鬼疰之害乎夫治此三者當奈何曰必為之豫解其毒平其氣遷其處庶乎可免矣按痘疹之發顯是天行時氣釐市村落互相傳染輕則俱輕重則俱重雖有異於衆者十之一二而已豈可概謂胎毒哉然疫癘終身不染者比比皆是而痘疹無一人得免疫癘一染之後不能保其不再染而痘瘡一發不再發則胎毒之說又何可盡廢乎至謂淫火穢血古亦有之而何獨無痘疹之患欲以破胎毒之說則又不然天下之無而忽有者多矣草有名虞美人者虞美人項王寵姬也為項王死世哀之為之歌對草倚聲淒慟而草輒搖草無情識也方其未有楚則寵姬亦無況有草耶一切衆生自妄顛倒而成三界如之又何疑乎痘疹預防萬痘瘡之病皆由父母胎毒蓄於命門之中命門者上腎相火也為人身生化之本故毒藏焉如遇冬令溫和陽氣暴泄人則感之觸動相火至春夏生長之時其毒乃發傳染相似是謂天行疫癘也未出痘疹者但覺冬溫即當預防宜服解毒之藥如辰砂散三豆湯代天宣化丸皆可用也頻頻與之使瘡疹之毒輕減自然易出易收無陷伏郁遏留連之患其辰砂散三豆湯代天宣化丸以解時行疫癘之毒則可或因父母精血不足者或其人素有他疾者或發熱之時別臟形證發見者並宜兼而治之不可徒恃解毒而竟忘其本也如脾胃素弱者宜以養脾為重解毒次之養脾丸服三之二解毒三之一如因父母奉養過厚精血蓄毒素多胎病者宜二毒並解以溯源解毒湯代天宣化丸相間服之丹溪云痘疹初出時或未出時見時人有患者宜預服此藥多者令少重者令輕以絲瓜近蒂三寸連皮子燒灰存性為末沙糖拌勻干吃入硃砂末更妙三豆湯赤小豆黑大豆緑豆各一升生小甘草三兩生銼上以三豆淘淨同甘草用雪水八升如無用長流水代之煮豆熟為度去甘草將豆曬乾又入汁再浸再曬汁盡為度逐日取豆水煮任意食之代天宣化丸即韓氏五瘟丹加減也人中黃屬土甲巳年為君黃芩屬金乙庚年為君黃柏屬水丙辛年為君梔子仁屬木丁壬年為君黃連屬火戊癸年為君苦參佐荊芥穗佐防風去蘆佐連翹酒洗佐山豆根佐牛蒡子酒淘炒佐紫蘇葉佐先視其年所屬取其藥以為君其餘主歲者為臣為君者倍之為臣者半之為佐者如臣四分之三於冬至日修合為末取雪水煮升麻和竹瀝調神麯為丸外用辰砂雄黃為衣每服竹葉湯下制人中黃法取甘草大者不拘多少用新竹一節納甘草於中仍緊塞無節空處放屎缸中浸七七日取出曬乾聽用溯源解毒湯當歸身川芎生地黃白芍藥人參連翹黃連生甘草陳皮木通各等分上銼細加淡竹葉十片水一盞煎半盞去滓溫服無時養脾丸人參白朮當歸川芎各一錢半木香青皮黃連陳皮各一錢砂仁山楂肉神麯炒麥芽炒各五分上為細末水調神麯糊丸如麻子大每服三五十丸陳倉米飲下消瘟丹未曾出痘及臨出者宜擇療病日預服辰砂研為極細末水飛過周歲以下者五六分一歲以上者服一錢絲瓜近蒂者三寸燒存性為末亦如前數上用蜜調下或將鴿子及鳩煮熟以辰砂搽上令兒服之亦可屢試有驗祕傳保嬰丹真紫草去蘆酒洗勿犯鐵器纏豆藤燒灰存性各四兩二味為君升麻取新者鹽水炒引下不使侵肺氣川防風去蘆及叉荊芥穗去梗牛蒡子炒各二兩四味為臣真天竹黃蟾酥自取勿用赤眼者真牛黃三味各一錢二分大硃砂麻黃紫草荔枝殼煮過就將其湯飛研取淨末三錢四味為佐甘草梢去皮二兩和赤小豆黑小豆緑豆各四十九粒炒勿令焦三味為使上各取細末和勻另用紫草三兩入水三碗煎去滓熬成膏半碗入生砂糖半碗和劑為丸如芡實大另用飛過硃砂為衣未出痘之先濃煎甘草湯每服小兒磨一丸大人二丸如已發熱之時生薑湯磨服厚蓋取汗多者可少少者可無大有神效袁氏痘前治法凡欲治痘須在未發之先預識其證而分別用藥重者可輕輕者必愈但未痘而愈則醫者無功故多不肯盡心及其既發又無及矣仁者須以救生保嬰為心寧我無功不可使嬰兒失命備陳十八證治法於後孩兒未痘之先感冒風邪身中火烙頭痛自汗咳嗽不已傷寒未愈而痘隨出焉痘家謂之猿猴跳鎖傷寒之後元氣囂漓須滋陰補血解熱疏風有滋陰三寶散可服滋陰三寶散當歸黃耆生地白茯苓芍藥川芎橘紅甘草防風玄參麥門冬二味加倍上銼細薑棗煎有飲食不能樽節暑濕不能護養肚腹傷壞泄瀉頻仍飲食懶進肢體羸瘦愈未幾而痘隨出焉痘家謂之觀音拂座此與先泄而出痘者不同平居無恙忽泄而痘出此則毒隨泄減其痘反美今久泄初愈而痘出則脾虛元氣弱如單服補藥恐來虛脹若冷藥則毫釐不可用者只宜調脾如四制白朮之類可也四制白朮散白朮八兩分作四分一分砂仁炒一分糯米炒一分麩皮炒一分壁土炒揀淨為末量大小乳酒調服患瘧之後寒熱消爍肌肉漸瘦或乍愈而痘出或帶瘧而患痘名為馬馳劍道多有濕熱釀成此禍草果常山斷不可用即柴胡亦是劫藥須參苓白朮微加消食祛熱之藥如八珍膏衛元湯可用也八珍膏人參一兩蜜四兩乳汁梨汁同熬上加制過紫河車酒服兩匙衛元湯人參白朮全蠍山楂半夏當歸橘紅枳殼烏梅上薑棗煎加乳服小兒才五六歲元體薄劣身發火熱乾渴患嗽疹出未幾而痘隨出焉此太陰脾經症也痘家謂之一葦航海此與尋常先疹後痘者不同凡先痘後疹者謂之逆先疹後痘者謂之順此則身弱發熱原患嗽渴又病疹初愈而痘隨後出其勢頗危須補陰清肺培脾黃耆毫釐難犯內托至奇湯可用也內托至奇湯天門冬麥門冬人參白朮當歸茯苓薏苡仁川芎陳皮甘草桔梗銀杏去皮上加糯米煎頻頻服小兒平時患疳積肚大有青筋四肢羸瘦變為丁奚倏然痘發此謂之三仙入洞治之且莫消疳積厚朴檳榔柴連冷藥及抱龍丸之類皆不可用宜服益黃散滴滴金可也滴滴金蝦蟆肚內有黃金取出金來和酒服小兒風寒腠理時發火熱自頭連身遍啓丹瘤愈未幾而痘隨形焉痘家謂之倒掛銀瓶多發肝心二經痘忌用三黃宜犀角地黃湯紫草散可也犀角地黃湯犀角用乳汁磨一錢牡丹皮芍藥生地黃上加燈草水煎服小兒未痘之前火烙臉赤眼睛直豎手足撒搐口燥讝語驚厥屢次不數日而痘隨形焉痘家謂之霜橋印跡此與尋常驚後出痘者不同凡先驚後痘痘出驚止決繫心經之痘多是吉徵此則驚甚體虛或見痘而驚不止硃砂金石毫不可用宜茯神湯可也茯神湯生地當歸甘草白芍藥茯神遠志桔梗上加燈草姜煎服小兒未痘之前身熱自汗口中咯血或鼻衄或溺血不數日而痘隨形焉謂之藕池踏水心官失守致血妄行宜清心按火不可妄用寒涼之劑野仙獨聖散可用也野仙獨聖散匾柏玄參地榆血見愁生地黃木通芍藥當歸身甘草乾薑小兒未痘之先身發火熱飲食懶飧肚腹膨脹眼胞浮腫睡臥不安不數日而痘隨形焉謂之石鼓無鳴宜理脾補氣參苓白朮散加減用之可也參苓白朮散加減人參茯苓山藥白扁豆白朮陳皮蓮肉薏苡仁當歸防風枳實上銼為散隨宜加減小兒身發火熱自汗不止眼睛昏花呵缺啼叫未愈而痘隨見焉謂之赤澤栽蓮宜斂汗補肝宜黃耆熬人乳頻頻服之並固真湯可用也固真湯綿黃耆二兩蜜炒酸棗仁四兩人參白芍藥當歸生地黃茯苓甘草陳皮上㕮咀生薑煎服小兒平時父母不能護從恣其出入跌磕傷損頭面肢體未愈而痘隨出焉謂之破甕澄漿宜補血扶脾籠金湯可用也籠金湯木香生地黃芍藥紅花當歸甘草白芷土木鱉橘紅木通桔梗白朮上加薑棗煎服兒輩胸膈飽脹飲食厭惡身發火熱嘔吐頻頻未愈而痘隨發焉醫家謂之逐鹿亡羊此與尋常先吐後出痘者不同大凡因發痘而吐毒隨吐減出痘必輕今則先因胃氣有傷腹脹惡食吐又頻頻不止則危迫之象矣須要調理脾胃如紫霞黃露飲可用也紫霞黃露飲乾薑半夏藿香砂仁枳殼陳皮豆蔻白朮炒青皮上㕮咀水煎服小兒面色萎黃時作潮熱眼胞浮腫肚腹絞痛此為小㾅未愈而痘隨出焉醫家謂之推車陷雪此因脾胃有傷漸成疳積祛蟲逐積之藥俱不可用惟調理脾胃為上策龍旋散最妙龍旋散青皮乾薑官桂玄胡索醋炒丁香豆蔻砂仁枳殼檳榔厚朴香附山楂艾葉小兒遍身生瘡頭頸膿窠旋繞手足關軸如蛇皮纏裹寒熱不時噴嚏不止未愈而痘隨出焉醫家謂之霜逐梧桐法宜涼血衛脾貞元散可用也貞元散甘草桔梗人參白芍藥黃耆茯苓木通紅花白朮生地黃白芷升麻陳皮天花粉上用燈草煎服孩兒心中刺痛未愈而痘隨出焉醫家謂之犯奪天梯此非氣逆即為寒積龍蟠飲可用也龍蟠飲人參當歸枳殼白豆蔻丁香木香官桂青皮半夏山楂三稜二蠶砂厚朴上用生薑酒煎服小兒兩眼風熱紅腫羞明刺痛難忍未愈而痘隨出焉醫家謂之彈打天烏法宜清肝祛火滋玄窖提陰氣穀精龍膽散可用也穀精龍膽散生地黃紅花荊芥龍膽草木通甘草赤勺藥穀精草白茯苓鼠黏子上加燈心煎服小兒飲食過度傷損脾胃或飽悶或吞酸或吐瀉未愈而痘隨出焉醫家謂之風燕失巢痘全資脾胃急宜消食理脾消導飲磨積散相兼而用可也消導飲厚朴枳實砂仁山楂肉半夏神麯檳榔三稜蓬朮丁香上加乾薑煎服磨積散干蒿陳皮麥芽二蠶砂上加生薑煎服兒輩小腹硬脹刺痛小便赤澀難通欲尿則啼不尿則痛未愈而痘隨發焉醫家謂之斷橋失渡此係心經鬱火積於小腸浚牛膏是對證之藥浚牛膏大田螺用蔥鹽加少麝搗爛為膏熱烘細絹攤貼小腹用手摩之運氣袁痘內發於臟腑外應乎運氣天動人隨毫髮不爽是故治痘者以明運氣為急也歷稽往者大率三年一發雖各年零出間一有之而其大發之期則三年為準也所謂三年者多系子午卯酉之年子午少陰君火司天而陽明燥金在泉卯酉陽明燥金司天而少陰君火在泉諸瘡非火不發非金不收痘以少陰陽明二經為正者為是故也然玄化密移主客互用五運有平氣太過不及之殊六氣有常化淫勝反勝相勝之異幾微不同則全體盡別痘有當盛行而不盛行有不當盛行而傳染周遍者是不可執一論也萬瘡疹之候或間數年而發或發則連年不已何也經曰不知年之所加氣之盛衰虛實之所起不可以為工矣蓋司天者主行天之令上之位也歲運者主天地之間人物化生之氣中之位也在泉者主地之化行乎地中下之位也一歲之中有此上中下三氣各行化令氣偶符會而同者則通其化其中於人則病矣所以瘡疹必待其年而發也六十年中天符十二年戊子戊午己丑己未戊寅戊申乙卯乙酉丙辰丙戌丁巳丁亥其中又四年為太乙天符戊午己丑己未乙酉謂之天符者司天與運同也太乙天符者司天與運及辰之同也歲會八年丙子己丑丁卯甲辰甲戌戊午己未乙酉謂之歲會者運與支同也同天符六年甲辰甲戌庚子庚午壬寅壬申同歲會六年癸卯癸酉癸巳癸亥辛丑辛未謂之同者謂歲運與在泉合其氣化陽年曰同天符陰年曰歲會也此五者雜而言之共三十六年合而言之止有二十六年經曰天符為執法歲位為行令太乙天符為貴人邪之中人則執法者其病速而危行令者其病徐而待貴人者其病暴而死也又子午之歲少陰君火主之寅申之歲少陽相火主之經曰少陰所至為瘍疹少陽所至為嚏嘔瘡瘍惡病暴死凡此數年剛柔失守升降窒抑舊者不退新者不遷則連年發而不已也按運氣之說內經幾居其半而世罕行用蓋泥其常不通其變則以為無驗余友繆仲淳高明善醫至排斥五運六氣之謬不容口余以王炎沈栝之說折之亦不服蓋未嘗虛心而細求之也假令厥陰用事其氣多風民病濕泄豈普天之下皆多風普天之民皆病濕泄耶至於一邑之間而雨暘有不同者此氣運安在欲其無謬不可得也大凡物理有常有變運氣所主者常也異氣所主者變也常則如本氣變則無所不至而各有所占故其候有從逆淫郁勝復太過不足之變其發皆不同若厥陰用事多風而草木榮茂是之謂從天氣明潔燥而無風此之謂逆太虛埃昏流水不冰此之謂淫大風折木雲物濁擾此之謂郁山澤焦枯草木凋落此之謂勝大暑燔燎螟蝗為災此之謂復山崩地震埃昏時作此之謂太過陰森無時重云晝昏此之謂不足隨其所變疾癘應之皆視當時當處之候雖數里之間但氣候不同而所應全異豈可膠於一定熙寧中京師久旱祈禱備至連日重陰人謂必雨一日驟晴炎日赫然沈時因事入對上問雨期沈對曰雨候已見期在明日衆以謂頻日晦溽尚且不雨如此暘燥豈復有望次日果大雨是時濕土用事連日陰者從氣已效但為厥陰所勝未能成雨後日驟晴者燥金入候厥陰當折則太陰得伸明日運氣皆順以是知其必雨嗚呼今安得如存中者而與之言運氣哉疫癘萬瘡疹雖胎毒必待時令不正之氣相傳染而發蓋春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此四時正氣之序若春應燠而反寒夏應熱而反清秋應涼而反熱冬應寒而反溫此非其時而有其氣乃不正之令也夫人感之或為寒熱或為瘧痢或為喉痹或為腫或為癍疹謂之天行正病又云疫癘是以一歲之中彼此傳染大小相似又若冬溫陽氣暴泄至於來歲必發瘡疹何也蓋小雪以後為終之氣太陽寒水主之水德不彰使厥陰少陰木火之氣反來乘之陽氣早發奉生者少故來春民多病也況瘡疹之毒藏於至陰之下發於太陽之經當其時而動其氣毒乃發矣此冬溫之後必發瘡疹也凡此不正之氣發之泄之解之平之勿犯歲氣是謂良工故治疫癘者以解毒為急辨疑似錢傷寒男體重面黃女面赤喘息急各憎寒口中氣熱呵缺頓悶項急瘡疹則腮赤躁多噴嚏悸動昏倦四肢冷傷寒當發散之瘡疹當溫平之有大熱者宜解毒昏睡喜嚏悸者將發瘡疹垣辨癍證呵缺噴嚏睡中急驚耳尖冷眼澀辨傷寒口熱口中醋氣奶瓣不消腹中疼痛蔡或傳染或傷風或傷食或痘疹其證不一頭與肢節疼痛無時者為時疫傳染熱也面赤汗出而鼻流清涕者為傷風熱也午後發熱頭與肚熱上額有紋者為傷食熱也乍寒乍熱呵缺頓悶驚悸咳嗽嚏噴兩腮赤紅骫涼耳涼者為痘疹熱也渾身壯熱妄言鬼神口鼻衄血驚搐不止幾死而復生為痘疹實熱在內也錢瘡疹候面燥腮赤目胞亦赤呵缺頓悶乍涼乍熱咳嗽嚏噴足稍冷夜臥驚悸多睡此瘡疹症天行之病也瘡疹始出之時五臟證見惟腎無候但見平證爾尻涼耳涼是也尻耳俱屬於腎其居北方主冷也張痘之始發有因傷風傷寒而得者有因時氣傳染而得者有因傷食嘔吐而得者有跌撲驚恐蓄血而得者或為竄眼驚搐如風之證或口舌咽喉腹肚疼痛或煩躁狂悶昏睡或自汗或下利或發熱或不發熱證候多端卒未易辨須以耳冷尻冷足冷鼻尖冷驗之並視其耳後有紅筋赤縷者為真又脈洪大而弦數診脈之際身略戰動是其證也歌曰五指稍頭冷驚癇不可安若還中指熱必定是傷寒中指獨自冷麻痘正相干男左女右別分明仔細看祕法凡入門看痘未知是否但見心窩皮膚內有紅色兩耳尖冷耳筋紅見此痘徵也看耳筋法未出之先紫筋者不治預以涼血解毒之劑治之亦有愈者若二便祕結宜先通利大紅者可治而愈水紅者不藥而愈桃紅者分輕重治之分男左女右看驗熱時候錢始發潮熱三日以上熱暈入皮膚即發瘡疹而不甚多者熱留皮腠之間潮熱隨臟出如早食潮熱不已為水泡之類也張痘瘡皆因發熱而出即其熱之有時可知其自何髒髮出寅卯辰時潮熱者屬肝當出水泡巳午未時潮熱者屬心當出癍瘡申酉戌時潮熱者屬肺當為膿泡亥子丑時潮熱者屬脾當出疹子用藥驗是否王驗癍此所謂癍即痘也法若三日未覺形跡當以生酒塗身上時時看之狀如蚤痕者是也或曰傷寒傷食潮熱與癍疹不能辨者宜以辛涼之劑調之五日以里發出即汗五日以外無者非癍也各隨應見而治之驗證施治閻治小兒壯熱昏睡傷風風熱瘡疹傷食皆相似未能辨認間服升麻葛根湯惺惺散小柴胡湯甚驗蓋此數藥通治之不致誤也惟傷食則大便酸臭不消化畏食或吐宜以藥下之海藏云宜以藥下之者當察其所傷何物生硬寒熱不等不可遽以巴豆之類大毒之藥下之升麻葛根湯太陰陽明也惺惺散治風熱咽不利脾不和少陽渴小便不利也小柴胡湯治往來寒熱胸脅微痛少陽也然欲知其經當以脈別之小兒耳冷尻冷手足乍暖乍涼面赤時嗽時嚏驚悸此瘡疹欲發候也未能辨認間服升麻湯消毒散已發未發皆宜服仍用胡荽酒黃柏膏暑月煩躁食後與白虎湯玉露散熱盛與紫雪咽喉或生瘡與甘桔湯甘露散余依前說大人小兒同治法惟大小不同耳海藏云消毒散太陽藥也白虎湯治身熱目疼鼻乾不得臥陽明藥也甘露散肺腎藥也甘桔湯少陽藥也紫雪天冬麥冬黃芩生地為血劑玉露散肺腎藥也石膏寒水石為氣劑以上五方皆瀉時暑之藥五臟見證錢五臟各有一證肝臟水疱肺臟膿疱心臟癍脾臟疹歸腎變黑海肝臟水疱色或青肺臟膿疱色或白脾臟疹或如麩糠色心臟癍其色赤變歸腎則色黑矣此五色凡痘疹一色者善或二色三色相合而作者凶第一大小不等小兒在胎十月食五臟穢血生下則其毒當出故瘡疹之狀皆五臟之液肝主淚肺主涕心主血脾為裹血其瘡出有五名肝為水疱以淚出如水其色青而小肺為膿疱以涕稠濁如膿其色白而大心為癍主血其色赤而小次於水疱脾為疹其色赤黃而小涕淚出多故膿疱水疱皆大血榮於內所出不多故癍疹皆小又病水疱膿疱者涕淚俱少以液從瘡出故也譬如泡中容水水去則泡瘦矣婁上水疱者俗謂之水痘也膿疱者俗謂之痘子也癍者俗謂之瘄子也疹者俗謂之麻子也痘之形狀最大水痘次之癍瘄又次之麻子最小隱隱如麻子也張四臟之瘡名狀不同肝為水疱肝之液為淚淚出如水其色微青而小肺為膿疱肺之液為涕涕如膿色微白而大心主血其瘡為癍色赤而小脾主裹血其瘡為疹色赤黃而淺此言其初發之狀不同如此及五七日後不問其初出自何臟悉成血疱血疱成膿疱膿疱之後結痂疕而愈矣或謂肺為膿疱而血疱之後又成膿疱何耶蓋肺為膿疱者言其初出淡淡如膿其色白而非黃若血疱後所結膿疱乃其瘡已熟包裹黃膿其色黃而非白所言膿疱雖同而所以為膿疱則不同也又如脾為疹亦自其初出色黃微亦有小癍瘡而言之耳其成膿結痂收靨而愈與所謂膚疹者名同而實則大不同也心為癍與所謂溫毒冬溫發癍者亦大不同萬凡瘡疹五臟見證要察何臟之證為甚即主其臟之毒多如肝證毒多者必發水疱生瘙癢成目疾宜預解肝之毒羌活湯加青皮柴胡肺證毒多者必增喘嗽煩渴不止手掐眉目鼻面宜預解肺之毒瀉白散合甘桔湯加牛蒡子天花粉心證毒多者必伏不起譫妄飲水煩哭咬牙宜預解心之毒導赤散加黃連辰砂脾證毒多者必成灰白色癢𤹀吐利宜預保養脾胃以解其毒四君子湯調元湯加白芍藥防風連翹腎不見平證耳骫俱熱者死候也羌活湯發熱瀉白散肺甘枯湯咽喉導赤散心四君子湯吐瀉調元湯即保元湯部位萬諸瘡皆屬心火心之華在面瘡痘之候但以面之部位占之思過半矣且痘疹陽毒諸陽皆聚於面吉凶善惡尤易見也額屬心火如印堂以上髮際以下橫兩日月角位先見紅點先作漿先結靨者此惡候也蓋心為君主毒發於心故先見於其位君危則十二官皆危其死速矣左臉屬肝木右臉屬肺金如兩臉先見紅點磊落者吉如相聚作塊其肉硬腫者死蓋肝藏魂肺藏魄生意既絶魂魄將離故不治也頦屬腎承漿橫抵兩頤先見紅點先發先靨者吉此位雖屬腎然三陰三陽之脈皆聚於此陰陽和故可治也鼻屬脾土若準頭先出先靨者凶蓋脾屬土四臟稟命於脾毒發於脾土敗則四臟相隨而敗故綿延日久後斃也腎之竅在耳又云心開竅於耳心腎皆少陰君火也又少陽相火之脈行耳之前後凡在耳輪先見紅點者凶蓋君相二火用事燔灼之勢難可撲滅也惟口唇四圍先出先起先靨者大吉蓋陽明之脈俠口環唇胃與大腸主之無物不受故也痘家有八門五樞三關兩煞五軸之分心為赤帝門附心胞絡兩顴為心樞肝為青陽門附膽兩眼眶為肝樞脾為黃央門附胃兩腮頤為脾樞肺為肅殺門喉突為肺樞腎為玄武門兩耳垂為腎樞胸膛乳阜心之關臍封脾之關陽球腎之關白帝煞門座於氣窩右太陽青帝煞門座於眼眶左太陽顴阜胸乳心之軸左太陽左脅眼胞兩臀肝之軸右太陽右脅項頸氣突肺之軸腮頰中庭口角肚腹手足脾之軸地閣後頸耳窖背俞腰脊陽球腎之軸袁氏閲痘重門欄輔軸四字門犯則驗欄欄犯則驗輔輔犯則驗軸至軸而變態盡矣門凡八欄輔各十有八軸凡一百五十四各分經絡而驗之天庭穹窿之地名赤帝門胸膛名炎車門兩手掌心名正離門不屬心而屬陽明陽明透徹則鼻先形而掌心次之陽明迅暴則掌心先形而鼻次之標於鼻耆順標於掌者逆眉心一帶統上下寸地號五將門眼下絲竹淚堂名青陽門氣窩天突穴名肅殺門兩耳竅圈為玄武門臍封之處脾經所注名黃帝門八門與前稍異至欄輔軸抑又異矣圖訣繁俚無關治療故今不取脈候瘡疹之疾有形之證無所用診又歲氣主之似不必診經曰微妙在脈不可不察察之有紀從陰陽始是則不可不診也先哲有言曰痘疹脈靜身涼者生脈躁身熱者死可見瘡疹亦用診矣大抵小兒之脈多帶緊數瘡毒之脈又多浮大而數傷寒論云浮為風虛大為氣強風氣相搏必成癮疹又曰數脈不時則生惡瘡也七歲以上五至為平七歲以下六至為平過則為太數邪氣實也不及為遲正氣虛也浮而數表熱也浮而遲陽氣衰也沉而緊裡熱也沉而細元氣脫也瘡疹為陽病其脈浮沉俱宜帶洪實若弱而無力為陽病見陰脈凶凡診得浮而無根瞥瞥如羹上肥數而急疾連來如雀之啄細而欲散縈縈如蛛之絲遲而欲絶滴滴如屋之漏沉而時見如魚之躍皆死脈也凡痘子勢重者以脈候之脈洪實者吉浮數虛小者凶丹溪治一男子年十六歲發熱而昏目無見耳無聞兩手脈皆豁大而略數知其為勞傷矣時里中多發痘者雖不知人與藥則飲與粥則啜遂教以參者當歸蒼朮陳皮大料濃與之飲至二十餘帖痘始出又二十帖則成膿疱身無全膚或曰病勞可畏何不用陳氏全方治之豫曰此但虛爾無寒也只守前方又數十帖而安後詢其病因為先四五日恐有出痘之患遂極力採樵連日出汗甚多此以脈之豁大而知其虛乃痘疹因脈施治之一例也氣血萬人之一身本乎榮衛衛者陽氣所以開闔橐籥運動樞機者也榮者陰血所以充溢臟腑灌溉肢體者也故氣虛則神機息血虛則化源絶二者不可偏勝也痘疹之毒本於五臟之液各隨經絡部位直犯榮衛而出氣血從之觀其裹來堅厚窠囊充長者氣之足也根芽紅活形色潤澤者血之足也氣血既足則痘易發易靨不須施治以蹈實實之戒如平陷嫩薄者氣之病也乾枯紫黑者血之病也責而治之不可因循以貽後悔然脾胃者氣血之父也心腎者氣血之母也肝肺者氣血之舍也脾納水穀其悍氣注於腎而為氣腎舍於肺而為衛以溫分肉充皮毛肥腠理司開闔也衛氣虛則瘡不起發其毒乘氣之虛而入於肺肺受之則為陷伏而歸於腎矣脾納水穀其精氣注於心而為血心舍於肝而為榮以走九竅注六經朝百脈也榮血虛則瘡不光澤其毒乘血之虛而入於肝肝受之則為癢𤹀而歸於心矣凡治此者氣病治氣血病治血寒則溫之熱則清之虛則補之實則瀉之仍以脾胃為主不可犯之也虛實萬不知虛實者不可以為工經曰無虛虛無實實虛實之分不可不知也經曰必先度其形之肥瘠以調其氣之虛實此以形體別虛實也又曰谷盛氣盛谷虛氣虛此以飲食別虛實也又曰脈實血實脈虛血虛此以脈別虛實也又曰邪氣盛則實精氣奪則虛此以邪正別虛實也大抵實者邪氣實也虛者正氣虛也經曰邪之所湊其氣必虛留而不去其病則實是也又云五實死者謂邪氣之實也五虛死者謂正氣之虛也凡人診同瘡痘之證其人形體肥健飲食能多六脈洪實素無疾病大便如常瘡色紅潤者此表裡正氣俱實也不須服藥若形體羸怯素多疾病飲食減少六脈微弱吐利頻頻瘡色淡嫩者此表裡正氣俱虛也陳氏溫補之法可用如瘡勢太盛焮腫痛脹大熱不退煩渴昏睡大小便祕此表裡邪氣俱實也錢氏涼瀉之法可用如瘡本稠密焮發紅活吐利不食者此表實裡虛也於補湯中加解毒藥如瘡色淡白發不透滿大小便祕浩飲大嚼者此裡實表虛也於解利中加發藥又如瘡痛者邪氣實也當活血以開其鬱若痛如刀剜悶亂大叫者勿治瘡癢者正氣虛也當補氣以燥其濕如爬搔不定破爛皮脫者勿治灰白者氣虛也參耆之功為大乾燥者血虛也歸芎之力宜多虛則補之實則瀉之中病即已無過其制此治之權衡也若本實而反補之則毒氣彌盛或為潰爛或為癰腫或為目病或為咽瘡或為失血皆補之過也如本虛而反瀉之則正氣益虛或為吐為利為厥逆皆瀉之過也經云母致邪母失正絶人長命其此之謂歟翁夫氣有生血之功血無益氣之理故氣不可虧虧則陽會不及而痘之圓暈之形不成血不可盈盈則陰乘陽位而痘之倒陷之禍立至是痘有氣血虛實之殊也大抵寒為虛熱為實氣虛則宜溫補氣實熱則宜清涼血虛則宜補血血熱則宜解毒必取其氣血中和無過不及可也何謂氣血虛實且如氣過則泡血過則癍氣不及頂陷不起血不及漿毒不附凡痘色淡白頂不堅實不礙指不起脹皆屬氣虛大宜保元倍加酒炒黃耆肉桂川芎丁香人乳好酒同服根窠不紅或紅而散亂以手摸過即轉白痘上如寒毛豎起枯澀不活者皆血虛也宜保元加川芎當歸酒洗紅花及下山楂以消參耆之滯再下木香數分以行滯氣而血自活也凡用黃耆當在痘盡出之後凡用熱藥當看毒盡解之時又察氣血虛實而治之則藥無不效矣凡補血首尾用地黃防滯血必用薑製用芍藥恐酸寒伐胃氣必用酒炒虛證調護論痘證以元氣為主元氣充實則毒易出易化故善治痘者惟保元氣於虛弱之前使不致於耗散為貴耳然其治法惟何一曰實腠理而固肌表二曰節飲食而保脾土肌表固則外陷之患不足慮脾土實則下陷之患不足憂更加以參耆補益之功則元氣自然充實而痘之出也自然易以成漿變證不生而結靨順候矣是以禁用寒涼蕩滌之劑如大黃滑石車前生地鼠黏紫草枳殼之類恐其蕩滌潤下遂傷脾胃脾胃傷則元氣由此而下陷氣脫內攻而死勢所必至是則藥殺之也禁用滑潤髮散之劑如鼠黏人牙蟬蛻麻黃乾葛升麻紫草桔梗羌活防風荊芥之類恐其發散太過遂致表虛表一虛則元氣由此而外耗塌癢外剝命由此喪誰之過歟虛證補氣不補血虛弱痘證精神倦怠面青㿠白蓋氣不充則精神倦怠血不榮則面青㿠白今治虛證補氣不補血者何也氣有神而無形補之則易充血有形而無神補血之藥難收速效況氣陽而血陰陰從陽血從氣者理也故補氣不補血使氣盛而充則血自隨而亦盛矣況補血之劑如當歸生地皆能潤燥滑下多用恐致溏泄故耳然虛證痘疹亦有白陷不榮不得已而用當歸芍藥補血之劑亦有虛火外浮痘點繁紅而類於血熱之證不得已而用紫草紅花生地活血涼血之藥並用酒炒以折其潤下之性借酒力而行之達表則補血活血之中而有升發達表之妙庶無潤腸溏泄之患矣虛證壞勢必至辨氣虛痘證初發身熱悠悠乍熱乍涼肌慢神倦面青㿠白飲食減少手足時冷時熱嘔吐便溏痘點方見隱隱不振淡紅皮薄三四日陸續不齊不易長大五六日不易成漿少食氣餒傷食易泄七八日塌陷灰白不起自汗微渴或腹脹喘渴泄瀉塌癢悶亂咬牙寒戰頭溫足冷勢所必至故治虛痘初發之際不宜投參蘇飲人參敗毒散黃連解毒湯升麻葛根湯紫草三豆飲當用參耆飲氣粗皮燥無潤色亦忌之只以四君子減人參少加桔梗川芎腹皮補益之中略佐以升提之法為妙點子出齊重用參耆及至八九日間無他凶證用法如常若或頂陷灰白不起漿清自汗微渴大補湯加桂塌陷灰白腹脹泄瀉木香散塌癢悶亂腹脹渴瀉喘嗽頭溫足冷寒戰咬牙者急進異攻散救之虛證變實氣虛痘證父母能守禁忌及用藥不誤調燮順候則元氣充實腠理堅固脾胃強健飲食如常二便清調矣若補益太過漿足之後重用參耆容亦有腹脹喘急之患用枳殼湯誤用五苓木通多則有大便祕塞之患用寬中散便實而渴麥門冬湯過用丁桂辛熱之劑則亦有咽喉腫痛煩躁閉渴之變滋陰潤燥湯蓋喘急腹脹大便祕堅煩渴咽痛皆類實證也然而氣虛變實者非真實也是病淺而用藥過深之失也只宜斟酌不宜疏通重治疏利之過則方生之氣復虛而脫證將至矣虛證似實氣虛痘證或為飲食生冷調理失宜致傷脾胃遂成泄瀉津液下陷虛火上盛必發而為渴元氣下陷則虛陽上擁下氣不續必發而為喘夫渴與喘實證也起於泄瀉之後則為津液暴亡而渴氣虛而喘豈有實熱而渴氣擁而喘生於泄瀉之後哉故治渴則用參苓白朮木香散渴瀉不止異攻散喘則用人參定喘湯獨參杏仁湯喘渴而泄木香異功散悶亂腹脹毒成內攻眼合自語已名失志謬認為實醫何愚哉實證似虛身發壯熱毛直皮燥睡臥不寧腮紅睛赤氣粗煩渴腹脹便祕喘急皆實證也此熱盛毒重壅遏之故而又見嘔吐之證嘔吐似虛也然未知熱毒在內不得伸越則上逆攻衝而吐經云諸逆攻衝皆屬於火者是也或為寒冷所搏或因乳食不節致傷風冷則使內熱不得發越冷暖相拒而吐毒不得伸越者從升陽發散為最相拒而吐者引之使下如豬苓澤瀉橘皮之類又有泄瀉之證兼見者泄瀉似虛也然因熱毒郁盛熏炙脾胃不得外達則毒從下陷尋竅而泄所謂熱毒下注者是也古云未出而瀉者生既出而瀉者死概可見矣治法以升提發散引毒達表毒得外解則內泄自止兼傷食而瀉者輕則加消化之劑重則從之又有不思飲食書云不思飲食皆屬內虛者是矣然不知鬱熱之證蓋因毒氣在內不得伸越達於肌表二便祕結腠理阻塞熱毒壅盛腹脹滿急不思飲食者必然之勢也治法以升提發散引毒達表則熱氣有所伸越而臟腑和平飲食自進矣若誤用丁桂半夏等熱藥於嘔吐泄瀉不食之證是以熱攻熱而轉增煩劇用人參黃耆茯苓白朮等補劑於腹脹不思飲食之證則邪得補而愈盛藥一入口立見殺人醫之過也可不慎歟他如龍骨豆蔻雖能止泄神麯麥芽縮砂雖能助脾化食皆不當用於壅熱不食之證繼豫業者鑑之熱證變虛血熱痘證只宜清涼發散不宜峻用苦寒若過投寒劑如升麻芩連及滑泄之藥必致內傷脾胃外冰肌肉脾胃傷輕則飲食減而溏泄重則洞泄無度而遂致虛寒肌肉冰則熱蒸之氣不行腠理閉澀痘不肥大不起發不行漿而遂成伏陷此熱證變虛之驗虛證既明便從虛治參耆丁桂亦所不忌五六日後見之則木香異攻在所宜施惟在審證而斟酌之也壅熱變虛毒盛壅遏固宜升提發散為主而佐以清涼解毒為善又宜得平乃止若發散太過必致肌表空虛元氣耗散內貫清漿或虛抬空殼或癢塌外剝或潰爛不收百變皆至見此數端皆成表虛表既虛則元氣從此耗泄而內氣亦不能以自守略傷飲食或生冷則成泄瀉泄瀉不止遂成虛寒而氣脫煩渴悶亂寒戰咬牙無所不至矣既知虛證治從虛例參耆白朮丁桂姜附亦所不忌六七日後見之雖木香異攻亦宜急進在察證而酌量之也壅熱用異攻辨實熱壅遏之證多用寒涼致冰伏泄瀉發散太過或成表虛既成冰硬藥宜溫和薑桂之熱亦所不忌泄瀉之後熱氣自散真氣自虛既成氣虛藥宜補益氣虛必寒虛寒既明藥宜溫補是以始出之時雖為血熱壅遏至於三四日後身反不熱肌膚冰冷痘瘡不長焉得不進以溫和之劑如官桂乾薑川芎之類使內氣一暖則外氣自和泄瀉之後其內必虛雖有腹脹煩渴喘急焉得復為實熱不過內虛伏陷毒成內攻而然故實熱之證七八九日曾經泄瀉皆從虛治有木香異功之證便進木香異功為貴如無冰硬之證切勿誤投溫劑無泄瀉之證勿得誤投木香異攻等蓋塌陷倒靨乾枯而無冰硬泄瀉之患者多因熱毒內攻而然故宜百祥豬尾等方以治之可也陰陽痘出有三陽三陰之異常須辨之勿令誤也太陽病寒身熱小便赤澀出不快宜荊芥甘草防風湯少陽病乍寒乍熱出不快宜連翹防風湯陽明病身熱目赤大便閉實瘡遍肌肉出不快宜升麻葛根湯初熱加紫草太陰病自利四肢逆冷宜附子理中湯瀉木香散瀉少陰病黑陷口舌乾燥宜四物湯加紫草紅花厥陰病卵縮舌卷時發厥逆宜大異功散出不快加防風青皮三陰病法當救里故宜以溫劑助之辨三陽證治凡痘疹春夏為順當純陽之時也古人治法與傷寒同足脛熱兩腮紅大便祕小便澀渴不止上氣急脈洪數以上七證不宜服熱藥瘡疹一發有密如蠶種者或如糠粃者合清表宜連翹升麻湯見形或未出而先發搐是兼外感風寒之邪宜茶湯下解毒丸痘驚及犀角地黃湯失血瘡出不快清便自調知其在表當微發散升麻葛根湯初熱若瘡青乾黑陷身不大熱大小便澀滯是熱蓄於內宜煎大黃湯下宣風散發熱若表大熱者不可下黑陷甚者百祥丸黑陷若瘡已發稠密微喘渴欲飲水宜微下之當歸丸及龐氏地黃膏見形外以黃柏膏見形塗面值盛夏暑熱正熾適瘡大發煩渴大便實者宜玉露散吐瀉及甘露飲子咽痛或昏冒不知人時作搐搦瘡倒靨黑陷者宜豬心龍腦膏黑陷辨三陰證治凡瘡發於秋冬為逆當純陰之時也足脛冷腹虛脹糞青色面㿠白嘔乳食目睛青脈沉微以上七證不宜服寒藥痘瘡盛出四肢逆冷或自利系在太陰脾經宜急溫之用異功散出不快附子理中湯瀉調中丸瀉痘瘡平塌灰白色不澤此是正氣不足宜十補托裡散倍黃耆加熟附子或四肢厥冷時作搐搦系在厥陰宜溫之異功散出不快加防風青皮或白朮散渴去乾葛藿香加附子肉桂痘瘡證有陽盛陰虛有陰盛陽虛陽盛者飲冰雪不知寒陰盛者飲沸湯不知熱凡發熱作渴手足逆冷大便自利喜飲熱湯皆陰盛陽虛也薛氏用大異功散出不快八味丸治之若發熱作渴而大便祕結手足並熱喜飲冷水皆陽盛陰虛也薛氏用四順飲熱地黃丸腎治之若煩熱作渴面赤睛白此為腎經虛熱亦宜地黃丸之類陳文中治陰盛陽虛用大異功散加木香當歸以補陽是矣治陽盛陰虛用木香散加丁香官桂以補陰不為以火濟火乎此陳氏方所以為一偏之術而見譏於前哲也學者不察而誤用之夭枉可勝道哉形氣凡瘡疹已出後有聲音者乃形病而氣不病也身溫者宜解毒防風湯大法大便閉者宜當歸丸便祕瘡疹未出先聲音不出者乃形不病而氣病也宜補肺散失音加生黃耆若瘡疹出而聲音不出者是形氣俱病也小兒稟賦素弱者宜預服十奇散即十宣散見起發倍歸芎少木香煎服或云宜十補散或大異功散或云形氣俱病者當清其肺宜八風湯並涼膈散去硝黃主之辨形氣不足法肺主氣氣不足則致後三證自汗聲不出瘡頂陷塌不綻肥並宜十奇散自汗倍黃耆聲不出倍桔梗心主血血不足則致後三證灰白色根窠不紅不光澤並宜芎歸湯加芍藥紫草紅花良驗輕重錢凡瘡疹若出辨視輕重若一發便出盡者必重也痘夾疹者半輕半重也出稀者輕裡外肥紅者輕外黑裡白者微重也外白里黑者大重也瘡端里黑如針孔者熱劇也青乾黑陷昏睡汗出不止煩躁熱渴腹脹啼喘大小便不通者困也凡瘡疹當乳母慎口不可令飢及受風寒必歸腎變黑難治海或熱極反兼水化者亦能變黑當以涼藥主之不可不察以脈別之可也或有出色正者內素有熱頭反陷色或灰青似黑中有針眼下陷當急以清涼藥疏之便結者大黃牽牛之類便軟者金花丸之類主之陳輕者作三次出大小不一等頭面稀少眼中無根窠紅肥滿光澤重者一齊並出密如蠶種身熱腹脹瘡灰白色稠密無縫瀉渴不止頭溫足冷輕變重犯房室不忌口先曾瀉飲冷水餌涼藥重變輕避風寒常和暖大便稠不燥渴忌生冷忌外人上飲冷水餌涼藥若內有實熱者不須忌之二日三日痘瘡始見微微才出如粟米大或如黍米大或如緑豆大似水珠光澤明淨者佳不須服藥四日五日痘瘡大小不等根窠紅活光澤明淨者輕如稠密陷頂灰白色瀉渴者重六日七日痘瘡肥紅光澤者輕如身溫氣促口乾腹脹足指冷者重八日九日痘瘡長足肥滿蒼蠟色者輕如寒戰悶亂腹脹煩渴氣急咬牙者至重也十日十一日痘瘡當靨瘡痂欲落而愈如身熱悶亂腹脹泄瀉寒戰咬牙者重翁輕痘歌熱緩神清痘小稀根窠紅活出參差四肢溫暖無寒熱乳食如常渴瀉除太陽面頰俱光潤手足纍纍圓似珠更兼腰項當心少但宜調護不須醫重痘歌初熱一日即便出稠密鮮紅減飲食泄瀉煩渴頭面多紅癍夾疹二便澀平闊灰白缺光明疔毒膿瘡水流濕若此重證須預防莫待臨期有疏失萬古人云輕變重重變輕輕者指出稀者裡外肥紅者人見其輕遽生怠忽之心不避風寒不節飲食不慎禁戒不擇醫巫以致感風寒則生外熱傷飲食則生內熱熱氣熏蒸或翻出瘡痘稠密者或痘後目盲發癰者或腹脹或煩躁或吐利犯禁戒則為瘙癢為潰爛醫之誤則補所不當補瀉所不當瀉巫之誣則咒水灑之以傷其表令之飲水以傷其里往往變為重疾歸之氣數抑何愚哉重者指出密者外黑裡赤者外白里黑者能存憂懼之心適寒溫慎飲食禁戒必守醫巫必擇自然易發易靨能變為輕非人能勝天乎辨不藥而愈痘腳稀疏根窠紅綻不瀉不渴乳食不減四肢溫和身無大熱以上六證並不須服藥惟宜善加調護須使房室溫盎屏諸穢氣忌見外人毋犯房色及往來婦人月水並腋臭者皆不可近惟宜燒大黃蒼朮以辟惡氣勿宜燒沉檀降真乳香腦麝幃帳之內宜懸胡荽或以胡荽漬酒噴床帳並燒木香為佳夫痘瘡之毒最怕穢惡之氣觸犯切不可信僧道看經解穢況無纖毫之力而返恐被其穢惡之氣觸犯亦不可恃其能解而不預防戒之戒之辨五不治證癢塌寒戰咬牙渴不止痘紫黑色喘渴不寧灰白色陷頂腹脹頭溫足冷悶亂飲水氣促泄瀉渴順逆錢大抵瘡疹屬陽出則為順故春夏病為順秋冬病為逆冬月腎旺又盛寒病多歸腎變黑又當辨春膿疱夏黑陷秋癍子冬疹子亦不順也凡瘡疹只出一般者善先發膿疱從發疹子者順先發水疱後發疹子者逆先發膿疱後水疱多者順少者逆先發水疱後發癍子多者逆少者順先發疹子後發癍子者順先發膿疱後發癍子者逆海藏云此一句足以知雜出者諸臟相合而不齊也用藥亦難矣前斷云五色各隨五臟亦有二色相合或有三色即無定也此與前後膿水癍疹大小不同先後逆順大意相若瘡疹既出而有逆順者三有時之順逆有虛實之順逆有出入之順逆蓋春夏陽氣發生瘡疹為順秋冬陽氣伏藏瘡疹為逆此時之順逆也大小便閉而能食者為實為順大小便利而不能食者為虛為逆此虛實之順逆也瘡疹出者為順倒靨陷伏者為逆此出入之順逆也萬春夏為順秋冬為逆此亦語其生長收藏之理爾豈有春夏皆順而吉秋冬皆逆而凶者乎如春失奉生夏失奉長則春夏亦逆秋能養收冬能養藏則秋冬亦順也惟痘出一般疏密得所不愆其期證之順也痘出夾雜帶癍帶疹稠密無縫常失其期證之逆也噫春夏為順秋冬為逆古人之言豈真拘拘於時令之說耶蓋春夏發生之令也秋冬殺伐之令也痘瘡之出起發者得春夏之令所以為順陷伏者得秋冬之令所以為逆其斯之謂歟或云春膿疱金剋木夏黑陷水剋火秋癍火剋金冬疹土剋水為之逆者此不經之談黑陷一證四時不治何但在夏邪故非其時而有是證者氣血和平臟腑充實莫不皆順如其時而有是證者氣衰血弱臟腑虛憊者莫不皆逆古人著書有泛語其概者有直道其實者以意逆志不以詞害意可也錢氏小方脈之祖醫中之聖無出其上者宜若所著之論更無可議矣然亦有未可盡信者或泛語其概或後人補之者也如雲先發膿疱後發疹子者順脾肺相生也先疹子後癍子者順心脾相生也先發水疱後發疹子者逆肝克脾也先發膿疱後發癍子者逆心克肺也先發膿疱後發水疱多者順少者逆肝多肺少木乘金衰也先水疱後癍子多者逆少者順子衰母旺則順火乘木衰則逆也此皆泛語其概耳其曰凡瘡疹只出一般者善此則直道其實者也夫四毒之發各有其時膿疱最酷疹次之水疱又次之癍為輕分作四番其毒則微一併夾出其毒則甚矣如雲春夏為順秋冬為逆春膿疱金剋木也夏黑陷水剋火也秋癍子火剋金也冬疹子土剋水也此亦泛語其概耳其曰黑者無問何時十難救其一二此則直道其實者也蓋四者之毒常乘天地不正之令而發乃疫癘之氣傳染相似時亦不得主之也又云冬月腎旺又盛寒病多歸腎變黑此則後人因秋冬為逆而杜撰以補之者也錢氏謂春夏為順秋冬為逆者蓋以瘡疹屬陽春夏為陽秋冬為陰從其氣則順違其氣則逆不過欲人常和暖而從春夏之化未嘗拘定某證必某時為順也即如冬月變黑之說則凡冬月出瘡疹者不分輕重皆變黑而死天地之氣必不如是之隘錢氏之意亦不如是之拘也但曰冬盛寒腠理閉塞氣血凝滯非和暖瘡難成就可也何必以變黑歸腎獨主於冬乎彼夏盛熱腠理開張氣血淖澤亦有變黑歸腎而死何不云夏有黑陷乎設云夏火旺腎不主事則夏黑陷為逆之言又何自而取乎況黑陷為逆四時皆然亦不獨在於夏也動靜凡物得其平則靜失其平則動經曰陽氣者靜則養神柔則養筋又曰陰氣者靜則神藏躁則消亡夫患痘者陰陽俱病息欲其勻語欲其少寐欲其定寤欲其寧飢則索食渴則少飲觸其瘡則吟拂其欲則鳴此平人之候神清氣定謂之靜而吉也如呻者身有苦也自語者神不清也喘粗者內熱也腸鳴者泄也坐臥不定者心煩也啼叫不止者痛也搖頭者風也指欲搔者癢也咽物難者咽痛也咬牙者心肝熱也若悶亂躁擾譫妄昏眩如見鬼狀搖頭扭項手舞足擲目睛上翻寒戰咬牙語音不出則皆死候矣如病向靜忽作擾動者異也以法求之如瘡色變無他候者此戾氣所觸也如瘡色不變又無他證此必有因但俟自定其有目瞑息微四肢僵直口噤瘡壞昏睡不醒者此真氣將脫魂魄欲離之兆又不可作靜診也形色或云痘瘡之候無以脈診言形色可辨也謂之形者痘之形也故尖圓堅厚始出之形發榮滋長欲壯之形飽滿充足成漿之形斂束完固收靨之形與大豆豌豆緑豆相似者皆正形也或平或陷形之變也如初出時空若蠶種之蛻隱如蚊蚤之跡薄如麩片密如針頭若熱之痱寒之粟者不能起發而死黏聚模糊肌肉虛浮溶軟嫩薄皮膚潰爛者不能收靨而死謂之色者痘之色也喜鮮明而惡昏暗喜潤澤而惡乾枯喜蒼蠟而惡嬌嫩紅不欲焰焰則易破白不欲灰灰則難靨由紅而白白而黃黃而黑者此出形起發成漿結痂之正色也出形而帶紫起發而灰白此色之變能辨痘之形色可知死生之期先賢看痘有四曰根曰窠曰腳曰地用是以驗吉凶斷死生不易之法也何謂窠中透而起頂者是也何謂根外圈而紅者是也即圈之紅否而其中之虛實與痘毒之淺深可見矣即窠之起否而根之淺深氣血之盈虧可定矣所謂腳地則本乎根窠之丸混痘子之稀密也紅暈之處謂之腳彼此顆粒界限分明不散不雜者此痘腳明淨也空隙之處便謂之地彼此顆粒不相連綴者此地面明淨也根欲其活窠欲其起腳欲其固地欲其寬四者俱順痘雖密無慮矣丸者氣之形也氣盛則痘窠必圓滿周淨暈者血之形也血盛則痘窠必光明紅活氣虛則頂陷氣散則塌阻或有氣虛極而不塌陷者乃火載之雖見圓滿實空殼如泡然也血虛則暈淡血憊則暈枯根必散或有血虛極面猶紅色者乃火上浮雖見圈暈實枯槁而不潤澤也痘色之明暗繫於血氣之虛實如色之紅者痘初出也白者毒未解也黃者毒將解也干黃者毒盡解也灰白者氣衰而血不附也紫者毒盛而血滯也黑者熱極而兼水化也焦褐者氣血枯也紅變白白變黃者順而生紅變紫紫變黑者逆而死初驗之時以紅紙蘸清油燃火照之驗其生意有無又以手揩摩面頰如紅色隨手轉白隨白轉紅謂之血活生意在矣如揩之不白舉之不紅是為血枯縱疏不治又看目睛神光了然口唇尖上紅活如常無燥白之色乃為吉證萬元憂也疏密痘欲其疏疏則毒少不欲其密密則毒甚此古今確論也疏密之分各有喜忌如頭面欲疏元首不可犯也頸項欲疏管籥不可塞也胸背欲疏臟腑俞募之所附也若夫手足不忌其密矣謂之疏者非但稀少也鋪排磊落大小勻淨亦可以言疏謂之密者非必盛多也攢聚黏連片復一片雖只數處亦可以言密疏而凶者亦有數等如初出時才見紅點三兩處其熱便退可以語其疏也苟大熱不解唇口燥裂大小便祕煩躁不寧或身無熱但增煩渴者此由毒甚郁遏於中不能遽出日復漸出漸加稠密一也又如初出一兩點頂尖焦黑或三四粒作一堆者僅見數處他無所出喜睡不食煩渴大小便澀此由毒伏於中加譫妄者不待起發而死若能起發後必發癰毒也二也亦有出現實疏遂生玩忽之心禁忌不守風寒不避飲食所傷湯丸之試變生不測三也設有密而吉者治之早衛之嚴里無病而瘡悉成也老嫩常觀朝華之草夕而零落松柏之堅凌冬不衰夫以草木堅脆不同堅者難壞脆者易傷況於人質有厚薄氣有強弱邪彼瘡痘之毒喜老而惡嫩蒼蠟嬌紅色之老嫩也緊實虛浮形之老嫩也濃濁清淡漿之老嫩也堅厚軟薄痂之老嫩也老嫩之故衛氣主之經曰衛氣者所以溫分肉充皮膚肥腠理司開闔者也是故衛氣強則分肉堅皮膚厚腠理密而開闔得也所以收斂禁束制其毒而使不得以放肆故色蒼而蠟形緊而實漿濃而濁痂厚而堅自然易壯易靨雖有邪風穢毒不能害也如衛氣弱則分肉脆皮膚薄腠理疏而開闔失也所以不勝其毒而毒得以恣其猖狂之性故色嬌而紅形虛而浮漿清而淡痂軟而薄易破難靨不待邪風穢氣而先敗壞矣觀夫瘡之老嫩則氣不可不養也乾溼丹溪云瘡乾者宜退火濕者宜瀉濕退火止用輕劑荊芥升麻葛根連翹之類瀉濕乃肌表間濕宜用風藥防風白芷之類痘初起時自汗不妨蓋濕熱熏蒸而起故也榮枯夫物濕則潤澤燥則乾枯榮枯之分血實主之故血者所以營陰陽濡皮毛流關節也瘡本疏者血不在多而易充足瘡本稠密貴乎血之有餘矣苟血有餘則經脈流行淪於肌膚浹於皮毛灌溉滋潤肥澤長養自然形色鮮明根窠紅活也如血不足則經脈壅遏窠囊空虛黑燥而不鮮明也枯萎而不肥澤也皮膚皴揭而啓裂也經曰諸澀枯涸幹徑皴揭皆屬於燥又曰燥勝則乾由其人血常不足加之以毒火熏灼反兼燥金之化精血並竭是以有此證也法宜活血養液散熱解毒清金潤燥則乾涸可回觀夫瘡之榮枯而得養血之理其或濕氣太過瘡本浸淫犯之則破潰爛難靨者此又火極而兼水化也脾強則生脾弱則死標本病有標本治有先後有從標者有從本者有先標後本者有先本後標者有標本兼治者視其急緩不可膠柱而鼓瑟也痘瘡之候自人身而言氣血為本瘡疹為標自瘡疹而言瘡疹為本別證為標如瘡子稠密在標之病也視其氣之不勻血之不周以勻氣活血兼行解毒此則標本兼治也瘡若起發氣或虛者補其氣血或虛者補其血此緩則治其本也氣血充實瘡或壅遏者單行托裡解毒之劑此急則治其標也瘡勢太甚咽喉腫痛者以治咽喉為主此急則治其標也瘡勢太甚自利不止者以自利為主此急則治其標也利久不止漸成壞證救里發表兼而行之此亦標本兼治也先救其里後攻其表此則先標後本也大小便祕煩躁喘呼者急利之此急則治其標也瘡勢太甚煩渴不止以解毒為主兼治其渴此先本而後標也凡此之類擴而充之以盡其余則治不紊矣始終治痘之法貴乎謹之於始而慮其所終庶無後日之悔經曰上工治未病中工治將病下工治已病未病施治十全八九治將病者十全四五治已病者功莫能施發熱之初大熱渴煩大便祕腹痛腰痛鼻乾唇燥驚悸譫妄此毒氣鬱遏於內即當防其伏而不出也吐利不止即防其中氣虛弱不能助瘡成就或致倒陷也故熱則解之便祕則利之驚則平之吐利則止之且如初出一點血此春之氣發生之令也至於起發此夏之氣長養之令也水化為漿此秋之氣成實之令也膿乾結靨此冬之氣閉藏之令也初出而便有水將發而便戴漿膿未成而便收靨此未至而至謂之太過必有陷伏發表托裡解毒切不可緩應出不出應起不起應收不收此至而不至謂之不及必責以氣衰血微而勻氣活血解毒之法不可不急施也又如初出色豔者皮嫩皮嫩則易破當防其癢塌也相聚成塊者不可謂之疏此有伏也殼空無水者後必發癰頭面預腫者防其易消而倒陷咽痛者急解之防其失聲嗆喉也中多水泡者後必自利目澀淚出者防其有膚翳也頻更衣者防其倒靨瘡破不結痂此倒靨也堯夫云與其病後才服藥孰若病前能自防其此之謂歟指南云氣色白也血色紅也痘毒初出之際血氣未定吉凶未兆而紅白之形色未分見於腮耳口鼻年壽之間一點淡紅而已既而其中稍有微白而外則淡紅如故也至此而吉凶已判矣既而根窠丸混而其中之白漸大而外之淡紅漸細至此吉凶悔吝之機著矣既而其痘形色尖圓光澤中之白色遂充而外之紅暈漸細痘至於此始有成漿之意其中白色略帶微黃而又紅活也進而五六日之中內之白色雖將變黃猶未離於紅白之間也外之紅圈雖將漸細而尚未至於微也進而六日七日則中之白色變而純黃猶未至於老也外附紅暈微有一線紅潤光潔之色而已既而八日九日之中則痘成漿圓潔飽滿有黃色而無紅暈至此氣血順序治定功成矣至十一十二日漸見干黃或如青痘色氣血平復之時也雖然猶有倒靨之患未可忽也至十二十三日干黃皮皺結成老靨自頭面而及手足者順也自手足而及頭面者逆也至十三十四日則靨老而落矣然猶有老而不落之患名曰漆面刺肉身體發熱眼紅面赤心煩口渴者有矣面虛目腫噁心者有矣靨老而後從靨肉潰爛者有矣身熱不退口生疳蝕舌生白胎者有矣或四肢發毒或發疔腫者有矣眼生白障或眼露白睛者有矣痘雖平復禍變百出烏得以靨老而不知防乎靨老脫卸光潔治痘若愈矣然猶未也靨落而疤白者有矣有經月之餘而猶發寒熱者矣或生流注潰爛或身生疥癩或發渴狂煩或喘渴不寧痂雖脫落餘證相仍死生未可保也治痘者又可以痂落為平安哉日數汪前人謂小兒虛實不等不可拘以日數有熱三日而成癍有熱六七日而生癍者有至十餘日而生癍者但足上有癍為出齊出齊之後長成血泡血泡七日當結膿窠苟或血泡之中尚有紅癍點相夾而生則又不可拘以日數待其皆作血泡為齊血泡七日結膿窠此乃榮衛調和內外無諸感冒方能如期且如血泡正作之際遇天令寒暑燥濕風不節氣候異宜因而遲速失序亦不可拘以日數但以紅點皆為血泡日為齊若出血泡七日病人氣虛尚有紅點未能皆成血泡者為毒氣彌盛而不斂急用豬尾膏則隨時結痂疕矣萬世俗謂幾日發熱幾日出形幾日起發幾日作漿幾日收靨此大略之言耳痘有疏密毒有微甚人有虛實豈可一切拘以日數如瘡本疏者其毒微其人中氣實又能食自然易出易靨固不待於旬日者如瘡本密者其毒甚其人中氣實又能食榮衛調和內外無諸傷犯至十二三日可以刻期收靨也若其人中氣虛食少或內外曾有傷犯或遇氣候乖變因而難靨豈可必拘以日數哉禁忌聞人氏云稟氣實者夏酷暑而不甚畏熱冬嚴寒而不甚畏冷稟氣怯者易寒易熱天寒陰雨則感寒濕而濡瀉天氣稍炎則伏熱而中暍是故先知節候者能辨陰陽寒暑之盛衰經云陽盛人耐冬不耐夏陰盛人耐夏不耐冬此亦知人稟受之不同且自立夏氣變純陽萬物盛大治藥者用熱遠熱如桂枝麻黃之輩必加知母升麻石膏等服之立冬氣合純陰治藥者用寒遠寒如用諸涼劑中病即止不必盡劑又如冬溫暖則虛者安而實者病夏寒涼則實者安而虛者病冬溫暖夏寒涼非節之氣來暴而去速在人將攝之如何爾如天大寒蓋覆常宜溫暖勿使受寒恐毒氣為寒所觸而不得出也如天大熱不可蓋覆卻宜清涼勿使客熱與毒相併致增煩躁使瘡潰爛也如時有迅雷烈風暴雨之變宜謹幃帳添蓋覆多燒闢穢香以闢一時不正之氣臥處常要無風又要通明切忌幽暗夜靜不斷燈火不離親人看守恐要飲食一時得具或有癢痛與之撫摩恐他人未必盡心如法也聞人氏云木得桂則枯雌黃遇胡粉則黑柑得脯則壞物之相畏有如此者痘瘡之畏穢惡雜氣其理亦如是也房中淫泆氣婦人經候氣狐臭漏腋氣醉酒葷穢氣硫黃蚊藥氣黴爛蒸濕氣誤燒油發氣潑糞淋尿氣熬油煎卵氣一切腥臊氣五辛之氣遠行染帶之氣以上最宜避忌仍令人謹伺門戶勿令生人輒入勿掃房室勿動溝渠勿啓溷廁勿燒腦麝酷烈諸香仲景云瘡痘欲出之間宜燒蒼朮豬甲二物床帳左右前後宜掛胡荽以酒噴之或燒乳香尤妙蓋榮衛得香則運行甚速可使瘡毒易出苟防備一不如法則禍患踵至欲出者使之不出已出者斑爛成片甚者瘡黑陷伏加以爛臭痛如刀剜悶亂而死其中縱得安者亦令瘢痕經年黑色或反成疥癬不可不戒凡痘瘡初出即當禁戒房事室中常燒闢穢香令煙不絶更多燒硬石以水澆之若有觸犯瘡或色變或作癢者以茵陳熏法解之闢穢香灌漿茵陳熏法起發袁治痘觸變焦紫方痘觸變焦紫倏時喘急起急覓絲瓜皮取末蜜調處甘草地黃湯一服痘更起若加煩讝時犀角磨湯水此是四五朝治觸當如此期若至七八空殼觸必死漿半犯觸證按驗莫糊指絲瓜皮須要看他未生筋時取來燥干臨用只取皮蒂為末治觸變灰白痘方痘觸變灰白梟癢忍不得附子緊黃耆愈多功愈特助藥已備前何須甚分悉憑君自攄奇奇處如應敵此痘須詳察盤座有元紅則挽治得全若無真元根縷不必療治治痘被月經觸變方痘正胸胸才翕漿適為月水正當場不知淨潔相防護致使花欄倏變常月月紅花一樣藥不分枝葉取煎湯嫩杪煎湯投酒服根枝濃沸活花郎不消時刻還歸正任汝經紅觸滿床治痘被麝觸癢方麝香一觸癢難熬點點花心帶黑椒急把升麻蒼耳草濃煎慢浴轉明饒內托應須求衛氣參耆歸芍橘甘遭生地防風蟬蛻倍紅花赤豆共成標詳考赤豆非家種赤小豆是生於山谷粒粗而扁越人取而鑲嵌首飾色極紅美若無以家赤大豆代之治痘被尸厭觸變方死尸觸變目番斜痘必沉潛吐沫加速把元荽並棗艾為筒燒噴正靈家外取辰砂煮姜醴時時引呷振欄花雖然尸厭未戕痘主此依然麗美葩愚治此痘宜元荽和辰砂姜酒服外燒其方藥而辰砂性沉滯善能振痘不宜多服者也治痘被客忤觸變方客忤相侵似若驚啼號不歇面渾青絲瓜細結含花者露摘蒸來焙粉成見證蜜調多少服隨兒大小要詳明此時莫說絲瓜賤一寸絲瓜一寸金治痘被獸驚縮方痘五六朝正要灌漿翕膿時候偶為貓犬諸獸驚嚇而痘隨縮匿或色變為斜或形沉於底蓋心失其主而血不能以歸輔氣弗協以充托也急服烏龍散烏龍散方烏龍散治痘中驚驚系豬貓犬馬形只求遠志菖蒲等蟬脫須將水洗清再加醴酒頻頻煮去卻菖蒲遠志們獨留蟬脫研為末砂糖調服酒含噙遠志淨一兩菖蒲淨細實者一兩和酒煮熟去二味蟬蛻焙為末將藥酒進服再投雞鳴散無不全美者矣錢氏云凡瘡疹當乳母慎口不可令飢及受風冷聞人氏云凡人一日不食則飢觸風冷則病況小兒當瘡痘之際正欲賴穀氣以助其內避風寒以護其外苟穀氣虧少風寒侵襲則為患可勝言哉乳下嬰兒宜常令其母飲食充足居處避風能食童子專令老成耐事人時時管顧雖然事亦貴得其平或者以失飢冒風寒為戒遂致過飽極溫非徒無益而又害之瘡痘之家宜備知之陳氏云痘瘡發熱口乾煩渴不止者切不可與水吃亦不宜與蜜紅柿西瓜橘子等冷物食之若脈實中有實熱者不必忌生冷痘瘡欲靨已靨之間忽不能靨腹脹煩渴不可與水蜜等冷物食之或頭溫足指冷或瀉渴氣促亦不可與之十二日十三日瘡痂已落其瘢猶黯或凹或凸肌肉尚嫩不可澡浴亦不宜食炙爆物酸辣五辛有毒之物恐熱毒熏膈眼目多生翳障海藏云世人徒知憐惜過愛信其俗而不藥病已成而方憂摩撫從容無所不從豈知愛之適足以害之惜之適足以棄之始不早治治不全終卒之殞斃勞而無功至是咎醫嗚呼其計亦繆矣汗下錢氏云瘡疹惟用溫平藥治之不可妄下及妄攻發活人書云小兒瘡疹與傷寒相類頭痛身熱足冷脈數疑似之間只與升麻湯解肌兼治瘡子已發未發皆可服但不可疏轉此為大戒傷寒身熱固不可下瘡疹發熱在表尤不可轉世人不學乃云初覺以藥利之宣其毒也誤矣海藏云此論雖當在經則可若熱甚過極足冷或內傷腹熱足冷宜以寒藥如洗心調胃及化食藥通膈之類主之然當求責臟腑祕與不祕脈道何如耳許氏云上熱下冷傷食也癍疹初熱手足亦冷惟傷寒一身盡熱不與足冷相類此傷食非傷冷也若傷冷不宜用王德孚用感應丸治之痘瘡已出不可疏轉出得已定膿血太盛卻用疏利亦非也海藏云此言若在經而出不盡者為當若腹胃有垢膩便時後重如痢疾及脈滑在裡者亦當微下大抵瘡疹首尾皆不可下海藏云臟府有凝滯者不可拘此小兒身耳尻冷咳嗽輒用利藥即害人海藏云此言里和而少陽之氣在經熱者故用化毒犀角湯為氣出里若氣未出里未盡求責疏利亦可凡治疹痘才瀉則令內陷決不可輕易轉下惟大小便多日不利宜微微利之及痘已靨尚有餘熱停留或作熱或作瘡痍或成癰宜四順飲下之不特消餘毒亦免生他證纍試纍驗每見疹痘者服發表麻黃藥出汗陽氣盡出膚表遂至癍爛臟虛虛則腹痛自利或作寒戰或作陰癇死者多矣凡瘡疹證見及癍點既生若無內外寒熱虛實者但安養之任其自然則非惟不生他證亦易於調理今人則才見癍點不顧所蘊輕重惟恐不出用藥表之服以紫草蟬蛻副以人齒猴梨並與酒麴芫荽無所不試曾不知毒氣遇發則一倍變為十倍十瘡合為一瘡名為癍爛五內七竅至於皆有則重者不救輕者為聲啞為目疾為癍爛為閉耳塞鼻之患又有過用表藥里無陽氣以應之為虛脫者多矣此妄表之過也大抵瘡疹已出正賴胃氣運其毒氣善攻其熱者熱甚則利小便蓋小便利則心火有所導引雖不用冷藥熱亦自減矣熱輕則解其熱蓋小熱不解大熱必生小熱而利其小便則慮損氣故但當解熱也利小便之藥導赤散為上解毒之劑如玳瑁湯獨勝散安癍散如聖散紫草湯犀角飲皆可選用昧者但言瘡疹是熱時進涼劑致胃氣轉虛令兒胸滿腹脹又且下之內虛毒入則殺人甚速此不善下之過也若小兒鼻塞唇焦內伏熱也脈細面色痿黃或青色皮膚慢口吐青涎者此誤下證也或里無蘊熱亦何可下要之治熱以溫涼而行之未至於冷治寒以溫未至於熱當從其漸而已潔古云大凡癍疹首尾皆不可下恐動則生變此謂少陽通表宜和之也當先安里解毒次微發之解毒須安五臟防風湯是也如大便不祕者須微發之藥宜錢氏方中選而用之如大便過祕宜微利之當歸丸棗變百祥丸是也初知癍疹若使之並出小兒難禁是以別生他證也首尾不可下者首曰上焦尾曰下焦若既吐利安可下便宜安里若不吐瀉者先與安里藥三五服如能食而大便祕結內實者宜疏利之若內虛而利者宜用安里藥一二服末後一服調以微發之藥要之安里之藥多發表之藥少祕則微疏之令邪氣勿壅並而能作番次出使兒易禁也身溫者順身涼者逆二者宜多服防風湯和之防風湯方見大法海藏云假令五日已里諸病與癍疹不能別辨者不可疑作癍疹必須發之但各從其所傷應見治之皆不妨癍出若強發之其變不可勝數矣前人言首尾俱不可下者為癍未顯於表下則邪氣不得伸越此脈證有表而無里故禁首不可下也尾不可下者為癍毒已顯於外內無根蒂大便不實無一切里證下之則癍氣逆陷故禁尾不可下也又言溫暖蓋覆不令通風以癍未出或身表涼而惡寒或天令寒而惡冷溫暖蓋覆不令通風也癍若已出身熱天暄何必用蓋覆而不使之通風乎後人執此二句首尾俱不敢下溫燠不令通風不知天令之所加人身之所盛致使誤人多矣大抵前人之言隨時應變後之人不知其變故常執而不移也噫首尾俱不可下者以其始終臟腑元無凝滯也若有一切里證及大便結者安得不下溫暖不使之通風以其發在冬時故如此也若發在夏時癍雖未出亦不用此也癍之用藥大率以脈為主浮中沉之診平舉按之候察其虛實定其中外則可以萬全矣萬今之治痘者曰首尾不可汗下聽者和之曰痘宜溫補汗下不可也此亦喜補惡攻之遺弊殊不知治痘之法莫要於解毒或攻或補務使毒氣得解而已如其氣血和暢榮衛流通表裡無邪其出則盡其發則透其收則時非但不可汗下雖溫補亦不可用也設使外感風寒約束皮膚閉密腠理瘡出不快此當汗之令陰陽和榮衛通而瘡易出毒得解散可也苟不汗之則毒無從得出留伏於內未免閉門留寇之禍矣如大熱不退煩渴轉增譫妄昏沉便溺阻塞此毒蓄於腸胃之間與穀氣並宜急下之使臟腑疏通陳莝滌去可也苟不下之則藏汙蓄毒煎熬於中寧無養虎遺患之悔乎故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其條達而致和平此之謂也證治大法錢氏法瘡疹惟用溫平藥治之不可妄下及妄攻發受風冷海藏云溫平者非熱劑如荊芥薄荷防風牛蒡子甘草之類活人鼠黏子湯與潔古解毒防風湯相兼選用是也丹溪云鼠黏子連翹山楂甘草此四味痘瘡始終必用之藥診睦親宮中十大王瘡疹云瘡疹始終出未有他證不可下但當用平和藥頻與乳食不受風冷可也如瘡疹三日不出或出不快即微發之鼠黏子湯之類如瘡發後不多出即加藥如一日一帖即加至二帖加藥不出即大發之升麻葛根防風羌活獨活麻黃桂枝之類如發後不多及脈平無證即瘡本稀不可更發也有大熱者當利小便小熱者當解毒利小便四聖散之類若不快勿發勿下攻止用抱龍丸治之瘡疹若起能食者大黃丸下一二行即止有大熱者當利小便有小熱者宜解毒若黑紫干陷者百祥丸下之不黑者慎勿下身熱煩躁腹滿而喘大小便澀面赤悶亂大吐此當利小便不瘥者宣風散下之也若五七日痂不焦是內發熱氣蒸於皮中故瘡不得焦痂也宜宣風散導之用生犀角磨汁解之使熱不生必著痂矣東垣師弟法潔論曰癍疹之病其為證各異瘡發焮腫於外屬少陽三焦相火也謂之癍小紅靨行皮膚中不出者屬少陰君火也謂之疹凡顯癍疹若自吐瀉者不可妄治而多吉謂邪氣上下皆出也大凡癍疹首尾皆不可下云云詳前汗下條安里解毒防風湯防風一兩地骨皮黃耆芍藥荊芥枳殼鼠黏子各等分上為末水煎四五錢服若能食而大便實宜當歸丸微利之當歸丸棗變百祥丸並大便祕垣消毒救苦湯治癍證悉具消化便令不出若已出稀者再不生癍十一月立此方隨四時加減惟通造化明藥性者能之麻黃根羌活防風升麻黃柏酒炒各五分柴胡川芎細辛藁本葛根黃芩酒炒蒼朮各二分黃連歸身各三分蘇木白朮甘草生橘皮各一分吳茱萸半分紅花少許連翹半錢初出者減出大者加生地黃五分上㕮咀每服五錢水二大盞煎至一盞去滓稍熱服癍疹者因內傷必出癍乃榮氣逆故也大禁牽牛巴豆峻藥宜半夏枳實大黃益智仁之類去瀉止吐若耳尖冷呵缺睡驚嚏噴眼澀知必出癍也宜升麻葛根白芍藥甘草歸身連翹各等分上㕮咀水煎服此定法也後隨證加減如肺出膿癍先顯喘嗽或氣高而喘促少加人參黃芩以瀉伏火而補元氣如心出小紅癍必先見嗌乾驚悸身熱肌肉腫脈弦洪少加黃連如命門出癮疹必先骨痛身熱其疼痛不敢動搖少加生地黃柏諸癍疹皆為陰證瘡皆因內傷乳食脾胃不足榮氣逆行雖火勢內熾陰覆其外故錢氏制四物升麻湯發之如有傳變證依加減法服之世如疹痘則發於脾宜陳氏人參清膈散疹者皮膚隱隱如麻名曰麻子水疱者多因傷寒熱毒而發宜升麻散及羌活散丹溪分氣血虛實丹小兒痘疹分氣血虛實以四君四物酒炒芩連等服之氣虛參朮加解毒藥血虛四物加解毒藥婁加解毒藥者酒炒芩連是也海藏云解毒者三黃湯金花丸之類痘疹分人之清濁就形氣上取勇怯痘瘡紫屬血熱涼血為主白屬氣虛補氣為主中黑陷而外白色起遲者則補氣中略帶涼血藥萬痘瘡主治解表和中解毒三法也解表兼發散之義使邪氣盡出於外不使留伏於中如防風白芷荊芥穗升麻葛根柴胡桂枝之屬和中專主脾胃兼助血氣使裡氣常實血氣不虧助養痘瘡而待其成不致癢塌倒陷如黃耆人參白芍藥當歸木香陳皮之屬解毒只瀉火涼血清氣使毒邪有制不為正害如山豆根大力子紫草連翹芩連梔子之屬翁仲仁分氣虛血熱熱壅三證辨法詳虛實條凡氣虛之證初發身熱手足厥冷乍涼乍熱精神倦怠肌肉㿠白飲食減少四肢倦而睡臥安靜便清自調虛證無疑未見點前用參耆飲加輕劑發散如紫蘇防風白芷見點之後用參耆飲加輕劑如川芎桔梗見點四日之後重用參耆飲隨病加減處治七八日漿足之後保嬰百補湯調養氣血而已此證末稍塌陷黑靨者多用木香異功散收功凡血熱之證初發身熱壯盛腮紅臉赤毛焦色枯煩躁渴欲飲水日夜啼哭睡臥不寧好睡冷處小便赤澀熱證無疑未出之前升麻葛根湯或升麻流氣飲雖皆可服總不若十神解毒湯為穩未出至見點三四日後熱證悉平勢將行漿從太乙保和湯加減八九日漿足之後則有保嬰百補湯調養之此證七八日間有紫黑乾枯及青灰乾黑陷者則有奪命大造談笑博金一字金或百祥牛李豬尾獨神等方皆可審用惟經泄瀉之後有黑陷乾紅者則從木香異功散治之此祖宗世業不傳之祕萬試萬中者也凡熱毒壅遏之證初發身熱壯盛腮紅臉赤毛焦皮燥氣粗喘滿腹脹煩躁狂言譫語睡臥不寧大便祕結小便赤澀面浮眼脹多啼多怒的系熱毒壅遏未見點時先須升麻葛根湯一服隨服羌活散郁湯至見點三日之內諸證悉平勢將行漿則服益元透肌散加減漿足之後服嬰童百補湯調養而已六七日外有紫黑乾枯及青灰乾白陷者則有奪命大造談笑博金一字金百祥牛李豬尾獨神等方皆可審用惟曾經泄瀉有木香異功證則從木香異功散治之治虛弱痘證有二法的系氣虛則宜補氣氣虛易寒又宜溫之溫補一法之中酌量輕重處治方為妙用治血熱壅遏有五法表熱盛則痘必乾枯表太涼則冰伏內熱盛則祕結內太涼則泄瀉氣壅盛則腹脹喘滿熱毒為所抑而不得伸越則腹脹狂亂毒氣彌盛則表裡受重而嬰童難任是故治痘之法在安表和中勻氣透肌解毒五者而已安其表使無干枯冰伏之患和其中使無便結泄瀉之變勻其氣使無壅盛喘滿之過透其肌使熱毒得以伸越而達表解其毒使內外有所分消五者不失則血熱壅遏之證勢雖綿密亦不足憂矣參耆飲即保元湯專治元氣虛弱精神倦怠肌肉柔慢面青㿠白飲食少進睡臥寧靜而不振者不分已出未出皆治人參一錢黃耆二錢甘草五分初熱生用出定炙用楊仁齊謂其能補益元氣更名保元湯蓋為元氣虛弱者立也後世治痘者多主之不分元氣虛實之異概用於血熱毒壅之證是為以實攻實豈不誤哉上用水一鍾姜一片煎四五分不拘時服參耆飲加減禁忌法如前虛證辨認不瘥以此方為主前後始終皆不可易中間雜證兼見雖或不同要皆氣虛所致則以本方而斟酌加減之毋得過投發散苦寒之劑初熱未出之際只可少濟以開提勻氣之功如桔梗川芎之類漿足之後助以收斂如白朮芍藥茯苓焉爾出不快加川芎官桂禁用蟬蛻鼠黏子人牙紫草小便赤加大腹皮茯苓禁用車前滑石瞿麥山梔大便溏加白朮茯苓肉果禁用豬苓訶子龍骨礬石小便短澀加大腹皮木通禁用滑石瞿麥大便實祕加酒炒當歸禁用大黃枳殼生地泄瀉加白朮肉果木香禁用龍骨石脂枯礬嘔吐加乾薑丁香橘皮禁用半夏煩渴加麥門冬芍藥五味子禁用天花粉葛根烏梅半夏減食加白朮人參神麯禁用山楂砂仁傷食加神麯麥芽山楂禁用枳實蓬朮三稜巴豆大黃喘急在三四日前者加桔梗蟬蛻杏仁風則微散之加紫蘇防風枳實痰則從痰治加杏仁貝母有虛證見者決非實喘不過是毒不得外達上乘於肺耳禁用麻黃萊蔔蘇子枳殼下氣等藥六七日後或先曾泄瀉而後氣喘者虛之極也加人參則喘自止腹脹加大腹皮厚朴兼發散開提禁用枳殼萊蔔寬中下氣等藥仍視小便祕與傷食否亦有傷於生冷或寒氣鬱遏而然從內傷外感而治內傷用丁香官桂神麯木香外感用防風等藥發散治之當熱不熱四五日間手足厥冷冰硬不起加丁香官桂炙黃耆川芎夏月減丁香四肢不起加肪風減川芎漿不足加白朮當歸川芎灌水泡加白朮防風白芷芍藥灌清漿加白朮茯苓喘嗽加五味子杏仁麥門冬禁用天花粉桑白皮發癢加川芎當歸芍藥白朮茯苓禁用殭蠶蒺藜癢甚外用茵陳燒煙燻之禁用沐浴發散之藥恐成氣脫十神解毒湯專治身發壯熱腮紅臉赤毛焦色枯已出未出三日以前痘點煩紅燥渴欲飲睡臥不寧小便赤澀者此熱盛也並皆治之當歸尾生地黃紅花牡丹皮赤芍藥桔梗木通大腹皮連翹川芎此方治血熱痘疹以涼血行血為主佐以桔梗川芎有開提發散之功引以大腹皮木通有疏利熱毒之效臣以連翹牡丹皮有解毒之良用此以治血熱痘疹則能內外分消熱毒雖盛庶幾解散表裡自然和平矣古人用黃連解毒湯恐驟用寒涼不惟冰伏熱毒及出不快抑且熱毒為其所抑則鬱於臟腑或肚痛腹脹內潰而死者有之豈若此方用之為穩當若不得已而用黃連芩檗亦須酒炒一以制其寒涼之性一以助其上行之勢借連檗以解毒耳十神解毒湯加減法身熱壯盛加葛根前胡毒盛綿密加荊芥鼠黏子渴加天花粉竹葉滑石小便尿血加犀角山梔大便黑加犀角黃連或桃仁吐血乾嘔加黃連犀角發紅癍加犀角黃芩黃柏山梔玄參小便赤加山梔小便短澀加豬苓澤瀉小便祕加滑石瞿麥大便祕加枳殼前胡大便祕喘加枳殼前胡大黃煩躁加麥門冬天花粉煩渴狂亂譫語加知母麥門冬石膏嘔吐加豬苓澤瀉黃連咽喉痛加甘草鼠黏子荊芥泄瀉加豬苓澤瀉防風嘔加橘皮以上並用燈心十四根水煎服血熱痘證熱毒彌盛然毒氣無所分消只宜重用升提發散使毒得以達表而從外解引以滲泄使熱得以潤下而從內消佐以清涼消毒行血涼血之劑則痘雖稠密亦能消散自易漿而易化也所謂輕其表而涼其內此方蓋得安表和中解毒三法盡善誠痘科之神方也丹溪曰熱者清之實者平之其此方之謂歟是故發熱至見點之後三日以前毒氣未盡達表內外彌盛血熱之證悉具辨認不瘥並只以本方處治之切不得下參耆白朮茯苓補氣之藥於熱證未漿之前如誤而用之是謂以實攻實腹脹氣喘狂亂譫語咽喉腫痛口舌生瘡變證百出所謂邪得補而愈盛也嘔吐泄瀉慎不得用半夏丁桂乾薑木香藿香訶子肉果如誤而用之則是以熱助熱氣得熱而愈亢也燥證必至咽疼狂亂失血便祕無所不至矣至於龍骨枯礬澀滯之物且能使氣道阻塞是欲其出而閉之門也腹脹之患生而喘急之勢至矣尤宜戒之及至血疱已成氣血定位頭頂白光勢將行漿又宜易方另行別議羌活散郁湯專治實熱壅盛郁遏不得達表氣粗喘滿腹脹煩躁狂言譫語睡臥不寧大小便祕毛豎面浮眼張若怒並有神效併為風寒外搏出不快者同治防風羌活白芷荊芥桔梗地骨皮川芎連翹甘草紫草大腹皮鼠黏子上為粗散水一鍾燈心十四根煎六分溫服身初發熱及見點之際毒氣壯盛外為風寒所抑或肌肉粗厚腠理堅閉肌竅不通經絡阻塞使清氣不得引毒達表循竅而出則熱毒壅遏於內為腹脹為喘急為祕結為狂煩為驚搐為失血皮燥毛直面急眼脹睡臥不寧驚啼多哭此熱毒壅遏之證辨認不瘥急宜用發散開提之劑佐以和解透肌之法則熱毒不壅而其出自易矣羌活白芷防風有升提發散解毒之長桔梗有開提勻氣之能荊芥連翹鼠黏善解鬱熱地骨皮消壅熱於筋骨之間且能肅清臟腑紫草滑肌通竅大腹皮引熱下行使內外有所分消用此以治熱壅之證效大而功用極妙若驟用寒涼如芩連升麻之類則熱為寒氣所抑不得伸越逗遛經絡為疽為癤者有之水伏硬閉者有之至於人參黃耆白朮茯苓溫補之劑誤用則其壅盛禍不旋踵他如丁桂木香薑附之類以熱攻熱殺人立至尤宜戒慎故發熱之初至見點之後並宜以本方處治依後法而加減之羌活散郁湯加減法初發身熱壯盛腮紅面赤毛焦皮燥咳嗽喘急者加升麻煩渴加天花粉乾葛腹脹喘急鼻塞面赤若怒毛直及枯加麻黃便祕加當歸枳殼甚則加大黃嘔吐加豬苓澤瀉橘皮禁用生薑丁香木香半夏洞泄加升麻禁用白朮茯苓豆蔻龍骨等劑喘嗽惡風加桑皮紫蘇失血加犀角地黃黃連發癍加黃連黃芩山梔小便赤澀加滑石山梔地黃芍藥鼻衄加黃芩犀角驚悸加木通山梔搐加青皮不思飲食加山楂傷食加山楂神麯麥芽見點二三日間出不快利加鼠黏子山楂蟬蛻名透肌散煩紅赤色加生地黃紅花牡丹皮去白芷防風皮急肉緊身熱壯甚加葛根前胡見點三日之內並依本方加減及三日之後痘瘡出齊血疱已成而前證悉平不得復用此方恐發散太過難於行漿另有方藥在後其禁用藥劑並從血熱痘證法而裁治之故此方不立禁忌辨太乙保和湯又名紫草透肌湯專治血熱痘證服十神解毒湯後熱證悉去內外和平見點三日之後不易長大粗肌者用之則能保和元氣活血解毒助痘成漿易痂易落也桔梗紫草川芎山楂木通人參紅花生地黃甘草糯米五十粒上用燈心七根姜一片水一鍾煎六分溫服便澀腹脹加大腹皮繁紅不潤加當歸蟬蛻出不快加鼠黏子陷塌加黃耆痛加白芷不勻加防風水泡加白朮芍藥嗽加五味子麥門冬渴加麥門冬癢加白朮芍藥七八日後漿足身復壯熱便祕煩渴腹脹喘急前胡枳殼湯漿足禁用此方另立湯飲在後益元透肌散專治壅熱痘證服羌活散郁湯後壅證悉開氣血和平見點三四日後不肥大者不成漿者用之則能勻氣解毒透肌達表領出元陽助痘成漿而易結膿窠也加減與保和湯同論漿足之後另有保嬰百補湯在後即太乙保和湯去生地紅花加蟬蛻鼠黏子陳皮上水一鍾加燈心十四根棗二枚煎六分溫服保嬰百補湯專治痘瘡八九日漿足之後別無他證並以此方調理氣血資養脾胃不拘實熱二痘皆可服之惟氣虛證八九日後本方加黃耆二錢官桂少許若有別證在審虛實隨證加減而已當歸芍藥地黃白朮人參茯苓山藥甘草上水一鍾棗二枚煎六分溫服陳氏惟主溫補陳痘瘡未出已出之間或瀉渴或腹脹或氣促謂之裡虛速與十一味木香散治之如已出之間其瘡不光澤不起發根窠不紅謂之表虛速與十二味異功散治之如已出之間其瘡不光澤不起發根窠不紅或瀉渴或腹脹或氣促是表裡俱虛也速與十二味異功散送下七味肉豆蔻丸治之丹溪云木香異功散二藥治寒的當若虛而不寒者禍不旋踵如瘡始出一日至十日渾身壯熱大便黃是表裡俱實也其瘡必光澤必起發必飽滿必易靨而不致損傷若無他疾不宜服藥表裡俱實者易出易靨表裡俱虛者易出難靨表虛難出裡虛難靨隨證治之張巽之治痘要法吐瀉少食為裡虛陷伏倒靨灰白為表虛二者俱見為表裡俱虛全用異功散救之甚至薑附靈砂亦可用若止裡虛減官桂若止表虛減肉豆蔻不減官桂丁香若能食便祕而陷伏倒靨者為裡實當用錢氏及丹溪下法若不吐瀉能食為裡實裡實而補則結癰毒紅活綻凸為表實表實而用表藥則潰爛不結痂凡痘但見癍點便忌葛根湯恐發得表裡俱虛也丹讀前人之書當知其立言之意苟讀其書而不知其意求適於用不可得也痘瘡之論錢氏為詳歷舉源流經絡分明表裡虛實開陳施治之法而又證以論辨之言深得著書垂教之體學者讀而用之如求方圓於規矩較平直於準繩引而伸之觸類而長之可為無窮之應用也今人不知致病之因不求立方之意倉卒之際據證檢方謾爾一試設有不應並其書而廢之不思之甚也近因局方之教久行素問之學不講抱疾談醫者類皆喜溫而惡寒喜補而惡解利忽得陳氏方論皆用燥熱補劑其辭確其文簡歡然用之翕然信之遂以為錢氏不及陳氏遠矣或曰子以陳氏方為不足歟曰陳氏方誠一偏之論雖然亦可謂善求病情者其意大率歸重於太陰一經蓋以手太陰屬肺主皮毛足太陰屬脾主肌肉肺金惡寒而易於感脾土惡濕而無物不受觀其用丁香官桂所以治肺之寒也用附朮半夏所以治脾之濕也使脾與肺果有寒與濕而兼有虛也量而與之中病則已何傷之有今也不然但見出遲者身熱者泄瀉者驚悸者氣急者渴思飲者不問寒熱虛實率投木香散異功散間有偶中隨手獲效設或誤投禍不旋踵何者古人用藥制方有嚮導有監製有反佐有因用若錢氏方固未嘗廢細辛丁香白朮參耆率有監製輔佐之藥不專務於溫補耳然其用寒涼者多而於補助一法略示端緒未曾深及癡人之前不可說夢錢氏之慮至矣亦將以候達者擴充推廣用之耳雖然渴者用溫藥癢塌者用補藥自陳氏發之迥出前輩然其多用桂附丁香辛芳燥熱恐未為適中也何者桂附丁香輩當有寒而虛者固是的當虛而未必寒者其為患當何如耶陳氏立方之時必有挾寒而用一偏之方寧不過於熱乎豫嘗會諸家之粹求其意而用之實未敢據其成方至正甲申陽氣早動正月間邑間痘瘡不越一家率投陳氏方童幼死者百餘人雖由天數吾恐人事亦或未之盡也王汝言曰若痘瘡虛怯淡白色癢塌此屬虛寒宜用陳文中方若發熱壯盛齊勇紅紫色燥癢此屬熱毒急宜涼血解毒自陳文中方盛行後屬虛寒者率得生屬熱毒者悉不救痘是胎毒古人治法只解毒然氣血虛則送毒氣不出及不能成就故陳文中之法亦千載妙訣補前人之未備者但溫補之法既行而解毒之旨遂隱故救得一邊又害了一邊凡治痘子要識證候如痘腳稀疏根窠紅潤不瀉不渴乳食不減四肢溫和身無大熱如此候者不須服藥惟善調護以待成就而已若癢塌寒戰咬牙渴不止痘紫黑色喘渴不寧灰白色頂陷腹脹頭溫足冷悶亂飲水氣促泄瀉渴如此候者不必服藥雖強治之亦無功也凡治痘瘡善攻不如善守表裡無邪不須妄治有等貪利之人不分虛實妄投湯丸謂曾治某病治某病貪天功以為己有以致虛虛實實致生變異誤人性命此醫之罪也用藥萬凡痘子用藥須分氣血虛實毒氣微甚而治故灰白者不起發者癢塌者吐利者寒戰咬牙者手足冷者皆氣虛也宜用補氣之劑瘡乾者不紅活者膿水少者皆血虛也宜用補血之劑稠密者焮腫者紅紫者皆毒甚也宜用解毒之劑陷伏者兼氣血解毒治之凡用補氣宜四君子湯如瘡帶濕或有自利用之可也若瘡乾者白朮燥津液茯苓滲津液或便祕實者不可用也凡用補血宜四物湯如瘡干或色大嬌用之可也若不能食者生地黃泥膈白芍藥收斂腸胃不可用也凡解毒不過黃連黃芩黃柏梔子連翹牛蒡子升麻之屬俱用酒製恐寒涼反損脾胃也若欲行表須少加桂枝他如紫草山豆根葛根之類則不必用酒製矣凡用解毒藥要別臟腑分陰陽而治之如黃連解心火黃芩解肺火梔子解肝火黃柏解腎與三焦火石膏解脾胃火木通解小腸火黃芩又解大腸火連翹牛蒡子解瘡毒火山豆根紫草解痘毒火升麻解疫毒火各有主治不同也又歲半以上屬陽心肺主事宜芩連多用之歲法以下屬陰腎肝主事宜黃柏梔子多用之祕傳八味二花散桃花蕊五錢梅花蕊二味不拘多少陰乾共一兩六錢二分穿山甲取四足者酒炒一兩硃砂水飛過一兩紫河車水洗去紅筋焙乾為末一具天靈蓋一具以皂角煎湯洗淨酥制為末四方共一錢七分鹿茸去毛酥制三方共一兩二錢人參官揀者一兩上各為末痘疹未出之先以硃砂一兩為君梅花二錢桃花三錢共一處和勻每服五分或三分或二分半用雄雞與酒二杯灌之與食倒懸刺血入杯中以熱酒調前藥同服初發不起以梅花一兩為君加桃花一錢天靈蓋五分氣血虛灰白色用紫河車一兩為君加天靈蓋一錢鹿茸一錢五分梅花一錢桃花一錢或八分黑陷不起以穿山甲一兩為君加桃花一錢梅花八分天靈蓋七分麝香五分氣血虛不能灌漿以鹿茸一兩為君加紫河車二錢桃花一錢梅花八分天靈蓋七分麝香五分人參一錢氣血虛不能收靨以鹿茸一兩為君天靈蓋五分桃花七分梅花九分落靨之後瘢色白氣血虛以人參一兩為君加紫河車二錢鹿茸一錢梅花一錢五分以上咸仿首條服法保生散紫河車制如前龜板酥炙一分鹿茸酥炙各一兩上為末量兒大小用血虛川歸茯苓紫草湯下氣虛人參黃耆甘草湯下初熱證治海小兒癍疹初發未能辨認間但求所出之由因內因外及不因外內隨其所傷如法服餌防其變故抑其盛氣比之他證尤不可緩或發或瀉或解其肌或化其毒求其所起之由涼血清肺調其臟腑平其飲食謹其禁忌嚴其養攝適其寒溫將理有法俾盡其道使出無不快之經成無不痂之潰既愈之後不致遊毒流汗虛腠目疾膜翳瘡癤癰瘤喉閉嗌腫潮熱汗泄此治癍之大略也海藏所謂癍即痘也非心為癍之癍又云外者外治內者內治中外皆和其癍自出至於惡寒者發之表大熱者奪之渴者清之大便祕結者下之小便不通者利之驚者安之泄者分之可以執一為哉大抵傷寒同治隨經用藥最為高論假令五日已里諸病與癍疹不能辨別者不可疑作癍疹必須發之但各從其所傷應見治之皆不妨癍出若強發之其變不可勝數矣如外傷升麻湯主之內傷枳實丸主之大便耎者枳朮丸主之若傷冷者溫之神應丸惡寒者發之宜防風蒼朮湯表大熱者奪之此表者通言三陽也夫陽盛者氣必上行言奪者治之不令上行也是知無三陽表證有三陽里證染於有形也此言表總三陽之名也渴者清之大渴者白虎湯暑月用之小渴者涼膈散涼膈散去硝黃加甘桔者穩大便祕結者下之桃仁承氣湯四順飲子柴胡飲子選用察其在氣在血必內實能食而祕者可用但當微微潤之小便不通者利之導赤散八正散之類當求上下二焦何經而用之驚者安之涼驚丸重者瀉之瀉青丸泄者分之寒則異功散四君子湯熱則澤瀉茯苓湯呂凡瘡欲出而未出因發搐者是外感風寒之邪而內發心熱也宜王氏惺惺散或人參葛根湯木香參蘇飲凡瘡欲出未出而吐利者是中焦停寒或夾宿食也宜四君子湯加砂仁陳皮或和中散如夾宿食者用紫霜丸張治痘全在發熱之初看其熱勢微甚微者固不必治甚者當解則解當汗則汗當下則下使毒氣得以發泄則後去不能為害痘亦稀少平順失此不治則熱毒漸盛難以解救大抵此際熱甚非汗則表不解非下則里不解然藥味之輕重當隨病勢之微甚而用之垣痘證少具痘未發與升麻湯三五錢帶熱服之待其身表溫和痘證已顯止藥如其身涼痘證未出只時時與甘桔湯寬胸膈利咽喉大便酸臭不消化畏食或吐乃內傷飲食宜枳朮丸傷冷食飲神應丸如見傷食又見痘證先與不犯大黃巴豆藥克化過再與升麻湯如食重傷前藥不能過再與犯大黃巴豆藥過之此須分證之表裡虛實而斟酌之先里後表亦非古法如克化藥不能過多是脾氣虛而克化藥又重傷之若無便祕裡實之證其可遽用大黃巴豆下之乎凡初發疑似但肌表熱而無內傷證者宜用辛涼之劑調之以四物解肌湯主之或云凡發熱疑似之間宜用人參敗毒散一劑以發之是與不是一發便明大抵瘡疹只要發盡不使留伏於中也凡發表宜保嬰丹加薑蔥煎湯化下一也或升麻葛根湯去升麻加蘇葉薑蔥二也或羌活散加制砂薑蔥三也此可行之於已發熱之時未發熱之前不可行也既見紅點之後亦不可行恐表虛故也如或行之只宜參蘇飲調保嬰丹厚蓋取汗凡初發表要看天時如時大寒則腠理閉密氣血凝澀防其發泄得遲有毒氣壅遏之變以辛熱之藥發之宜桂枝葛根湯五積散去乾薑主之如時大熱則腠理開張氣血淖澤防其發泄太急有潰爛之變以辛涼之藥解之宜升麻葛根湯雙解散主之如不寒不熱天氣溫和只人參敗毒散甚佳翁小兒出痘凡里有大熱當利小便使心火有所引導雖不用涼藥其熱自去矣導赤散主之若里有小熱不宜利小便當解毒若小熱利小便反泄腎氣宜犀角地黃湯消毒飲萬或曰痘瘡發熱何以能預識其輕重而解之耶曰凡發熱乍進乍退氣色明瑩精神如常大小便調能食不渴目清唇潤此毒輕也痘必稀疏縱出多亦自易發易靨如壯熱不減氣色慘暗精神昏悶大便或祕或瀉不能食目赤唇焦此毒甚也痘必稠密宜預解之其出疏者防其有伏未可便許為疏但看熱減渴止精神爽快清便自調能食更無他苦是真疏且輕也或曰既識其候知痘稠密何以解之曰諸瘡皆屬於心心之華在面如初發熱青筋現露目中淚出此毒發於肝肝木生心火從後來者為實邪肝為水泡風火相扇必作瘙癢宜先解肝之毒面赤如錦額上紅筋露現譫妄多驚此毒發於心心火自旺為正邪君主不明必有陷伏不治口乾唇焦面黃而燥此毒發於脾心火生脾土從前來者為虛邪脾為癍心為疹必有夾癍夾疹又脾主肌肉為火所灼必作潰爛宜先解心脾之毒面色㿠白鼻中乾燥或流清涕或衄出此毒發於肺心火刑肺金乘其所勝為微邪宜略解肺之毒面色黑氣如煙浮目中見鬼頭熱足冷此毒發於腎腎水克心火為賊邪必成黑陷不治瘡疹發熱熱氣微者其毒必少痘出自疏易發易靨不須服藥熱氣甚者其毒必多痘出自密難發難靨且多他變宜預解之宜連翹升麻湯或如聖湯併合代天宣化丸主之或有熱微痘出反密者其人必口燥渴唇焦烈小便赤少大便祕身雖不大熱卻蒸蒸然此毒深熱亦深故表不大熱而裡熱也宜急解之若煩渴引飲大熱如炙頭痛如破或自汗或無汗宜白虎湯主之甚者石膏用至半斤溽暑之時有此症尤宜用之或有熱甚痘出反疏者其人必不渴唇潤目中無赤脈大小便調身雖大熱但熇熇然此毒淺熱亦淺故表熱裡氣和也只以升麻葛根湯乍涼乍熱瘡疹常候若遍身如火晝夜不休此心火亢甚脾土益燥為失其常宜消詳表裡證候以施治也如口燥渴目赤唇焦大小便不利此表裡俱熱也雙解散或連翹升麻湯或黃連解毒湯煩躁送下七物升麻丸四方俱本條如咽喉痛甘桔湯加牛蒡子或射干鼠黏子湯俱咽喉加桔梗使咽喉爽快胸膈開豁失今不治他日咽喉閉塞水入則嗆谷入則嘔暴啞失音悔之無及如初發熱時時惡寒身振振搖動如瘧之狀其人衛氣素虛榮血亦弱不能逼毒快出使毒邪留連於經絡之中欲出不出與正相爭故振振者火之象也以柴葛桂枝湯加黃耆主之瘡出即愈不可錯認作寒戰妄投陳氏辛熱之劑以誤人也古人養生或治病者常順四時之氣謂之勿伐天和如春夏養陽秋冬養陰飲食起居各有攸宜凡瘡疹發熱之時其初發表解肌四時各有主方春用羌活湯痘發熱夏用五苓散驚秋用參蘇飲冬用五積散四時通用人參敗毒散又如春肝旺風木主事調養之法宜四物湯失血加防風黃芩木香青皮羌活以折風木之勝又以四君子湯不能食加白芍藥桂心以補脾之受制相間服之夏心旺熱火主事宜黃連解毒湯煩躁加麥門冬五味子以補肺之不足秋肺旺燥金主事宜瀉白散肺合甘桔湯咽喉加牛蒡子馬兜苓以散肺中之邪又以四物湯去川芎加天麥門冬天花粉以潤其燥冬腎旺寒水主事宜五積散以散表之寒理中湯泄利加黃耆炙木香丁香以勝里之寒此四時之治法也如天有暴風連日不止恐有風邪桂枝葛根湯夏月盛暑或非時之熱人參白虎湯渴冬月嚴寒或非時之寒四君子湯加桂枝生薑久雨濕盛五苓散加蒼朮此四候者必瘡變色有異證可依其法治之苟無他候不可妄治也惟謹帷幕遠風寒毋令大熱毋令大寒但常和暖更常服蟬蛻膏蓋此膏能御風邪辟惡氣透肌快癍疹也房室之中常燒闢穢香禁忌勿得間斷凡初發熱二三日間有驚搐者以導赤散心羌活湯痘發熱辰砂散本條主之大便祕者三黃丸發熱微利之小便澀少者導赤散渴甚者葛根解毒湯痘渴腹中痛者桂枝大黃湯痘腹痛腰痛者人參敗毒散本條自利者黃芩湯痘泄利吐利者黃芩加半夏湯痘吐利如脾胃素弱自利清白者理中湯丸痘泄利或四君子湯不能食肉豆蔻丸痘泄利合而服之余詳各門發表升麻湯治大人小兒時氣瘟疫頭痛足冷脈數發熱肢體煩疼及瘡疹疑二之間並宜服之或未經解利而瘡毒已發又云證候未全或未明者但可與解散之也又云患瘡疹大便自如常者亦可服升麻湯蓋用升麻其性苦寒無毒主解百毒殺鬼邪闢瘟瘴蠱毒中惡腹痛咽喉口瘡皆毒也瘡痘亦毒故也其次用葛根性平治消渴大熱解肌發表出汗開腠理治頭痛升麻葛根二藥皆治伏熱毒動心恍惚驚悸煩躁大抵瘡疹是蘊熱毒葛根解熱升麻去毒也病熱而藥性微寒冷熱相攻則芍藥治時行寒熱又活血痹使瘡痘易出也又利小便瘡疹有大熱者則利小便也次有甘草調和之況新書言瘡疹渴燥甚者亦用炙草散主之四者解毒治熱調榮衛為治瘡疹之要藥也為其疑二之間非瘡疹伏熱而發熱者有傷寒傷風傷食驚證兼患瘡疹而稟氣怯者皆發虛熱而非實熱若服之是瘡疹者則毒減而愈他證者反以為害不能盡述其由但有壯熱而面青目白睛不黃赤大便不祕小便清者皆不可服里無蘊熱故也此藥治未發瘡疹之前瘡疹已愈之後服之消毒故也非正出時服升麻葛根芍藥甘草等分上為粗末每服二錢水一盞同煎至半盞去滓溫服不拘時候亦可為細末湯調服身心煩熱即溫服寒多即熱服海藏云升麻葛根湯太陽陽明之藥陳文中雲身熱腹痛者身熱泄瀉者身熱驚悸者身熱汗出者身熱足冷者俱不宜服升麻葛根湯張巽之云凡痘見癍點忌葛根湯恐發得表虛也萬氏曰古人謂但見紅點便不可服升麻葛根湯恐發得表虛也此蓋為痘疏毒少者言後人不達立言之旨遽謂凡出痘子才見紅點真不可服殊不知升麻葛根湯四味乃發表解毒疏通血氣升降陰陽之劑痘出太密正宜常服以解之令陷者升之燥者潤之郁者疏之過者平之陰精不衰而陽毒不亢也苟謂痘疏毒少者雖他藥不可服況葛根湯乎古人治痘以葛根湯為主後世好奇多立方法法愈多而治愈難矣苟能變通自發熱以至收靨葛根湯皆可增損用之不特發表解肌而已今以葛根湯為主治隨證立增損法於後初發熱解表加柴胡羌活白芷桔梗防風口乾渴內熱也加葛粉天花粉麥門冬自利加條實黃芩生用嘔吐加半夏生薑腹中痛加木香青皮枳殼山楂肉腰疼加獨活北細辛頭疼加羌活藁本蔓荊子驚搐加木通生地黃燈心小便少加木通車前子瞿麥大便祕加大黃衄血加山梔仁玄參生地黃發熱三四日熱不減加解毒藥大力子連翹紫草桔梗瘡不出加防風蟬蛻荊芥穗紅花子眼痛加密蒙花柴胡龍膽草瘡出太稠密加人參當歸木香紫草大力子防風桔梗咽痛加桔梗連翹瘡干或帶紫或色大赤者血熱也加當歸稍生地黃紅花地骨皮牡丹皮瘡灰白色平陷者氣虛也加人參黃耆防風木香官桂手足瘡不起脾胃不足也加防風官桂人參黃耆瘡密起發不透又渴者此津液不足加人參麥門冬天花粉泄瀉者裡虛也加人參白朮訶子白茯苓瘡不著痂者濕熱也加黃耆防風官桂白朮李氏加紫蘇五分筍尖山楂牛蒡子各一錢冬月加制過麻黃一錢惺惺散治數證皆為純陽人所用古人處為小兒藥非乃里寒者可服且以藥對其證用之意大抵渾身壯熱必由風熱瘡疹傷寒時氣且先與之也其頭痛目澀鼻流清涕者用細辛喘粗者用桔梗人參多睡者用茯苓恐傷寒時氣乘里弱者用白朮也治風熱瘡疹栝蔞根也栝蔞味苦寒治身熱煩滿大熱除腸胃中痼熱八疸面黃燥渴通月水止小便利熱而胸痹不下乳陽證傷寒治癰下乳皆攻其熱也故非裡寒者可用其裡寒者由身有大壯熱不渴而大便反利小便不赤面青目白睛不黃赤皆裡寒證也其中雖有白朮以溫終作為虛熱者用人之臟腑寒則寒藥先效熱藥未必能制之臟腑熱則熱藥先效寒未能制之此勢之自然也豈得不辨表裡冷熱而用藥也和劑方小兒傷寒壯熱當先服此大效次服羌活散如壯熱未退切不可與通利大便及涼藥恐是瘡疹服藥則誤矣苦桔梗細辛去葉人參甘草炒白茯苓去皮栝蔞根白朮各一兩半上為細末每服二錢水一盞入薄荷二葉同煎至三分去滓溫服要和氣入姜煎不拘時候身雖壯熱大便自利者不可服海藏云惺惺散治風熱咽不利脾不和少陽渴小便不利也荊芥散治麻痘子兼瘙癢或癮疹大便自過上用荊芥少許爛研以新井水將布帛濾過入一滴許麻油打勻令飲之便不亂悶麻痘已出用黃蠟煎青膠水飲即安青膠水乃牛皮膠也荊芥治血風麻子是疹子常言風瘙癮疹則皆出皮膚其毒輕而浮又以麻油打勻此滑竅之理又以黃蠟煎青膠水服則安此滋血行榮衛榮衛既順麻疹出矣指迷方荊芥湯乃消毒飲加薄荷煎服之羌活散解熱散毒治風壅欲作瘡痘者羌活獨活川芎桔梗蟬蛻前胡柴胡地骨皮甘草炙栝蔞天麻炙荊芥防風各等分上為細末每服二錢水三分盞薄荷三葉盞內煎至二分通口服量大小加減藥水此藥詳其藥味治風治寒治驚下痰涼脾治血熱透肌但實熱發無所不治如稟受怯弱或脾胃弱或外熱目白睛青色皆里無熱不可輕用薄荷散小兒才覺是瘡疹宜服之薄荷葉一兩麻黃去節甘草炙各半兩上為細末每服二錢水一中盞棗二枚生薑三片同煎至六分去滓放溫日三兩次服此是小兒稟受壅實毒氣甚者宜服之蓋此方云小兒才覺是疹痘便服之服之而汗出者服調中散服薄荷散若作寒熱脈反遲者進脫齒散以溫之詳其理非下藥之法也實者服之未必安虛者用之必危殆參蘇飲方見急驚人參羌活散方見急驚羌活散此方初熱暫用兼治驚搐羌活一錢二分獨活荊芥各八分前胡防風各一錢柴胡白芷蟬蛻甘草各四分細辛一分上加薄荷三葉水一鍾煎五分不拘時服發搐及熱盛不退者暫服煎熟用制砂調下治搐如神人參敗毒散治傷風瘟疫風濕頭目昏眩四肢痛憎寒壯熱項強目睛疼尋常風眩拘倦風痰身體項疼及咳嗽鼻塞聲重寒熱並治之柴胡前胡川芎枳殼羌活獨活茯苓桔梗人參各一兩甘草半兩上為粗末每服三錢生薑薄荷煎李氏敗毒散治初熱壯盛等證即前敗毒散加升麻荊芥牛蒡子蟬蛻山楂地骨皮薄荷紫蘇紫草減獨活柴胡茯芩人參如熱甚加柴胡黃芩夏加香薷冬加麻黃瀉加豬苓澤瀉上姜一片水煎臨服加蔥白汁五茶匙正氣散甘草炙三分半陳皮藿香去梗白朮各五分厚朴薑製半夏薑製各一錢半上細切作一服加生薑三片大棗一枚水煎服調解散青皮陳皮枳殼麩炒桔梗去蘆炒人參半夏炮七次川芎木通乾葛各四分甘草紫蘇各二分上細切作一服加生薑三片大棗一枚水煎服一方加紫草糯米蘇解散治痘初壯熱頭疼腰痛腹疼作脹一切熱毒甚者紫蘇葛根防風荊芥白芷蟬蛻紫草升麻牛蒡子木通甘草各等分上加燈心蔥白各七根水煎熱服和解湯解表和中升麻乾葛各一錢半白芍一錢人參防風各七分川芎八分甘草五分上用姜一片水煎服上十七方發表平劑王朝奉四物解肌湯芍藥黃芩升麻葛根每服四錢水一盞煎至七分去滓服或云小兒傷寒疫癘潮熱瘡疹五日已衰疑似不能辨別者並皆辛涼之劑調之即以四物湯解肌之類海藏云此論即有表也若內傷腹中有物未得大便而發熱者當以食藥去其物則可若得便後仍發熱在表者亦宜此解肌湯比錢氏升麻葛根湯減甘草加黃芩以有表熱之意也防風蒼朮湯治小兒邪熱在表惡風惡寒瘡疹未出可解表發癍疹防風甘草炙各半兩蒼朮石膏各一兩川芎黃芩各二兩上為粗末每服二錢生薑三片薄荷七葉水煎日二服雙解散即防風通聖散益元散二方也防風川芎當歸白芍藥薄荷葉大黃連翹各五分石膏桔梗黃芩各八分白朮桂枝荊芥穗各二分滑石二錢四分甘草一錢上銼細加生薑三片水二盞煎至一盞去滓溫服無時葛根橘皮湯治冬溫未即病春被積寒所折不得發至夏熱得其寒解冬溫始發肌肉斑斕癮疹如錦紋而咳心悶但嘔吐清汁服此葛根橘皮去白杏仁去皮尖知母黃芩麻黃去節甘草炙上銼散等分每服抄三錢用水一盞同煎半盞去滓溫服不拘時候上四方辛涼之劑表有實熱者宜之五積散白芷川芎各三分桔梗一分半芍藥茯苓甘草炙當歸桂枝半夏各二分陳皮枳殼麻黃各五分蒼朮一錢厚朴四分上除桂枝枳殼二味別為粗末外一十二味銼細慢火炒令轉色攤冷次入二味末令勻水一盞半生薑三片煎至一盞去滓溫服無時桂枝葛根湯桂枝葛根赤芍藥升麻防風甘草各一錢上銼細加生薑三片淡豆豉一錢水一盞煎七分去滓溫服無時柴葛桂枝湯柴胡葛根甘草桂枝防風人參白芍藥各等分上銼細加生薑三片水一盞煎七分去滓溫服不拘時上三方辛溫之劑表有寒邪者宜之攻裡大便酸臭不消化畏食或吐乃內傷飲食宜枳朮丸傷冷食飲神應丸紫霜丸變蒸神應丸枳實丸枳朮丸俱大科傷食七物升麻丸升麻犀角黃芩朴硝梔子仁大黃各二兩淡豉二升微炒共為末蜜丸如黍米大凡覺四肢大熱大便難即服取微利為止備急丸木香二錢半大黃牽牛末各五錢上為細末神麯糊丸緑豆大每服五七丸食前山楂煎湯下和中加味四君子湯人參白朮茯苓砂仁橘紅各一錢甘草五分水一鍾煎六分食前溫服和中散厚朴薑汁製炒一錢半人參白朮茯苓各一錢乾薑炮甘草炙各六分薑棗煎服六一例六一散治諸熱證暫用桂府滑石水飛過六兩淨大甘草去皮為末一兩上和勻每用一錢薄荷湯或冷水調下內加制辰砂三錢名辰砂六一散治狂言發搐驚悶用防風荊芥薄荷天麻煎湯候冷調下更加牛黃三錢纏豆藤三錢名退火丹治痘初出時大熱不退及標影稠密成片者用紫草木通蟬蛻地骨皮紅花牛蒡子片黃芩燈草各等分煎湯候冷調下能減標稀痘極良法也本方加鬱金名牛黃六一散治痘後瘡癤毒壅及天行瘟疫冷水調下多服大效大靈丹治壯熱顛狂驚搐譫語紅紫斑焦乾陷一切惡證白滑石飛過三兩雄黃飛過犀角各三錢辰砂飛過三錢半牛黃冰片各一錢麝香五分上研極細和勻用升麻甘草防風薄荷燈草牛蒡子紅花紫草黃連各三錢水二碗煎至半碗細絹濾去滓加蜜四兩同熬滴水成珠和前藥丸如小龍眼大金箔為衣每用一丸燈心湯下暑月冷水化下無比散初熱服之甚能稀痘又治痘夾黑點子及黑陷黑痘等證辰砂一錢冰片麝香牛黃各五分如無牛黃用牛膽南星代之膩粉二錢一方有蟾酥上研細末一歲兒服一字大者五分刺豬尾血三兩點新汲水調和送下取下惡毒如爛魚腸葡萄穗狀即愈小無比散治痘壯熱口渴小水澀大便祕口氣熱煩躁不寧或焦紫或紅斑自發熱至起壯時有熱者皆可用痘後餘熱亦可用桂府滑石飛過六兩石膏飛過一兩粉草寒水石各五錢鬱金蟬肚小者甘草湯煮乾為末七錢上俱制淨末和勻每五歲者服二錢大人再加冬月燈心湯下夏月井水調下熱甚不解者井水磨犀角汁調下若紅紫頂陷不起加穿山甲末一分麝香半分紫草煎湯加酒一二匙調下即起大無比散治熱毒太甚驚狂譫語引飲痘瘡紅紫黑陷桂麻滑石飛過六兩粉草一兩辰砂飛三錢雄黃飛一錢上為末每三五歲服一錢十歲服二錢發熱之初用敗毒散調下亦能稀痘若報痘後用燈心湯下涼血解毒犀角地黃湯失血消毒飲咽喉玳瑁湯治時行豌豆瘡及赤瘡疹子未發者令內消已發者解利毒氣令不太盛生玳瑁生犀各以冷水濃磨汁二合上同攪令勻每服半合微溫服一日四五服為佳又治出而未快者宜服之又云毒氣內攻紫黑色出不快用玳瑁水磨濃汁一合入豶豬心血一皂子大以紫草濃煎湯都作一服服之玳瑁犀角其性微寒以治熱毒則知其無失也二藥皆治瘟疫蠱瘴解百毒通血脈消癰腫故用之以解蘊毒可宜服也犀角飲子解熱毒去風疹犀角甘草炙各半兩防風二兩黃芩一兩上為粗末每服五錢用水一小盞煎至半盞去滓溫服不拘時候犀角湯治小兒疹痘瘡及赤瘡子犀角屑大黃炒桑白皮蜜炙釣藤甘草炙麻黃去節各一兩龍膽草半錢石膏栝蔞黃耆炙各半兩上為粗末每服一錢水一小盞煎至四分去滓溫服量兒大小加減服瘡子退後濃磨犀角水塗之更良錢氏亦附方同以此藥治療瘡疹太盛令不入眼則名調肝散此藥治風盛氣實心肝血熱津液內燥大便不通毒氣上盛表熱未散之藥也且大黃栝蔞治內燥釣藤龍膽治風血熱桑白皮石膏治上焦熱麻黃黃耆散肌熱犀角甘草解毒大抵用藥貴於與病相主則病去而正氣自復苟為不然則反為大害如犀角散自非大便數日不通喘急悶亂煩躁譫語者豈可服之恐病藥不相主治也奪命散治瘡疹已發未發並宜服之升麻糯米紫草甘草各半兩木通二錢半上銼為散每服一大錢水七分煎四分去滓溫服出瘡疹熱毒勢甚者可服解蘊熱利小便瘡痘初發氣盛亦宜服牛蒡散涼血解毒上用牛蒡子炒為末水煎一盞服之小兒冬月有非節之暖及春月天氣暄暖或甘肥之過或重衣溫厚幃帳周密傷皮膚害血脈瘡瘍發黃是生多疾宜預常服之也獨勝散治小兒發瘡痘早微熱晚大熱目黃脅動身熱手冷發甚如驚者又名牛蒡殭蠶散牛蒡子半兩白殭蠶一分上為粗末每服一大錢水六分盞紫草二七寸同煎至四分盞連進三服其痘便出此藥用牛蒡子出癰透肌白殭蠶治遍身癮疹疼痛成瘡為末酒調服之立瘥又以紫草煎之令利竅是瘡疹證無虛寒證者服之立出也解毒疏痘湯預服解熱去毒已出解熱毒癍疹又治紅紫口乾壯熱譫語防風荊芥羌活柴胡川芎白芷當歸連翹黃芩黃連黍黏子紫草蟬蛻上薑蔥水煎服安癍散調理瘡疹升麻赤茯苓羌活黃耆人參桔梗炒枳殼麩炒甘草各等分上為細末每服一錢水七分盞紫草薄荷少許同煎至四分盞去滓放溫服之量兒大小增減此藥為解毒涼血生肌寬腸導熱利小便快膈之藥也患瘡疹有熱無寒者可服之西來甘露飲清熱解毒如神凡發熱之初五日以前而熱不退痘色紅紫口渴大便結燥服之即能紅潤亦治疹家煩熱口乾咳嗽疹色枯燥或譫語喘急睡臥不安絲瓜藤霜降後三日近根二尺煎斷將根頭一節倒插入新瓦瓶中上以物掩之勿使灰塵飛入次日以好新壇一隻將瓶中之汁傾在壇中仍將藤照前插入瓶內三日後汁收盡將壇封固收藏聽後取用若發熱煩躁口渴未見紅點將茜根一兩水煎濃汁二酒杯攙絲瓜藤汁二酒杯相和服之立安痘出亦輕若已見標顏色紅紫及稠密者用紫草煎濃湯沖服便見紅潤若夾斑者犀角紫草茜根煎湯沖服寒月用酒煎沖服蓋此汁極能解毒清熱尤治天行時疫每以生薑汁少許加蜂蜜調勻服之有神功渾元汁即紫河車不拘男女初胎者尤妙入新瓦罐內封固其口上以碗覆埋於土中久則化而為水是也專治氣虛血熱痘色紅紫乾枯黑陷等證以此汁清而補之其效立見氣虛甚者人參紫草煎濃湯衝入服之蟬蛻膏蟬蛻去毒當歸防風甘草川芎荊芥穗升麻各等分加白芍藥上為末煉蜜丸如芡實大每服一丸薄荷湯化下辰砂散好辰砂一錢絲瓜近蒂三寸連子燒灰存性此物發痘瘡最妙上研末蜜水調服云多者可少少者可無或以紫草甘草湯調服尤佳初熱吉凶發熱時身無大熱腰腹腳膝不痛過三日才見紅點又堅硬礙指此為吉證不須服藥發熱時渾身溫熱不時發驚痘自心經出也乃為吉證可治而愈按近年屢有痘前驚而終凶者好事不如無未可言吉發熱之初腹中大痛腰如被杖及至報痘乾燥而前痛猶不止者死不治先腹痛後止可用助血氣藥救之初發熱一日遍身即現紅點稠密如蠶種摸過不礙手者死不治初發熱時頭面一片紅如胭脂者六日後死初發熱時用紅紙捻蘸油點火照心頭皮肉裡紅如一片胭脂或遍身皆有成塊紅者八九日後死見形證治痘瘡之期始於見點從見點而數之期止七日七日之內如花之始蕾而發也其氣日盛以出七日之後氣斂而花謝矣故服藥者當於七日之內日夜連服毋或姑息苦之以七日所以全之於百年人不知此而惟務姑息七日之外服無益矣豫嘗謂痘毒之在血氣譬若糠粃之在米也惟血氣充足運轉迅急若篩米然運轉不停則糠粃不混於米而騰起浮聚自作一團血氣充足周流則毒不滯於榮衛之中而自然收斂以成瘡故痘瘡及時貫膿未嘗爛肌損肉只是將皮肉紅色毒氣收貯窠囊而已其有日久才發臭爛者此皆變證而非本然如此也今舉世以食物發痘而不知其本無益也惟服補氣血藥以助其運行推出之勢可也發熱三日之後熱退身涼大小不等作三次出淡紅色如水珠光澤者不須服藥凡痘子出現疏則毒輕不可妄治密則毒甚卻要磊落大小分明不相黏連略與托裡解毒之劑快斑湯消毒飲主之使之易發易靨如出太密黏連模糊其毒尤甚托裡解毒之劑宜多飲之以防癢塌黑陷之變更察外證可治則治不可則勿治凡痘子出形皮肉如常根苗明潤此毒輕也不可妄治如皮肉昏黑或赤腫根苗乾枯青紫或灰白者此毒甚也以消毒飲奪命丹合服快癍湯人參五分當歸防風木通各一錢甘草三分木香紫草蟬蛻各二分上銼細水一盞煎七分去滓溫服不拘時消毒飲牛蒡子連翹甘草緑升麻山豆根紫草各等分上銼細水一盞煎七分去滓溫服不拘時奪命丹麻黃升麻各半兩山豆根紅花子大力子連翹各二錢半蟬蛻紫草各一錢半人中黃三錢上研細末酒蜜和丸辰砂為衣薄荷葉煎湯下凡痘子之出最要唇潤舌潤紅鮮如常其毒則輕如唇焦破裂舌燥有芒為毒火太甚表裡郁遏急宜解之黃連解毒湯加大力子黃連解毒湯煩躁發熱一二日便出如才發一二日間痘便一齊湧出者須問其曾數日前有熱否如曾數日前乍熱乍涼以過期論惟原未發熱至今才熱便斑現此表氣虛毒氣盛榮熱衛弱腠理不密肌肉不堅不能約束於外使毒氣衝擊故出太驟也宜用實表之劑可以無癢塌無潰爛實表解毒湯主之一方用羌活散調紫草膏或保嬰丹加紫草牛蒡子蟬蛻與服熱盛不退以羌活散調退火丹進之另用燈草木通蟬蛻地骨皮煎湯候冷服此用發表之劑與表虛衛弱之說背馳蓋亦有初發熱時見表證失於解散實熱壅遏而怒發者此法猶可施也然得全者鮮矣實表解毒湯黃耆人參當歸稍生地黃白芍藥地骨皮甘草酒片芩柴胡玄參升麻上銼細加薄荷葉少許淡竹葉十片水煎溫服無時消毒快癍湯桔梗甘草節荊芥穗牛蒡子防風當歸尾赤芍藥天花粉黃耆玄參連翹前胡木通水煎服清地退火湯治痘帶熱而出名為火里苗急用此方以退其熱則後無青黑變陷之候地骨皮地膚子各一錢牛蒡子紫草葛根各八分連翹六分當歸五分木通三分蟬蛻二分上加姜一片水煎服如熱不退再服一劑或為末燈心湯服羌活散本門初熱保嬰丹本門預防退火丹即六一散加牛黃纏豆藤見初熱發熱四五六日始出如發熱四日至五六日後始出者須審視曾有外感內傷否蓋傷風寒傷食之熱久而不去則所蘊瘡痘之毒亦能乘間而出不可以過期論惟無內傷外感之因一向熱而不出此裡氣虛不能驅逐其毒使之即出而毒邪得以留連停伏於臟腑腸胃之間宜先用托裡之劑令其快出次以和中之劑多服之可以無伏無陷無倒靨托裡宜托裡快癍湯或十宣散和中宜四君子湯加黃耆或保元湯合勻氣散主之托裡快癍湯當歸黃耆川芎木香青皮牛蒡子紫草連翹木通防風桂枝蟬蛻上銼細加淡竹葉十片水煎溫服無時十宣散一名十奇散一名托裡十補散黃耆人參當歸各二錢厚朴薑製桔梗各一錢桂心三分川芎防風甘草白芷各一錢上為細末每服一錢或二錢木香湯調下增損八物湯人參黃耆白朮甘草當歸川芎牛蒡子炒赤芍藥防風荊芥穗連翹桔梗葛根上用水煎服勻氣散木香青皮各五錢山楂肉二錢半上為細末每服一錢甘草湯調服應出不出痘疹之出自有常期如過期應出不出有數證不同不可不辨如內素實之人皮厚肉密毒氣難於發越一旦恃其體厚不怯風寒又為外邪所襲或體素弱者風寒易感以致腠理閉密氣血凝澀故應出不出也其證頭痛四肢拘急偎倚蓋覆常惡風寒此類宜發之氣強者用雙解散氣弱者用參蘇飲或惺惺散俱初熱或內虛者脾弱食少宜用補脾之劑加行氣發表藥四君子湯不能食調元湯即參耆飲見大法並加木香青皮黃耆桂枝或臟腑自利宜用溫里之劑黃耆建中湯腹痛益黃散脾並與奪命丹合進利未止者豆蔻丸泄利合進蓋里溫則氣不消削氣不消削則不陷伏矣若依上法分治猶不出者此毒壅伏於三焦不久而變生焉加減參蘇飲人參紫蘇葉葛根陳皮前胡白芷桔梗枳殼甘草羌活防風上用竹葉為引熱服加減調中湯人參白朮黃耆甘草炙木香桂枝白茯苓藿香白芍藥酒炒陳皮上用生薑為引煎服聞人氏槻云是痘疹證熱數日而不發見者進退皆難便欲大發之懼其本稀而成癍爛不發之又無以出其毒氣古人立論始以藥微發之微發不出則加藥加藥不出則大發之大發之後所出不多氣候和平無他證者即是瘡本稀不可更發也以此言之發不至太過守不至不及乃用藥之丸活也愚按古方用發表者升麻葛根湯輕劑也惺惺散重劑也謂微發謂加藥者或先用輕劑後用重劑或只用本劑先小作湯少飲之後漸加大多飲之非謂於本方之外再加辛熱大發之藥也凡痘疹過期應出不出者或因外感風寒依上發表之法或因內虛泄瀉依上和中之法如按法調治猶不出快熱反甚大渴腹脹滿大便硬結不通煩躁不安者此毒邪壅伏於內三黃丸七味升麻丸初熱擇而用之甚則三乙承氣湯主之大便祕聞人氏云且身熱脈數大便祕而腹脹此熱毒壅遏未見形狀者當微下之非微下則熱不減此是始者熱在裡癍未出之時也若癍點隱隱在皮膚中者是已發越在表瘡正發時則不可妄下也又有結膿窠痂疕之際脈尚洪數能食而大小便祕此表已罷里有熱毒宜微利之大抵臟腑有熱往往利大小便者以其主出而不內故也張氏從道云瘡痘氣勻即出快蓋氣勻則榮衛無滯勻氣之藥如桂枝防風荊芥穗薄荷葉所以行在表之氣而使之無滯也故凡發表之劑多用之木香青皮枳殼木通所以行在裡之氣而使之無滯也故凡和中之劑多用之又瘡出之時常宜和暖如三春發生之氣則氣血和暢自然其出快其發透其靨齊若偏於太熱則壯火食氣其氣反虛而不能行偏於太寒則氣凝澀而不得行矣痘瘡之證其初不免於發熱者未出毒邪在裡煎熬氣血熏蒸臟腑而然瘡既現形則毒泄而熱解所以瘡出熱退者瘡本必疏若瘡已出熱不少減此毒蘊於中其勢方張其瘡必密宜急解其毒連翹升麻湯加防風荊芥穗地骨皮或解毒防風湯大法加升麻或東垣黍黏子湯本條兼服代天宣化丸預防服藥之後瘡或不出或再出其熱頓減者為氣和也熱若不減瘡漸加多再消詳大小便何如大便不通七物升麻丸初熱小便不利連翹湯小便不利小大便俱不通八正散小便不利自利者黃芩湯自利加白頭翁酒黃連調赤石脂末裡氣和毒解矣如更加渴煩躁不已或譫妄或腹脹滿氣促或自利不止手足厥冷此逆證勿治出太密潔一發便密如針頭形勢重者合輕其表而涼其內連翹升麻湯主之然稠密之處各有經絡部分所屬額主心面主胃腹與四肢主脾脅主肝兩腋主肺下部主腎肩背主膀胱當隨見證治之若面色黃大便黑煩躁喘渴或腹脹者瘀血在內也用犀角地黃湯或抱龍丸生犀角汁但根窠分明肥滿者無妨薛前證若屬心經用導赤散之類胃經用犀角散之類肝經用柴胡湯之類大凡稠密者熱毒熾盛也若密而不痛用東垣消毒散若密而作痛用仙方活命飲若密而小便不通用八正散若密而大便不通用承氣湯若密而惡寒發熱用麻黃甘草湯連翹升麻湯潔古連翹升麻湯即升麻葛根湯加連翹一分是也此又萬氏所增定連翹一錢升麻葛根桔梗甘草各七分牛蒡子一錢木通八分白芍藥五分薄荷葉少許上銼細加淡竹葉燈心水一盞半煎一盞去滓溫服無時東垣鼠黏子湯治癍疹已出稠密身表熱急與此藥防後青乾黑陷鼠黏子炒二錢當歸身酒浸甘草炙柴胡連翹黃芩黃耆各一錢地骨皮二錢上㕮咀每服三錢水煎去滓溫服空心服藥畢且勿與乳食犀角消毒散治癍疹丹毒發熱痛癢及瘡疹等證牛蒡子甘草荊芥防風各五分犀角鎊二分金銀花三分上水煎熟入犀角傾出服東垣消毒散即消毒救苦湯見大法仙方活命飲餘毒發表痘出太盛煩喘甚者麻黃黃芩湯痘出太盛煩喘咽痛而嗽者麻黃湯入麝香尤妙麻黃甘草湯治表實痘毒焮盛稠密麻黃生甘草上水煎服攻裡潔古云癍已發密重微喘飲水者有熱也用去風藥微下之滄洲翁云瘡已發稠密微喘渴欲飲水宜微下之當歸丸及龐氏地黃膏外以黃柏膏塗面佳痘出太盛喘促腹滿小便赤手足心並腋下有汗或狂言妄語大便不通宜四順飲小承氣湯下後諸證悉退不可再下表裡田氏調肝散治瘡疹太盛宜服令瘡不入眼生犀二錢半草龍膽麻黃去節釣藤鉤各一錢黃耆桑白皮炒黃石膏各半兩大黃栝蔞仁去皮甘草炒各二錢上為粗末每服三錢水煎食後溫服微利效涼血海藏云出太多者犀角地黃湯地骨皮鼠黏子湯即地骨皮散加鼠黏子龐氏地黃膏生地黃四兩豆豉半升雄黃一錢麝香半錢上以豬膏一斤和勻露一宿煎五六沸令三分去一絞去下雄黃麝香攪均稍稍飲之毒從皮膚中出即愈丹又解瘡毒藥絲瓜升麻芍藥酒炒甘草生山楂黑豆赤小豆犀角上㕮咀水煎服或云一見皮肉纍纍紅點稠密急用纏豆藤燒灰加制砂連進三四服或薄荷湯調退火丹進之仍以牛蒡子為末敷囟門上以散熱毒非惟能使痘疏且免侵眼之患用纏豆藤燒灰為末加入退火丹內又用燈草木通蟬蛻地骨皮煎水調退火丹連進二三服則痘之稠密不分者遂分明矣後再用干葡萄五十個茜草根一兩荔枝連肉殼核五個芫荽子五錢無子莖葉亦可用好酒二碗煎一碗徐徐以熟水攙薄常與服之服盡滓再用水煎准茶常與之服則痘之稠者以退不作害未退者遂令如水珠起壯灌膿結靨矣凡痘子初出磊磊落落似稀疏之狀其後施加日多一日此毒伏於裡裡氣虛弱不能托之即出要大補兼解毒或什可救其一二也十宣散加無價散主之十宣散見前無價散倒靨王汝言曰痘瘡多者是毒氣多便先宜解毒然多則恐氣血周貫不足故隨亦宜兼補藥以助成膿血痘毒自內出外一二三日方出齊毒氣尚在內出至六日則當盡發於表七八九日成膿而結痂矣若毒氣盛不能盡出過六日毒反內入臟腑故須於六日以前毒氣該出之時急服涼血解毒之藥以驅出之六日以後醫無及矣出不快錢瘡疹三日不出或出不快即微發之鼠黏子湯之類如瘡發後不多出即加藥如一日一帖即加至二帖加藥不出即大發之升麻葛根防風羌活獨活麻黃桂枝之類如發後不多及脈平無證即瘡本稀不可更發也有大熱者當利小便四聖散六一散四苓之類小熱者當解毒若不快勿發勿下攻止用抱龍丸治之婁錢氏消毒散化毒湯活人鼠黏子湯皆發瘡痘溫平溫涼藥錢氏所謂微發之者是也如微發不出者即就與前項藥該每服二錢者即加至三四錢該每日二服者即加至三四服如加藥又不出者即用升麻葛根麻黃桂枝大發之如大發後不多及脈平無事者即瘡稀不可更發如脈洪有熱有大熱者當用四聖導赤八正輩利小便有小熱者當用芩連及金花丸輩解毒若利小便解毒後又不快則勿發勿下止用抱龍丸治之此錢氏心法也潔若出不快清便自調知其在表不在裡當微發升麻葛根湯若青乾黑陷身不大熱大小便澀則是熱在內煎大黃湯下宣風散若身表大熱者表證未罷不可下若癍已出見小熱小便不利當以八正散利之海太陽出不快身之後也荊芥甘草防風湯陽明出不快身之前也升麻加紫草湯聖惠方升麻葛根加紫草少陽出不快身之側也連翹防風湯即連翹散四肢出不快防風芍藥甘草湯呂凡痘瘡出不快者有五證臨病審而調之一證天時嚴寒為寒所折不能起發宜散寒溫表冬三月寒甚紅癍初見宜五積散正氣散參蘇飲楊氏調解散俱初熱陳氏木香散泄利一證炎暑隆盛煩渴昏迷瘡出不快宜辰砂五苓散煎生地黃麥門冬湯調服身熱者小柴胡加生地黃熱甚煩渴而便實者白虎加人參湯輕者人參竹葉湯加生地黃俱傷寒煎服一證服涼藥損傷脾胃或胃虛吐利當溫中益氣宜理中湯泄利吐利甚者加附子或陳氏異功散出不快木香豆蔻丸泄利一證或成血疱一半尚是紅點此毒氣發越不透必不能食大便如常者宜半溫里半助養之劑用四聖散加減及紫草木香湯絲瓜湯阮氏萬全散湯氏安癍湯一證外實之人皮膚厚肉腠密毒氣難以發泄因出不快宜消毒飲透肌散如大便祕實於消毒飲內加大黃梔子仁煎服瘡出太稠宜犀角地黃湯張氏解毒防風湯血氣不足宜十奇散咽嗌不利宜如聖湯加薄荷枳殼口中氣熱咽痛口舌生瘡宜甘露飲子驚風搐搦宜抱龍丸煩渴宜獨參湯黃耆六一湯張瘡已出而不遍勻者聞人氏云惟透肌解毒無壅塞之患則自然出勻以必勝散大紫草飲胡荽酒之類主之痘出不長隱於肌膚者人參透肌散主之出不快有數證不同內虛熱極而不發者朱汝明用四君子加黃耆紫草發之有內虛甚而生寒大便利而出不快者宜理中姜附輩以溫之則氣不消剝自不伏陷有內實而兼諸熱證出不快者用四聖散加味四聖散紫草飲子紫草木香湯紫草木通湯快斑散絲瓜湯俱可選用或氣實痰鬱而發不出者蒼朮白芷防風升麻黃芩芍藥連翹當歸孰為主痰鬱之藥乎等分煎服兼化抱龍丸若毒根在裡或血氣虛弱或邪穢沖觸內陷而出不快者托裡散彭氏云疹痘發未透宜四君子湯加黃耆紫草糯米煎凡醫百病不可損胃氣故用四君子及糯米等助其胃氣服此藥後若患者身全不熱又以菟絲子醋製為末方在後大人一錢小兒七分或三分托之則痘疏疏出矣此藥大補助火不可多多則托出太多矣隱於肌肉不起宜紫草飲子煎服又不可過用候三日齊後以保元湯加好酒人乳一二服最穩紫草二兩細銼以百沸湯一大盞沃之以器合定勿令泄氣量兒大小溫溫服微發消毒散治瘡未出或已出未能勻遍又治一切瘡涼膈去痰治咽喉痛牛蒡子炒三兩甘草炙半兩荊芥穗二錢半上同為粗末每服三錢水一盞半煎七分去滓溫服海藏云此藥皆溫平之劑一云加防風薄荷鼠黏子湯治小兒痘瘡欲出未能得透皮膚熱氣攻咽喉眼赤心煩鼠黏子炒四兩荊芥穗甘草各一兩防風半兩上為細末沸湯點服臨臥大利咽喉化痰涎止嗽皆宜海藏云太陽少陽之劑首論溫平者此也又法用牛蒡子炒熟為末同荊芥煎服上三方消毒飲加減法也化毒湯治小兒痘瘡已出未出並宜服之紫草茸升麻甘草炙各等分上㕮咀水二鍾粳米五十粒同煎此陽明之藥也海藏云出不快者化毒湯本事方用糯米去粳米丹亞玉痘出兩日不甚透食稍進汗微出熱略減但食物口中覺有惡味此出得遲發未透須微微表之升麻甘草炙紫草白朮陳皮芍藥炒半錢作一帖加少酒同煎白芍須炒見其大便雖出不多卻白帶溏滑透肌湯治痘不透紫草白芍藥升麻秫米粉炒各半兩上三方皆化毒湯加減法也大發頭面出不快此太陽經也當用荊芥甘草羌活防風天麻共煎胸脅出不快此少陽經也當用柴胡黃芩紫草木通紫蘇共煎四肢出不快此陽明經也當用升麻葛根紫蘇芍藥甘草連須蔥白共煎遍身都出不快當用九味羌活湯以上四證藥味內各加薑蔥為佐連進二服痘出快矣九味羌活湯羌活防風蒼朮細辛少白芷黃芩川芎生地黃宜以芍藥易之甘草水煎量大小輕重加減散寒五積散正氣散調解散三方俱見初熱清暑辰砂五苓散五苓散加辰砂細研末是也人參竹葉湯治夏月吐逆煩躁口渴心悶不寧及疹後餘熱不退小便赤或赤斑者人參半夏麥門冬當歸淡竹葉各等分上銼散每服三錢水一盞生薑一片煎服白虎湯石膏四兩甘草節八錢知母一兩六錢上為粗末每服三錢水一盞粳米二十粒同煎至半盞去滓溫服不拘時加入人參一兩二錢名人參白虎湯聖惠方加乾葛小柴胡湯發熱攻裡汪機云有紅斑點出日數未盡其內實而肌熱者宜疏利之紫草例海藏云小兒瘡疹出未快可濃煎紫草汁服按紫草通腠理利九竅涼血活血故為痘家欲出未出必用之藥若出已透而大便利者忌之紫草散發癍疹釣藤鉤子紫草茸各等分上為細末每服一字或五分一錢溫酒調下無時四聖散治瘡疹出不快及倒靨一方有黃耆紫草茸木通甘草炙枳殼麩炒上等分為粗末每服一錢水一鍾煎至八分溫服無時劉提點云疹痘最要大小分曉錢氏四聖散用木通枳殼極好若大小流利不必苦泥紫草回癍散小兒痘疹出不快或倒靨毒氣入腹紫草茸黃耆桑白皮木通枳殼白朮各等分上為粗末每服三錢水酒各半盞麝香少許同煎服紫草木通散治小兒瘡疹紫草木通人參茯苓粳米各等分甘草減半上為末每服四錢水煎此小便不利之劑也人參蟬蛻散治小便不利瘡痘不散煩躁多渴戛牙咬齒氣粗喘滿人參蟬蛻白芍藥木通赤茯苓甘草紫草茸各等分上用水煎服透肌散紫草茸緑升麻粉甘草各一錢上細切水煎服或與消毒飲同煎服尤妙紫草透肌湯治痘熱而出不快及頂陷者紫草一錢升麻木香各五分牛蒡子防風荊芥黃耆各八分甘草三分上姜水煎服如色紫腹痛加蟬蛻一錢紫草快癍湯治痘疹血氣不足不能發出色不紅活等證即紫草湯紫草人參白朮茯苓當歸川芎芍藥木通甘草糯米上每服二錢水煎烏金膏治發熱至七日以前或因風寒痘不起發或紅紫或驚搐俱可用殭蠶酒洗全蠍去足尾酒洗甘草紫草白附子味苦內白者真麻黃各五錢穿山甲炒末二錢半蟬蛻去頭足酒洗淨二錢上為末將紅花紫草各一兩好酒二鍾熬去大半去滓入蜜五兩慢火同熬滴水成珠為度丸如龍眼核大每服一丸燈心湯化下紫金散治痘瘡出不快及倒靨亦治遠年不愈惡瘡紫草蛇蛻炒焦牛蒡子炒各五錢上為細末每服一錢水半鍾煎減半溫服獨勝散初熱蘿蔔湯治痘疹出不快者上用開花蘿蔔煎汁時時飲之蓋痘疹氣勻即出快蘿蔔治嗽定喘下氣消脹解毒野通散治痘瘡出不快及傷寒不語干野人糞即獼猴糞火燒存性冰片真麝香各等分上為細末每服五分看大小用新汲水入蜜調下十歲以上者服一錢按野人糞治蜘蛛咬瘡此治痘出不快大效若蜘蛛咬瘡久而不愈其絲生皮膚延蔓遍身不愈者加雄黃青黛水調以蜘蛛試之立化為水屢驗蓋此三味是治瘡疹當用之藥取山中者若人家所養之猴食物味雜即不效失其本真也補虛例丹勉奴痘已出第三日色淡不肯發此血氣俱虛與此方人參訶子煨各一錢白朮炒黃耆酒炙當歸身酒洗各二錢陳皮二分甘草炙少許豆蔻煨一錢半上煎入好酒些少飲之六一湯見灌漿祕傳大透肌散人參芍藥川芎甘草茯苓白朮木通陳皮黃耆糯米上各等分為粗散每服四錢水煎服活活血散治瘡子或出不快用白芍藥末酒調如欲止痛只用溫熱水調咽下海藏云張和之治四肢出不快加防風大效此證乃太陰藥也世四物湯治痘瘡出不快不甚紅活不起根窠緣血虛故也此藥能活血調順痘疾無如此方自古及今用之如寶只加甘草服之通天散治痘發熱不出或已出而色不紅活人參陳皮桂枝各八分川芎熟地黃芍藥各一錢當歸紫草各一錢半紅花木香各三分甘草六分知母八分荔枝殼十個上用雞汁一鍾棗三枚糯米一撮煎服初服到頸再服到臍三服到腳神效人參透肌散治痘瘡虛而有熱雖能出快長不齊整隱於肌膚間者人參紫草如無以紅花代之白朮茯苓當歸芍藥木通蟬蛻甘草糯米各等分上每服三錢水一盞半煎半盞徐徐服升均湯治痘瘡已出不均或吐瀉熱渴升麻乾葛芍藥人參白朮茯苓甘草紫草茸如無紅花代之上每服三五錢姜水煎量服之祕方菟絲子一味醋浸一宿焙乾為末發熱時每一歲兒服七分量兒大小加減好酒調服甚易發易脹易靨且後無餘證此方氣血弱者未出之先可用既出之後不可用用則托出太多此方系胡黃谷祖仰山公宦遊廣東得之用者百發百中但元氣厚者服之不免太密乃大補助火故也或曰痘未出之先既可服此又奚取於保嬰丹乎殊不知保嬰以解毒而使之稀此則氣血弱不能出者服此而托之使出也又方臘月梅花將開時採曬乾為末煉蜜為丸未出之先量兒大小三四服可令豆稀加硃砂尤妙二花散治痘疹已出未出不發不起隱在皮膚之間熱證並治梅花一兩陰乾絲瓜五錢陰乾桃花五錢陰乾硃砂二錢水飛過甘草一錢去皮火煨上為細末每服五分半未痘時蜜水調下服前藥仍不快無諸惡候者可服八味二花散見大法虛寒例丹女子瘧後出痘血氣俱虛又值冬寒熱易退不出丁香五粒附子肉桂陳皮當歸酒洗各五分人參半兩黃耆一錢甘草炙二分陳異功散治痘瘡已出之間不光澤不起發根窠不紅謂之表虛木香當歸各三錢桂枝白朮茯苓各二錢陳皮去白厚朴薑製人參去蘆肉豆蔻各二錢半丁香半夏薑製附子炮去皮各一錢半上㕮咀每服二錢水一盞姜五片棗三枚煎服上治虛寒虛而不寒者宜用前方血氣俱虛之劑不宜用此必脈虛細四肢身體冷者方可用之十補散滋養氣血調養脾胃能使瘡毒速出有寒證者用之加紫草木香糯米名參耆內托散黃耆人參當歸各二錢厚朴桔梗川芎防風白芷甘草各一錢桂心三分每服四錢水煎服或為末溫水調下一錢五分虛熱例藍根散治瘡疹出不快及倒靨一名二聖散救小兒垂死板藍根一兩甘草炙七錢半上末每服半錢取雄雞冠血三兩點同溫酒少許食後調下無時甚則三五服立效丹溪云藍能分散敗血絲瓜散發瘡疹最妙絲瓜連皮燒灰存性百沸湯調下或以紫草甘草煎湯調服尤佳米湯亦可蘿蔔湯見前煩不得眠例痘疹煩不得眠者甘桔加梔子湯桔梗甘草梔子上各等分煎服活治痘出不快煩躁不得眠者水解散麻黃黃芩湯升麻黃芩湯主之海藏云莫若定其氣血用石膏梔子之類尤佳麻黃黃芩湯升麻黃芩湯亦當求責的是太陽陽明方可用之水解散治天行頭疼壯熱一二日兼治疱瘡未出煩躁或出尚身體發熱者麻黃去節四兩大黃黃芩桂心甘草炙芍藥各二兩上為粗末患者以生熟湯浴訖以暖水調下二錢相次二服得汗利便瘥強人服二方寸匕風實之人三伏中亦宜用之若去大黃春夏通用升麻黃芩湯治痘瘡出不快煩躁不得眠麻黃黃芩湯治痘瘡出不快益煩躁昏瞶或出尚身疼熱者二方見小兒傷寒門胡萎酒胡荽一味細切四兩以好酒二盞煎一二沸入胡荽再煎少時用物合定放溫每吸一大口微噴從頂至足勻遍勿噴頭面病人左右常令有胡荽氣即能闢去汙氣瘡疹出快指南有禁瘡之說云痘毒奔潰由氣血虛弱不能拘領其毒以致毒盛而聚於腠虛之處故痘之初出也或一點二點見於隱僻腠節之處及方廣四肢之間此痘一出則諸痘不得宣發成漿矣故曰禁瘡其禁有五一曰胃禁二曰火禁三曰水禁四曰風禁五曰寒禁胃禁者毒火炙胃不能發散於肌表脾胃潰爛其外證之痘出於唇口之間者或二三四五點相連諸痘未漿此痘已先黃熟知由熱毒內攻胃已腐爛故諸痘不得成漿也如唇口一見此痘當察其面色煩紅氣粗熱甚口臭異常者是其驗也火禁者小兒初發之際或因身發寒熱而誤以火熏炙其衣被或睡臥於火箱之中使皮膚乾燥故痘毒發泄不出又兼氣虛而不能拘其毒則毒停皮膚之內隱隱不能發出肌表也細看皮內覺有紅點無頭無腳或於四肢頭面方廣之處見一二點痘子則諸痘皆從此痘上發泄為孽而皮內隱隱不出之痘終不能快出名為火禁以水楊加荊芥煎湯浴之則諸痘自發矣輕則升麻和解散主之水禁者初發熱之際陰陽未分毒氣方熾或誤食生冷則毒停於皮肉之間隱隱有紅點或於方廣兩脅手足頭面之際發有水泡者是也蓋冷氣在內則腹疼肚脹在外則發熱惡寒此其驗也以丁桂茯苓升麻大腹之類逐之冷食遺積脾胃須防下泄再加山楂風禁者發熱之初失於不避風則風入肌表痘不能發或肌膚麻木不知痛癢或不麻木而乾燥或毛直而乾焦或皮癢欲搔或重則狂煩譫語此風與火搏故也治法以升麻湯加羌活荊芥以逐之甚則蒺藜蟬蛻以攻也寒禁者發熱之初誤經冷水沐浴或睡臥於鐵漆寒冷之處或衣被單薄感冒寒氣則痘必不能宣露有手足麻木不知痛癢有四肢冷痛不能舉動者有麻木冷痛之處不出痘子惟於委曲避風之處或頭面髮際之上痘出如癮疹者是其驗也內以丁桂川芎升麻逐之外用綿衣以溫之曾見小兒年十一二歲發熱之初臥新漆床上初因熱極父母不防出痘任小兒手貼漆床而臥致令寒氣侵入手臂其餘四肢面腹方廣之處俱出有痘惟一臂麻木不仁無一點痘見諸醫視之並不知其故請豫至詳察其由乃以前方治之後見一臂痘發出比他處尤為稠密臂痘一出諸痘俱起九日而平復如故出見部分經曰諸痛癢瘡皆屬心火心之華在面痘瘡之火其出先在於面但觀其出之部位可以知其侯之凶吉如先在唇四畔出者或兩頤出者吉蓋太陽之邪下傳陽明陽明者胃與大腸積陳受朽氣血俱多又口為水星頦頤屬腎水火為水制不能作虐也如在額角眉心先出者凶蓋太陽足壬膀胱水手丙小腸火丙火獨旺不受壬水之制其毒並於膀胱之經而先自病膀胱多氣少血又正額屬心火火不務德妄行無忌心為君主之官主危則十二官皆危矣凡起發成漿結痂亦如此論經曰頭者精明之府又曰春氣者病在頭可見頭乃人真元會聚之所為發生之本又面列五官分五行而五臟之華皆見於面是頭面者人君之象至貴至尊不可凌犯者也咽者胃脘水穀之道路也主內而不出喉者肺脘呼吸之往來也主出而不內在人之身譬猶關津要路也瘡痘之出最要頭面稀少頸項無方是吉兆若頭面多者謂之矇頭諸陽獨亢五官俱廢神明失守精華自萎經云神去則機息氣止則化絶者此也頸項多者謂之鎖項內者難出外者難入上者不升下者不降經云一息不運則機緘窮一毫不續則霄壤判者此也故皆不治陳氏文中曰痘瘡輕者作三四次出頭面稀少胸前無蓋頭面者諸陽之會胸者諸陽之所受氣此數處痘子宜少不宜多以清陽之分不可濁亂也手足雖諸陽之本乃身所役使卒伍卑賤之職非若頭面為元首也又居四末非若胸膈心肺之居神明之舍也故雖稠密不必憂也若頭面胸項手足稠密瑣細一樣者卻愁氣血衰微脾胃虛弱不能周流灌注起發不透收靨太遲而生他變矣凡痘子初出便自手足先出者他處未起而手足先起他處未收而手足先收者此陽火大旺宜用解毒抑陽扶陰之劑四物湯失血合黃連解毒湯煩躁主之如他處俱起而手足起遲他處俱收而手足不收者此脾胃虛弱不能行其氣血達於手足宜補脾胃十全大補湯汗桂枝芍藥湯腹痛主之一出紅點數粒發於山根之上為毒盛氣虛而毒乘虛犯上或發三五粒一塊者皆不吉之兆也宜急用涼血解毒以防危急若腮頤地閣之間疏疏發見淡血潤色三次出者乃吉證也出見形色凡痘瘡之出不論疏密而論磊落若磊磊落落如珠如豆顆粒分明尖圓緊實雖密無妨此謂出盡無留毒也如黏聚成叢模糊作塊不分顆粒恰如紅瘤雖只一二處未可言疏此謂之伏出未能盡若待後者再出則先者或陷而復隱或癢而俱潰成壞瘡矣此猶淹延引日久而後斃若如蠶之殼如蛇之皮此氣至而血不榮也謂之乾枯如蚤之咬如蚊之嘬此血至而氣不充也謂之陷伏不能引日奄忽而死矣痘瘡初出與未病時皮色一般者善若瘡太赤根下皮色通紅此血熱氣不管束也後必起發太驟皮嫩易破癢塌而不可救宜急解血分之熱四物湯失血加升麻地骨皮紅花紫草或消毒飲活血散起發合而飲之待色少淡急補氣分之不足四君子湯不能食加黃耆防風木香或調元湯大法參苓白朮散痘渴合而飲之仍用血氣二方相間而服若成漿不破損者吉服藥不效反增瘙癢者命也痘瘡初出有四善紅活明潤緊實堅厚尖圓布散磊落稀疏蓋痘子賴血以潤之血活則其色如丹砂如雞冠若毒凝血聚則遂成黑色今頭焦黑者乃榮血不能流行內外毒氣壅遏此證甚危其人必大小便祕喘急煩躁宜用七物升麻丸初熱當歸丸便祕通關散便祕三乙承氣湯便祕看輕重緊慢用之以解里之急得利後以紫草飲加味四聖散調無價散以解表之毒仍用胭脂塗法瘡變紅活以漸起發者吉若更乾黑者凶莊氏云斑瘡倒靨而黑色者謂之鬼瘡痘子賴氣以束之脾胃強氣實則肌肉厚皮膚堅今痘皮嫩薄溶溶如淫濕之狀乃脾胃氣虛其人必少食或自利宜用十全大補湯自汗去生地黃加防風白芷外用天水散即六一散見初熱蜜水調拂瘡上以解表之濕熱瘡若起發成漿者吉漸變癢塌者凶聞人氏云瘡痘作癢深為可慮能調和愛護勿令有此乃為上策痘出如灰色白者氣虛也候齊後以保元加木通川芎肉桂最穩用木通者取通心氣也出不紅活淡色者血虛也保元湯中加酒製當歸酒炒赤芍藥及川芎血熱者仍加生地黃薑汁拌曬倍黃耆痘出皮膚乾燥枯澀者必難起脹用溪中白石洗淨燒紅以井花水漬之使濕氣蒸於痘上頃間光澤甚易起又能闢穢一出與地皮相似無臖起之意乃是紅斑急宜涼血解毒宜羌活散加酒炒芍藥紫草紅花蟬蛻木通糯米連進數服或以六一散保嬰丹紫草膏隨意用之亦可癍退以保元加木香豆蔻煎服以解紫草之寒防其泄瀉若夾疹同此如治稍遲則變成黑癍實難救矣大抵下紫草必下糯米五十粒則不損胃氣無泄瀉之患惟大熱大便祕者不下糯米以糯米黏膩故也余詳夾癍夾疹條一出真紅焮赤摸過皮軟不礙手者此係賊痘過三日變成水泡甚至紫泡黑泡此危證也急少加保元大加紫草蟬蛻紅花解之或煎燈草木通湯調六一散利去心熱而紅紫自退如已成水泡則保元中大下四苓利之此千金妙法也不然則遍身擦破赤爛而死痘子初出不成顆粒但皮膚間濟濟簇簇如寒風粟子之狀或雖出形與針頭相似稠密無縫此皆惡候雖有良工無能為矣紫草飲紫草芍藥麻黃當歸甘草各等分上銼細水一盞煎不拘時服加味四聖湯紫草木通木香黃耆炙川芎甘草人參各等分蟬蛻十個上銼細加糯米百粒水一盞煎服胭脂塗法先以升麻一味煎濃湯去滓卻用胭脂於湯內揉出紅汁就以本綿蘸湯於瘡上拭之阮氏萬全散治痘瘡出不紅潤防風人參蟬蛻各等分上細切每服四錢水一盞入薄荷三葉煎六分溫服熱而實者加升麻化毒湯治痘已出而熱毒未解宜清熱涼血毒一解不致黑陷血一涼不致紅紫紫草升麻甘草蟬蛻地骨皮黃芩酒炒木通上各等分水煎服解毒散治毒先發腫者名為痘母後發者十有九死先發者吉金銀花五兩甘草一兩木通防風荊芥連翹牛蒡子各三錢上用酒水各一鍾煎服如泄加訶子豆蔻痘紅者加炒黃芩芍藥瘡癢者加歸身生地或加何首烏尤佳疼痛者加赤芍藥露桃花散痘形一兩日梟紅罩錦或色焦紫惡渴煩躁睡臥不寧再不宜以藥下之准服露桃花散自然紅活露桃花紫草紅花白芍藥加倍木通生地黃茯苓甘草橘皮上用燈草煎服露桃花性陰而和陽取時須待將開含笑清晨摘取飯鍋上蒸熟焙乾帶蒂入藥不宜多用多用則恐作瀉若不預收多加紫草茸芍藥可也黃連解毒湯痘出三兩朝身中熱烙焦紫無紅活色梟炎猛烈之甚也或眼紅臉赤或小便澀結須服黃連解毒湯加減犀角地黃湯可也黃連生地黃芍藥甘草木通車前草殭蠶桔梗連翹牛蒡子荊芥水煎服或去殭蠶翹芥加紫草茸燈心熱甚加柴胡地骨皮飽脹加全栝蔞枳實山楂氣弱不相枳查加減犀角地黃湯犀角木通生地黃芍藥紅花紫草茯苓車前草鮮者地骨皮鮮者甘草水煎服犀角須用井水磨濃俟藥煎如度投下服之不可和內煎也若身熱驚厥加紋銀一塊同煎蓋因肝木旺而心火炎上故金以克之耳五龍湯痘一見形就是蚊蚤咬的形者是痘毒緊輳心肝二經而然也極是犯君痘經云臣陵於主逆天條有福兒童驀地逃總然和順成功去也在刀山走一遭好把化癍湯浴之內服五龍湯黃連紫草茸芍藥各三錢生地黃九錢煎濃入水磨犀角汁和服王氏治此多用大黃湯下之徹逐其毒隨用升表之劑固為美法下後不能提峻速致其死不若五龍之為妥也化癍湯金線薄荷大水楊柳荊芥蒼耳草四味共煎濃去滓將頭髮滾湯洗去油垢團櫳仍湯熱徐徐浴之必須置之暖處外再服前藥癍去而痘自鼎峻矣四仙散痘起遍身俱是黑色論備載在前矣要是元癸奪權爭先如青天晴極而云霧靜水風動而波行第一奇痘也只以化癍湯浴之於外而內服四仙散自然色變而為美矣甘草紫草與通草三般遇此多是寶黃連連翹與石蓮三味合浸共一炒研末惟在空心時砂糖調服霎時好此痘得者甚鮮非富貴之至者不能見此若見形而盤縷失天元者不在此列按此即所謂鴉翎痘也雖黑而光潤圈圓頂峻與常痘同得之者必主大貴玉泉散痘形一朝就結焦粒是梟炎徹於肝榮而玄水弗克和解急服玉泉散庶可挽治犀角二錢白芎黃連各一錢為細末冰片三分另研濃煎甘草湯或建糖調服大者五分小者再減此方屢治痘焦者恆獲速效但犀角人不諳用法必須粗礪瓦盤井水磨之待澄淨去水刷於綿紙上略有乾燥方和前藥用之若以鐵器鎈下細末犀不漬水則不效出多熱不退涼血解毒湯痘出熱不退紅不分地或痘苗乾枯黑陷急用此方可起壯灌漿紫草一錢生地黃柴胡各八分牡丹皮七分赤芍藥蘇木防風荊芥黃連木通各三分牛蒡子四分天麻紅花甘草各二分上用姜一片燈心二十根糯米百粒水煎服清地退火湯見前加味犀角飲痘已出不勻心煩壯熱口舌生瘡犀角牛蒡子荊芥甘草防風升麻桔梗麥門冬水煎服護咽喉凡瘡疹未有咽不痛者心胃有熱上攻於咽乾澀而疼宜於發熱初出之時預解之甘桔湯加牛蒡子甚者射干鼠黏子湯令毒火解散不停留於咽喉之間致生他變也若初時隱忍不即解之以致毒留咽喉發而為瘡腫脹潰爛水穀不入呼吸不能聲啞難言卻欲呼醫悔無及矣所以甘桔湯瘡出之後常宜飲之利咽喉寬胸膈清肺金解毒火也如兼口舌生瘡齒浮齦腫者宜甘桔湯合黃連解毒湯加牛蒡子水漿不入者射干鼠黏子湯加桔梗荊芥穗山豆根以上證候須能食臟腑亦熱方可用如上焦雖熱卻覺小便清大便溏飲食不進者只用甘桔湯不須加牛蒡子蓋其性涼為瘡疹所宜服者能透肌出癰瘡是以瘡疹亦出也大便利則不可服甘桔湯射干鼠黏子湯俱咽喉護目痘瘡方出之時使不入目以神應膏塗眼四周或只以胭脂取汁塗之或敷以水調黃柏末或以牛蒡子為末蜜調貼囟上或以白芥子末水調塗足心此皆養護之良法也若眼中流淚或多眵或目中紅赤此肝火大旺宜早解之洗肝明目散加蟬蛻又有忌食之法如濃厚滋味牛雞鵝鴨皆不可食食雞鵝鴨卵未有不為目害者但令食淳淡之物或少入鹽亦無害如湫隘之家不可煮雞鵝鴨卵其氣相襲亦能損目不可不知神應膏黃柏一兩真緑豆粉一兩半甘草四兩紅花一兩上為細末用胭脂水和蜜水調塗兩眼四畔之瘡痘上黃柏膏如瘡疹已出此藥塗面次用胡荽酒外治法黃柏一兩緑豆粉紅花各二兩甘草四兩上同為細末生油調從耳前至眼眶並厚塗之日三兩次如早塗瘡不至面縱有亦少彭氏云痘疹護眼人多用胭脂據亢醫云不如錢氏黃柏膏最好諸家護眼法無出此方也痘瘡初出用鼠枯子為末水調敷囟門並無患眼亦妙洗肝明目散眼目夾疹夾癍錢氏云痘瘡只出一般者善凡痘初出其間碎密若芥子者夾疹也皮肉紅腫成片者夾癍也疹由心熱癍由胃熱宜急解其毒消疹用黃連解毒湯煩躁合消毒飲化癍用人參白虎湯痘渴合消毒飲或只以升麻葛根湯夾疹者加防風荊芥穗木通麥門冬黃連夾癍者加石膏人參大青玄參淡竹葉如疹散癍解現出正痘疏密停勻者吉痘被癍疹夾雜不能起發者凶疱瘡聞人氏云傷寒熱邪在表里未能作汗或當汗不汗熱鬱於肌膚故發疱瘡色白或赤如火丹頭作漿白膿者輕根下紫色隱隱在肌肉者重甚者五內七竅皆有之其形亦如痘小兒肌肉嫩薄尤多此證非正瘡痘也又云六腑屬陽有熱則易出是以作膚瘡一出即遍滿肌皮之上如痱瘡細疱子見而便沒其所受氣淺故也五臟屬陰有熱則難出其為瘡痘在肌肉血脈之間必先發紅癍而後如豆故名瘡痘其所受氣深故也大抵暴熱而便出者必膚疹久熱而難出者必是正瘡痘膚疹非正瘡痘也愚按痘瘡初出五臟不同肝水疱其色微青而小肺膿疱其色微白而大心為癍色赤而小脾為疹色赤黃而淺及五七日之後不問其初出自何藏悉成血疱血疱成膿疱正如豆樣膿疱之後結痂疕則愈此方是正瘡痘也或人疑之曰肺既為膿疱而血疱之後又成膿疱者何耶蓋膿疱之出於肺者言其初時淡淡如膿其色白而非黃俗稱白痘者是也若血疱之後所結膿疱則是其瘡已熟譬如果之成實飽足充滿包裹黃膿其色黃而非白也子母痘袁痘經於心者必湧出而無漸經於腎者必沉匿而難見痘焉有子母者耶若肝肺脾三經來者或作兩三次而盡標或作四五次而盡標或一邊灌漿一邊表暴或回盡而旁隙處痘又臻焉或頭面先稀少身體多布列而後上焦又添出焉或身體先稀少頭面多布列而後下焦又倍出焉此所謂子母痘者也蓋因元氣以漸而至梟炎以漸而微不失之峻速以貽莫勝之悲不失之隱滯而踵攻激之害疔癍可消溶於起點之時癰毒自祛除於靨痂之後非陽明胃太陰脾二經弗克致也世俗以先標者謂之望痘後出者謂之贈痘意有在焉禁忌瘡痘本因熱而出熱勢甚則其出愈難故癍點未見之時惟當用平和藥如升麻葛根湯參蘇飲俱初熱東垣鼠黏子湯出太密惺惺散初熱等解利之或有不問虛實便以辛熱之劑大發之施之虛者猶庶幾焉若盛實之人熱毒瀰漫榮衛閉塞里毒甚者大便不通小便如血是謂郁毒不散毒氣無所從出反攻臟腑表毒盛者瘡凹而不起遂成倒陷或為潰爛或為癰瘡當此之際不能解利至於斃者多矣是陽盛熱熾無陰氣以感之也用消毒飲咽喉七物升麻丸初熱得毒氣解散榮衛流通瘡子將自起矣見形三朝生死凡小兒發熱三日之間熱退身涼涼而復熱熱而復涼然後報痘從口角顴骨上兩兩三三成對報點至三四五日出齊者順之兆也其或發熱只一日或二日即見紅點或吐瀉腹痛或戰栗身溫不食昏臥三四日痘不起發不光澤慘暗不明根窠色白皆虛寒之候也所謂險也可治而愈苟發熱太甚煩躁悶亂喘急不食及熱而復涼連熱一齊突出紅紫黑色不起渙不光潤為表中實熱或自太陽天庭方廣出起皆凶之兆難治報痘時頭面稀少胸前背後皆無根窠紅潤頂尖礙手如水珠光澤者上吉也不必服藥報痘時煩躁不寧腰腹痛不止口氣大臭出紫點者死亦有出青癍如藍靛色者皆死證也報痘時色白皮薄而光根窠全無紅色或根帶一點紅三五日即長如緑豆大此痘決不能灌漿久後成一包清水擦破即死不可因其好看妄與下藥報痘全不起頂又頂如湯泡及燈草火燒之狀十日後癢塌而死報痘時起紅癍如錦紋者六日死遍身如蛇皮者死報痘時黑癍如痣狀肌肉成塊黑者即日死痘身發熱未透而即報點現標已而覆沒不見又出又沒者謂之弄標痘蓋痘瘡全憑熱透則肌膚通暢自然易出今熱不透則地皮未熟出而覆沒隱而又出氣血衰弱之甚無力發泄故也難治痘色紅紫焦枯貼肉不起皮厚黑如鐵挑之不破無漿血者謂之鐵甲痘乃氣澀而不營血枯而不潤磅礴皮肉八九日內死凡瘡子已出頭面要稀疏磊落頸項上宜少不宜多胸前要少而疏如此者其毒則輕如面上模糊一片未發先腫纏項稠蜜胸前亦密此毒甚也勿治凡痘子出盡正將起發其中有發血疱者此毒伏於心即死有發水疱者此毒伏於肝旋見癢塌而死集之五心臟部三痘瘡中起發證治萬痘瘡之證熱三日出三日後方起發此常論也蓋先出者先起後出者後起痘疏毒輕氣稟厚者自易出易發易靨痘密毒重氣稟薄者自難出難發難靨未可拘定日數時師不知虛實補瀉之理但於起發之初便用補脾果內氣不足少食者用之允當若內實便祕能食之人寧不黨邪為惡乎非徒無益而反害之痘瘡之出有輕有重觀其形狀即可知之如一發便出盡者必重也瘡夾疹者半輕半重也出稀者輕裡外微紅者輕外黑裡赤微重也外白里黑者至重也瘡端里黑點如針孔者勢劇也青乾紫陷昏睡汗出煩躁熱渴腹脹啼喘大小便不通者困也善用藥者能使輕者易安重者不致大困斯可謂之十全矣凡痘瘡疏則無毒密則有毒痘疏毒少者邪不勝正其氣和其勢順不須服藥痘疏密布散邪正相持其氣病其勢險此宜抑邪扶正使邪氣亟奪不為正氣之賊痘稠密無縫正不勝邪其氣乖其勢逆善治者什可救其二三不善治者束手待斃而已故順者不必治逆者不可治險者貴治此以下專言險逆者之證治也痘子輕者作三四次出大小不一等其起發亦先後循次大小分明不相連串顆粒尖圓根窠紅活光壯肥澤此表無病飲食如常小大便清潤此里無病表裡無病大吉之兆不須服藥凡痘密者多難起頂但欲皮厚有膿漿色以燈影之苟非皮薄水泡光潤雖平亦無傷凡痘子出得稀疏者自然易發易靨不可妄治若瘡稠密常患其發不能透宜細視之但紅活不甚長大者氣不足也用四君子湯合勻氣散加燒人屎治之如焮腫色帶紅紫者血熱也用四物湯失血合消毒飲見形加燒人屎治之如不潤澤而乾者此血弱也用活血散加消毒飲與之如不起發不紅活平𤹀灰白者此氣血俱虛也用十全大補湯汗加燒人屎牛蒡子與之如有青乾者內服快癍湯見形加燒人屎合奪命丹見形與之外用四聖散痘疔合胭脂塗法或用胡荽酒俱見形或用水楊湯浴法務求光壯紅活而後已如中間有成水泡者防其癢𤹀宜先補脾胃疏風瀉火使肌肉實不作癢可也十全大補湯汗加防風大力子主之瘡子起發只以出勻為期不可拘定日數瘡出以漸其發亦以漸謂之適中若已一齊湧出便皮肉虛腫一齊焮發者此表氣虛毒氣奔潰而出表虛不能收斂必生癢𤹀或成潰爛急宜救表十宣散調無價散活血散合消毒飲相間服之若出已盡當起不起或起不透此裡氣虛毒氣留伏壅遏而不出必增煩躁腹滿喘促或後為癰毒急宜救里十全大補湯合勻氣散或參苓白朮散調無價散服之痘至四五停住不甚起者少後力宜助之用生黃耆三五錢人參二三錢當歸鹿茸一二錢煎服或磨入木香少許兒大者倍之俟漿滿足而止十宣散見形活血散即芎歸湯當歸川芎各等分上為細末每服一錢紅花湯調服消毒飲見形十全大補湯汁勻氣散見形參苓白朮散渴無價散倒靨參耆四聖散治痘瘡已出六七日不能長不生膿或癢塌當歸芍藥炒黃耆川芎各五分白朮伏苓紫草如無紅花代之木通防風各三分糯米二百粒上水煎母同服胎元散痘不起發不紅潤是血氣俱虛胎元焙乾為末加麝香少許酒調服三五分獨參湯治陽氣虛弱痘瘡不起發不紅活或膿清不滿或結痂遲緩或痘痕色白或嫩軟不固或膿水不幹或時作癢或畏風寒用好人參一兩生薑五片大棗五枚水二鍾煎八分徐徐溫服嬰兒乳母亦服乾枯灰白紅紫青黯丹如將出成就之際卻色淡不正者屬血虛宜用補血藥當歸川芎白芍酒洗之類或加紅花如將成就之際卻色紫不正者屬熱宜用涼藥解毒升麻芩連桔梗連翹之類甚者用犀角屑如用後項諸藥色仍不正者宜兼用二法治之痘瘡之毒必氣以詬之血以濡之而後可得成熟也故於起發之時光壯者氣有餘也肥澤者血有餘也氣血有餘表裡俱和不須服藥如形長大而色枯燥者此氣至而血不榮也宜四物湯失血加人參麥門冬色紅潤而形平陷者此血至而氣不充也宜四君子湯不能食加黃耆官桂川芎形平陷色枯萎者此氣血俱不足也宜十全大補湯汗合無價散倒靨主之色灰白者氣虛也四君子湯加黃耆當歸官桂色紅紫者血熱也四物湯加紅花地骨皮牡丹皮凡痘瘡起發遲滯頂平色灰白者氣虛也其人平日食少脾胃不足人參白朮散渴去葛根加桂十全大補湯汗去地黃加木香主之如曾有吐瀉以致氣弱者四君子湯不能食合益黃散脾主之瀉未止者四君子湯吞肉豆蔻丸泄利甚者陳氏木香散主之泄利若紅紫色焮腫者血熱也四物湯失血合消毒飲見形加紅花外用胭脂塗法見形解之乾枯者血虛也四物湯加人參麥門冬地骨皮外用胭脂塗法水楊湯浴法灰白另立門在下卷起發之時根窠紅活形色潤澤者此血隨氣行灌注諸瘡自然紅活肥澤不須服藥如雖起發乾枯無水謂之不肥澤帶青紫黯色謂之不紅活其變為黑陷乃血虛也四物湯失血加人參及麥門冬紫草紅花間進調無價散倒靨或吞服奪命丹見形外用胭脂塗法見形水楊湯水楊柳五斤淨洗春冬用枝秋夏用枝葉銼斷用長流水一大釜煎六七沸先將三分中一分置浴盆內以手試不甚熱亦不可太溫先服宜用湯藥然後浴洗漸漸添湯以痘起發光壯為度不拘次數祛邪湯痘號天花最忌諸穢臭惡血五六朝間痘本美麗鼎峻而一時失防或觸於腥血或感於穢臭倏忽更變外宜祛邪湯浴之而內服玉樞正氣丹可也雞毛拔細軟者升麻荊芥木通紫蘇荔枝殼水楊條上用水煎濃去滓洗浴玉樞正氣丹玉樞正氣神功捷生地紅花並甘桔參耆須倍橘紅扛蟬蛻防風羲愛覓寅谷相朝嫩桃杪五個和姜甘草列煎濃投酒服須臾不覺痘自還元吉頂陷起發之時不徐不疾以漸長大尖圓磊落光壯堅實根腳紅活此氣充足載血而行透徹諸瘡自然尖圓光壯不須服藥如雖紅活頂平中陷不成尖圓色嫩皮薄不能堅厚其變為癢𤹀為留伏壅遏乃氣虛也四君子湯不能食合勻氣散見形加黃耆官桂或人參白朮散渴加黃耆官桂防風或調元湯大法加官桂防風白芷荊芥穗或十全大補湯汗去地黃加防風白芷或十宣散見形皆可選用若瘡皮薄色嬌淫淫如濕者此氣不勝血宜補氣涼血四君子湯四物湯去川芎地黃加黃耆官桂防風荊芥穗如浮囊虛起殼中無水者此氣不依血血不附氣其變為癢𤹀為癰腫十全大補湯去白朮加大力子連翹防風燒人屎痘瘡起發尖圓為貴如四圍起中心平陷者此有二種有血化成水四圍高起心中略低凹者俗呼為茱萸豆此中氣不足發未透徹故耳能食者至養漿之時盡充滿而起矣不能食者宜扶中氣人參白朮散主之有四圍沸起中心落陷無水猶是死肉其形如錢宜急攻之若待漸變黑點不可為矣此名鬼痘四君子湯合九味順氣散加燒人屎或紫草飲出不快或紫草飲子連進服之外更用胭脂塗法見形出齊後痘有小孔自頂直下至腳不黑不白與痘色相同名為蛀痘皆因表虛而腠理不密成此證也失於早治大泄元氣不起不發禍不旋踵急用保元湯下生糯米川芎肉桂丁香其孔自密甚為捷徑連進二三服必待孔閉而痘自起孔若黑色則為疔矣頂陷色白皮薄晶光者氣虛也大下保元倍加酒炒黃耆肉桂川芎丁香茯苓皮人乳好酒進之九味順氣散又名勻氣散白朮白茯苓青皮白芷陳皮烏藥人參各五分甘草炙二分半木香一分半上銼細水一盞煎七分去滓溫服紫草飲子紫草茸人參白芍藥蟬蛻甘草穿山甲土拌炒各等分上銼細用水一盞煎五分作三四次溫服內托散治痘瘡毒根在裡頂陷灰白色不起發根窠不紅內托毒化立驗人參甘草肉桂白芷白芍藥川芎各一兩黃耆一兩五錢桔梗防風各二兩用當歸五錢木香二錢上水煎服瀉加訶子內肉豆蔻有癍減肉桂加紫草酒炒黃芩黃連牛蒡子之類治痘塌陷不起回陽丹此方用於四五朝前其效甚速若用於六七日後則噬臍矣製法將彌月將生胞羊酒洗淨隨用黃麻纏攏一團把臘糟裹外置新瓦上四圍炭火炙之俟其外糟焦了如墨樣削去其糟再焙乾另為末入官桂末丁香末各五錢人參末一兩木香末三錢再研極細升麻煎酒漿調服十歲以上服二錢十歲以下服一錢十五歲以上服三錢年多服多年少服少加減而用無不獲效若加大附子一兩去木香則為附子回生丹胞羊須預囑屠肆遇便收制若特殺傷生大不祥頂凸痘瘡起發有心中凸起四圍干平無水者或里紅外黑者此由平日感受風寒皮膚堅木以致痘毒鬱而不散宜桂枝葛根湯初熱十宣散見形以散表邪外用水楊湯浴之見前黏連痘瘡起發貴於顆粒分明如其彼此相串皮腫肉浮或於本痘四傍旋出小痘攢聚胖長漸成一塊此候最重宜以快癍湯合消毒飲俱見形加燒人屎服之更宜禁忌以防瘙癢之變陷伏凡痘瘡以起發光壯紅活肥澤為順若將起發之時中間有乾黑不起者須急治之不可因循以致傳變加多不可救藥矣痘瘡內而不出謂之伏外而復入謂之陷瘡痘黑陷當分四證一則感風寒肌竅閉塞血凝而不行必身痛四肢微厥癍點不長或變黑色或青紫癮疹此為倒伏也宜溫肌發散桂枝葛根湯初熱加麻黃蟬蛻或以紫草飲出不快吞奪命丹見形外用胡荽酒噴之須令溫散寒邪然後熱氣復行則其癍自長矣二則毒氣太盛內外蒸爍毒復入里必心煩狂躁氣喘妄言如見鬼神大小便祕渴而腹脹此為倒陷伏也病邪輕者宜利小便解毒連翹湯通關散俱便悶甚者以百祥丸牛李膏俱黑陷以瀉膀胱之毒令陽氣復還脾胃溫暖服之身溫欲飲水者可治是脾強勝腎陷者當復出矣若加以寒戰身冷汗出耳尻反熱死然百祥丸太峻今以宣風散發熱三乙承氣湯便悶代之外以水楊湯浴之見前三則內虛而不能使陽氣以副榮衛者出而覆沒癍點白色或黑色其人必不能乳食大便自利或嘔或厥此胃虛而不出謂之陷伏也宜用溫中之劑令其胃暖榮衛復行則當自出矣宜調元湯大法加丁香官桂理中湯泄利加黃耆官桂甚則陳氏木香散泄利異攻散出不快皆可用也外用胡荽酒見形噴之或因誤下之後毒氣入里而黑陷者則宜溫養而表出之先以理中湯溫養其里後以桂枝葛根湯疏解於表也不出再加麻黃四則被房室等雜穢惡氣沖觸而黑陷者則宜熏解之內服紫草飲子見前外用胡荽酒噴之及茵陳熏法余詳前禁忌條內茵陳熏法用干茵陳研末搗棗膏和丸如雞子大曬乾烈火燒煙燻之大便痘瘡自起發之後大便常宜堅實緣小兒脆弱身熱而大便不通者則易實大便自利者則易虛雖四五日不便無憂也不能食者聽其自便賴舊穀氣為養至五日後則膿成毒化解利之劑可用也能食者三日後不通不腹滿不裡急後重則亦不必攻之可用膽導法便悶導之不通以當歸丸便悶微令潤過使氣道升降無壅遏之患不可妄下凡能食者大便喜潤賴新谷以為養而舊汙之不留自然臟腑流利血氣和平不可妄用溫補反增裡熱之證胃主腐熟水穀大腸主傳送已化之物故食多少可以知人穀氣之虛實大便滑澀可以知人臟腑之冷熱大便如常是亦瘡疹之一順也如起發之時忽然泄瀉此宜急止之恐腸胃虛真氣脫也須辨冷熱虛實如瀉而手足冷面色青白瘡不紅綻者冷證也理中湯丸豆蔻丸俱泄利益黃散脾甚則陳氏木香散泄利異功散出不快皆可用也瀉下之物黃又酸臭渴手足心熱面赤瘡紅綻焮發者熱證也黃芩湯泄利五苓散驚搐主之脾胃怯弱精神慢而不食者為虛當溫養之益黃散身熱中滿渴而不食者為實當清利之五苓散其人或臟氣自脫或因服寒藥致令瘡毒陷入大腸瀉下如豆汁或便膿血或便黑汁口內臭氣唇焦目閉加腹脹者必死之證方論詳泄瀉本門不二散治痘當起脹灌漿時泄瀉不止以此止之只一服愈如服此不已是元氣已脫不可為矣蓮肉炒去心一兩真鴉片二錢另研上各取淨末和勻每服三四分米飲調下此方不但止瀉亦治煩癢二證夫固大腸之滑脫易知也斂心火之浮游難知也手足痘瘡起發欲透惟四肢稍遠難得均齊必脾胃素強能食多者不須慮此若脾胃素弱又食少者手足上瘡常發不透蓋脾主四肢脾虛則不能行其津液溉灌四肢所以發遲以補脾為主快癍越婢湯如不令透其後手足必作癰毒又手足瘡痘多發水泡者此肝乘脾也先瀉肝羌活湯發熱加柴胡後補脾人參白朮散渴去葛根加桂如見而復隱起而復塌色紫黑者此腎乘脾不可治快癍越婢湯黃耆炙白芍藥桂枝防風甘草炙上銼細加生薑一片棗一枚水煎溫服不拘時頭面頭面屬陽瘡疹亦屬陽以類相從故出現起發收靨自頭面始升生浮長陽之性也痘瘡起發頭面以漸腫大升生浮長之性不須憂恐只要瘡子磊落紅活光壯肥澤待至成膿之後毒化結痂而腫亦漸消矣如瘡黏連通串模糊成餅者又要紅活潤澤以快癍湯消毒飲並見形合而飲之或消毒化癍湯以解其毒更以甘桔湯咽喉加牛蒡子相間與之以利咽喉寬胸膈令飲食無阻也又以神應膏護目見形若灰白青黃乾燥瘡面膚起者皆死證也其頭面腫有不閉目者毒淺而輕有閉目者毒深而重亦待瘡熟腫消而目自開若瘡未成腫消目開者此陷也勿治消毒化癍湯升麻柴胡桔梗甘草龍膽草牛蒡子連翹防風蟬蛻密蒙花上銼細加淡竹葉十片水一盞半煎一盞去滓食後服凡將起發頭面預腫者此時行疫癘之氣名大頭瘟其毒最酷急用羌活救苦湯解之羌活救苦湯羌活白芷川芎蔓荊子防風桔梗黃芩大力子連翹升麻人中黃各等上銼碎加薄荷葉七片水一盞煎七分去滓食後溫服痘疔痘疹之毒自內而出衝突氣血發散腠理初出一點血乃身中氣血被毒驅逐現於皮膚之外其成形者氣也成色者血也毒火太甚煎熬氣血先至之氣則削矣血則枯矣氣削血枯腠理反閉毒不得出未免復入於裡遂成陷伏時人以黑瘡子為痘疔又曰鬼痘者深惡而畏之詞也此乃毒氣鬱遏非外感風寒內虛吐利雜氣觸犯者可比古人立方如大小便祕腹脹煩躁者則下之但大小便祕者則利小便解毒自利者以瀉膿血為順水穀為逆卻不立方以毒雖入腹皆瀉出也攻之則無所攻補之則不可補昏悶不醒者用龍腦膏黑陷以去心中之邪枯黑不起者或內用無價散倒靨以解在裡之邪或外用水楊湯見前四聖散痘疔胭脂塗法見形以解其表使邪氣得出皆良法也為工者合下即下合利即利合發即發或解其里或解其表應變出奇勿泥常法可也發疱痘瘡發疱亦與黑陷相類外出內入雖不同而毒氣壅鬱則一也或發水疱或發血疱或赤或紫或黑但見此證十無一生然亦有似是而非者不可不辨其人身上原有灌瘡或破傷瘡未痊或雖痊瘢痕尚嫩一旦痘出則瘡瘢四圍痘必叢集者物從其類之理也發生之後必然作疱者腐敗皮肉氣色先變宜與完膚有別也治此者先以針刺破吮去惡血後以胭脂塗法見形合百花膏收靨敷之此瘡又易作癢起發之後常宜以茵陳熏法見前熏之勿令爪傷若被爬搔則反覆灌爛淹延不愈變為疳蝕壞瘡以致不治者多矣袁痘起六七朝膿漿未曾充裕頭面身背或手足關軸遽起水疱或似葡萄樣或似鸛子大或如被單聯蓋因肝榮不能以資浥而肺金竊勢以凌侮准服三化丹歌曰七朝泡起勢相凌三化丹中二味金白朮茯苓俱二兩四般法制用工深一兩要同歸酒浸一兩和卻乳參蒸一兩再和雄附煮一兩分與炒米停為末必須甜醴服自然泡里注黃金痘里起泡多患乎膿漿不能充灌若虛泡結軸十中八九泡內微有膿漿滋養元氣振援兩儀寒剝之劑毫不可投或單用渾天湯和人參酒服但恐癢作而泡潰死在旦夕耳起發不透痘疹起發欲透磊落尖圓光壯肥澤者上也根腳橫開皮起水漲者次也頂皮不起根腳不開猶是先出之形不見新生之水此謂起發不透審查證候如氣本實者必曾感風寒以桂枝葛根湯初熱合奪命丹見形發之如氣本虛必不能食或吐利以人參白朮散渴合奪命丹以補中氣而發表邪如欲成陷伏者依前四法治之若時日已多發猶不透或煩躁不安者此毒熱在裡心惡熱以導赤散心送服牛黃清心丸痘煩躁以解散熱毒導引心火也或啼哭者凡人五臟平和則神宇安靜今五臟蘊毒內外蒸郁神不安舍以導赤散送服安神丸痘譫妄使鬱熱解散神宇清快也若譫言妄有見聞時狂叫者此五臟熱毒蘊積陽氣獨盛無陰氣以和之大便必不利以當歸丸便悶微利之再行膽導法便悶使無留滯易快利也甚則三乙承氣湯主之便悶若昏不知人腹脹喘呼死證也雞鳴散男女發熱三四五日或痘未形或痘形隱隱或才形於外而不能快利或煩躁譫語或腹疼嘔吐或痰喘惡渴急服此藥則毒自表出矣炒術當歸川芎甘草大力子茯苓木通桔梗蟬蛻升麻橘紅山楂紅花燈草生薑煎臨服入雄雞血並酒妙震蟄丹小兒熱三四朝痘或隱隱伏於皮膚或形於頭面一二顆或標於身體四五顆上不宜補下不宜瀉當服震蟄丹穿山甲四錢酒洗淨和砂仁陳米炒捲去砂仁米用白芍酒漿煮焙四錢紅曲三錢蟾酥三錢和勻共研細為末每用酒漿量兒大小增減大者一分小者半分若逾十二三歲者斟酌加之用升麻煎酒調服其效立見天元接髓丹男子十七八歲或二三十歲破陽虧元倏一時患痘稀少者雖年大無妨倘多密連布欲其鼎峻充灌勢必難矣急服天元接髓丹歌曰男兒陽破痘來臨不遇奇方坐視沉天元接髓丹功捷世上醫家盡不明真正酒漿澄十碗一毫酸苦莫相侵人參黃耆各二兩橘蟬歸地半加贏鹿茸乳炙一兩半附桂半兩要調停慢火甕中煨熟後去滓出火莫胡斟每鍾人乳三杯和薄薄生薑二片存再勻一沸仍溫服立建奇功若有神此方屢獲明效但製法要詳明當歸去頭尾懷地揀粗軟人參覓清河黃耆選綿白橘紅連本蒂蟬蛻要身全附子連皮臍官桂削外皮煨時度候只以米熟驗之人乳取來就不宜過夜入塵辛酉年杭城邵語溪子年二十六歲平素寡弱患痘痘勢沉匿不起單以此方倍加人參服之竟後保全內托散痘不起發根窠不紅或灰白色咬牙寒戰等證人參黃耆甘草川芎當歸防風白芷桔梗白芍厚撲木香肉桂上姜一片棗一枚水煎服色紅紫者去肉桂木香加紫草蟬蛻漿不滿水酒各半煎服色淡白者去防風白芷加糯米大便燥加人乳治孩兒百日裡痘歌曰全蠍要身全五個蜜焙乾蟬蛻不可脫完身又完足五個酒漿洗和炒研細末再加酒芍藥砂糖調來服自然痘森森那怕月不足月里患痘稀美者多密惡者少變蒸未逾猛浪之劑不宜妄投是方斟酌百投百效痘至五六朝忽然手腳牽縮一團不知者以為驚使然耳豈知陽明受梟毒之熬鑠而筋絡不能榮血以滋養故也謂之一把縛須服羚羊散歌曰白玉羚羊一兩霜木通紫草生地黃芍藥殭蠶全蠍桔橘紅甘草荊芥防按法服來隨妥貼誤看驚治即多傷此痘多起於四五六朝則為是若起於兩三朝則為驚縮若起於八九朝則作寒戰治之可也羚羊角必取其鋭尖處用之陽毒七日前陽毒者凡瘡也以兒未出痘之先或生疥瘡有形窠而成膿因而發熱出痘者或凡瘡未痊因而出痘者或凡瘡方結成瘢因而出痘者蓋凡瘡未痊及初結瘢處肉分必虛毒趨虛處而出故陽瘡陽毒雜為一黨氣血俱盛則易成漿氣血衰弱則枯燥乾紅與諸瘡俱不成漿治法與頂陷同起發最忌泄瀉故特著之其他證候如發熱痛癢腹脹煩躁譫妄等各有本門宜就彼中查之茲不贅敘起發吉凶痘瘡放標以後漸漸起脹先出者先起後出者後起微紅光澤根窠明潤面目漸腫能食無雜證者吉大抵痘脹一分則毒出一分至六七日不盡脹又黑色者死鼻有涕口有涎眼有淚者可治俱無者大凶凡痘子已出自放標之日算起如當起發不應有漿先有戴漿者如當作漿不應收靨便有干收者此皆惡候治之無功口唇者脾之外候人以脾胃為本不宜受傷如初發熱唇焦裂者此毒發於脾便宜用瀉黃散解之不知早治痘子之出叢集於唇及至起發之初諸痘尚未試漿此痘已熟內帶黃漿者此惡候也待諸痘成漿此瘡已靨唇皮搗脫漸變嘔食嗆水昏睡而死矣大抵起發之初瘡頭便戴白漿者不分何處並非佳兆不特口唇為然蓋痘瘡初出一點血血化為水水化為膿膿成而毒解此自然之序也若初出之時半是水疱或才起發便有帶漿者或未成膿即干收者火性躁急失其自然之序不應至而至所謂早發還先萎也此毒火所為倏忽之間焰息氣盡而死矣痘瘡最要以漸起發磊落紅活如一發都起無復顆粒模糊串連不紅活帶灰白色面上浮腫如錫餅形此惡候也其人能食大小便如常無它證候者吉若食頓減或原不能食者凶凡起發之時痘瘡稠密又見陷伏煩躁狂叫之證或口中出臭氣者此毒火熏煎肺爛胃敗之氣也或不飲食失聲者此咽喉腫爛也寒戰咬牙者邪傳腎也或悶亂者神已喪也或體寒者陽脫也或嘔或瀉者腸胃俱敗也經云五臟氣絶於內者利不止六腑氣絶於外者手足厥凡見以上諸證者皆不可治灌漿證治萬痘瘡初出一點血只成小小血疱起發則漸長大血化成水為水疱至水疱轉作膿疱始成實矣成實之時卻要個個成膿肥澤飽滿根腳紅活又蒼蠟色如此者可以刻定日數而知收靨之期痘瘡初出或中心陷下者或頂平者或根窠白色者其人能食或治不乖方以至起發之後陷者盡起平者復尖白淡者變紅活窠中血水已化為膿夫陷起平尖起發可謂透矣紅活飽滿氣血可謂足矣水化為膿毒亦解矣表無癢痛之證里無吐瀉之證是表裡又無病矣如此者坐待收靨不可妄投湯劑痘子輕者常作三四次出有大小有先後起發亦作三四次先出者先起後出者後起大者自大小者自小亦如初出之樣待至養漿則先長者先作漿後長者後作漿大小亦如之磊落分明不相黏連者上也痘子密者長大胖壯以至作漿未有不相串者只要陷者盡起無處不透轉成膿漿次也膿成之後毒氣已解無復留伏矣人言痘瘡只到成膿則毒氣化解便稱無患不知膿亦有凶有吉如瘡皮堅厚膿漿渾濁約束完固無少破損此真吉兆若瘡皮軟薄膿水清淡滲漏淫濕易於破損此猶凶也惟瘡久熟時日已過當靨不靨者則膿復化為水皮亦易破勿依此論痘瘡起發之初已當避風寒遠人物節飲食守禁戒到此養漿之時比之起發尤加謹焉可也蓋前此人病未久氣血猶強足以御乖戾之變至此則氣耗血虧精神減損少有乖戾不能任之況瘡始成就尤易觸犯不可不加謹矣如天大熱則徹去衣被令常清涼但謹門窗帷帳勿使邪風透入天大寒則添厚蓋覆令常溫暖更用親人左右夾之房室中可明亮勿絶燈火常燒闢穢香加乳香令香氣襲入日夜常用一人看視互相更代勿令疲倦恐或作癢為之撫摩莫使誤破以致灌爛結痂不美闢穢香蒼朮一斤大黃半斤上銼細捻放火爐中燒之不可間斷不作膿凡痘瘡出欲盡發欲透至於養膿便要成膿飽滿者膿已成也渾濁者膿之形也黃白者膿之色也若當作膿之時猶是空殼此氣載毒行血不附氣毒者血也血既不至則毒猶伏於血中而不出四物湯失血合紫草飲見形加蟬蛻主之如已成水清淡灰白不能作膿此氣血俱虛所有之水乃初時一點血氣解而為水非自內潮起之水十全大補湯汗主之此二證者為癢𤹀為癰毒不可不知也痘瘡初發之後正待作膿卻不作膿者此與不起發而黑陷者分四證同論如感風寒則當溫散桂枝葛根湯初熱加黃耆白芷防風毒氣盛則宜托裡解毒利小便紫草飲子起發連翹湯便悶相間服之大便祕者宣風散痘發熱內虛宜溫里十全大補湯陳氏木香散瀉觸犯宜熏解內服紫草飲外用茵陳熏法起發若煩躁昏悶者龍腦膏黑陷薛氏云若灰白色或癢而膿不貫用紫草四君木香色赤或癢而膿不貫用紫草木通湯出不快貫而膿清稀用參耆內托散癢𤹀不應加附子緩則不救祕要云頂陷無膿為逆急用保元加川芎肉桂歸芍木香糯米煎熟加人乳好酒溫服色白如水晶內無膿者宜保元加糯米人乳好酒進之按病者元氣素弱或出痘時因稠密故服解毒之藥太多或起發時曾有吐利等證俱傷元氣雖用參耆等助發膿漿而猶恐元氣薄弱止灌清漿或缺而不滿且有癢𤹀癰毒之慮宜於煎藥內加上好鹿茸及咽紫河車丸藥仍進八味二花散為妙曾見痘瘡初出磊落起發亦透只待結膿窠之時卻不作膿往往變為壞證者或因其人不能食脾胃虛又自利不知調理者或出未勻發未透毒氣陷伏妄談稀疏者此皆人事之不修非干時毒而然也六一湯專發痘瘡之膿黃耆六錢甘草炙一錢上㕮咀每服二錢水六分煎入酒二分同煎至半盞溫服更加橄欖同煎尤好加山藥亦得助漿丸治痘瘡七八日漿稀不來者急服黃耆蜜炙三兩白芍藥酒炒當歸酒洗各一兩半鹿茸鮮潤色如琥珀作鹿角膠香者乳炙紫河車酒洗去紅筋炙乾白朮煨人參各一兩上為細末煉蜜為丸如芡實大每服一二丸炒糯米煎湯化下參耆四聖散起發祕傳大透肌散見形升天散即灌膿起頂散治痘灰白或紅紫黑陷乾枯或清水不成漿八九日十日皆可服人參六分黃耆山楂各八分白朮土炒當歸川芎橘紅各五分甘草三分淫羊藿穿山甲土炒黃木香各二分肉桂三釐此引經之藥多則癢上姜一片棗一枚水煎服或為末服亦可如嘔吐生薑湯下瀉米飲下肚痛神麯煎湯下煩躁麥門冬湯下渴用麥門五味子煎湯下吐瀉藿香陳皮湯下痘不成漿多服數帖無妨補漿湯痘灰白不起壯或漿清淫羊藿三分多則發癢人參當歸山楂各八分穿山甲土炒三分黃耆一錢半枸杞子一錢川芎甘草陳皮各五分木香二分白朮土炒六分官桂三釐黃豆三十粒筍尖三個上加薑棗糯米水煎服一方有白芷防風治痘白色帶寒戰方痘標六七朝正要翕會膿漿遽乃色白洋洋無紅活鼎峻之美有土鐵塌陷之凶火熱不退而有寒戰之狀宜服田單火牛湯人參黃耆蓼子擇細葉者是若川蓼則大葉葉中有青點宜細辨之和穿山甲炒甲氣盡去甲當歸各二錢附子一錢甘草五分桂三分橘紅八分上水煎服脾胃痘瘡已長膿漿欲成之時專以脾胃為主脾胃強則氣血充實自然膿漿易成飽滿堅厚不須服藥脾胃弱則氣血衰少不能周灌於身使之作漿虛軟清淡雖有漿亦水而已宜十全大補湯汗去地黃加木香或人參白朮散渴去葛根加黃耆官桂多服乃佳然脾胃強弱於食多少大便堅利求之食少大便堅者脾胃之氣猶足也若泄瀉則脾胃益虛四君子湯不能食送下豆蔻丸瀉利止復以人參白朮散去葛根加黃耆官桂服之便清要能食不能食者亦依上法如能食大便堅數日未更衣者用膽導法大梗祕通之使氣得疏通榮衛和暢不致癍爛也泄瀉痘瘡出形起發並不宜泄瀉恐裡氣虛毒邪不出反成陷伏故以泄利非佳兆也若成漿之時尤不宜利比之於前殆有甚焉蓋前此為病未久脾胃尚強足以任之今則病久津液已衰脾胃已弱若復泄瀉則僅存之氣重竭於內方張之毒不能成於外或為癢𤹀或為倒靨或寒戰咬牙虛憊而死輕則人參白朮散去葛根加木香官桂黃耆甚則陳氏木香散瀉異攻散出不快肉豆蔻丸瀉可以並進不效亟服不二散起發便祕手足厥冷痘瘡手足和暖為貴養漿之時手足發熱手足必有汗此毒熱鬱於中必大小便不通脈沉滑數疾宜利之三乙承氣湯大便祕去芒硝主之手足厥逆者此陽氣欲脫必白利不止或吐脈沉細微弱或浮大而虛宜急溫之理中湯瀉加熟附子或陳氏異攻散出不快服藥後手足和暖者生厥者死若大便祕小便不通煩躁狂妄腹脹喘而渴脈沉滑數瘡不起者此陷伏之證為陽厥百祥丸黑陷三乙承氣湯主之煩躁瘡痘始終貴於安靜膿成之時毒已化解臟腑平和神宇爽快尤宜安靜也若忽加煩躁不得眠者但就痘子上辨之如膿多清淡尚不滿足此毒猶在裡未得盡出也龍腦膏主之黑陷如膿已成又飽滿因發熱干漿而煩者此宜利小便導赤散主之心如瘡子太密膿成之後心血虧虛虛煩不得眠者四物湯失血去川芎加人參麥門冬梔子仁又酸棗仁湯煩躁主之錯喉嘔噦凡痘瘡密咽中亦有之成漿之時咽瘡早熟肉虛皮薄易致破損瘡瘢新嫩觸之即痛痂皮沾滯痰涎纏裹所以堵塞飲食難入勉強吞咽則為疼痛所苦痰涎所隔是以水入則嗆谷入則嘔也如語言清亮者可治甘桔湯咽喉加牛蒡子天花粉利咽膈化痰涎惟多飲之自然平愈若聲啞嗄語言不出者咽喉潰爛不可治矣癢凡痘瘡皮嫩色嬌者到成膿時多生瘙癢先當調理勿令有此可也若失於早治而發癢者內服消風化毒湯癢𤹀外用茵陳熏法起發破者以白龍散癢𤹀敷之大抵痘瘡作癢乃是惡候吉少凶多如其人能食或大便堅抓破之處復灌成膿原無痘處續出大小不等雖盡癢破可治內服十全大補湯汗苦參丸痘癩間而與之外以滅瘢救苦散痘癩合百花膏收靨塗之若瘙癢之時其人顛倒悶亂抓破之處不復腫灌或成坑窟或即乾黑或皮自脫又加以嗆水嘔食水漿不入或泄瀉或寒戰咬牙或失聲或手足厥逆或狂叫皆死證也頭面凡視痘瘡以正面為主五臟精華皆萃於面故也身上瘡有癢者或至抓破不能為害惟正面瘡不可犯動一處苟於眉目鼻面之間抓破一處此肺有熱也急用甘桔湯咽喉加牛蒡子以解之其癢即止乃佳兆也若癢不止浸淫漸開氣愈泄而癢愈急必至滿面抓破而死凡痘瘡起發養漿之時額上瘡如火燒湯澆之狀潰爛破壞無復完膚或兩頰之傍亦如是樣不待爬搔而自破爛者以漸而開沙崩之勢莫之能御殼焦水去似靨非靨陽氣脫而死痘瘡作漿之初面上諸瘡未盡成膿或鼻準頭瘡先干如橘子色者或眉心瘡自乾黑者或唇上瘡焦黑者或兩耳上瘡自收者或兩頰瘡如餅中間干陷者此名倒陷乃死之候不可認作正收對人妄言手足手足痘瘡最要膿漿飽滿乃脾胃強氣血足也若灰白色或清淡水或虛餒鱉塌此脾胃弱快癍越婢湯主之如此者縱得收靨之後必手足腕膝及關節之處發癰毒也快癍越婢湯起發肩背臀痘瘡初出起發邪氣雖旺正氣亦強足以任之至於成漿則氣血漸耗精神漸弱有不勝之狀起止艱難多喜仰臥惟肩膊背臀之瘡展轉摩擦最受虧苦若痘子好者自然堅厚耐久不破其次則收靨稍遲膿熟自潰最可惡者如湯火之疱水去皮脫又瘡自破清水非膿黑䵟乾焦是皆不治之證漏漿歌曰才試漿時未飽囊瘡頭有孔漏膿漿依然團聚封瘡孔泄去真津毒氣藏蓋痘瘡作膿窠之時最要皮厚包裹完固若膿未成忽然瘡頭有孔其水漏出或結聚成團堆於孔外者或水去窠空自乾黑者俗名漏瘡必死若膿熟之後窠皮亦熟漿水沸出因而結靨此頭額正面之間多有之俗謂之堆屎收不可以漏瘡例論蓋漏瘡膿未成堆屎收膿過熟也咽喉不利涕唾稠黏瘡痘者每至作膿窠之時咯唾痰涎稠黏膿結或有膿血夾雜者咽喉不利飲食亦少此肺受火邪津液不足故多黏痰喉舌牙齒之間瘡潰血出惟用甘桔湯咽喉加牛蒡子天花粉清肺化痰利咽膈直待收靨之後自然平和不可妄用大涼之劑睡夢呢喃痘內之膿皆身中之血熏蒸而成瘡痘稠密膿血周遍津液消耗心主血血虛則舍空故心熱者虛煩不得眠酸棗仁湯煩躁主之心虛者喜睡夢中呢喃如與人言者多怪誕之事喚之不醒安神丸主之譫妄若昏悶甚者先以龍腦膏黑陷開其心竅後以安神丸人參麥門冬湯下腹痛痘瘡初出腹痛者毒在裡也起發不透腹痛者陷伏也若作膿則毒已出又無陷伏忽然腹痛其人不大便者必然燥屎也當歸丸膽導法俱大便祕以通之便清者必受冷也急與理中湯加桂腹痛或黃耆建中湯腹痛加木香主之痘瘡其出已盡其發已透其膿已成表無邪也能食小便清大便潤里無邪也一向平安忽然腹脹作痛煩躁喘促痘瘡色變如灰木之狀此必傷食得之先以丁香脾積丸宿食原物湯下去其宿食後以人參白朮散渴去葛根加青陳橘皮與養脾丸宿食相間調之癍爛夫痘瘡膿熟潰爛者常候也若未成膿先即潰者此名癍爛癍爛之由病當發散而不發散則毒氣閉塞喘促悶亂不當發散而誤發散則熱毒隨陽氣暴出遍身皮肉潰爛此不善表之過治之宜調脾進食令大便得所安養榮衛生肌解毒解之不至於冷調養不至於熱方為良法宜十全大補湯汗去桂枝加防風荊芥穗多服佳大便祕以膽導法便祕潤之膿水不幹以敗草散潰爛襯之癍爛作膿痛甚者以天水散即六一散見初熱和百花膏收靨塗之又有發表過甚外為癍爛而內虛陽氣不守臟腑自利此又急當救里解表陳氏木香散瀉利主之厥逆者異攻散出不快板黃袁痘澄膿則毒盡全美矣何有乎板黃豈知玉不在乎厚薄而在乎體之純珠不在乎大小而在乎體之明痘漿不在乎飽滿而在乎黃活夫黃者中央土之正色漿汲乎脾其黃自潤正者也彼痘氣得其衛而不逆血養其榮而不傷囊窠鼎疏膿漿澄注於中者活動而不膩塞明潤而不死色烏有所謂板黃者哉若陰陽離其正氣梟毒肆其殘虐根窠薄劣囊房夷委膿漿之澄注於中者板膩牢則死塞而不活動干蠟而不明黃以手指抵之凝結板定五經疸而二氣截矣此謂之板黃若方廣天庭板黃而余者潤活癰毒必結於腦項腮臉板黃而四體潤美痘癰必發於肩阜肚腹板黃者癰起於曲池三里背脊板黃者癰結於兩軸尻骨遍身板黃者死項頸前後板黃者死頭面板黃者死眼眶唇上板黃者死兩脅陽球板黃者死觀此而痘囊之膿固欲其充黃尤宜潤活也澄泉散治痘中板黃黃耆上當歸中紅花下上和酒入壇固密煮之另用蟬蛻金丸即雄雞尾後硬石子二味細研以藥酒調服轉環丹雞一隻以參耆當歸紅花桂和蜜酒煮熟食之灌膿吉凶灌膿時根窠紅潤膿漿滿足如黃蠟色二便如常飲食不減此為吉證不須服藥灌膿時純是清水皮白而薄與水泡相似三四日後抓破而死灌膿之時痘中乾枯全無活血此名空倉不治灌膿時吐利不止或二便下血乳食不化痘爛無膿者死或二便不下血猶可用止瀉健脾之藥灌膿時二便閉目閉聲啞腹中脹滿肌肉變黑者死收靨證治痘瘡成膿之後鮮明肥澤飽滿堅實以手拭之瘡頭微焦硬者此欲靨也大小先後以漸收靨不失太急不失太緩已靨者痂殼周圓無有突凸陷凹者乾淨無淫濕破濺者此為正靨否極泰來之象也凡痘瘡收靨不可以日數拘也大抵痘本稀元氣實者自然易出易靨若瘡本稠密元氣虛者難出難靨也只要先後有次疾徐得中飲食如常便無他證如收太急者毒邪未盡煎熬津液以致速枯非正收也必為目病為癰毒為諸怪疾甚則夭亡微則殘廢宜微利之以徹其毒當歸丸主之大便祕如收太遲者中氣已虛脾胃太弱不能榮養肌肉使之完就以致潰爛內服十全大補湯汗外用敗草散潰爛襯之海藏云癍疹膿而不焦此本治失清涼之氣有如五穀得陽氣而成熟非涼風至則不能實也天地嚴肅之氣一加則萬物秀而實矣與癍疹何異須察何經而清涼之或下而成嚴肅之氣則瘡氣必不至於膿而不痂矣要當知之餘毒不盡而疾作蓋出於此當是清涼飲子下之是也非陽和則苗不秀非嚴肅則秀不實錢氏云五七日痂不焦是內發熱蒸於外故不得焦痂也宜宣風散痘發熱導之用生犀磨汁解之必著痂矣劉洙瘡子訣云痘發如膿窠不肯靨者但調沙糖水與吃劉提點云亦曾試用但後來結瘢痕白薛陳文宿先生云痘欲靨不靨其痂欲落不落若腹脹煩渴忌食水蜜生冷之物若食之轉渴而死急與木香散救之如身熱煩渴者宜服人參麥門冬散身熱大渴人參白朮散如不愈仍服木香散竊謂前證乃脾胃氣虛津液不足所致非實熱為患也如身熱煩躁手足發熱脾胃有熱也用人參麥門冬散身熱作渴手足微冷者脾胃氣虛也用人參白朮散腹脹泄瀉或寒戰咬牙脾胃虛寒也用十一味木香散泄瀉氣促手足並冷脾氣脫陷也用十二味異功散凡瘡結痂作靨皆由元氣充實而內融也若審見虛弱便與滋補血氣無虧可保終吉若見不靨而投補劑恐無及矣一小兒出痘貫膿不靨證如實熱余謂血氣虛甚之假熱也用十全大補湯數劑漸愈忽又惡寒余又曰此邪氣退而真氣遂見虛象也仍用前藥內參耆各五錢數劑而愈一小兒痘不結痂用補中益氣湯地黃丸料煎服而愈次年畢姻後寒熱作渴頭運脈洪數按之微細此脾腎虛火上炎也以前藥各加肉桂五分引火歸經而愈治痘日久不靨歌曰防風銼五錢炒術與茯苓當歸大腹皮煎服得安寧昔古杭俞氏專以四制白朮散治痘瘡日久不肯結痂收膿者亦此方之遺意也但回蚤之痘元氣充托者則可若元氣不足而回速必宜保護不如痘之隨期而遲回何必勉強用藥以速其收功也回漿散治痘不收漿結痂何首烏白芍藥黃耆人參甘草白朮白茯苓上姜水煎服象牙散治同上人參黃耆白朮各一錢甘草七分茯苓一錢半何首烏二錢上加糯米二錢棗二枚水煎調下象牙末一錢潰爛痘瘡過期不收遍身潰爛者此與癍爛不同乃熟太過也其候不同或因天寒失於蓋覆使瘡受凍而不收者宜內服五積散初熱外用乳香燒煙於被內熏之或因天熱過求溫暖使瘡被蒸而不收者宜內服人參白虎湯見形或五苓散驚外減去衣被令少清涼以天水散即六一散撲之或大便祕結內外極熱毒氣散漫無陰氣以斂之而不收者宜內服宣風散痘發熱或三黃丸熱四順清涼飲熱外用膽導法大便祕以敗草散襯之或泄瀉氣虛脾胃弱津液少肌肉虛而不收者宜內服陳氏木香散瀉外用敗草散或因渴飲冷水過多以致水漬脾胃濕淫肌肉而不收者內服五苓散如因食少氣虛而不收者人參白朮散渴去葛根加桂主之以上諸證以法治之已潰者結薄痂未潰者結痂方為佳兆若痂皮俱不結者成倒靨矣痘已成膿之後過期不靨以致潰爛膿汁淋漓不可著席黏惹痛疼者用敗草散或蕎麥粉以絹袋盛於身體上撲之更多布席上襯臥尤佳面上欲不成瘢䵟者用滅瘢散和百花膏敷之敗草散多年屋上爛茅草擇淨者為末摻之牆上爛草亦佳以多受風露之氣故能解痘瘡毒蕎麥粉蕎麥一味磨取細面痘瘡破者以此敷之潰爛者以此遍撲之絹袋盛撲以此襯臥尤佳滅瘢救苦散蜜陀僧滑石各二兩白芷半兩上為細末濕則乾摻之干則好白蜜調敷百花膏石蜜不拘多少略用湯和時時以鵝翎刷之瘡痂亦易落無痕倒靨痘子初出磊落成個後來長大作膿始相連串外雖相串皮下猶一個是一個至於結痂腫消膿干現出初來本形所以收藏斂束要完全堅厚覆成個數為貴或根腳相通皮肉盡串者結痂之時亦要乾淨無有淫濕及濺破者次也若未成痂者潰爛已成痂者只是嫩皮此倒靨也痘毒當靨不靨復入於裡者謂之倒靨此死證也元氣素怯又不食常自利者陳氏木香散瀉異攻散出不快死中求活聖藥也如原無泄瀉大便久祕今添腹脹喘呼此毒盛薄蝕元氣復入於裡宜急下之排毒散若不急下則腸胃不通榮衛不行益加喘滿躁悶而死矣若毒入里忽然自利者此人脾胃素強毒氣難留故自利須看利下之物如利痂皮膿血者毒氣得出為順不可止之待利盡膿血自愈如利水穀者此毒氣反驅水穀脾虛不能制之其證為逆不可治也排毒散大黃一兩白芷木香各半兩穿山甲七片土炒焦卷共為細末看虛實大小加減長流水煎沸調服如痘瘡破損潰爛者復腫灌作瘡不致乾枯原無痘瘡處復出一層如初出之狀亦以漸起發作膿者此裡氣充實毒不得入猶在於表未成倒靨逆中之順證也但瘡子重出一番必其人能食大便堅足以勝其再作之毒如食少大便潤者用十全大補湯人參白朮散肉豆蔻丸主之蓋病久氣虛惟利溫補不可再解毒也不靨悶亂哽氣腹脹薛陳文宿先生云痘瘡十一日至十二日當靨不靨身熱悶亂不寧臥則哽氣腹脹泄瀉寒戰咬牙急用異功散加木香當歸以救陰陽表裡助其收靨竊謂前證若手足並冷屬脾胃虛寒宜用十二味異功散手足微冷屬脾胃虛弱宜用五味異功散加木香若手足熱大便祕屬脾胃實熱宜用清涼飲救其陰以抑其陽一小兒痘不結痂發熱飲湯哽氣腹脹此脾氣虛弱用五味異功散參耆四聖散而愈後噫氣下氣欲服枳殼之類余謂噫氣屬心火虛下氣屬脾氣虛朝用六君子湯加薑桂夕用補中益氣湯而愈一小兒哽氣喘咳腹脹下氣手足不冷不熱此脾虛不能攝氣而腹脹下氣肺虛不能攝氣而哽氣喘咳用五味異功散加升麻而愈泄瀉痘子初出以來表裡俱病收靨之時表邪已解裡氣當和大便宜潤小便宜清忽爾洞泄水穀者此中氣暴虛不能禁固水穀或毒氣乘虛入里欲作倒靨並宜陳氏木香散瀉異攻散出不快肉豆蔻丸瀉主之利止者佳利不止者陽脫而死面痘瘡潰爛先傷於面者面乃諸陽之會痘乃純陽之毒以類相從如水就濕火就燥也又心之華在面諸瘡皆屬於心心火上炎之象如面瘡已破腫消目開者此不著痂先已乾燥病為倒靨死在旦夕如已破復灌滿面成餅焦裂濺起膿血淋漓食谷則嘔飲水則嗆咯唾黏涎語音啞嗄口中氣臭者此臟腑敗壞故諸證盡見也淹延悶絶而死如瘡潰腫飲食無阻大小便調更無他苦如上證者此則可治內用十全大補湯升陽解毒湯相間服之外用滅瘢救苦散百花膏合而敷之升陽解毒湯當歸升麻柴胡桔梗甘草牛蒡子密蒙花蟬蛻連翹防風荊芥穗各等分上銼細水一盞煎七分去滓食後溫服人中人中為任督交會之衢督乃陽脈自人中而上任乃陰脈自人中而下故自準頭至印堂與頦至鳩尾相應印堂至髮際與鳩尾至膝相應髮際以上與膝以下相應痘瘡收靨但觀面上收到之處則知身上收到之處矣凡痘子自人中上下左右先出先靨者吉陰陽變合相濟之理也若自額角先靨者孤陽不生足下先靨者孤陰不長皆凶兆也頭足造化之理生於陽者陰成之生於陰者陽成之故痘瘡收靨頭自發際以上陽氣獨盛謂之孤陽足自膝以下陰氣所聚謂之寡陰所以諸瘡皆靨之後此二處難靨乃造化自然之理不可作倒靨論疳蝕陳痘已靨未愈之間忽被風邪搏之成疳蝕瘡宜雄黃散綿繭散治之久不愈多漬骨傷筋殺人薛前證屬足陽明胃經其方解毒殺蟲之劑若毒發於外元氣未傷者用之多效若胃氣傷損邪火上炎者用蕪荑湯六味丸若赤痛者用小柴胡湯加生地黃肝脾疳證必用四味肥兒丸及人參白朮散更佐以九味蘆薈丸萬痘瘡結膿窠之先或曾傷犯破損者灌爛成瘡至於收靨此獨不靨膿汁不幹更多痛楚若不急治漸成疳蝕瘡損骨傷筋以致橫夭宜內服十全大補湯外用滅瘢散和百花膏敷之痘子已成疳蝕瘡者若在肢節及諸虛怯軟弱血氣俱少之處色青紫黑腫痛潰爛以漸延開血自出者難治若所生之處在於陽分不痛不爛色不變血不出者以綿繭散主之雄黃散治小兒牙齦生疳蝕瘡雄黃一錢銅緑二錢上二味同研極細每用量瘡大小干貼綿繭散治小兒因痘瘡身體及肢節上生疳蝕瘡膿水不絶用出蛾綿繭以生白礬捶碎入繭內令滿炭火燒令白礬汁盡取出研極細每用干貼瘡口上口疳袁痘八九朝之期雖澄黃結蠟而口中惡臭噴外上下牙床潰爛舌板堆裹黃垢名曰口疳若不早治則床脫牙落而成漏矣速將出白散吹之歌曰痘中疳臭世休輕脫床落齒漏淹成出白散方多不識細茶薄荷共煎濃亂髮滾湯摩洗淨指纏拭口去膜腥才將青黛硼砂片薄荷殭蠶些銅青按制研為極細末吹來頃刻痘疳平余治痘疳軍用人中白煆過和片腦薄荷吹之朝夕用細茶黃連薄荷煎湯頻頻漱口後吹之極效喉痹袁痘至七八朝之際而喉內鎖緊腫痛難咽毒峻於陽明而然也金虛則鳴當以稀涎散吹之歌曰喉中鎖痛覓稀涎山豆根真效可言薄荷熊膽相圭合再把茶芽總共研隨時吹入喉門裡頃刻之間痛遂痊此方甚妙熊膽山豆根須要識得真正者方可用此獲效否則以為無用之方矣發熱痘瘡常宜溫暖有熱不可盡去如一向身溫今反發熱者俗名干漿此亦常候只怕內傷飲食外感風寒以致發熱又當別論然病久氣虛不可輕用汗下因外傷者桂枝葛根湯初熱加人參因內傷者木香大安丸傷食主之歌曰待到渾身膿水乾人情倦怠盡偷安不知禁忌多翻變一簣終虧九仞山蓋收靨之時人心怠忽居處飲食不知禁忌以致變生異證者紛紛皆是也行百里者半於九十可不慎哉收靨吉凶痘瘡收靨圓淨堅厚如螺靨者上也頭穿膿出堆聚成痂如雞矢者次也皮破膿出痂薄如紙者又其次也皮爛膿潰不成痂皮膿汁腥臭者斯為下矣如已過期譬如瓜果熟久則爛此造化之常還作順看若未及期則為癍爛乃逆候也變倒靨而死結靨時色轉蒼蠟一二日從口唇四邊結靨由胸腹收至兩腿然後腳背和額上一齊結靨落而愈者吉結靨時遍身臭爛如搭餅臭不可近目中無神者死結靨時遍身發癢抓破無膿皮卷如豆殼乾者死結靨時寒戰手足顫掉咬牙噤口者死落痂後瘢痕雪白全無血色者死急宜補氣血養脾胃庶幾可活袁患痘八九日充灌回謝宜保全矣然有回至項頸而死者有回至胸前而死者有回至臍上而死者有回至陽物而死者其故何歟曰消息盈虛自有定數若痘證僅取其漿灌則可也倘元氣所稟者本是薄劣痘兼多蔓遂用毒物盡以發之再投升劫之劑盡把元氣趕上痘雖充灌然外囊實而內體耗蠹矣五經傷而不能斡補矣頸上喉突氣窩肺之關轄也肺氣先絶回至此則蜮絆而死胸阜心之關轄也心脈先絶回至此則死臍乃脾之關轄也脾脈先絶回至此則死眼眶乃肝之關轄也肝脈先絶回至此則死陽物乃腎之關轄腎脈先絶回至此則死本拔則枝枯源塞則流涸自然之道也若語其變風寒不知慎護而致梟邪逼於中飲食不知樽節而致脾胃傷於內肚腹腫脹痰喘不息於是回至各關轄而死者亦有之也又有一樣囂痘視之若似黃膿灌滿回至胸前則死此真蜮痘也落痂證治瘢赤黑萬瘡痂落後其面瘢或赤或黑者用四白滅瘢散臨睡以清蜜水調搽面上至曉以水滌去之自然白瑩脫去更宜愛護不得早見風日經年不滅如瘡瘢突起成凸者此熱毒未盡解毒防風湯主之見形發熱外更用蜆子內水摩之如陷下成凹者此脾胃虛不能長肌肉也人參白朮散痘渴加黃耆主之四白滅瘢散白芷白附子白殭蠶鷹矢白密陀僧各等分共研極細末以水調搽面䵟神效韶粉散治痘瘡才愈毒氣未盡瘡痂雖落其瘢猶黯或凸凹肉起當用此藥塗之韶粉一兩輕粉一錢上研細末豬骨髓熬熟調成膏薄塗瘡瘢上如痘疹欲落當滅瘢痕一名滅瘢散瘢黑暗凡瘡瘢頭面渾身並黑暗者未可便說無事猶恐日前未甚作膿收靨太急此倒靨歸腎也但察其表裡如壯熱大渴未除煩悶昏睡少食或大便不通或自利此真倒靨歸腎也若身溫暖爽快食漸加大小便調者此瘡瘢本色無慮也痂不脫萬痘瘡收後其痂自脫者佳不脫以百花膏潤之令其速脫稍遲則乾硬深入肌肉經久方脫遂成瘢痕然久而不脫者脾胃虛也人參白朮散加黃耆官桂主之不可撏掐剝去若不禁手反傷皮膚復灌作瘡番覆潰爛一時難愈其後多成疥癩也黃痘瘡黏著皮肉不肯脫落此表虛也尤當禁忌以防異變用調元固表湯主之調元固表湯黃耆人參當歸甘草蟬蛻人參固肌湯治痘表發太過致肌肉不密痘痂黏肉久不落者人參黃耆甘草當歸蟬蛻各等分糯米一撮上用水煎服人參清神湯治痘痂不落昏迷沉睡者人參黃耆甘草當歸白朮土炒麥門冬陳皮酸棗仁黃連酒炒茯苓上各等分加棗子糯米水煎服馬齒莧散治痘痂不落成癍痕者馬齒莧搗汁豬脂膏石蜜三味共熬成膏塗腫處凡瘡痂日久當脫不脫者胸背手足無妨惟面上不脫必成瘢陷未脫者以百花膏潤之收靨令其易脫脫盡之後瘢痕黑黯者以四白滅瘢散塗之羊𩩅骨髓治痘痂欲落不落瘢痕羊𩩅骨髓一兩煉入輕粉一錢研成膏塗之如收靨既遲瘡痂不落昏昏喜睡者此邪氣已退正氣未復脾胃虛弱宜調元湯即參耆飲見大法加麥門冬合安神丸痘煩躁或只用酸棗仁湯煩躁緩緩調理待氣血平復榮衛和暢而安矣瘢腫成膿痘瘡收靨之後痂皮盡脫曾見瘢痕凸起復作膿窠依舊結一層疕子者或因收靨太驟毒氣未盡或因誤服溫補之藥多啖肥甘之物飲酒喜食煎炒辛熱或因出風太早榮衛鬱而不通皆能覆成此證亦與前日一般但無苦耳若此者毒邪外散決無留毒之患痘瘡遍身潰爛不結痂者倒靨也或三五處腫灌潰爛不結痂者疳蝕瘡也若已正靨痂起自脫或面上或手足或片結硬瘡頭雖焦中蓄膿漿者此是原出瘡子之初其處太密糊塗成片無復顆粒所以毒壅於裡不能起發作膿結痂也但用滅瘢救苦散收靨和百花膏收靨塗之待膿盡痂起自愈或手足腕膝之間瘡窠連串作大一塊膿化作水停蓄於中恰如囊袋皮不破水不去日久只如是者此裡面肌肉已好原日瘡皮剩於外也宜用針決去其水自干脫矣能食不能食瘡痂既落中氣暴虛多不能食必藉人參白朮散去葛根加陳皮木香以調養之其間或有瘡痂起而能食者是胃中宿有蘊熱故也蓋胃熱則消穀所以能食其人必大便稍祕或大便難當用三黃丸利之否則恐胃熱不去郁為口臭齒腐生風之證流散四肢則發為癰疽腫毒然有一等脾胃素壯實者平素能食大便亦不至有祕結之患此又不可一概論也瘢痕赤白痘痕赤白各有所因治法亦異凡痕赤而作癢血虛而有熱也用四味牡丹皮赤而作痛餘熱也用四君連翹金銀花若發熱而大便調和者脾胃虛熱也用五味異功散若發熱而大便祕結者腸胃內熱也用聖濟犀角地黃湯若母有肝火用加味逍遙散若母有鬱怒用加味歸脾湯佐以加味逍遙散治之白者屬氣虛而血衰也宜固元氣為本癢而作渴者氣血俱虛也十全大補湯之類乳食減少四肢倦怠者中氣虛也五味異功散之類氣虛發熱者補中益氣湯之類血虛發熱者當歸補血湯之類須參兼變之證治之此證若服藥而漸紅活者可治色不轉者不治雖經年後多患瀉利而死若妄投攻伐禍在反掌一小兒痘瘡如期而愈痕赤如赭余謂此乳母有熱也診之果有肝脾鬱火先用加味逍遙散四劑與母服之子各飲少許而並愈一小兒痘痕色赤作痛熱渴喜冷大便不利先用前胡枳殼散便利渴止再用聖濟犀角地黃湯而安又用芹菜汁而靨一小兒十六歲痘痕白用獨參湯數斤色漸如舊又用地黃丸大補湯而安禁忌痘瘡新瘥之後氣血未復視之未靨尤加調護可也蓋痂皮起落肌肉新嫩不宜澡洗增減衣服則表已虛寒暑之氣易襲也瘡毒內作臟腑俱傷毒雖外散腸胃已弱不宜飲冷傷飢過飽則裡氣虛飲食之物易傷也時俗不知此理謂之已痊再無他變怠玩縱弛致生後災一旦病生悔之晚矣檮杌痘袁按孫氏揭檮杌痘以垂世而不注解其詳逮黃石峰盡注明白且痘澄膿結痂自頭抵足靨已脫矣又身發火熱舊靨盆處重出一番痘疏囊聚膿痛愈加甚服藥調護庶免夭亡倘飲食不節風寒不避邪氣感迫囊破潰爛肚腹漸脹陰陽不分死在旦夕矣若起於頭面者須防陋井湧泉陋井腮頰穿陋湧泉眼沿陋之患起於背腹者應慮蜂螫沉石之慮蜂螫遍身刺痛也沉石皮肉四爛也起於手足者不免有罄筆之罹起於陽球者預宜防脫囊之害玉函云天花結果慶奇全檮杌歸門痘倒顛不是渠塘番洶浪便教關節結癰纏為父母者庶幾慎之發熱瘡疹發熱與傷寒相似但傷寒只見一經形證若瘡疹則面燥腮赤呵缺頓悶乍涼乍熱多睡咳嗽噴嚏驚悸吐利手足稍冷骫涼耳涼也然發熱者瘡疹常候也不可盡除之但熱微毒亦微熱甚毒亦甚初發熱時精神清爽唇鼻滋潤更無他證者此熱在表其瘡必疏不須施治初發熱時渾身壯熱熇熇然不渴清便自調此邪在表拂鬱於皮膚之間宜以輕揚之劑發之升麻葛根湯主之初熱甚則羌活湯主之本條初發熱時其熱烙手目赤鼻乾唇燥小便赤大便祕煩悶不安此表裡俱熱毒氣壅遏宜發表攻裡雙解散主之初熱初發熱時表不大熱其人煩躁不安此熱在裡也以三黃丸微利之本條初發熱時或乘疫癘之氣人參敗毒散主之初熱初發熱時或為風寒所襲出不快者桂枝葛根湯羌活湯雙解散去大黃主之三方俱見初熱痘瘡之證其初不免於發熱者未出毒邪在裡煎熬氣血熏蒸臟腑而然瘡既現形則毒泄而熱解所以瘡出熱退者瘡本必疏若瘡已出熱不少減此毒蘊於中其勢方張其瘡必密宜急解其毒連翹升麻湯見形加防風荊芥穗地骨皮或解毒防風湯大法加升麻或東垣鼠黏子湯見形兼服代天宣化丸預防服藥之後瘡或不出或再出其熱頓減者為氣和也熱若不減瘡漸加多再消詳大小便何如大便不通七物升麻丸初熱小便不利連翹湯小便不利小大便俱不通八正散小便不利自利者黃芩湯自利加白頭翁酒黃連調赤石脂末裡氣和毒解矣如更加渴煩躁不已或譫妄或腹脹滿氣促或自利不止手足厥冷此逆證勿治如瘡已出但微發熱不須治之蓋瘡疹屬火非熱不能成就也以上見形而熱錢氏云有大熱則當利小便小熱當解毒大熱謂身熱脈實大小便祕津液燥而渴懼其變生他疾故利小便八正散通關散大便潤者連翹湯三方俱見小便不利導赤散心加人參麥門冬使心火有所導引則雖不用冷藥熱亦自減去矣瘡痘不至熱過不為冷誤甚為良法小熱解毒之說謂小熱不解大熱必生利其小便則慮損氣故但可解毒而已甘桔湯咽喉加牛蒡子荊芥穗以上起發而熱如瘡漿膿已成毒氣已盡又復發熱者俗呼為干漿不須施治如結痂之後其熱不退者此邪氣未盡正氣未復熱微者不須治之熱甚者當視其虛實羌活湯羌活川芎防風山梔子龍膽草當歸各等分甘草減半上銼細加薄荷葉少許淡竹葉水一盞煎七分去滓溫服無時加味葛根湯治痘失表發熱譫語升麻葛根赤芍甘草桔梗柴胡荊芥防風連翹牛蒡子木通上水煎服如聖湯治痘已出身熱如火紫草升麻葛根白芍甘草木通猴梨各等分加姜一片蔥白三莖水煎熱服心煩加麥門冬赤茯苓煩渴加生脈散七八九日身如火者加酒炒黃芩地骨皮柴胡麥門冬湯治痘壯熱經日不退柴胡麥門冬甘草人參玄參龍膽草上水煎服熱退即止一方無人參丹胡宅痘瘡發熱此血少有餘毒也陳皮白朮當歸身白芍藥各三錢牛蒡子研破炒二錢木通犀角生甘草川芎各一錢半上分六帖水盞半煎食前稍熱服活連翹散治一切熱兼治瘡疹如神連翹防風梔子甘草各等分上為末水煎服海藏云治熱在外而不厥此少陽藥也易老云涼膈去大黃芒硝者能解六經中熱此不惟解熱治小兒癍疹熱候亦使發之則本藥與防風荊芥二物各半白水煎服河梔子金花丸黃芩黃連黃柏山梔炒各等分上為末滴水丸如豆子大每服五丸白湯下錢三黃丸治諸熱黃芩半兩大黃煨黃連各二錢半上為細末糊丸緑豆大每服五七丸至十五二十丸食後米飲送下上錢氏云有小熱者解毒海藏謂解毒者三黃丸金花丸之類是也四聖散海藏紫草木通湯二方俱見形導赤散心八正散小便不利丹有初起煩躁譫語狂渴引飲若飲水則後來靨不齊急以涼藥解其標如益元散之類可用上五方利小便退熱之劑錢氏云有大熱者利小便又云身熱煩渴腹滿而喘大小便澀面赤悶亂大吐此當利小便蓋此用導赤散之類是也錢宣風散檳榔兩個陳皮甘草各半兩牽牛四兩半生半熟上為細末三二歲蜜湯調下五分以上一錢食前易老加防風通膈丸利上下氣血藥也大黃牽牛木通各等分上為細末滴水丸如粟粒大每服三五十丸量兒大小虛實加減上錢氏云有大熱利小便不瘥者宜宣風下之渴萬瘡疹渴者裡熱也蓋三焦者水穀之道路津液者水穀之精華變化流行以灌溉乎三焦也瘡疹之火起之於內銷爍水穀不得以變化津液灌溉臟腑故渴也又瘡本稠密津液外泄化為膿漿不能滋養真氣亦渴也小渴者常病也不須治之大渴者視其虛實以法治之切不可以冷水紅柿梨橘西瓜等物與之恐損脾胃致生災異也薛前證若二便自調飲食溫和口渴飲湯手足不熱是為虛熱不可食生冷之物若二便祕結飲食喜冷口渴飲水手足並熱是為實熱可與冷水飲之凡痘出而熱未止者既出盡則熱自止如發熱時便大渴者熱在裡也葛根解毒湯主之不止更加黃連以瀉心火之有餘黃柏知母以滋腎水之不足舌潤則生舌如芒刺則死蓋舌乃心之苗少陰之脈榮於舌也如發熱自利而渴者津液不足也黃芩湯加人參白朮麥門冬主之丹溪云初熱煩躁渴引飲者急以涼藥解其標錢氏云身熱煩渴腹滿而喘大小便澀而赤悶亂大吐此當利小便不瘥者宣風散下之葛根解毒湯葛粉天花粉麥門冬生地黃升麻各等分甘草減半上銼細取糯米泔水一盞煎七分去滓入茅根自然汁一合服之黃芩湯痘泄利五苓散驚宣風散痘發熱如瘡已出或起發或收靨一向渴不止者人參麥門冬散主之海藏云若身熱小渴者六味人參麥門冬散治之如不愈或身熱大渴者七味人參白朮散治之又不愈十一味木香散人參麥門冬散麥門冬葛粉各二錢人參甘草升麻白朮各一錢上銼細加粳米一合淡竹葉七片水一盞煎米熟去滓溫服六味人參麥門冬散麥門冬去心一兩人參去蘆甘草炙陳皮白朮厚朴薑製各半兩上㕮咀每服三錢水一盞煎至六分去滓溫服虛人減厚朴龐氏地黃膏見形退火回生散治痘血熱枯澀發渴滑石辰砂各一錢冰片三釐上為細末冷水調服一分睡片時必轉紅活矣如能食而渴者肺熱也經曰心移熱於肺傳為膈消由心火上炎乘於肺金熏蒸焦膈傳耗津液故渴也治在上焦人參白虎湯加黃連主之人參白虎湯又名化癍湯人參甘草各一錢知母三錢石膏五錢粳米一合上銼細水二盞煎待米熟去滓溫服無時竹葉石膏湯治痘瘡表裡俱虛胸中煩悶小便赤澀多渴成赤癍點者又宜服犀角散石膏知母各二兩麥門冬甘草各一兩上銼散每服三錢水一盞淡竹葉一握煎半盞溫服不拘時麥門冬湯治癍疹煩渴吐瀉及痂後餘熱麥門冬人參甘菊赤芍藥赤茯苓升麻各一錢甘草五分石膏三錢上用水煎服如不能食而渴者脾虛也叔和云口乾饒飲水多食亦飢虛由脾素弱不能為胃行其津液故渴也治在中焦參苓白朮散主之人參白朮散又名參苓白朮散人參白朮藿香木香甘草白伏苓各一錢乾葛二錢上銼細加生薑一片水一盞煎七分去滓溫服無時丹陳十妹年二十歲出痘而有孕七個半月大渴不甚出透寒熱交作血虛氣虛人參白朮黃耆陳皮甘草炙當歸身各一錢姜三片酒水各半盞煎服自利而渴輕則人參白朮散甚則陳氏木香散自利而渴者邪傳腎也正理論云自利而渴者屬少陰虛故引水自救蓋腎主五液其脈絡於肺系舌本邪傳於腎則開闔不司故自利利則津液下走腎水乾不能上潤於舌故大渴也治在下焦宜溫之陳氏異攻散主之出不快面白腹脹自利而渴者陳氏十一味木香散主之文中雲腹脹渴者瀉渴者足指冷渴者驚悸渴者身溫渴者身熱面㿠白色渴者寒戰渴不止者氣急咬牙渴者飲水轉水瀉不已者以上九證即非熱也乃津液少脾胃肌肉虛故也宜木香散治之如不愈更加丁香官桂此說必加審用之脹渴瀉渴驚悸渴寒戰渴咬牙渴亦多屬熱者不可不察如渴而大便祕者宜利之四順清涼飲主之熱海藏云瘡疹大腸閉澀或發熱四君子加栝蔞根桔梗主之痘子稠密津液少者十全大補湯汗生脈散止煩渴首尾通用人參五味子麥門冬水煎當茶飲神功散治痘作渴人參黃耆甘草牛蒡子紅花生地黃前胡紫草白芍藥上水煎服紅花湯治同上紅花或子隨意煎湯飲其渴即止縱口中如煙飲之即止加牛蒡子尤妙煩躁萬煩者擾擾而煩躁者憒躁之躁合而言之煩躁皆熱也析而分之煩陽也熱之輕者躁陰也熱之甚者難知集曰火入於肺煩也火入於腎躁也瘡疹煩躁須宜忌之若吐利厥逆腹脹喘促而煩躁者昏不知人譫妄狂擾而煩躁者謂之悶亂皆不治之證凡痘瘡出不快發不透靨不齊有煩躁者此有二證如面黃大便色黑煩躁喘渴或如狂或喜忘腹脹或痛此為有瘀血在裡也宜當歸丸痘便悶或四順清涼飲發熱並加桃仁泥紅花甚者桃仁承氣湯主之失血如便血下黑糞而又睡不醒心為血之主睡不醒則心之神昏矣玄參地黃湯失血加木通麥門冬若無面黃屎黑如狂喜忘之證只大便不通煩躁腹脹者此有燥屎也此卻真狂譫妄以三黃丸四順清涼飲俱發熱三乙承氣湯當歸丸膽導法俱便悶看病輕重擇而用之如偏執不可下之說以致陷伏而死者醫之咎也薛東垣云火入於心則煩入於腎則躁皆心火為之蓋火旺則金爍水虧故心腎合而為躁宜用梔子豆豉湯凡痘瘡盛作之時必令心火有所導引苟或毒氣出而未盡遂生煩躁以生黑豆煎湯或生犀磨汁飲之亦可若津液不足虛煩不得臥者活人酸棗仁湯此證多因脾胃氣虛或服克伐之劑所致但當調補中氣為善萬如肺熱而煩者坐臥不安審於何時若初發熱便煩者此毒火內郁人參白虎湯發熱加梔子仁主之若瘡發見猶煩者此毒伏於內未盡出也消毒飲見形奪命丹起發合而服之若瘡出盡又已起發猶煩者此內熱也牛黃清心丸主之如腎熱而躁者必曾自利輕則陳氏木香散瀉甚則陳氏異功散見形主之如揚手擲足欲去衣被者此熱甚於表也羌活湯主之瀉青丸去大黃加甘草如神識昏迷反覆顛倒者此熱甚於里也導赤散心牛黃清心丸合而治之吐利不食而煩躁者正氣虛也陳氏木香散主之如晝日煩躁夜則安靜者此陽盛於晝至夜則陽氣退而安靜也人參白虎湯加梔子仁主之如晝日明瞭夜則煩躁者此陽陷入於陰夜則陰盛陰陽交爭故煩躁也四物湯加梔子仁主之活人酸棗仁湯治痘疹虛煩驚悸不得眠酸棗仁炒甘草炙知母炒白茯苓麥門冬去心川芎乾薑炒各三分上水煎溫服兒大倍之梔子豆豉湯山梔四個豆豉半兩上水二盞先煮梔子一盞內豆豉煎至七分去滓溫服得快吐即止黃連解毒湯治發癍熱甚心煩不得眠黃連黃芩黃柏山梔各等分上每服四錢水二鍾煎五分溫服若癍毒甚者加青黛一錢調入湯內服之凡脈弦數內外熱甚譫語者合小柴胡湯主之若脈洪數內外熱甚舌燥煩渴者合化癍湯主之牛黃清心丸黃連五錢生黃芩山梔仁各三錢鬱金二錢辰砂一錢半牛黃二分半共研細末臘雪調麵糊丸如黍米大每服七八丸燈心湯送下人參蟬蛻散治小便不利痘瘡不發煩躁作渴咬牙喘滿人參蟬蛻白芍藥木通赤茯苓甘草紫草茸上每服三四錢水煎人參竹葉湯治虛煩不得寐或兼自汗人參竹葉甘草各二錢半夏二錢五分小麥麥門冬各一錢五分上每服二三錢姜二片粳米一撮水煎服譫妄譫多言也妄虛妄也譫妄者妄有聞見而語言無倫也皆邪氣熾盛正氣虛弱神識不清之所致夫言為心聲心熱則多言睡中呢喃者熱之微也寤而語言差謬熱則甚矣亦有胃熱而譫語者大便必硬數日不更衣方是薛陳文宿先生云痘紫色頂陷心煩狂躁氣喘妄語或如見鬼神內熱便祕者宜用龍腦膏子豬尾膏如無內熱大便不實不可輕服竊謂前證多因初起熱盛之時失於解利所致亦有因痘毒未盡有因胃經有熱有因肺胃有熱有因心脾有熱煩躁痘裂出血便血衄血屎黑痕赤詳見各證大凡作渴發熱手足指冷或大便祕結者內有熱也切不可禁其飲水觀張子和述水中兒事良可驗矣蓋熱極故得水而生也一小兒痘疹狂喘熱渴飲冷痰涎不利先君用十六味清膈飲犀角地黃湯而痊一小兒出痘發狂作渴飲冷此上焦熱熾也用黃連解毒湯芹菜汁而止又用紫草快癍湯將靨因間藥餌三日色黑倒靨用紫草散渴止又用人參白朮散而痊一小兒痘愈後時發狂兼喘發過面色黃白手足並冷此脾胃虛弱也余用補中八珍二湯各三十餘劑或云當先降火邪而後補元氣乃服芩連朴硝之類汗吐不止而歿初發熱便妄有所見聞妄言如見鬼狀此為惡候蓋毒攻於裡心志昏惑神識不清而然況小兒神氣怯弱鬼魅易侵又厲鬼常乘疫氣而行乘人之虛而疰之故凡痘疹妄見妄聞妄言如見鬼者不可治也須審發於何臟如目直視手尋衣領亂捻物此發於肝為亡魂悶亂喘促手掐眉目鼻面此發於肺為亡魄上竄咬牙多叫哭驚悸或不能言此發於心為喪神困睡手足瘛瘲不思飲食此發於脾為失意目無精光畏明欲墜下而縮身此發於腎為失志故曰真藏見者不治或發熱時無此證因大便祕結卻有之此內熱也先以宣風散發熱解利其熱後以導赤散心送下牛黃清心丸驚或粉紅丸驚以鎮其神病已者可治連作不已者勿治如胃中有燥屎三五日未更衣者宜滌腸解毒宜四順清涼飲三黃丸俱發熱主之如初發熱狂亂大便自調者五苓散加辰砂主之大便祕者輕則三黃丸甚則承氣湯主之如起發成漿欲靨之時忽然神昏譫語者此由瘡本稠密精血外耗不能養神宜養血瀉火安神丸主之安神丸黃連當歸身麥門冬白茯神甘草各半兩硃砂一兩龍腦二分半上為末湯浸蒸餅和豶豬心血搗勻丸如黍米大每服十丸燈心湯下梔子仁湯煩躁譫語驚狂發癍梔子仁黃芩石膏各二錢知母杏仁各一錢半大青柴胡豆豉赤芍藥各一錢升麻八分甘草五分上水煎服如昏不知人語言無倫者死經曰衣被不斂言語不避親疏者神明之亂也故不可治如初發熱便妄有聞見狀如見鬼而恐怖者不治此證自始至終皆不可有乃神志俱喪軀殼徒存不過引日而已驚搐錢瘡疹搐由風火相勝也惟癍疹能作搐疹為脾所生脾虛而肝旺乘之木來勝土熱氣相擊動於心神心喜為熱神氣不安因搐成癇癍子為心所生心生熱熱則生風風屬於肝二臟相搏風火相爭故發搐也治之當瀉心肝補其母栝蔞湯主之方見驚海藏云諸痛癢瘡皆屬於心火無論虛實皆從心火上說脾虛則肝乘之肝與心火相合故用栝蔞湯若脾土實火旺逆乘而成癇者此實邪也便結者瀉青丸便軟者瀉青湯亦當以脈別之翁經曰諸風掉眩皆屬肝木然痘出之始雖有四臟心實主之心火熱盛肺金受克不能制伏肝木熱則生風風火相搏神氣不安故發驚搐醫者當辨痘疹驚搐不可遽投涼心之藥苟不審而概以驚藥治之則心寒而肌斂毒氣內陷痘何由而出也治法當平肝木利小便為切要瀉肝則風去利小便則心熱退風熱既定則痘隨出而驚搐自愈矣然痘先驚者多吉痘後驚者多凶何也痘未出之先熱蘊於內故作驚搐痘出驚止而內無凝滯故吉痘出之後氣血虛弱復感風寒熱毒反滯又毋敢輕易發散清利故凶然有非痘證而慢驚者亦屬於肝而治法專理脾土何也蓋由平日或吐或瀉脾土虛弱不能當肝木所克此非肝木之本病也治法只須溫補脾土為主而肝木自寧譬如土薄而上有大木不能乘載故無風而自動栽培者當厚填其土使根深本固而自無風邪之害也痘後有此證者亦由氣血虛極使然也必為難治瘡疹論挾熱吐瀉不可投燥藥傷寒身熱不可投涼藥瘡疹發搐不可投驚藥此皆外同而內異蓋瘡疹出於心驚搐亦出於心也瘡疹本熱熱則動心此理之自然夫心火獨盛於上肺金受火克而不能制伏肝木熱則生風木氣盛則脾土衰熱氣動於心神心喜為熱心肚癍脾肚疹瀉肝則風去利小腸則熱退也風熱既退則驚搐自愈矣昧者不知投以銀粉腦麝青黛硃砂硝石涼心損胃之藥則誤矣故見證似驚風用藥當作瘡疹防之蓋瘡疹之初似驚風者多大抵瘡疹發驚必先咳嗽痰涎心悸煩躁嘔吐唇紅頰赤發渴耳冷足冷脈數舌白如有此數證則銀粉等涼藥切不可用蓋心涼則並損胃而毒氣斂伏又況心主血寒則血凝而不行且中焦既冷上焦熱愈不降何由運出又有小兒平常無病忽然發搐者必是瘡疹尤當審諦蓋毒氣內盛但當發散如惺惺散消毒散升麻湯紅綿散兼以快氣利小便祛風等藥與之待其熱氣得泄心氣亦自定矣或有風寒與內熱相搏而驚搐者各隨證治如前法但加勻氣藥為妙張氏云瘡疹氣勻即出快氣勻則榮衛無滯有毒亦散瘡疹當自出矣諸方並見初熱如大吐面青唇眼動手足時搐慢脾風證也宜小異功散加升柴木香乾薑治之潔凡未出而發搐者是外感風寒之邪內發心熱之所作也當用茶粉下解毒丸犀角地黃湯主之世治瘡痘欲出身熱煩躁忽發驚搐宜驅風膏小如聖飲小便不通八正散涎盛利驚丸抱龍丸量證施之丹欲發瘡疹先身熱驚跳搐搦此非驚風宜發散藥薛前證痘疹未見而先發搐者乃毒氣自心經出也若病勢輕緩或形氣虛弱者不宜用峻厲之劑恐元氣內損則毒氣內陷而瘡不能起發也或外感風寒之邪內因瘡疹之熱而相搏或肝血虛火動而內生風當補元氣為主佐以見證之劑然前方多峻厲之劑審有是證方可用須察其色赤白而以脾胃為主虛則用溫補實則用解毒張痘瘡始作未形見之間忽發驚搐是毒氣自心經而出也苟不以內外證辨明之便用銀粉青黛等藥則心寒而毒氣內陷往往氣絶之際或隱癍方出已無及矣治法但當以導赤散加防風辰砂末與瀉青丸合而治之搐甚者抱龍丸如再不止小便利者可治以導赤散送下牛黃清心丸或粉紅丸小便不利者勿治惺惺散初熱升麻湯初熱紅綿散解表之藥全蠍五個麻黃去節殭蠶白芷川芎桔梗天麻各二錢甘草蘇木各一錢上為末每服一錢加紅綿少許水煎有熱加荊芥稍熱服一方入薄荷葉三片好酒四五點同煎羌活散調三制辰砂末加防風荊芥表之方見初熱證治世麻痘風搐方人參羌活防風殭蠶醋炒南星薑製白附子薑製甘草炙上等分生薑三片水煎服其搐立止上皆解表之劑潔古所謂外感風寒之邪丹溪所謂宜發散藥者是也解毒丸寒水石研石膏研各一兩青黛半兩上以二石細研如粉入青黛和均湯浸蒸餅為丸如芡實大每服一丸食後新汲水化下或細嚼姜水下亦可三歲兒服半丸量歲數加減服之犀角地黃湯失血柴胡二連丸治肝經實火柴胡宣黃連胡黃連上為末糊丸桐子大每服二三十丸白湯下上解毒涼血瀉肝火之劑有熱者宜之導赤散心臟八正散小便不利六一散熱上利小便之劑小便不利者宜之然瀉丙火以瀉肝之子乃治驚搐第一要法不獨小便不利者為當用也紫草快癍散即加減大紫草散有木通無黃耆方見痘灰白東垣消毒散即消毒救苦湯見大法參耆四聖散灌膿八物湯虛羸柴胡梔子散即梔子清肝散見五臟熱地黃丸腎臟小異功散即四君子湯加陳皮益氣湯即補中益氣湯上皆薛氏所用方大抵主於養脾補腎乃補虛例也抱龍丸牛黃清心丸並見驚搐粉紅丸即溫驚丸見慢驚條上鎮驚豁痰例痰涎潮壅及曾被外物驚者用之錢癍疹病後欲發癇余瘡難發癇以木勝脾木歸心故也若涼驚用涼驚丸溫驚用粉紅丸萬痘後非時搐搦者有二證一則心熱留而不去熱盛生風風火相傳其人必喉中有痰目直上視面赤引飲居處喜冷宜導赤散瀉青丸清心瀉肝後以抱龍丸調之一則病後多食胃弱不能勝谷謂之食蒸發搐其人必潮熱大便酸臭祕泄不調或嘔吐腹痛先以備急丸丁香脾積丸利之後用木香大安丸錢氏異攻散調理取愈薛一小兒痘痂脫盡因其穢氣用蔥椒煎湯浴之發搐痰喘用八珍加白殭蠶蟬蛻一劑痰喘頓止又用四君芎歸釣藤鉤而搐止一小兒痘瘡色赤四肢發搐眉唇牽動此心肝二經熱甚乘脾所致也用四君防風釣藤鉤而痊一小兒痘後四肢發搐眉稜尤動小便頻數臉目青赤此肝經風熱用四物柴胡山梔少愈但四肢倦怠飲食少思大便不實此脾氣受傷而未復也用四君升麻當歸而痊一小兒痘後寅卯申酉時熱甚或兼搐余謂寅卯時發熱此肝火本證申酉時發搐乃肝木侮金先以四物白朮茯苓釣藤鉤煎送柴胡二連丸而愈夕用地黃丸朝用四君山梔柴胡及四君子加當歸而痊一小兒痘瘡色赤發搐痰盛服抱龍丸而頓愈又因母大怒兒仍搐母服柴胡梔子散加味逍遙散母子並愈一小兒痘愈後發搐左額青赤唇口牽動余謂肝心二經風熱所致先用柴胡梔子散加釣藤鉤後用加味逍遙散而搐止再用五味異功散而痘愈一小兒痘將愈發搐痰湧頭目不清脾氣虛弱肝木侮之先用五味異功散加柴胡釣藤鉤搐愈而靨涼驚丸溫驚丸並見驚搐導赤散心臟瀉青丸肝臟備急丸丁香脾積丸木香大安丸並見傷食柴胡二連丸見前補中益氣湯四君子湯四神丸十一味木香散並見泄瀉栝蔞散治痘熱極生風發搐栝蔞根二錢白殭蠶一錢上慢火同炒老黃色為末每服二三分薄荷湯下保命丹一切驚風發熱天麻鬱金全蠍去尾白附子炒殭蠶薑汁炒薄荷蟬蛻茯神桔梗各五錢防風甘草青黛各三錢大半夏炒滾湯浸曬乾又用薑汁浸曬乾又炒南星制同上各一兩鉤藤牛黃研各二錢麝香五分辰砂飛五錢為衣上末煉蜜為丸芡實大每服一丸燈心湯下中風丹痘風分氣血虛實以日子守之多帶氣血不足虛則黃耆生血之劑助之略佐以風藥實則白芍黃芩為君連翹白芷續斷之類為佐若屬寒陳氏方可用薛前證更當分痘瘡已出未出已靨未靨外邪所傷內虛火動若未出而搐搦熱毒內蘊也紫草快癍湯加釣藤鉤已出紅綻而搐搦熱毒作痛也東垣消毒散加釣藤鉤灌膿而搐搦血氣虛也參耆四聖散加釣藤鉤若靨後而搐搦血氣尤虛也八珍湯加釣藤鉤或目瞤或直視者風火相搏也柴胡梔子散或六味地黃丸加柴胡山梔或口角流涎者木乘土也五味異功散加升麻柴胡釣藤鉤或目赤眵淚者肝血虛而生風也四物湯加柴胡釣藤鉤或角弓反張者水不生木也六味地黃丸加柴胡當歸隨用補中益氣湯加天麻釣藤鉤不可直用治風之藥蓋風藥能燥血散氣必驗其手足冷熱溫和三證而用補瀉調理之法庶無誤矣如嬰兒當審乳母而治之萬痘後忽遍身青黑色手足瘛瘲口噤涎潮角弓反張語言謇澀者此中風也瘡痘方愈榮衛正弱不知避忌忽遇節令氣交八方不正之氣乘虛而入故為此證宜消風散二錢入蟬蛻末一錢分為三服投生薑薄荷汁及酒各數點溫湯浸之連二三服或作癮疹或再出膚疹而愈丹楊氏女年十餘歲痘發不透靨落後骨節痛食少夜間或熱此餘毒在內虛甚難於疏導須在補中有通此方主之當歸白朮陳皮各一錢牛膝五分通草甘草根炙蘇梗各三分犀角二分上㕮咀生薑三片水煎溫服男子七歲痘瘡初出不透毒氣攻內骨節作痛兩足不可直瘢痕缺紅活脈浮而和小便赤少當歸身白朮各一錢陳皮木通犀角屑人參茯苓各五分甘草炙少許上分二帖煎服消風散人參羌活川芎甘草炙防風荊芥穗白茯苓蟬蛻去毒厚朴白殭蠶炒陳皮去白藿香葉各半兩上為末每服二錢茶清調下紫草快癍湯見形出不快東垣消毒散大法參耆四聖散灌膿八珍湯虛羸柴胡梔子散熱六味地黃丸腎五味異功散吐瀉四物湯失血補中益氣湯虛羸當歸補血湯治痘瘡血氣虧損發搐熱渴喜飲脈洪大而虛重按如無者發熱自汗自汗者不因發散而自然汗出也衛氣者衛護皮膚肥實腠理禁固津液使不得妄泄也痘疹之火由里達表干於衛氣皮膚為之緩腠理為之疏津液外泄故自汗也凡病自汗宜遽止之瘡疹初出自汗實為美證乃陰陽氣和榮衛通暢邪氣不留易出而解也又心主汗諸瘡皆屬於心自汗出者毒氣外泄也雖然熱之甚者亦為汗解身復清涼此毒散也若汗出不止其熱反劇此邪氣並於陽而陽虛宜斂汗固表清熱解毒使衛氣充實無癢塌潰爛之患保元湯大法當歸六黃湯盜汗主之如瘡已收較痂皮脫落自汗者此氣虛也宜補陽救陰使氣無泄十全大補湯汗主之若更不止調敗蒲散同服外用溫粉撲法薛氏云靨後最宜審治若血虛者用當歸補血湯虛熱氣虛者用四君子湯加黃耆氣血不足者十全大補湯飲食自汗者小異功散吐瀉加黃連五味子烏梅肉睡中汗出心有熱也其汗上至頭下至頸不過胸者乃六陽虛汗也不須治之上至頸下至臍者此胃虛也保元湯即參耆飲見大法不止調敗蒲散同服自汗者血之所化陰氣不能閉藏所以睡則汗出痘家當以補血為主若當歸補血湯六味地黃丸八珍湯人參養榮湯之類皆可因證施治自汗面赤作渴手足漐漐汗多者胃熱也瀉黃散脾人參白虎湯發熱加黃連主之諸證退以小異功散加山梔仁麥門冬調之有食積內熱自汗者四君子加曲糵自汗發搐流涎者肝木侮土也小異功散加釣藤搐減去釣藤加柴胡主之丹溪謂自汗不妨蓋指初出並其汗之不甚者言耳若汗出過多最能虛人未靨之際恐致氣血虛而不能結痂既靨之後尤防血脫陰虛陽無所附矣汗出如油發潤如洗喘不休者此為肺絶之候死不治浮麥散浮麥不拘多少炒香每服三五錢水煎服治胃虛自汗敗蒲散一名止汗散用故蒲扇燒灰每服三錢溫酒調下無時服溫粉撲法黃連牡蠣粉貝母各半兩粳米粉一升上為細末敷於身上失血萬氣為陽血為陰陽主動陰主靜人身之血不可妄動也經曰陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血今瘡疹之火熏灼於裡迫血妄行血亦隨火而動陽絡傷則血從上焦出或衄血或嘔血陰絡傷則血從下焦出或溺血或便血陰陽俱傷則血上下出也諸失血惟從鼻出者或有可治之理其餘皆死證也亦有痘瘡灌爛不能收較出血不止者此陽瘡出血亦不可治張所云血之妄行從口從大小便從陽瘡或痘毒而出者悉皆不治蓋指出之多而不止者言之耳若初出之時苟詳推其因而善為清理豈俱無生者耶若痘瘡赤痛煩熱作渴或便血或衄血先用犀角地黃湯失血次用加減大紫草散痘灰白去黃耆加木通主之吳氏治諸失血始終用犀角地黃湯加山梔芩連白芍藥有初出時衄血不止用下藥而得效者薛一小兒痘後非衄血即便血痘痕赤白靡定手指冷熱無常余謂此元氣虛而無根之火倏往忽來也朝用補中益氣湯夕用五味異功散各二十餘劑而愈後因勞心復發仍用前二藥為主佐以十全大補湯而愈犀角地黃湯治痘疹並麻疹與衄血便血者可服牡丹皮犀角赤芍藥生地黃熱盛者加酒炒黃連若有瘀血停胸加醋製大黃若口鼻出血加大薊茅根若小便去血去大黃加小薊水煎服二寶散治痘紫色發熱鼻衄小便如血口渴亂語犀角玳瑁二味磨汁頓服即愈衄血吐血薛痘疹方云若痘發之際正宜微見與發汗同體然血與汗雖殊其源則一蓋痘疹乃穢血所發邪結肺胃毒氣自然上越也若見此證不可妄投以藥恐治失其宜瘀蓄者不出而已出者復傷反生變證也若作渴飲冷手足並熱此毒氣熾盛而血上溢也宜用聖濟犀角地黃湯若肺經熱毒而鼻衄用地黃清肺飲胃經熱毒而吐血亦用聖濟犀角地黃湯若腸胃熱毒而便血亦用之作渴飲湯手足不熱者脾肺氣虛不能攝血而妄行也宜用五味異功散若出血作渴煩躁面赤色者血脫也宜用當歸補血湯一小兒衄血上寸脈數此肺金有火也用瀉白散而血止但四肢倦怠用益氣湯而愈一小兒痘瘡赤色吐血發熱此胃經熱毒也先用聖濟犀角地黃湯諸證漸愈又用五味異功散而痊萬瘡疹發熱失血皆非佳候但從鼻出者此火刑于肺鼻為肺之竅宜瀉火涼血清肺以玄參地黃湯調鬱金末加茅根汁磨京墨汁飲之衄止者佳一向不止者不治玄參地黃湯玄參生地黃牡丹皮梔子仁各一錢半甘草升麻各半錢白芍藥一錢上銼細加炒蒲黃半錢水一盞煎七分去滓溫服斬關散痘紫發熱鼻紅不止生地黃牡丹皮黃芩各五分升麻三分藕節茅根各一錢緑豆四十九粒上水煎服便血凡痘子大便出血者看其血來何如又看是何時如瘡子正壯大便數日未行血從糞出者此肛門傷血出也如瘡已收大便膿血者此倒靨之血也非此二類但溺血便血者乃臟腑敗壞陰血妄行必死之候薛聞人氏云痘疹大便下血或黑糞若睡而不醒是為惡候乃內熱盛也用犀角地黃湯抱龍丸小柴胡湯加生地黃主之竊謂前證若寒熱作渴小柴胡加生地黃發熱體倦用五味異功散加當歸口乾作渴用人參白朮散大凡作渴引飲發熱者屬實熱作渴飲湯手足不熱者屬虛熱手足逆冷者屬虛寒治者審之一小兒痘瘡下血且不起發先君謂氣血不足用紫草快癍湯加參耆歸術血頓止瘡頓起用八珍湯而愈一小兒痘瘡下血小便赤色瘡色如赭發熱飲冷二便不利先君謂心小腸實熱用八正散後用解毒防風湯痘證治大法及飲芹菜汁而痊一小兒痘將愈而便血面白惡寒大便欲去而不去余謂此元氣虛而下陷也用益氣湯不信服涼血之劑致吐瀉腹痛而歿一小兒痘將愈患便血面白惡寒手足並冷脈沉細如無余謂陽氣虛寒欲用人參薑桂不從翌日而死手足青黑惜哉一小兒出痘三四日大便下血日有數滴至八日不能起御醫錢春林謂其脾氣虛寒用木香散二劑加丁香十一粒人參五錢次日痘起有膿由是血止二十餘日而愈溺血袁痘兩三日而小便溺血者名為沁砂紅蓋因梟毒輳於心心失其主而血隨毒激故奔散而妄馳心通小腸注於膀胱而溺血也或如黑豆汁或如蘇木水痛者易治不痛者難治主方木通生地黃黃耆赤芍藥犀角地榆升麻紫草車前葉多用燈草水煎服痛加甘草稍滑石山梔余治此痘要在於清心解毒使陰血總歸於榮升麻黃耆貴宜詳察而投不可執方以害人也若便如黑豆汁者毒已衝心而榮元已離十亡八九致有小便澀留結血條如綿線寸長欲尿則號哭痛不可忍者急用炒山梔末青龍鬚草汁調服再以木通湯飲之可也焮裂出血薛聞人氏云痘瘡大便不通小便如血或結癰毒身痘破裂乃內火熾盛失於解利急用犀角地黃湯小柴胡湯加生地黃四順飲之類治之竊謂前證若心脾熱盛用犀角地黃湯心肝熱盛用小柴胡湯加生地黃若大便不通先用四順飲次用犀角湯苦色赤焮痛二便不通急用活命飲加硝黃若色赤焮痛惡寒發熱用活命飲加麻黃若因乳母怒火用加味逍遙散加味歸脾湯不能食灌漿落痂二門參看凡痘家能食者不問稠密皆吉不能食者痘雖疏亦難發難靨瘡密者危蓋人絶水穀則死表裡皆病則困也有欲食而不能食者必喉舌有痘作痛艱於吞嚼也以爛粥米飲頻頻與之以助脾胃之氣更以甘桔湯加牛蒡子以解咽喉利胸膈也翁夫痘瘡之出也固賴元氣以發之而元氣之壯也必滋乳食以養之自四五日以至痂落之後飲食不減二便如常雖不起發不紅綻或陷塌用藥得宜可保無虞使乳食減少兼以泄瀉則元氣自此而日衰雖無前證日後必至藥亦難效去生遠矣故四五日前而不食者此毒盛於裡猶可治也至六七日後而不能食者雜證百出行漿不實雖藥之亦何益哉有稟受壯實又發於五歲之外者又不可以例論也有痘已痂起而不食宜調脾胃若痘起而倍能食乃胃中宿熱消穀能食而大便祕宜四順飲之類微解之恐胃熱不去為口瘡又有脾胃壯實能食大便如常不必服藥此治痘者可不知所審耶張不食有虛實之異其人怯弱精神慢而不食或因犯胃氣臟腑自利而不食者為虛當溫養之益黃脾理中吐逆姜附輩主之身熱中滿而不食者為實當清利之白虎湯發熱五苓散驚輩主之如腹脹不食口角流涎者小異功散主之吐瀉初出胸前稠密而減食者此毒盛脾弱也宜消毒飲加酒洗紫草山楂人參輩已出或因煩渴飲冷過多或誤投涼劑傷冷腹脹大小便利腹中虛鳴不能食者當以溫中藥疏逐冷氣治法見腹脹條有內實之人皮厚肉密而毒氣難於發越者又當服解毒勻氣之藥凡痘出而飲食少進者多因虛而毒發不透或兼有積滯故也以祕傳大透肌散出不快加枳實厚朴服之飲食不化手足逆冷者脾氣虛寒也四君子湯加乾薑甚則附子瘡痂既起則中氣暴虛多不能食只宜四君子輩徐徐調養之或有瘡痂起而能食者乃胃中宿有蘊熱也蓋胃熱則消穀故能食更兼大便祕結者宜三黃丸利之庶不生他變也然亦有一等脾胃素壯實者亦自能食大便亦不至有祕結之患則不必用此藥也靨後大小便如常而食少者宜胃愛散小異功散雙和散之類調補痂落潮熱唇紅口渴不食者四君子湯加陳皮山楂黃連渴甚白朮散不解以大連翹飲去黃芩主之脾胃傷於飲食者枳實丸傷食主之大便酸臭不消化畏食或吐者枳朮丸傷食傷冷飲食者宜溫之神應丸傷食主之然神應丸內有巴豆善醫者臨證須量虛實斟酌少與之庶不壞事趙氏治瘡痘不進乳食用白朮苦參湯宿食不消者陳皮枳實湯如因熱壅不食者二和湯加黃芩胃虛弱不調而不能食者人參養胃湯麥冬參朮散七珍散俱可選用或有雜證者去其雜證氣和自能食矣或大小便祕者利之四君子湯人參白茯苓白朮甘草各一兩上㕮咀用水一盞生薑三片煎四分溫服每帖三錢六神散治脾胃虛弱津液燥少內虛不食身發虛熱人參白朮茯苓甘草炙白扁豆炒黃耆密炙上等分為細末每服抄二錢用水半盞生薑一片棗一枚同煎至三分去滓溫服之不拘時候身熱甚者加烏梅少許同煎服七珍散調胃進食山藥人參茯苓黃耆白扁豆各一錢白朮二錢甘草七分上銼為粗散加粟米一撮姜二片棗三枚水煎不拘時溫服人參養胃湯補脾進食之劑白朮陳皮神麯各一錢五分人參茯苓梔子黃芩各一錢甘草八分上銼散分為二服水煎不拘時服麥冬參朮散調胃進食兼消積之藥麥門冬白朮各二錢陳皮一錢半人參甘草各一錢厚朴七分上銼散分為二服水煎無時二和湯消食扶氣之劑藿香香附各等分上為極細末滾水放溫調下二三錢白朮苦參湯治小兒患痘不進乳食白朮白芍藥檳榔訶子柴胡青皮各一錢苦參一錢二分鼠黏子厚朴陳皮砂仁烏藥紫草各一錢上銼散每服四五錢水煎食遠服陳皮枳實湯治患痘宿食不消陳皮一錢二分鼠黏子厚朴各一錢一分枳實青皮烏藥紫草茸砂仁神麯檳榔草果桔梗各一錢升麻八分上銼散每服四五錢水煎食遠服凡痘瘡飲食之間毋令太飢毋令太飽毋太寒太熱以損脾胃但與糜粥爛飯淡薄滋味以養之切忌肥甘煎炒五辛一切動風動火之物咳嗽肺主氣其變動為咳嗽者肺證也瘡疹發熱之初便有咳嗽者肺為五臟之蓋瘡疹之火挾君相二火之勢上熏乎肺肺葉焦舉故氣逆而咳也瘡疹既出其咳更增者此喉嚨有瘡淫淫如癢習習如梗故咳也瘡疹收後而咳者此衛氣虛弱腠理疏開風寒外襲肺氣逆而不收故亦咳也薛痘疹未出欲出之際乃熱毒上熏清道肺氣不寧宜用惺惺散若已出之後則屬元氣虛弱不能固衛腠理風邪乘虛而襲宜用五味異功散加桔梗五味子以補脾肺痘疹方云痘瘡未出之先咳嗽升麻湯初熱頭疼身熱惡寒咳嗽參蘇飲初熱嘔吐痰涎咳嗽白朮湯時氣頭痛身熱咳嗽惺惺散初熱萬如初發熱咳嗽甚者先以參蘇飲發之次以甘桔湯咽喉合瀉白散肺加牛蒡子治之凡痘子出盛咳嗽者此肺中有火或咽喉有瘡作癢也只用甘桔湯加牛蒡子多服良如涎唾帶血此咽中瘡或齒縫中出也不須妄治瘡不起發悶亂喘嗽手足寒飲冷者木香散瀉嗽甚別無他證五味子湯如瘡光壯收靨身熱咳甚者人參清膈散主之如瘡已靨咳嗽者不問形寒飲冷所致並宜人參清膈散主之若涕唾稠黏鼻塞不利者乃風邪傷肺也亦惺惺散參蘇飲主之俱初熱若痰盛煩躁痘赤壯熱飲冷者乃脾肺實熱也人參清膈散主之並飲芹菜汁若痰唾稠黏大便黑色乃胃經熱毒也用犀角湯失血並飲芹菜汁以解之病後餘毒咳嗽者升麻湯初熱感寒頭痛身熱惡寒而嗽者參蘇飲煩熱而嗽者生地黃散風熱咳嗽咽膈不利甘桔防風湯咽喉兼喘五味子湯病後咳嗽脅疼者蓋脅居一身之左右陰陽二氣之所行也餘毒在中二氣不能升降故脅痛用赤茯苓湯小柴胡湯發熱加五味子桔梗枳殼等解去毒氣則真氣行而所苦自平矣袁若痘交七八之期而身發火熱惡嗽連聲鼻竅衝出鮮血金虛則鳴梟毒激蕩於太陰之絡故耳以杏仁五錢冬花五錢門冬五錢栝蔞仁五錢與梨汁共煎為膏時取起再加白蜜人乳緊煎數沸納於瓷器內每辰昏進兩匙其效神應歌曰痘中惡嗽衝出血要識金虛梟毒徹冬花杏仁與麥門梨汁栝蔞仁最切熬膏投和白蜜中量數斟加人乳捷去火緊封瓷器內晨昏進服嗽聲歇痘中患嗽極為凶險但有感冒風邪於肺絡而嗽者不在此犯論易治易痊若元虛氣梟甚宜調養而男子時邁十七八歲破陽損精痘犯於此貴宜按方法服治斯免夭亡矣白朮湯治咳嗽嘔吐痰涎氣喘通用白朮一錢半陳皮白茯苓五味子半夏杏仁各一錢甘草半錢水一盞半生薑三片煎六分分二服五味子湯喘促咳嗽通用五味子二錢人參麥門冬杏仁陳皮各一錢上銼散水一盞煎六分空肚溫服兒小者分二服人參清膈散人參柴胡當歸芍藥知母桑白皮白朮黃耆紫菀地骨皮茯苓甘草桔梗各一兩黃芩半兩石膏滑石各一兩半上為粗末每服三錢水一大盞生薑三片同煎至六分去滓溫服不拘時量兒大小加減服生地黃散治小兒癍疹身熱口乾咳嗽心煩等證生地黃半兩麥門冬去心七錢杏仁款冬花陳皮各三錢甘草炙二錢半上每三五錢水煎徐徐服兒大加之若痰氣痘熱內作宜用桔梗甘草防風湯若痰上壅者佐以抱龍丸赤茯苓湯赤茯苓甘草大青升麻枳殼梔子各一錢上用水一小盞苦竹葉七片豆豉三十粒煎五分分為三服看兒大小加減桔梗湯治久嗽肺氣傷而吐痰有血痰或腥穢或咳吐膿血肺癰等證桔梗炒貝母去心知母桑白皮枳殼各一錢地骨皮栝蔞仁薏苡仁杏仁各五分當歸黃耆微炒防己各一錢五味子百合炒各一錢五分葶藶炒五分上每服三五錢水煎服喘諸喘皆屬於火肺者藏之長也為心華蓋心火炎上則肺焦葉舉氣逆不利而喘也有因風寒而喘者有因傷食而喘者惟瘡疹之喘獨屬於火若加泄利腹脹煩躁則不可治如初發熱便喘者前胡枳殼湯主之大便祕者可用服此不止以葶藶丸治之如喘而大便自利者黃芩湯痘腹痛加五味子人參主之痘出後喘急痰盛宜杏甘湯人參清膈散咳嗽痘瘡已出未靨之間喘渴白朮散渴甚者木香散審系虛寒之證方可用之如瘡正盛忽然喘急者此惡候也當詳審之如因傷食穀氣蒸而為熱上秉於肺作喘者宜利之丁香脾積丸傷食主之食去熱除喘自定也如因感冒風寒而喘者麻黃湯主之如泄瀉內虛腹脹而喘者陳氏木香散瀉主之利止喘定者生滑利不禁喘滿增盛者此氣脫候也收靨後腹脹喘渴大便利小便澀葶藶木香散喘而嗽五味子湯喘渴靨後餘毒不除大便堅實前胡枳殼散錢氏法喘而腹滿大小便澀者利小便不瘥者宣風散痘發熱下之海藏法瘡疹肺不利紫草甘草枳殼湯陳氏法痘出之間或氣促者木香散主之薛氏法脾肺虛弱白朮散渴脾肺虛寒木香散痘瀉熱毒內蘊紫草甘草枳殼湯風邪外感參蘇飲初熱內外壅滯人參清膈散痘嗽大便自利小便澀滯葶藶木香散大便堅實前胡枳殼散杏甘湯治瘡痘煩喘渴躁麻黃桑白皮杏仁甘草上等分為粗末每服三錢水一盞煎食後服麻黃湯麻黃杏仁甘草各等分石膏倍用上銼細加臘茶葉一錢水一盞煎七分去滓服無時一方無石膏有桑白皮前胡枳殼湯治痰實壯熱胸中壅悶臥則喘急前胡枳殼赤茯苓甘草炙各五錢大黃量兒加減上㕮咀每服三錢水一盞煎六分旋服葶藶丸甜葶藶黑牽牛炒杏仁另研漢防己各一兩上為末入杏膏取蒸陳棗肉和搗為丸如麻子大每服五丸至七丸淡生薑湯下葶藶木香散治大便自利小便澀滯喘嗽腹脹不能食宜多服為妙豬苓澤瀉茯苓白朮官桂葶藶木通木香甘草各半錢滑石二錢上銼散水一盞煎半盞空肚溫服忌油膩分為二服紫草甘草枳殼湯紫草甘草枳殼各等分上每服一二錢水煎葛根黃芩湯治喘有汗發熱咳嗽乾葛黃芩各二錢黃連芍藥石膏各一錢五味子十一粒甘草五分水煎服五味子湯治喘促而厥五味子一錢半人參一錢麥門冬杏仁各二錢上姜三片棗三枚水煎服六味涼血消毒散犀角如無用升麻牡丹皮當歸生地黃赤芍藥生甘草各等分上每服三五錢水煎涕唾稠黏薛陳文宿先生云瘡痘涕唾稠黏身熱鼻乾大便如常小便黃赤用人參清膈散如痰實壯熱胸中煩悶大便堅實臥則喘急用前胡枳殼散竊謂前證若肺胃實熱氣鬱痰滯或大便祕結小便赤澀煩渴飲冷宜用人參清膈散表散外邪疏通內熱使邪不壅滯若毒蘊臟腑大便祕結用前胡枳殼散疏導其里調和榮衛使邪自解散若痰嗽涕唾鼻塞不利宜用惺惺散或參蘇飲發散外邪庶元氣不傷痘瘡輕而易愈人參清膈散痘咳嗽前胡枳殼湯痘喘惺惺散參蘇飲俱痘初熱失音參形氣條看海藏云痘疹初出後聲音洪亮形病而氣不病也痘疹未發聲音不出形不病而氣病也瘡疹既發聲音不出形氣俱病也氣病宜補肺散加黃耆形氣俱病宜用八風湯或涼膈散去硝黃主之小兒稟賦素弱者宜預服十奇散補肺散阿膠一錢半炒成珠牛蒡子炒三分馬兜鈴半錢甘草二分半杏仁三粒去皮尖糯米一錢炒加生黃耆五分上為末分二服水一小盞煎六分食後時時與之八風散即八風湯藿香半兩去土白芷前胡去蘆各一兩黃耆甘草炙人參各二兩羌活防風各三兩上為末每服一錢用薄荷少許煎湯調服涼膈散發熱十奇散即十宣散見起發有心火刑肺而失音者肺屬金主聲中有二十四空凡發諸語言者皆其空中之氣鼓動也五行金空則鳴實則啞瘡疹之火起於心上熏於肺肺氣脹郁故竅塞而無聲也以導赤散心合甘桔湯咽喉加炒牛蒡子主之或用人參平肺散若津液不足虛火熏蒸者宜用地黃丸腎有毒歸腎而失聲者經曰足之少陰上繫於舌絡於橫骨終於會厭會厭者音聲之戶也舌者音聲之機也橫骨者神氣所使主發舌者也瘡黑陷伏則毒入腎邪氣上客於厭則厭不能發發不能出開闔不利故猝啞也有喉舌潰爛而失聲者咽喉者所以司呼吸納飲食發音聲猶管籥也毒火上熏咽喉先受賁門會厭舌齶之位皆瘡所聚初出之時失於調治以致咽喉腫塞管籥窄狹舌本強硬呼吸不能飲食不入音聲不出矣此上二證治之則難若七日後痘瘡成漿之際而失音者乃氣喉有痘初出細小不覺及至肌表之痘成漿喉中之痘亦成漿其毒壅盛則氣出管籥窄狹故所出之聲不清而為咽啞也大率七日前失音者併為逆證七日後而有者不治自愈蓋外痘結痂則喉之痘自痊故也當用甘桔湯服於已發未發之前所以清其氣道使毒不犯此預治之法不可不知若痘瘡靨後而失音者餘毒過盛上攻於咽以致腫痛乾澀聲音不出宜甘露飲咽喉甘桔防風湯咽喉天花散玄參升麻湯咽喉主之天花散治痘疹後失音天花粉桔梗茯苓訶子石菖蒲甘草各五錢上為極細末用水調在碗內小竹七莖小荊芥七莖縛作一束點火就碗內煎臨睡服每服一錢清肺散治患痘咽乾聲啞麻黃一錢五分麥門冬桔梗各二錢知母荊芥天花粉各一錢訶子菖蒲各八分上銼分為二服入竹瀝薑汁水煎服梔子菖蒲湯治小兒痘證因熱毒生風喑啞不語梔子一錢三分石菖蒲紫草茸各一錢二分山豆根生犀黃連各一錢一分羌活木通白殭蠶杏仁韭子鼠黏子各一錢升麻蟬蛻薄荷七分上銼散每服五錢水煎食遠服紫河車散治小兒痘瘡毒氣不解上攻咽喉聲音不出舌頰生瘡遏逆煩悶潮熱面赤紫河車即金線重樓茜根貫衆各三錢白芍藥甘草炙各五錢上每服三錢生薑一片水煎服一方有牛蒡子噙化丸薄荷葉二兩訶子肉七錢桔梗一兩甘草七錢栝蔞皮穰一兩白殭蠶炒七錢風化硝五錢黍黏子炒一兩上為極細末煉蜜丸如芡實大噙化燕津兒小不能噙則調化頻抹其口中嗆水難經云會厭為吸門胃為賁門病痘之人毒火上熏於肺灼於胃肺與胃之上口皆有瘡而傷矣水入則嗆者賁門傷則水不得入嗌入會厭會厭掩而不內故氣逆噴出而嗆也食入則吐者賁門傷則門戶隘塞食物不能直奔於胃緩則汨汨而下急則阻而吐出矣此其惡候鮮有生者其或舌上有瘡爛破如蜂窠之狀舌痛強硬不能為用延納水穀亦使水入則嗆食入則吐待舌瘡平則安矣咽以咽物喉以候氣咽居後而通於胃喉居前而通於肺肺無下竅加橐籥然能受清虛之氣而不受有形之物喉上有物若懸乳名曰會厭凡物入口則舌抵上齶舌抵上齶則會厭必掩其喉故水穀但入咽而不入喉若痘生會厭則木強不利開闔矣乾物間可入咽而水飲或漏入喉所以嗆也嗆者猶云錯喉氣須藥補湯藥不入則無補法故不可治翁七日以前痘色紅紫而兼此證者乃火氣炎上熱毒壅塞故也痘色灰白不起而兼此證者乃氣血虛弱肺胃受傷故也二者俱是逆證七日以後外痘蒸長光潤而有此證者是內證亦長故致如此外痘結痂則內證亦靨矣不治自愈善治者當察毒盛之痘於其咽喉乾燥之先而用甘桔湯解毒湯加麥冬栝蔞皮穰牛蒡子玄參荊芥之類以清氣道不使熱毒有犯則自能免此患矣袁氏治嗆逆歌曰痘中嗆逆最凶危沉香濃汁杏仁推遠把蜂糖多和水按經煎透濾渣隨欲服晨時加好乳湯中溫熱漸調之余每詳察痘嗆者乃元氣耗鑠梟炎上升故致嗆逆准恪後方人乳一鍾人參一錢桔梗一錢枇杷葉三片共煎濾渣服乳或用沉香磨人乳服者雖效總不若此方之屢見捷也吐利萬瘡疹吐利常候也經曰諸嘔吐暴注皆屬於熱蓋三焦為水穀傳化之道路熱火內迫則傳化失常而吐利並作火性燥動迅欻故也邪在上焦但吐而不利邪在下焦但利而不吐邪在中焦則上吐下利又裡氣上逆而不下則吐氣下而不上則利瘡疹初發熱時有吐利者不可驟止令邪氣上下得出也吐利久不止方可治之更宜消息薛痘疹方云痘疹吐瀉蓋因脾胃不和飲食不調煩渴嘔吐泄瀉並用白朮散渴然瘡疹皆賴脾土脾土實則易出易靨萬物得土氣溫暖而生吐瀉則傷脾土遂有更變之證夏月中暑煩渴瀉或腹痛或缺筋用五苓散驚加藿香傷食吐瀉用小異功散吐瀉手足並冷者用益黃散脾豆蔻丸泄利頂陷灰白用木香散渴瘡正出而吐瀉者或見血者俱為逆證難治竊謂前證雖因脾胃不和然邪實上焦則宜吐邪實下焦則宜瀉如吐瀉噯腐吞酸皆宜宣發但微甚不同耳張翼之云若痘疹吐瀉少食為裡虛陷伏倒靨灰白為表虛二者俱見為表裡俱虛合用十二味異功散救之見形甚至薑附靈砂亦可用若止裡虛去官桂止表虛減肉豆蔻若能食便祕倒靨為裡實勿補當用錢氏及丹溪法下之皆為能食為裡實裡實而補則結癰毒紅活綻凸為表實表實而補則潰爛不結痂凡痘見癍便忌葛根湯恐發表虛也如有更變當隨證治之張吐瀉有冷熱二證吐而不渴瀉而手足冷面色青白此冷證也益黃脾理中輩主之或四君子加木香豆蔻亦妙既吐且渴雖瀉而手足心熱面赤居處喜冷此熱證也五苓散驚竹葉石膏湯痘渴加橘皮等主之大吐而身熱煩渴腹滿而喘大小便澀面赤悶亂錢氏云此當利小便不瘥者宣風散痘發熱下之百問方用香蘇飲吐加半夏茯苓白芍瀉加白朮茯苓煩躁嘔吐渴瀉者亦熱也白朮散渴最當紫草木香湯亦可理中湯人參白朮乾薑白茯苓甘草節各等分上㕮咀用水一盞煎五分不拘時服如惡寒加附子名附子理中湯每帖二錢半香蘇飲治小兒痘疹作瀉香附子陳皮紫蘇川芎甘草白芷各等分上銼散每服三錢生薑蔥白煎或白水煎瀉加白朮茯苓嘔加茯苓白芍藥紫草木香湯治痘出不快大便泄利紫草木香茯苓白朮各等分甘草減半一方無甘草上銼散入糯米百粒水煎服每帖三錢紫草能利大便白朮木香佐之脾氣虛者加人參人參胃愛散治痘瘡已發未發吐瀉不止不思飲食或吐逆等證人參藿香紫蘇甘草炒丁香茯苓木瓜各等分糯米上每服三錢薑棗水煎初發熱自利而吐者黃芩加半夏湯主之更詳審吐利所出之物如吐酸水者利色黃或青緑者其氣臭者皆熱也若吐清痰之水利下清白不臭未可作熱治之乃內虛也四君子湯加訶子肉及益黃散脾一云痘欲出未出而吐利者是中焦停寒或挾宿食也四君子湯加砂仁橘紅或中和散有宿食者用紫霜丸癖發熱時吐瀉不止身熱口渴者四苓散加黃連淡竹葉煎服五苓去桂是也黃芩加半夏湯黃芩一錢半甘草炙一錢白芍藥酒拌曬九次三錢半夏湯泡七次二錢生薑一錢大棗二枚上銼細水一盞煎七分溫服渴去半夏加枇杷葉去毛炙二錢蘆根茅根各三錢中和散治中焦停寒或夾宿食厚朴一錢白朮八分乾薑四分甘草三分上銼細作一服加生薑一片水煎稍熱服起脹灌膿時吐利並作宜急治之胃寒者益黃散理中湯胃熱者黃芩半夏湯調四苓散靨後吐瀉亦分冷熱冷者亦宜益黃理中輩熱者四苓散竹葉石膏湯痘渴加橘皮或竹茹湯亦可竹茹湯橘紅半夏白茯苓黃連姜炒各一錢甘草五分竹茹一團葛根一錢五分上水一鍾生薑三片煎五分不拘時溫服分二帖和中湯虛吐不止即鎮胃止吐湯加人參人參茯苓甘草各五分白朮半夏各八分陳皮藿香砂仁各一錢上用生薑水煎服藿香正氣散治初熱乾嘔藿香紫蘇大腹皮陳皮桔梗甘草茯苓半夏厚朴白芷上薑棗煎服凡瘡痘已經大吐大瀉之後上下俱脫即當用大補之劑縱有他證皆以虛論庸醫每不顧人元氣用藥克削而致夭枉者滔滔皆是可恨也吐逆胃為水穀之海上通乎咽內而不出如初發熱有吐逆之證此火邪犯胃其氣上逆治之則易若自出現以至收靨有是證者乃瘡集於咽門攻於胃脘吞咽不利治之則難由於不知預解咽喉之法漸變為失音嗆水而不可救矣初虞世云痘瘡吐逆無痰益黃散脾有痰二陳湯大科痰飲或橘皮半夏湯不止者加丁香胃寒者宜之胃熱宜加蘆根茅根枇杷葉黃連若吐而瀉者亦宜益黃散及陳氏木香散異功散吐而身熱煩渴腹滿喘大小便澀面赤者當利小便不瘥者宣風散下之痘發熱薛前證若手足並冷渴飲熱湯或腹作痛中氣虛寒也宜用益黃散手足不冷吐逆痰涎中氣虛弱也宜用橘皮半夏湯手足並熱熱毒壅滯也宜用導赤散口乾飲乳不徹胃經氣熱也宜用竹茹湯吐逆不乳或吐乳酸穢此脾氣虛而乳食停滯也宜枳朮丸如初發熱暴吐不止此火氣上逆也茱連散主之茱連散黃連半兩吳茱萸二錢上二味同炒研細末每服半錢生薑湯調服橘皮湯橘皮半留白半去白炒二錢半夏一錢白茯苓一錢半上銼細加生薑五分水一盞煎七分去滓溫服橘皮湯治嘔吐不止飲食不入陳皮生薑各一錢人參五分上水煎作三四次服之橘皮半夏湯橘皮半夏等分上每服三錢薑棗水煎如因飲水過多而嘔吐者此水逆也五苓散主之如因傷食而嘔吐者以丁香脾積丸微利之如無上證而嘔噦者人以胃氣為本胃者土也土敗則木來侮之今木挾相火之勢上乘乎胃其氣自臍下直犯清道上出於賁門胃上口也微則乾嘔甚則噦土敗之象也太素曰弦絶者其聲嘶敗木陳者其葉落病深者其聲噦短針無取毒藥無攻謂不治也附方丁香煮散治脾胃虛冷嘔吐不食丁香不見火紅豆甘草乾薑青皮川烏去皮陳皮良薑胡椒益智各等分上銼散每服三錢用水一盞生薑三片煎六分加鹽一捏不拘時服加味鼠黏子散治咽中有瘡作嘔桔梗射干山豆根防風乾葛陳皮荊芥連翹水煎細細呷之燈心竹葉湯治乾嘔竹葉三十片燈心三十根水煎服祕方治嘔吐並吐瀉不止水穀不納者速效用多年灶心赤色土為細末每服二錢米飲調下小兒只一錢瀉利凡瘡未出而利者邪氣並於里腸胃熱甚而傳化失常也黃芩湯主之如自利清白色者為裡寒理中湯主之黃芩湯黃芩一錢半甘草炙一錢白芍藥六錢上銼細加大棗二枚水一盞煎七分溫服食前瘡已出而利者邪氣並於表正氣方逐邪氣主乎表而不主裡則裡氣虛不能停納水穀故亦自利也宜從氣虛而治九味理中湯倍人參加黃耆白芍藥九味理中湯人參二錢白朮乾薑炮訶子肉茯苓木香藿香葉肉豆蔻煨甘草炙各一錢水煎食前通口服瘡疹所忌內虛泄瀉凡覺腹疼或漉漉響趨小腹者皆欲作利宜先以法治之九味理中湯治之不止此開腸洞泄惟澀劑可以收之豆蔻丸不止則用真鴉片配蓮肉粉止之庸醫每不敢用澀藥恐澀住邪氣不知邪氣之盛莫如傷寒而張仲景治挾熱自利每用石脂蓋澀劑之去滑猶寒劑之去熱熱劑之去寒是謂對證之藥今既滑泄不已自當收澀又何疑焉如服澀劑而又不止則根本已撥無能為矣經曰倉廩不藏者是門戶不要也金匱要略曰六腑氣絶於外者手足寒五臟氣絶於內者利不止五奪之中此為最甚但正氣內脫者淹延而死邪氣內陷者煩渴而死此為異耳陳氏豆蔻丸治痘疹泄瀉木香砂仁白龍骨訶子肉肉豆蔻麵裹煨各半兩赤石脂枯白礬各七錢半上為末糊丸如黍米大一歲三十丸三歲百丸溫米飲下瀉止勿服自起發以至收靨大便常宜堅實忽然自利者理中湯丸主之理中湯丸人參白朮甘草乾薑各等分上銼碎水二盞煎一盞去滓溫服若欲為丸研細末煉蜜丸如彈子大每用一丸白湯化下參朮丸治小兒脾胃傷冷外熱裡寒不思飲食身常壯熱大便或溏色白或患瘡疹身有大熱因食冷物或冷藥過度或瀉或腹脹或已出瘡疹瘢白無血色此由裡寒脾胃伏冷榮衛不行致令毒氣內伏不出宜服之其瘡瘢白無血色者皆從瘢白四圍紅暈再起作膿結痂而愈人參白朮乾薑炮甘草炙各一分上為細末米糕泡糊為丸如麻子大每服百餘丸溫水吞下或米飲亦得乳食前服前世之書如仲景諸論治傷寒云輕者用理中湯重者用四逆湯此乃胃足陽明經而感寒邪脾胃乃為中州之府故用理中湯曰辛甘發散為陽以退寒邪也理中湯煉蜜丸而嚼下曰理中丸蓋添蜜甘以入脾胃嚼而便化於中焦今參朮丸以粳米糕為丸取其難化服在脾胃滲漉漸得消化則中焦得暖脾土喜燥其熱自歸此所以能治熱也胃主腐熟水穀大腸主傳送已化之物故食多少可以知人穀氣之虛實大便滑澀可以知人臟腑之冷熱大便如常是亦瘡疹之一順也如起發之時忽然泄瀉此宜急止之恐腸胃虛真氣脫也須辨冷熱虛實如瀉而手足冷面色青白瘡不紅綻者冷證也理中湯丸豆蔻丸益黃散脾甚則陳氏木香散異功散出不快皆可用也瀉下之物黃又酸臭渴手足心熱面赤瘡紅綻焮發者熱證也黃芩湯五苓散驚主之脾胃怯弱精神慢而不食者為虛當溫養之益黃散身熱中滿渴而不食者為實當清利之五苓散其人或臟氣自脫或因服寒藥致令瘡毒陷入大腸瀉下如豆汁或便膿血或便黑汁口內臭氣唇焦目閉加腹脹者必死之證如因飲冷水自利者所謂濕勝則濡泄也宜溫中利小便以理中丸溫中以五苓散利小便去水如因傷食自利者所出酸臭所謂飲食自倍腸胃乃傷也宜先去其積丁香脾積丸傷食後補脾胃益黃散脾如結痂之時暴泄不止者消息所出之物痂皮膿血者順水穀不分者逆如利膿血不止者此熱毒下流也香連丸主之香連丸一名香橘丸黃連一兩以茱萸五錢同炒去萸不用木香半兩石蓮子取肉二錢半陳皮半兩上為末醋調神麯糊為丸如麻子大每服二三十丸陳倉米湯下丹陳牙兒十九歲出痘有紅癍吐瀉而渴蒼朮一錢白朮三錢陳皮二錢黃耆茯苓甘草炙縮砂當歸各一錢半姜三片同煎服從子六七歲時患瘡痘發熱微渴自利一小方脈視之用木香散每帖又增丁香十粒豫切疑焉觀其出遲因問自利而氣弱察其所下皆臭滯陳積因腸胃熱蒸而下也恐非有寒而虛遂急止之已投一帖矣繼以黃連解毒湯加白朮與十帖以解丁香之熱利止瘡亦出其後肌常有微熱而手足生癰癤與涼劑調補逾月而安一男子十餘歲出痘熱時出根腳密嘔吐不食腰背骨節痛大渴喉痛腹亦痛全不食者半月餘脈浮弦洪而數與參耆歸朮炙甘草陳皮半茯生薑煎服之至五日色淡又加桂些少歸耆再用酒製至七日癢甚加丁香三粒附子些少癢止至八日九日渴大作而腹泄瀉癢甚至十日寒戰遂用白朮為君耆陳苓炙甘芩歸為臣至十一日不靨或癢或譫語但守前藥半月後自吐出痰多而安陳十一味木香散治疹痘腹脹渴其效如神必須審察的是寒證六脈虛細身不甚熱或發寒或嘔吐肚腹痛或身體四肢俱冷者可用此方出集驗木香大腹皮人參官桂赤茯苓青皮去白前胡訶子皮半夏丁香甘草炙各三兩上㕮咀每服二錢水一盞姜三片煎空心溫服異功散集驗方瘡痘頭溫足冷腹脹瀉渴方見痘出不快海瘡疹不渴藏寒下利四君子加乾薑減半主之痘疹大便不固痘漸黑陷小兒乳母同服人參白茯苓肉豆蔻黃耆各半兩甘草炙二錢上㕮咀每服一錢水半盞姜五片棗一枚煎三分乳母倍服若大瀉手足厥冷加附子用驗治中散虛寒瀉利不進飲食黃耆人參茯苓白朮川芎當歸肉桂各五錢肉豆蔻麵包煨熟取去油丁香一錢半木香三錢上為末每五歲用五分好熱酒調下衣被蓋暖少頃痘變紅活而起大小便閉劉提點云疹痘最要大小腑分曉所以錢氏四聖散用木通枳殼極妙若大小腑自流利則不必苦泥萬凡瘡疹小便欲長大便欲實經曰小便數者大便必硬雖二三日不更衣無苦也如小水少則病進蓋心主瘡而屬火心移熱於小腸小腸移熱於膀胱膀胱為津液之府氣化則出氣為火食不能傳化而津液不出故小便悶也瘡疹發熱大便欲潤若二三日不行宜急利之恐腸胃不通榮衛不行瘡出轉密也惟瘡起發之後大便卻宜堅實如能食而大便常行者不須忌之若過四五日不行則熱盛生濕其瘡難靨亦宜微利之設使大小便俱不通則邪毒內蓄三焦阻絶經曰一息不運則機緘窮故大小便不通者死凡痘子要大小便自調則裡氣和無留邪也故小便宜長而清如小便赤澀導赤散心小便短少八正散瘡出太密小便不通者連翹湯蓋瘡子發熱不可驟去惟利小便以折其鬱如痘稠密小便少者此氣血衰少津液虛耗非熱也不可利之反損真陽之氣十全大補湯汗主之能食者大便宜潤有入必有出也不能食者大便宜實存舊穀氣以養血氣也如四五日不行大便結燥者用膽導法導之不通以三黃丸熱微利之如大結腹脹者以三乙承氣湯下之如大便泄瀉即止之蓋痘瘡要裡氣實恐瀉得脾胃虛也輕則理中湯丸瀉利益黃散脾豆蔻丸甚則陳氏木香散俱瀉利異功散出不快主之聞人氏云痘出正盛喘促腹滿手掌心並腋下有汗或譫語妄言小便赤而大便不通者小承氣湯傷寒之類下之若面赤黃大便祕澀小便少而或嘔者宜小柴胡湯發熱熱甚而榮衛閉塞則毒氣彌蔓如里毒盛者大便不通小便如血如表毒盛者成為癰瘡身上破裂此皆因不曾解利之故俱宜犀角地黃湯失血小柴胡湯加生地黃四順飲發熱牛黃散腹痛紫雪大科發熱輩救之若毒凝血聚瘡成黑色大小便祕喘急煩躁者治法見驗色條治大小便俱不通以皂莢燒灰存性為末米飲調下葵子末一合水一盞煮至半鍾入豬脂半兩空心服小便不利痘疹方云痘疹未出之先小便不利熱盛者恐欲起驚用導赤散心微解之熱入膀胱如有血淋犀角地黃湯失血初出不快小便赤澀四聖散見形出不快已出而赤澀白朮散渴加木通五苓散加木香丹溪用五苓散加麥門冬煎服收靨之後小便不利煩熱而渴豬苓散痘後薛前證當分所因若小腸熱結用導赤散肝經熱用柴胡麥門冬湯痘後脾經熱用犀角地黃湯肺經熱用生地黃湯痘咳嗽腎經熱地黃丸腎靨後氣血虛弱用八珍湯虛羸中氣虛弱用五味異功散吐瀉萬凡瘡疹小便少者熱微導赤散加山梔仁熱甚八正散主之八正散治下焦積熱大小便不通或小便淋澀脈證俱實者大黃酒炒車前子炒瞿麥萹蓄山梔炒木通各一錢滑石煨二錢甘草一錢上每服二錢水煎滋腎丸黃柏炒黑知母炒黑各二兩肉桂二錢上為末水糊丸黃芩清肺飲黃芩炒山梔炒等分上每服二錢水煎紫草木通湯治痘瘡出不快小便不利紫草人參木通茯苓糯米各等分甘草減半上水煎服通關散此藥通心經利小便山梔仁大黃炒各一分木通甘草炙車前子炒赤茯苓瞿麥人參滑石各三分萹蓄炒五分上銼細用水一盞燈心十根煎半盞溫服連翹湯連翹防風瞿麥荊芥穗木通車前子當歸柴胡赤芍藥白滑石蟬蛻黃芩山梔子甘草各五分上銼細加紫草五分水一盞半煎一盞去滓食前溫服紫草冬葵湯治小便不通毒氣閉塞紫草茸山梔子黃芩各一錢二分秦艽苦參各一錢一分冬葵子一錢半露蜂房白茯苓木通白芍藥澤瀉車前子各一錢蟬蛻八分上銼散每服四五錢水煎食遠溫服如急數莖中痛者加甘草稍八分苦楝子一錢如痛甚欲死者加川牛膝一錢三分如有赤如血色者加胡黃連一錢三分如溺血者加當歸一錢川芎一錢龍骨火煆菟絲子各一錢紅甚者加生地黃白溺者加使君子各一錢三分黃連一錢一分韭子研一錢二分濁甚者加桑螵蛸一錢大便祕薛陳文宿先生云痘疹四五日不大便以肥豬脿白水煮熟切豆大五七塊與食之滋潤臟腑瘡痂易落切不可妄投宣利之藥恐真氣內虛瘡毒入里如六七日身壯熱不大便其脈緊盛與三味消毒飲見形微利之竊謂前證若毒在肌肉而未能盡發脈浮而緊者最宜此藥疏解其毒若脈沉而緊者宜用前胡枳殼散喘疏通毒氣以絶其源若口舌咽喉腫痛瘡毒甚也用射干鼠黏子湯咽喉若大便既通作渴飲湯脾胃氣虛也用人參白朮散渴凡燥糞在直腸不能下者宜用豬膽汁導之忌用疏利之劑恐復傷胃氣則瘡未出者不能發出已出者不能滿靨大抵分辨虛實當以手足冷熱或飲水飲湯驗之萬如發熱時大便不行熱微者三黃丸發熱甚則承氣湯主之如起發至收靨大便不行者用膽導法不可遽用利藥但瘡乾黑陷大便祕煩躁者以百祥丸牛李膏黑陷主之如無此藥以承氣代之當歸丸當歸半兩甘草一分黃連大黃各二錢半先將當歸熬膏子入藥末三味為丸加服之以利為度棗變百祥丸治癍疹大便祕結紅牙大戟去骨一兩青州棗去核十枚上用水二盞同煎至水盡為度去大戟將棗焙乾可和作劑旋丸從少至多以利為度洗心散治痘瘡壯熱大小便不利狂言多渴大黃甘草當歸麻黃去節白朮芍藥荊芥各等分上㕮咀量病輕重多少姜薄荷煎溫服則平熱服則溏三乙承氣湯大黃芒硝厚朴枳實各一錢甘草五分上銼細水一盞加生薑一片煎至七分去滓食前熱服膽導法用大豬膽一枚以鵝翎筒兩頭截齊一頭入膽中線牢札定吹令氣滿納入穀道中直待氣通取去加味四君子湯人參白朮黃耆白茯苓甘草栝蔞根桔梗各等分水煎服海藏以此治瘡疹已出未出大便祕澀或時發渴蓋有病者或因稟受不足或因吐瀉之後或因汗多或利小便元氣既虛津液乾涸不得潤滑而致大便祕澀者若妄行疏利何異操刀必須此藥治之醫家切宜詳審勿令誤也潤腸湯治虛祕當歸梢甘草生地黃火麻仁桃仁泥水煎服紫草麻仁湯治瘡疹大便不通致毒氣閉塞山豆根紫草各一錢一分鼠黏子露蜂房生犀青皮桃仁麻仁側柏葉黃芩各一錢杏仁一錢二分上銼散每服四五錢水煎食遠服祕甚者加烏梅肉七分不已再加冬葵子一錢五分集之六心臟部四痘瘡下寒戰咬牙寒戰者森然若寒振振然搖動也咬牙者上下片牙相磨而鳴也經曰諸風振掉皆屬肝木寒戰而振振搖動風之衆也火氣衝物亦然錢氏曰肝主風虛則咬牙多缺又曰上竄咬牙心熱也然則寒戰咬牙心肝二臟主之或以寒戰為氣虛咬牙為血虛或以咬牙為齒槁謂津液不足者皆不知此意痘瘡所惡者寒戰咬牙或單見一證或二證並見若瘡已壞加之喘促悶亂者死無日矣凡病痘者瘡本稠密轉動之間身體振搖者此一身被瘡所困不能支持轉動艱難之故不可便作寒戰妄投熱藥也有隻咬牙者此心肝二經火旺也蓋肝虛咬牙心熱者亦咬牙勿便作不治論如瘡初出而寒戰者此邪氣將出外與正爭故振振搖動火之象也瘡出乃定柴葛桂枝湯主之瘡已出或已成漿而寒戰者表氣虛而不勝邪氣之盛也養衛化毒湯主之如瘡本稠密焮發腫痛經脈動搖時時振動者不可謂之寒戰待膿成痛去而解收靨之時痂皮圓淨但或時戰栗者此正氣將復不能自持之兆不必憂疑須臾自定有筋惕肉瞤者經絡之血為瘡所耗不能榮養肌肉主持筋脈故惕惕然而手足自跳瞤瞤然而膚肉自動也不可謂之寒戰但養其氣血十全大補湯汗主之薛一小兒十四歲痘將愈忽寒戰手足並冷脈微細而不及兩寸乃脾氣虛熱用五味異功散獨參湯十全大補湯而愈一婦人愈後寒戰脈浮大按之微細此血氣虛也用十全大補湯三十餘劑而愈後因勞寒熱往來寒時手足如水熱時手足如炙脈浮大重按則細此陽氣虛甚也朝用補中益氣湯加桂附各一錢夕用八味丸料倍加桂附各五十餘劑而安柴葛桂枝湯柴胡葛根甘草桂枝防風人參白芍藥各等分上銼細加生薑三片水一盞煎七分去滓溫服不拘時養衛化毒湯人參黃耆炙桂枝甘草當歸上水煎服初虞世云憎寒困倦或發寒戰能令痘子縮伏宜用陳文中異功散方見見形證治出不快條婁氏云嘗治痘瘡寒戰用白朮耆歸加芩治之愈袁氏獨附湯治寒戰大附子五錢麵裹煨用水一鍾燈草七根煎服上方加人參二錢肉桂五分黃耆二錢橘紅一錢甘草五分當歸一錢則為附子振陰湯治寒戰咬牙捷效方也但紫焦伏黑者不用咬牙呵缺者肝虛也肝屬木臨官於寅寅為相火火盜木之氣故肝虛之證形焉陽引而上陰引而下則開而缺也陽上極而下陰下極而上則合而齧也十全大補湯主之如發熱之初便咬牙者此與癢塌吐瀉脾胃弱者不同須審形證分治之若多缺咬牙頓悶者肝藏風熱也羌活湯痘發熱目上竄咬牙者心臟熱也導赤散心不可妄用陳氏辛熱之劑上竄咬牙者心熱也諸瘡皆屬心火上竄者火炎上之象也咬牙者火氣動搖之象也導赤散加酒炒黃連牛蒡子主之咬牙兼面赤作渴至夜為甚者宜地黃丸薛一小兒痘瘡咬牙面黃飲湯此陽氣虛弱也用五味異功散加木香而愈後仍咬牙面赤作渴至夜為甚此脾腎陰虛也用地黃丸大補湯而愈一小兒咬牙作渴面色忽白忽赤脈洪數按之無力左關尺為甚此屬腎虛也用地黃丸補中益氣湯尋愈後因驚面青目赤呵缺咬牙手尋衣領此肝經虛熱用加減八味丸料煎與恣飲頓安又用補中益氣湯而痊一小兒咬牙作渴飲冷大便微祕寒戰痘赤多在身側此屬膽經虛熱也用小柴胡湯柴胡麥門散各一劑又用加味四物湯而痊清神化毒湯治心肝火旺其牙相戛而鳴者升麻生地黃木通甘草防風麥門冬上用水煎服人參蟬蛻散治咬牙喘滿煩躁作渴方見痘煩躁錢氏百神丸治戛齒甚妙如寒戰咬牙並作者則少陰專主之觀其瘡本如瘡本潰爛寒戰咬牙者此手少陰心火也經曰熱勝則肉腐寒戰咬牙火氣動搖之象也如瘡本焦黑寒戰咬牙者此足少陰腎水也腎色黑為主蟄封藏之本乾黑者真藏色見也腎氣寒在變動為栗寒戰者腎本病也腎主骨牙為骨余寒戰則鼓頷而兩牙相軋咬牙者腎寒所發也此二證者在心熱則清之在腎寒則溫之其病已壞治之何益或因陽氣虧損咬牙寒戰者獨參湯參附湯甚效若血氣不榮而不能靨兼以悶亂不寧臥則哽氣泄瀉寒戰咬牙者陳氏異功散見形出不快條加木香當歸以救之錢氏法寒戰咬牙黑陷者百祥丸下之方見黑陷薛前證若手足並冷渴飲熱湯大便泄瀉者陽氣虛寒也宜熱補之手足不冷大便不利渴飲溫湯者脾氣虛熱也宜調補之手足不熱大便不利渴飲熱湯者脾胃虛弱也宜溫補之一小兒出痘寒戰咬牙四肢倦縮大便自利手足並冷喜飲熱湯此陽氣虛寒也用十二味異功散末二錢諸證頓退又用人參白朮散參耆四聖散而靨一小兒十四歲面色忽赤忽黑出痘寒戰咬牙作渴煩熱喜飲熱湯此陽氣虛寒也用十全大補湯散煩渴頓止乃以八珍倍加參耆至膿灌又作渴面赤此膿成而血氣虛也用當歸補血湯八珍湯而靨至月餘面赤煩渴或時昏憒痘痕如赭或時作癢脈洪大按之如無此血脫也用大劑當歸補血湯而安一小兒膿不灌兼寒戰咬牙腹脹屬脾胃虛弱用四君肉桂歸耆肉豆蔻又用參耆四聖散而痊後用托裡散四君子湯而靨一小兒癢塌寒戰咬牙喜飲溫湯手足不熱屬陽氣虛弱也用參耆四聖散諸證已退用參耆托裡散其漿漸灌用十全大補湯其痂頓靨一産婦出痘寒戰咬牙腹脹作渴足冷身熱此脾胃內虛寒外假熱也大補湯加桂附三四劑去附易乾薑二三劑仍用參耆四聖散並五味異功散加歸耆治之而痊諸書多以寒戰咬牙並作為不治之證然能善治之多有生者蓋熱毒不得盡發內與正氣相搏則筋脈因之而動搖人之一身惟手足能運動口能開闔皆虛境也相搏之際故手足戰搖而口齒相戛矣無憂散治臨危痘證寒戰咬牙人牙自落者不拘多少火煆存性淬入韭菜汁內大牙三次小牙二次研極細末雄黃珍珠各五分上俱研為末每服三五分多則一錢用荔枝煎湯下一方有牛黃五分透骨解毒湯治寒戰咬牙紫草甘草當歸防風陳皮赤芍藥上各等分水煎服催蟄丹痘逾八九朝膿漿雖不充裕倏然寒戰咬牙以此治之虎牙人牙各一枚酥炙研細和人參丁香末乳酒和服滴滴金治寒戰咬牙狗頭去肉留腦髓酥炙脆細研為末濃煎酒下厥逆逆者四肢逆而不溫也厥者冷也又甚於逆四肢者諸陽之本常宜和暖如指頭微寒者陽氣衰也陽氣起於十指之端足心冷者陰氣勝也陰脈集於足下而趣於足心如瘡本焦黑煩渴頓悶喘促而厥逆者此陽毒內陷熱氣逆伏手足為之冷所謂熱深厥亦深火極似水者如瘡本灰白泄利而厥逆者此元氣虛憊陰陽不相順接而手足為之冷也瘡疹之候頭常欲涼足常欲溫故頭溫足冷者不治厥逆乃瘡家惡證也如因熱深而厥者大便不通三乙承氣湯便悶主之瘡黑者百祥丸牛李膏主之俱見黑陷如因泄利氣虛而厥者陳氏木香散瀉異功散出不快主之但十指頭微寒者四君子湯不能食理中湯吐利並加桂主之痘瘡發熱手足卻宜和暖雖云足屬腎要涼涼非冷也只與常人同遍身皆熱而此同常人故稱涼亦和暖之意非真冷也若手足冷由其人曾多吐瀉脾臟虛怯脾主四肢所以冷冷為惡候不可單用發表反損脾胃宜和中發表兼用痘出以脾胃為主又宜急與術作湯以飲之不可因循空談廢事也先以黃耆建中湯腹痛加防風羌活或四君子湯加黃耆桂枝防風以發之發後以四君子湯加黃耆白芍藥當歸桂心以補脾胃養氣血而助痘瘡之成就也如瘡始出手足便冷者其人先有吐利四肢者皆稟氣於胃脾胃氣弱不得至經理中湯加桂主之參附湯治痘疹陽氣虛寒咬牙寒戰手足並冷或吐瀉不食飲沸湯不知熱用獨參湯加好真附炮如法者每劑先加一錢未應多加之更不應加至四五錢或等分亦無妨但用之以運其陽氣如已脫者不治二神散治傷冷體寒肢冷腹痛口氣冷難發難壯暫用丁香九粒乾薑一錢煨上為末每服五分白湯送下蓋被片時令脾胃溫暖陰反陽回則痘變順矣量兒大小輕重用之眼目萬目者心之使也神所寓焉發熱之初觀其兩目神倦不欲開者痘也目中汪汪若水者疹也諸瘡皆發於心故候見於目也目赤者熱甚也心惡熱急解之經曰肝通竅於目瘡疹發熱目連札者肝有風也風入於目上下左右如風吹不輕不重兒不能任故目連札也目直視者肝有熱也熱入於目牽其筋脈兩眥俱緊不能轉眄故目直也得心熱則搐者風火相摶也痘瘡發搐此其常候但瀉心肝上之火搐止則吉搐不止則凶針經曰五臟六腑之氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑睛血之精為絡氣之精為白睛肉之精為餉束裹擷痘瘡之毒發於五臟六腑毒之甚者眼必受之古人留護眼之法其意深矣凡瘡出太甚兩眼常出淚者肝熱也此時眼中無瘡但內服瀉肝火之藥蓋眼中之痘常在收靨不齊之後有之如瘡入目成膚翳者切不可用點藥損睛破瞳成廢人矣痘瘡收後目不可開者肝熱則目澀不敢開明暗皆然心熱見明則合暗處則開謂之羞明此有餘熱在心肝也如瘡未成膿腫去目開者瘡已過期收靨不齊目閉不開者瘡壞欲變目上竄者心絶也直視不轉者腎絶也非泣而淚自出者肝絶也微瞑者氣脫也血貫瞳子者火勝水竭皆死候也護眼法見見形證治痘毒入眼而虛弱者不宜涼劑俟靨後治之雖有目翳切不可用點藥只宜活血解毒俟五臟和平翳當自去若誤用點藥則非徒無益而反害之丹如痘傷眼必用山梔赤芍決明歸鬚連翹防風桔梗升麻小劑末之調服如眼無光過百日後血氣完復則自明矣張炳治瘡疹後毒氣攻眼或生翳膜赤黑之類宜用四物湯加荊芥防風煎服兼用黑豆皮穀精草海蛤甘草等分為末用熟豬肝切片蘸服神妙一方治痘毒目翳用江西蛤粉黑豆皮甘草密蒙花等分為末調服丹痘後生翳數服效用葳靈仙仙靈脾等分洗淨不見火與日為細末每服隨時宜第三次米下錢氏黃柏膏痘初出塗面護眼方見證治大法調肝散治瘡疹太盛服之不入眼方見痘密羊肝散即下密蒙散方見活人法蟬蛻散治癍瘡入眼半年已里者一月取效豬羊蹄甲二兩入罐子內鹽泥固封燒存性蟬蛻去土取末一兩上二味研入羚羊角細末二分拌勻每服一字百日外兒一二分三歲三四分漿水或新水調下日三四夜一二食後一年以上者不治治瘡疹入眼馬屁勃蛇皮各半兩皂莢子十四粒上入小罐子內鹽泥封固燒存性研細溫酒調下三錢食後治瘡疹入眼或翳栝蔞根半兩蛇皮二錢上為細末用羊肝一個批開入藥末二錢麻線纏定米泔煮熟頻與食之兒未能食肝乳母多食之又方用蟬蛻末以水煮羊肝湯調服二三錢海藏地黃散治小兒心肝壅熱目赤腫痛生赤翳或白膜遮睛四邊散漫者尤易治若暴遮黑睛者多致失明宜速用此方亦治瘡疹入眼熟地黃當歸各一分黃連大黃煨防風羌活生犀末蟬蛻去土木賊穀精草白蒺藜沙菀蒺藜各一錢生地黃木通甘草各一錢半玄參五分上為細末每服一字或五分量兒大小加減煎羊肝湯食後調下日三夜一忌口將息大人亦治東垣云治痘瘡風熱毒翳膜暈遮睛以瀉青丸治之大效初覺易治云岐用竹葉湯和沙糖水化下瀉青丸二丸漸至微利神效癍入眼用決明撥雲密蒙花通聖蛤粉散之類然無出此書海藏云莫若病時隨經而取不使毒氣轉入眼中為尤妙然眼有五輪亦當求責此言為失治者說也決明散治瘡痘疹入眼海藏云此少陽太陰之劑決明子栝蔞仁各半兩赤芍藥甘草炙各一分上為細末入麝香少許令勻每服二錢生米泔調下臨臥服撥雲散治瘡痘入眼及生翳用桑螵蛸真者一兩炙令焦細研搗為末入麝香少許每服二錢米泔調下密蒙花散治小兒痘瘡入眼及無辜疳氣入眼密蒙花三兩青葙子決明子車前子各一兩上末拌勻用羊肝一大片薄批糝上濕紙裹煨熟量多少空心服之錢氏海藏云即羊肝散通聖散治疹痘瘡入眼及生翳白菊花如無甘菊代之然不如白菊好緑豆皮穀精草去根一兩上為細末每服一大錢柿幹一個米泔水一盞同煎候米泔盡只將柿干去核食之不拘時日三枚日近者五七日遠者半月取效蛤粉散治小兒瘡子入眼穀精草蛤粉各等分上為細末每一錢匕豬肝一兩許批開摻藥捲了用竹箬裹麻線縛定水一碗煮令熟入收口瓷瓶熏眼候溫取食之日作不過十日退眼閉不開者肝經熱也用消毒救苦湯痘大法子母同服或先用柴胡麥冬散餘毒次用四物湯失血加山梔亦可目赤腫痛者亦柴胡麥冬散並穀精散治之倪氏維德啓微集治痘疹餘毒不解未滿二十一日上攻眼目生翳眵淚俱多紅赤腫閉者亦用消毒救苦湯治效如痘稠密面腫目閉未收靨而眼忽先開者凶元氣虛損脈數促致令目睛上吊而露白非痘毒也時人謂風證謬甚但只露白而無他證急以保元湯加陳黃米主之七日之後有此十生六七七日之前有此百無一生無魂失志者不治不省人事者不治洗肝明目散當歸川芎防風山梔仁龍膽草柴胡木賊羌活密蒙花各等分上銼為末每服一錢淡沙糖水調服蟬殼明目散治眼目風腫及生翳膜等疾蟬殼去足翅地骨皮黃連宣州者去須牡丹皮白朮蒼朮米泔浸切焙菊花各一兩龍膽草五錢甜瓜子半升上為細末每服一錢半荊芥煎湯調下食後臨臥各一服治時疾後餘毒上攻眼目甚效忌熱麵炒豆醋醬等物蟬蛻散蟬蛻密蒙花黑豆殼緑豆殼明月砂各等分共為細末每用一錢以豬羊肝一片批開入藥末在內麻扎定米泔煮熟頻與食肝飲湯密蒙花散治痘入目翳膜遮睛密蒙花菊花石決明白蒺藜木賊羌活上為末每服二三錢茶清調下兔糞散治痘入眼兔糞炒黃為末用蟬蛻木通甘草煎湯頓服亦可煉蜜為丸酒送下三五十丸兔糞丸治痘入眼或生翳障兔糞炒四兩石決明煆草決明木賊去節白芍藥防風各一兩當歸五錢穀精草二錢上為末蜜丸緑豆大每服三五十丸荊芥湯送下吹耳丹輕粉飛丹為細末左眼翳吹右耳右眼翳吹左耳只吹一二次又方加雄黃麝香少許外用石燕子一對檳榔一對二味磨水常服洗肝散大黃梔子防風薄荷葉當歸川芎羌活各等分上銼散每用三錢水一盞煎六分不得煎熟空肚涼服防風散痘疹後風熱上攻目赤腫流血及痘風瘡荊芥穗當歸川芎防風赤芍藥防己梔子上各等分為細末每服二錢茶清調下作湯煎服亦可加味四物湯瘡毒入目血熱不散兩眥皆赤兼治瘡癤當歸川芎白芍藥防風生地黃荊芥各等分上銼散每服五錢水一盞半煎一盞分作二三次服羌活防風散日三服一切翳障皆可磨去羌活防風川芎甘草木賊緑豆皮荊芥各三錢蟬蛻穀精草蛇蛻雞子殼用內薄皮各二錢上為極細末茶清調下每服一錢食後服秦皮散治大人小兒風毒赤眼痛癢澀淚昏暗羞明秦皮滑石黃連各等分上每用半錢湯泡乘熱洗仙靈脾散治痘疹入眼仙靈脾葳靈仙各等分上為末每服半錢米湯調食後下蒺藜散治痘疹入眼蒺藜甘草羌活防風各等分上為細末每服二錢水調服如撥雲見日之效蟬菊散治痘疹入目或病後生翳障蟬蛻淨洗白菊花各等分每服三錢入蜜少許水煎食後服菊花散治瘡疹入眼諸證白菊花緑豆皮密蒙花旋覆花穀精草甘草各一兩每帖二錢用柿餅一枚粟米泔一盞煎水乾為度取柿餅食之五七日即效丹溪治痘後目翳穀精草蛇蛻緑豆殼天花粉為末粟米泔浸煮乾為度食之浮萍散治痘疹入眼痛楚不可忍浮萍草陰乾為末每服一二錢用羊肝半片入杯內以竹杖刺碎投水半盞絞汁調藥食後服之已傷者十服九效羚羊角丸治小兒腎虛宜肝腎明目羚羊角取末酸棗仁去皮各半兩肉桂不見火五分虎脛骨醋炙黃五錢防風當歸黃耆各一錢上為末煉蜜丸如皂子大每服一丸食前溫水化下日進三服羚羊角散治肝臟實熱眼目昏暗時多熱淚羚羊角鎊羌活去蘆玄參車前子黃芩去黑心山梔仁栝蔞各五錢胡黃連菊花各三分細辛去苗一分上為細末每服二錢食後竹葉煎湯調服羚羊角飲子治黑翳如珠外障羚羊角五味子大黃知母各一兩芒硝防風各二兩上銼每服五錢水一盞煎五分去滓食後溫服此方宜斟酌用之不可輕率撥雲散治小兒瘡疹後眼中生翳膜兔糞二斤如芒蘆花色者佳蟬蛻木通白蒺藜各二兩甘草一兩上同為極細末煉蜜為丸如梧桐子大每服八十丸食後白湯送下日進三服或煎濃湯服亦可頻頻服之以翳退盡為度此方經驗極效兔糞檳榔方向東西地方上一去不許回顧尋取兔糞十四粒檳榔用雌雄同磨取不落地井花水調服甚效咽喉咽者胃之系主內而不出所以司飲食也喉者肺之系主出而不內所以司呼吸也人之咽喉乃緊要橐籥門戶也經曰一陰一陽結謂之喉痹一陰者手少陰君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二脈並絡於喉瘡疹之毒君相二火主之其火上蒸咽喉最為先受故發熱與出形之初必問其咽喉痛與不痛先與發散解利之令毒得出不留連於咽喉間也若不知此義以解利於先則咽喉腫塞飲食不入呼吸不能死在旦夕矣如瘡出太甚審察咽喉若內無瘡又不痛者此毒已盡出不須慮之如內多瘡又加痛苦者切防收靨之時嗆水吐食失聲之變如病益甚喉中氣響汨汨如水聲者死初覺發熱煩躁咽痛者宜升麻湯初熱活人如聖餅子消毒散出太密咽痛發熱作渴面赤飲冷者胃經實熱也射干鼠黏子湯主之既出而咽喉疼者乃心胃有熱上攻如咽乾澀而疼兼口舌生瘡齒浮齦腫者宜甘露飲丹溪用鼠黏子湯即消毒散加防風水漿不入者紫雪大科發熱最妙抱龍丸驚消毒飲出不快皆可用毒攻咽喉口舌生瘡不能吮乳者如聖餅子主之以上劑須能食臟腑實方可用如上焦雖熱卻小便清大便溏薄飲食不進者當以清上溫下藥調之如甘桔湯加參朮陳皮訶子之類更驗手足如不熱者白朮散渴調之靨後咽痛治法見痘後餘毒條風熱咳嗽咽膈不利者陳氏用桔梗甘草防風湯玄參升麻湯亦得身壯熱口舌生瘡咽喉腫痛大便堅實者射干鼠黏子湯靨後壯熱咽痛痘痕色紅手微熱者餘毒未解也柴胡麥門冬散主之餘毒手指似熱而冷者脾氣虛也錢氏異功散主之要訣云喉者氣之出入之戶也熱毒之氣至此亦為極地故痘證喉病獨多而且暴烈或痛或燥或破或咽食或嗆食或流涎變證多端固難定治俱以退火為急用甘桔湯合解毒湯即黃連解毒湯加麥門冬薄荷硼砂孩兒茶為極細末煉蜜丸如大豆大時時噙化咽骨垂下或腫大以玉鎖匙點之嗆喉六日以前宜急治之喉痛喉燥喉破不能飲食者亦玉鎖匙吹之如喉痛作渴上體雖甚熱而兩足俱冷瘡不起發者乃腎經虛熱也不可專用清涼之劑宜以地黃丸料煎與恣飲兼用八物湯補之活人如聖餅子治小兒瘡疹毒攻咽喉腫痛海藏云隨經此一方即是隨經牛蒡子炒甘草各一兩麥門冬去心半兩桔梗一兩上為末加竹葉同煎細細服之海藏云減門冬竹葉甘桔鼠子湯治咽喉不利小兒癍出欲透皮膚身熱咽喉不利甘草桔梗升麻湯甘草半兩桔梗一兩升麻半兩上銼細每服一大錢水煎服甘露飲子治心熱咽喉痛口舌生瘡並瘡疹已發未發並可服之治熱上攻牙根腫痛動搖生地黃熟地黃天門冬去心麥門冬去心枇杷葉去毛枳殼炒黃芩去心石斛去苗甘草炒山茵陳上各等分為粗末每服二錢水一盞煎食後溫服牙齒腫痛則含嗽並服海藏云甘露飲為血劑地黃丸治小兒痘疹口瘡喉腫痛牙疳臭爛天門冬麥門冬玄參各三兩甘草薄荷各一兩上為細末生熟地黃汁和丸櫻桃大每服一丸溫蜜水化服甘桔防風湯痘疹後餘毒咽喉痛桔梗甘草防風各等分上銼散每服三錢水一盞煎至六分空肚溫服忌酒姜椒熱物玄參升麻湯治痘疹後餘毒咽喉腫痛升麻玄參甘草各半錢上銼散水一盞煎六分並渣溫服癍疹熱甚涼服射干鼠黏子湯治痘疹後癰疽瘡毒鼠黏子二錢升麻甘草射干各五分上銼散水一盞煎六分空肚服忌魚腥蔥蒜玉鎮匙點咽骨腫痛或垂下及喉舌強硬等證硼砂一錢朴硝五分殭蠶一條片腦半分上為極細末咽喉腫痛每用少許以竹管吹之加減射干鼠黏湯治痘證熱毒上衝咽喉腫痛射干山豆根白殭蠶各一錢一分鼠黏子紫草茸紫菀各一錢二分桔梗石膏訶子木通各一錢升麻蟬蛻各八分甘草五分上銼為粗散每服四五錢水煎食遠服利咽解毒湯治痘咽喉痛首尾皆可用山豆根麥門冬各一錢牛蒡子炒玄參桔梗各七分甘草二分防風五分緑豆四十九粒上水煎服三黃熟艾湯痘後咽塞喉痹黃連黃芩黃柏艾葉各等分水煎服腰痛瘡疹發熱先腰痛者最忌經曰腰者腎之府也又曰太陽所至為腰痛蓋足太陽膀胱經為十二經之首其脈俠脊入循膂絡腎瘡疹之毒起於右腎之下循足太陽膀胱散於諸經乃邪由里傳表也如初發熱其腰即痛此邪由膀胱直入於腎故關節不利而腰痛亟解毒以瀉少陰之邪發表以通太陽之經使邪氣不得以深入瘡雖稠密或可愈也治若少緩則太陽之邪由表以傳於陽少陰之邪由里以傳於陰表裡受病陰陽俱傷榮衛之脈不行臟腑之氣皆絶或為黑陷或為癢塌終莫能救矣凡發熱便腰痛者先服人參敗毒散初熱次服五苓散加獨活細辛主之薛痘瘡而見腰痛證者皆因腎經虛怯相火內燥真陰不能勝邪故腰作痛也急服地黃丸以防變黑歸腎乃克有濟大抵此痘因稟賦腎家精氣不足故目睛多白俗謂之折腰痘是也若平素面白眼白睛多行遲語遲者出痘必歸腎經預為調補腎氣庶免此患一小兒十三歲眼睛多白或時面赤常患頸痛尺脈洪數先君謂稟腎氣虛用地黃丸料煎服而愈至十五歲出痘先君雲鬚多服前藥仍用地黃丸益氣湯更加倦怠乃以地黃丸大劑煎與恣飲又用大劑八珍湯痘漸出如式恪服前藥至期歲二藥計十七斤余而愈先君每見嬰兒白睛多面色白或色赤令其預補脾腎以防出痘但信者少耳一小兒出痘腰痛足熱發渴此稟腎虛火動也先君用大劑加減八味丸料煎與恣飲諸證漸退佐以大劑八珍加紫草糯米數劑膿漸灌仍用前藥而結痂用八珍湯而靨一小兒出痘將愈因停食泄瀉作渴腰痛此脾腎虛弱也先君用加減八味丸料及五味異功散渴瀉頓止又與六味丸料及八珍湯而靨一小兒面色常白目睛多白時常腰痛兩足時熱冬不衣綿年九歲先君謂稟腎虛令每日服地黃丸至十歲出痘腰痛發渴面赤飲冷用地黃丸每劑加肉桂半錢煎與恣飲數劑之後熱渴頓止腰痛頓愈卻去肉桂仍與服之至五十餘劑而靨加味地黃丸熟地黃酒浸蒸透曬乾八兩酒拌杵膏山茱萸肉乾山藥五味子炒各四兩澤瀉白茯苓牡丹皮鹿茸炙各三兩肉桂厚者去皮取肉一兩發熱者以此加之引虛火歸腎經而熱自止也上各另為末入地黃和勻量入米糊丸服煎服更好羌活當歸湯治腰背痛初發熱時便宜服之羌活當歸獨活防風川芎黃柏各一錢柴胡一錢五分桂枝七分梔仁紅花各八分酒水各半煎服又方治腰痛有蒼朮漢防己如神湯治腰痛當歸桂皮玄胡索各等分為末酒下二三錢腹痛婁痘腹痛多是痘毒當臨證消息萬內經腹痛皆屬於寒惟有一證為熱瘡疹腹痛皆屬毒熱也訣云發熱肚中痛癍瘡腹內攻發多防不透發少更防癰是已或有兼食積者翁痘疹腹痛者由毒鬱於三陰臍以上屬太陰當臍屬少陰小腹屬厥陰須分別之腹脹者毒聚於腸胃也治法俱當升發解利痘毒兼分利小便使毒氣上下分消則痛與脹自止故曰痛隨利減脹以利消俗醫以厚朴行滯氣而不知升發解利非其治矣亦有乳食停滯不消化而腹脹者當以升發解利藥中加消食之劑所傷之物當審其寒熱又有數日大便者大便行而痛脹自止亦未可驟用硝黃也定痛散傷寒肚痛及冷氣痛神麯香附各一錢山楂二錢良薑當歸甘草各五分上用姜三片棗二枚水煎服手足逆冷加大附子二分桂枝芍藥湯治腹痛桂枝炙甘草各一錢白芍藥酒炒二錢生薑三片棗二枚水煎服黃連湯治熱毒在胃腹痛時或欲吐此藥能升降陰陽黃連炙甘草乾薑桂枝各二錢半夏人參各八分棗二枚水煎服一味異功散治小兒諸般釣證角弓反張胸膈臍凸以透明沒藥為末薑湯調下紹定論云病有似是而非若同而異者蓋肢體厥冷而腹痛者此毒氣在裡也若不審諦必作極冷治之反與熱藥為害愈深未冷極者不問有無寒熱肢冷腹痛必大便自利蜷臥惡寒今身熱肢冷腹痛大便不通乃熱毒在裡熱甚則發厥仲景所謂熱深厥亦深也伏熱深而瘡疹不出者宜以蟬蛻末水煎服之已出者亦可服毒氣得泄則四肢溫暖腹痛自止矣前人論腹痛有虛實腸鳴自利而腹痛者為虛痛是冷也腹滿而不大便者為實痛是熱也今腹中痛而不大便又身熱耳尖冷腳冷為瘡疹證明矣又有瘡疹始發腹中有宿塊而痛者醫不能辨誤作食積下之多夭橫矣薛前證痘未出而發熱煩躁或作渴飲冷大便堅實此熱毒壅滯也用疏利之藥萬凡發熱腹中便痛者此毒氣內攻也急宜發表疏里桂枝大黃湯主之亦有外邪與毒相併致未盡出而腹疼脹滿者宜參蘇飲去參苓加縮砂陳皮溫而出之若原無腹痛發熱二三日後大便不通而痛者此燥屎與毒相併而痛也三黃丸熱七物升麻丸初熱宣風散痘發熱擇而用之有譫妄狂亂者三乙承氣湯主之便祕原無腹痛或因飲冷水而痛者此冷痛也理中湯吐利加桂心或因多食而痛者此食積痛也微則木香大安丸傷食甚則備急丸傷食丁香脾積丸傷食原物湯下原無腹痛自利後痛者此虛痛也黃耆建中湯加木香青皮發熱自利又腹痛者此亦毒也黃芩湯吐利加木香青皮或化毒湯主之如瘡乍出乍隱此伏也七物升麻丸瘡出盡者再以紫草飲出不快大發之瘡不出者勿治張痘未出有先作腹疼或腹中有塊者乃腹中先出也不可投疏利之藥以戕賊胃氣但與和平勻氣兼發散藥如升麻湯參蘇飲之類蟬蛻一物湯用蟬蛻二十一個洗去泥為末水一盞慢火煎至半盞去滓量兒大小溫服之如覺瘡疹已出便依前服三五次不是瘡疹亦無害小兒瘡疹欲發出加甘草一錢五分煎一盞旋旋與服纍效小兒伏所蘊積熱毒蟬蛻味鹹寒可以制況有暴感風作熱客於表者蟬蛻亦治風毒充於皮膚瘙癢不止驚癇夜啼癲疾寒熱驚悸皆宜服之桂枝大黃湯桂枝白芍藥各二錢半甘草五分大黃一錢半上銼碎加生薑一片水一盞半煎至一盞去滓溫服食前桂枝芍藥湯桂枝白芍藥防風黃耆炙甘草各等分上銼細加棗子二枚水一盞煎七分去滓溫服黃耆建中湯黃耆人參桂枝白芍藥甘草各等分上銼細加生薑三片棗二枚水一盞煎五分去滓溫服化毒湯肉桂五分白芍藥甘草各一錢青皮木香枳殼各七分山楂肉連翹各五分上銼細水一盞煎七分去滓溫服不拘時汪一女傷寒但腹痛甚日夜啼哭手足厥冷漸至危殆此時天時痘災吾疑或是痘症遂取生豬血急用腦麝和灌一服得睡須臾痘出而安若非此方則夭橫矣萬痘已出而腹痛亦是毒在裡未曾出透亦宜桂枝大黃湯起發不透腹痛者陷伏也亦宜三乙承氣湯便祕及宣風散痘發熱薛痘已出而不熱躁不飲冷大便不實此元氣虛弱也用白朮散之類補之張出不快而腹痛者活血散即一味白芍藥見出不快以薑湯調下若毒氣彌蔓陽毒入胃便血日夜無度腹痛啼哭者牛黃散主之又有一等將成內潰之證而腹痛者當預防之七日前內潰蓋因風寒所中腠理固密陰陽二分壅塞不通其毒內攻臟腑之間毒火炮熾以致胃爛潰而成膿口舌皆白是其驗也此證極為慘毒識者知痘毒未出之時或有風寒阻隔氣粗熱甚身必戰動腹吐急疼者是欲成內潰也急以和解湯升麻湯初熱逐散寒邪開泄腠理縱毒而出庶無此證若證已成而治之亦無及矣牛黃散治瘡疹陽毒入胃便血日夜無度腹痛啼哭牛黃一分鬱金一兩上為細末每服半錢以漿水半盞煎至三分和滓溫服量兒大小以此增減日二服和解湯三日前後用升麻芍藥葛根人參川芎甘草防風羌活各四分上用水一鍾半生薑三片煎至五分溫服丹吳店子出痘瘡腹痛丁香二枚官桂芍藥各一錢白朮當歸各五分上作一帖服如身不甚熱或時發寒或嘔吐六脈虛細四肢逆冷而腹痛者陳氏木香散主之痘瀉利腹痛面青而手足冷者脾胃虛寒證也宜益黃理中輩主之理中湯加白芍藥桂上三條以溫藥治寒痛例作渴飲湯手足並冷者宜之婁嘗治痘始出腹痛或身痛脈洪數者解表涼藥加芍藥甘草漸安按解表涼藥即升麻湯連翹升麻湯雙解散之類加者倍而用之也上一條以涼藥治熱痛例作渴飲冷手足並熱者宜之如瘡已出至收靨時原無腹痛忽然作痛此必有飲食也消息審問曾因飲冷水者五苓散主之或用黃耆建中湯加白朮乾薑人參曾傷食者問傷何食丁香脾積丸主之用原物湯送下張傷食腹痛不可用巴豆大黃輩只宜平胃助氣之劑如平胃散小異功散橘皮湯吐逆皆可薛噯腐吞酸大便穢臭乳食停滯也用保和丸消之傷食若靨後傷食食蒸發搐而嘔吐腹痛者治法見驚搐條靨後熱多大便實糞黑腹痛者蓄血也犀角地黃湯主之如發熱時心腹絞痛煩悶叫呼或瘡陷伏脹滿疼痛喘促者此毒惡之氣攻刺腸胃燔灼臟腑必不可治腹脹凡痘子腹中常宜寬舒為里無邪若腹脹滿須審其傷食否及大小便何如如曾傷食微滿不痛者木香大安丸脹滿腹痛甚者丁香脾積丸俱傷食小便不通百祥丸黑陷大便不通者宣風散發熱主之此上諸證皆實脹者也故宜利之若自利腹脹乃虛脹也陳氏木香散泄利主之腹脹分虛實寒熱錢氏云身熱煩躁腹滿而喘大小便澀面赤悶亂大吐者當利小便不瘥者宣風散下之此實熱治例也陳文中木香散治痘瘡腹脹渴瀉此虛寒治例也薛氏撮要云腹脹瀉渴脾胃虛寒也用大異功散出不快參耆內托散即十補散出不快治之若前證而兼氣促體倦乃脾氣虛也用白朮散渴加木香煎送四神丸泄瀉如腹脹作喘大便利小便祕手足並冷乃脾氣虛也先用葶藶木香散喘次用小異功散吐瀉一二劑自愈此平補例也初熱時腹脹痛者由毒氣與外邪相搏欲出而不得出也用參蘇飲加縮砂陳皮去參苓服之挾有表證者宜此身熱脈數大便祕而腹脹此熱毒壅遏也當微下之或瘡半未出而喘息腹脹其人大便不通煩躁作渴譫語不安者當急下之俱用紫草承氣湯挾有里證者宜此丹溪用桔梗枳殼湯二陳加枳殼湯若虛弱自利四肢厥冷腹脹發噦者裡氣虛也姜附理中輩急救之紫草承氣湯厚朴二兩大黃四兩枳實一兩紫草一兩上為粗末每服五錢水半盞煎二三分溫服以利為度如未利加芒硝一字桔梗枳殼湯枳殼桔梗各二兩甘草五錢上銼每服三錢姜二片水煎服二陳加枳殼湯枳殼半夏茯苓甘草陳皮各等分上銼每用三錢姜二片水煎服若瘡既出而腹脹者有二證一則陰陽不和或因作熱煩渴飲冷過多或誤投涼劑熱為冷所激欲出不能毒不能發越故令腹脹其人必不能食二便利腹中虛鳴甚者氣喘發厥瘡白無血色者多致不救急當以溫中藥疏逐冷氣不可又用宣瀉之藥以重其困如小異功散吐瀉木香散痘瀉俱可用王中陽云木香散性溫平能和表裡治腹脹瀉渴有如神之效一則毒氣陷伏入里必有他證相雜或煩躁大渴或大小便祕或啼哭不止但用溫平解毒快氣之劑如人齒散黑陷活血散出不快之類又有小便赤澀而心腹脹滿別無他證者此伏熱在胃則中有所隔上為心氣不降故小便澀少而赤下為陰氣不升故腹中脹滿董氏用四聖散出不快以發出其毒則胃熱自散矣若出太盛而面黃大便黑煩躁喘渴腹脹者此有瘀血在裡也治法見渴條若出太盛至當結膿窠痂疕而不結能食而喘腹脹譫語不大便者及靨後腹脹喘渴大便利小便澀者治法俱見喘條痘瘡起發而腹脹者二證同前陰陽不和者瘡痘正發熱毒方盛必生煩渴宜以葛根解毒湯人參麥門冬散人參白朮散並見痘渴之類與之不知此理或飲冷過多或誤投涼劑熱為冷所激欲出而不能冷熱相搏毒不發起故令腹脹且傷於冷者急當以溫中藥疏逐冷氣冷氣散則腹脹自消益黃散脾去甘草加薑製厚朴甚者氣喘發厥瘡白而無血色多致不救陳氏木香散泄利聖方也昧者反用峻下之藥致令重困而死其毒氣陷伏入里者但用溫平解毒快氣之劑紫草飲子主之起發若腹脹而目閉口中如爛肉臭者其證為大惡丹勉奴痘後渴肚急小便少發熱芍藥白朮陳皮各五分川芎乾葛各三分甘草炙一錢半木通二分上用水煎服寄子五歲痘後肚急白朮一錢陳皮木通各五分犀角川芎白芷各七分甘草炙三分上水煎服加味透肌散人參黃耆白朮芍藥川芎甘草茯苓木通陳皮糯米厚朴大腹皮等分為粗散薑棗煎服紫草厚朴湯治痘瘡煩悶痞滿或堅急或結聚不散紫草茸一錢二分枳實黃芩黃連厚朴各一錢一分露蜂房白茯苓山豆根麥門冬桃仁石膏旋覆花各二錢蟬蛻升麻各八分白朮五分上銼散每服四五錢水煎食遠溫服溫平能和表裡治腹脹瀉渴有如神之效一則毒氣陷伏入里必有他證相雜或煩躁不渴或大小便祕或啼哭不止但用溫平解毒快氣之劑如人齒散黑陷活血散出不快之類又有小便赤澀而心腹脹滿別無他證者此伏熱在胃則中有所隔上為心氣不降故小便澀少而赤若出太盛而面黃大便黑煩躁順喝腹脹者此有瘀血在裡也治法見渴條若出太盛至當結膿窠痂疕而不結能食而喘腹脹譫語不大便者及靨後腹脹喘渴大便利小便澀者治法俱見喘條痘瘡起發而腹脹者二證同前陰陽不和者瘡痘正發熱毒方盛必生煩渴宜以葛根解毒湯人參麥門冬人參白朮散並見痘渴之類與之不知此理或飲冷過多或誤投涼劑熱為冷所激欲出而不能冷熱相搏毒不發起故令腹脹且傷於冷者急當以溫中藥疏逐冷氣冷氣散則腹脹自消益黃散脾去甘草加薑製厚朴甚者氣喘發厥瘡白而無血色多致不救陳氏木香散泄利聖方也昧者反用峻下之藥致冷重因而死其毒氣陷伏入里者但用溫平解毒快氣之劑紫草飲子主之起發若腹脹而目閉口中如爛肉臭者其證為大惡丹勉奴痘後渴肚急小便少發熱芍藥白朮陳皮各五分川芎乾葛各三分甘草炙一錢半木通二分上用水煎服寄子五歲痘後肚急白朮一錢陳皮木通各五分犀角川芎白芷各七分甘草炙三分上水煎服加味透肌散人參黃耆白朮芍藥川芎甘草茯苓木通陳皮糯米厚朴大腹皮等分為粗散薑棗煎服紫草厚朴湯治痘瘡煩悶痞滿或堅急或結聚不散紫草茸一錢二分枳實黃芩黃連厚朴各一錢一分露蜂房白茯苓山豆根麥門冬桃仁石膏旋覆花各二錢蟬蛻升麻各八分白朮五分上銼散每服四五錢水煎食遠溫服紫草枳實湯治痘瘡腹脹或熱毒或因傷冷所致紫草茸鼠黏子各一錢二分厚朴苦參各一錢一分白芍藥貝母枳實訶子肉豆蔻各一錢蟬蛻桔梗白朮各八分升麻七分甘草六分上銼散每服四五錢水煎食遠服葶藶木香散喘木通芍藥湯治痘瘡作渴腹脹小便不利木通芍藥白朮各五分川芎陳皮乾葛各三分甘草二分上水煎服姜附湯治瘡疹半出而半不出或出盛時卻下利支厥嘔逆腹脹吃噫須急與理中丸四逆姜附湯之類不須疑已試之驗也大便自利腹脹者是熱毒被冷所搐不能出冷甚則為下利其毒小得出則為腹脹當此以理中丸四逆姜附湯等服之里復溫則利止熱毒得復出則腹脹自消瘡疹亦自出矣又有瘡疹半出半未出或出盛時卻大便不通小便赤澀喘粗腹脹而唇齒乾口燥渴引飲譫語者當急下之此證是毒氣壅瘀欲出而出不辨故腹脹下之熱毒散榮衛伸則里脹消外瘡出合溫合下皆得其宜不可不述之若下膿血而腹脹者又非此證宜服南金散乳香豬血膏理中丸姜附湯痛癢諸痛為實諸癢為虛謂之實者邪氣實也謂之虛者正氣虛也又瘡疹為火火盛則痛火微則癢故常作痛者此邪氣之實也蓋痘瘡之毒發於皮膚肌肉之間氣以束之血以潤之醞釀其毒以抵於化正氣周旋而不捨毒氣變化而未成鬱而作痛此其常也毒化膿成其痛自止若肉如刀剜膚如錐刺一向痛而不止大叫多哭此則皮傷肉敗不勝其毒又痛之變也常作癢者此正氣之虛也經曰胃者水穀之海六腑之大原也五味入口藏於胃以養五臟胃氣既虛則水穀不化津液內竭不能輸精於皮毛氣失其衛血失其榮不能醞釀毒氣以至於成使毒氣浮沉隱伏聚散倏忽灼於皮毛所以癢也此其為異補其氣血和中托裡其癢必止若一向瘙癢時甚一時爬抓破壞皮脫肉坑者此毒氣內陷正氣外脫不旋踵而告變矣如先痛後癢者此常候也蓋先則毒未解化其火正盛宜爾作痛厥後膿成毒解火氣漸微宜爾作癢也痛活人書治痘瘡痛用溫驚丸驚水化下海藏治瘡出煩痛用五物木香散薛云若身後痛屬膀胱經也用羌活荊芥甘草湯即此三味等分身前痛屬肺金也用升麻葛根紫草湯身側痛屬膽經也用柴胡山梔連翹防風湯即此四味等分四肢痛屬胃經也用防風芍藥甘草湯即此三味等分以急止之蓋恐叫號傷氣忍痛傷血而變證也若熱毒盛者用東垣消毒散大法或仙方活命飲痘後餘毒食雞魚葡萄酒物者用東垣清胃散生犀汁若發熱飲冷大便調和用四物連翹牡丹皮若發熱飲冷大便祕結脾胃實熱也用清涼飲發熱若發熱作渴飲湯者脾胃虛熱也用七味白朮散渴大凡痘切不可食毒物恐作痛致傷元氣輕者反重重者難治大人亦然痘瘡起發痛者有二一則毒邪欲出氣血隨之肌肉弸急而痛九味順氣散起發合活血散出不快主之一則皮膚厚肉理密為外寒相搏而痛桂枝葛根湯主之初熱五物木香散治瘡出煩痛青木香二兩丁香零陵香各一兩麝香一分白礬一兩每服四錢水一小盞半煎服之熱盛者加犀角一兩如無犀角以升麻代之輕者一服大效又方以芒硝和豬膽塗瘡上令動痂落無瘢仍用黃土抹之良此病小便澀有血者中壞瘡背黑靨不出膿者死不療青黛散治痘未作膿痛甚心膈煩躁睡臥不安並宜服之真青黛如棗核大水調服之即安世痘將結靨乾硬而痛宜塗酥潤之靨可揭去則去之如無酥用豬油煎汁代之此痛非服藥可免也身痛經云諸寒為痛又云痛則為實內快外痛為外實內虛外快內痛為內實外虛今痘瘡身痛者是皮膚厚肉理密或為外寒相搏或熱毒內作或血虛不能榮養宜審而治之滄洲翁云凡瘡發身痛不為外寒所折則肉腠厚密宜分而治之若紅點方見為寒所折而內體有熱宜木香參蘇飲輕者消毒飲或葛根升麻加芍藥湯肉腠密者宜活血散合勻氣散外寒搏者必兼有表證如和解湯攻毒散去柴胡前胡皆可用若兼發熱頭痛惡寒咳嗽者參蘇飲主之熱毒內作血瘀而痛者先用活命飲瘡瘍次用消毒救苦湯痘大法血虛而瘀因作痛者四物湯之類遍身如齧色黑者毒氣壅滯而血凝也乃是危證若二便祕結喘急煩躁用梔子仁湯或豬尾膏血調片腦治之自利不食者不治消毒飲牛蒡子三錢炒荊芥一錢甘草半錢生用防風去蘆半錢上細切作一服水煎加生犀角尤妙葛根升麻加芍藥湯升麻葛根湯倍芍藥是也活血散出不快勻氣散即濟生方八味順氣散加木香也白朮白茯苓青皮白芷陳皮烏藥人參各五錢甘草炙二分半木香一分半上細切作一服水一盞煎七分服或細末酒調亦可癢塌訣云虛則癢實則痛此大概言之痘瘡之癢其候不同有初出時便身癢爬搔不停者此邪氣欲出皮膚閉密其火遊移往來故癢也與傷寒太陽病身癢汗不出者同論可發之使皮膚縱緩腠理開通邪氣得泄瘡出而癢去所謂火鬱則發之者是已有將收較而癢者其膿已成其瘡將回邪氣散而正氣復榮衛和暢故癢也與癰癤將痊而癢者同論不須服藥但謹護之勿令撏掐以致腫灌所謂美疢者是已有起壯泡漿而癢者當血已化水水未成膿之時其毒未化渾身瘙癢爬搔不寧此惡候也與傷寒陽明經病皮中如蟲行者同論所謂虛風外搏邪氣內強癢而不止為泄風者是已此視瘡之乾溼以風藥佐之必令癢去方為佳兆若癢甚不休瘡壞皮脫其毒復陷謂之癢塌必不能治矣大抵出形而皮肉紅豔起發而皮嫩多水者其後常致癢塌也凡痘子瘙癢者須於形色上詳審如瘡一向起發紅活光壯肥滿忽然瘙癢者此穢氣所觸也宜內服十全大補湯汗外用茵陳熏法起發其破者以白龍散敷之如瘡本乾燥又添瘙癢者火甚也如瘡原帶水皮肉嫩薄又癢者此溫熱也擺頭扭項手足動作昏悶者死證如初出身癢者可發之桂枝葛根湯初熱加制麻黃牛蒡子主之如起發養漿而癢者通用十全大補湯汗加防風牛蒡子主之起發身癢有二證一則血氣不足其癢為虛十全大補湯主之一則不能食淡以致發癢蟬蛻膏主之初熱如瘡干而癢者宜養血潤燥以四物湯失血合消風化毒湯奪命丹起發主之外用茵陳熏法如瘡濕而癢者宜養氣去濕以四君子湯不能食合消風化毒湯奪命丹主之外用茵陳熏法凡痘子已熟忽作瘙癢抓破者此脾胃虛弱不能榮養肌肉也內服四君子湯加黃耆官桂外以敗草散潰爛主之如因自利脾胃虛致癢塌者陳氏木香散泄利異功散出不快主之如瘡將收而作癢誤犯破損不肯幹較者用白龍散貼敷丹溪法於形色脈上分虛實實則脈有力氣壯虛則脈無力氣餒實癢則勢焮虛癢則勢怯虛癢以實表之劑加涼血藥實癢以大黃寒涼之藥少許與之下其結糞滄洲翁法主血氣不足用十補托裡散及木香散加丁香官桂胃主肌肉尤宜四君子湯加芎歸木香紫草煎服或患者不能忌口因食毒物而作癢者二物湯百花膏或四君子湯加解毒藥陳氏法痘瘡作癢抓破成瘡膿水淋漓者由血氣衰肌肉虛也宜用木香散瀉加丁香肉桂及敗草散收靨切忌用牛糞灰聞人氏法癢有二證一則氣血不足其癢為虛活血散出不快或四君子湯加黃耆枳殼主之左中恕用十全大補湯十宣內托散一則不能食淡以致癢蟬蛻一物湯主之痘腹痛魏氏法以保元湯倍加黃耆少加芍藥或云首尾癢塌保元加牛蒡子白芍藥何首烏何首烏有紅白二種名為雄雌必須兼下有效忌鐵王汝言云痘瘡虛怯淡白色癢塌此屬虛寒宜用陳氏法若發熱壯盛齊湧紅紫色燥癢此屬熱毒宜用涼血解毒之劑薛氏云前證皆因氣血虛弱所致預為調護使氣血和平庶無此患又必察其外證色白者用四君之類色赤者用四物之類袁氏云囊貯半漿而作癢者可以療止必當用參耆芍藥升麻附子之屬不宜投寒散之藥若焦貼皮膚作癢者不治空殼蓮蒲作癢者不治參耆內托散治裡虛發癢瘡不潰倒靨人參黃耆炒當歸川芎厚朴薑製防風各五分桔梗白芷官桂各二分木香甘草各三分紫草五分上入糯米一撮水煎量服之寒戰咬牙飲水瀉渴亦宜服紫草木香散治痘瘡裡虛癢塌黑陷發熱紫草伏苓甘草白朮木香人參各等分糯米上每服三錢水煎消風化毒湯防風黃耆白芍藥荊芥穗桂枝牛蒡子升麻各等分甘草減半上銼碎加薄荷葉七片水一盞煎七分去滓溫服無時丹治痘瘡癢塌不掩白朮一錢半黃耆炙當歸陳皮各五分甘草炙些水煎溫服豫治一子七歲痘將出未出之際腹泄數行其泄色黑不髮根窠三日後癢塌抓即黑色口渴其根窠如水疥狀不紅澤不起發食少脈浮數有力按之虛遂用參耆歸朮陳皮肉豆蔻為君炙甘草訶子桂為佐使水煎熟好酒些少咽下癢立止食立進根窠紅澤而起發二服全愈蟬花散治痘疹不拘前後始終遍身作癢抓破皆治之蟬蛻去頭足洗去土微炒一兩地骨皮炒黑色一兩共為末每服一茶匙水酒送下一二服神效二物湯蟬蛻淨洗二十一枚甘草炙一兩上為末水煎時時服之盒脾散痘至八九日期倏然身中梟癢此痘證之最急者以此治之炒術芍藥生地黃甘草升麻荊芥防風陳皮大腹皮殭蠶蟬蛻水煎服震澤湯人參黃耆芍藥生地黃防風甘草水煎服天元二仙丹渾天湯人參乳浸黃耆生附子麵煨各一兩四味另研細方和合一處白蜜調勻量兒大小加減十歲以上一錢十五歲以上二錢服後隨以振元湯連進癢遂止矣七星散黃耆芍藥各二錢人參桂心各一錢黑魚一個上前四味共研為末置黑魚肚內升麻酒煮熟與痘癢者連藥食之凡上焦癢吃頭中焦癢吃身下焦癢吃尾亦驗方也白龍散用干黃牛糞在風露中多久者火煅成灰取中心白者為末薄絹囊裹於瘡上撲之浴法經霜桑葉上蘇梗中升麻上荊芥穗中防風中水煎十數沸候溫拭體癢甚欲搔者以烏羽輕拂之以細茶當歸黃耆玄參燒煙燻之或以鐵器燒紅置釅醋中於室中熏之丹輕者用淡蜜水調滑石末以雞羽潤瘡上陳痘癢難任搔之成瘡或膿或血出者敗草散治之切不可用牛糞灰貼則臭穢癍瘢多矣方見收靨證治小兒痘瘡癢難任誤搔成瘡及瘡痂欲落不落用上好白蜜一味塗於瘡上其痂易落可無紫黑瘢痕世傳痘靨落後痘毒不盡變成癩癬其癢難任用陳年臘脂油敷神妙又方用羊𩩅骨髓塗瘡效方見落痂證治痂不脫條爬破萬凡痘子膿成漿熟或癢誤犯破者只復灌爛不能成痂若膿漿未成之時不可犯破半個必然癢塌而死袁敢問有爬破囊房膿血淋漓而死者有爬破囊房乾枯脫皮而死者其故何與曰木枯則自折土燥則自裂痘之囊房空虛則梟癢自作欲其不搔爬也難矣但爬破於不關軸之處猶可以全活若臉顴氣窩命之要轄也於茲爬脫死在旦夕彼爬破而膿血淋漓似乎氣血交養本不宜死也而有死者豈痘之不分美惡乎要知魚得水而肥鳥得林而棲痘囊既破膿血淋漓既竭則元氣耗絶矣元氣既竭烏得不至死耶評云膿血流來痘可生只因灌破走黃金任教爐火工夫到棄了黃金惱殺人喻言極是謝沖霄說女媧煉五色石以補天皮脫可藥紙以封之斯言謬矣治痘瘡抓碎出血黑虎丹歌曰絲瓜聯蒂與囊皮孔里烏金統用之慢火置於新瓦炙燒時存性效真奇痘經抓破惡梟攻須識王真一笑翁荊芥防風香白芷綿耆芍藥建奇功按古方有用敗草散抹者有用蕎麥粉抹者有用蛤粉摻者有用文蛤末摻者總不如黑虎丹之妙也陷伏倒靨伏者毒蓄於裡而不出也陷者毒出而復陷入也此皆惡候伏惟一證陷有數種伏候於見形之時其人瘡出熱不少減煩渴悶躁此有伏毒未得盡出也陷則見形之後其血漸干而變黑者謂之黑陷漿水未成破損癢塌者謂之倒陷膿成復化為水不肯結痂者謂之倒靨亦陷類也其瘡黑色皆謂之黑陷凡癍疹黑色皆不治之以腎為水其黑色乃腎之真臟色見也粗工不知變黑歸腎之理妄謂腎不可實欲瀉腎而使之虛不知人之一身大言陰與陽小言心與腎即方家所謂真水真火也瘡疹之火發於中賴此一點真水以制其充苟欲瀉之則火無所制本先撥矣豈治之要哉然謂歸腎者以腎主骨髓又主閉藏也蓋瘡疹穢毒由骨髓達於筋肉皮毛之間乃自內而外其毒得泄今既陷伏則自外而復入於內藏於骨髓謂之歸腎也又初出形之時春氣發生之令也出形而黑是春行冬令矣起壯之時夏氣長養之令也起發而黑是夏行冬令矣養漿之時秋氣成實之令也膿干而黑是秋行冬令矣故皆謂之逆結疕之時冬氣閉藏之令也此腎之正候若不著痂膿水浸潤此冬行春夏之令亦謂之逆惟知造化之機可以語歸腎之說其色黑者火化也觀物之乾者其色黑出於火者色亦黑豈可謂之水乎經曰火發而熏昧知此可以語黑陷矣凡瘡伏而不出者雙解散主之初熱癍點色白或黑色其人必不能食乳大便自利或嘔或厥此胃虛弱而不能副榮衛故也宜用溫中之劑令其胃暖榮衛復行則當自出矣宜理中湯痘吐利丁香煮散痘吐逆之類如倒陷者看其大腑何如如大小便祕四順清涼飲發熱合奪命丹見形主之泄利氣弱者十全大補湯汗合奪命丹主之並外用胡荽酒水楊湯俱起發丹溪先生云痘瘡倒陷因真氣虛而毒氣不能盡出者用黃耆人參紫草酒製治之若將成就之際卻淡色者屬血虛用當歸川芎之類或加紅花紫草屬熱毒者用升麻芩連梗翹之類甚者用犀角屑大解痘毒薛竊謂前證若熱毒方出忽被風寒閉塞肌竅血脈不行身體作痛或四肢微厥癍點不長或變青紫黑色者此為倒靨若胃氣虛弱不能補接榮衛出而覆沒者謂之陷伏誤用解毒之藥必致陷塌若喜熱飲食手足並冷者乃脾胃虧損陽氣虛寒之證宜用辛熱之劑補之喜冷飲食手足並熱乃陽氣實熱之證宜用苦寒之劑瀉之外感風寒者溫散之毒入腹者分利之陽氣虛者溫補之外寒觸犯者熏解之自昔謂白陷不可救蓋痘色白者必變為灰慘灰慘者必至於平伏倒塌故謂之白陷此固由氣虛所致然血不華色血亦本虛治法須兼氣血為當血活氣行白可變而為紅自不至於陷塌矣若單補氣則氣愈燥熱勢必陷伏故白陷抓破皮薄幹燥而極癢者由失於補血致氣盛極而燥也愈用補氣之藥速死之兆也故凡見痘色白者無分先後皆以補中益氣湯合四物湯治之內有熱者加解毒藥或利小便若待白陷已成而後治之難為力矣痘有紫黑陷灰白陷紫黑陷者乃血熱干滯而氣亦不能以運行有餘之證也急治之猶多可活灰白之陷乃元氣衰敗故不能起發而血亦不得通貫不足之證也多難救治如將起發瘡亦有水但色黑黯者以十全大補湯汗調無價散主之或以快癍湯見形奪命丹見形合而服之如倒靨者亦視其大便何如大便祕宜利之三黃丸四順清涼飲俱發熱泄利者宜補之輕則十全大補湯甚則陳氏木香散瀉並外用敗草散收靨主之龐安常鬱金散癍痘始有白泡忽搐入腹漸作紫黑色無膿日夜叫煩亂者鬱金一枚甘草一分水半碗煮乾去甘草切片焙乾為細末入腦子半錢同研一錢匕用生豬血五七滴新汲水調下不過二服甚者毒氣從手足心出如癰狀乃瘥此是五死一生候也四聖散黑陷倒靨不起發不紅活小便不利紫草黃耆甘草木通上水煎服熱甚色紫倍加紫草芩連紅花大便祕加枳殼如常加糯米參耆內托散見癢塌無價散用人貓豬犬糞臘月內燒為灰沙糖水調服南金散治痘已出而復攧其勢甚危諸藥不效者萬無一失紫背荷葉霜後搭水紫背者白殭蠶洗去絲炒乾上為末等分每服看大小大者一錢小者五分研芫荽汁和酒下米飲亦可治此證多有用龍腦人牙者卒難措辦惟此無毒而效且速但紫背者甚難得可於鹽鋪內尋之橄欖飲治倒靨橄欖從中截斷水服少許服之立發白花蛇散治痘疹黑陷倒靨白花蛇連骨一兩火炙乾勿焦丁香二十個共為末每服五分或二分熱酒送下如黑陷者移時轉紅甚效羅浮方治塌陷痘歌曰烏蛇全蠍與殭蠶帶肉穿山甲與纏四樣淨該均一兩綿耆官桂倍加焉白酒煮濃隨意服見多陷痘得回全愚每用此全活甚衆但殭蠶須要去絲清水洗去石灰再曬乾烏蛇須用尾極好穿山甲先酒洗焙乾用袁氏治倒靨歌曰倒靨原為痘後難只因氣血兩相殘參耆歸地並蟬蛻連綿進服靨自還又曰倒靨血不止名為回陽泉若犯胸脅地十來九不全速覓胭脂胚血竭加一錢燒之俱存性點上血收干豫見痘後倒靨人多妄用浴法枉殺人男女若痘後結痂厚壘不能脫起或半脫而半在或四圍脫而中心錐痛者準用後方生蜜蘇合油二味調勻用銀簪敷於靨盤沿處其痛即止而靨自速脫並無嗆血刨肉之患如無蘇合油只以線雞油代之甚妙黑陷萬水火者陰陽之跡也坎離者水火之位也心腎者坎離之配也故水陰也而生於陽離中之陰乃真水也火陽也而生於陰坎中之陽乃真火也陰根於陽陽根於陰互為其根所以能變合而生萬物也孔子贊易以坎為血卦為赤離為鱉為蟹為螺為蚌為龜其義可見以人身言之血陰也氣陽也心配離而生血陽中有陰乃真陰也腎配坎而生氣陰中有陽乃真陽也故心中之血即腎中之真水也灌溉滋濡水之德也腎中之氣即心中之真火也詬噓鼓動火之象也然水善而火惡老子曰上善若水下愚如火善惡之分也況人之兩腎左為水右為火經曰七節之旁中有小心小心者命門相火也以其為君之相故云小心行君之令故云命門也夫以一水立乎二火之間其不勝也明矣運之於中而使火不赫曦水不涸流者有神以主之也所謂神者何物也太虛之中神之棲也然水火不並立各有所勝盛衰之變此其常也故盛則薄所不勝而乘所勝也命曰氣淫衰則所勝妄行而所生受病所不勝薄之也命曰氣迫瘡疹之火起於命門之下二火相合所謂得助者強也相火復挾君火之勢肆其猖獗銷爍燔炳無所不至可恃者心中之真水尚有以制之奈何陽道常饒陰道常乏赫曦者其氣淫涸流者其氣迫並真水亦亡而已矣經曰成敗倚伏生乎動動而不已則變作焉真水既亡津液暴絶其氣滯其發燥槁不能潤乎皮毛滋乎腠理而瘡中之血亦干而黑矣是則變黑者血色本赤而干則變黑也謂之歸腎者血本腎中之陰血乾則腎水亦干矣此腎虛之證豈有腎實為邪之理乎邵子觀物篇曰東赤南白西黃北黑此正色也驗之於曉午暮夜之時可見之矣由是推之嬰兒始生而赤長稍變而白病則黃老死而黑物生地下而赤稍長而白萎落則黃枯槁而黑凡物皆資一陽之氣以生此四色者乃一陽之氣色遞變者也夫痘瘡由出現而起發起發而成漿成漿而結痂亦人身中一陽之氣之流行也其出現而赤起發稍變而白成漿則黃結痂則黑此亦色之遞變自然者乃證之順未可全以變黑為不正之色也夫以變黑為逆者以四時言之春主生夏主長秋主收冬主藏此自然之序遞相成功者也痘瘡之出猶春之生也起發猶夏之長也成漿猶秋之收也結痂猶冬之藏也亦自然之序苟出現而黑色是春行冬令矣起發而黑色是夏行冬令矣成漿而黑色是秋行冬令矣不循遞變之次故謂之逆黑者腎之色也為起蟄封藏之本故以變黑為歸腎也又肺主皮毛心主血脈脾主肌肉肝主筋腎主骨髓瘡疹之毒由內而外為順內者不出曰伏已出復入曰陷不能成漿謂之倒陷不能結痂謂之倒靨曰伏曰陷曰倒皆由外而內入於骨髓故曰歸腎為逆也按錢仲陽為萬世幼醫之祖而獨以變黑歸腎為腎實之證其失不小萬氏闢之最為詳明故備引之蓋耳骫者腎之部也諸痛瘡瘍皆屬於火腎本屬水水不畏火故瘡疹之初腎獨無證凡五臟之部之色之證見者皆為惡候故曰善則不可見惡則可見也倘若小兒腎水本虧則火毒愈盛水不足以制之而火反侮其所不勝及其既久火熬水熱於是腎之所部始病而惡證見焉錢氏以百祥丸下之者大有至理蓋大戟者瀉小腸之藥也心與小腸為表裡不直瀉其心而瀉其合使心火下降而腎水上升得陰陽交媾之道有起骨加肉之功然不救者尚十有九水火豈易抽添哉蓋非百祥丸則無治也毒氣去而真氣不絶者猶活前人謂百祥丸瀉膀胱之水令脾土復旺是不讀本草而且大夫仲陽之旨也又導赤散亦仲陽所制亦瀉小腸但與百祥丸之功效有寬猛耳四聖散用木通亦妙世以大戟為猛而易以其他淡滲之藥反瀉膀胱與腎者是不刃而殺之矣萬氏以百祥丸下腎中毒氣是猶以為腎實而瀉其子也毫釐之差千里之謬不可以不辨瘡痘黑陷分四證詳見起發證治陷伏條薛云喜熱飲食手足並冷者乃脾胃虧損陽氣虛寒之證宜用辛熱之劑補之喜冷飲食手足並熱乃陽氣實熱之證宜用苦寒之劑瀉之外感風寒者溫散之毒入腹者分利之陽氣虛者溫補之外寒觸犯者熏解之陳宿州先生用十二味異功散以預保脾土於未敗之先實發前人之未發開萬世之聾瞶也聞人人牙散治痘瘡方出風寒外襲或變黑或青紫宜溫肌發散使熱氣復行而癍自出用人齒脫落者不拘多少瓦罐固濟煅過出火毒研末出不快而黑陷者豶豬血調下一錢因服涼藥血澀倒陷者入麝香溫酒服之初虞世名回生散用人牙灰入麝香少許每服半錢黃耆白芍藥煎湯調下錢氏方中用溫酒調下云岐方中用升麻紫草煎湯調下海藏云若平昔油膩腸垢者通膈丸下之硃砂為衣與宣風散相表裡一方用雞冠血調成膏好酒半盞人乳半盞入蔥白一莖煎湯送下彭氏云只用紫草湯自好瘡痘最怕麝香與酒氣觸禁不可用凡服牙齒不可過多每服止三分多則陽氣盡出於表恐痘斑爛無血色陰氣內盛必裡寒而濡泄急以四君子加芎歸服之湯治痘瘡黑陷藥不能發者有驗用穿山甲一味燒存性為細末入麝香當門子少許一歲五分三歲一錢溫酒調下一服取效雖半身黑陷欲絶者亦能暫蘇而發紅色但有目閉無魂者不復生矣寇麻黃湯用麻黃剪去根節五錢用蜜一匙同炒良久以水半升煎候沸去上沫再煎去三分之一不用渣病瘡疱倒靨黑者乘熱盡服之避風俟其瘡復出一法用無灰酒煎更速但小兒不能飲酒者難服以此藥入表也世傳此法纍用有效萬凡痘子黑陷古方用穿山甲者取其穿腸透膜而善走也用人牙者取牙齒乃骨之餘腎主骨可以入腎也此二物者但借為嚮導引解毒之劑以施治則可若軍用之何濟於事哉有用燒人屎者蓋屎大解疫毒痘乃時疫所發故宜用之若加入發表和中解毒湯內尤良上方皆通表發肌之藥首一證感風寒肌竅閉塞血凝不行而黑陷者宜之活人瘡黑倒陷豬尾湯無比散龍腦膏子無不驗海藏云若用草藥下之似勝腦麝必不得已而後用之可也豬尾膏治瘡倒靨用小豬尾尖刺血兩點入生腦子少許同研新汲水調下食後立效龍腦膏子治時疫發痘瘡及出瘡子未透心煩狂躁氣喘妄語或見鬼神或已發而陷伏皆宜速治不治其毒入臟決死用生龍腦一錢研細滴豬心血和丸如豆子大每服一丸心煩狂躁者用紫草湯化下若瘡子陷伏者用溫酒化下少時心神便定得睡瘡疹發透依常將息取安海藏云此一法證極而用故活人云不得已也四糞散治癍瘡倒靨黑陷出御院藥方歌曰人貓豬犬臘辰燒每服三錢蜜水調選甚倒靨並黑陷萬兩黃金也合消臘月辰日合此藥甚驗子和人中黃臘月者最佳通風處以火煅成煤水調下三五錢陷者自出丹溪云子和黑陷甚者用燒人屎即此方也世治疹痘不透乾黑危困用山楂肉一味為末每服二錢紫草酒送下量兒大小加減徐徐進三四服即紅活海劉守真涼膈散治小兒癍疹黑陷亦妙然止能治大便結硬小便赤澀為當若大便小便已通不宜用此惟以易老去大黃硝者最為穩當錢凡痘疹重者猶十活四五黑者無問何如十難救一其候或寒戰咬牙或身黃腫紫宜急以百祥丸下之復惡寒不已身冷出汗耳尻反熱者死何以然腎氣大旺脾虛不能治故也下後身熱氣溫欲飲水者可治以脾氣生勝腎寒去而溫熱也治之宜解毒不可妄下妄下則內虛多歸於腎若能食而痂頭焦起或未焦而喘實者可下之宜四順飲瘡赤陷而耳尻反熱者為逆用百祥丸牛李膏各三服不愈者死百祥丸一名南陽丸治瘡疹黑陷寒戰咬牙戛齒身黃紫腫紅牙大戟不以多少陰乾漿水煮軟去骨日中曝乾復納汁煮汁盡焙乾為末上水丸如黍米大每服一二十丸研芝麻湯下吐利同無時此方治戛齒甚妙牛李膏用牛李子不以多少取汁石器內熬成膏牛李子生野道邊至秋結實黑子成穗如無生者以乾者為末水熬代用每服皂子大煎杏膠湯化下此藥須於九月中取之睦親宅一大王病瘡疹始用一李醫又召錢氏錢留與抱龍丸三服李以藥下之其疹稠密錢氏見大驚曰若非轉下則為逆病王曰李已用藥下之錢曰瘡疹始出未有他證不可下也但當用平和藥頻與乳食不受風冷可也瘡痂若起能食者大黃丸瀉一二行即止令先下之瘡疹未能出盡而稠密甚則難治此誤也縱得安其病有三一者疥二者癰三者目赤李氏不能治經三日黑陷後復召錢曰幸不發寒病未困也遂用百祥丸為主牛李膏為助各二大服至五日間瘡復紅活七日而愈蓋黑者歸腎水也腎旺勝脾土不剋水故脾虛寒戰則難治所用百祥丸者以瀉膀胱之腑腑若不實臟自不盛也何以不瀉腎由腎主虛不受瀉如二服不效即加寒而死矣子和治瘡疹黑陷鐵腳葳靈仙為末炒一錢腦子一分用溫水調服取下瘡痂為效活人無比散治小兒瘡疹惡候硃砂先研一兩牛黃麝香樟腦膩粉細研各一錢上同研細如有患者小兒一字大人五分入水銀少許用小豬尾上血三兩點新水同調服寧穩得睡者然後取轉下如爛魚腸葡萄穗之類涎臭惡物便安小兒用乳汁調妙海藏云此瀉內熱之極不能開發於外則宜此內雖過泄外亦開發即透肌膚之藥與至寶丹同小兒癍疹黑陷方干胭脂三錢胡桃一個燒存性上為細末煎胡荽酒調下藥一錢立效上治死血黑陷凡前方用穿山甲及麝香等藥治黑陷皆為氣滯者設也上方皆里藥第二證所謂毒氣太盛內外蒸爍毒復入里必心煩狂躁氣喘妄言如見鬼神大小便祕渴而腹脹者所宜選而用之者也閻紫草散治瘡痘黑陷曾服此方愈亢錢皆云有枳殼難服紫草甘草糯米亢云此味極好助胃氣黃耆各等分上水煎服丹痘瘡黑陷二種因氣虛而毒氣不能盡出者用黃耆人參酒炒紫草治之顏色正者如上治法參耆之補佐以紫草之通利也魏變黑歸腎乃氣弱不能蓄血血亦不榮故致枯萎而黑只用保元湯加芎桂補提其氣氣旺則黑者轉而為黃矣上補虛例第三證所謂內虛而不能使陽氣以副云云者之所宜也吳氏云痘色初深紅者必變紫紫必變黑紫黑必至於乾枯此血熱漸變理勢之一定不移者也故初見深紅失於解散至於乾枯黑陷危殆極矣治法當以涼血退熱為主看其微甚或利大便或利小便或用解散之劑頂雖平陷不可專以氣虛例之而惟用參耆補劑補則氣愈盛而血愈乾涸矣翁氏治血熱證七八日間有紫黑乾枯及青灰乾黑陷者有奪命大造談笑博金一字金或百祥牛李豬尾等方然早能涼血解毒必無此患患此而後用此藥得全者少矣若服涼解之藥過多以致泄瀉滑脫而成黑陷者仍從陳氏法以木香異功治之又不得以血熱為拘也奪命五毒丹治痘黑陷倒靨乾枯不起者神驗月魄蟾酥少許吐月華牛黃二分銀紅硃砂一錢男王雄黃三分梅精冰片二分上五味用豶豬尾血為丸如麻子大薄荷湯下一丸移時活動談笑博金丹治同上取用寅亥戌未四時四靈丹加臍香下俱用天靈蓋大造保童丸治同上兼治痘毒亦妙一蠻子人胎骨炙過二狼子狗胎骨酥炙三貓子貓胎骨炙過上加臍香下一字金丹治同上紫花地丁金線重樓山慈菰至寶丹治同上戌腹糧即將大米淨室與犬食飽取其糞洗淨炙乾研細每一兩麝香一二分一粒金丹治同上虛證雖死者可立活膃肭臍二鴉片三冰片二麝香一原蠶蛾二以上六方治危急痘證有起死回生之妙獨神散即前穿山甲方天真膏治黑陷乾枯紅紫及斑不退用此救之十全四五初生小兒解下黑糞用瓷罐收貯加水銀二兩麝香一錢黃蠟封口埋於土中愈久愈妙久則化而為水每遇前證看兒大小熱毒盛者量與二三茶匙酒煎紫草湯對半和勻服之立時紅潤活澤真祕方也勝天靈蓋枯臭無益之物萬萬矣緣此糞原系母之真血所化蓋以血補血且入土日久又得陰氣多故能解毒百日內小兒熱而煩躁啼哭不止用少許點入眼角二三次便能神安氣和而睡蓋又能清心熱也大成散治痘出不快或頂陷或灰白黑陷一切不起發之證俱可用之穿山甲酒炒一兩甘草末二錢雄黃硃砂各一錢半紫草三錢麝香二分上每五歲兒用二分冷證熱酒調下熱證紫草湯下寒者加入治中散內用熱證加入小無比散內無價散治黑陷欲死者用無病小兒糞臘月將傾銀罐二個上下合定鹽泥固濟火煆通紅取出為末蜜水調服一錢一方加麝香冰片少許灰白丹爐灰白色靜者怯者作寒看躁者勇者焮發者作熱看凡痘疹白色將靨如豆殼者蓋因初起時飲水多其靨不齊俗呼倒靨不妨但服實表之劑如毒氣鬱里消息他大小便如大便閉通大便小便閉通小便無妨薛前證不起發不紅活者此因脾肺氣虛用參耆四聖散起發頂陷灰白瀉渴者脾肺虛寒用木香散異功散出不快張痘初出時色白者氣血虛也便宜大補氣血參朮耆芎升麻乾薑甘草木香丁香酒洗當歸白芍藥若大便瀉加訶子肉果丹溪治吳店小兒周歲痘瘡色白甚癢藥中每加參耆半兩白朮七分丁香兩個當歸一錢官桂三分水煎服上治虛寒例婁豫族侄女笄年出痘灰白色身熱喘嗽渴脈洪有力與八物湯加連翹桔梗犀角屑半夏木通紫草乾葛石膏杏枳連芩前胡栝蔞仁服之十帖後色紅活喘嗽緩減漸微但熱未除遂於前方減耆杏胡枳連芩蔞七味服三十餘帖而安安後發皆落月餘方起床虛之極也又一男子二十餘歲出痘已破未破者灰白色又雜間以黑陷倒靨者發熱寒戰身痛脈洪或時弦亦與八物加木通紅花紫草陳皮連翹服十餘帖而安上治虛熱例凡血氣不足灰白頂陷不起者宜內托散即十宣散見起發加紫草並乳汁調補痘色灰白漿不滿足欲成倒塌皮薄易破者保元湯大法加芎歸芍藥升麻人乳好酒進之上補虛例有一等白痘似粉醫人所不識有盤有頂而軟肥者以加減大紫草散主之加減大紫草散治白痘似粉人所不識者紫草人參茯苓黃耆白朮芍藥川芎當歸甘草糯米上各等分為粗散每服四五錢水煎服一方有木通無黃耆名紫草快癍散又一方去甘草加木通防風名參耆四聖散治表裡俱虛補元湯治痘頂充滿而根盤不聚色不紅活乃氣有餘而血不足也川芎當歸白芍藥酒炒熟地黃各一錢紫草紅花各酒洗七分陳皮甘草各三分白朮土炒一錢半酒水各半盞糯米五十粒棗二枚煎服活血散治痘色淡白當歸赤芍藥酒炒紫草川芎紅花各五錢血竭一錢木香二錢上為末每五歲者服一錢十歲以上者服二錢好酒調下熱極血焦不紅活者酒煎紫草湯調下保生散治氣血俱虛灰白色不灌膿回漿者紫河車一具焙為末龜板酥炙五錢一方有鹿茸五錢上為末每服五七分或一錢氣虛者保元湯下血虛芎歸紫草煎湯下混元散治同上紫河車一具分作五七塊用白糯米三合水淘淨入無油銚內同炒以米黃色為度同為末每用五七分兒大者一錢極補氣血能助灌漿如神緣糯米性溫得紫河車之氣純化為河車故其補功最速譬之造酒米從曲化意也內助丹黃耆酒炒人參酒炒白朮茯苓當歸陳皮半夏厚朴肉桂山楂姜三片棗一枚糯米五十粒水煎服如不食加人乳一杯癢甚加大附子寒戰不止加附子防風渴加麥門冬瀉加澤瀉豬苓不止加訶子肉果助陽丹癢塌不起根窠不紅黃耆人參白芍藥各酒炒一錢甘草三分川芎當歸各一錢紅花五分陳皮八分官桂二分薑棗水煎服回生起死丹治痘灰白寒氣逆上不食腹脹嘔吐肚痛泄瀉清水手足俱冷丁香九枚乾薑一錢水煎熱服被蓋片時令脾胃溫暖陰退陽回痘自紅活夾疹狀如錦紋其中有空缺處如雲頭樣者為癍遍身無空處疏密不等者為疹萬疹一名麻子君火所為也或曰脾為疹經曰少陰所至為瘍疹在人則心火主之夫心火亢甚則制已所勝焚灼肺金肺主皮毛故疹毒見於皮膚之間如蚊蚤所咬之狀痘瘡只出一般者善若與疹毒並出謂之夾疹其候極惡惟痘本稀疏而夾疹者庶乎可治瘡本稠密與疹並出彼此相混瑣碎莫辨急用辛涼之藥發而解之如疹毒漸消瘡本磊落者亦可治也疹痘相併毒不少減此危惡之疾孰能料其生乎瘡出夾疹者荊防敗毒散主之疹毒消者可治如瘡收靨後復出疹者此餘毒解散之兆不須治之薛夫疹乃風邪外患痘為胎毒內發二證並作臟腑俱病也二者相雜赤暈發焮痘瘡愈盛誤謂痘出太密多不可救然此乃夾疹痘也當治以人參羌活散疹毒即解痘勢亦退其元氣虧損不能結痂當補脾胃為急也翁痘內夾出丹疹者不必治之當以托痘為主痘出而疹自消矣荊防敗毒散柴胡甘草人參桔梗川芎茯苓枳殼前胡羌活獨活荊芥穗防風各等分上銼細加薄荷五葉水一盞煎七分去滓溫服人參羌活散治時氣痘疹兼於發表人參羌活獨活柴胡前胡桔梗茯苓枳殼川芎天麻甘草地骨皮各三分上入薄荷五葉姜水煎服上表證多者宜之清和飲地骨皮鮮者麥門冬去心各二錢生地黃知母貝母橘紅茯苓甘草荊芥穗各七分牛蒡子炒研一錢半桔梗五分全栝蔞一錢上里證多者宜之虛者加人參黃耆夾癍萬活人書云傷寒下之太早熱氣乘虛入胃發癍下之太遲熱留胃中發癍胃爛亦發癍癍者乃熱毒郁遏煎熬陰血血得熱而不解浮於肌肉為癍足陽明胃主之痘瘡初出皮肉紅腫片片如錦紋者此夾癍也以辛涼之藥解之其癍漸退瘡本堅實者吉否則皮膚癍爛瘡易瘙癢所謂皮嫩易破者是也如赤癍成塊其肉浮腫結硬者又名丹瘤其毒最酷瘡未成就此先潰爛工不能治夾癍痘亦用荊防敗毒散主之癍退可治張痘出而夾癍者痘毒隨臟而出其毒發之勢最為迅疾或血太過而氣不及則衛氣疏缺不能密護脈絡而致太過之血夾毒上浮亦乘毒出之勢而發為癰也較前夾疹者稍為易治如痘起齊其內必虛癍多從內解如不解以升麻湯加歸芍主之又有或結痂後而發者餘毒熱盛煎熬肉分其癍必爛以消毒散出不快加歸芍防風盛則用連翹湯痘大小便祕爛處以生肌散潰爛敷之若夾毒初出色赤如火乃毒滯不能宣發之故以四順飲發熱利之如大便利一二次而癍或退則血附氣位急用四君子湯不能食加耆薑棗與服以防其損陷如不止加肉豆蔻必止翁用玄參升麻湯咽喉黃芩荊芥白芍歸芎在初多用表散在後多用解利紅癍易退紫癍稍難藍癍不可治矣婁用白虎湯袁痘中夾癍陽明受梟炎之毒盛而然丁桂之藥纖毫莫可投也張半仙用黃連解毒湯以治夾癍之痘則失之太寒錢氏用檳榔大黃以療痘中之癍則失之太峻總不如犀角地黃湯以徹內陽明之郁毒五龍化癍湯以消外蚊咬之血紋內外夾攻表裡調和斯能復全矣愚治痘里夾癍者極多但見形就是癍不見痘樣者熱毒峻烈克全者十止三四兩日而癍見者速清逐為尚患此者必煩躁譫語渴飲不寧劉禪師用地龍汁和犀角水投服亦心得治癍之法者矣山梔子湯治痘瘡及癍毒狀如蚊蚤所齧毒盛黑色者山梔子仁白蘚皮赤芍藥升麻各一兩寒水石甘草各五錢上為細末每服一錢水八分紫草薄荷各少許同煎至五分去滓放溫服袁氏方紫草紅花犀角木通芍藥生地黃茯苓甘草蟬蛻燈草金銀煎服外加荊芥紫蘇木通荔枝殼鳳凰脫升麻楊枝濃煎湯浴之陽毒升麻湯面赤狂言煩躁腰背疼下利脈浮喉痛升麻五錢犀角射干黃芩人參甘草各二錢半上水煎服陰毒升麻湯治陰癍升麻當歸川椒鱉甲雄黃甘草上水煎服夾癭袁夾癭為痰毒凝結而成也或結於項頸或結於耳後或結於腋下大者如桃小者似李長者似瓜短者似棗身烙煩渴勢若不凶痘三四日而癭作則毒隨痘泄膿隨痘灌自可挽全而無害倘癭紅腫將膿而痘隨標焉吾恐毒膿一潰元氣囂漓痘焉能表暴充灌乎七八之期痘已黃蠟而癭作焉保護元氣消毒祛邪竟獲綏全之慶雖潰無妨治法在乎審日期之先後視元氣之厚薄紀男女之大小範時令之寒暑庶幾免紊錯之愆矣癭已紅腫而痘標焉法宜托裡毒盛消其毒元虛補其元木通桔梗解毒而徹關鎖惡實生地除梟而祛榮炎甘草清理諸邪蟬蛻祛風闢毒芍藥泄諸經之鬱火荊芥散陽明之風邪諸藥缺一不可也痘起遂發癭治以補托為芩連之藥不可用耗爍之劑不宜投消痰解毒為尚痘標而癭破流膿出血自致元氣虛虧大用黃耆衛元湯可也人參黃耆川歸紅花桔梗芍藥甘草防風煎服痘兩三日而癭毒仍作急用三消散半夏川歸茯苓甘草木通紅花生地芍藥牛蒡子天花粉蟬蛻燈草煎服痘七八日充灌而癭作宜服沖和飲子人參黃耆麥門柴胡防風荊芥芍藥茯苓炒白朮桔梗連翹當歸栝蔞根頻進四服自愈矣歌曰木通生地並黃耆桔梗當歸芍藥俱大力蟬蛻兼甘草白茯殭蠶效實奇上焦加味升麻引貝母門冬不可遺下焦牛膝相資助緊覓山姑倍用之熱多荊芥隨多少疼極還尋白芷醫愚按方治證須驗時日若頭面盡腫而癭腫則諸痘決不能鼎峻多致損傷夾丹袁痘里發丹內熱之極而然也不宜遽用極寒透里之劑若標兩三日竟以化癍湯徐徐浴之內服生地牛蒡子芍藥甘草木通荊芥穗其毒自消矣若用豬膽京墨冰片塗之竟罹其害慎之頭面項頸倘如蛇纏硬腫火燒疼痛梟毒輳於上宜用炒黃連紫草車前子梔子等藥余治痘丹准前藥加減單用露桃花二錢即丹收痘朗若腫疼須加柴胡羌活生地芍藥倍之有用鳳尾草獨煎湯飲豈知山蕨即鳳尾草名也性極寒而沉走恐傷於痘不可輕用夾瘡瘍袁痘里夾瘡痘迎瘡見隙而盤據愈加多密矣痘起氣虛風癢自作宜用紫蘇荊芥湯浴之隨用芍藥生地防風黃耆白朮殭蠶甘草蟬蛻等藥服之可也若男女種患楊梅惡瘡痛不可忍而痘適標其間李少陽用蝸牛丹以治但香油皂子仁不可輕用若患肥疳瘡如松香輕粉飛丹雄黃皆不可塗也歌曰黃耆芍藥直殭蠶生地防風白朮聯甘草紅花牛蒡子酒煎來服效難言若是楊梅瘡破爛牛黃土茯倍加焉痛極乳香些少助自然瘡可痘安痊余歷驗小兒痘種於瘡瘍中痘雖美麗勢必梟癢若不按法制湯以浴痘蹲聚於瘡隙奚克鼎峻尹頭陀專以香馬蘭藤煎湯浴夾瘡瘍之痘允得鎮痘之妙但香馬蘭有三種分別青紅白根浮上紅者甚佳採用則可治法升麻黃耆為君芍藥生地為臣羌活防風為佐甘草蟬蛻為使此准格也夾損傷袁痘標一兩日或致撲跌或犯金石所傷則脾脈虧損而血氣走散痘終受其阻厄李少陽用孩骨胡桃酒以治則失之峻利況胡桃又作瀉之物用之不宜王近川用歸尾桃仁湯以治則失之狂妄痘中豈宜破敗其血者耶准依劉半塘拱元散人參黃耆當歸紅花伏鳳雛蟬蛻防風芍藥甘草以補托其內用文蛤棕灰盫於傷處以收斂其外可也若損而不破者用蝦蟆皮貼之徐徐以手摩撫若是湯潑火烙者不宜敷以生冷之藥以凝滯其痘也歌曰損傷須覓伏鳳雛土鱉參耆蟬蛻馳橘紅甘草當歸合再入紅花防地俱昔黃舍人次子十三歲患痘兩朝上樓失足損傷頭額致血淋漓父母痛哭以為痘中損傷必不能生矣請豫視治即將前方倍下參耆歸地連進四服而痘遂鼎灌身帶不寧加茯神桂心外單用棕灰敷之不半月而自靨脫全美但痛甚者少加乳香若外傷重痕闊弗克收痂用白芨白蘞象皮末摻之自痊痘疔諸痘中有獨大者或黑或白其根結硬即是痘疔如疔瘡樣直抵筋骨宜挑破以四聖散點之凡黑陷中有微尖頂如苦楮樣者疔也無此狀者謂之黑陷非疔也萬痘疔者熱毒蓄積氣血腐壞而成也狀有數種乃疫毒之氣最為惡候宜謹察之有肌肉微腫狀如堆粟不分顆粒者此氣滯血凝毒氣鬱結也有初出紅點漸變黑色其硬如石者此肌肉已敗氣血中虛不能載毒而出反致陷伏也有中心黑陷四畔突起戴漿者此血隨毒走氣不為用也有中心戴漿四畔干陷焦黑者此氣附毒出血不為使也有頭戴白漿自破潰爛者此氣血不充皮膚敗壞也有為水泡溶溶易破者此火濕並行氣虛不能斂束也有為血泡色紫易破者此血熱妄行不能自附於氣也有瘡頭針孔漿水自出者此衛氣已敗其液外脫也此數證者於五六日間候之但見一證即不可治薛痘疔又謂之賊痘或三五枚或五七枚間雜於諸痘之間其色紫黯作痛不寧以致諸證蜂起不能灌膿甚至不救乃熱毒勢甚並結也用仙方活命飲瘡瘍如二便祕澀量加大黃遍身拘急加麻黃外必用線針挑破出黑血或吮出毒血以泄其毒余痘才得灌膿否則其毒無從而解必致不起如未應急用隔蒜灸若毒氣盛者或不知痛者不用蒜隔就著肉灼艾灸之若灸後瘡頭紅腫發焮用針挑破出毒血灼艾尤好雖此法未出方書豫屢用屢驗者世多用至寶丹之類亦不可恃別見起發證治宜參考凡痘瘡起發之時但見乾燥其根焦黑者即內服奪命丹見形外用四聖散塗之如原有瘡疹或灌瘡未愈或瘡將較瘢嫩者至痘出之時其處痘本攢聚形色黑潰急以針刺破之吮去毒血外以四聖散塗之內服加味四聖湯見形調無價散倒靨並奪命丹主之如瘡焦黑渾身皆是者看大便何如若大便祕者內服承氣湯便悶調無價散外用水楊湯浴法起發大便利者內服十全大補湯汗陳氏木香散瀉調無價散合奪命丹外用水楊湯浴法四聖散緑豆四十九粒豌豆四十九粒各燒存性珍珠一分油頭髮燒過一分上為細末胭脂水調先以簪子撥開黑瘡以此塗之二聖散治痘疔挑破以此點之雄黃二錢紫草三錢上研末用油胭脂調敷方痂後痘疔潰爛成坑內見筋骨以此敷之赤石脂膩粉黃柏杭粉炒血竭伏龍肝各一錢飛丹炒八分發灰五分乳香沒藥各三分冰片三釐蜜陀僧飛過二錢有臭氣加阿魏三四分上為細末綿紙篩過敷之外用膏藥貼內服人參敗毒散加穿山甲蟬蛻連翹拔毒膏治痘疔雄黃研上用胭脂重浸水令濃調雄黃點疔痘上立時紅活亦神法也蓋雄黃能拔毒胭脂能活血也飛龍奪命丹治痘疔痘毒痘癰或麻木嘔吐重者昏憒咬牙真蟾酥乾者酒化輕粉各一錢枯白礬寒水石銅緑乳香沒藥麝香各二錢硃砂六錢蝸牛四十二個另研如無亦可上各為末入蟾酥蝸牛或加酒少許糊丸緑豆大每服一丸溫酒或蔥湯送下重者外用隔蒜法灸甚者多灸或著肉灸捲簾疔袁痘六七朝舌望上卷喉鎖煩渴緊痛飲食難進不知者妄用刀割舌下青筋倏時致死豈知疔毒結坐於舌根疔甚者如黑豆次者似葡萄犯此證候要把銀鉤鉤破患處盡淨惡血隨以苦茶漱口盡吐其毒血而以後方投之歌口晡仙妙制龍宮丹冰片硼砂青黛間薄荷荊芥殭蠶炒還覓黃連法制難按合研勻為細末慢吹喉內捲簾翻按此疔人多不曉夭殺兒童若患此者痘定經於心急宜清解若補助之藥不宜服也有方用蛤蜊汁和玉露滴者亦可燕窩疔痘形五六日而腋下硬腫兩手坦垂不能活動轉舒煩躁譫語眼碧臉赤惡渴吐沫不知者以為結癰而然豈知痘毒結坐於腋下名曰燕窩疔急用銀針挑去其根盡除惡血隨將燕窩打水澄清者洗淨而以珍珠末和油胭脂塗其患處內服消毒飲歌曰燕窩疔欲燕窩除挑破須將澄去泥洗淨盡除其毒血油胭脂和米珍珠塗沫其中時刻候管教毒盡痘離離又曰消毒飲是鼠黏先甘草通茯生地全紅花犀芍連翹合燈草濃煎毒盡捐余歷詳察此痘左腋潛注則右體之痘沉伏而失色右腋潛注則左體之痘叛逆而無元是准格也若曰疔左而左痘壞則誤矣有方以蜒蝣和核桃肉吞者雖暫獲效終之無濟火珠疔痘值六七日而鼻竅中闐塞噴火氣息甚難惡渴煩躁面赤眼紅痰緊飲食不餐熱烙名曰火珠疔外要鉤破隨將藥點入眼角再服瀉金湯則愈矣歌曰鼻中闐塞火珠疔速要鉤穿眼上行黃連膏和梅花片點滴其中左右經再服瀉金湯二劑自然毒盡得安寧瀉金湯歌曰烏犀桔梗鼠黏行芍藥甘稍伏火青生地紅花通紫草合煎服後自消疔按此痘疔患於小兒們人昧以為息肉闐塞不知挑剔屢致枉死慣治者允宜詳驗眼翻氣急手足亂撒候則是矣或以田螺水滴入者未善忘汲疔痘值六七之期兩眼沿倏然結座疔毒封蛤腫脹熱極而面色紫煩渴則以治鼻疔法治之挑破處速以瓦蔥搗爛盫之蓋此處不可以鉤穿者也歌曰眼沿生疔眼必瞎自有仙家神治法瓦蔥細搗盫封牢莫待風梟再作惡昔穆修治此疔專用山慈菰和蜣螂肉搗爛盫上取疔根亦捷法也豢虎疔痘期里正要會膿結蠟而耳孔內結成疔毒蓋腎地宜無痘毒而疔獨輳結於此者則梟炎熾而癸元已耗矣急宜錐破隨用鵝管石女真子薄荷共研為極細末吹於患處再用馬蘭根洗淨寸斷塞耳歌曰豢虎由來兩耳中少陽臨證制吹筒鵝管石和女真子薄荷三味並相攻再把馬蘭根洗淨隨將寸斷塞其中不須時刻相回挽自然疔里見奇功按此方鵝管石宜改玄精石以玄精而寫鵝管此亦傳易隱射之失也內還有冰片女真子亦是女真抄曰子者亦傳訛也注命疔痘期里兩足掌心痘毒輳結成疔硬腫惡痛或如錢樣或如大黑豆或如胡椒粒紫筋直注透足股盤處其毒甚矣速鋤取其根盡淨其血隨用田螺水調和冰片點三次把慎火草緑豆浸脹搗爛盫於患處內服化毒丹歌曰痘里如生注命疔花欄決定不為輕銀針挑盡其中毒尋個田螺吐水清調和冰片胭脂點再覓龍鱗草要真即慎火草又名火丹草脫皮緑豆浸漬脹共搗將來盫一層內把化毒丹來服不怕疔生足掌心俗人多以足下疔不加意豈知疔雖生於下而綰刺於上竟犯脾心二經時刻不可捱故曰注命驪含疔痘值五六朝身發惡熱躁譫語兩眼翻厥肚腹膨脹小便閉塞惡痛叫號不寧蓋因梟毒澄聚於膀胱而於陽莖竅里輳結鴆疔名驪含疔語云痘疔結此時刻要死急用銀硃冰片蟾酥牛黃麝香研勻極細末將黃連細茶濃煎候冷取半匙調藥把細軟稻心蘸藥通納其竅中再用油菜子鎈捋其莖內服木通敗毒散歌曰驪含生疔疔如刀十個疔來九不饒胡僧仙授攻醫法繼後驪含命始逃牛黃冰片蟾酥麝和合銀硃一樣𢲵茶連數沸煎濃冷稻草心將蘸藥膏依方按法相為用何畏疔錐日夜號昔云間一僧用細銀絲通竅內隨以清水漱口淨翕之以盡其毒血外用珍珠片腦調服亦驗透腸疔痘六七朝之內腹中飽悶絞痛難忍大便閉結煩渴遂於糞門旁闔輳坐疔毒腫硬紫錐名曰透腸疔毒徹於陽明故耳速針錐其毒大用金銀花防風煎湯候冷洗淨隨將輕粉珍珠片腦白蘞末燈心蘸塗於上內服黃連解毒湯歌曰透腸疔毒命隨傾治得全時漏必成此方奇效人誰得惟是晡仙用自珍片腦珍珠與輕粉分兩般般無重輕要將白蘞先為末澄過干時後並行毒收還黃時乾結潰爛來時極可憎此疔有剔後用苧根搗爛盦者有用桑杪搗爛和麝敷者俱有明效總不如野緑豆末和紅花末乾摻甚美痘癩萬痘癩者熱毒拂鬱氣血虛弱肌肉敗壞經云熱勝則肉腐者是也正理論曰脈浮而大浮為風虛大為氣強風氣相摶必成癮疹身體為癢癢者名為泄風久久為大癩凡氣血充實者外無虛風內無強邪必無是病惟氣血素虛者不能榮衛於身易感天地肅殺之氣皮肉之內虛風居之兼以痘疹穢毒疫癘惡氣擊搏燔灼流散四布隨空而出所以瘡本稠密身無完膚瘙癢難任肌肉潰爛而痘癩成矣急用大補氣血清熱解毒之法庶可求全若待敗面墮鼻唇崩目盲肢體殘傷不至殞命亦為廢人矣凡瘡破成癩者用十全大補湯汗苦參丸合而服之外用滅瘢救苦散收靨塗之苦參丸苦參一兩白蒺藜胡麻牛蒡子各半兩甘草二錢半共為末酒調面為丸竹葉湯下壅腫經曰熱勝則腫大抵毒之盛者必腫毒微者不腫凡瘡出盡應期起發頭面以漸浮腫者此毒火發越聚於三陽之分欲作膿血故宜皮肉焮腫也設當起發之時頭面不腫者必瘡本磊落毒氣輕淺雖爾作膿根不占處所以不腫不須治之如瘡本模糊起發不腫者此毒伏於內不即發泄不可以毒輕論也如起發腫大皮肉如常瘡尖而圓粒粒分明者此佳兆也若皮色鮮紅瘡本成串黏聚平塌者若瘡色灰白成餅如錫面者若瘡焦紫無水者皆凶兆也有先起發頭面預腫者此兼疫毒之氣名大頭瘟者是也腮頷預腫者此名蝦蟆瘟也須兼疫氣而治多凶少吉大凡瘡腫者直至干漿結痂之時毒化而腫消矣故應腫不腫應消不消者謹提防之凡瘡腫脹面浮目閉者急與解毒護目救咽喉相兼治之內用消毒化斑湯起發外用神應膏見形護目凡瘡腫脹切防瘙癢正面之中不可少有破損者苟生癢破沙崩之勢漸不可為邪氣內陷真氣外泄腫消而死矣但得破者復灌消者復腫飲食如常大小便自調者變凶為吉用十全大補湯汗苦參丸痘癩合而治之如瘡色灰白面腫如錫餅者但看其人臟腑何如若能食大便調小便長無他苦者多吉若不能食吐利並作或生瘙癢者多凶如頭面預腫或腮頰預腫者此時行疫毒也並用羌活救苦湯主之羌活救苦湯見起發潰爛收靨門參看萬痘瘡所貴者堅實不破圓淨成痂也其有潰爛者火勝也經曰熱勝則肉腐火之為用猛虐峻暴近之則燥癢不寧迫之則焦痛難忍灼之則糜爛成瘡故敗物者莫如火也火生於空非虛不燃乘之以風其焰益烈痘瘡潰爛由肌肉素虛邪風侵襲風者善行數變行諸脈俞散於榮衛之間一旦毒發於里風應於表風火相扇肌肉憤瞋皮膚決裂而瘡壞矣如膿成而潰則毒已化但黏衣漬席不能幹較古方以敗草散主之誠良法也膿漿未成其毒未化癢破潰爛者則衛氣暴泄津液不榮譬諸草木剝削其皮枯萎而死矣經曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶此之謂也薛聞人氏云痘癍爛之證因當發散而不發散則毒氣閉塞以致喘促悶亂不當發散而誤發散則毒隨陽氣暴出於外遍身皮膚潰爛治宜調脾胃進飲食大便調和榮衛健旺毒氣自解而無目赤咽痛口瘡吐衄等證竊謂前證若發表過甚大便自利急用理中丸豆蔻丸俱痘瀉利以救其里亦有痘疹如蚊所齧而色黑乃危證也若大小便祕結煩躁用山梔子湯痘夾癍豶豬尾血調腦子治之自利不食者不可用蓋毒發於表而妄汗之則腠理開泄榮衛益虛轉增瘡爛由是風邪乘虛變證者有之若毒根於裡而妄下之則內氣愈虛毒不能出而反入焉由是土不勝水變黑歸腎身體振寒兩耳尻冷眼合肚脹其瘡黑陷十無一生治者審之瘡出太盛膿汁淋漓不可著席疼痛者干黃土羅末敷之甚者白龍散癢塌帛裹撲之或敗草散收靨貼之丹溪云瘡濕者用瀉濕乃肌表間濕宜用風藥白芷防風之類聞人氏用麥麩襯臥暑月熱甚當藉之以芭蕉葉為佳或瘡已出定大便不通而膿汁不幹者此熱毒合下證也宜牛黃丹利之若瘡口濕及膿血雜流者百花膏收靨生肌散金華散綿繭散收靨魏氏白螺散乳香韶粉散俱可用若靨後復生乃餘毒失於解利留滯於肌肉之間而然也宜消毒散出太密或結痂久而不落亦宜百花膏若痘爛無膿吐利不止或二便下血乳食不化者不治之證也牛黃丹治瘡子出定大便不通瘡中膿水不幹牛黃大黃末生用珍珠末粉霜各一兩上研勻煉蜜丸如黍米大每服十粒人參湯下量兒大小加減生肌散治疳蝕不斂並痘後膿血雜流不收等瘡地骨皮黃連五倍子甘草黃柏各等分上為細末乾摻瘡上金華散治痘證後肥瘡疳瘡疥癬能收水涼肌解毒黃丹水飛過火煆紅一兩黃柏黃連各五錢黃芩大黃各三錢輕粉一錢麝香一分上為細末瘡濕乾摻燥用臘豬油熬化調搽白螺散專治瘡痘不收白螺螄殼不拘多少古牆上取上去土洗淨火煉紅取出存性為極細末瘡口濕處乾摻為妙乳香韶粉散即韶粉散加乳香末三錢韶粉散方見落痂證治又方荔枝殼微燒存性草紙燒灰存性敗茅多年者三味共為細末或搽或摻自能收水結痂又方黃豆殼燒白灰為末摻之如痘風癬以痘殼煎湯洗祕傳茶葉方痘爛遍身無皮膿水流出黏拈衣被茶葉要多揀去粗梗入滾水一泄即撈起再揀去梗濕鋪床上用草紙隔一層令兒睡上一夜則膿皆干蕎麥粉法見收靨證治蟬花散治爛痘生蛆蟲及夏月諸蟲咬傷臭惡不可近者服之蟲皆化而為水蒼蠅亦不敢近蟬蛻洗淨焙青黛澄去灰土各五錢北細辛二錢半蛇蛻一兩燒存性上為細末每服三錢酒調下仍以生寒水石細末摻之臭痘袁先哲云臭痘不死以其得化泄陽明之毒氣故耳若臭而黑爛成窩者元氣虧損亦死之證也患此者須服定金湯定金湯方綿黃耆人參炒術當歸白芍藥生地黃白茯苓甘草白芷防風荊芥升麻入芫荽一握白銀一塊燈心二十莖同煎服豫每診臭痘膿血流溢者生臭不梟癢者生臭不延人者生臭不抓脫者生臭不黑爛者生犯此須以芫荽艾葉燒闢其穢氣隨用升麻紫蘇湯揩挹其臭處淨潔其衣服床被即服前方無不獲全若頂脅胸頸氣窩處凹爛黑臭洞見筋骨者必死之痘也四明俞氏用寒水丹摻之亦可寒水丹雞骨灰帶血肉燒過銀硃各一錢冰片赤石脂各五分棕衣灰二分上研細末洗淨徐徐摻之蛆痘袁天地間有形化者有氣化者形化者由於胎卵氣化者忽焉成形痘之有蛆形化氣化兼之也近有華峰道人隱吳山治痘有一小兒患痘時屆十一月感發之候痘經正順囊廓鼎竦忽頭項上惡癢難忍手搔難禁遂於潰破處將銀簪挑之則見其蟲如絲細而長有寸遂以香油取盡花椒湯洗之癢即止愚按寒冬蟄令豈有蟲乎茲乃氣化然也又有一患痘者時值炎熱之際頭項上如前作癢豫視之見其蟲如米粒囊中或二三盤據焉此乃蠅蚋聚齧膿血形化然也先哲云蛆痘不死以其梟毒盡發於外也治痘瘡生蛆方經霜桑葉野薄荷煎湯洗之其蛆自去或先用艾條熏之後增紫蘇甘草煎湯洗之禁雄黃礬石等藥驗頭面論曰輕者頭面少又胡荽酒法不欲噴頭面以諸陽之會在於頭心之華在於面痘為陽毒而心主之故痘瘡頭面稠密者重頭面預腫者凶頭面瘡破爛腥臭者凶欲占瘡之輕重吉凶莫如頭面也人之一身內則心為君主外則頭為元首病有真心痛真頭痛以見不可輕犯也經曰頭者精明之府頭傾視深精神棄矣故占人之生死者亦莫如頭凡瘡初出從他處先見漸登於頭起發收靨皆然他皆有瘡而頭獨稀此佳兆也若於頭額之間先出先戴漿先干收先破損其瘡稠密無縫肉下浮腫皮上濺起粗膚者皆凶惟瘡遍身俱收而頭上不收或熟自破或膿出結如堆積者不須怪蓋天地之化孤陽不生孤陰不長陽變陰合彼此相成頭者諸陽之會無陰相濟所以難收也又病閉目搖頭者死此陽脈不治謂之心絶也經曰十二經脈三百六十五絡其氣皆上走於面而走空竅又肝開竅於目肺開竅於鼻脾開竅於口心腎開竅於耳又修真家云面有七竅內應乎心又相術但觀人之面以知禍福可見面不可敗也凡瘡稠密七竅閉塞敗面者凶以臟腑經絡之氣皆病也又諸陽皆聚於面痘為陽毒初出之時必先於面然面有部位其候不同額屬心離火之位火性急烈不可輕犯凡瘡出現泡漿干收先從額上起者凶左頰屬肝震木之位右頰屬肺兌金之位二處不論先後但瘡欲磊落堅厚若模糊成塊浮嫩易破潰爛灌腫者凶蓋肝藏魂肺藏魄肝肺俱敗魂魄以離故凡病兩腮冷或木硬者死頦屬腎坎水之位此處先出先壯先靨者吉蓋瘡疹出於腎則吉入於腎則凶也鼻屬脾坤土之位亦不論先後但不欲模糊早干收也若未成漿鼻頭先干黃色凶此脾土將敗真臟色見也薛聞人氏云痘疹屬火證其面色赤者為順甚者為熱若肝木剋制脾土致面色青者是為逆也急用四君升麻柴胡調補脾胃色正才治竊謂前證若傷食而嘔吐搐搦脾氣受傷而瀉利搐搦或厥逆皆慢脾風之漸也用人參理中湯泄利加柴胡釣藤鉤治之或有少誤多致不起若有痘毒內外鬱蒸發出遇風寒相搏凝滯於肌肉遍身皮膚青色者用透肌散胃傷則生風嘔吐脾傷則生風厥逆用五味異功散加天麻若瘡密熱盛便祕飲冷麵赤者用犀角解毒散灌漿之後發熱煩躁作渴面赤者用當歸補血湯足熱腰痛目睛赤者地黃丸皆要法也一小兒出痘飲冷過多腹痛面青手足並冷此寒邪傷脾而虛寒也用附子理中湯一劑而痛止用人參一兩姜一錢二劑而膿灌又用人參煎湯代茶與飲月餘而靨一小兒出痘面色青手足冷此寒水侮土也非十二味異功散不能救不信乃服疏通之藥歿而遍身皆青人中為陰陽之分故趙子昂以泰卦象之人中而上分為三部人中而下亦分為三部髮際之上陽之上也兩眉之間陽之中也山根以下陽之下也自口至兩乳間陰之上也自心蔽骨至陰毛際陰之中也自陰而下陰之下也凡瘡之出現起發收靨自人中而分上下循序陰陽和暢雖多且密亦可言吉若或舛差雖是稀少亦可言凶此有伏也發熱之時面色明瑩者吉面赤若塗抹者重此邪氣拂鬱於陽明胃與大腸也陽明經上循於面故赤也宜以清涼解毒之藥少通利之面垢慘黯者凶瘡疹之火發自少陽面垢者少陽候見也針經云少陽病甚則面微壅宜表裡雙解蓋少陽從中治也驗耳目鼻經曰腎通竅於耳耳者腎之外候也腎之為臟水臟也天一生水受氣之初先生兩腎而一陰藏焉又有相火存乎命門之中瘡疹發熱耳獨涼者瘡疹為火腎不受邪存水之主以制陽光也如耳反熱則水不勝火將有歸腎之變痘瘡之候先觀耳後有紅縷者蓋手少陽三焦之脈從膻中上出缺盆系耳後直上出耳角紅者火色也此瘡疹之火發自少陽自見於其經也凡瘡自耳先出未及成漿耳輪先靨者漸萌歸腎之勢矣目別見經曰肺通竅於鼻瘡疹發熱之初噴嚏者火邪上干於肺外應於鼻而癢則嚏鼻乾黑燥者火刑于金金體本燥得火反甚急宜清金瀉火以解其毒鼻衄者血得熱而妄行故衄出於鼻急與涼血瀉火以解其毒鼻流清涕者疹也疹發於心心肺相連以火鍊金熱極而反化為水也瘡出之後鼻塞不通者熱也火主䐜脹瘡已成漿收靨之時鼻塞不得息者此鼻內有瘡膿涕黏結可用金銀小簪子以通之如瘡未成漿鼻端先乾者凶經曰臟真高於肺以行榮衛陰陽也邪火刑肺肺敗不能輸精於皮毛故皮毛焦枯先見於鼻榮衛不行陰陽不續以漸遍身皆乾枯而死矣凡瘡變壞鼻中血出者涕自流出者鼻孔開張喘急者肺絶之候皆死證也驗唇口牙齒脾之竅通於口其華在唇四白脈訣曰應唇通口氣瘡疹發熱之初口中和唇色紅潤者吉如口燥唇裂其毒必甚急解之瘡出稠密唇口瘡子相黏諸瘡未發此瘡先已戴漿諸瘡未收此瘡先已焦黑者凶面瘡腫灌唇上瘡裂成塊干濺者重如瘡出太密口中臭氣者臟腑敗壞故臭出於口也瘡欲變壞唇上縮者脾絶也唇下自呷者魚口也口中涎如膠黏者脾津竭也皆不可治疹家唇口生瘡聲啞者狐惑證也不急治之殺人上片牙隸於坤土乃足陽明胃脈之貫絡也下片牙隸於乾金乃手陽明大腸脈之貫絡也瘡疹發熱之初口開前板齒燥者裡熱也宜以清涼之劑微解之咬牙者牙乃骨之餘腎主骨寒戰咬牙毒歸於腎必死如發熱咬牙者有缺則為肝熱有上竄則為心熱此欲作搐也瘡已收靨牙齦潰爛者此肉瘡未得平復也勿作走馬疳瘡治之疹後牙齦潰爛血出肉黑氣臭者此方是走馬疳也驗喉舌咽喉別見舌者心之候脈訣曰外應舌將滎又脾之脈絡於舌舌之在人延納飲食主持聲音其用亦大矣瘡疹發熱其舌紅潤者吉舌燥如芒刺者裡熱甚也急解之針經曰熱病口乾舌黑者死吐舌者脾有熱也脾臟微熱則舌絡微緊時時舒舌勿用冷藥及下之或飲水者醫疑為熱而下之誤也飲水者脾胃虛津液少故耳瘡出之後舌上稠密出如堆粟破如蜂窠者危更加飲水則嗆食物則噦聲啞不出者必死之證瘡出太甚弄舌者凶驗頸項經曰東風生於春病在肝俞在頸項頸項者生氣之本也又曰天氣通於肺地氣通於嗌天食人以五氣喉者氣之所由也故喉主天氣地食人以五味咽者味之所由也故咽主地氣頸項者咽喉之管束也又三陽之脈自頸而上三陰之脈自頸而還頸項者陰陽之道路也痘瘡之候頸項欲疏若纏項而出稠密太甚者謂之鎖項廢其管束阻其道路上不得降下不得升內者不出外者不入經曰出入廢則神機化滅升降息則氣立孤危此死之徵也凡病深項軟者死骨敗也驗胸腹經曰凡刺胸腹者必避五臟胸腹者臟腑之郭也又曰鬲肓之上中有父母蓋言心肺也故痘瘡輕者胸前無胸腹出太甚者必重也其中於臟各有期日凡病深喘急胸骨扇動者肺焦脹也左乳下動脈突出者宗脈絶也皆不可治瘡疹腹痛者毒未盡也更宜詳審驗手足四肢者諸陽之本瘡出欲疏其發欲透其靨欲齊如應出不出應發不發應收不收此脾胃氣虛不能旁達四肢也發熱手尋衣領亂捻物者肝熱也手掐眉目鼻口者肺熱也手足搐搦者心肝風火相搏也各隨其臟而瀉之足涼者此常候也瘡疹腎不受邪腎主足故足宜涼手足冷者脾臟怯也四肢皆稟氣於胃而不得至經必因於脾乃得稟也脾怯不能為胃行其津液故冷耳宜溫之瘡已出現手足多水泡者此肝勝脾衰為鬼賊宜急治之不久便生癢塌也如遍身皆發手足不透是空殼者此脾胃虛弱津液耗竭榮衛凝澀故其毒亦鬱而不發也不能食者死能食者必發癰疽瘡勢太甚手足冷者不治瘡未成漿手足皮脫者必死瘡已正靨惟足不收者足為純陰無陽相濟所以收遲玉函經曰孤陽寡陰即不中譬取鰥夫及寡婦如瘡始成漿他處未收手足心先靨者其後必生怪疾也瘡靨之後手足關節腫痛者必發癰也瘡癢手足搔亂者凶驗寢臥夫衛氣者晝則行陽夜則行陰行陽則寤行陰則寐人之常也瘡疹發熱便昏睡者心主熱脾主困心受氣於脾故發熱昏睡此常候也起臥不時者內有熱也必多陷伏之變合面臥者裡熱也大抵瘡疹始終安寢者吉蓋氣血強盛榮衛流行邪出於表而不在裡則神安神安則志定是以得安寢也若氣血衰弱榮衛滯澀邪在於里而熱心惡熱則神不安神不安則志不寧是以煩躁悶亂譫妄而不得眠也亦有毒伏於中神喪氣脫僵臥如尸呼之不應飲食不知者不可以嗜臥論乃死證也驗飲食經曰人以水穀為本故人絶水穀則死仲景曰水入於經其血乃成谷入於胃脈道乃行可見水穀之悍氣為衛精氣為榮水去則榮散谷消則衛亡矣凡痘瘡能食者雖重亦吉不能食者雖輕亦危也然有不能食而生能食而死者何也蓋不能飲食者臟腑內實大便不行有平日之穀氣以為之主瘡成之後自消穀氣而思食矣其能飲食者邪熱殺穀即叔和所謂口乾饒飲水多食亦肌虛者也將不久而變生焉惟疹家多不能食以口中不和不思食也余詳不能食門痘後餘毒證治萬凡痘瘡輕者其本疏其毒微其證順自然易靨無餘毒也重者其本密其毒盛其證險自難出難靨有餘毒也逆者或伏或倒陷或倒靨幸脾胃素強調治又早不至大困亦作餘毒錢氏云其病有三一者疥二者癰三者目赤以證求之尚不止此亦有出已盡發已透靨已齊者復作餘毒此由溫補之過飲食之失而得之故治痘後餘毒或補或發散或解利要在分表裡論虛實不可一概妄投湯劑也海癍瘡餘毒或肝虛入眼目或肺虛為癬疥或為癰癤發在骨節腎之虛也發在肌肉脾之虛也或在筋或在頭或在面或牙齒疳蝕或咽喉腫痛各隨經而見皆毒不散蘊積而成或病人始不早治或醫者失治遺於經絡其所由來蓋有自矣宜服解毒等劑世痘毒攻脾則泄瀉身浮攻肝則眼生翳膜攻心則煩躁啼哭攻腎則耳疼膿聚攻肺則咳嗽痰涎潔若已發後有餘毒未散復有身熱瘡腫之類當茶粉下解毒丸丹治小兒痘瘡餘毒未散食谷太早補住毒氣鼠黏子六錢甘草五分犀角白朮各三錢荊芥防風枳殼各一錢水煎溫服活血解毒湯治餘毒防風荊芥生地黃赤芍藥當歸連翹牛蒡子黃連紫草甘草蒼朮薄荷川芎木通各等分水煎服癰癤此由毒氣留藏經絡故於肌肉虛處或關節動搖處紅腫而成癰又或既平之後失於解利餘毒大盛外不得泄於皮膚內不得入於臟腑聚而不去遂為之癰如毒氣淺者止生結核腫毒瘡癤而已甚者至頭項胸脅手足肢節盡焮腫作痛但發一二處或根淺者可治若流注起伏根深蔓引者小則潰筋脫骨必為殘廢之疾甚則綿延日久而死丹痘癰多是實毒血熱成癰分上下用藥一日不可緩成膿必用清熱涼血為主赤芍藥甘草節連翹桔梗之類上引用升麻葛根下引用檳榔牛膝更助以貝母忍冬草白芷栝蔞大便燥用大黃寒熱用芩柏此法纍效薛前證初起未成膿者用活命飲隔蒜灸治而消之欲成膿者用活命飲解而潰之氣血虛者八珍湯虛羸實而潰之虛而不能斂者托裡散補而斂之大凡發熱腫痛大便不結用仙方活命飲及隔蒜灸法大便祕結用仙方活命飲加大黃大便已通腫痛未退再用活命飲一服用托裡散補其元氣若發熱倦怠大便調和用補中益氣湯虛熱未應亦用隔蒜灸若潰而發熱口乾肢體倦怠用東垣聖愈湯膿水淋漓不時發熱用四君參耆若因乳母肝經血虛發熱用加味小柴胡湯發熱肝脾鬱怒發熱用加味歸脾湯驚悸膏粱厚味積熱用加味清胃散齒如專與涼血用敗毒等藥復傷元氣必致成者不能潰潰者不能斂矣萬凡治痘癰先看在何經絡分氣血多少用引經藥如太陽經羌活防風陽明經升麻白芷少陽經柴胡少陰經獨活太陰經防風厥陰柴胡若初紅腫硬痛者以針刺之口吮去惡血以拔毒膏敷貼氣實能食大便堅者用排毒散疏利之氣虛食少者用十宣散或流氣飲毒淺而小者只內服小柴胡加生地黃湯外用拔毒膏貼之此治腫瘍之法也若已成膿而未潰者以鈹針決去其膿勿使內潰已潰者用十全大補湯汗主之此治潰瘍之法也仙方活命飲治痘疔痘毒及一切瘡毒未成即消已成即潰此消毒敗膿止痛之聖藥金銀花陳皮各三錢皂角刺炒穿山甲用蛤粉炒乳香沒藥白芷防風當歸各一錢貝母天花粉甘草節各七分上每服五錢酒煎嬰兒母同服為末酒調服亦可若勢甚而邪在表者加麻黃散之而毒在內者加大黃下之當臨證制宜此解回生起死之劑但元氣脫者不治人參敗毒散治餘毒癰腫人參赤茯苓羌活獨活前胡薄荷柴胡枳殼川芎桔梗各等分甘草減半牛蒡子防風荊芥連翹金銀花即荊防敗毒散頭上加白芷升麻上身倍加桔梗手加薄桂腰加杜仲腿足加牛膝木瓜樺皮散治痘瘡及乳癰並一切腫毒樺皮木銼煎溫服此藥味苦平無毒若治乳癰取樺皮燒存性為末酒調服之立消十三味敗毒散治癰毒當歸白芷穿山甲土炒金銀花防風乳香制甘草陳皮赤芍藥皂角刺貝母沒藥制天花粉芍藥各等分酒水各半煎服排毒散見收靨保命集木香散治小兒癍後生癰如神地骨皮一兩木瓜半兩穿山甲炙黃三錢半麝香一字上為末米飲下二錢流氣飲川芎當歸稍白芍藥防風人參紫蘇葉木香甘草節黃耆桂心桔梗雞心檳榔白芷厚朴烏藥枳殼各四分上銼細水一盞煎七分服氣血虛而自利者加熟附子大便實加大黃小柴胡加生地黃湯柴胡人參黃芩各三兩甘草炙生地黃半夏各二兩湯泡七次上為粗末每服三錢水一盞生薑三片棗一枚煎至半盞去滓溫服六味活血散治癰疽瘡痛初起紅腫不散當歸川芎赤芍藥生地黃紅花蘇木各等分上水煎量服之五福化毒丹治痘毒實熱腫痛生地黃熟地黃天門冬去心麥門冬去心玄參各二兩甘草甜硝各三兩青黛一兩五錢上為末蜜丸芡實大每服一丸白湯化下犀角消毒丸治痘疹餘毒一切瘡毒生地黃荊芥當歸犀角屑防風牛蒡子杵炒赤芍藥連翹桔梗各七錢薄荷黃芩甘草上為末蜜丸芡實大每服一丸白湯化下按化毒丹降火涼血解毒寒中之劑消毒丸清熱解毒破血之劑蓋小兒臟腑脆嫩元氣易傷況痘後氣血皆虛豈能勝當此劑若胃氣一傷則未成者不能消散已成者不能腐潰已潰者不能生肌殊不知痘瘡乃臟腑所發遍身之血皆化為膿況此方愈而患此乃脾胃虛怯肌肉消弱榮衛短澀所致治者審之十宣散見形托裡散治痘毒元氣虛弱不能潰散未成用之自消已成用之自潰人參黃耆炒各二錢當歸酒洗白朮陳皮熟地黃茯苓芍藥炒各一錢五分甘草炙五分上三五錢水煎服托裡消毒散治痘毒氣血虛弱不起發腐潰收斂或發寒熱肌肉不生人參黃耆當歸酒洗川芎芍藥炒白朮陳皮茯苓各一錢金銀花連翹白芷各七分甘草五分上每服三五錢水煎東垣聖愈湯治膿潰心煩無寐體倦少食熟地黃自制者佳生地黃各二分人參川芎各三分當歸黃耆各五分上水煎服濟生歸脾湯治脾血虛損健忘驚悸或心氣虛不能攝血歸源以致妄行或吐血下血或因乳母心脾二經有熱瘡不結痂或瘡痕赤色加柴胡山梔即加味歸脾湯人參白茯苓黃耆白朮龍眼肉當歸遠志酸棗仁炒各二錢木香一錢甘草五分當歸身一錢上薑棗水煎母子同服丹溪痘癰敷藥用貝母南星殭蠶天花粉寒水石白芷草烏大黃豬牙皂角醋調敷患處效拔毒膏一名必勝膏馬齒莧杵汁豬膏脂石蜜上以三味共熬為膏塗腫處神效隔蒜灸法治痘癰大痛或麻木痛者灸至不痛不痛者灸至痛其毒隨火散用大蒜頭切三分厚安上用小艾炷於蒜上灸之每五壯易蒜再灸痛不止尤宜多灸小兒須將蒜切片著肉一面略剜小空灼艾燃蒜先置大人臂上試其冷熱得宜然後著瘡上又別灼如前法試之以待相易勿令歇替針丸治痘癰膿已成不潰陳壞米一錢硇砂五錢雄雀糞四十九粒真雄雀糞直者是也上為末米粥丸如麥粒大每用一粒黏瘡頭上以膏藥貼之半晌其膿自出若瘡頭透而膿不出或出而愈痛或發熱血氣虛也用托裡散或作嘔吐痰食少體倦脾氣虛也用六君子湯神效太乙膏治一切瘡疽潰爛玄參白芷當歸肉桂赤芍藥大黃生地黃各一兩上㕮咀用麻油四十兩入銅鍋內煎至藥黑濾去滓徐入淨黃丹一斤再煎滴水成珠捏軟硬得中即成膏矣神效當歸膏治痘毒浸淫或湯火等證及瘡腐不能生肌收斂者當歸黃蠟生地黃各一兩麻油六兩先將當歸地黃入油煎去滓入蠟熔化候溫攪勻即成膏矣豆豉餅治瘡瘍腫痛或硬而不潰及潰而不斂並一切頑瘡毒癤用江西豆豉為末唾津和成餅大如銅錢厚如三四錢置患處以艾鋪餅上灸之未成即消已成者祛逐餘毒間有不效者乃氣血虛敗之證參疔瘡論灸法用之如聖餅治一切瘡瘍硬腫不能消散或毒不能解散乳香沒藥木香血竭當歸等分麝香少許上各另為末酒糊和為餅炙熱頻尉患處惡瘡加蟾酥等分神功散治瘡瘍初起腫痛者用之可消加血竭更效黃柏炒為末二錢草烏生為末二錢上用漱口水調敷常以漱水潤之三豆散痘後癰毒初起紅腫黑豆赤豆緑豆用醋浸研漿時時以鵝翎刷上隨手可消鐵箍散治痘後癰毒鳳凰退燒灰醋調圍四畔留頭出毒氣甚佳瘡疥痘後遍身瘡癬如疥如癩膿血浸淫皮膚潰爛日夕不愈此毒氣瀰漫散於皮膚宜升麻葛根湯初熱防風解毒湯大法苦參丸痘癩主之若因撏掏成瘡者只以百花膏收靨塗之連翹散治小兒瘡疹癤痘疹餘毒作楚或生於頭面耳疼頰赤生瘡連翹黃芩瞿麥木通滑石柴胡荊芥牛蒡子防風羌活赤芍藥甘草各等分每服三錢水一盞煎半盞又入生薄荷尤好金花散見潰爛疳蝕痘後疳蝕瘡者毒壅肌肉內透筋骨外連皮膚時痛出血日久不痊亦惡候也內服十全大補湯汗外以綿繭散貼之收靨更與收靨門疳蝕條參看三黃散治疳熱生瘡膿水浸淫膿流處便濕爛松香五倍子黃連黃丹海螵蛸各一錢輕粉雄黃各半錢上為末用瑩肌散煎洗滲之乾者香油敷癮疹癮者皮膚間隱隱成疙瘩瘙癢爬搔更多內服解毒防風湯大法外以篳衣湯洗之疹者皮間點點狀如蚊蚤所咬之跡或如小芥子即麻子也升麻葛根湯初熱加防風荊芥穗主之熱甚渴者與人參白虎湯相合服之篳衣湯炊飯篳衣煮水洗癮起疙瘩者神效如無以炊篳煮湯亦好蜆子水治痘後發癮蜆子不拘多少活者以水養五七日旋取其水洗之丹瘤赤火丹瘤此惡候也流移紅腫其痛手不可近從頭上起者過心即死從足下起者過腎即死宜內服小柴胡加生地黃湯玄參化毒湯外用蜞針法吮去惡血自消若但紅不腫不痛者癍也人參白虎湯加玄參大青生地黃主之玄參化毒湯玄參當歸尾赤芍藥石膏連翹生地黃地骨皮紅花酒洗防風荊芥穗淡竹葉木通上水煎服犀角消毒散治癍疹丹毒發熱痛癢及瘡疹等證牛蒡子甘草荊芥防風各五分犀角鎊二分金銀花三分上水煎熟入犀角傾出服加味解毒散治癍疹癢痛寒熱甚者煩躁譫語並痘毒發熱咽乾犀角鎊五錢連翹炒二錢牛蒡子炒三錢薄荷一錢甘草五分上為末每服一二錢滾湯調下小柴胡加生地黃湯見前癰癤蜞針法取水蛭大者五六條放腫處吮去惡血可以消丹瘤決癰腫眼目萬痘瘡毒氣之為目翳也蓋自臟而達外治之之法但活血解毒而已活血不至於熱解毒不至於冷五臟平和則翳當自去不可輕用點藥反致損睛宜蟬蛻散痘眼目四物湯加柴胡主之若目閉淚出不敢見明者此羞明證也惟於黑暗處則能開才見明則陽光爍之淚自洴出癮澀難開宜洗肝明目散痘眼目便祕者瀉青丸肝或能開目只視物昏者此血不足也四物湯加密蒙花目中赤者洗肝明目散主之從子懋錕痘後兩目生翳羞明特甚時余與家兄從宜興試歸視之則窗牖帷幕皆以衣被重重覆蔽就明展兩脾白膜已遍覆黑睛淚如湧泉嬰科眼科投藥不效束手告技窮矣余亦莫知為計家兄曰女弟垂死之證弟能生之豈遂技窮於是試精思之余返書室閉戶而思目者清陽之所走也而忽焉有翳膜是濁陰犯之也濁陰烏敢與陽光敵故羞明特甚爾吾得治法矣乃以黃耆助清陽之氣為君生地黃當歸養目中真血為臣羌活獨活防風白芷川芎甘菊花薄荷荊芥升清陽黃芩豬膽汁車前子茯苓降濁陰為佐雄豬肝作引煎服仍間服瀉青丸八劑而目開徹幃幕翳已去矣時眼科所進點洗之藥一切屏不用止用橄欖核磨汁敷眼胞而已蓋嬰兒柔脆點洗之藥必有所傷故也治法方論詳大科眼目門並本門眼目條內涼肝明目散痘後羞明當歸龍膽草密蒙花川芎柴胡防風酒連各等分雄豬肝煮湯煎服望月沙散痘後暗室中不能開者穀精草密蒙花酒洗蟬蛻去翅足各五錢望月沙一兩上為末雄豬肝一兩竹刀批破用藥一錢摻入肝內水煮熟飲汁食肝效羌菊散治痘疹後毒氣不散生翳障及暴赤眼羌活蟬蛻去土防風蛇蛻菊花穀精草木賊甘草梔子白蒺藜大黃黃連各少許上為末每一錢米湯泔水溫服便祕痘後毒入腹中熱氣並於小腸則小便不通並於大腸則大便不通如前後部俱不通者熱勢愈甚小便不通者五苓散驚導赤散心大便不通者三黃丸四順飲併發熱三乙承氣湯大小便俱不通者八正散通關散並痘便悶斟酌用之泄瀉痘後泄瀉其證有二如能食而渴脈盛者此熱入大腸也渴者內熱也食能多者熱消穀也脈盛而數熱證諦也宜黃芩湯痘泄利加黃連如食少不渴脈微小者此裡氣虛不能禁固水穀也宜四君子湯加訶子肉豆蔻或理中湯丸加熟附子甚者以肉豆蔻丸止之俱痘泄利便膿血痘後便膿血者此熱毒入大腸也宜四物湯失血加黃芩黃連枳殼荊芥穗或黃連解毒湯煩躁加生地黃勿作倒靨及用劫澀藥也嘔吐胃主納而不出大小腸主出而不納痘後嘔吐者是餘毒在胃也然有冷熱二證如心煩作渴食乳甚急聚滿胸中然後吐出如射其人面色帶赤手足心熱居處喜涼此熱吐也橘皮湯痘吐逆加黃連竹茹主之如乳食水漿隨吐面色青白手足冷大小便自利此冷吐也益黃散脾主之痘後餘毒多是熱邪其間冷證十有一二也亦有傷食而嘔者但聞會臭即吐不欲食木香大安丸或養脾丸並用生薑湯下有飲水多而吐者必吐清水名水逆五苓散主之木香大安丸木香二錢黃連陳皮白朮各三錢枳實山楂肉萊蔔子炒連翹神麯炒麥糵炒砂仁各一錢五分上為末神麯糊為丸陳廩米湯下養脾丸人參白朮當歸川芎各一錢半木香青皮黃連陳皮各一錢砂仁山楂肉神麯炒麥芽炒各五分上為細末水調神麯糊丸如麻子大每服三五十丸陳倉米飲下發熱痘瘡自初以來一向發熱至於瘥後猶不少減者此有虛實二證如大便難小便赤能食而煩渴者此實熱也以三黃丸或四順飲併發熱先解利裡熱後用升麻葛根湯初熱加地骨皮解表熱也蓋升麻葛根湯治瘡疹未發之先已發之後身熱藥也如大便不祕小便不赤坐立振搖飲食不甚進者此虛熱也以保元湯大法加知母麥門冬虛甚者加炒乾姜成熟附子少許引火歸源薛陳文宿先生云痘瘡收靨之後渾身經日不除別無他證用柴胡麥門冬散如不退服人參白朮散痘渴若風熱咳嗽咽喉不利用桔梗甘草防風湯竊謂前證有因熱毒未解者有因胃氣虛熱者有因胃氣實熱者其因不能枚舉當臨證制宜而藥之一小兒咽痛壯熱痘痕色赤手微熱此餘毒未解用柴胡麥門冬散而安七日之後復熱手指初捏似熱久捏則冷此脾氣虛也用五味異功散而痊一小兒痘咽痛大便不實口渴飲湯手足不熱此脾胃虛弱也用人參白朮散而大便實但不時寒熱用加味逍遙散而愈一小兒痘咽痛發熱作渴面赤飲冷此胃經實熱也用射干鼠黏子湯而愈因食厚味復發手足並熱用瀉黃散一劑而痊一小兒痘咽痛發熱飲冷大便黃色手足指熱此脾胃實熱也用瀉黃清胃二散各一劑而愈後因乳母食厚味兒口角流涎不能吮乳仍用前藥治母而愈小兒痘咽痛足熱余謂此稟足三陰虛而無根之火上炎也古人有云痘歸腎經必不可救當用壯水之劑亦有生者奈彼不悟翌日果腰痛咽啞始信余言乃用大劑地黃丸料加五味子並補中益氣湯而愈一男子出痘上體甚熱兩足俱冷喉痛作渴瘡亦不起發此稟腎經虛熱也以六味地黃丸料煎與恣飲漸愈又用八珍湯而痊一小兒面色素白出痘咽痛發熱面赤作渴飲湯手足指冷此稟足三陰虛也用大劑加減八味丸料煎與恣飲又以益氣湯助其脾肺以滋化源痛止熱退而愈柴胡麥門冬散痘發熱柴胡梔子散治肝膽經有熱瘡毒不愈或發熱不止柴胡山梔牡丹皮各一錢川芎芍藥茯苓各七分白朮炒甘草各五分當歸牛蒡子炒各七分上水煎母子同服小柴胡湯治發熱甚而嘔者宜服之柴胡人參黃芩各三兩甘草炙半夏各二兩半湯泡七次上為粗末每服三錢水一盞生薑三片棗子一枚同煎至半盞去滓溫服咳嗽者加五味子煎服頭痛發熱肢節疼痛者四味升麻湯大便不通者四順飲若大便自利黃黑色者此毒亦有所出不必廣與湯劑恐重增他病大便自然通不得以溫藥助之瘡疹亦稀少自快利只與四味升麻湯荊芥散雖大便利不可以溫藥助之其下利甚者卻與少溫之槐花散治癍瘡餘熱不退槐花赤小豆各炒二錢麝香少許上為細末每服半錢蜜湯調服不拘時候黃耆散治壯熱不退可涼肌膚散熱黃耆柴胡乾葛甘草炙各等分上為末每服一錢薄荷三葉水半盞煎至三分約三呷空心服此藥治發熱數日未退者其熱是瘡疹者量其虛實用之也中風痘後忽然口噤涎潮角弓反張手足瘛瘲身青黑色此中風也瘡痘方愈榮衛正弱不知避忌忽遇節令氣交八方不正之氣乘虛而入故為此證宜消風散二錢入蟬蛻末一錢分為三服投生薑薄荷汁及酒各數點溫湯浸之連二三服或作癮疹或再出膚疹而愈消風散見痘中風鉤藤湯痘後口噤僵直繞臍腹痛鉤藤紅花木香川芎當歸白芍甘草白朮青皮黃連官桂生薑各等分水煎不拘時服骨節作痛俗名痘風丹溪分氣血虛實以日子守之多帶氣血不足虛則黃耆生血之劑助之略佐以風藥實則白芍藥黃芩為君連翹白芷續斷之類為佐若屬虛寒陳氏方可用余詳痘中風門拘攣痘後手足拘攣屈伸不便起居艱苦者乃血耗氣虛不能榮養於筋宜十全大補湯去地黃白茯苓加川續斷多服乃佳氣虛者少加川烏炮過行經不可誤作風治妄行發散反耗陰血也當歸桂枝湯治痘後手足不能屈伸當歸川芎黃耆甘草薄桂黃柏蒼朮炒各等分水煎如氣虛少加川烏以行經加人參為主如感風寒以致骨節疼痛加羌活防風昏昧妄言痘後昏昧不解識人口中常妄言如邪祟狀此移熱入心包絡宜導赤散心吞安神丸痘譫妄待醒後以保元湯加麥門冬生地黃四物湯加石菖蒲木通山梔子仁相間服之若卒然昏昏喜睡狀如眩暈身無熱口中無妄語其人痘出必重又乳食少今毒氣已解正氣未復故邪退而喜睡乃否極泰來之象不須妄治逡巡蘇醒矣厥逆手足厥冷蓋覆不溫此痘疹逆候也若在正盛之時十無一生今病已愈氣血久虛脾胃大困其厥逆宜矣用保元湯加當歸身熟附子主之咳嗽咳嗽頻頻涕唾稠黏此痘疹常證也有寒有熱有虛有實不可拘泥一定之法如自初出咳嗽到今未愈者此肺中餘邪未盡也宜甘桔湯咽喉合瀉白散肺加牛蒡子馬兜鈴主之如咳而熱大便難小便赤者此熱毒也宜葶藶丸主之痘喘大便潤者人參白虎湯痘渴合甘桔湯主之如咳而大便溏小便清無大熱渴者此虛也宜人參清膈散主之痘咳嗽如咳而血出者甘桔湯加牛蒡子茅根汁阿膠主之如向不咳今始咳者此風寒外感也麻黃湯主之痘喘燈心湯治瘡痘出後煩喘小便不利者宜進之燈心一把鱉甲醋煮黃二兩上銼為散每服一兩用水八合煎取四分服之各量大小加減咳嗽之時脅痛者經云左右者陰陽之道路左右兩脅之謂也由余毒在中陰陽之氣不能升降故脅為之疼也但當解毒毒氣去則真氣行所苦自平矣小柴胡加枳桔湯主之赤茯苓湯治小兒疹痘瘡出後咳逆脅痛不下食赤茯苓甘草炙大青升麻枳殼麩炒各半兩梔子一分上為粗末每服一錢水一小盞入苦竹葉七片豆豉三十粒同煎至五分盞去滓分為三服日三四服看兒大小以意加減本方稱疹痘出後脅痛者由病後毒氣溷亂阻於升降左右為陰陽之道路氣之所行處令氣滯為脅痛以枳殼寬腸下氣令氣順脅不痛也大青梔子去蘊熱升麻解毒赤茯苓導心火利小腸無熱以克肺氣而效逆自平爾腹痛瘡疹未出而腹痛者乃癍毒內攻也今毒已解無復壅遏矣而腹中痛者其證有二一則因大便未通燥屎作痛備急丸主之大便閉一則因食過多胃虛不能消穀而作痛如便祕者丁香脾積丸傷食便利者木香大安丸傷食主之但燥屎痛者病在下焦傷食痛者病在上焦手不可按若原食少又便常潤忽爾作痛者此虛寒證也病在中焦必喜用手按摩黃耆建中湯主之渴痘家作渴亦是常事至痘後則不宜有渴乃忽然渴而引飲者餘毒留於心胃膈焦咽燥故也其人必能食大便祕小便赤舌燥咽乾宜人參白虎湯加黃連主之若食少大小便自調雖好飲湯咽舌不燥此脾胃虛津液不足也宜人參白朮散不愈人參麥門冬散加天花粉主之並痘渴失音痘後失音有二咽痛不能言者此毒氣結於咽喉之間痰壅作痛而不能言天花散主之痘失音心熱不能言者心中邪熱未徹腎虛不能上接於陽雖有聲而不能言四物湯去川芎加麥門冬白茯苓主之不喜食痘後邪氣盡退正氣將復脾胃略紓宜漸能食也若原不食今因喜食太過或原能食今又驟加以致惡食不食者此皆內傷有餘證也宜木香大安丸主之傷食如向未食今又不喜食者此脾胃中氣不足宜七珍散痘不能食或人參白朮散去葛根加陳皮木香研末取二兩另用糯米緑豆各二兩各炒熟研末相和棗湯調服稍能食更兼進養脾丸寒熱痘後忽發寒熱如瘧狀至後如期即發者此脾虛氣弱失於將息重感風寒宜先以柴葛桂枝湯發去新受表邪後以保元湯加當歸陳皮白朮砂仁烏梅生薑調之大和散治瘡痘後寒熱往來嗜臥頓悶躁亂生地黃當歸地骨皮人參甘草炙白芍藥各等分上㕮咀每服一錢水半盞煎至三分去滓溫服柴葛桂枝湯見初熱腫脹痘後面目虛浮或久則一身皆腫者此表氣不足出風太早風邪乘虛而入其治在肺宜五皮湯先加桂枝微汗之後只服本方若遍身皆腫以胃苓湯合五皮湯主之痘後腹虛腫脹滿或氣喘粗者此宿垢在裡不問餘毒食積蓄水並先利之宜塌氣丸利後以胃苓湯去甘草加人參黃耆大腹皮調之其治在脾如因新食作脹不腫者只木香大安丸五皮湯桑白皮地骨皮生薑皮大腹皮五加皮各等分上銼細取長流水一盞燈心十二莖煎七分溫服塌氣丸木香半兩雞心檳榔一雙白者黑牽牛二兩半生半炒取頭末一兩共為末神麯糊為丸如黍米大薑湯下胃苓湯豬苓澤瀉白朮白茯苓蒼朮厚朴紫油者薑汁炒陳皮桂心甘草上銼細水一盞煎七分去滓溫服無時自汗盜汗痘後自汗盜汗皆衛氣弱榮血熱肌肉虛也宜保元湯大法當歸六黃湯相間並調敗蒲散服之如汗出盛再用溫粉撲之方並見自汗條若渾身如水發潤如油汗出如珠者皆亡陽證死不治失血痘後失血證乃餘毒邪熱迫血妄行也自鼻出者玄參地黃湯主之失血外用梔子炒焦黑研末吹之自溺出者八正散主之小便不利自大便出者桃仁承氣湯主之此與上自汗證同為熱也上是熱在衛故汗出此是熱在榮故血出二證大便祕者並與四順清涼散主之發熱桃仁承氣湯桃仁二十一個去皮尖研泥勿煎大黃二錢官桂紅花各一錢甘草半錢上三味銼細水一盞煎七分去滓入桃仁泥化開食前服吐利蛔痘後或吐蛔或利下蛔者皆熱毒入里也熱在胃則吐蛔熱在腸則利下蛔利者黃芩湯泄利加桃仁艾葉吐者黃芩半夏湯吐利加烏梅川椒若不吐利但聞食即吐蛔者此胃久虛蟲無所食故聞食臭即吐食已易飢宜理中湯丸吐利加烏梅肉黃連川椒主之袁氏治痘屎蟲歌曰痘里屎蟲胃氣離人參白朮與陳皮茯苓甘草當歸並煎來連服自蟲除蓮肉湯蓮肉去心半斤豬肉去油皮一斤共水煮熟下砂仁伏醬朝夕與啖其胃氣接養蟲自安居不出矣切不宜投以使君子檳榔之物痘中一投命遂喪矣狐惑痘後吐蛔而手足厥冷者蛔厥若不吐利內蝕臟腑者為狐惑狐惑之證其人好睡默默不欲食上唇有瘡蟲蝕其肛下唇有瘡蟲蝕其臟其聲啞嘎上下不定故名狐惑也此候最惡麻疹後尤多化䘌丸主之如大便結者以桃仁承氣湯加槐子利之化䘌丸黃連半兩蜀椒去閉目者炒去汁二錢苦楝根白皮乾者二錢上共研末用烏梅肥者七個艾湯浸去核搗爛和丸艾湯下黃連陰䘌丸治狐惑瘡黃連二錢蘆薈乾蟾煅各一錢二分使君子肉二錢半蕪荑一錢五分川楝子肉一錢上末烏梅洗淨去核搗膏和丸米飲下牙疳痘後牙齒齦肉潰爛者此痘疕脫去涎水浸漬為疳蝕瘡用綿繭散收靨敷之若氣臭血出者又名走馬疳瘡內以黃連解毒湯煩躁加雄黃為丸竹葉湯下外以馬鳴散敷之或口舌生瘡者並宜洗心散以上諸證大便祕者並用四順飲利之大便潤者用甘露飲服之老茶葉薤葉根煎湯洗以白𣯖即酸梅也燒灰人中白火煆加入雄黃散敷之洗心散當歸生地黃木通黃連麻黃大黃酒洗薄荷葉各等分上銼細水一盞加燈心為引煎七分去滓溫服甘露飲牙疳暫用麥門冬去心一錢天門冬去心二錢生地黃四分熟地黃六分石斛去根枇杷葉各五分山茵陳枳殼黃芩犀角屑各六分甘草一字水煎服雄黃散雄黃枯礬各一錢麝香一分半人中白五分共為末吹入鼻中如吹不入用麻油潤使進馬鳴散人中白即溺缸底白垽以物刮取用新凡盛之火煅過如白鹽乃佳半兩馬鳴蛻即蠶蛻紙也火燒過二錢半五倍子生一錢另用一錢同礬枯白礬一錢捶碎另取五倍子一錢人礬於內用火煅枯共為極細末先以米泔濃汁浸洗以此敷之人中白散人中白煅一兩黃柏炒黑三錢上為末搽口內吹口散治口疳黃連青黛孩兒茶冰片為末吹之赴筵散口瘡神效薄荷黃柏等分為末入青黛少許搽之牙疳方痘後餘毒攻牙齦疳腐內宜服甘露飲人中白煅三錢枯礬二錢鹽梅七個煅存性麝香一分白氁子灰一錢五穀蟲焙乾二錢為細末先將蔥茶洗去腐肉須見鮮血然後搽藥大抵瘡痘之後遇有便祕內熱等證須當解利勿使餘毒變生諸證也解利之劑如三黃丸四順飲並見發熱之類若失於解利致生諸證須當用切中病源之藥以急治之不可緩治令病勢滋蔓反害人也今人不能究其病因一概用不急之藥其意但欲逃差謬爾何嘗實能究其致病之由而藥之耶急治之中惟在識其虛實苟稟受既實榮衛充壯病後有熱者即與解利緩治不可也所稟怯弱病後榮衛大虛坐立振搖飲食少者卻宜和緩之藥以扶持之候其飲食如故榮衛既充然後微微解利未為遲晚或至虛之人不必解利可也水痘小兒痘瘡有正痘與水痘之不同新安張季明云其瘡皮不薄如赤根白頭漸漸赤腫而有膿瘥遲者謂之大痘此里證發於臟也其瘡皮薄如水泡破即易干而出無漸次白色或淡紅冷冷有水漿者謂之水痘此表證發於腑也亦與疹子同又輕於疹發熱一二日而出出而即消易出易靨不宜燥溫但用輕劑解之麥湯散主之羌活散消毒飲麥煎散俱可服又當服大連翹湯以解之如心悶煩蹂發熱及大小便澀口舌生瘡者通關散主之水痘夾黑出來黑水流或手足冷者前胡甘草生地玄參連翹茯苓木通蟬蛻麥門冬川芎陳皮當歸生薑水煎服麥湯散治水痘地骨皮滑石甘草各半錢甜葶藶麻黃大黃知母羌活人參各一錢上銼散水一盞每服二三錢小麥七粒煎六分不拘時溫服分二帖麥煎散治小兒夾驚傷寒吐逆壯熱表裡不解氣粗喘急面赤自汗或狂語驚叫或不語無汗及癮疹遍身赤癢往來潮熱時行麻痘疹子餘毒未盡渾身浮腫痰涎咳嗽或變急慢驚風手足搐搦眼目上視及傷風頭疼並治之滑石地骨皮赤芍藥石膏白茯苓杏仁知母甘草葶藶子炒人參麻黃一兩半上為末每服一錢麥子煎湯下如初生芽兒感冒風冷鼻塞身熱噴嚏多啼每一字用麥子煎湯調下一方去地骨皮滑石加羌活川芎薄荷煎湯調下羌活散初熱消毒飲即牛蒡荊芥甘草三味大連翹湯便悶通關散便悶按水痘今小兒患之者大率無害如無內證不必服藥無事生事也前後四方不為輕劑非熱甚不解二便祕澀煩悶不寧不宜輕服麻疹麻疹浮小而有頭粒隨出即收不結膿疱北人謂之糠瘡南人謂之麩瘡吳人謂之痧越人謂之喑古所謂麻聞人氏所謂膚疹是也與前所謂脾為疹者不同小兒有出一二次者出輕而日數少者名奶疹子出稍重而日數稍多者名正疹子又出於痘前者名奶疹子出於痘後者名正疹子初出亦與痘瘡相似但痘發於臟麻發於腑臟屬陰其病本深故難出難收而藥於溫平為宜腑屬陽其病本淺故易出易收而藥於清涼為宜萬氏云痘大而焮腫者少陽三焦火也陽道常饒故大而腫疹小而碎者少陰心火也陰道常乏故小而密三焦水穀之道路脾胃主納水穀治痘專以脾胃為主心肺屬陽而位乎上心火旺則肺受之治疹專以肺為主觀其咳嗽者火炎則肺葉焦舉也鼻流清涕者鼻為肺之竅以火爍金而液自流也目中淚出肺熱則移於肝肝之竅在目也或手掐眉目唇鼻及面者肺熱證也按既是心火刑肺金即是賊邪其證當重何反輕於痘余每治麻疹但據見證以瀉白散加減大劑投之即至危困之證無不愈者其他時師用苦寒降火辛溫發表而阽於危亡者不可勝數安在其為心火刑肺也春溫夏暑秋清冬寒此四時之正氣也冬應寒而反溫陽氣暴泄火令早行人感之者至於來春必發瘡疥未出痘疹者必感而出雖曰胎毒未有不由天行者故一時傳染大小相似但見疹痘之出即宜先服三豆湯代天宣化丸二方俱見前預防以預解之麻疹初出全類傷風發熱咳嗽鼻塞面腫涕唾稠黏全是肺經之證有末傳泄利者有一起即兼泄利者肺與大腸相表裡表裡俱病也惟不可觸冒風寒及於正蒸熱時啖食能變輕為重不可不慎麻疹形證亦同有如發風疹疙瘩擁起如雲頭色赤成癍隨見隨沒者有如粟米頭糠三番俱見而不沒至三日後方收漸沒者然皆謂之麻疹其於欲出未出之際當用發表之藥發之則易出易愈也麻疹有發熱至十餘日始見者大抵主在發散肺經之熱毒者始事也調理補養病後之元氣者終事也其間或兼風或兼痰或傷食並隨宜加對證之藥其有變證即隨病用對證之藥要不亂投湯劑則兒無事矣疹喜清涼痘喜溫暖此法人皆知之然疹子初出亦須和暖則易出所以發苗之初只要發出得盡則毒便解非若痘必苗而秀秀而實而後毒解也痘子成實之時若大溫熱則反潰爛不收是痘之後亦喜清涼也故治痘疹者無過熱無過寒溫涼適宜陰陽自和是為得之初熱痘疹發熱之初多似傷寒惟麻疹則咳嗽噴嚏鼻流清涕眼胞腫其淚汪汪面浮腮赤或嘔惡或泄利或手掐眉目鼻面此為異耳輕者以瀉白散合三味消毒散主之重者以金沸草散主之兼泄利者合升麻葛根湯以白芷代葛根此余創立治法用之無不效者即十分危證守而勿失終於必濟每見諸書所定方類皆苦寒辛涼發表之劑不盡對證對經恐有誅罰無過之失用者詳之大抵疹欲出已出之際雖寒勿用桂枝雖虛勿用參朮雖嘔而有痰勿用半夏南星大忌認作傷寒妄汗妄下汗之則增其熱為鼻衄為咳血為口瘡咽痛為目赤痛為煩躁為大小便不通下之則虛其里為滑泄為滯下多至不救慎之慎之萬如手足稍微冷惡寒而無汗面色青慘而不舒左額有青紋者傷寒之熱也手足稍微溫發熱有汗面赤而光者傷風之熱也並宜惺惺散痘初熱發散之目胞腫而右頰有青筋發熱而頭額腹肚最甚或兼嘔吐腹疼者傷食之熱也備急丸痘初熱下之面色青紅額正中有紋手掌心有汗時作驚惕手絡脈微動而發熱者此驚熱也瀉青丸肝牛黃清心丸痘煩躁主之身熱而倍能食唇紅頰赤大小便祕脅下汗者此風熱也宣風散主之痘發熱以上諸熱久而不去內外感發則所蘊瘡疹之毒亦能乘間而出矣疹子只怕不能得出若出盡則便毒解故治疹子者發熱之時當察時令寒暄以藥發之如時太寒以桂枝葛根湯發之太熱以升麻葛根湯俱痘初熱合人參白虎湯發之痘渴不寒不熱以荊防敗毒散發之痘夾疹如兼疫癘之氣以人參敗毒散發之痘初熱如盡一劑不出再作本湯發之外用胡荽酒見形以苧麻蘸酒遍身憂之務令亟出如三四作更不出加腹中脹痛氣上喘促昏悶譫妄者必死證也瀉白消毒散桑白皮地骨皮二味自採鮮者各三錢牛蒡子炒研荊芥穗各一錢半桔梗甘草各一錢浮萍曬乾二錢上為粗末每服三五錢水一盞煎六分濾清服加味金沸草散旋覆花去梗麻黃去節水煮去沫曬乾前胡去蘆各七錢荊芥穗一兩甘草炙半夏湯泡七次薑汁拌炒赤芍藥各五錢鼠黏子炒浮萍各七錢上為末每服三錢生薑二片薄荷葉三五片煎防風解毒湯如溫暖之時以此辛涼之藥發之防風薄荷荊芥石膏知母桔梗甘草牛蒡子連翹木通枳殼淡竹葉黃連解毒湯如暄熱之時以此辛寒之藥發之防風黃芩黃連荊芥穗知母石膏黃柏酒炒梔子仁大青玄參甘草桔梗木通桂枝解毒湯如大寒之時以此辛溫熱之藥發之桂枝麻黃酒炒赤芍藥防風荊芥羌活甘草桔梗人參川芎牛蒡子生薑升麻解毒湯如時暖時寒以此辛平之藥發之升麻乾葛荊芥穗人參柴胡前胡牛蒡子桔梗防風羌活赤芍藥淡竹葉連翹甘草上方雖曰因時制宜亦不可拘泥如冬月亦有不宜麻桂而宜石膏者正當以脈證為主耳若株守而不知通變必有失不如用首二方之為妥當也發熱六七日以後明是疹子卻不見出此皮膚堅厚腠理閉密又或為風寒襲之曾有吐利乃伏也急用托裡發表之劑麻黃湯調柳葉散發之外用胡荽酒見形蘸麻刮之如一向未更衣者毒甚於里伏而不出也以七物升麻丸解之發之解之再不出者死證也麻黃湯麻黃去根節制過升麻牛蒡子炒蟬殼洗淨去足翅甘草各一錢煩渴加石膏末四錢上銼細加臘茶葉一錢水一盞煎七分去滓服柳葉散柳亦名西河柳亦名垂絲柳青茂時採葉曬乾為末每服一二錢茅根煎湯調下疹子初發熱時未見出現咳嗽百十聲不止上氣喘急面浮目胞腫宜甘桔湯消毒散瀉白散三方合用內桑白皮採鮮者多用熱盛煩渴加石膏末知母黃芩天花粉疹子發熱或自汗出或鼻衄者不須止之亦發散之義汗則毒從汗散衄則毒從衄解但不可太過如汗太多人參白虎湯痘渴合黃連解毒湯痘煩躁或黃連湯主之衄太多玄參地黃湯失血茅花湯主之黃連湯黃連麥門冬當歸黃柏黃芩生地黃黃耆水煎去滓調敗蒲扇灰服之茅花湯茅花真鬱金生地黃梔子仁黃芩水煎調百草霜服疹子發熱吐利乃火邪內迫純是熱證不可作寒論上焦多吐宜黃芩湯痘泄利加茅根蘆根枇杷葉下焦多利宜黃芩湯送下香連丸大科泄瀉中焦吐利俱多宜黃芩湯多加蘆根茅根煎調六一散痘初熱自利甚則裡急後重而為滯下宜加味黃芩湯調六一散大抵疹家吐利滯下宜於疹家求之不可作吐利滯下而治加味黃芩湯黃連黃芩各一錢半白芍藥三錢甘草七分滑石末三錢水煎服若滑石不煎調服止於一錢血痢加地榆二錢銅璧山人黃芩湯黃芩黃連赤芍藥生地黃木通枳殼甘草當歸梢人參水煎去滓調天水散服之初加酒大黃微利之疹出之時咽喉腫痛者乃毒火上熏而然勿作喉痹治法妄用針刺喉痹內作癰腫故宜決去惡血痘疹只是咽乾作痛宜甘桔湯加玄參牛蒡連翹或射干鼠黏子湯細細咽之錢氏甘露飲子俱咽喉亦可外用十全散玉鎖匙點之十全散黃連黃芩黃柏各一錢苦參孩兒茶雄黃各五分硼砂玄明粉各三分乳香一分片腦少許臨時入共為極細末每用五釐吹之疹子渴喜飲水純是火邪肺焦胃干心火內亢故也初發熱渴者前發散藥中多加石膏天花粉或葛根麥門冬散疹子出見渴者人參白虎湯痘渴加天花粉麥門冬渴甚者白虎湯合黃連解毒湯主之葛根麥門冬散乾葛麥門冬各一錢石膏升麻赤芍藥甘草茯苓人參各五分上銼細加淡竹葉七片水一盞煎七分去滓溫服白虎合解毒湯石膏研粗末四錢知母天花粉黃芩黃連山梔仁各一錢生地黃麥門冬各二錢入淡竹葉十片水二鍾煎一鍾更磨入犀角汁索湯水則與之覺胃熱渴甚宜以此方多與之胃清乃止庶免牙疳之害直至疳成而後清胃涼血解毒往往噬膚無及慈親仁人宜早為之所毋事姑息見形痘瘡貴三四次出謂出勻麻疹貴一齊湧出謂出盡麻疹只要得出便輕減以火照之遍身如塗朱之狀此將出之狀出形細密與痘瘡密者相似但疹子隨出隨沒非若痘子之以漸長大也出形鮮紅與傷寒發癍相似但疹子粒粒成瘡非若癍之皮紅成片如蚊蚤之跡也疹痘之色不可同論大抵痘子怕太紅皮嫩易破必生瘙癢疹子喜通紅疹發於心紅者火之正色也若色淡白者心血不足養血化癍湯主之色太紅殷或微紫者血熱也或出太甚者並宜大青湯主之黑者死證也養血化癍湯當歸身生地黃紅花蟬蛻人參各等分上銼細水一盞生薑一片煎六分去滓溫服無時大青湯大青玄參生地黃石膏知母木通甘草地骨皮荊芥穗各等分上銼細水一盞淡竹葉十二片煎七分去滓溫服疹子出沒常以六時為準假如子後出者午時即收午後出者子時即收乃陽生陰成陰生陽成造化自然之數也凡此旋出旋收者輕若一出連綿三四日不收者乃陽毒太甚宜大青湯解之逡巡不出者乃風外束皮膚閉密也宜荊防敗毒散主之夾疹瘡疹非熱不出疹子欲出則遍身發熱或煩躁或頭眩或身拘急及既出則身便涼諸病悉解此一層疹子隨收矣如疹子既出熱甚不減此毒壅遏宜大青湯解其表便澀者以黃連解毒湯痘煩躁合白虎湯發熱解其里大便不通者四順清涼飲主之發熱加味地骨皮散治疹出發熱不退飲食不進地骨皮鮮者三錢桑白皮鮮者二錢麥門冬二錢銀柴胡赤芍藥乾葛各一錢甘草生犀屑各五分水煎調大小無比散五七分方見痘初熱亦治喘急不止凡疹子只要出得盡則毒邪解散正氣和平如拂拂發熱煩悶不寧如蛇在灰如蚓在塵之狀或嘔吐或注泄此毒邪壅遏尚未出盡煩熱者黃連解毒湯煩躁嘔泄者柴胡橘皮湯並外用胡荽酒見形以苧麻蘸酒遍身戛之待疹子出盡則煩熱自去嘔泄自止矣俱可用大小無比散兼服柴胡橘皮湯柴胡橘皮黃芩半夏人參白茯苓各等分上銼細加竹茹一團生薑三片水一盞煎七分去滓溫服不拘時疹子欲出未出之時宜早發散以解其毒則無餘災若不預解使之盡出以致毒蓄於中或為壯熱日久枯瘁或成驚癇或為瀉痢或咳血喘促或作疳䘌而死此雖一時戾氣之染未有不由於人事之未盡者收後疹子收後身有微熱者此虛熱也不須施治待氣血和暢自然退去若熱太甚或日久不減以柴胡麥門冬散甚則以黃連解毒湯煩躁合人參白虎湯痘渴與前方相間服之如發枯毛豎肉消骨立漸漸羸瘦者柴胡四物湯主之疹子初起多瀉不妨惟愈後最忌重熱此不可不調治者蓋疹子發熱多至十一二日少亦不下五七日熱久元氣虛矣加之疹出飲食不進而復重熱陰陽耗竭不死何待故再熱者必大補氣血可也余見忽以為常而死者屢矣柴胡麥門冬散柴胡五分龍膽草三分麥門冬八分甘草二分人參玄參各半錢上銼細水煎服柴胡四物湯柴胡人參黃芩當歸身川芎生地黃白芍藥地骨皮知母麥門冬淡竹葉上銼細水一盞煎七分去滓溫服不拘時疹後熱不除忽作搐者不可與急驚風同論用導赤散心加人參麥門冬送服安神丸痘譫妄小便清者可治短少者不可治凡疹後牙齦黑爛肉腐血出臭息沖人者曰走馬疳馬鳴散主之痘餘毒若面頰浮腫環口青黑頰漏齒脫唇崩鼻壞者死證也如唇口多瘡其聲嗄啞者曰狐惑以化䘌丸主之痘餘毒更煩躁昏悶失聲者死證也文蛤散麻毒入胃牙肉黑爛出血走馬疳證雄黃五錢五倍子二錢枯礬五分蠶蛻紙燒存性一錢上細末米泔水洗淨以藥搽之雄黃散治同上雄黃一錢黃柏二錢麝香一分先用艾湯淨洗後搽藥疹退之後微微咳嗽者此餘毒未盡也瀉白散合消毒散主之若咳甚氣喘連聲不住甚至飲食湯水俱嗆出者此熱毒乘肺而然也宜門冬清肺湯加枇杷葉見血加茅根汁阿膠珠主之但見胸高如龜殼肩聳而喘血出口鼻擺手搖頭面色或青或赤或白而枯者皆不可治也門冬清肺湯天門冬去心麥門冬去心知母貝母桔梗款冬花甘草牛蒡子杏仁去皮尖研馬兜苓桑白皮地骨皮各等分上銼細水一盞煎七分去滓食後溫服疹出之時曾作泄利未經清解至疹退之後變為休息痢不問赤白裡急後重日夜無度此餘毒在大腸也以黃芩湯送下香連丸虛者加人參滑者加椿根白皮俱於丸藥內加之勿入煎藥疹子既收其毒不解邪火拂鬱渾身發熱晝夜不退發枯膚瘁漸成疳瘵以清熱除疳丸主之若不早治以致睡則揚睛口鼻氣冷手足厥逆微微瘛瘲變為慢風不救者多矣清熱除疳丸黃連當歸各二錢龍膽草青皮陳皮蘆薈各一錢五分川芎乾蟾頭燒各一錢使君子一錢二分共為末神麯糊為丸米湯下如渾身壯熱未至羸瘦但多搐掣煩躁不寧此熱在心脾二經也以當歸養血湯黃連安神丸間而服之當歸養血湯當歸川芎生地黃麥門冬去心木通甘草淡竹葉山梔仁燈心便祕少加大黃黃連安神丸黃連當歸龍膽草各二錢石菖蒲茯神各一錢五分全蠍七個共為細末湯浸蒸餅杵豬心血丸硃砂為衣燈草湯下幾見疹子收完之後出入動止如常忽然心腹絞痛而死者還是元氣虛弱曾受疫癘之氣外雖無病裡實虧損所以一發而死也謂之中惡間有用人參湯研蘇合香丸而蘇者禁忌疹家禁忌比痘家禁忌尤甚若誤食雞魚則終身但遇天行之時又令重出也鹽醋食之令咳不止五辛食之令生驚熱所以通禁必待四十九日之後方無禁也大熱未退不可與食與傷寒同一發之時既表之後切戒風寒冷水瓜果之類如一犯之則皮毛閉塞毒氣難泄遂變紫黑而死矣如極渴欲水只宜少與蔥白以滋其渴耳必須使皮竅中常微汗潤澤可也又忌梅桃魚蜂蜜香鮮之物恐惹疳蟲上行集之七脾臟部上脾錢脾主困實則困睡身熱飲水虛則吐瀉生風脾病困睡泄瀉不思飲食脾胃虛寒則面㿠白目無精光口鼻氣冷肌體瘦弱吐水腹痛不思乳食用益黃散下利用調中丸傷風手足冷者脾臟怯也先用益黃散補脾後用大青膏發散脾病見四季皆放餘四臟治之順者易治逆者難治脾怯當面赤目黃五臟相反隨證治之潔脾主濕自病則泄瀉多睡體重昏倦脾苦濕急食苦以燥之實則泄瀉赤黃睡不露睛瀉黃散主之虛則泄瀉色白睡露睛白朮散主之肝乘脾賊邪風瀉而嘔茯苓半夏湯主之心乘脾虛邪壯熱體重而瀉羌活黃芩蒼朮甘草湯主之肺乘脾實邪能食不大便而嘔吐嗽煎檳榔大黃湯下葶藶丸腎乘脾微邪惡寒泄瀉理中丸之類主之劉凡脾之得病必察肝心兩臟之虛實根其源之所起然後救療蓋肝是脾之鬼心是脾之母肝氣盛則鬼勝心氣虧則脾家生氣不足盛者抑之則退虧者益之不乏所以有抑脾氣益心氣兩藥診其脈肝心兩臟俱和則是脾自生疾察其虛實而治之薛前證實者病氣實而形氣虛也若面色㿠白吐瀉腹痛口鼻氣冷屬寒水侮土宜用益黃散若面青唇黯吐瀉手足並冷此脾土虛寒用乾薑理中湯若面色痿黃手足不冷此脾土虛弱用人參理中湯若傷風手足並冷吐痰咳嗽吐瀉腹脹此脾肺氣虛用五味異功散實脾氣加防風升麻散外邪若發於寅卯之時用六君柴胡升麻補脾土平肝木然面黃者脾之本色也面赤者火生土為順面青者木剋土為逆當平其所勝以補元氣為善海脾苦濕急食苦以燥之白朮脾欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連脾虛以甘草大棗之類補之如無他證以錢氏益黃散補之虛則補其母心乃脾之母以炒鹽補心益黃散錢氏又名補脾散治脾胃虛寒陳橘皮一兩青橘皮訶子肉甘草各半兩銼炒丁香二錢上為細末每服二錢水一盞煎至六分食前溫服東垣云閻孝忠編集錢氏方以益黃散補土又言風旺必克脾土當先實其脾昧者不審脾中寒熱一例用補脾藥又不審藥中有丁香青皮辛熱大瀉肺金脾虛之證豈可反瀉其子為寒水反來侮土中寒嘔吐腹痛瀉痢青白口鼻中氣冷益黃散神治之藥也如因服熱藥巴豆之類過劑損其脾胃或因暑天傷熱積熱損其脾胃而成吐瀉口鼻中氣熱而成慢驚者不可服之今立一方治胃中風熱名人參安胃散薛氏云脾土虛寒寒水侮之如東垣所云諸證宜用此方若因脾土虛弱吐瀉者用六君子湯加柴胡如不應或手足俱冷屬虛寒也更加木香炮姜若因乳母脾虛肝侮必治以前藥若乳母鬱怒致兒患前證母服加味歸脾湯人參安胃散治脾胃虛熱黃耆二錢人參陳皮去白各一錢生甘草炙甘草各半錢白芍藥七分白茯苓四分黃連少許上為粗末每服二三錢水煎五沸去滓溫服四君子湯六君子湯二方見吐瀉海脾實以枳實瀉之如無他證以錢氏瀉黃散瀉之實則瀉其子肺乃脾之子以桑白皮瀉肺瀉黃散錢氏又名瀉脾散藿香葉七錢山梔子仁一兩石膏半兩甘草三兩防風四兩去蘆切焙上銼同蜜酒微炒香為細末每服一錢至二錢水一盞煎至五分溫服清汁無時薛前證若作渴飲冷臥不露睛手足熱甚或遍身發黃屬胃經實熱宜用瀉黃散若作渴飲湯臥而露睛手足並冷屬胃經虛熱宜用異功散若面青搐搦乳食少思肝乘脾也用祕旨補脾湯若面赤驚悸身熱昏睡心乘脾也用祕旨安神丸若面白喘嗽肢體倦怠肺乘脾也用補中益氣湯若唇黑泄瀉手足指冷腎乘脾也用益黃散病後津液不足口乾作渴宜用七味白朮散若乳母膏粱厚味七情鬱火所致當審其因而治其母不乳食薛經曰胃為水穀之海六腑之大源也人身氣血腑臟俱由胃氣而生故東垣之法一以脾胃為主所謂補腎不若補脾正此意也在小兒雖得乳食水穀之氣未全尤仗胃氣胃氣一虛則四臟俱失所養矣故丹溪謂小兒多肝脾之疾也若面色㿠白目無晴光口中氣冷不食吐水肌瘦腹痛此胃氣虛寒之證用五味異功散或六君子湯主之若大便不實兼脾虛也加乾薑溫之中滿不利脾不運也加木香開之喜冷便祕胃實熱也用瀉黃散涼之命門火衰不能生土者用八味丸補之稟賦胃氣不足亦用此丸蓋下焦真陽充盛則上生脾元自能溫蒸水穀矣平胃散治脾胃不和不思飲食心腹脹痛口苦短氣噁心噯氣吞酸面黃體瘦嗜臥體痛霍亂吐瀉等證厚朴薑汁五兩陳皮甘草炙各一兩蒼朮米泔浸焙八兩上為末每服二錢薑棗水煎沸湯點服亦得常服調氣暖胃化宿食消痰飲闢四時不正之氣愚按前證若乳食停滯噯腐吞酸嘔噦噁心者宜服是方若飲食既消脾胃虛弱嘔吐噁心者則宜四君子湯調中丸治脾胃虛寒白朮人參甘草炒各五分八味地黃丸即六味地黃丸加肉桂附子各一兩治稟賦命門火衰不能生土以致脾土虛寒或飲食少思及食而不化腹臍疼痛夜多漩溺等證內經謂益火之源以消陰翳正此藥也錢氏益黃散一名補脾散治脾胃虛冷吐瀉方見前愚按前方若脾土虛寒或寒水侮土而嘔吐泄瀉手足並冷或痰涎上湧睡而露睛不思乳食者宜用此方若脾土虛弱吐瀉者用六君柴胡如不應或手足俱冷者屬虛寒加木香炮姜若因乳母脾虛肝侮亦治以前藥若乳母鬱怒致兒患前症者其母兼服加味歸脾湯參苓白朮散主脾胃虛弱飲食不進多困少氣中滿痞噫嘔吐逆此藥不寒不熱性味和平常服調脾悅色順正去邪人參去蘆白茯苓去皮粉草白朮白扁豆炒去殼山藥去黑皮縮砂仁薏苡仁桔梗銼炒九味各一兩蓮子肉去心上銼焙為末每服半錢至一錢用棗湯空心調服或溫米湯亦可健脾飲建脾養胃理嘔吐治瀉痢及諸病後氣色虛弱有痰噁心腹中微痛飲食減精神慢並宜服之厚朴去粗皮銼碎薑汁浸一宿慢火炒乾再入醇醋淬透仍以慢火炒人參去蘆各一兩白茯苓去皮肉豆蔻半夏湯者透濾仍銼焙乾益智仁淨香附良薑銼片東壁土炒訶子肉各二錢半甘草炙五錢上銼每服二錢水一盞姜二片棗一枚煎七分無時服藿香飲理虛化痰及治脾胃不和飲食少進正氣除邪人參去蘆半夏湯煮透濾銼片焙乾赤茯苓去皮甘草炙各一兩蒼朮去粗皮米泔水浸一宿濾干銼片用火炒至微黃色二兩陳皮去白藿香去梗各七錢半厚朴去粗皮制一兩半上件㕮咀每服二錢水一盞姜二片棗一枚煎七分空心溫服或入燒鹽同煎治小兒脾胃虛弱飲食少進用人參白朮茯苓甘草等分為末每服一錢鹽湯點服一方加陳皮縮砂治胃虛氣逆吮乳不食用人參一錢丁香藿香葉各半錢水半盞煎熟入乳汁少許煎服治胃弱吐逆手足心熱不進乳食用陳紅曲三錢半白朮一錢半麩炒甘草炙一錢為末每服半錢棗湯米飲下治脾胃不和嘔逆噁心乳食不進用厚朴薑製一錢白朮半錢乾薑炮甘草炙各三分水一盞姜二片煎空心熱服治宿食傷脾消食快膈用縮砂仁橘皮三稜莪朮神麯麥蘖各半兩香附子一兩各炒為末麵糊丸如麻子大食後白湯下隨大小加減丸數茅先生勻氣散桔梗五兩甘草炙二兩白姜一分縮砂仁陳橘皮茴香洗各一兩為末半錢或一錢霜木瓜煎湯調服紫蘇鹽湯亦得寶童多厚朴蒼朮良薑桂烏梅名養脾湯調理衆病醒脾散木香白朮並濕紙裹煨人參茯苓草果子甘草炙陳橘皮厚朴綱砂水煮紫蘇子上等分為末一錢水六分姜一片棗半個煎四分通口服健脾散治小兒胃氣白茯苓去皮人參各一兩厚朴三兩用薑汁炙蒼朮米泔浸一宿四兩陳橘皮去白五兩甘草二兩半生半熟草果子去皮二兩上件為末每服一錢薑棗同煎隨大小分減服調中飲子治小兒諸疾肉豆蔻白朮炮人參陳橘皮去白訶子炮去核茴香甘草炙縮砂仁各半兩藿香桂心檳榔各三錢上為末每服半錢一錢用薑棗煎水隨兒大小五分四分煎通口服寶童壯脾去積進食京三稜蓬莪朮醋紙裹煨益智去皮各四兩甘草炙四兩半陳皮青皮各二兩上為末湯點一錢不時服薑棗煎亦得治患後脾胃虛弱煩熱恍惚睡中多驚氣急煩亂溫養脾胃消進奶食勻氣清神調和臟腑神朮散白朮人參茯苓石蓮肉去心鶯粟米白扁豆藿香甘草炙等分細末半小錢棗湯調空心日午服漢東觀音散少白朮粟米多神麯白芷木香黃耆聖惠治脾胃不和見食欲嘔心胸壅悶前胡散前胡蘆根各三分桂心一分人參白朮赤茯苓枇杷葉去毛炙甘草炙厚朴姜炙各半兩粗羅一錢水一小盞姜少許煎五分不時量溫服張渙集香煎治脾胃虛不欲食羸瘦藿香葉厚朴薑製丁香沉香木香各一兩白茯苓白豆蔻白朮炮各半兩上為細末入麝香一錢水一升蜜半斤大棗三十枚姜二十片銀石器中慢火熬成膏去薑棗通風處陰乾每皂子大乳前米飲下調中散治小兒冷熱不調致脾胃不和木香銼人參去蘆頭青橘皮湯浸去白焙乾各一兩丁香白朮白茯苓大腹皮銼甘草上件搗羅為細末每服一錢水一小盞入生薑三片煎五分去滓溫服益胃丹調冷熱和脾胃當歸洗焙乾木香白朮沉香各一兩白芍藥人參去蘆頭蓬莪朮縮砂仁各半兩上件搗羅為細末白麵糊和如黍米大每服十粒至十五粒點麝香湯下量兒大小加減丁香黃耆散治小兒脾胃虛弱不能飲食已漸傷損榮衛致令肌體羸瘦時時下痢面色青白丁香綿黃耆銼人參去蘆頭白朮當歸洗焙乾鱉甲塗酥炙黃去裙襇各一兩胡黃連甘草炙各半兩上件搗羅為細末每服一錢水一盞入生薑二片棗二枚同煎至五分去滓溫服食前千金地黃丸治胃氣不調不嗜食生肌肉乾地黃大黃各兩六銖茯苓十八銖杏仁柴胡當歸各半兩上為末蜜丸如麻子每服五丸日三嬰孺治三七歲兒不食或嘔或頭熱或下利或渴或手腳熱有時冷每日一劑便能食鱉甲一兩當歸甘草炙升麻各二錢半椒五十粒汗上切水一升煮八合為三服相去人行六七里再服覺身上潤衣蓋取汗微汗勿深脾弱多困丹溪云脾具坤靜之德而有乾健之運夫胃陽也主氣脾陰也主血胃司納受脾司運化一納一運化生精氣清氣上升糟粕下降納五穀化津液其清者為榮濁者為衛陰陽得此謂之橐籥故東垣以脾胃為五臟之根本也脾氣既弱則健運之令不行化生之功已失職而嗜臥多困所由生焉法當溫補其脾脾氣既旺則臟腑清陽之氣升舉易於運行又何困倦之有海藏用四君子加木香砂仁半夏白朮倍之薑棗煎服誠良法也若脾虛好睡多驚則是心血虛而火動之宜安神養血若因心脾氣虛有痰者宜用人參五味子茯苓以補心氣當歸芍藥酸棗仁以養心血橘紅半夏以開痰若因脾肺氣虛胸膈有痰用補中益氣湯以健脾胃膽星天竺丸痰涎以化痰涎若因飲食停滯而作用四君子湯以益脾土山楂神麯以消飲食若因脾虛而好睡用五味異功散吐瀉以補脾氣當歸芍藥以生脾血芍藥須用酒拌炒黃不則酸寒傷脾此假熱以對假寒也若乳母飲酒致兒昏醉好睡者以乾薑陳皮煎湯解之不應用異功散加乾葛即愈矣海藏脾胃不和四君子加白朮一倍薑棗煎脾困四君子加木香砂仁人參各半錢煎脾胃虛弱生氣多困四君子加炒半夏曲沒石子等分為末入冬瓜子少許同煎本治脾風多困用人參散入慢驚參用人參冬瓜仁各半兩南星切片用漿水薑汁煮存性一兩上為細末每一錢水半盞煎二三分溫服痰涎聖惠兒多涎者風熱壅脾積聚成涎即乳食不下涎沫結實而生壯熱小兒多涎由脾氣不足不能四布津液而成若不治其本益中氣而徒去其痰涎痰涎雖病液亦元氣所附去之不已遂成虛脫余見驚搐壯熱等證醫以下痰小見功效屢下之而致夭亡者屢矣錢氏治朱監簿子五歲夜發熱曉如故醫以鐵粉丸下涎病益甚至五日大引飲錢取白朮散痘渴一兩煎三升任意服朱疑其瀉錢曰縱瀉勿怪但不可下耳止瀉治痰退熱清神皆此藥也又煎三升服稍盡愈第三日又服三升不渴無涎投阿膠散喘嗽二服安半夏丸治痰證若驚搐後風涎潮作服之神效半夏生用二兩赤茯苓去皮枳殼制各一兩風化朴硝二錢半上前三味銼焙為末入乳鉢同朴硝杵勻用生薑自然汁煮糯米粉為丸緑豆大每服三十丸至五十丸仍以淡薑湯食後臨睡送下兒小煮丸如粟谷大白附丸通治小兒咳嗽有痰感冒發熱吐瀉心神不安神效南星二兩半夏白附子白礬各一兩上為細末薑汁糊丸如桐子大一歲兒服八丸用薄荷湯化下南星半夏用冬藏雪水於六月六日浸起曬乾又浸凡九次方用膽星天竺丸治小兒痰涎上壅喘嗽不休牛膽南星一兩半夏湯泡去皮臍薑汁製白附子湯泡去皮臍各五錢天竺黃三錢天麻防風各二錢辰砂一錢另研水飛上為末甘草膏為丸芡實大每服一丸空心薄荷淡薑湯化下牛蒡子散治小兒心脾壅熱多涎牛蒡子梔子仁甘草川硝鬱金各半兩枳殼一分麩炒微黃去瓤上件藥搗細羅為散入龍腦半錢同研令勻不計時候用薄荷水調下半錢量兒大小加減服之萬全鬱金散治小兒風熱鎮心壓涎鬱金一兩用皂角二梃挼水一碗以來慢煮鬱金令乾用水淨洗銼天竺黃馬牙硝甘草炙各半兩硃砂一分研龍腦一錢研上件藥搗羅為末都研令勻每服半錢用麥門冬熟水調下量兒大小以意加減服小朱砂丸治小兒眠睡多驚化風壅痰涎安神硃砂一兩別研天南星牛膽內製者人參茯苓珍珠研半夏生薑半兩同以水煮一二百沸取出焙乾各稱末半兩龍腦麝香各少許上件同研勻以水浸蒸餅為丸如黍米大每服四五丸不計時候煎金銀湯下張渙治小兒多涎乳食不下涎不流出者乃名脾熱多涎宜金朱丹硃砂細研水飛半夏湯浸七遍牛膽南星各一兩白茯苓半兩三味為末石膏半兩細研水飛金箔二十片研上件都拌勻再細研用生薑自然汁和如黍米大每服十粒煎人參湯下乳後談氏金珠丸治小兒驚悸心忪化涎痰利胸膈煩熱止咳嗽天南星炮白礬焙半夏湯浸七錢硃砂研細各半兩人參乾山藥各一錢膩粉二錢金箔十片上為細末薄荷汁同水打糊為丸如緑豆大金箔為衣每服一丸食後生薑湯下量力服半夏丸治小兒脾熱乳食不下胸膈多涎半夏半分生薑湯洗七遍去滑皂角子仁半兩上件藥搗羅為末用生薑汁和丸如麻子大不計時候以溫水下三丸隨兒大小以意加減劉氏消乳痰丸此方出禁中小兒無疾亦宜常服大半夏半兩切作頭子大用蘿蔔一個亦切作頭子大用水一碗煮水盡為度不用蘿蔔人參二錢半取末二錢上二味焙乾同為細末生薑自然汁煮糊為丸如緑豆大每服二十丸或三十丸生薑湯下食後服看兒大小加減吐瀉曾小兒吐瀉並作即名霍亂有心痛而先吐者有腹痛而先瀉者莫不由中焦而作上焦主納而不出中焦主腐化水穀而生榮衛灌溉百骸下焦分別水穀主出而不納脾居中州胃為水穀之海乳哺入胃脾能克化然後水穀分臍上一寸有分水穴傳變得宜豈有吐瀉之患凡小兒吐瀉皆因六氣未完六淫易侵兼以調護失宜乳食不節遂使脾胃虛弱清濁相干蘊作而然有先瀉而後吐者乃脾胃虛冷其候先瀉白水吐亦不多口氣緩而神色慢額前有汗六脈沉濡此為冷也先吐而後瀉者乃脾胃有熱氣促唇紅吐來面赤脈洪而數渴飲水漿此為熱也冷熱之分要須詳審婁吐瀉昏睡露睛者胃虛熱錢氏白朮散和中散主之吐瀉昏睡不露睛者胃實熱錢氏玉露散河間益元散主之薛手足指冷者脾氣虛寒也用異功散加木香傷風吐瀉者風木克脾土也亦用前藥若飲熱乳而瀉黃者濕熱壅滯也用四苓散如不愈或反甚者元氣復傷也用白朮散瀉而腹中重墜者脾氣下陷也用補中益氣湯若服克滯之劑而腹中窄狹者脾氣虛痞也用六君子湯若面黃瀉青脾虛而肝乘之也用六君柴胡升麻木香若多噫瀉黃心脾氣虛也用六君炮薑升麻生下半月旬日內吐者止宜調治其母恐嬰兒臟腑脆弱不勝藥餌故也夏秋治里錢小兒初生三日內吐瀉壯熱不思乳食大便乳食不消或白色是傷寒當下之並和胃下用白餅子癖和胃用益黃散脾主之兒生三日以上至十日吐瀉身溫涼不思乳食大便青白色乳食不消此上實下虛也更有五臟兼見證肺睡露睛喘氣心驚悸飲水脾困倦饒睡肝呵缺煩悶腎不語畏明當先視兒兼藏證先瀉其所實者而補其虛如脾虛益黃散主之此二證多病於秋夏也五月夏至後吐瀉身壯熱者此熱也蓋小兒臟腑十分中九分熱也或因傷熱乳食不消瀉深黃色玉露散主之玉露散方一名甘露散寒水石半兩軟而微青黑中有細紋者生甘草一錢石膏半兩堅白而有牆壁手不可析者如無以方解石代之堅白似石膏敲之段段皆方者是上同為細末每服一字或五分一錢食後溫湯調下海藏云非腎熱相火大盛者不宜服此六月大暑後吐瀉身大溫而似熱臟腑中六分熱四分冷也吐嘔乳食不消瀉黃白色似渴或食乳或不食乳食前少服益黃散食後多服玉露散廣親宮五太尉病吐瀉不止米穀不化衆醫用溫藥一日而加喘吐不定錢氏曰當以涼藥治之所以然者謂傷熱在內也用石膏湯三服並服之衆醫皆言吐瀉多而米穀又不化當補脾何以用涼藥王信衆醫皆用補脾丁香散三服錢醫後至曰不可服此三日後必腹滿身熱飲水吐逆三日外果如所言所以然者謂六月熱甚伏入腹中而令引飲熱傷脾胃即大吐瀉也醫又行溫藥使上焦亦熱故喘而引飲三日當甚衆師不能治復召錢至見其熱證以白虎湯發熱三服更以白餅子下之一日減藥二分二日三日又與白虎湯各二服四日用石膏湯一服及旋合麥門冬黃芩腦子牛黃天竺黃茯苓以硃砂為衣服五丸竹葉湯化下熱退而安七月立秋後吐瀉身溫臟腑中三分熱七分冷也不能食乳多似睡悶亂哽氣長出氣睡露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露散廣親宮七太尉七歲病吐瀉是時七月其證全不食而昏睡睡覺而悶亂哽氣乾嘔大便或有或無不渴衆醫作驚治之疑睡故也錢曰先補脾後退熱與使君子丸疳補脾石膏湯退熱次日又以水銀硫黃末研和以姜水調下一字錢曰凡吐瀉五月內九分下而一分補八月內九分補而一分下此者是脾虛瀉醫妄治之至於虛損下之即死即當補脾若以使君子丸恐緩已又留溫胃益脾藥治之醫者李生曰何食而噦錢曰脾虛津少即嘔逆曰何瀉青褐水曰腸胃至虛冷極故也錢治而愈八月秋分後吐瀉身冷無陽也不能食乳乾嘔噦瀉青褐水當補脾益黃散主之不可下也田凡小兒盛暑吐瀉邪熱在下焦則瀉在上焦則吐亡津必渴用玉露散雖吐時時與啜之過三日必愈如身熱脈大小便黃用五苓益元各半熱湯調溫服之如身涼脈細小便青早晨益黃散午後玉露散如過四五日困弱宜異功散和中散開胃丸潔如有風而瀉用防風羌活謂吐瀉兼肝病風搐拘急也有熱而瀉用黃連黃芩大黃謂吐瀉兼心病身熱也有寒而瀉用附子謂吐瀉兼腎病身冷或足脛寒而逆也有濕而瀉用白朮茯苓謂吐瀉兼本臟脾病多睡體重昏倦也有肺病而瀉用芍藥桂心定喘麥冬人參甚者多檳榔大便不通加大黃謂吐瀉兼肺病喘嗽也更詳看病新舊新則止之久則有腸風之患宜推陳致新法當宣風散痘發熱導過後用入臟君臣藥調之宜益黃散曾有小兒盛夏初秋遇夜乘風渴而飲水過餐生冷果物攻激腸胃遂乃暴吐暴瀉傳作手足俱痹筋攣而痛痛則神志不寧以驚證治之誤矣所謂筋遇寒則引縮又以陽明養宗筋屬胃與大腸因內傷生冷飲食外感風邪吐瀉交作胃氣因虛不能養其宗筋亦致攣急此證口氣溫面色慘脈沉緩再以手按兩膝腕下見筋縮而引於皮間是其候也治以理中湯加附子半生半炮水姜熟煎空心溫服更詳虛實冷熱為治可也有數歲小兒忽患吐瀉始自夏秋晝近極熱之地解衣乘涼夜臥當風之所致蓋先感熱後感冷陰陽相搏氣射中焦名為霍亂活人書用香薷散調治以其能分別水穀升降陰陽又曰熱多欲飲水者五苓散寒多不飲水者理中丸詳此治法得非欲平中焦乎薛凡暑令吐瀉手足指熱作渴飲冷者屬陽證宜清涼之劑手足指冷作渴飲熱者屬陰證宜溫補之劑凡病屬陰證誤用寒涼者死則手足青黯或遍身皆然香薷飲治夏秋臟腑冷熱不調飲食不節吐痢心腹疼痛發熱煩悶香薷三兩白扁豆厚朴各一兩半生甘草二兩上銼每服二錢水一盞煎服車前子散治暑月霍亂吐瀉煩悶引飲不止小便不利白茯苓豬苓香薷車前子炒人參各等分上為末燈心湯調下不換金正氣散治脾胃不和寒熱往來臟腑虛熱霍亂吐瀉厚朴薑製藿香陳皮半夏蒼朮米泔浸甘草炙各等分上每服二三錢薑棗水煎服二順散治中暑霍亂吐瀉煩悶燥渴小便赤澀便血肚疼豬苓澤瀉茯苓白朮甘草炙官桂乾薑杏仁各一兩去皮尖雙仁炒上為末每服半錢不拘時水調下或水煎服六和湯治心脾不和氣不升降霍亂吐瀉咳嗽胸滿頭目疼痛嗜臥倦怠並陰陽不分冒暑伏熱煩悶成痢中酒作渴心逆畏食人參去蘆縮砂仁甘草炙杏仁泡去皮尖半夏湯煮透銼焙乾各一兩白扁豆炒熟銼去殼一斤碎切爛杵拌勻釀經一宿焙乾藿香赤茯苓去皮木瓜各二兩香藿厚朴去粗皮薑製慢火焙乾各四兩上每服二錢水一盞姜二片棗一枚煎七分無時溫服或入鹽半字同煎冬春治表錢傷寒吐瀉身溫乍涼乍熱睡多氣粗大便黃白色嘔吐乳食不消時咳嗽更有五臟兼見證當煎入臟君臣藥先服大青膏後服益黃散如先曾下或無下證慎不可下此乃脾肺受寒不能入脾也潔古云身溫吐瀉咳嗽是風木入於脾母虛其子亦弱法當煎檳榔豆蔻湯下大青膏後服益黃散傷風吐瀉身熱多睡能食乳飲水不止吐痰大便黃水此為胃虛熱渴吐瀉也當生胃中津液以止其渴止後用發散藥止渴多服白朮散發散大青膏主之潔古云吐瀉身熱而渴小便少者五苓散主之身熱而嘔者當服白朮散後煎檳榔木香湯下大青膏傷風吐瀉身涼吐沫瀉青白色悶亂不渴哽氣長出氣睡露睛此傷風荏苒輕怯因成吐瀉當補脾後發散補脾益黃散發散大青膏主之此二證多病於春冬也潔古云身涼吐瀉不渴者則知為寒煎附子桂枝湯下大青膏大青膏天麻末一分白附子末生一錢半蠍尾去毒生半錢硃砂研一字匕青黛一錢研麝香一字匕烏蛇稍肉酒浸焙乾取末半錢天竺黃一字匕研上同再研細生蜜和成膏每服半皂子大至一皂子大月中兒粳米大同牛黃膏溫薄荷水化一處服之五歲以上同甘露散服之小兒傷於風冷病吐瀉醫謂脾虛以溫補之不已復以涼藥治之又不能散謂之本傷風醫者亂攻之因脾氣積虛內不能散外不能解至十餘日其證多睡露睛身溫風在脾胃故大便不聚而為瀉當去脾間風風退則痢止宣風散主之後用使君子丸補其胃亦有諸吐痢久不瘥者則脾虛生風而成慢驚矣海吐瀉過多脾胃虛乏欲生風候者四君子加白附子減半生薑煎服守胃散治陰陽不和吐瀉不止預防風證常調脾胃進飲食人參去蘆白朮白茯苓去皮山藥去黑皮乾葛扁豆炒去殼南星銼碎瓦器盛東壁土同酷煮少時濾干切片焙甘草藿香去梗防風去蘆天麻各半兩上銼每服二錢水一鍾姜二片冬瓜子仁五十粒掐碎煎七分空心溫服如瀉不止入沉香白豆蔻同煎釣藤飲治吐利脾胃氣虛生風釣藤鉤二錢蟬殼天麻防風蠍尾去毒人參各半兩麻黃殭蠶炒甘草炙川芎各二錢五分麝香五分上為末水煎服虛寒加附子一錢身熱瀉黃多渴為熱宜涼劑曾氏云先吐而後瀉者乃脾胃有熱氣促唇紅吐來面赤脈洪而數渴飲水漿此為熱也錢氏以吐瀉身熱瀉黃多渴作熱病治在夏秋用玉露散益黃散相間服在春冬用白朮散大青膏相間服錢氏玉露散方見前李剛中治夏秋吐瀉好黃連一兩入虢丹一兩炒丹焦為細末麵糊丸如芥子服二三十粒壁土薑湯吞更量數服不妨丹溪治小兒周歲吐乳腹瀉白朮滑石末各三錢乾薑一錢陳皮甘草炙各五分上為粗末煎服肢冷瀉青不渴為寒宜溫藥曾氏云先瀉而後吐者乃脾胃虛冷其候先瀉白水或白凍吐亦不多口氣緩而神色慢額前有汗六脈沉濡此為冷也錢氏以吐瀉身涼瀉青不渴作寒病在秋以益黃散主之在冬春以益黃散大青膏相間服海吐利四肢脹逆腦門低陷四君子加藿香丁香芍藥等分煎服錢氏益黃散見脾萬安膏見吐世和胃丸治吐瀉不止欲生慢驚丁香白朮各一兩半夏五錢藿香蠍尾各一錢上為末薑汁打糊為丸如小豆大二歲兒三十丸薑湯下理中湯主溫脾暖胃冷吐冷瀉及胎氣虛中寒腹痛人參去蘆白朮各一兩乾薑炮粉草炙各二錢半上件銼焙為末每服半錢或一錢用溫白湯空心調服理中丸治吐利不止米穀不化手足厥冷人參白朮乾薑甘草炙各等分上為末麵糊為丸緑豆大每服十丸米飲下或一二十丸不拘時候金液丹治吐利日久脾胃虛損手足厥冷精神昏塞多睡露睛口鼻氣涼欲成慢驚風又治大人陽虛陰盛身冷脈微自汗吐利小便不禁舶上硫黃十兩先飛煉去砂石稱研為末用砂盒子盛令八分滿水和赤石脂鹽泥固封曬乾露地先埋一水罐盛水滿坐盒子在上又以泥固濟訖常以三斤火養三日三夜足加頂火一斤煆成冷取藥上以柳木捶乳鉢研為末每服二錢生薑米飲調下多服取效大人藥末一兩蒸餅一兩水浸去水餅和丸桐子大曬乾每服五十丸至百丸米飲空心下閻氏云吐瀉虛極當速生胃氣宜與理中丸並研金液丹末煎生薑米飲調灌之惟多服乃效俟胃氣已生手足漸熱然猶瘛瘲即減金液丹一二分增青州白丸子一二分同研如上服兼用異功散羌活膏溫白丸釣藤飲子之類仍頻與粥雖至危者往往死中得生十救八九沈存中論金液丹見小兒吐利劇氣已絶服之得活者數人須多服方驗錢豆蔻散治吐瀉煩渴腹脹小便少舶上硫黃一錢滑石五分丁香豆蔻各半分上為細末每服一字至半錢米飲調下無時張渙勻胃散治三焦不調停寒膈上乳哺不消胸膈痞滿甚則喘逆吐利肌體痿黃甘草炙一錢藿香白豆蔻人參各一兩木香乾薑炮厚朴姜炙丁香各半兩上為細末一錢水一小盞姜二片煎六分溫服王氏治吐逆兼吐利不止丁香藿香各一分木香一錢硫黃半兩別研極細滑石二錢研如粉上為末每服一錢或半錢米飲調下量大小與之如瀉即用附子一枚重半兩者炮去皮臍為末再用生薑汁搗成餅子用白麵裹之慢火煨面熟去面不用只將附子切焙再搗羅為末每吐兼瀉即入附子末少許如藥三之一更量虛實以米飲調下神驗吐如激水者亦定吐利不止多成慢驚宜速療之如已成慢驚兼金液丹與之助胃膏治脾胃虛寒吐瀉等證人參白朮白茯苓甘草炙丁香各五錢砂仁四十個木香三錢白豆蔻十四個乾山藥一兩肉豆蔻四個煨上為末蜜丸芡實大每服十丸米飲化下身溫瀉黃白似渴為寒熱雜合病錢氏治法在夏秋用玉露散益黃散相間服在冬春用益黃散大青膏相間服補虛四君子湯治脾氣虛損吐瀉少食人參白朮茯苓甘草各等分上每服二錢薑棗水煎六君子湯即四君子加陳皮半夏治脾胃氣虛吐瀉不食肌肉消瘦或肺虛痰嗽喘促惡寒或肝虛驚搐目眩自汗諸證並宜服之以滋化源錢氏異功散溫中和氣治吐瀉不思乳食凡小兒虛冷病先與數服以正其氣人參茯苓白朮甘草陳皮各等分一方加木香上為細末每服二錢水一盞生薑五片棗二枚同煎海藏云此方四君子湯補脾湯加減法也愚按前方治脾胃虛弱吐瀉不食或驚搐痰盛或睡而露睛手足指冷或脾肺虛弱咳嗽吐痰或虛熱上攻口舌生瘡弄舌流涎若母有證致兒患此者子母並服之和劑觀音散治小兒外感風冷內傷脾胃嘔逆吐瀉不進乳食久則漸至羸瘦大抵脾虛則瀉胃虛則吐脾胃俱虛則吐瀉不已此藥大能溫養脾胃進美飲食石蓮肉去心人參神麯炒各三錢茯苓二錢甘草炙木香綿黃耆炙白扁豆炒去皮白朮各一錢上銼散每服二錢水一盞棗一枚藿香三葉煎溫服溫中丸治小兒瀉白胃寒故也腹痛腸鳴吐酸水不思飲食霍亂吐瀉人參白朮甘草各等分上為末薑汁麵糊丸如緑豆大米飲下二三十丸無時和中散和胃止吐瀉定煩渴治腹痛人參茯苓白朮甘草炙乾葛黃耆炙白扁豆炒藿香各等分上為細末每服三錢水一盞半棗二枚去核生薑五片煎八分食前溫服海藏云和中散四君子湯加減法曾氏和中散附主久病才愈面黃清瘦神昏氣弱脾胃未實食物過傷停飲生痰留滯中脘耗虛真氣或成吐瀉此藥性味甘平大能調治常服和胃氣進飲食悅顏色理風痰人參去蘆白扁豆炒去殼白茯苓去皮川芎縮砂仁半夏制香附子甘草炙各一兩肉豆蔻訶子去核各七錢半上銼每服二錢水一盞姜三片棗一枚煎七分空心溫服或不拘時毛彬治胃氣不和吐瀉不止痰逆不食平胃引行諸藥銀白散半夏一兩洗七次焙薑制餅白扁豆炒鶯粟米人參白朮焙白茯苓山藥各四錢上為細末每服二錢水八分姜二片棗一枚煎六分溫服東垣人參安胃散脾除濕胃苓湯治腸胃受濕嘔吐泄瀉白朮茯苓澤瀉厚朴豬苓陳皮甘草炒各等分桂少許上為末每服二錢姜水燈心陳皮煎湯調下若停食吐瀉小便短少腹脹作痛用此以分利之更用六君子湯以調補脾胃治痰半粟散治小兒脾胃虛寒吐瀉等疾及治寒痰半夏湯浸切焙一兩陳粟米三分陳粳米亦得上㕮咀每服三錢水一大盞半生薑十片同煎至八分食前溫服白附丸痰涎宿食錢氏云吐瀉乳不化傷食也宜下之馮承務子五歲吐瀉壯熱不思食飲錢氏見目中黑睛少而白睛多面色㿠白曰此子必多病面色㿠白者神怯也黑睛少者腎虛也黑睛屬水本怯而虛故多病也縱長成必肌膚不壯不奈寒暑易虛易實脾胃亦怯更不可縱恣酒欲若不保養不過壯年也面上常無精神光澤者如婦人之失血也今吐利不食壯熱者傷食也又虛怯不可下下之虛入肺則嗽入心則驚入脾則瀉入腎則益虛但宜以消積丸磨化之為微有食也如傷甚則可下不下則成癖也若實食在內亦可下也下畢補脾必愈隨其虛實無不效者曾錢氏曰吐乳瀉黃是傷熱乳吐乳瀉青是傷冷乳皆當下之此迎奪之法也不若傷熱者用五苓散以導其逆傷冷者用理中湯以溫其中自然平復脾經積滯未除再為飲食所傷不吐則瀉不瀉則吐宜以三稜散化積守胃散和中丹小兒吐瀉黃疸三稜蓬朮陳皮青皮神麯麥芽黃連甘草白朮茯苓上為細末生薑燈心湯調服傷乳食吐瀉加山楂時氣吐瀉加滑石發熱加薄荷消積丸治小兒吐瀉大便酸臭丁香九個砂仁十二個巴豆二個烏梅肉二個上為末麵糊丸緑豆大溫水送下津液少豆蔻散治虛寒而渴本條白朮散治虛熱而渴渴聖惠治渴不止筍籜扁豆藤各半兩人參一兩上細銼分六服每水一小盞煎五分不時量分稍熱服張渙三和散治吐利津液燥少白茯苓一兩烏梅肉炒乾乾木瓜各等分為細末一錢水一小盞煎五分溫時時服治霍亂煩渴香豆散藿香肉豆蔻各一兩白扁豆人參各半兩甘草炙一分為末每一錢水八分盞姜二片煎四分溫服丁時發人參散治虛熱及吐利煩渴疏轉後服人參茯苓桔梗乾葛各半兩生犀角甘草炙各一分上為末每服一錢水一中盞燈心煎五分煩渴入新竹葉量服心腹痛聖惠兒冷熱不調乳哺不節使陰陽清濁之氣相干而變亂腸胃間則成霍亂而心腹痛者冷氣與真氣相擊或上攻心下攻腹故痛外臺療霍亂心腹刺痛吐利茯苓桔梗人參各六分白朮五分甘草炙厚朴炙各四分上切片用水二升煮六合溫服人參散治霍亂心腹痛不食人參白朮芎藭草豆蔻厚朴姜炙當歸炒陳皮去白丁香桂心各一分上搗羅為散不時薑棗米飲調半錢量服治霍亂乳食不消腹心滿痛訶梨勒皮半兩木香當歸炒白朮藿香陳皮去白各一分為細末不時薑湯調半錢量服肉豆蔻散治霍亂吐瀉腹痛肉豆蔻桂心各一分人參去蘆甘草炙各半兩上為粗末每服一錢水一小盞姜少許煎五分不時量兒大小分減溫服禁忌鄭氏云小兒吐瀉因外傷風冷內傷乳食或兒啼未定氣息未調以乳飼之氣逆於上則停滯胸膈致令嘔吐氣逆於下則傷脾胃致令泄瀉上下氣逆吐瀉俱作凡小兒只吐不瀉者逆其吐必有痰發驚者十無一生若只瀉不吐或吐瀉俱發者日久不退亦變陰癇治之當暫斷其乳輕者周時重者三日宜頻與稀粥服藥速效十全八九或者不信是言以小兒藉乳為命不肯暫斷然乳固不可斷也殊不知因乳所傷得之者若再以所傷之乳乳之如抱薪救火藥何功之有其間有不斷服藥得安者蓋輕患也亦有因輕致重夭橫者多矣活幼心書云小兒吐瀉不止大要節乳徐徐用藥調治必安節者撙節之義一日但三次或五次每以乳時不可過飽其吐自減及間以稀粥投之亦能和胃屢見不明此理惟欲進藥以求速效動輒斷乳三四日致餒甚而胃虛啼聲不已反激他證蓋人以食為命孩非乳不活豈容全斷其乳然乳即血也血屬陰其性冷吐多胃弱故節之醫者切須知此乳母亦宜服和氣血調脾胃等藥愚意不若兒大能食者全斷之待其平復兒小不能飲食者但節之可也吐薛嘔吐皆主脾胃古人謂脾虛則嘔胃虛則吐是也嘔者有聲無物吐者有物無聲若手足指熱喜飲熱湯或睡而露睛皆胃氣虛弱也用異功散若手足指熱飲冷或睡不露睛屬胃經實熱也用瀉黃散若作渴少食或小便色赤胃經虛熱也用七味白朮散大凡嬰兒在乳母尤當節飲食若乳母停食亦能致兒吐瀉故不可不慎也曾論吐之原難以枚舉有冷吐熱吐積吐傷風嗽吐傷乳吐其吐則同其證有異各述於後冷吐乳片不消多吐而少出脈息沉微面白眼慢氣緩神昏額上汗出此因風寒入胃或食生冷或傷宿乳胃虛不納而出宜溫胃去風除宿冷用當歸散水煨薑陳皮煎服或間投沖和飲理中湯及姜橘湯定吐飲如諸藥不效以參香飲治之熱吐面赤唇紅吐次少而出多乳片消而色黃遍體熱甚或因暑氣在胃或食熱物精神不慢而多煩躁此熱吐也宜解熱毒用大順飲溫熟水空心調下並五苓散小柴胡湯並加薑汁緩服及香薷散主之誤服熱藥先投緑豆飲解之次服止吐之劑積吐眼胞浮面微黃足冷肚熱晝輕夜重兒大者脈沉緩此宿冷滯脾故吐黃酸水或有清痰脈實而滑為食積所傷吐酸醙氣或宿食並出兒小者哯乳不化是也先用五苓散薑汁溫湯調下和解次以烏犀丸主之最小者投三稜散化癖丸傷風嗽吐有熱生風有風生痰痰結胸中肺氣不順連嗽不止和痰吐出此為嗽吐痰壅而作乃為實證宜去風化痰先投清肺飲次小柴胡湯為治若嗽久而肺虛土不生金故面白唇燥干嗽乾嘔而無痰可溫補為上用茯苓厚朴湯惺惺散如意膏為治傷乳吐才乳哺後即吐或少停而吐此因乳飲無度脾氣弱不能運化故有此證譬如小器盛物滿則溢治法宜節乳投三稜散此外又有風痰吐乃是傷風不解吐乳夾痰若多時必要生風宜服青州白丸子半夏散疏風下痰之劑皆可服之毒氣吐出巢氏病源挾驚吐張渙三香丹之類疳積吐出本事方凡霍亂吐不止者伏龍肝細末二錢以蘆稷米炒黃煎湯調下立止或用白扁豆炒過煎湯調下亦好若白扁豆嫩苗更好寒吐湯小兒寒吐者由乳母當風取涼解脫致令風冷入乳變敗兒若飲之故嘔吐也乳母當食後捏去舊宿敗乳急服理中湯次用釀乳法其候是寒清痰夾乳吐出是也凡有此候服藥不效胃氣將絶藥不能下當服靈砂丸如大便通宜來復丹二藥常用驗薛寒吐之證面目脹額汗出脈沉遲微寒氣停於胃故胃不納而吐出也噦逆者由胃氣虛甚過服克伐使清氣不升濁氣不降以致氣不宣通而作也風寒在胃者用理中丸胃氣虛者六君子湯風涼所致者宜捏去敗乳急服理中丸次服釀乳法若嘔吐清涎夾乳小便清利用大安丸若因乳母食厚味用東垣清胃散若乳母飲醇酒用葛花解酲湯飲燒酒服冷米醋三五杯乳母食生冷而致者用五味異功散乳母停食者母服大安丸子服異功散乳母勞役者子母俱服補中益氣湯乳母怒動肝火者用加味逍遙散乳母鬱怒傷脾者用歸脾湯乳母脾虛血弱者用六君芎歸其子亦服三五滴氣血虛而乳熱者子母俱服八珍散仍參熱吐霍亂治之世萬安膏治小兒脾胃虛弱腹生疳蟲癥瘕食積泄瀉常服消疳去積助胃氣和中疏氣滯人參厚朴薑製陳皮青皮肉桂夏不用乾薑各一兩木香沉香藿香甘草各半兩使君子炮十個澤瀉冬不用春秋減半用上為末煉蜜丸如芡實大食前米飲化下如熱薄荷湯下一方無木香沉香藿香青皮四君子有白朮蒼朮茯苓豬苓田朱沉丹治小兒嘔吐不止硃砂二錢半沉香二錢藿香三錢滑石半兩丁香十四粒上為細末每服半錢用新汲水一盞芝麻油滴成花子抄藥在上須臾墜濾去水卻用別水空心送下定吐紫金核治小兒一切嘔吐不止半夏湯洗七次薑製人參白朮木香丁香藿香各二錢半上為細末稀麵糊為丸如李核大後用沉香一錢為末硃砂一錢水飛二味同研勻為衣陰乾每服一丸用小棗一枚去核納藥在內濕紙裹燒熟嚼與小兒服後以米飲壓之香銀丸治吐丁香乾葛各一錢半夏湯浸切焙水銀各半兩上上三味同為細末將水銀與藥研勻生薑汁丸如麻子大每服一二丸至五七丸煎金銀花湯下無時本事白朮散治小兒吐嘔脈遲細有寒白朮人參半夏曲各二錢茯苓乾薑甘草各一錢上為末每服二錢水一盞姜三片棗一枚煎七分去滓溫服日二三一方無半夏曲有木香藿香姜橘湯治脾慢胃冷嘔吐不止白姜二錢炮陳橘皮去白一兩粉草炙三錢上件銼焙為末每服半錢或一錢用溫棗湯調化空心少與緩服定吐飲治吐逆投諸藥不止用此神效半夏湯洗七遍焙乾銼如緑豆大篩去細末二兩生薑乾淨和皮二兩薄桂去粗皮銼三錢上生薑切作小方塊緑豆大同前半夏和勻入小鐺內慢火順手炒令香熟帶干方下桂再炒勻微有香氣以皮紙攤盛地上出火毒候冷略播去黑焦末每服二錢水一盞姜二片煎七分稍空心少與緩服參香飲治胃虛作吐投諸藥不止人參去蘆一兩沉香丁香藿香和梗南木香各二錢半上銼每服二錢水一盞煎七分去滓臨入薑汁少許作三次空心溫服熱吐小兒秋夏伏暑多有熱吐其吐黃涎頭額溫五心熱小便或赤而少乃熱吐也或乾嘔而無物宜香薷飲薛小兒熱吐者因多食甘甜炙爆之物或乳母膏粱厚味胃經積熱或夏間暑氣內伏於胃所致若肌肉瞤動煩熱作渴者暑傷胃氣也先用香薷散次用竹茹湯若吐乳色黃不能受納者胃經有熱也先用瀉黃散次用人參安胃散若吐出酸穢者乳食內停也用保和丸吐乳不消者胃氣弱也用異功散吐而少食腹痛欲按者脾氣虛也用六君子加木香凡諸證當驗其手指熱則胃熱冷則胃寒熱用瀉黃散寒用理中湯不熱不寒異功散調之錢氏玉露散方見吐瀉香薷散治寒溫不適飲食失調或外因風寒暑邪致吐利心腹疼痛霍亂氣逆發熱頭痛或轉筋拘急或疼痛嘔噦四肢逆冷香薷一兩茯苓白扁豆炒厚朴薑汁製各五錢上每服二三錢水煎加酒半杯冷服立效竹茹湯治胃受邪熱心煩喜冷嘔吐不止葛根七錢半半夏炮半兩甘草炙三錢上每服一二錢入竹茹棗許大姜水煎取清汁微冷細細服加茯苓三錢尤妙錢氏藿香散治脾胃虛有熱面赤嘔吐涎嗽及轉過度者宜服麥門冬去心焙半夏曲炒甘草炙各半兩藿香一兩用葉石膏半兩上為末每服五分至一錢水一盞半煎七分食前溫服本事麥門冬散治小兒嘔吐脈數有熱麥門冬半夏人參茯苓各二錢甘草一錢上為末每服二錢水一盞姜三片煎至五分去滓溫服日二三服湯氏清膈飲子治小兒伏暑嘔吐香薷淡竹葉各一兩白茯苓人參半夏檀香甘草炙各半兩白粳米一合上㕮咀姜煎溫服大小加減聖惠麥門冬散治嘔吐不止心神煩熱麥門冬焙淡竹茹各半兩甘草炙人參茅根陳皮去白焙各一分上為粗末每服一錢水一小盞姜少許煎五分稍熱頻服量大小加減治嘔吐心煩熱蘆根粥生蘆根二兩粟米一合上用水二大盞煎至一半去滓投米作粥姜蜜少許食大順飲解冒暑毒煩渴吐瀉腹痛發熱神昏或衄血咯血及大腑下血小便黃少口乾汗多細面二十兩生薑十六兩赤茯苓去皮粉草各五兩上先以生薑方切如緑豆樣石鉢內杵爛入面再杵勻攤作薄片烈日中曝乾赤茯苓粉草二味細銼同前姜面片或曬或焙合研為末每服二錢新汲井水無時調服或溫熟湯緑豆飲解誤服劑熱之毒煩躁悶亂或作吐或狂渴宜先投下次服對證藥劑緑豆粉一兩淨黃連乾葛甘草各半兩上除緑豆粉外餘三味共為細末入乳鉢同緑豆粉杵勻每服半錢至一錢溫豉湯調服益元散治熱吐面赤氣粗小水短少傷暑作吐尤佳滑石六錢甘草一錢上為細末薑汁調燈心湯下吐甚者井花水下濟生竹茹湯治熱吐口渴煩躁橘紅乾葛甘草麥門冬竹茹生薑上水煎服熱甚者加姜連積吐烏犀丸主諸積滯夾驚夾風溫胃調脾消進飲食吐逆醋醙氣面黃肌瘦不拘孩兒生後歲月遠近並宜可投烏犀即皂莢銼三寸長皮灰火中見青煙起為度取出地上瓦碗蓋定存性冷用七錢硫黃白姜各三錢半陳皮去白川烏炮去皮臍各五錢巴豆七十七粒去殼膜心存油上硫黃一味先入碾內研細除巴豆外餘四味同焙為末仍以巴豆薄切在乳鉢內細杵再同前五味藥末杵勻用粳大米飯包作粽子一大個小瓦瓶盛水熟煮候冷取出沙鉢內爛杵細布兜緊捻出如稠糊安在別器內以藥末亭分同杵細軟丸粟殼大取諸積每服十五丸或五丸或二十一丸至三十三丸並用淡薑湯泡冷飯取汁一小盞五更初空心送下通利三五行以勻氣散止補治積吐有醋醙氣每服三丸至五丸用淡薑湯入米醋少許候溫空心投下傷風嗽吐茯苓厚朴湯主傷寒傷風夾痰嘔逆並吐瀉後喉涎牽響飲食減少脾胃氣虛白茯苓去皮半夏湯煮透濾仍銼焙乾各七錢半甘草三錢炙厚朴五錢去粗皮銼碎每斤用生薑一斤切薄片杵爛拌勻浸一宿慢火炒乾用上件㕮咀每服二錢水一盞半姜三片煎七分無時服或加棗一枚去核同煎傷乳吐乳下嬰兒乳哺太過或兒睡著而更銜乳豈有厭足以致脾不能運胃不能受滿而溢故令嘔吐長此不已遂致慢驚可不慎乎此候但令節乳為上甚者宜暫斷乳先令乳母服調氣之劑兒服消乳丸化乳消食為上若吐自口角出即是乳多不能消化滿溢之證非病也不可妄投它治吐藥凡吐乳直出而不停留者謂之哯乳但以炒麥芽三錢橘紅一錢丁香三分水煎服之立止消乳丸溫中快膈止嘔吐消乳食脈沉者傷食不化故也香附子炒二兩甘草炙陳皮去白各半兩縮砂仁神麯炒麥蘖炒各一兩上為末泡雪糕丸如黍米大七歲以上緑豆大三十丸食後薑湯下消食丸治小兒乳哺飲食取冷過度冷氣積於脾胃胃為水穀之海脾氣磨而消之胃氣調和則乳哺消化脾傷於冷則宿食不消此藥寬中快氣消乳食正顏色縮砂仁橘皮三稜煨蓬朮煨神麯炒麥蘖炒各半兩香附子一兩炒上為末麵糊丸緑豆大食後紫蘇湯下二十丸又方治百晬內嘔吐乳奶或大便青色用少婦乳汁一盞入丁香十粒陳皮一錢瓷器內煮數沸稍熱空心以綿球吮服風痰吐青州白丸子治一切風痰小兒驚風天南星生白附子生各三兩川烏頭去臍尖皮生五錢半夏去皮生七兩上用井花水浸次日早再換新水春五日夏三日秋七日冬十日曬乾為細末以糯米粉煎粥清為丸如緑豆大小兒驚風薄荷湯調下和蘇合香丸服名蘇青丸半夏散治小兒胃虛嘔吐水穀不化半夏一兩泡七次陳糯米三錢上銼散姜五片棗一枚同煎錢氏鐵粉丸治涎盛潮搐吐逆水銀砂子二錢硃砂一分鐵粉天南星炮去皮臍取末各一分輕粉二分上同研水銀星散盡為度薑汁糊丸如粟米大煎生薑湯下十五丸至二三十丸無時茯苓半夏湯治諸嘔噦心下堅痞膈間有痰水眩悸半夏湯泡五錢白茯苓二兩去皮上銼散每服三錢水一盞生薑三片煎去滓熱服不拘時二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或發為寒熱或因食生冷脾胃不和半夏湯洗七次橘紅各五錢白茯苓三錢甘草一錢半炙上銼散每服三錢水一盞姜三片烏梅一個同煎白附飲治肝風克脾土痰涎壅盛和飲食吐出蓋風能生痰痰壅其食故吐出白附子南星生用半夏生用川烏去皮臍生用天麻明亮者陳皮去白南木香全蠍去尾尖毒殭蠶去絲丁香各二錢上件銼每服二錢水一盞半姜三片慢火煎七分作五次空心溫服毒氣吐巢氏云春夏以湯與兒腸胃脆弱不勝藥勢遂吐下不止藥熏臟腑煩懊頓乏為中毒氣吐下千金藿香湯治毒氣吐下腹脹逆害乳哺藿香一兩生薑三兩青竹茹甘草炙各半兩熱加升麻半兩上㕮咀水二升煮八合服一合日二王氏消奶毒令兒吃乳無毒有毒亦解升麻半兩大麻子破一合上二味酒浸每日早晨與奶子一盞吃了要乳時須先捏去些小方與兒吃挾驚吐張渙三香丹治挾驚嘔吐不止藿香葉丁香各一兩半夏湯洗七遍焙乾半兩三味為末吹入膩粉一分龍腦麝香當門子各一錢並研上件同拌勻生薑取汁打白麵糊為丸黍米大每服十粒人參薄荷湯下量兒大小加減殊聖歸命丹歌曰小兒驚膈吐還頻晝夜連連不暫停淥水槐黃泔澱汁和蟲乳食一時噴丁香研共生犀服五膽牛黃立有勳若有得逢如此藥直饒命困卻還魂丁香藿香各一分生犀末牛黃各半錢豬鯽狗蝟熊膽等分共半兩多些無妨上為末丸如緑豆大量兒大小加減一歲以下煎苦楝湯研二丸治驚食胃管不快吐逆乳食或心胸發熱定吐丸丁香二十一枚為末蠍梢四十九條半夏三個洗焙乾為末上研勻煮棗肉丸如黍米大每服七丸至十丸金銀煎湯吞下如傷暑霍亂吐瀉煎香薷散送下良方治久患翻胃及小兒驚吐諸吐田季散上好硫黃半兩水銀一分研如黑煤色每服三錢生薑四兩取汁酒一盞同薑汁煎熟調藥空心服衣被蓋覆當自足指間汗出迤邐遍身汗徹即瘥此散極浮難調須先滴少水以指緩緩研殺稍稍增湯使令調和否則浮泛不可服王氏睡驚丸治熱化痰鎮心神治驚悸吐逆半夏薑製乳香犀角末各一錢上件同為末用生薑自然汁煮麵糊為丸如緑豆大薄荷湯臨臥服丹萬安膏調脾順氣定驚脾胃不足吐乳黃疸治小兒一切等疾木香檀香辰砂各三錢沉香二錢香附黃耆使君子各一兩檳榔肉豆蔻人參天竺黃各半兩白朮薄荷甘草各二兩琥珀真珠青黛犀角各二錢半麝香五分上為末煉蜜丸臨臥服薄荷汁或蜜水米飲化下全蠍觀音散治吐瀉截風定志庶免傳變慢驚黃耆炙人參各二錢半木香炙甘草蓮肉扁豆炒茯苓白芷全蠍羌活防風天麻各二錢上每服三五錢薑棗煎服疳積吐本事方治小兒疳積黃瘦吐食川烏一錢定粉三錢艾灰二錢龍骨二錢上為末滴水丸如龍眼核大捏作餅子每服一餅米飲磨下補虛安胃六神湯脾胃虛吐瀉不進飲食黃耆扁豆人參白朮茯苓炙甘草藿香各等分每服三四錢薑棗煎服和劑觀音散吐瀉人參散治小兒臟腑冷若才吃乳食即又吐出或因吃乳驚觸致作驚胕之狀令小兒外證面唇青白手足心熱口多清涎吐逆不住或作瀉候青黃紫白兼凍子或如鼻涕雞子清者或乳食不化並宜服之常服開胃益乳食人參白朮茯苓沉香白芍藥甘草各半兩上為細末以密器收之遇小兒有前項形證半歲一字二三歲半錢大者一錢煎棗子米飲調下或陳紫蘇湯亦可或吐瀉並作煎丁香湯下陳皮湯尤妙雜方經驗方治小兒吐不定用五倍子二個一生一熟甘草一握濕紙裹炮過同搗為末每服米泔調下半錢七瘥掌中金治小兒吃物吃乳即吐下水乳不得飲食白豆蔻十四個甘草一兩半炙半生砂仁十四個上為末逐旋安掌中與他干啖牙兒干糝口中亦可釀乳法治初生嬰兒凡有胎熱證當令乳母服藥不可求效之速治法當釀乳令兒吃漸次解之百無一失若遽以冷藥攻之必損脾胃加以嘔吐必成大患澤瀉二兩半豬苓去黑皮赤茯苓天花粉各一兩半乾生地黃二兩山茵陳用葉甘草各一兩上銼散每服五錢水一盞煎六分食後捏去舊乳卻服錢葉沫及痰或白緑水皆胃虛冷吐稠涎及血皆肺熱吐水不止者屬心痛胃冷吐水心痛者蟲痛口中吐沫水者後必蟲痛面㿠白無精光口中氣冷不思食吐水當補脾益黃散主之丹冬月吐蛔多是胃虛寒而蟲作吐用錢氏白朮散加丁香二粒亦可用理中湯去甘草加烏梅肉川椒瀉曾論瀉之原有冷瀉熱瀉傷食瀉水瀉積瀉驚瀉風瀉臟寒瀉疳積釀瀉種種不同各分於後冷瀉多是白水瀉密而少腹痛而鳴眉皺目慢面帶白色額有汗多用沖和飲慢驚當歸散潮熱合和水煨姜煎服並守中湯本條參苓白朮散不乳食益中膏本條沉香檳榔丸不乳食治之熱瀉大便黃色如筒吊水瀉過即止半日復然心煩口渴小便黃少食乳必粗先用五苓散驚或大順飲吐次以錢氏白朮散渴主之香薷散吐瀉亦佳傷食瀉乃脾胃素弱復為生冷果食所傷故大便不聚而瀉或因乳母餐生冷肥膩之物自乳而過亦能作瀉面唇俱白瀉稀而少或如壞雞子腥臭異常身形黃瘦宜先溫正胃氣次理積而後固脾沖和飲慢驚當歸散潮熱合和水煨薑棗子煎服理積兒大者烏犀丸吐小者化癖丸癖三稜散宿食固脾和中散吐瀉醒脾散慢驚水瀉謂之洞泄乃陰陽不順水穀不分瀉黃水而小便少番次密而無度是夏秋之際晝則解衣取涼夜則失蓋感冷冷熱相激清濁渾亂或因母自熱中來乳有熱氣遽以哺之令兒脾胃不和水穀交雜而下以㕮咀五苓散驚加薏苡仁車前子半夏水姜煎服分正陰陽或先用大順飲吐溫白湯調下香薷散吐瀉調中止瀉錢氏白朮散渴六和湯吐瀉亦好積瀉脾氣虛弱乳食入胃不能運化積滯日久再為冷食所傷傳之大腸遂成泄瀉留連不止諸藥無效蓋以積在脾胃積既未除何由得愈宜先去積後止瀉瀉止實脾則病除矣三稜散宿食烏犀丸吐續用沉香檳榔丸不乳食參苓白朮散慢驚和中散吐瀉香橘餅本條調理驚瀉糞青如苔稠若膠黏不可便止但鎮心抑肝和脾胃消乳食斯為治法先投五苓散驚次用三稜散宿食水姜倉米煎服或三解散潮熱神麯生薑煎湯調服及沉香檳榔丸不乳食不驚丹驚調治風瀉慢驚大病後有之其糞稀黃褐色或夾不消乳食同下此因脾虛所致或夾黑褐色者屬腎蓋脾虛為腎水所乘故也若久不進飲食再有驚搐宜疏腎水去脾風次補脾則自愈庶無復作之患疏腎水㕮咀五苓散驚加黑牽牛半生半炒並薏苡仁水姜煎服去脾風瀉黃散脾調脾氣參苓白朮散不乳食臟寒瀉糞如青竹色不稀不稠或下青水未瀉時腹痛而鳴叫哭方瀉多是生來三五月內有此周歲則無始因斷臍帶短風冷自外逼內而成此疾先用沖和飲慢驚水蔥白煎投溫中解表次以當歸散潮熱水煨姜煎服及投勻氣散疝理中湯吐瀉疳積釀瀉其候面色痿黃肚脹腳弱頭大項小發稀且豎肌肉消瘦不思飲食晝涼夜熱或腹內有症癖氣塊瀉則顏色不等其臭異常其瀉有時或一月半月旬日一番自瀉自止名為疳積釀瀉先以當歸散潮熱加三稜陳皮水姜煎服次投烏犀丸吐沉香檳榔丸不乳食及化癖丸癖蘆薈丸疳沒石子丸本條兒最小者難下丸子止投三稜散宿食快膈湯痞自然痊愈若瀉或痢色青甚而淡黃夾白寒多熱少此陰邪勝陽宜用守中湯胃苓湯俱本條與服扶表救里方進當歸散潮熱加陳皮紫蘇水姜糯米煎服亦宜和解理中湯吐瀉清米飲空心調服溫脾去濕益氣清神寒盛者理中湯內加熟附子水薑棗煎服次投南星腹皮飲水姜煎服和脾胃去陰邪若瀉或泄色青淡而有沫黃稠熱多寒少亦致面黃肌瘦煩躁不寧宜以㕮咀五苓散加薏苡仁車前子水姜煎服解散餘邪仍用茵陳蒿梔子仁煎湯調細末五苓散溫服退黃色消陽毒及當歸散水薑棗煎投或服萬安飲積熱四神丸養生治大小老虛之人不拘冷熱泄瀉黃連去須白芍藥並銼如豆吳茱萸各十兩上三味釜內慢火炒赤色放冷杵羅為細末每服三錢匕水一盞半煎至八九分去滓空腹食前溫服日三四服小兒量與或以水浸蒸餅丸如桐子大更丸一等如緑豆黃米大小兒每服十五丸至二十丸溫米飲下若作散以沸湯或溫米飲調下並可服病泄痢之人若不禁生冷魚肉肥膩與不服藥同一方有木香無芍藥醋糊丸茅先生香連丸治瀉利木香黃連茱萸半兩同於銚內炒令煙起取出去茱萸肉豆蔻訶子炮去核各半兩阿膠麵炒硃砂各一錢上為細末軟飯為丸如桐子大每服十丸十四丸用飯飲吞下兒小碎之乳香散治一切瀉痢乳香二錢用荷葉於炭火上炙令半熔放地上碗蓋另研肉豆蔻白姜甘草炙草果子各一兩上細銼用醋麵裹於熱灰內煨令赤色取出去面為末入乳香末拌勻每服半錢一錢陳米飯飲調下冷瀉薛湯氏云冷瀉者乃脾胃虛寒水穀不化而泄錢仲陽云小兒不能食乳瀉褐色身冷無陽也當用益黃散脾加減治之大便清白口不煩渴冷積瀉也理中湯吐瀉主之若口鼻吸風寒之氣脾胃受生冷之食而作者先用理中湯後用異功散命門火衰不能溫蒸中州之氣故脾胃虛寒者用益黃散及八味丸腎脾胃虛弱者五味異功散吐瀉脾氣下陷者補中益氣湯虛熱脾氣虛寒者人參理中湯寒水侮土者益黃散肝木乘脾者四君柴胡散手足並冷者加木香乾薑治者審之百問云冷積瀉沒石子丸極效人參散吐理中湯吐瀉加減服尤佳更加肉豆蔻則止來復丹大科中暑不換金正氣散吐瀉皆可觀音散吐瀉銀白散加減調治乃平和之劑也守中湯理春夏相交陰濕氣重中傷脾胃致腹痛泄利經久不止漸傳手足浮腫飲食少思桔梗去蘆銼炒蒼朮米泔水浸一宿去粗皮濾干銼片炒微黃色各二兩白姜四錢炮甘草六錢炙上件銼焙為末每服一錢空心沸湯調服㕮咀水煎亦可或用薑棗沒石子丸治嬰孩先因冷瀉或作赤白痢候久而變作諸般異色不止一端外證面或青或白唇舌乾焦手微冷渾身溫壯肚內刺痛啼叫睡臥不安若有是候當服沒石子木香黃連當歸青皮各二錢半上五味為末阿魏一分酒半盞浸化入面少許令勻煮糊為丸如粟米大一二歲兒服如椒目大者四五六歲兒服每服五十丸赤痢甘草湯下白痢乾薑湯下或五倍子湯下張渙川椒丸治小兒夏傷濕冷入腸胃泄瀉不止川椒一兩去閉目雙者並黑子揀淨慢火炒香熟為度肉豆蔻半兩上件搗羅為細末粳米飯和丸如黍米大每服十粒米飲下量兒大小加減粟煎湯治腸胃受風冷泄注不止身體壯熱白朮炮當歸洗焙乾川芎人參去蘆頭肉桂芍藥各一兩上件搗羅為細末每服一錢水一小盞入生薑三片粟米一匙頭許煎至五分粟米熟去滓放溫服溫中丸治胃寒瀉白腹痛腸鳴方見吐瀉孔氏治臟腑不調大便青色白朮人參茯苓各一錢甘草炙半錢上末一錢水一小盞煎七分溫服丹溪云瀉青亦是寒宜用蘇合香丸平胃散各等分蜜湯調服田氏云便青者因驚風內藏脾氣不和宜白朮湯熱瀉湯氏云小兒熱瀉者大便黃而赤或有沫乃臟中有積或因乳母好飲酒或嗜熱物或生下傷濕蘊熱醫者不明但用豆蔻訶子等藥服之如水澆石既不識其證故不辨其冷熱用藥又不得其法焉能取效此證當以小便赤少口乾煩躁為驗治法當用錢氏白朮散渴去木香用之五苓散驚去桂亦可服其熱甚者四逆散大柴胡湯俱傷寒去大黃服之殊驗也更用黃連丸疳等劑亦佳調中湯痢去大黃加黃連枳殼如夾熱而瀉太陽與少陽合病自下利者與黃芩湯嘔者加半夏又有挾熱瀉痢而小便祕澀赤甚者加減四順清涼飲裡熱治之即止薛氏云右腮色赤飲冷胃經實熱也用瀉黃散脾惡冷喜熱胃經虛熱也用白朮散渴右腮及額間俱赤心脾翕熱也用瀉黃散加炒黑黃連若左頰右腮俱赤肝火乘脾土也用四君子湯吐瀉加柴胡若兒暴傷乳食用保和丸宿食乳母尤當忌厚味節飲食若乳母停食所傷致兒吐瀉等病當治其母大抵始病而熱者邪氣勝則實也終變為寒者真氣奪則虛也久病而熱者內真寒而外假熱也久瀉元氣虛寒當參前證治之黃芩湯治下利而頭痛胸滿口苦咽乾或往來寒熱而嘔其脈浮大而弦者或協熱而利者黃芩一兩半芍藥甘草炙各一兩上銼散每服三錢棗子一個水一盞煎七分去滓溫服嘔者加半夏一兩二錢半生薑煎張渙清胃散治挾熱泄利川楝子黃柏微焙炙當歸洗焙乾地榆炙黃連去須炒各半兩上件搗羅為細末每服一錢水八分煎至四分去滓溫服乳食前香連丸黃連薑汁拌炒二兩木香煨半兩上為末陳米飯丸緑豆大米飲下一二十丸亦可調六一散傷食瀉湯氏云凡此瀉不宜便補先用消食藥或用紫霜丸變蒸熱取其積盡然後可補經云食瀉重當取疳虛用補虛治食瀉與香橘餅子加減觀音散調中湯散以意加減凡傷食瀉難止亦不宜補再傷又瀉宜節飲食當用進食丸痞取下食積令盡次以錢氏加減益黃散只一味止此乃切要治法然後異功散四君子湯俱吐瀉調理必取全安有腹中雷鳴下痢者生薑瀉心湯主之如冷積釀瀉用香朴散止之白朮散以和氣調胃調中散保安丸能止傷食瀉感應丸沉香煎三稜丸癖積皆可服也東垣云傷食則惡食小兒食瀉者因飲食傷脾脾氣不能健運故乳食不化而出若噯臭吞酸胸膈脹滿腹痛按之益痛者雖作瀉而所停滯之物尚未消也用保和丸腹痛按之不痛者乳食已消也用異功散脾氣傷而未復不思飲食者用六君子湯所傷生冷之物及喜熱者並加木香乾薑乳食已消腹痛已止瀉尚未止者脾失清升之氣也用補中益氣湯余有別證當參各門錢黃承務子二歲病傷食而瀉衆醫與止之十餘日便青白乳食不消身涼加哽氣昏睡咸謂困篤召錢錢先與益黃散補肺散各三服三日身溫而不哽氣後以白餅子微下之又與益脾散三服利止何以然利本脾虛傷食初不與下之留連十日上實下虛脾氣弱則引肺亦虛脾肺子母故也今先補脾則肺病自退即身溫不哽氣也然後下其所傷或曰何不先下後補曰便青為下臟冷若先下必大虛今先實脾而後下則不虛矣後更與補之乃安香橘餅止積瀉傷冷木香青皮各一錢陳皮二錢半厚朴薑汁製神麯麥蘖各半兩上為末蜜丸為餅紫蘇米飲調下加減觀音散止吐瀉截虛風黃耆人參各二錢五分木香甘草炙石蓮去心扁豆炒茯苓白朮全蠍羌活各一錢防風天麻各二錢上銼散薑棗煎調中散治傷食瀉凡此瀉不宜便補先用食藥或紫霜丸取其積盡然後可補經云食瀉重當取疳虛用補虛良醫明妙理何慮疾難除人參去蘆白茯苓白朮木香乾薑炮藿香葉香附子炒去毛縮砂仁甘草炙丁香各等分上為末每服一錢薑棗湯調下肚痛白湯下量大小加減生薑瀉心湯治傷寒汗出解後胃中不和心下痞硬脅下有水氣腹中雷鳴下利者黃芩甘草炙人參各一兩半乾薑炮黃連各半兩半夏一兩一錢湯泡上銼散每服三錢水一盞生薑三片棗一枚煎七分去滓溫服保安丸治小兒瀼瀉傷食瀉香附子淨砂仁各一兩白姜炮青皮去穰陳皮去白三稜炮莪朮炮甘草炙各半兩上為末麥蘖麵糊丸緑豆大每服三丸白湯下食前溫服杏霜丸治小兒食積作瀉並痢證杏仁三兩去皮尖麩炒巴豆一兩去殼油炒焦卻入杏仁同炒黃蠟二兩酒煮綿濾百草霜炒為末二兩用油六錢炒勻上將杏仁巴豆研極細卻入草霜令勻熔蠟和丸如緑豆大赤痢甘草湯白痢生薑湯先進三四服腹脹者十餘服效驗如神醫局開胃丸治小兒腑臟怯弱內受風冷腹脅脹滿腸鳴泄利或青或白乳食不化又治臟冷夜啼胎寒腹痛木香蓬莪朮白朮人參去蘆頭當歸銼微炒各半兩麝香細研白芍藥各一分上件搗羅為末都研令勻湯浸炊餅和丸如黍米大每服十五丸溫米飲下新生兒腹痛夜啼可服五丸並乳食前服水瀉聖惠厚朴散治小兒脾胃不和洞瀉下利不止羸瘦食少厚朴去粗皮塗生薑汁炙令香熟人參去蘆頭訶梨勒煨用皮白朮黃連去須微炒地榆微炙銼各一分甘草炙微赤銼乾薑炮裂銼各半分肉豆蔻一枚去殼上件搗細羅為散每服以粥飲調下半錢日三四服量兒大小以意加減張渙厚朴散治洞泄注下厚朴生薑汁製訶梨勒炮取皮肉豆蔻各一兩白朮乾薑炮各半兩上件搗羅為細末每服一錢水八分盞入生薑粟米各少許煎五分去滓溫服萬全龍骨丸治小兒冷熱不調時有洞泄下利不止龍骨黃連白石脂白礬燒令汁盡乾薑炮木香各半兩上件藥搗羅為末醋煮麵糊為丸如麻子大每服以粥飲下五丸日三四服量兒大小加減服之劉氏小兒水瀉注下黃連石蓮各等分炒黃色上為末每服半錢水瀉新汲水調下白瀉粟米飲下積瀉香橘餅治嬰孩過傷乳食或吐或瀉及病後虛中感積成痢氣弱神昏面黃目慢南木香陳橘皮去白青皮去白各二錢半厚朴去粗皮薑汁製七錢縮砂仁神麯濕紙裹炮麥芽淨洗焙乾各五錢三稜炮銼三錢上木香不過火餘七味銼焙仍同木香研為細末煉蜜作餅子如芡實大每服一餅至三餅用棗湯化開空心溫投米清湯亦可驚瀉仲陽云慢驚病後或吐瀉胃虛或氣弱因驚眼白如淡墨下糞青黃此瀉合溫補至聖保命丹釣藤飲夜啼主之或乳隨糞下消乳丸吐進食丸痞主之或微渴心脾喘燥狂熱此瀉尤難治辰砂五苓散驚主之冷者定命飲子治之後與溫驚朱君散睡驚太乙丹薛小兒驚瀉者肝主驚肝木也盛則必傳克於脾脾土既衰則乳食不化水道不調故泄瀉色青或兼發搐者蓋青乃肝之色搐乃肝之證也亦有因乳母脾虛受驚及怒動肝火而致者經曰怒則氣逆甚則嘔血及飧泄法當平肝補脾慎勿用峻攻之藥脾氣益虛肝邪彌甚甚至抽搐反張者亦肝火熾盛中州虧損之變證也凡見驚證即宜用四君六君異功散等方加白附子定風柴胡平肝引經以杜漸則必不至瀉搐而自安矣今已見瀉吐驚搐尚不知補脾平肝以保命抱龍鎮驚等藥治之其亦去生遠矣至聖保命丹治小兒胎驚內釣腹肚緊硬眠睡不安夜多啼哭及治急慢驚風眼目上視手足抽掣不省人事悉皆主之冷證用此金蠍十四個去毒防風殭蠶炒去絲嘴南星炮天麻各二錢白附子麝香五分金箔十片蟬蛻洗硃砂各一錢有熱證加牛黃腦子硼砂上為末粳米糊丸每兩作四十丸常服鎮心安神化痰除一切驚風諸證湯臨時換一方加人參白茯苓二錢定命飲子治慢驚吐瀉困重欲傳慢脾通用半夏生揀圓白者茯苓木香老生薑切片干各二錢白朮甘草炙各一錢天麻二錢半上銼散每服二錢薑棗湯調下朱君散治吐瀉後有此證並糞青者宜服之人參白朮茯苓甘草辰砂麝香燈心釣藤上為末每服一錢用白湯調下睡驚太乙丹常服安神鎮驚止夜啼糞青桔梗一兩炒藿香葉白扁豆炒各半兩白芷三錢川芎二錢半上為末煉蜜丸如芡實大辰砂麝香為衣每服半丸薄荷湯磨下正糞色棗湯下夜啼燈心釣藤湯磨下加白朮茯苓白芍藥尤妙四神丸治脾虛胃弱大便不實飲食不思或泄痢腹痛肉豆蔻五味子各二兩補骨脂四兩吳茱萸一兩上為細末用紅棗六十五枚生薑六兩用水二鍾煮乾取棗肉和丸如桐子大每服五六十丸白湯送下或化服二神丸補骨脂四兩肉豆蔻二兩生用上為末用紅棗四十九枚生薑四兩用水一鍾煮乾取棗肉和丸如桐子大每服二三十丸白滾湯下疳積釀瀉沒石子丸治久患疳痢及釀瀉沒石子二枚南木香濕紙包略煨淨黃連銼碎薑汁炒各二錢半肉豆蔻二枚炮訶子四枚炮去核上銼焙成末如烏犀丸內製飯糊為丸粟谷大每服十丸至三十丸或五十丸溫白湯空心下或米清湯下暴瀉巢氏小兒卒利者由腸胃虛暴為冷熱之氣所傷而為卒利熱則色黃赤冷則色青白若冷熱相交則變為赤白滯利也聖惠胡黃連散治小兒冷熱氣不和忽暴下利腹內疼痛胡黃連母丁香桂心木香肉豆蔻去殼當歸銼微炒麝香細研各一分犀角屑半分上件藥搗細羅為散每服以粥飲調下半錢日三四服量兒大小加減龍骨散治小兒暴利龍骨黃連去須微炒各一兩當歸銼微炒枳殼麩炒微黃去瓤各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服張渙阿膠丹治泄利身熱及暴瀉注下真阿膠炙熟乾薑各一兩芍藥當歸洗焙乾川黃連肉豆蔻各半兩上件搗羅為細末煉蜜和丸如黍米大每服十粒粟米飲下量兒大小加減神仙玉粉丹補一切虛不熱男婦小兒皆可服冷積暴瀉見功尤速精明舶上硫黃一斤去砂石盡打碎上用豶豬肚七個旋採桑根白皮三斤寸銼將豬肚一個淨洗以硫黃實之用麻線縫合水二斗先將桑根白皮一斤同煮一伏時其餘諸肚亦用慢火養之不得令冷候煮滿一伏時別以豬肚換之又用白皮內一斤同煮再一伏時又換豬肚並桑白皮過三伏時不換白皮只換豬肚共煮七伏時水耗以熱湯添不得用冷水候滿七伏時取出用溫水淘淨研至細候烈日中曬極熱再研煮糯米粉為糊丸如梧桐子大每服空心米飲下十粒至十五粒大率驅除宿冷其功效無比老人經久可服久瀉大法補虛消積鳳髓經歌云脾中有積熱遲留至使終年瀉不休項軟見人多哽氣更兼清水鼻中流少間有似黃金色若有垂腸更不收形證又看胸膈上胸前深赤汗如油唇赤生瘡眼脈赤若不調脾命即休千金七味散治利下久不瘥黃連八分龍骨赤石脂厚朴烏梅肉各二分甘草炙一分阿膠炙三分上治下篩漿水服二方寸匕日二小兒一錢匕華陀治老小下利柴立不能食入口即出命在旦夕久利神驗方黃連末亂髮灰醇苦酒蜜各半雞子殼許白蠟方寸匕雞子黃一枚上六味於銅器中炭火上先內酒蜜蠟雞子黃攪勻乃內黃連末發灰又攪煎視可取出為丸久困者一日一夜盡之外臺療久利無間冷熱疳痢悉主之棗一枚去核勿令皮破內胡粉令滿於炭火中燒如炭瓷器中研之米飲和服一歲以下分服之不過三服瘥聖惠治久利赤白漸羸胃虛不食丁香散丁香厚朴去粗皮塗生薑汁炙令香熟黃連去須銼微炒當歸銼微炒訶梨勒煨用皮白朮銼微炒伏龍肝各半兩木香一分赤石脂一兩上件藥搗細羅為散每服以粥飲調下半錢日三四服量兒大小加減聖惠黃連丸治小兒暴利經久不斷增減有時黃連去須微炒人參去蘆頭赤石脂龍骨甘草炙微赤銼黃芩厚朴去粗皮塗生薑汁炙令香熟白茯苓枳殼去瓤麩炒微黃各半兩烏梅肉一分微炒上件藥搗羅為末煉蜜和丸如麻子大每服以粥飲下七丸日三四服量兒大小臨時加減談氏斗門散歌曰小兒瀉利甚青黃久患時多轉滑腸下部脫肛頻努咽朝朝焦瘦漸羸尫訶子枳殼地榆各等分上為末每服一錢米飲調下一歲以下半錢嬰孺龍骨湯治下利不住龍骨甘草炙黃連各四分當歸乾薑各一分上以水四升煮一升二合食前溫分三服龍骨湯治服藥下後不止龍骨五分甘草炙乾薑當歸黃連赤石脂附子炮裂去皮臍前胡各三分上以水四升煮一升二合為五服旦服至午令盡黃連煎治冷熱利經時不止體羸不堪余治瘥而又發用好黃連二兩水七升蜜八合煎一升三合絞去滓百日兒服半合二百日一歲服一合雞骨丸治下利經久不斷羸瘦脾胃冷弱食不消化雞骨宿雌雞胸前及肋骨全用一具黃連六分厚朴三分神麯炒甘草炙白朮各四分麥蘖炒烏梅肉各二分人參赤石脂黃芩白龍骨各五分桔梗二分上為末蜜丸小豆大白飲下二十五丸日二服量兒大小與之溫白丸治久瀉脾虛不食食即瀉下米穀不化白朮一分米泔浸切焙丁香半錢炒半夏一錢半湯泡洗七遍上為末生薑自然汁煮麵糊為丸如梧桐子大半歲每服三丸三五歲五七丸淡生薑湯吞下早晚各進一服惺惺散治久瀉脾困不思乳食恐作脾風天麻全蠍炒各半錢木香炮糯米人參茯苓各微炒白扁豆炒山藥焙甘草炙各一錢上為末每服嬰孺一字二三歲半錢用水一藥注或半銀盞棗子半片煎十數沸服張渙治瀉利久不瘥香礬丹木香枯白礬各一兩訶梨勒皮微炮酸石榴皮炒黑各半兩上件搗羅為細末煉蜜和丸如黍米大每服十粒粥飲下量兒大小加減劉氏治小兒臟腑久泄瀉不止人參白朮茯苓甘草陳皮藿香丁香木香肉豆蔻上等分為末每服二錢以藿香合糯米煮粥飲調下或姜水煎亦可臟腑滑泄四君子加訶子五分米飲調下飧瀉醫書謂之水穀瀉錢食不消脾胃冷故不能消化當補脾益黃散主之潔乳食不消初病忽然氣出冷四肢亦冷面白無光澤精神不定此乃胃氣不和可以大溫藥治之使君子丸益黃散主之若病泄瀉日久不瘥乳食不化是脾胃有風冷先服益黃散二服後用宣風散導之胃宜再補宜參大科飧泄門用之聖惠厚朴散治小兒水穀利羸瘦面黃不欲飲食厚朴去粗皮塗生薑汁炙令香熟龍骨黃連去須微炒各半兩丁香當歸銼微炒木香白朮肉豆蔻各一分上件藥搗細羅為散每服以粥飲調下半錢日三四服量兒大小加減地榆散治水穀利日夜不止地榆微炙銼厚朴去粗皮塗生薑汁炙令香熟各三分黃連一兩去須微炒阿膠半兩搗碎炒令黃色上件藥搗細羅為散不計時候以粥飲調下半錢量大小加減醫局胃風湯治風冷乘虛入客腸胃水穀不化泄瀉注下腹脅滿腸鳴㽲痛及腸胃濕毒下如豆汁或下瘀血日夜無度並宜服之人參去蘆頭白茯苓去皮芎藭桂皮去粗皮當歸去苗白芍藥白朮各等分上為粗散每服二錢以水一大盞入粟米百粒同煎七分去滓稍熱服空心食前小兒量減小兒大便青瓣飧泄脈大手足寒難已脈小手足溫易已赤白痢湯氏云小兒痢疾皆因飲食無節或餐果食肉不知厭足乃脾胃尚弱不能克化停積於臟故成痢也熱搏則赤風寒之氣入於腸胃致令津液凝滯則成白痢或夾青者有驚積或如魚腦肚中疼甚者大抵八痢但冷熱赤白藥性雖有不同治法不相遠矣又有赤白相雜者當先去其熱積須用大黃枳實朴硝之類以去其熱毒然後黃連黃芩黃柏解其熱痢自止疼自定此妙法也如痢不止則用地榆熟艾等劑調理自然平復脾虛者不可輕用罌粟澀滯等劑必致危困須用沒石子黃連阿膠地榆以止之方為盡善其枳殼芍藥皆要藥也噤口痢不能食者石蓮散主之香脯散亦可冷痢如豆汁肚疼者胃風湯主之脾毒痢臟熱當服香連丸黃連香薷散去桂五苓散驚茅花湯當歸芍藥枳殼地榆川芎等劑先與解毒退熱卻與開胃進食分利水穀寬腸定痛先與水浸丹局方敗毒散痘初熱地榆飲寬腸枳殼散有熱而痢不止者三黃熟艾湯主之積滯不通者神芎丸亦可用熱甚煩躁者黃連解毒湯解之煩躁潑火散亦效曾赤白之痢世人莫不曰赤為陽為熱白為陰為冷或曰無積不成痢至於調治若以冷熱之劑互進或投去積之藥必難取效不究其原何由可療且四時八風之中人五運六氣之相勝夏秋人多痢疾內經曰春傷於風夏生飧泄至真要大論曰少陽在泉火淫所勝民病注泄赤白其可拘於無積不成痢之說若專以積為論豈一歲之中獨於夏秋人皆有積春冬不然蓋風邪入胃木能勝土不為暴下則成痢疾赤白交雜此為陰陽不分法當分正陰陽五苓散以導其逆理中湯以溫其胃使色歸一然後施治若一分之後仍赤白同下則當究其所患之因若先白後赤乃內傷生冷失於蓋覆由元氣感於暑熱治法先救其里次解暑毒若先赤後白乃先傷熱而後失蓋感冷先宜解熱後治其痢有夾熱而痢者則下純鮮血此風能動血宜冷服黃連香薷散吐瀉川草散及當歸散潮熱加醋炒蒸柏葉水姜煎服或羌活散加三和湯水姜倉米煎有挾冷而痢者則下純白凍或白上有粉紅色或似豬肝瘀血皆為陰證蓋血得寒則凝澀故也先用㕮咀五苓散加守中湯瀉煎投次以附子理中湯帶涼服或固真湯慢驚倘不辨其虛實冷熱妄行施治必致脾胃愈虛不能乳食成噤口痢者則難療矣又有裡急後重蓋裡急為陽後重為陰未圊前腹痛為裡急已圊後腹痛為後重故里急者大腸澀也先以大順飲加寬氣飲急驚和解及羌活散水姜倉米煎服次下寬腸丸後重為氣虛用㕮咀五苓散加人參水姜煎服並投香連丸若二證俱作前二丸子並進或雙金飲金粟丸亦佳然瀉痢二字自是兩證糞夾水來多而順者曰瀉帶血凍白凍來三五點而痛者曰痢輕重陰陽於此而分斯為治法有膿血交雜經久不止晝輕夜重或晝夜頻數食減痛多並用萬金散神效散主之有五色痢者乃因五臟蘊熱日久不散故有是證蓋五臟受熱榮衛不調五穀不化熏腐臟腑神氣昏沉此候已危最苦是腹中刺痛兒小者無治法蓋五色者乃五臟之色皆見於外兒大者可用局方三神丸或小來復丹以五苓散送下或者可療若投藥如故不可為也又有風痢多是黃褐色與疳瀉頗同但不臭為異耳此風毒停滯於脾宜去脾經風毒瀉黃散主之若見赤白同下久而不禁小便少澀痛熱並作唇裂眼赤氣促心煩坐臥不安狂渴飲水穀道傾陷時復面容如妝飲食不進者難治薛錢仲陽云瀉痢黃赤黑皆熱也瀉痢青白米穀不化皆冷也東垣云白者濕熱傷於氣分赤者濕熱傷於血分赤白相雜氣血俱傷也海藏用四君芎歸治虛弱之痢四君乾薑治虛寒之痢愚嘗治手足指熱飲冷者為實熱用香連丸手足指冷飲熱者為虛寒用異功散送香連丸若兼體重肢痛濕熱傷脾也用升陽益胃湯小便不利陰陽不分也用五苓散若濕熱退而久痢不愈者脾氣下陷也用補中益氣湯倍加升麻柴胡瀉痢兼嘔或腹中作痛者脾胃虛寒也用異功散加炮薑木香或變而為瘧者肝克脾也用六君升麻柴胡釣藤鉤若積滯已去痢仍不止者脾氣虛也用四君子送下香連丸若因乳母膏粱厚味六淫七情致兒為患者當各推其因仍兼治其母並參冷熱瀉及積滯腹痛等證覽之挾表證宜發表羌活散治傷風時氣頭痛發熱身體煩疼痰壅咳嗽失音鼻塞聲重及解時行下痢赤白人參去蘆羌活赤茯苓去皮柴胡去蘆前胡去蘆川芎獨活桔梗銼炒枳殼去瓤麩炒微黃色蒼朮米泔水浸一宿去粗皮濾干銼片炒至微黃色甘草各一兩上銼每服二錢水一盞姜二片薄荷三葉煎七分無時溫服發散風邪入蔥白同煎痢證薑倉米煎有積宜下之湯治痢之法若欲取積只用官局進食丸痞甚穩雖取積又能治痢萬無一失積以下