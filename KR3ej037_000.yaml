兒每一個研作一丸如麻子大每一粒用乳汁下保命丹本事治小兒急慢驚風四肢逆冷眼直口噤涎不止虎睛一對安瓦上以瓦蓋之慢火逼干硃砂半兩全蠍麝香各半錢天麻一分蜈蚣二條去頭尾赤腳者上為細末煉蜜丸如大豆大瓦罐貯之又入腦麝窨定急驚薄荷蜜湯化下慢驚薄荷湯化下各三丸溫驚丸一名粉紅丸南星為末入臘月牛膽中陰乾百日為末四兩硃砂一錢半天竺黃一兩坯子胭脂半錢龍腦五分另研上用牛膽汁和丸如雞頭大每服一丸小者半丸沙糖水下抱龍丸治傷風瘟疫身熱昏睡氣粗風熱痰實壅嗽驚風潮搐及蠱毒中暑沐浴後並可服壯實小兒宜時與服之丹溪云抱龍丸心肺肝藥也南星如無牛膽者只將生者銼炒熟用四兩天竺黃一兩雄黃水飛辰砂另研各半兩麝香另研一錢上為細末煮甘草膏和丸皂莢子大溫水化下百日小兒每丸分作三四服五歲兒一二丸大人三五丸亦治室女白帶伏暑用鹽少許嚼一二丸新汲水送下臘月雪水煮甘草和藥尤佳一法用漿水或新水浸南星三日候透煮軟三五沸取出乘軟切去皮只取白軟者薄切焙乾炒黃色取末八兩以甘草二兩半拍破用水二碗浸一宿慢火煮至半碗去滓漸漸傾入南星末內慢研令甘草水盡方入余藥琥珀抱龍丸曾氏抱龍之義抱者保也龍者肝也肝應東方青龍木木生火所謂生我者父母也肝為母心為子母安則子安心藏神肝藏魂神魂既定驚從何生故曰抱龍丸理小兒諸驚四時感冒風寒溫疫邪熱致煩躁不寧痰嗽氣急及瘡疹欲出發搐並宜可投其藥性溫平不僭不燥常服祛風化痰鎮心解熱和脾胃益精神真琥珀天竺黃檀香細銼人參去蘆白茯苓去皮各一兩半粉草三兩去節枳殼水浸去穰麩炒微黃枳實水浸去穰麩炒微黃各一兩硃砂五兩先以磁石引去鐵屑次用水乳鉢內細杵取浮者飛過淨器內澄清去上余水如此法一般精製見硃砂盡曬乾用山藥去黑皮一斤銼作小塊慢火炒令熱透候冷用南星一兩銼碎用臘月雄黃牛膽釀經一夏金箔百片去護紙取見成藥一兩同在乳鉢內極細杵仍和勻前藥末用上前十二味除硃砂金箔不入碾內餘十味檀香不過火外九味或曬或焙同研為末和勻硃砂金箔每一兩重取新汲井水一兩重入乳鉢內略杵勻隨手丸如雞頭子大陰乾晴霖略曬日色燥甚則拆裂宜頓放當風處取其自干治法並用蔥湯無時化服或薄荷湯痰壅嗽甚淡薑湯下痘瘡見形有驚溫淨湯下心悸不安燈草湯下暑天悶迷麥門冬熟水下百日內嬰兒每丸作三次投二歲以上者止一丸或二丸其品劑修合之時但缺一味不依制度必無效矣常用瓦瓶入麝香同收毋使散泄氣味入珍珠末一兩合和名金珠散蓋珍珠能鎮心寧肝墜痰尤效治法湯使同前又琥珀抱龍丸專治小兒急慢驚風發熱咳嗽作搐痰喘驚悸生薑薄荷湯下時行痘疹發熱嘔吐驚跳白湯下傷風發熱咳嗽鼻寒驚哭蔥湯下因著驚發熱睡臥不寧燈心湯下夏月發熱嘔吐麥門冬湯下因母發熱過乳溫熱不寧甘草湯下脾胃不和頭熱黃瘦懶食砂仁湯下周歲小兒服一丸未及者半丸連進一二丸無不效驗忌食魚腥生冷食乳者乳母同忌琥珀二錢半包在精豬肉內煨過取出研末二錢牛膽南星一兩六錢臘月用牛膽作成者妙殭蠶二錢炒雄黃辰砂人參白伏苓各三錢天竺黃五錢釣藤全用鉤子一兩五錢真正牛黃五分真麝香一錢上各味不可短少分釐碾為極細末用粉甘草八兩銼碎以水四大碗熬膏二盞入藥末為丸每一丸五分重金箔為衣外用黃蠟包之一料二百丸又琥珀抱龍丸治病法如前琥珀一兩五錢研牛黃一錢研人參檀香白茯苓各一兩半硃砂研珍珠各五錢研枳殼枳實牛膽南星天竺黃各一兩山藥十兩甘草三兩以上各為細末金箔四百片蜂蜜二斤黃蠟二十五斤此藥一料五百丸每丸五分重專治嬰孩小兒諸驚四時感冒瘟疫邪熱煩躁不寧痰嗽氣急瘡疹欲出發搐並皆治之其藥性溫平不寒不燥驅風化痰鎮心解熱安魂定驚和脾健胃添益精神蔥白煎湯或薄荷湯下痰壅咳甚生薑湯下痘疹見形有驚白湯下心悸不安燈心湯下並不拘時服初生數月者每丸作四次服或三分之一或半丸數歲者每服一丸更量兒大小加減酌用可也世奪命散治急慢驚風諸藥無效此藥隨手奏功白附子三錢黑附子炮去皮臍半兩急驚不用南星炮一兩天麻三錢辰砂另研二錢半防風半夏各半兩全蠍去毒七枚蜈蚣炙一條麝香半錢殭蠶炒慢驚不用上為末三歲兒半錢薄荷生薑自然汁加好酒沸湯各少許調服急驚加輕粉腦子各少許太乙保生丹見慢驚湯治慢驚甚驗赤腳蜈蚣酒炙一條白殭蠶炒七條辰砂另研一字全蠍用薄荷葉包炙七枚青州白丸子三十丸上為末入麝香少許慢驚人參麥門冬湯調下急驚加腦子牛黃各少許金銀薄荷湯調下羅天麻散治小兒急慢驚風及大人中風涎盛半身不遂言語艱澀不省人事半夏七錢天麻二錢半甘草炙茯苓白朮各三錢上用水一盞入瓷罐內煮藥令水乾將老薑三錢同煮候乾為細末每服一錢五分薑棗湯調下雄黃散主暴中急慢驚風齁䶎痰涎滿口及雨侵閉汗不通或涼或熱坐臥生煩雄黃紅亮者二錢半白藥去黑皮川烏頭炮裂去皮臍草烏頭炮裂去皮天麻明亮者川芎五味各半兩上除雄黃外五味銼焙同雄黃為末驚風痰湧每服半錢或一錢用薑汁茶清調下發汗薑蔥薄荷水煎並投三服取效經治驚風墜涎天南星一個重一兩者換酒浸七伏時取出新瓦上炭火炙乾烈地上去火毒搗末入硃砂二錢半研為細末每服五分荊芥湯空心及午時各調下一服田天麻防風丸治小兒驚風身熱喘粗多睡驚悸搐掣神昏痰涎不利等證天麻防風人參各一兩蠍尾去毒半兩甘草硃砂雄黃牛黃麝香各一錢殭蠶炒半兩上為末煉蜜丸如櫻桃大硃砂為衣每服薄荷湯下一二丸云七味羌活膏治急慢驚風壯熱羌活獨活天麻全蠍去毒人參殭蠶炒各半兩烏蛇肉酒浸一宿焙乾一兩上為末煉蜜和丸如皂子大每兩作五十丸每服一丸荊芥湯下經治小兒驚風全蠍一錢不去頭尾用薄荷葉裹炙乾同研為末作四服白湯下衍治小兒驚風殭蠶蠍稍等分天雄尖附子尖共一錢炮過為末每調一字薑湯調下羅小兒驚風釀乳方用白羊頭一個丁香同熬至熟乳母空心盡食之丹孫女因胎中受濕熱日午發搐唇黑麵青每日作一次未半周難與藥且釀乳飲之白朮陳皮半夏芍藥青皮各五分人參川芎木通各三錢黃連二錢甘草炙一錢上分八服姜五片與乳母煎服小兒急慢驚風發熱口瘡手足伏熱痰熱痰喘痰嗽並用湧法重劑以瓜蒂散輕劑苦參赤小豆末酒酸齏汁調服之後用通神散蜜丸服之間以桑牛陰乾研末調服以平其氣本褊銀丸治小兒急慢驚風積痼青黛三錢水銀一皂角子大同黑鉛錫炒砂子寒食麵黃明膠炒焦為末各二錢輕粉炒豆許雄黃粉霜硃砂各一兩巴豆二十一粒去油腦麝少許上研細滴水為丸如麻子大捏匾曝乾瓷盒盛之一歲一丸隨意加減煎棗子湯送下不得化破博治急慢驚風乳香甘遂各半兩同研細每服半錢用乳香湯調下或用童便調下尤妙劫風膏治急慢驚搐臍風撮口牙關緊閉痰涎壅盛咽喉腫痛葳靈仙去蘆一兩半細銼焙研為末上用皂莢三兩去皮弦捶損挪溫水一碗絹濾過慢火熬若稀糊入醇醋半兩再熬三五沸去火候冷用前藥末亭分乳鉢內杵勻丸芡實大先用鹽梅肉擦牙根次以此膏一丸或二丸溫白湯濃調抹入右上牙關內即開續進別藥熬時得瓦器為上銀器尤佳及解風痰壅盛淡薑湯調化無時少與含咽咽喉腫痛溫茶清調下或薄荷湯以上諸方通治急慢驚風蓋謂虛實兩見急慢互出故有通治之法合而言之急慢雖異皆本之於痰故礞石星半之屬通能治之者也分而言之礞石之屬瀉痰青黛之屬瀉木硃砂之屬瀉火皆治氣實之劑參草之屬補土天麻全蠍之屬補木烏附之屬補火又皆治氣虛之劑故補瀉兼施虛實通治之法也霹靂散解急慢驚風不省人事豬牙皂角三錢細辛川芎白芷三味各二錢躑躅花一錢半上銼曬為末每以少許用大燈心三寸長蘸點鼻內得噴嚏為驗前藥不可焙焙則不應目睛瞤動薛目者肝之竅也肝膽屬風木二經兼為相火肝藏血血不足則風火內生故目睛為之瞤動經曰曲直動搖風之象也宜用四物益其血柴胡山梔清其肝陰血內榮則虛風自息矣若因肝經血燥而自病者用六味丸以滋其源因肺金克肝木者用瀉白散以平金邪若眼眶瞤動者肝木乘脾土也用抱龍丸若愈後驚悸不寐或寐中發搐咬牙目睛瞤動者血虛不能榮筋脈也用補中益氣湯或歸脾湯加茯苓五味蓋有餘者邪氣實也不足者真氣虛也凡病氣有餘當認為不足此證兼屬肝脾多為慢驚之漸唇口蠕動薛唇為脾之華口乃脾之竅又陽明之脈環唇口而交人中陽明胃也是以脾胃虛者多有此證不獨病後而已夫脾主涎脾虛則不能收攝多兼流涎或誤認為痰而用祛逐之藥則津液益枯不能滋養筋脈遂致四肢抽搐病勢愈甚原其治法與慢脾風相同當用大補脾胃之藥加升麻柴胡切勿用青皮龍膽草之類兼察其色黃者脾弱也青者肝勝也青黃不澤木來剋土也青赤相兼木火風熱也黑為寒水反來侮土白為氣虛亡陽凡此宜用六君子湯加小柴胡湯若四肢微搐或潮熱往來或泄瀉嘔吐面色痿黃皆脾胃有傷也宜用白木黃耆川芎當歸人參陳皮肉豆蔻神麯乾葛白芍藥黃連炙甘草白茯苓以補胃氣若脾胃虛弱者用五味異功散虛寒加木香炮姜若脾氣下陷者用補中益氣湯以升其陽作渴者用七味白朮散以生津液若肝木侮脾者用補中益氣湯加茯苓半夏芍藥以制肝補脾目直視薛小兒忽然驚搐目直者皆肝之風熱也若肝虛生風則目連札而不搐及多缺咬牙若肝經風實則目直大叫呵缺項急頓悶若肝經有熱則目直視不搐得心熱則搐氣熱則外生氣溫則內生其證手尋衣領及亂捻物宜用瀉青丸壯熱飲水喘悶宜用瀉白散凡病之新久皆能引肝風風內動則上入於目故目為之連札若熱入於目牽其筋脈兩眥俱緊不能轉視故目直也亦有飲食停滯中焦致清陽不升濁陰不降肝木生髮之氣不得升致生虛風者須詳審之若胸滿腹痛嘔吐惡食輕則消導化痰重則探吐滯積更須審其所傷寒物熱物亦有因感冒吐瀉致使土敗木侮而生虛風者不可遽服驚藥宜用六君子加芍藥木香柴胡制肝補脾若因脾土虛而自病者用五味異功散凡飲食停滯痰涎壅滿而見驚證者實因脾土虛弱不能生金金虛不能平木故木邪妄動也宜健脾消食其證自愈若輒用驚風之藥反成其風而益其病也況臟腑脆嫩不可投以峻厲之劑治者慎之睡中驚動薛小兒睡中驚動由心腎不足所致蓋心主血與神肝藏血與魂肺主氣與魄腎主精與恐小兒臟腑脆弱易為驚恐恐則氣下驚則心無所依神無所歸且夫人之神氣寤則行於目寐則棲於腎今心腎既虛則不能寧攝精神故睡中驚動也治宜清心安神用茯苓補心湯加酸棗仁茯神五味子亦有驚嚇而作者因擊動其肝故魂不安也治宜鎮驚定魂用安神鎮驚丸若飲食間因驚而停滯者用六君子加神麯厚朴食既消而驚未定用茯苓補心湯若木火太過而心神不寧者用導赤散風熱相搏者用柴胡梔子散食鬱生痰驚動不安者用四君以健脾神麯半夏以化痰山梔芍藥以清熱目動咬牙薛小兒驚後目微動咬牙者皆病後亡津液不能榮其筋脈也亦有肝經虛熱而生風者當審其氣血有餘不足而治之其日中發熱飲冷而動者氣有餘也用瀉青丸夜間盜汗及睡不寧而動者血不足也用地黃丸或因肝經風邪傳於脾腎者亦令咬牙先用柴胡清肝散次用五味異功散六味地黃丸若因脾胃虛熱用補中益氣湯加芍藥山梔實熱用瀉黃散蓋牙床屬手足陽明故也若肝腎熱用六味地黃丸泄瀉薛小兒驚瀉者肝主驚肝木也盛則必傳克於脾脾土既衰則乳食不化水道不調故泄瀉色青或兼發搐者蓋青乃肝之色搐乃肝之證也亦有因乳母脾虛受驚及怒動肝火而致者經曰怒則氣逆甚則嘔血及飧泄法當平肝補肺慎勿用峻攻之藥脾氣益虛肝邪彌甚甚至抽搐反張者亦肝火熾盛中州虧損之變證也凡見驚證即宜用四君六君異功散等方加白附子定風柴胡平肝引經以杜漸則必不至瀉搐而自安矣今已見瀉吐驚搐尚不知補脾平肝以保命抱龍鎮驚等藥治之其亦去生遠矣腹痛蟬蛻釣藤飲治肚疼驚啼釣藤鉤天麻茯苓川芎白芍藥各三錢甘草蟬蛻各一兩上入燈心水煎服煩渴閻氏云驚風或泄瀉等證煩渴者皆津液內耗也不問陰陽宜煎錢氏白朮散使滿意取足飲之彌多彌好清心丸治驚熱煩躁人參茯神防風硃砂柴胡各三錢金箔三十片上為末煉蜜丸如桐子大每服一二丸竹瀝調下神芎丸治風熱壅滯頭目昏眩口舌生瘡牙齒疳蝕或遍身瘡疥咬牙驚惕怔忡煩躁作渴或大便澀滯或積熱腹滿驚風潮搐等證大黃生黃芩各二兩生牽牛末一兩滑石四兩黃連薄荷葉川芎各半兩上為末水糊丸桐子大每服三四丸溫熱水下潮熱似瘧曾又有急驚天釣之後變作潮熱手足逆冷有似瘧疾蓋因病愈之時不善將護外感風邪乘虛而入於經絡再未解散以致如此經曰重陽必陰又曰亢則害承乃制此其義也宜服柴胡加桂湯及當歸散氣實者則以烏犀丸水晶丹略與通利勻氣散止補後以參苓白朮散調理自然平愈此證所用藥品間使苦寒之味務在消陽盛之火肺金得勝肝木自平而風邪亦散斯為良法柴胡加桂湯見傷寒當歸散見痢烏犀丸水晶丹並見癖積勻氣散見腹痛參苓白朮散見泄瀉雜證類驚海藏云心神不安四君子加辰砂半分棗湯調下又有一證欲發瘡疹先身熱驚跳或發搐搦此非驚風當用發散藥曾暑風一證因夏月感冒風熱太甚致面垢唇紅脈沉細數忽發驚搐不省人事治用消暑清心飲辰砂五苓散及琥珀抱龍丸自安切勿以溫劑調補消暑清心飲解伏熱中暑煩躁作渴神氣不清及有驚搐名暑風證投之即效香薷去老梗澤瀉去粗皮各一兩扁豆炒熟去殼研淨黃連羌活豬苓去皮厚朴去粗皮薑汁浸透炒白朮乾葛赤茯苓去皮升麻川芎各半兩甘草三錢上銼每服二錢水一盞煎七分無時帶涼服治暑風證先投此劑得效次服卻暑丹其搐不發矣薛氏於急慢驚癇之外又出驚風一證其候虛惕怔忡氣怯神散痰涎來去泄瀉色青蓋驚之輕而虛者也若驚入心則面赤夜啼用梔子清肝散加黃連入肝則面青眼竄用柴胡清肝散入脾則面黃嘔吐虛汗嗜臥用六君加柴胡山梔入肺則面白喘急用異功散加柴胡桔梗入腎則面黑齧奶咬牙用六味地黃丸若因乳母恚怒肝火或膏粱積熱遺兒為患或兒吐瀉傷脾清氣不升風木陷入太陰傳變等因皆能致此當隨主治否則必成慢脾也須預慎防為善針灸小兒急驚灸前頂一穴三壯取法在百會前一寸若不愈灸兩眉心及鼻下人中一穴炷如小麥大小兒慢驚灸尺澤穴各三壯在肘中橫紋約上動脈中炷如小麥大若睡中驚掣灸足大趾次趾之端去爪甲如韭葉許各一壯若角弓反張身強灸鼻上入髮際三分三壯次灸大椎下節間三壯若睡中驚不合眼目灸屈肘後橫紋中三分各一壯診錢咬牙甚者發驚目直面青身反折者生驚呵缺面青者驚風呵缺面黃者脾虛驚目赤兼青者發搐驚癇發搐男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也更有發時證潔古先生云男為木故左視木位無聲右視金位相擊則有聲女為金故右視金位無聲左視木位亦相擊有聲李寺丞子三歲發搐自卯至巳目右視大叫哭錢見曰此逆也男為陽本發左視無聲則順右視有聲則逆所以然者左肝木也右肺金也逆則二臟相戰金木相擊而有聲也治宜瀉強補弱假令女發搐目左視是肺來乘肝肝不能任故叫哭也當瀉其肺後治其心續治其肝若病在秋日西時同肺兼旺位當大瀉其肺若病在春早晨時同此肝旺之時尚不能勝肺是肺強而肝火弱也當補其肝腎大瀉其肺若男發搐目右視是肝來勝肺而叫哭當瀉其肝心若病在春夏早晨日中時同肝心旺時當大瀉其肝若病在秋冬日晡時同此肺旺之時尚不能勝肝是肝強而肺極虛也當補其肺大瀉其肝所以言目反視者乃肝主目也凡搐則是風熱相搏於內風屬肝故外見於目也今此病男反女證故稍易治於女也先瀉其肺以瀉肺湯主之二日不悶亂知病退也後用地黃丸補腎三服後用瀉青丸各二服以瀉心肝五日而愈又肺虛不瀉者何也曰假令男目右視木剋金肝旺勝肺而但瀉肝若更病在春夏金氣極虛故當補其肺慎勿瀉也湯凡搐男左女右為順易治男右女左為逆難治脈訣啓蒙曰小兒脈促急為虛驚直指云浮數洪緊為急驚沉遲散緩為慢驚虎口脈紋青紫為驚風紅者風熱輕赤者風熱盛紫者驚熱青者驚積青紫相半驚積風熱俱有主急驚風青而淡紫伸縮來去主慢驚風紫絲青絲或黑絲隱隱相雜似出而不出主慢脾風形勢灣入里者順出外者逆不治證搐而不休休而再搐驚叫發搐汗出足冷痰滿胸喉口開目直急驚眼睛翻轉口中出血兩足擺跳肚腹搐動或神緩而摸體尋衣或證篤而神昏氣促噴藥不下通關不嚏心中熱痛忽大叫者不治慢驚四肢厥冷吐瀉咳嗽面黯神慘鴉聲胃痛兩脅動氣口生白瘡髮直搖頭眼青不轉涎鳴喘嗌頭軟大小二便不禁手足一邊牽引者皆為不治慢脾身冷黏汗直臥如尸喘嗽頭軟背直口噤搖頭痰如牽鋸之聲面無潤澤之色縮唇氣粗者不治禁忌治小兒急驚方搐不用驚擾此不足畏慢驚雖靜乃危病也急驚方搐時但扶持之不可擒捉蓋風氣方盛恐流入筋脈或至手足成拘攣也驚悸薛人身有九臟心藏神肝藏魂二經皆主於血血虧則神魂失寧而生驚悸也經曰東方青色入通於肝其病發驚駭又曰二陽一陰發病主驚駭驚者心卒動而恐怖也悸者心跳動而怔忡也二者因心虛血少故健忘之證隨之用四物安神之類丹溪謂亦有屬痰者宜用溫膽湯加辰砂遠志之類若思慮便動虛也用養心湯時作時止痰也用茯苓丸觸事易驚心膽虛怯也用溫膽湯臥驚多魘血不歸源也用真珠母丸夢寐不寧肝魂失守也用定志丸恐畏不能獨處膽氣虛冷也用茯神湯睡臥煩躁膽氣實熱也用酸棗仁丸眩運驚悸風痰內作也用本事辰砂遠志丸思慮鬱結脾虛氣滯用歸脾湯前證雖曰屬心與肝而血之所統實主於脾脾之志曰思思慮多則血耗損而不能滋養於肝心者脾使之也思慮內動未嘗有不役其心者夫心為君火之臟十二官之主也夫君之德不怒而威無為而治故宜鎮之以靜謐戒之以妄動動則相火翕合煽爍陰精精血既虧則火空獨發是以驚悸怔忡之所由生五志之火心所不能制者矣故治脾者不可不知養心養心者不可不知鎮靜而寡欲然人孰無思也思之正則無妄動之欲矣朱子曰必使道心常為一身之主而人心每聽命焉此善養於心者也溫膽湯治心膽虛怯觸事易驚或夢寐不祥遂致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗膽虛不能制脾則脾之水飲作矣半夏湯洗竹茹枳實麩炒橘皮去白各二兩甘草炙一兩白茯苓一兩半上每服四錢水一盞半姜五片棗一枚煎七分食前服寧志丸治心虛多驚若有痰宜吐之人參白茯苓茯神柏子仁琥珀當歸酸棗仁溫酒浸半日去殼遠志炒各半兩乳香硃砂石菖蒲各三錢上為末蜜丸桐子大每服三十丸食後棗湯下茯神散治五臟氣血虛弱驚悸怔忡宜用此安神定志茯神去木人參龍齒另研遠志去心桂心防風獨活酸棗仁細辛白朮炒各三錢乾薑炮三兩上為末每服四五錢水煎服蜜丸亦可治要茯苓補心湯治心氣不足喜悲愁怒衄血面黃五心煩熱或咽喉間痛舌本作強茯苓四錢桂心甘草炒各三分紫石英煆人參麥門冬去心各一錢大棗二枚上水煎服茯神湯治膽氣虛冷頭痛目眩心神恐畏不能獨處胸中煩悶茯神去木酸棗仁炒黃耆炒梔子仁炒白芍藥炒五味子杵炒桂心熟地黃自制人參各一兩甘草五錢炒上每服五錢姜水煎酸棗仁丸治膽氣實熱不得睡臥神志不安驚悸怔忡茯神去木酸棗仁炒遠志去心柏子仁炒防風各一兩枳殼麩炒生地黃杵膏各半兩青竹茹二錢五分上為末蜜丸梧子大每服七八十丸滾湯下定志丸治心神虛怯所患同前或語言鬼怪喜笑驚悸人參茯苓各一兩五錢菖蒲遠志去心各一兩上為末蜜丸如梧子大每服七八十丸滾湯下治要茯苓散治心經實熱口乾煩渴眠臥不得心神恍惚茯神麥門冬各一兩半通草升麻各一兩二錢半紫菀桂心各七錢五分知母一兩大棗十二枚淡竹茹五錢赤石脂一兩七錢五分上每服一兩水煎朱雀丸治心病怔忡不止白茯苓二兩沉香半兩上為末蜜丸小豆大每服三十丸人參煎湯下世傳密陀僧散治驚氣入心絡不能語者昔有人為狼及犬蛇所驚皆以此而安密陀僧研極細末如粉上茶清調一錢匕丹溪硃砂丸治勞役心跳硃砂當歸身白芍藥側柏葉各三錢川芎陳皮甘草黃連炒各一錢半上用豬心血為丸粟米大每服百丸龍眼湯下本事辰砂遠志丸消風化痰鎮心安神人參石菖蒲去毛遠志去心茯神各一兩川芎山藥白附子麥門冬細辛鐵粉辰砂各五錢上為末用生薑汁入水糊丸緑豆大以硃砂為衣每服一二十丸臨睡生薑湯下加味歸脾湯去丹皮山梔即歸脾湯治脾虛弱損健忘驚悸等證人參黃耆茯神去木各一錢甘草五分白朮炒一錢木香五分遠志去心酸棗仁炒研龍眼肉當歸牡丹皮山梔炒各一錢上水煎服愚按前方若乳母憂思傷脾血虛發熱食少體倦或脾虛不能統攝以致陰血妄行或健忘怔忡驚悸少寐或心脾作痛自汗盜汗或肢體腫痛大便不調或婦人經候不調晡熱內熱或繭唇流注等證致兒為患者令子母俱服之辰砂膽星膏治小兒痰熱氣熱氣急喘嗽驚悸不安辰砂一錢牛膽南星一兩琥珀青礞石末各一錢天竺黃二錢甘草五分麝香少許上為細末煉蜜丸如芡實大每服半丸不拘時生薑湯化下木通散治小兒肝心有熱驚悸用此藥瀉肝風降心火利驚熱羌活山梔子各二錢大黃煨木通赤茯苓甘草各一錢上銼每服二錢入紫蘇葉些少水一盞煎至五分不拘時服癇婁驚癇即急慢之證但驚癇發時仆地作聲醒時吐沫急慢驚則不作聲不吐沫也仁齊曰癇小兒之惡候也蓋小兒血脈不斂氣骨不聚為風邪所觸為乳哺失節停結癖積而得之其候神氣怫鬱瞪眼直視面目牽引口噤涎流腹肚脹膨手足搐掣似死似生或聲或啞或項背反張或腰脊強直但四體柔弱發而時醒者為癇若一身強硬終日不醒則為痙證矣陰陽二癇陽癇初作時病先身熱瘛瘲驚啼叫啖而後發脈浮者為陽癇乃急驚也內在六腑外在皮膚為易治若病先身冷不驚瘈不啼呼而作脈沉者為陰癇乃慢驚也此病內在五臟外在骨髓劇者難治曾陽癇者因感驚風三次發搐不與去風下痰則再發然三次者非一日三次也或一月或一季一發驚搐必經三度故曰三次所謂驚風三發便為癇即此義也其病主身熱自汗兩目上視嚼沫咬牙手足制搦面色紅紫六脈浮數以百解散加五和湯水煎疏解次下痰用水晶丹或半夏丸陰癇者因慢驚後去痰不盡痰入心包而得四肢逆冷吐舌搖頭口嚼白沫牙關緊閉但不甚驚搐作啼面色或白或青脈息沉微故嬰孩寶書云睡中吐舌更搖頭正此之謂治以固真湯加曰生湯同煎調寬氣飲和解風驚食三癇千金云小兒之癇有三風癇驚癇食癇也風癇緣衣暖汗出風因入也初時先屈指如數物乃作驚癇起於驚怖大啼乃作食癇其先不哺乳吐而變熱後發然風癇驚癇時時有之十兒之中未有一二凡是先寒後發熱者皆食癇也驚癇皆按圖灸之風癇當以豬心湯食癇當下乃愈紫霜丸佳按此論三癇蓋有三因之分風癇屬外因驚癇屬內因食癇屬不內外因也又按全嬰方云風癇因將養失度血氣不和或厚衣汗出腠理開舒風邪而入之其病在肝肝主風驗其證目青面紅發搐宜驅風膏大青膏琥珀散鎮驚藥有熱四順飲退後與利驚丸下其痰涎驚癇因血氣盛實臟腑生熱或驚怖大啼精神傷動外邪所入為之其病在心心主驚驗其證忽然叫聲發搐宜琥珀散紅龍散鎮心丸有熱四順飲利驚丸下之不生別病也食癇其病在脾脾納食驗其證噯吐醙氣即發搐此病或大便酸臭紫丸子下之以上三證大同小異並屬陽也各目睛鮮斜手足潮搐或作豬聲發過即瘥皆十生一死也五臟癇三因云古方有五癇五臟癇六畜癇等名證不同難於備載別録有五癇之證一曰馬癇作馬嘶鳴以馬屬在午手少陰君火主之故其病應於心二曰羊癇作羊叫聲以羊屬未足太陰濕土主之應乎脾三曰雞癇作雞叫聲以雞屬酉足陽明燥金主之應乎胃四曰豬癇作豬叫聲以豬屬亥手厥陰心包主之應乎右腎五曰牛癇作牛吼聲以牛屬醜手太陰濕土主之應乎肺此五癇應乎五畜應乎五臟者也發則旋暈顛倒口眼相引目睛上搖手足搐搦背脊強直食頃乃蘇各隨所感施以治法錢凡治五癇皆隨臟治之每臟各一獸犬癇反折上竄犬叫肝也羊癇目瞪吐舌羊叫心也牛癇目直視腹滿牛叫脾也雞癇驚跳反折手縱雞叫肺也豬癇如尸吐沫豬叫腎也五癇重者死病後甚者亦死輕者五色丸主之薛面赤目瞪吐舌齧舌心煩氣短其聲如羊者曰心癇面青唇青兩眼上竄手足攣掣反折其聲如犬者曰肝癇面黑目振吐涎沫形體如尸其聲如豬者曰腎癇面如枯骨目白反視驚跳反折搖頭吐沫其聲如雞者曰肺癇面色痿黃目直腹滿自利四肢不收其聲如牛者曰脾癇五癇通用五色丸為主仍參以各經之藥心癇屬血虛者用養心湯發熱飲冷為實熱用虎睛丸發熱飲湯為虛熱用妙香散肝癇者虛證用地黃丸抽搐有力為實邪用柴胡清肝散大便不通用瀉青丸腎癇者用地黃丸紫河車丸之類腎無瀉法故徑從虛治之肺癇者屬氣虛用補肺散面色痿黃者土不能生也用五味異功散面色赤者陰火上衝於肺也用地黃丸脾癇者用五味異功散若面青瀉利飲食少思用六君子加木香柴胡按千金敘六畜癇無五臟之分屬錢氏始分之而無馬癇一證曾氏謂初發作羊犬聲者咽喉為風痰所梗聲自如此其理甚明言六畜者特強名耳故丹溪謂於經既無所據而治法亦未見有五者之分所以不必分五也治法仁齊曰大概血滯心竅邪氣在心積驚成癇通行心經調平血脈順氣豁痰乃其要也假令小兒有熱有痰不欲乳哺眠睡不安常常驚悸此皆發癇之漸即以紫霜丸導之方見變蒸熱時間量與紫霜丸減其盛氣則無驚風癇釣之患癇證方萌耳後高骨間必有青紋紛紛如線見之則為爪破須令出血啼叫尤得氣通諸癇發不能言者蓋咽喉為氣之道路風傷其氣以掩聲音道路之門抑亦血滯於心心竅不通所致耳南星炮為末雄豬膽汁調和少許啖之輒效若夫錢氏五癇丸並南星散以菖蒲煎湯調下甘遂豬心湯和蘇合香丸一丸皆治癇之要藥也劉小兒神尚弱驚則神不守舍舍空則痰涎歸之或飲食失節脾胃有傷積為痰飲以致痰述心竅而作者治法當尋火尋痰而前人多用鎮墜清心之藥固可以治熱可以清痰若有頑痰膠固者此藥未易驅逐在上者必用吐吐後方宜服此藥有痰實在裡者亦須下之隨病輕重而用之也潔如有客痰發熱而有聲煎大黃荊芥湯下五色丸潮熱有時積熱也桃枝丸主之方見積熱壯熱不退當用地骨皮散方見潮熱下五色丸風熱當用防風黃芩湯下大青膏身溫不熱當用白虎湯加蒼朮下五色丸薛此皆元氣不足之證須以紫河車即小兒胞衣丸為主而以補藥佐之設若泛行克伐復傷元氣則必不時舉發久而變危多至不救一老人生子方周歲秋初暴冷忽發搐似驚癇過則氣息奄奄此元氣虛弱所致與補中益氣湯而愈一小兒十歲一小兒七歲各有癇證歲發二次後因出痘及飲食停滯舉發頻數用六君子補中益氣二湯而愈一小兒患前證每發吐痰困倦半餉而蘇諸藥不應年至十三而頻發用紫河車生研爛入人參當歸末丸桐子大每服三五十丸日進三五服乳化下一月漸愈又佐以八珍湯全愈一小兒七歲發驚癇每作先君令其恣飲人乳後發漸疏而輕至十四歲復發仍用人乳不應余令用肥厚紫河車研爛人乳調如泥日服二三次至數具而愈後常用加減八味丸而安至二十三歲發而手足厥冷仍用前法佐以八味丸十全大補湯而痊通治五癇錢氏五色丸硃砂研半兩水銀一分雄黃熬一兩鉛三兩同水銀熬珍珠末研一兩上煉蜜丸如麻子大每服三四丸金銀薄荷湯下三因六珍丹雄黃雌黃未鑽珍珠各一兩鉛二兩熬成屑水銀一兩半上研令極勻蜜丸桐子大每服三丸至五丸薑棗湯下須搗二三萬杵乃可丸風癇口議云先用化痰寬利胸膈開通關竅安鎮心神然後與治風癇藥服之又云先用化風丹去其風熱次服奪魂散定癇散風丹治小兒風癇先用此藥牛膽南星二錢羌活獨活防風天麻人參川芎荊芥穗細辛各一錢上為末煉蜜為丸如梧桐子大每服二丸用薄荷紫蘇湯不拘時送下保安丸治小兒諸風癇久後亦驗五靈脂半兩川烏生用去皮尖二錢半上為末豬心血為丸如梧桐子大每服一丸用生薑湯化下不拘時服獨活湯治小兒風癇解表通里獨活麻黃去節川芎各一錢大黃甘草炒各半錢上銼碎每服二錢用水一鍾生薑二片煎至四分不拘時溫服細辛大黃湯治小兒風癇內熱天麻防風各半兩細辛大黃焙川芎各二錢半甘草炙一錢半上銼碎每服二錢入犀角少許用水一鍾煎至四分不拘時服牛黃丸治小兒風癇迷悶抽掣涎潮牛膽南星全蠍焙去毒蟬殼各二錢半防風牛黃白附子生直殭蠶炒去絲嘴天麻各一錢半麝香半錢上為末以煮棗去皮核取肉和水銀半錢研極細次入藥末和丸如緑豆大每服三五丸用荊芥生薑煎湯送下不拘時服化風丹涼風化痰退熱定搐牛膽南星二錢羌活獨活天麻防風甘草荊芥穗人參川芎各一錢上件為末煉蜜為丸如皂子大每服一丸薄荷湯化開服一方有全蠍一枚一方有細辛無甘草驚癇口議先涼三焦利驚去熱安神定志平調臟腑溫化痰涎然後與治驚癇藥服之比金丹人參白茯苓遠志去心山藥辰砂天麻石菖蒲川芎甘草炙各一分天南星炮二錢生薑汁製麝香一字上為細末煉蜜為丸皂子大每服一粒煎金銀薄荷湯化下一方有琥珀二錢青黛一錢無山藥錢氏蛇黃丸治驚癇因震駭恐怖叫號恍惚是也蛇黃真者三個火煅醋淬鬱金七分一處為末麝香另入一匙上為末飯丸桐子大每服十二丸煎金銀磨刀水化下鎮驚丸治小兒一切驚癇茯神去木鐵粉遠志去心薑製焙紫石英燒醋淬研人參去蘆琥珀滑石蛇黃煆醋淬南星炮各二錢半龍齒熊膽各半分輕粉三分上為細末煉蜜為丸如梧桐子大硃砂為衣每服三五丸煎金銀湯磨化不拘時服虎睛丸治小兒驚癇邪氣入心虎睛細研遠志薑製焙去心犀角鎊大黃濕紙裹煨石菖蒲麥門冬去心各二錢半蜣螂三枚去足翅炒上為細末粟米粉打糊為丸如梧桐子大每服五七丸竹葉煎湯磨化或金銀煎湯亦可不拘時服七寶鎮心丸治小兒驚癇心熱遠志去心薑製焙雄黃鐵粉琥珀各二錢硃砂一錢金銀箔四片麝香少許上為細末煮棗取肉為丸如梧桐子大每服三五丸煎去心麥門冬湯化下不拘時服清神散治小兒驚癇犀角白蘚皮石菖蒲遠志去心薑製焙半夏湯泡各二錢半茯神半兩大黃焙人參甘草炙各一錢半上為末每服半錢煎去心麥門冬湯調不拘時服食癇妙聖丹治小兒食癇通利雄黃蠍稍硃砂代赭石煅醋淬輕粉麝香各二錢半巴豆三個去皮出油杏仁去皮尖微炒二錢上為末蒸棗肉為丸如梧桐子大每服三五丸木香煎湯磨化不拘時服天麻丸治小兒食癇有痰南星炮二錢白附子炮天麻牙硝川靈脂全蠍焙各一錢輕粉半錢巴豆霜去油二錢半上為末稀麵糊為丸如麻子大每服十丸用薄荷煎湯或薑湯送下亦可不拘時服清鎮蛇黃散治小兒諸癇蛇黃一個煆醋淬七次研細鬱金雄黃各二錢青礞石硃砂各一錢鐵粉篩淨細研三分上為末搗粳米飯為丸如梧桐子大每服三五丸人參煎湯磨化不拘時服地龍散治小兒諸癇發歇無時乾地龍半兩焙虎睛一對炙人參二錢半金銀箔三十片天竺黃硃砂代赭石煨醋淬鐵粉各二錢半雄黃一錢半輕粉半錢上為末每服半錢紫蘇湯調不拘時服龍腦安神丸茯苓三兩人參地骨皮甘草麥門冬桑白皮各二兩馬牙硝二錢龍腦麝香各三錢牛黃半兩硃砂二錢烏犀一兩金箔三十五片上為細末煉蜜為丸如彈子大金箔為衣如風癇冬月溫水化下夏月涼水化下不以時二三歲者日進二服小兒一丸分二服虛勞發熱咳嗽新汲水下奪魂散定癇白殭蠶去絲炒令黃色半兩蛇含石燒紅用米醋淬七八次碾碎白附子炮各二分生銀生金牛黃如無以膽制倍加用之烏梢蛇頭七八寸許酒炙白茯苓天麻各二錢天南星末一分生薑汁浸一宿焙半夏末二錢薑汁浸一宿焙赤腳蜈蚣一條酒浸炙焦犀角鎊二錢腦子少許麝香少許上件為末蒸棗肉為丸如麻子大每服十丸至十五丸二十丸煎金銀薄荷湯下硃砂為衣本草古鏡味辛無毒主驚癇邪氣小兒諸惡疾煮取汁和諸藥煮服之彌古者尤佳鎮心雌黃丸治小兒癲癇欲發眼暗瘛瘲聲惡嚼舌雌黃黃丹各一兩麝香研一錢上為末拌令極勻用牛乳汁半升熬成膏入前藥末杵三五百下丸如緑豆大每服三丸溫熱水下一日三服此方得自名醫之家極有神效拔萃妙香丸安神通關辟惡氣辰砂研九兩龍腦膩粉麝香研各七錢半牛黃半兩金箔九十片研上合研勻煉蜜去蠟淨入沙蜜白者七錢半同煉勻為丸每兩作三十丸米飲化下鎮心丸硃砂龍齒牛黃各一錢鐵粉琥珀人參茯神防風全蠍七個炙上為末燈心湯調下三歲一字密陀僧散治心癇不語及諸驚失音用密陀僧為末每服一匙米醋湯調下大人服一錢熱酒下代赭石散治陰陽癇代赭石煆醋淬研為末水飛過曬乾上為末每服半錢以金銀煎湯和金箔銀箔調連進二服腳脛上有赤斑乃邪氣發出可治無赤斑則難治神應丹辰砂不以多少研上以豬心血和之得所以蒸餅裹劑蒸熟取出就丸如桐子大每服一丸後食臨臥煎人參湯下清心牛黃清心丸治小兒躁悶項背強直腰背反張時發時醒牛黃一兩二錢研麝香研龍腦另研羚羊角末鎊各一兩當歸去蘆防風去蘆黃芩麥門冬去心白芍藥白朮各一兩半柴胡去苗杏仁去皮尖雙仁麩炒黃另研桔梗白茯苓去皮芎藭各一兩二錢半阿膠銼碎蛤粉炒肉桂去粗皮大豆卷碎炒各一兩七錢半蒲黃炒人參去蘆神麯炒各二兩半甘草炒五錢雄黃八錢另研飛白蘞乾薑各七錢半金箔一千二百片內四百片為衣余入藥內另研犀角末二兩乾山藥十兩大棗一百枚蒸熟去皮核爛研成膏入藥上除棗杏仁及牛黃麝香雄黃龍腦四味另為細末入前藥和勻煉蜜與棗膏為丸每兩作十丸用金箔為衣每服一丸溫白湯化下食後服小兒驚癇即酌度多少以竹葉煎湯溫溫化服比金丸虎睛丸二方俱見前清神湯治驚癇犀角鎊遠志薑製焙白蘚皮石菖蒲人參甘草炒各一錢半上為末每服五七分麥門冬煎湯調下酸棗仁丸見驚悸養心定志丸見驚悸養心湯治心血虛怯驚癇或驚悸怔忡盜汗無寐發熱煩躁黃耆白茯苓茯神半夏曲當歸川芎辣桂柏子仁酸棗仁五味子人參各三錢甘草炒四錢上每服一二錢薑棗水煎妙香散治心氣不足驚癇或精神恍惚虛煩少寐盜汗等證辰砂三錢麝香一錢木香煨二錢五分茯苓山藥茯神遠志黃耆炒各一兩桔梗甘草人參各五錢上各另為末每服一錢溫酒或白湯調服治痰半夏丸方見驚搐星蘇散治諸風口噤不語天南星略炮銼上每服五七分姜四片紫蘇五葉水煎入雄豬膽少許溫服治癇方治太陽陽明二經為病荊芥穗四兩白礬為細末二兩上棗肉為丸如桐子大每服二十丸荊芥湯下次三十丸四十丸又次五十丸俱食前礬丹虢丹晉礬各一兩上用磚鑿一窠可容二兩許先安丹在下次安礬在上以炭五斤煅令炭盡取出細研以不經水豬心血為丸如緑豆大每服十丸至二十丸橘皮湯下元戎二白丸白礬一塊約一兩上用生蒸餅劑裹蒸熟去皮可丸入輕粉一字或半錢量虛實加減丸桐子大每服二三十丸生薑湯下小兒丸小硃砂滾涎散治小兒五癇硃砂白礬生用赤石脂硝石各等分上為細末研蒜膏為丸如緑豆大每服三十丸食後荊芥湯下琥珀壽星丸天南星一個掘坑用火煆燒坑紅出炭淨入好酒一升在火穴中放入南星蓋穴勿令通氣過一宿取出焙末琥珀四兩硃砂二兩半為衣上以豬心血打幹糊丸如桐子大每服五十丸煎人參湯送下南星五生丸南星半夏川烏白附子大豆去皮各一兩上為細末滴水為丸每服二丸至五丸不過七丸薑湯下斷癇丸治小兒諸癇痰盛皂角盈尺者三挺去皮捶碎水三升浸收汁濾過瓷器內熬成膏白礬煆枯研細一兩半蠍稍炒直殭蠶炒雄黃另研硃砂另研白附子各半兩麝香一錢另研烏蛇酒浸取肉焙乾二錢半南星濕紙裹炮熟一兩赤蜈蚣一條酒浸炙去頭足上為末用水煮半夏糊和前項皂角膏為丸如梧桐子大每服三五丸用生薑湯磨化不拘時服定癇丸治小兒五癇赤腳蜈蚣一條去頭足酒浸炙蠍稍去毒烏蛇肉酒炙白附子生天南星末丸白半夏末用薑汁和一宿各二錢半熊膽白礬新瓦上煅枯各一錢二分半上為末稀麵糊為丸如梧桐子大硃砂為衣每服二三丸用薄荷煎湯磨化不拘時服治小兒驚癇膽星二兩全蠍去毒炒半兩白附子殭蠶炒川芎各一兩薄荷半兩上為末粥丸青黛為衣每服一二丸薑湯下吐痰碧穹丹石緑研九度飛十兩附子尖烏頭尖蠍稍各五十個上為末入石緑令勻麵糊丸如雞頭每服用薄荷汁半盞化下一丸更以酒半合溫服之須臾吐先痰涎然後隨證治之下痰控涎丸川烏生半夏各半兩殭蠶生薑汁浸一宿半兩全蠍去尖七個鐵粉三錢甘遂二錢半上為末生薑自然汁或薄糊丸如緑豆大硃砂為衣每服十五丸薑湯下忌甘草治小兒癇用甘遂末一錢豬心一個取三管頭血三條和甘遂末將豬心批作兩片入藥在內以線縛定外濕紙包裹入文武火煨熟不可過度取藥細研入辰砂末一錢和勻分作四丸每服一丸豬心湯化下再服另取豬心煎湯此方神效下劑水晶丹方見癖積四順飲五和湯二方並見熱利驚丸方見驚搐紫霜丸方見變蒸熱當歸大黃湯治小兒諸癇作熱利下心中惡血大黃濕紙裹微煨甘草炙當歸赤芍藥各三錢半夏制川芎各二錢為末每服一錢或二錢水八分鐘煎四分無時服表劑百解散大青膏並見驚搐驅風膏瀉青加辰砂全蠍溫劑治陰癇宜之固真湯曰生湯並見驚搐茯神湯方見驚悸元戎小靈寶丹附子炮一兩天麻全蠍白殭蠶炒藿香葉南星炮白附子炮各半兩上為末酒糊丸桐子大溫酒下一十五丸羅謙甫治魏敬甫之子四歲從長老摩頂授記衆僧念咒因而大恐遂發驚搐痰涎壅塞目多白睛項背強急喉中有聲一時許方醒後每見皂衣人輒發多服朱犀龍麝鎮墜之藥四十餘日前證猶在又添行步動作神思如癡豫診其脈沉弦而急黃帝針經云心脈滿大癇瘈筋攣又云肝脈小急癇瘈筋攣蓋小兒血氣未定神氣尚弱因而驚恐神無所依又動於肝肝主筋故癇瘈筋攣病久氣弱小兒易為虛實多服鎮墜寒涼之劑復損其氣故添動作如癡內經云暴攣癇眩足不任身取天柱穴是也天柱穴乃足太陽之脈所發陽蹺附而行也又云癲癇瘛瘲不知所苦兩蹺主之男陽女陰潔古云晝發治陽蹺申脈夜發治陰蹺照海先各灸兩蹺各二七壯次處沉香天麻湯沉香益智川烏炮去皮臍各二錢天麻防風半夏湯泡附子炮去皮臍各三錢羌活五錢甘草炙當歸姜屑各一錢半獨活四錢上㕮咀每服五錢生薑三片水煎溫服舉痛論云恐則氣下精怯而上焦閉又云從下上者引而去之以羌活獨活苦溫味之薄者陰中之陽引氣上行又入太陽之經為引用故以為君天麻防風辛溫以散之當歸甘草辛甘溫以補氣血之不足又養胃氣故以為臣黑附子川烏頭益智仁大辛溫行陽退陰又治寒客傷胃腎主五液入脾為涎以生薑半夏燥濕化痰十劑云重可去怯沉香辛溫體重氣清去怯安神故以為使氣味相合升陽補胃恐怯之氣自得平矣牛黃丸治因驚中風五癇天釣客忤潮涎灌壅白花蛇酒浸取肉白附子全蠍真川烏一枚半兩者生天麻薄荷葉各半兩以上六味先為細末次入雄黃五兩辰砂三錢腦子另研半兩牛黃三錢麝香一錢上為一處和勻麻黃去根二兩酒一升煎麻黃至一盞去麻黃用酒熬藥得所勿至焦赤衆手疾丸如芡實大密器盛之一丸作五服煎金銀薄荷湯磨化大能發散驚邪治五癇得效方露蜂房焙石緑各一兩桂心遠志去心人參各半兩硃砂一錢上為末粥丸如桐子大每服二三十丸白湯下補劑斷癇丹治癇瘥後復作連綿不除服之有驗黃耆蜜水塗炙釣藤鉤細辛甘草炙各半兩蛇蛻皮二寸酒炙蟬蛻去土四個牛黃一錢另研上為末煮棗肉丸麻子大煎人參湯下每服數丸量兒加減紫河車丸紫河車即小兒胞衣肥厚者一個洗淨重湯蒸爛研化入人參當歸末和勻為丸如芡實大每服五六丸乳汁化下八味地黃丸即六味地黃丸加附子肉桂各一兩治稟賦命門火衰不能生土以致脾土虛寒或飲食少思或食而不化臍腹疼痛夜多漩溺等證經云益火之源以消陰翳蓋謂此也或乳母命門火衰兒飲其乳致前證者子母並宜服之加減八味丸治稟賦腎陰不足或吐瀉久病津液虧損口乾作渴或口舌生瘡兩足發熱或痰氣上湧或下足厥冷等證即地黃丸加肉桂一兩五味子四兩地黃丸治小兒肝經虛熱血燥或風客淫氣而患瘰癧結核或四肢發搐眼目抽動痰涎上湧又治腎疳腦熱肢體消瘦手足如冰寒熱往來滑泄肚脹口臭乾渴齒齦潰爛爪黑麵黧遍身或兩耳生瘡或耳內出水或發熱自汗盜汗便血諸血失音等證其功不能盡述即六味地黃丸方見腎臟八珍湯治氣血俱虛陰火內熱或因克伐之劑脾胃虧損肌肉消瘦等證即四君四物二湯方見虛勞十全大補湯治氣血虛弱或稟賦不足寒熱自汗食減體瘦發熱作渴頭痛眩暈最宜用之方見虛勞灸法小兒癲癇驚風目眩灸神庭一穴七壯在鼻柱直上入髮際五分小兒諸癇如噦吐清沫灸巨闕穴三壯在鳩尾下一寸陷中是穴小兒雞癇善驚及掣目搖頭灸少陰二壯取法在掌後去腕半寸陷中是穴小兒驚癇者先驚叫乃發也灸頂上旋毛中三壯及耳後青絡脈炷如小麥大小兒驚癇灸鬼祿一穴三壯取法在上唇內中央弦上是穴小兒食癇者先寒熱灑淅乃發也灸鳩尾穴上五分三壯小兒牛癇目視直腹脹乃發也灸鳩尾一穴三壯取法胸蔽骨下五分陷中是穴小兒馬癇張口搖頭身折反馬鳴也灸僕參穴各三壯取法在足跟骨下白肉際陷中拱取之是穴小兒羊癇目瞪吐舌羊鳴也灸第九椎下節間三五壯按靈樞經云暴攣足不任身取天柱天柱穴足太陽也又云癲癇瘛瘲不知所苦兩蹺之下男陽女陰潔古云晝發灸陽蹺夜發灸陰蹺各二壯陽蹺起於跟中循內踝上行至咽喉交貫衝脈照海穴也不治證錢五癇重者死病後甚者亦死小兒癇病目直無聲目睹不轉眼生白障眼慢唇黑瞳人瞬動目間青黑面青指黑口出涎沫如白膿口噤肚脹不乳喉如牽鋸之聲多睡不乳身熱下血不乳身體痿軟不醒腹內虛鳴唇逆而痛吐利不止汗出壯熱不止臥久不寢身體反張大人脊下容一手小兒脊下容一指並不治中風張渙等方有中風方論今見小兒絶無患者而用藥多犯香燥恐血熱生風類中風證誤用之則為害不淺故一切削而不載薛氏云中風之證西北方有之東南氣溫腠理疏泄人患之者皆類中風也況小兒元氣未充皮毛不固易虛易實外邪乘之則壯熱抽掣氣粗涎湧甚至昏憒口噤即似中風誤以續命等湯投之多至不救大人且無真中況小兒乎凡有前證當辨其因若陽明經氣虛風邪所乘筋脈拘急者為外因足厥陰肝火熾盛筋脈偏急者為內因脾肺虛弱腠理不密外邪乘入或驚風過服金石之劑耗損肝血或吐瀉後內亡津液不能養肝致口眼喎斜者皆肝血不足肝火生風之類中風之類證也角弓反張錢肝有風甚則身反張強直不搐心不受熱當補腎治肝補腎地黃丸治肝瀉青丸丹溪云痙比癇為虛宜帶補多是氣虛有火兼痰用人參竹瀝治之不用兼風藥此論實發前人所未發湯氏雖云痙候十無一生蓋未嘗有此法施於人也薛錢仲陽曰角弓反張者由風邪客於太陽經也經曰風從上受足太陽主周身之氣其脈起於目內眥而行於背肝屬木主風所以風邪易侵也夫小兒肌膚未密外邪易傷肝為相火其怒易發若身反張強直發熱不搐者風傷太陽也宜用人參羌活散小續命湯若因暴怒而擊動其肝火者宜用瀉青丸若飲前劑其證益甚者此邪氣已去而脾氣虧也宜用異功散加芎歸補之若因肝經虛熱或因克伐真氣虛熱生風者宜用異功散地黃丸補之若因下而脾氣困憊腹肚膨脹者此中氣損也宜用白朮散補之若氣血素弱或服攻伐之劑而手尋衣領咬牙呵缺者肝經虛甚也急用地黃丸以補之仍與肝臟參覽一小兒忽腰背反張目上視面青赤曰青屬肝主風赤屬心主火此風火相搏用柴胡梔子散倍加釣藤鉤頓安而痰如舊又用抱龍丸而愈一小兒忽腰背反張服治驚之藥後不時舉發面色黃白肢體甚倦余用五味異功散十餘劑而愈後因驚兼飲食不節不時舉發隨用前藥即愈遂日以參朮末每服五七分炮薑大棗煎湯調下服至二兩而不發以上二證元氣虛而病氣實也若用攻邪之藥皆誤矣一小兒素患前證痰盛面色素白而兼青余謂肺氣不能平肝肝氣乘脾脾氣虛而生痰耳先用抱龍丸二服以平肝隨用六君子湯以補脾肺月餘而痊半載之後復發謂非逐痰不能全愈遂用下劑痰涎甚多而咽喉如鋸聲余曰乃脾不能攝涎也咽間鳴乃肺氣虛甚也遂用人參五錢炮姜三分水煎服而醒至第四劑後加棗二枚人參服數兩而愈後每發非獨參湯不應若執常方鮮有不誤者人參羌活散方見驚搐小續命湯方見雜病中風瀉青丸方見肝臟異功散方見吐瀉柴胡梔子散方見積熱抱龍丸方見驚搐六君子湯方見吐瀉灸角弓反張鼻上入髮際三分灸三壯大椎下節間灸三壯診湯氏曰身軟時醒者為癇身強直反張如弓不時醒者為痙痙候十無一生搖頭湯肝風搖頭諸方不載鄭都丞子患七年搖頭三年下血已服百餘方前後所服治搖頭者無非風藥止血者或作痢或作腸風百藥無效豫既視其病又知其詳亦不明其標本退而思之乃肝血液盛外有風熱乘之肝屬木盛而脾土為木所克脾與肺是子母俱為肝所勝而血遂漬於大便故便血不止遂處一方但損肝祛風而益脾初亦一時之見只數服而愈十餘日後血止而下白膿遂得以安清肝益胃丸犀角屑甘草各一分栝蔞根黃耆蜜炙羌活白芍藥冬半兩蛇蛻皮炙赤釣藤鉤麻黃去節各一錢防風五兩上為末棗肉丸食後薄荷湯下只二服作效頭搖即止便血隨愈次間服胃風湯數日頓除沈舍人子服之亦驗薛經曰諸風掉眩皆屬肝木木得風則搖動乃肝經火盛而生虛風也便血者風木搖動則土受凌瘧而不能統血也或食酸味過多以益其脾致令陰結經曰結陰者便血一升再結二升三結三升又邪在五臟則陰脈不和陰脈不和則血留之結陰之病陰氣內結不得外行滲入腸間故便血也血亦有乳母而搖頭不止後一老醫至於常服藥中加入紫河車即時愈按紫河車草名神農本經名早休唐本名金線重樓錢氏方名白甘遂主治驚癇搖頭弄舌乃本經正文古人謂遵白字療病多效不虛也偏風口噤薛小兒偏風者屬少陽厥陰肝膽二經證也噤者筋急由風木太甚而乘於脾以勝水濕則筋太燥然燥金主於收斂徑切故也又曰風之為病善行而數變或左或右其因一也治須審而藥之若足陽明胃經氣虛風邪所乘其筋脈偏急者屬外因若足厥陰肝經風熱乘脾筋脈偏急者屬內因若脾肺虛弱腠理不密外邪所乘成服金石之劑耗損肝血或吐瀉後內亡津液不能養肝致口眼歪斜或半身不遂諸證皆屬肝血不足肝火生風宣滋腎水養肝血壯脾土治法脾胃虛而動風者異功散加柴胡釣藤鉤脾肺虛而外邪所乘者用釣藤飲肝火血燥者用六味地黃丸津液不足者用白朮散若兼目緊上視寒熱往來小便淋漓面色青潔兩脅脹痛之類皆肝經之本病也或唇口歪斜腹痛少食目胞浮腫面色青黃肢體倦怠之類皆肝木乘脾之證也當審五臟相勝而主之設執其見證概投風藥反成壞證者有矣一小兒口眼喎斜面色或青或赤此肝心風火乘脾也朝用柴胡清肝散夕用異功散加釣藤鉤而愈其時有患前證服祛風導痰之藥者皆不能起一小兒痢後患前證發搐面色痿黃肢體倦怠此元氣虛克伐多矣余用補中益氣湯加釣藤鉤子服而漸愈後因乳母七情飲食失宜或兒乳食過多前證仍作服補中益氣湯五味異功散而愈錢全蠍散治小兒驚風中風口眼喎斜言語不正手足偏廢不舉全蠍去毒炒殭蠶直者炒川芎黃芩去心甘草桂枝赤芍藥麻黃去節各一兩天麻六錢大南星湯泡七次去皮臍切焙乾五錢上為粗末每服三錢水一鍾半姜七片煎七分溫服無時量大小與之一日三四服忌羊肉胃風湯治風冷乘虛入客腸胃水穀不化泄瀉注下及腸胃濕毒下如豆汁或瘀血日夜無度人參白茯苓芎藭肉桂當歸白芍藥白朮各等分上為散每服二錢入粟米數粒同煎食前服口喎失音論見前中風條硃砂丸治小兒口眼喎斜筋脈牽引硃砂五錢全蠍炒天麻白附子炮殭蠶炒去絲嘴乾薑炮牛黃各五分麝香一分上為末粳米糊丸如黍米大每服三十丸用薄荷湯不拘時化服全蠍散治小兒口眼喎斜語言不清全蠍炒川芎黃芩殭蠶炒去絲嘴赤芍藥甘草硃砂南星湯泡去皮臍焙天麻各三錢上為細末每服一錢用生薑湯不拘時調服寬氣飲治小兒風痰壅滿風傷於氣不能言語枳殼去穰一兩人參去蘆五錢天麻殭蠶炒去絲嘴羌活甘草炙各三錢上銼碎每服二錢用水一盞生薑三片煎五分不拘時服木通湯治小兒血滯於心心竅不通語言不出木通石菖蒲多用防風枳殼全蠍焙殭蠶炒甘草木香南星炮各等分上銼碎每服二錢用水一盞豬心三片生薑一片紫蘇五葉煎至五分不拘時服天釣內釣附天釣亦驚風之證但天釣發時頭目仰視驚風則無也湯小兒瘛瘲不定翻眼抬睛狀若神祟頭目仰視名為天釣凡有此疾宜服蘇合香丸灸兩手大拇指兩甲肉相半男先灸左女先灸右及兩足大拇趾中間各三五壯又灸前後手心各五壯此皆得效之法九龍控涎散治天釣赤腳蜈蚣酒塗炙一條滴乳天竺黃二味另研各一錢臘茶雄黃另研甘草炙各二錢荊芥穗炒白礬枯各一錢緑豆半生半炒一百粒上為末每服半錢人參薄荷湯調下釣藤飲治天釣潮熱釣藤人參犀角屑各半兩全蠍天麻各二分甘草半分上為末每服一錢水煎服張小兒心膈壅滯邪熱痰涎蘊積不得宣通或乳母飲酒食肉煩毒之氣流入乳中令兒宿滯不消邪熱毒氣乘於心神致使驚悸眼目翻騰壯熱不休四肢瘛瘲其病名曰天釣甚者爪甲皆青狀如神祟今集經效名方治之於後一字散醒風爽精神天南星半兩微炮裂蟬殼微炒乾蠍白殭蠶各一分上件搗羅為細末次入蕎麥麵一分用醋石榴殼一枚將諸藥入在石榴殼內以鹽泥封裹於灶下慢火上燒之泥乾燥為度取出再研勻每服一字溫酒調下雙金散治天釣驚風目久不下蜈蚣一個去頭足尾用真酥塗慢火炙黃置砧子上面南立用竹刀子當脊縫中亭利作兩半個左邊者入一帖子內寫左字右邊者亦入一帖子內寫右字不得交錯即大誤矣麝香一錢細研先將左邊者同於乳鉢內研作細末卻入在左字貼內收起別用乳鉢將右邊字者入麝香同研極細卻入右字貼內收不得相犯每有病者眼睛釣上止見白睛兼角弓反張更不能出聲者上用細葦筒子取左字貼內藥少許吹在左邊鼻里右亦如之用藥不可多若眼未全下更添些小以意量度其眼隨手便下即止牛黃散清心截風牛黃半兩細研硃砂細研水飛麝香天竺黃並細研蠍稍釣藤俱為末各一分上件一處研勻每服一字新汲水調下白銀丹治驚風涎潮天南星一兩一半炮一半生用白殭蠶半兩全蠍白附子各一分牛黃研麝香研粉霜各半分以上搗羅為細末次用牛黃等同研勻用水銀半兩煮青州棗肉二十個同研水銀星盡成膏上都和上件藥石臼內搗一二百下如黍米大每服五粒至七粒薄荷湯下抵聖丹治驚風胸膈不利乳食不下錫吝脂一兩細研水飛淘去黑水令盡牛黃研鉛霜細研熊膽各一分研麝香半分研蟾酥一錢研上件通研勻粳米飯和如黍米大每服五粒至七粒新汲水下薛天釣者發時頭目仰視驚悸壯熱兩目反張淚出不流手足搐掣不時悲笑如鬼祟所附甚者爪甲皆青蓋因乳母厚味積毒在胃致兒心肺生熱痰鬱滯或外挾風邪為患法當解利其邪用釣藤飲上氣喘粗者用烏蠍四君子湯內釣者腹痛多喘唇黑囊腫傴僂反張眼尾赤此胎中受風及外驚所致若內臟抽掣作痛狂叫或泄瀉縮腳內證一作外證亦然極難調理內證服聚寶丹外證服釣藤飲進乳食者可治若腹痛唇黑囊腫之類用聚寶丹若外驚內藏抽搐之類用釣藤飲若因乳母醇酒厚味積毒在胃用加味清胃散若因乳母鬱怒積熱在肝用加味逍遙散加味歸脾湯俱加漏蘆子母俱服凡母食膏粱厚味飼兒之時先擠去宿乳然後吮之一小兒因乳母受驚發搐時目赤壯熱腹痛哭而曲腰用四物加柴胡防風又用加味逍遙散加熟地黃以清肝熱生肝血再用地黃丸滋腎水以生肝木母子俱安一小兒曲腰而啼面青唇黑此寒氣所乘內釣腹痛也用五味異功散加木香乾薑一劑與母服之頓愈後因母感寒腹痛而啼用人參理中湯一劑與母服其子亦安一小兒曲腰乾啼手足並冷用六君加乾薑木香服之未應又加肉佳母子俱服而愈一小兒忽乾啼作瀉睡中搐手足冷此脾土虛寒肝木侮之而作發搐乃內釣也用益黃散一劑而安用四君加柴胡升麻乳食漸進而安一小兒乾啼面青或赤手足並熱或用清熱之劑久不愈診其乳母有肝火氣滯用加味逍遙散及越鞠丸以治其母時灌子數滴不旬日子母並愈一小兒患前證服魏香散而愈後復作服祛風鎮驚之藥上氣喘粗此元氣虛寒也余先用烏蠍四君子湯稍愈但倦怠殊甚用補中益氣湯及五味異功散而痊一小兒因母每感寒腹痛飲燒酒發熱痰盛面赤手足並熱屬胃經實熱之天釣也用清胃散子母服之並愈後因傷乳吐瀉面色或青或白手足並冷屬脾氣虛寒用六君木香乾薑而愈三歲後傷食腹痛唇黑作瀉數去後而無糞或糞少而青此氣虛寒下陷用補中益氣湯漸愈一小兒啼哭陰囊腫大眼目上翻赤脈流淚此肝熱內釣用柴胡清肝散加釣藤鉤治之諸證漸愈又用釣藤飲而痊後復發或用祛病根之藥致乳食日少肚中脹痛手足浮腫余先用六君升麻柴胡數劑諸證稍愈又傷乳食吐瀉用平胃散一服即愈一小兒因乳母懷抱鬱結腹痛發搐久而不愈用加味歸脾湯加漏蘆母子並服漸愈又母大怒發厥而蘇兒遂食乳腹痛作瀉面青作嘔先用小柴胡湯二劑母子並服少愈其母又咽酸腹脹用越鞠丸加味歸脾湯佐以加味逍遙散而痊釣藤膏魏香散二方並見腹痛釣藤飲治小兒臟寒夜啼陰極發躁此方主之釣藤茯神茯苓川芎當歸木香甘草芍藥各一錢上為末每服一錢薑棗水煎若心經熱臉紅舌白小便赤澀用釣藤飲去木香加硃砂末一錢木通湯下釣藤飲治天釣風搐釣藤犀角天麻各七分全蠍五個木香甘草各五分上作一服水一鍾生薑三片煎至五分不拘時服釣藤飲子治驚風天釣卒然驚悸眼目翻騰釣藤炒五分麻黃去節甘草炙各三分天麻川芎防風人參各七分全蠍炒去毒五個殭蠶炒七個上作一服水一鍾生薑三片煎至五分不拘時服乳香丸治驚風內釣腹痛驚啼乳香半錢沒藥沉香各一錢蠍稍十四個雞心檳榔一錢半上為末蜜丸桐子大每服二三錢菖蒲釣藤鉤煎湯下木香丸治同前木香全蠍各五分沒藥蘹香釣藤鉤各一錢上各別為末以大蒜研爛和丸桐子大曬乾每服二丸釣藤煎湯下牛黃丸治小兒一切驚風五癇天釣客忤痰涎四肢抽掣白花蛇酒浸取肉白附子全蠍川烏一隻重半兩生用去皮臍天麻薄荷葉各半兩以上先為細末次入雄黃半兩辰砂三錢牛黃一錢麝香片腦各半錢另研上件為細末一處和勻麻黃去節二兩酒一升煎麻黃至一盞去麻黃用酒入蜜少許熬成膏劑前藥末為丸如芡實大用金箔為衣每服一丸用薄荷湯化下大能發散風邪塗頂膏治天釣風備急烏頭生用去皮臍蕓薹子各二錢上為末每用一錢新汲水調敷兒頂上天漿子散治小兒天釣驚風天漿子炙蠍稍犀角屑丹砂另研雄黃另研附子去皮臍南星炮去皮白附子半夏水銀另研乳香另研白殭蠶膩粉另研牛黃另研各一錢麝香一字另研銀箔五片另研上為細末和勻每服一字用薄荷湯調下量兒大小加減服青黛丸治小兒天釣客忤五疳八痢十二種驚癇青黛天竺黃干蛤蟆一個黃泥包裹燒赤去泥干蝸牛殼黃連人參地龍去土釣藤炒龍膽草各二錢半蘆薈熊膽各半兩牛黃麝香雄黃丹砂各一錢夜明砂去土淨胡黃連各三錢上為細末蒸餅糊為丸如麻子大一歲三丸空心米飲湯送下再生散治小兒天釣驚風潮搐項筋緊強手足厥冷烏蛇酒浸取肉天麻南星炮去皮全蠍炒去毒各二錢半麝香膩粉各五分丹砂二錢另研牛黃另研白附子炮各一錢上為細末和勻每服半錢煎金銀薄荷湯調下量兒大小加減服三白散治小兒盤腸氣釣先服此藥後服釣藤膏白牽牛一兩炒白朮桑白皮陳皮木通各三錢上為細末每服半錢用生薑湯調不拘時服廣利方治癇迷嚼舌仰視牛黃大豆許和蜜水調拘攣續命湯治小兒手足拘攣不能屈伸麻黃人