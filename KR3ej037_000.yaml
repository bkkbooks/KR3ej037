心神養氣血和平預防之劑也天竺黃另研人參茯神南星薑製各五錢酸棗仁炒麥門冬當歸酒洗生地黃酒洗赤芍藥炒各三錢薄荷木通黃連薑汁炒山梔炒辰砂另研牛黃另研龍骨煆各二錢青黛一錢另研上為末蜜丸緑豆大每服三五丸量兒大小加減淡薑湯送下慢驚慢驚之候或吐或瀉涎鳴微喘眼開神緩睡則露睛驚跳搐搦乍發乍靜或身熱或身冷或四肢熱或口鼻冷氣面色淡白淡青眉唇間或青黯其脈沉遲散緩蓋由急驚過用寒涼或轉太驟傳變成之又有吐利不止而成者有氣虛暴吐瀉而成者有夏月脾胃伏熱大吐瀉當解暑熱不可專曰固陽有臟虛洞泄成者有久痢氣脫而成者有下積取瀉成者有吐血瀉血而成者有傷寒傳變陰證成者有得之久嗽作癇者有得之發癇不已者有得之蟲積衝心者有得之卵腫疝氣腹痛其或汗出太過脾困煩渴四肢浮腫大小便閉走馬急疳並傳慢候惟吐瀉積痢成虛致之則證變甚速凡才經吐瀉便是慢驚須用溫中扶里或搐來緊急乃慢驚初傳尚有陽證不可誤作急驚用藥世言搐慢為慢驚非也若泥此往往指慢脾為慢驚矣凡慢驚男子以瀉得之為重女子以吐得之為重又吐有五證瀉有五證各明所因主治古云病家怕驚不怕瀉醫家怕瀉不怕驚如因泄瀉不止且先治瀉若更治風則驚風愈甚如因他證例當循原施治也其慢驚候若從急驚傳來只可截風調胃均平陰陽不可全用陽藥使陽歸陽復作急驚之候用藥施治無過不及可也急驚以關格不通略施腦麝開通定其搐搦尚可慢驚陰重陽虧諸經已虛不宜通關又涼其臟易作慢脾風慢驚危急如眼睛昏定定而眨雖眨不左右顧或竄視四肢厥冷汗出如流口面黲黯指甲黑四體垂嚲至重慢驚證眼半開半合似睡不睡是也其脈或浮或沉身或熱或涼或吐或瀉或不吐瀉或食乳或阻乳名半陰半陽合病即如傷寒半表半裡也治法大要審問源流施治不可概曰慢驚證如因吐瀉得之用湯氏醒脾散之類他證可以類推次第於後然慢驚已傳屬陰亦須准較陰陽虧盛淺深不可溫燥之劑太過錢慢驚因大病後或吐瀉或只吐不瀉變成脾胃虛損遍身冷口鼻氣出亦冷手足時瘛瘲昏睡露睛此無陽也宜栝蔞湯主之東都王氏子吐瀉諸醫用藥下之至虛變慢驚其候昏睡露睛手足瘛瘲而身冷錢曰此慢驚也與栝蔞湯其子胃氣實即開目而身溫王疑其子不大小便令諸醫以藥利之醫留八正散等數服不利而身復冷令錢氏利小便錢曰不當利小便利之必身冷一二日果身冷矣因抱出錢曰不能食而胃中虛若利大小便則脾胃俱虛當身冷而閉目即死今幸胎氣實而難衰也錢氏用益黃散使君子丸四服令微能飲食至日午果能飲食所以然者謂利大小便脾胃虛寒當補脾不可別攻也後又不語諸醫作失音治之錢曰既失音何開目而能飲食又牙不緊而口不噤也諸醫不能曉以地黃補腎錢曰此因用涼藥利小便致脾腎俱虛今脾已實腎尚虛故補腎必安治之半月而能言一月而痊潔慢驚者陰證俱臟受病蓋小兒吐瀉病久脾胃虛損若不早治則成慢驚名曰瘛瘲似搐而不甚搐也因脾胃虛損故大便不聚當去脾間風先用宣風散導之後用益黃散使君子丸平之則其利自止既已失治則脾胃俱虛致被肝木所乘是為慢驚當用溫補羌活膏主之垣閻孝忠編集錢氏方以益黃補土誤矣其藥有丁香辛熱助火火旺土愈虛矣青橘皮瀉肺金丁香辛熱大瀉肺與大腸脾實當瀉子今脾胃虛反更瀉子而助火重虛其土殺人無疑矣其風木旺證右關脈洪大掌中熱腹皮熱豈可以助火瀉金如寒水來乘脾土其病嘔吐腹痛瀉痢青白益黃散聖藥也今立一方先瀉火補金大補其土是為神治之法以黃耆二錢人參一錢炙甘草五分加白芍藥一錢此四味皆甘溫能補元氣甘能瀉火內經云熱淫於內以甘瀉之以酸收之白芍藥酸寒寒能瀉火酸味能瀉肝而大補肺金所補得金土之位金旺火虛風木何由而來剋土然後瀉風之邪夫益黃散理中丸養神之類皆治脾胃寒濕大盛神品之藥也若得脾胃中伏火勞役不足之證及服熱藥巴豆之類胃虛而成慢驚之證用之必傷人命夫慢驚風者皆由久瀉脾胃虛而生也錢氏以羌活膏療慢驚風誤矣脾虛者由火邪乘其土位故曰從後來者為虛邪火旺能實其木木旺故來剋土當於心經中以甘溫補土之源更於脾土中瀉火以甘寒更於脾土中補金以酸涼致脾土中金旺火衰風木自虛矣海驚啼手足瘛瘲睡臥不穩四君子加全蠍去尾尖毒炒釣藤白附子炒等分同煎脾胃虛弱生風多困四君子加炒半夏曲沒石子等分為細末入冬瓜子少許同煎服丹頻吐瀉將成慢驚用錢氏白朮散加山藥扁豆炒肉豆蔻麵煨各一錢入姜一片煎服若慢驚已作加細辛天麻各一錢全蠍三個去稍白附子八分麵煨驚而瀉用參苓芍藥酒炒白朮姜煎夏月加黃連甘草竹葉服之曾治慢驚者考之古書亦無所據惟載陰癇而已蓋慢驚屬陰陰主靜而搐緩故曰慢其候皆因外感風寒內作吐瀉或得於大病之餘或傳誤轉之後目慢神昏手足偏動口角流涎身微溫眼上視或斜轉及兩手握拳而搐或兼兩足動制各辨男左女右搐者為順反此為逆口氣冷緩或囟門陷此虛極也脈沉無力睡則揚睛謂兩目半開半合此真陽衰耗而陰邪獨盛陰盛生寒寒為水化水生肝木木為風化木克脾土胃為脾之府故胃中有風瘛瘲漸生其瘛瘲證狀兩肩微聳兩手垂下時復動搖不已名為慢驚宜以青州白丸子蘇合香丸入薑汁杵勻米飲調下虛極者加金液丹次用沖和飲同七寶散水煨姜煎服使氣順風散少解吐瀉間以胃苓湯救其表裡若吐不止可投定吐飲瀉不減宜服六柱散或曰生湯去胃風定瘛瘲清神氣五苓散導其逆調榮衛和陰陽若痰多唇白四肢如冰不省人事此虛慢之極用固真湯速灌之以生胃氣胃氣既回投醒脾散沉香飲調理薛慢驚之證吐瀉痰鳴氣喘眼開神緩昏睡露睛驚跳搐搦乍發乍靜或身熱身冷面淡青白或眉唇青赤其脈遲沉而緩是也稟賦不足或久病脾虛及常服克伐之藥者多致此證若因土虛不能生金金不能平木木來侮土而致前證者以五味異功散加當歸酸棗仁佐以釣藤飲子補土平木若脾土虛寒者用六君子加炮薑木香不應急加附子以回陽氣蓋陰血生於脾土宜四君子當歸酸棗仁凡元氣虧損而至昏憒者急灸百會穴若待下痰不愈而後灸之則元氣脫散而不救矣慢脾風慢脾風之候面青額汗舌短頭低眼合不開睡中搖頭吐舌頻嘔腥臭噤口咬牙手足微搐而不收或身冷身溫而四肢冷其脈沉微陰氣極盛胃氣極虛十救一二蓋由慢驚之後吐瀉損脾病傳已極總歸虛處惟脾所受故曰脾風若逐風則無風可逐若治驚則無驚可治但脾間痰涎虛熱往來其眼合者脾困氣乏神志沉迷痰涎凝滯而已然慢脾之名又曰虛風小兒或吐或瀉之後面色虛黃因虛發熱才見搖頭斜視昏困額汗身亦黏汗聲沉小而焦即脾風之證不必皆因急慢風傳次而至又當識之又慢脾之候言脾而不言胃何也蓋胃為腑屬陽非若脾乃陰臟也故小兒病傳在腑多自愈在臟不可不治蓋小兒純陽之氣在腑為順在臟為逆古人皆理其臟未言治腑也又腎一臟常主虛不可攻治若腎臟有患但清心肺緣心與腎即既濟也肺與腎又子母也無與腎藥及諸補藥也慢脾惟吐與瀉積與痢傳入慢候其證變至速虛又速也治必循次平和無令速愈之理藥和且平調脾養胃不可過劑也錢氏有黃土湯以土勝水木得其平則風自止以脾土為本也治法大要生胃回陽若眼半開半合手足不冷證候尚在慢驚則勿用回陽或已入慢脾而陽氣未甚脫者亦未可即用硫黃附子等劑手足漸暖仍以醒脾散等調之曾氏用青金丹天麻飲灌服或六柱散固真湯錢氏方栝蔞湯栝蔞二錢白甘遂末一錢上同於慢火上炒焦黃研勻每服一字麝香薄荷湯調服上栝蔞湯錢氏治慢驚法脈有力者宜用蓋濕痰積於膈中使風火不得開發而身冷故用栝蔞湯劫去濕痰使風火得伸而身溫搐止若脈無力者不宜用之便當補脾及溫白丸羌活膏之類青州白丸子治小兒驚風大人諸風半夏生七兩南星生三兩白附子生二兩川烏生半兩去皮臍上為末以生絹袋盛井花水擺出如未出者更以手揉出如有滓更研再入絹袋擺盡為度於瓷盆中日曬夜露至曉撇去舊水別用井花水攪又曬至來日早再換新水攪如此法春五日夏三日秋七日冬十日去水曬乾後如玉片研細以糯米粉煎粥清丸緑豆大每服三五丸薄荷湯下癱風酒下並無時異功散溫中和氣治吐瀉不思食方見吐瀉溫白丸治小兒脾氣虛困泄瀉瘦弱冷疳洞利及因吐瀉或久病成慢驚瘛瘲天麻生半兩白殭蠶炒白附子生天南星銼湯洗焙乾各一兩乾蠍去毒一錢上為末湯浸寒食麵為丸如緑豆大仍於寒食麵中養七日取出用每服五七丸至二三十丸空心生薑米飲下量病勢漸加丸數服之寒食麵謂寒食日煮吃麵取之以焙乾貯用也釣藤飲子治吐利脾胃氣弱虛風慢驚釣藤七錢半蟬殼防風去蘆人參去蘆麻黃去節白殭蠶炒黃天麻蠍尾炒去毒各半兩甘草炙川芎各二錢五分麝香一錢另研一方有蜣螂三個去頭足炙黃上為末每服二錢水一盞姜三片煎六分溫服量多少與之寒多者加附子半錢服無時羌活膏治脾胃虛或吐瀉後為慢驚者亦治傷寒無不效防風去蘆川芎人參去蘆白附子炮赤茯苓去皮各半兩天麻一兩白殭蠶湯浸炒黃乾蠍炒去毒白花蛇酒浸焙各一分川附子炮去皮臍麻黃去節各三錢肉豆蔻沉香母丁香藿香葉木香各二錢輕粉真珠末牛黃各一錢五分龍腦半字麝香辰砂雄黃各一錢以上七味各另研羌活半兩上為細末煉蜜作劑旋丸如豆大每服一二丸食前服或薄荷湯或麥門冬湯化下實熱急驚勿服性溫故也海臟返魂丹治小兒諸癲癇潮發瘛瘲口眼相引項背強直牙關緊急目直上視及諸病久虛變生虛風多睡者因荏苒不解速宜服之烏犀銼屑二兩水銀天麻酒洗焙乾檳榔各半兩殭蠶去絲嘴微炒硫黃半兩研末入水銀置磁石盞內慢炒成沙火要看緊慢白附子炮川烏炒通赤留煙少許入碗內以一盞子蓋上新土圍之待冷取出獨活去蘆乾蠍炙萆薢炒各一兩肉桂去粗皮當歸酒浸焙乾炒細辛根防風去蘆天南星薑汁煮軟炒黃阿膠杵碎炒藿香洗去土烏蛇酒浸一宿炙熟去皮骨沉香槐膠羌活白花蛇酒浸一宿炙熟去皮骨麻黃去根節半夏薑汁浸三宿炒羺羊角鎊陳皮去白炒以上各一兩天竺黃研木香人參去蘆乾薑炮茯苓去皮蔓荊子去白皮晚蠶砂微炒敗龜板醋酒炙黃藁本去土桑螵蛸炒白芷何首烏米泔浸一宿煮焙虎骨酒醋塗炙黃砂仁白朮泔浸一宿切焙枳殼炒去白丁香厚朴去皮薑汁塗炙各三分蟬殼炒川芎附子水浸泡去皮尖石斛去根肉豆蔻去殼微炒龍腦另研雄黃研水飛硃砂研水飛各一兩膩粉另研麝香另研各一錢烏雞一隻去嘴翅足狐肝三具二味臘月內入瓦瓶固濟火煆赤候冷取出研用金箔三拾片為衣上藥五十八味炮製如法煉蜜合和搗三五千下丸如桐子大金箔為衣每一歲兒溫薄荷自然汁化下無時上閻氏宗錢氏治慢驚法脈無力者宜之其法以青州白丸子兼異功散羌活膏溫白丸釣藤飲子之類服之至有往往死中得生者湯氏法凡吐瀉成虛風慢脾先用奪命散青州白丸子末煎如稀糊入蜜調控下涎後服祛風醒脾等藥奪命散方見後通治急慢驚下治虛風八仙散風盛者服之白天麻白附子花蛇肉防風南星半夏冬瓜子全蠍各等分加川烏上㕮咀每服一錢水半盞姜二片棗半枚煎二分熱服加薄荷尤佳醒脾散昏困者服之白朮人參甘草橘紅茯苓全蠍各半兩半夏木香各一分白附子炮四個南星炮兩枚陳倉米二百粒一方無白朮半夏加蓮肉一錢亦可上為末每服一錢水半盞姜二片棗半個煎二分漸慚服之不可頓服頓服必吐釀乳方人參木香藿香沉香橘皮神麯麥芽各等分丁香減半上㕮咀每服四錢水一碗姜十片紫蘇十葉棗三枚煎至半碗乳母食後須去乳汁盡方取服之即仰臥霎時令藥入乳之絡次令兒吮數口不可過飽此良法也如嘔定一日急宜截風服八仙散兩日後宜醒脾散如前件藥俱用不效危困可憂須診太衝脈未絶者當灸百會一穴前後髮際兩耳尖折中乃是穴也方書所載但云頂上旋毛中殊不審有雙頂者又有旋毛不正者庸醫之輩習循舊本誤人多矣灸後即當控涎用青州白丸子末再煎如稀糊入煉蜜調奪命散良久涎下細研靈砂米飲調旋抹口中漸看退證如風盛服八仙散昏困服醒脾散常令減乳乳母服釀乳藥如此調理無不愈者間有稟受不堅五行數短者雖神聖工巧不能奪其造化矣若涎已離膈但在喉中如鋸藥不能入又不可控當用別法撩之兼搐鼻噴嚏得出次服奪命散庶免再作撩痰方川烏尖白附尖各七個去皮生用蠍稍七枚石緑少許上為末一處和勻用軟雞翎蘸藥入喉中逐漸抽出頻用帕子拭之上湯氏治慢驚法先用奪命散白丸子控涎候涎下一回用八仙醒脾等一回令乳母用釀乳法如危極者卻灸百會及撩痰法但奪命用礞石氣虛者難用必與東垣益黃散相兼服之可也陳氏法治慢驚風先服芎蠍散用手法斡出寒痰冷涎自不癡呆次服油珠膏後服益真湯溫壯元氣時服前朴散寬上實下芎蠍散治小兒腦髓受風囟顱開解皮肉筋脈急脹腦骨縫青筋起面少血色或腹中氣響時便青白色沫或嘔吐痰涎欲成慢驚搐足脛冷者川芎蓽茇各一兩細辛半夏酒浸一宿湯洗焙各二錢蠍稍去毒一錢上細末一周兒抄一銅錢用數沸湯調稍熱飢服如痰滿胸喉中眼珠斜視速與服若目上直視不轉睛者難救或痰氣壅塞不能咽藥用一指於兒喉靨齶中探入就斡去痰涎氣稍得通次用補脾益真湯或以油珠膏選用此方纍世活人多矣油珠膏治氣逆嘔吐風痰作搐石亭脂硫黃中揀取如蠟者滑石各半兩黑附子炮去皮臍半夏酒浸一宿湯洗七次焙乾南星醋浸一宿湯洗七次焙乾各一錢上細末每服一錢用冷清齏汁半盞滴麻油一點如錢抄藥在油珠上須臾墜下卻去齏汁與兒服之更用清齏汁三五口咽下肚飢服服訖後一時方與乳食補脾益真湯治胎弱吐乳便清而成陰癇氣逆涎潮眼珠直視四肢抽掣或因變蒸客忤及受驚誤服涼藥所作木香當歸人參黃耆丁香訶子陳皮厚朴薑製甘草炙肉豆蔻麵裹煨草果茯苓白朮桂枝半夏湯泡附子炮各半兩全蠍炒每服加一枚上㕮咀每服三錢水一盞半姜一片棗一枚煎六分稍熱飢服服訖令揉心腹以助藥力候一時方與乳食渴者加茯苓人參甘草去附子丁香肉蔻瀉者加丁香訶子肉嘔吐加丁香半夏陳皮腹痛者加厚朴良薑咳嗽加前胡五味子去附子官桂草果肉蔻足冷加附子丁香厚朴惡風自汗加黃耆官桂痰喘加前胡枳實赤茯苓去附子丁香肉蔻草果氣逆不下加前胡枳殼檳榔去當歸附子肉蔻腹脹加厚朴丁香前胡枳殼前朴散治心腹結氣或嘔噦吐瀉腹脹痛驚悸前胡白朮人參陳皮良薑藿香甘草厚朴各等分上銼每服三錢水一盞煎七分稍熱空心服小兒誤服涼藥或用帛蘸水繳口因此傷動脾胃或泄瀉或腹脹或腹中響小兒面少血色常無喜笑不看上而視下小兒囟顱高急頭縫青筋時便青糞小兒肥壯糞如清涕或如凍汁小兒時時扎眼糞便青白沫有時乾硬以上五證忽然嘔吐者必成陰癇俗謂慢驚是也小兒頭雖熱眼珠青白而足冷或腹脹而足冷或瀉而足冷或嘔而足冷或渴而足冷頭熱目赤痰塞鼻喉咽皆無根之火逆也以上五證忽然吐而作搐者名曰慢脾風速與補脾益真湯一服三錢重加蠍一枚如因驚而搐者前朴散一服三錢重加附子前胡各半錢同煎上陳文忠治慢驚法其治之次第自成一家故另録之以備採用其醫案所言芎蠍散油珠膏纍纍取效曾氏方沖和飲治感冒風寒頭疼發熱肩背拘急噁心嘔吐腹痛膨脹兼寒濕相搏四肢拘急冷氣侵襲腰足痛疼蒼朮米泔水浸一宿去粗皮銼片炒微黃色一兩二錢人參去蘆前胡去蘆桔梗炒各五錢枳殼去穰麩炒微黃色麻黃去節陳皮去白各三錢川芎白芷半夏湯洗七次薑汁浸曬乾炒當歸酒洗薄桂去粗皮白芍藥赤茯苓去皮各一錢半乾薑厚朴去粗皮薑汁浸一宿慢火炒乾各二錢甘草炙七錢半上銼每服二錢水一盞姜二片蔥一根煎七分無時溫服傷冷噁心嘔吐煨姜同煎開胃進食加棗子煎空心溫投寒疝痛入鹽炒茱萸蘹香同煎七寶散治時氣傷風傷寒頭昏體熱咳嗽及脾胃肺臟不和口中腥氣異常或牙縫微有鮮血兼調理諸病後小證得中以其品味不僭不燥為佳紫蘇去老梗淨香附各三兩甘草陳皮去白桔梗銼炒各二兩半川芎白芷各一兩上㕮咀每服二錢水一盞姜二片煎七分無時溫服痰嗽加製半夏口腥氣入鹽煎調理諸疾加棗子煎六柱散治吐痢泄瀉胃虛脾慢手足俱冷六脈沉微人參去蘆白茯苓去皮熟附子南木香肉豆蔻白朮六味各半兩上碎每服二錢水一盞姜二片棗一枚煎七分不拘時溫服日生湯治吐瀉痢後將傳慢驚慢脾神昏脈弱飲食不進睡露揚睛晝輕夜重急宜投服北南星一兩銼碎瓦器盛東壁土同醋煮少時濾干切片焙人參去蘆冬瓜子仁打碎各五錢上件㕮咀每服二錢水一盞半姜三片慢火煎七分候溫無時少與緩服投之急必吐固真湯主吐瀉痢後胃虛脾慢四肢口鼻氣冷沉