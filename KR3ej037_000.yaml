痛者為積滯不痛者為裡虛積滯者消之虛者補之婁氏分曲腰乾哭無淚者為盤腸內釣痛面㿠白不思食為胃冷痛面赤唇焦便黃為熱痛面黃白大便醋臭為積痛口淡而沫自出為蟲痛曾氏又有臟寒痛鎖肚痛癥瘕痛痃痛癖痛吊腎痛偏墜痛寒疝痛各有治法今臚列於後寒痛茅先生歌云面青面白猶自可黑色如青瓜一同此是腹心生冷痛須將溫藥里頭攻錢氏云胃虛冷面㿠白色腹痛不思食當補益脾益黃散主之若不下利者調中丸主之益黃散治下利而痛也調中丸治不利而痛也曾氏臟寒痛議附胎寒論後益黃散脾調中丸白朮人參甘草炒各半兩乾薑炮四錢上為細末蜜丸如緑豆大每服五七丸至十五丸食前溫水下海藏云仲景理中例也當歸散凡小兒夜啼者臟寒而腹痛面青手冷不吐乳是也宜此方服之效當歸去蘆頭白芍藥人參各一錢甘草炙五分桔梗陳皮各一錢上㕮咀煎五分時時少服愈七氣湯治七氣所傷痰涎結聚心腹亦痛不能飲食半夏制焙五兩人參辣桂去皮各一兩甘草半兩上銼細每服三錢水一大盞姜五片棗一枚煎食前服指迷七氣湯治七情相干陰陽不升降氣道壅滯攻衝作疼青皮陳皮桔梗蓬朮辣桂益智仁各一兩香附子一兩半甘草加半夏制各七錢半上銼細每服三錢水一盞姜四片棗一枚煎至七分不拘時服張渙寬中湯治心腹疼痛不可忍者高良薑木香各半兩丁香青橘皮炒黃桔梗甘草炙各一分上件搗羅為細末每服半錢溫酒調下蓬莪朮丹蓬莪朮炮製乘熱銼碎當歸洗焙乾各一兩木香人參去蘆頭桂心各半兩黑牽牛炒微黃一分上件搗羅為末細白麵糊和丸如黍米大每服十粒煎生薑湯下量兒大小加減溫胃丹治腹痛啼哭不止人參去蘆頭白朮炮各一兩五味子當歸洗焙乾高良薑各半兩木香一兩上件搗為細末白麵糊和丸如黍米大每服十粒米飲下橘香散青橘皮炒吳茱萸木香當歸洗焙乾各一兩乾薑炮丁香各半兩上件搗羅為末每服一錢水八分一盞入生薑二片煎五分去滓放溫熱服食前曾氏蘹香湯利脾胃進飲食理腹痛散邪氣蘹香炒良薑銼碎用東壁土炒各一兩半蒼朮米泔水浸一宿去粗皮濾干銼片炒至微黃色二兩甘草炙一兩上銼焙為末每服一錢燒鹽湯空心調下熱痛錢氏云熱痛亦啼叫不止夜發麵赤唇焦小便赤黃與三黃丸裡熱人參湯下嬰孺治小兒腹痛夭糾不能哺乳茯苓丸方茯苓黃連各一兩上為末用蜜為丸如大豆大飲下量加積痛錢積痛口中氣溫面黃白目無精光或白睛多及多睡畏食或大便酸臭者當磨積宜消積丸甚者白餅子下之後和胃用白朮散消積丸白餅子方見癖白朮散方見消渴曾積痛腹中陰陰而痛面黃不食兒大者口吐酸餿氣先治積滯後調脾胃其痛自止仍辨虛實和解治法見後癖積條中湯氏三稜散治積氣肚痛砂仁甘草益智炒去殼三稜蓬朮青皮炒各等分上為末白湯點下丹溪云食積腹痛必用紫蘇萊蔔子之類初虞世治小兒好吃粽成肚痛用黃連白酒藥等分為丸服蟲痛蟲痛面㿠白心腹痛口中沫及清水出發痛有時田氏云蟲痛啼哭俯仰坐臥不安自按心腹時時大叫面無正色或青或黃唇白又目無精色口吐涎沫此為蟲痛錢氏云積痛食痛虛痛大同小異惟蟲痛者當口淡而沫自出治之隨其證用藥蟲與癇相似小兒本怯故胃虛冷則蟲動而心痛與癇略相似但目不斜手不搐也安蟲散主之曾氏云蛔蟲動痛口吐清水涎沫或吐出蟲痛不堪忍其疾因食甘肥葷腥太早而得故胃寒蟲動作痛其蟲吐來或生或死兒小者此痛苦甚亦致危難先以理中湯吐瀉加烏梅水煎服使胃暖不逆次蘆薈丸疳使君子丸化蟲飲主之有兒大者面㿠白而間黃色肉食倍進肌體消瘦腹中時復作痛此有血鱉蛔蟲雜乎其間以二聖丸下之又有胃受極寒極熱亦令蟲動或微痛或不痛遽然吐出法當安蟲為上若以治蟲及傷胃氣固不可也因寒而動者用理中湯加烏梅水煎服因熱而動者用㕮咀五苓散亦加烏梅水姜煎投辛氏女子五歲病蟲痛諸醫以巴豆乾漆硇砂之屬治之不效至五日外多哭而俯仰睡臥不安自按心腹時大叫面無正色或青或黃或白或黑目無光而慢唇白吐沫至六日胸高而臥轉不安召錢至錢詳視之用蕪荑散三服見目不除青色大驚曰此病大困若更加瀉則為逆矣至次日辛見錢曰夜來三更果瀉錢於瀉盆中看如藥汁以杖攪之見有丸藥錢曰此子肌厚當氣實今證反虛不可治也辛日何以然錢曰脾虛胃冷則蟲動而今反目青此肝乘脾又更加瀉知其氣極虛也而丸藥隨糞下即脾胃已脫兼形病不相應故知死病後五日昏篤七日而死錢氏安蟲散治小兒蟲痛胡粉炒黃鶴蝨炒黃川楝子去皮核白礬枯二錢半上為細末每服一字大者五分米飲調下痛時服治蟲動痛極不可忍用乾漆半兩檳榔一枚生用窯老一塊再煅細研三件一處為末空心熱酒調良久取下蟲立愈驗窯老恐窯中煅過泥物也又方用乾漆一兩搗碎炒令煙盡出用新汲水入生麻油空心調下錢氏安蟲丸治上中二焦虛或胃寒蟲動及痛乾漆炒煙盡二分雄黃一分巴豆霜一錢上為細末糊丸如黍米大量兒大小服之取東引石榴根煎湯下或苦楝根或蕪荑湯下五七丸至二三十丸發時服蕪荑散主治同前凡小兒痛時便高聲啼叫人中上鼻頭唇口一時黑色脈法當沉弱而弦今反脈大是蟲證也白蕪荑乾漆炒各等分上為細末每服一字或五分或一錢米飲調下發時服使君子丸治腹內諸蟲作痛口吐清水使君肉薄切屋瓦焙乾檳榔酸石榴根皮東向者佳淨洗銼焙大黃半生半炮各七錢半上除檳榔銼曬不過火餘三味再焙同檳榔為末沙糖水煮麵糊丸麻仁大每服三十丸至五十丸淡豬肉汁空心下或雞肉汁亦好化蟲飲消化蟲毒在腹作痛檳榔酸石榴根皮淨洗焙乾各一兩紅丹煅過雷丸貫衆如雞頭者佳使君子肉薄切焙各二錢半甘草炙枳殼去瓤麩炒微黃大黃各五錢上為細末用清油煎雞子一枚如春餅樣候冷抄藥末一錢於上攤勻空心卷而食之兒小者用糯米粉水煮糊丸粟谷大每服十五粒至三十丸以淡豬肉汁空心下雞肉汁亦好二聖丸治腹內諸蟲及消穀逐水下氣去風檳榔一兩巴豆十五粒去殼膜心大好者存油上檳榔銼曬為末巴豆碎切在乳鉢內極細杵仍入檳榔末同再杵勻麵糊丸緑豆大每服七十七丸至九十九丸用溫茶清五更初空心止一投藥見蟲下盡進以稀粥自安鎖肚痛曾一月後嬰孩忽乳不下咽肚硬如石赤如朱撮口而哭面青唇黑手足口氣俱冷是也始因斷臍帶不緊為風冷所乘證亦危急以白芍藥湯疝烏梅散一字金臍風投之日久則難愈更參考臍風證內議論烏梅散治腹疼及初生嬰孩臍下冷痛疝氣等疾烏梅去核玄胡索粉草半生半炙各五錢乳香沒藥釣藤各二錢半上件㕮咀每服二錢水一盞煎七分空心溫服盤腸內釣痛湯小兒腹痛曲腰乾哭無淚面青白唇黑肢冷為盤腸內釣凡有此證急煎蔥湯淋洗其腹揉之蔥尉臍腹間良久尿自痛中出其疼立止續次服藥乳香沒藥各少許透明者細研上件木香一塊於乳鉢內磨水一分滾數沸調乳沒末此藥只一服效薛小兒盤腸氣者痛則曲腰乾啼額上有汗皆由肝經風邪所搏也肝腎居下故痛則曲腰乾啼者風燥其液故無淚也額上有汗者風木助心火也口閉足冷者脾氣不營也下利青糞者肝木乘脾也皆由産下澡洗受風冷所致當服釣藤膏之類若乳母及兒受寒邪者用沉香湯之類若兒額間有汗口閉腳冷乃虛寒也用當歸散見前或沉香降氣湯之類若面赤唇焦小便不通小腹脹痛者乃小腸熱也用人參湯送下三黃丸裡熱若因乳母飲食停滯者用保和丸宿食懷抱氣鬱者加味歸脾湯驚悸怒動肝火者加味逍遙散虛熱子母俱服並佳錢氏釣藤膏治小兒腹中極痛乾啼後偃名盤腸內釣乳香研沒藥研木香薑黃各四錢木鱉子仁二十一個上先將後三味同為細末次研入上二味煉蜜和成劑收貯每一歲兒可服半皂子大余以意加減煎釣藤湯化下無時次用魏香散魏香散蓬朮半兩阿魏一錢上先用溫水化阿魏浸蓬朮一晝夜焙乾為細末每服一字或半錢煎紫蘇米飲空心調下蒜乳丸治冷證腹痛夜啼大蒜一稞慢火煨香熟研爛乳香另研五分上研為丸如芥菜子大每服七粒乳汁送下異香散治小兒諸般吊證角弓反張胸高臍凸用透明沒藥一味為末薑湯調下癥瘕痛曾癥瘕痛乃積久所致由榮衛俱虛外則感受風寒內則過傷乳食停滯既久不能克化故邪並於陰為癥陰則專靜凝而不移邪並於陽為瘕假物象形動而不息若久而不治亦成脾疳積或兩脅間有塊如石按之則痛不按則輕或面黃肌瘦肚硬而脹及有青筋晝涼夜熱蒸潮無時乳食減少愛吃泥土或大便釀瀉痛則身冷如冰法當調脾養胃用醒脾散慢驚參苓白朮散不乳食磨積理疳用化癖丸癖三稜散宿食木香莪朮丸宿食治釀瀉沒石子丸瀉沉香檳榔丸癖積然此積滯之疾非七劑可療必須次第調理則日久自然平復痃痛曾始則腹內一小長塊其硬如臂從腰纏轉或左或右良久痛甚則見於皮下不妨乳食其證先因有疾表解未盡遽爾下之太過氣虛寒搏鬱結而成法宜益氣理虛用參苓白朮散不乳食沉香檳榔丸癖木香莪朮丸宿食為治或間投白芍藥湯疝加人參茯苓水姜煎服癖痛治法詳癖門按癥瘕痃癖四證大同小異治法亦無大分別似不必瑣瑣作名亦可也吊腎偏墜痛證治在陰腫門寒疝痛證治在疝門補虛芍藥甘草湯治出疹肚疼腹滿小便不通芍藥一兩甘草二錢半上銼散白水煎服聖惠人參散治小兒卒吐下腹痛不止人參去蘆頭當歸銼微炒各半兩甘草炙微赤銼乾薑炮裂銼黃耆銼各一分細辛一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓稍熱服量兒大小以意加減頻服錢乙附方和中散和胃氣止吐瀉定煩渴治腹痛思食人參去蘆白茯苓白朮甘草銼炒乾葛銼黃耆白扁豆炒藿香葉各等分上為細末每服三錢水一盞干棗二個去核姜五片煎至八分食前溫服外治莊氏家傳小兒未能語啼哭不能辨者當以手候其腹如有實硬處即是腹痛治之方研生薑取汁暖令溫調面成糊塗紙上貼臍心立定腹脹錢腹脹由脾胃虛氣攻作也實者悶亂喘滿可下之用紫霜丸白餅子此言未下而喘者為實故可下若誤下而喘者為虛氣附肺不可下也紫霜丸白餅子二方見癖不喘者虛也不可下若誤下之則脾虛氣上附肺而行肺與脾子母皆虛肺主目胞腮之類脾主四肢母氣虛甚即目胞腮腫四肢黃色治之用塌氣丸漸消之未愈漸加丸數不可以丁香木香橘皮豆蔻大溫散藥治之何以然脾虛氣未出故雖腹脹而不喘可以溫散藥治之使上下分消其氣則愈矣若氣虛已出附肺而行即脾胃內弱每生虛氣入於四肢面目矣小兒易為虛實脾虛則不受寒溫服寒則生冷服溫則生熱當識此勿誤也胃久虛熱多生疸病或引飲不止脾虛不能勝腎隨肺氣上行於四肢而目腫若水狀腎氣漫浮於肺即大喘也此當用塌氣丸病愈後面未紅者虛衰未復故也此下後喘故宜塌氣丸若未下而喘宜下之治腹脹者譬如行兵戰冠於林寇未出林以兵攻之必可獲寇若出林不可急攻攻則必有失當以意漸收之即順也寇未出林謂虛氣未出而不喘不目胞腮腫故可用丁香木香大溫散藥上下分消其氣而愈也寇已出林謂虛氣已出為喘為目腮腫須用塌氣九漸消之治小兒虛腹脹先服塌氣丸不愈腹中有食積結糞小便黃時微喘脈伏而實時飲水能食者可下之蓋脾初虛而後有積所治宜先補脾然後下之後又補脾即愈也不可補肺恐生虛喘潔古腹脹虛實凡久病吐瀉之後虛則其脈微細肺主目胞及腮脾主四肢若色淡黃目胞腮虛腫手足冷先服塌氣丸後服異功散和中丸四君子湯益黃散之類用諸溫藥養真氣異功散和中丸四君子湯三方並見吐瀉實則脈洪實不因吐瀉久病後亦不因痢下腹脹而喘急悶亂更有痰有熱及有宿食不化而腹脹者宜服白餅子大黃丸解毒丸下之兼須詳認大小便如都不通先利小便後利大便白餅子方見癖解毒丸方見喉痹大黃丸方見傷寒云岐云小兒熱結於內腹脹壯熱大便赤黃躁悶煩亂者宜瀉青丸薛東垣云寒脹多熱脹少皆主於脾胃虛者宜用六君子湯若喘而氣短者脾肺氣虛也用異功散補之若服克伐之類而喘脹益甚者脾肺之氣復傷也用前湯加半夏升麻若既下而不喘則邪氣去而肺氣寧也不必用藥或病久小便不利或四肢浮腫者脾肺之氣虛不能通調水道也用金匱加減腎氣丸主之或手足逆冷睡而露睛脾胃虛寒也用六君子加炮姜手足不冷睡而露睛脾胃虛弱也用六君子湯若面色青木剋土也用六君木香柴胡更當調治乳母節其飲食恐藥餌過劑復傷胃氣故也一小兒腹脹面赤痰喘大便祕壯熱飲冷此形病俱實用紫霜丸一服諸證益甚面色頓白飲湯不絶余以為邪氣退而真氣復傷故面白而喜湯用白朮散大劑煎湯令恣飲良久而睡翌日頓安一小兒傷食腹脹胸滿有痰余治以異功散而痊後復傷食腹脹兼痛或用藥下之痛脹益甚而加氣喘此脾胃傷而致肺虛也用六君子加桔梗調補而痊一小兒腹脹惡食發熱噁心證類外感余曰此飲食停滯也用保和丸一服諸證頓退惟腹脹用異功散而痊一小兒傷食腹脹服克伐之劑小便澀滯又服五苓散之類飲食漸減小便不通四肢頓腫余朝用余匱腎氣丸去附子夕用補中益氣湯而安一小兒腹脹大便青白腹左一塊面色痿黃齒齦赤爛食少滯頤余用異功散調補中氣為主佐以大蕪荑湯清疳治熱月餘諸證稍愈仍服異功散及蚵蟆丸外貼阿魏膏兩月塊消左脅微痛用四君子湯九味蘆薈丸而愈百問云有疳脹氣脹症積脹鎖肚脹脘膈脹食膨脹蛔脹虛冷積脹其疳氣積脹宜先與保童兼塌氣以去之其痞癖氣脹症積脹宜三稜以消痞其鎖肚脹宜與珍珠天麻丸以通之其上膈中脘食傷膨脹宜三稜塌氣大茱連丸以消磨之其蛔脹宜下蟲丸以化之其虛冷積脹宜沉香煎以溫之以上諸證宜調和胃氣消磨通利腫脹必然平復矣如有熱者必以葶藶牽牛等輩以治之推氣丸劑亦可用按百問分證雖詳而偏於攻下若無錢張活法薛氏補法以主之鮮不殺人慎之塌氣丸胡椒一兩蠍尾半兩上為末糊丸如粟米大每服五七丸至一二十丸陳米飲下無時一方有木香一錢錢氏潔古所用塌氣丸乃此二味不可誤用後有牽牛者慎之本事調中丸治小兒久傷脾胃腹脹乾薑橘紅白朮茯苓木香砂仁官桂良薑各等分上細末糊丸如麻子大每服二三十丸食後熟水下聖惠治小兒脾虛腹脹不能乳食訶梨勒丸訶梨勒煨用皮厚朴去粗皮塗生薑汁炙令香熟陳橘皮湯浸去白焙各半兩乾薑炮裂銼甘草炙微赤銼木香白朮人參去蘆頭各一分上件藥搗羅為末煉蜜和丸如麻子大每服以粥飲下五丸日三四服量兒大小加減服之張氏溫脾散治脾胃虧損腹脅虛脹乳食不進困倦無力訶子肉人參各七錢白朮木香桔梗茯苓藿香陳皮黃耆各五錢甘草炙二錢半上每服二三錢薑棗水煎沉香煎治脾氣冷積乳香沉香丁香杏仁炒百草霜木香各一錢肉豆蔻一個煨巴豆十四粒出油如霜上為末酒煮蠟和丸緑豆大每服三五丸淡生薑湯送下應患肚痛不止服之效常服以通為度三因肥兒丸治小兒病多因缺乳吃食太早所致或因久患臟腑胃虛蟲動日漸羸瘦腹大不能行發豎發熱無精神黃連神麯各一兩麥芽炒半兩木香二錢檳榔三個不見火使君子肉豆蔻麵裹煨各半兩上為末糊為丸如桐子大每服三二十丸量兒加減熟水吞下六神丸治如前證丁香木香肉豆蔻用麵裹煨各五錢訶子煨去核半兩使君子蘆薈研各一兩上為末以棗肉和丸如麻子大每服五丸至七丸溫米飲下食前治小兒疳病或腹大胡黃連二錢去果積阿魏一兩半去肉積神麯二錢去食積黃連二錢去熱積麝香四粒通竅上為末每服十二粒白朮湯下褐丸子治疳腫脹蘿蔔子一兩微炒陳皮青皮檳榔五靈脂蓬朮煨黑牽牛取淨末半生半炒赤茯苓各半兩木香二錢半上為末麵糊丸緑豆大每服十五丸紫蘇葉或白湯下五疳保童丸治五種疳疾五倍子生青黛夜明砂布裹洗苦楝根皮蘆薈熊膽研入黃連去毛龍膽草生用乾蟾酥炙去皮骨麝香研入蕪荑取仁蟬蛻去土各等分上末用粟米糊為丸麻子大一歲兒二十丸飯飲下二三服幼科有丁奚哺露無辜等名其證腹大頸小黃瘦皆疳脹之異名也輕則為此重則為彼耳今仍舊別立門於疳後楊氏塌氣散治小兒腹脹氣喘體腫面浮陳米一合炒黃青皮去穰巴豆二十一粒炒黃色去巴豆甘草炙各半兩黑牽牛二錢半半生半炒肉豆蔻二個煨香上末半錢米飲調下加檳榔一個塌氣丸治小兒疳氣腹脹喘急並面浮腫丁香胡椒炒各五錢蘿蔔子炒白牽牛各七錢半上為末麵糊丸小豆大三歲三十丸米湯下塌氣散治小兒腹脹氣粗並疳疾相攻面目浮腫木香一錢青皮半兩巴豆三十粒同炒豆黃色去巴豆上為末三歲半錢米湯下食前連進即效分氣飲治小兒腫脹作喘氣短而急桔梗赤茯苓陳皮桑白皮銼大腹皮枳殼炒半夏曲真蘇子微炒紫蘇甘草炙各二錢草果仁一錢上銼散每服一錢半薑棗煎服三稜煎丸治嬰孩食傷生冷甜膩毒熱等物脾胃積滯久不克化令兒肚熱腳冷痞癖寒熱及療癥瘕中脘不和膨脹上膈氣壅心腹不得宣通所以作疾此藥溫良但是諸積滯食不化並宜與服京三稜成塊煮蓬朮並炮各半兩芫花二錢半醋浸炒鱉甲去裙米醋炙焦半兩淡豆豉二錢巴豆二十一粒去殼川當歸半兩杏仁去皮尖二錢半炒令赤上前四味一處以米醋一碗煮令乾仍用炒起更細銼焙為末次入當歸末杏仁巴豆淡豆豉和勻水煮麵糊為丸麻子大每服二十丸薑湯下大小加減服之三稜丸治小兒停積腹脅脹滿乾噦噁心全不入食三稜煨木香神麯炒陳皮去白半夏薑汁製各一兩丁香官桂各半兩上為末曲糊丸如黃米大二十丸乳食後溫生薑湯下阿魏丸治小兒食積腹如蜘蛛狀肚痛小便白濁阿魏醋浸一宿研如泥黃連炒連翹各半兩花鹼研如粉三錢山楂肉一兩半夏皂角水浸一宿一兩上為末炒神麯糊丸如卜子大每服二十丸空心米飲下吃果子多者加胡黃連米食多者加神麯山楂肉食多者加阿魏又阿魏丸阿魏一兩黃連酒煮六兩上為末醋浸阿魏一宿研如泥湯浸蒸餅丸如元氣不足加人參小阿魏丸山楂肉三兩石鹼三錢半夏一兩上為末阿魏半兩醋浸糊丸白湯下真珠天麻丸治急驚風請量用之以通為度此方仍治吊腸鎖肚撮口至妙丸如麻子大初生患者三日三丸五日五丸七日七丸加青黛名青黛丸天南星炮天麻白附子炮各二錢半膩粉半錢巴霜一字蕪荑炒全蠍滑石各一錢半上為末煮細麵糊丸如麻子大每服一歲五丸二歲十丸大小加減薄荷湯點茶清送下大茱連丸治小兒飲食過度胸膈膨脹上下氣不宣通鬱滯迷悶情思少樂大則作喘飲食不化作渴煩躁坐臥不任肢體倦怠腹脅疼痛蓬朮京三稜各二錢半醋煮乾薑炮青皮陳皮去白木香丁香各三錢巴豆二十一粒去膜心出油緑細小茱萸二錢上為末醋糊丸麻子大每服七丸至十丸大者加服生薑棗子湯下下蟲丸治蛔疳諸蟲苦楝根皮酒浸焙緑色貫衆木香桃仁浸去皮焙蕪荑焙雞心檳榔各一錢鶴蝨炒輕粉各半錢干蝦蟆炙焦三錢使君子五十個煨取肉用上為末飛麵糊丸麻子大每服二十丸天明清肉汁下內加當歸川連各二錢半治脊疳兼疳勞遇仙丹治諸蟲取諸積牽牛三斤大腹子二斤錫灰炙乾為末大黃四兩雷丸四兩青木香鶴蝨乾漆各二兩皂角四條上後三味煎水用粟米煮粥初用牽牛末次用大腹末三用錫灰四用大黃五用雷丸六用青木香和劑丸如梧桐子大每服五七九丸用薑湯熟水送下此藥專治男子婦人積蟲氣塊五勞七傷赤白痢疾便血注下皮黃水腫十般氣十一般惡蟲又進飲食除病悅顏色不與他藥相反四季可服細末三四錢量大小加減服時不吃晚飯三更用茶清下次早桶子內蟲積及粒米盡方可洗面溫粥補之傷寒孕婦不可服東垣治脹不犯上下二焦用素問中滿者寫之於內之法實者分氣消積虛者升陽滋血治者當師其意而活用之勝前所用排擊諸方遠矣中滿分消丸黃連枳實厚朴各五錢乾薑薑黃豬苓砂仁澤瀉茯苓各三分陳皮白朮各一分半夏四分黃芩一兩二錢甘草一分上為細末蒸餅為丸如黍米大每服三十丸溫酒送下消痞丸快利之劑黃連半兩枳實黃芩甘草人參各三錢厚朴七分乾薑四分橘皮一錢薑黃五分上為細末蒸餅為丸如黍米大每服三十丸隨乳下丹腹脹蘿蔔子蘇梗乾葛陳皮各等分甘草減半如食減加白朮煎服升陽滋血湯二月間一小兒未滿百日病腹脹不大便二日便瘦弱遍身黃色宜升陽氣滋血和血補血利大便蠍稍二分神麯三分厚朴當歸各一錢桃仁十個升麻三分上作一服水一盞煎至半盞去滓食前服麻黃升麻湯治小兒面色痿黃腹脹食不下正月四月小兒服之神效麻黃二分桂枝杏仁吳茱萸草豆蔻厚朴曲末羌活白茯苓升麻根蒼朮澤瀉豬苓陳皮黃柏各一分柴胡根白朮青皮黃連各五分上㕮咀作一服水一大盞煎七分去滓食前熱服水腫演山腫脹二證此由虛中有積久患失治日漸傳變證候多喘隨輕重察盛衰審表裡以主治先固其本後正其標斯無恙矣錢腫病腎熱傳於膀胱熱盛逆於脾胃脾虛而不能制腎水反克脾土脾隨水行脾主四肢故流走而身面皆腫也若加喘者重也何以然腎水勝而克退脾土反勝心火心又勝肺肺為心克故喘或問曰心刑肺肺本見虛令何喘實曰此有二一者肺大喘此五臟逆二者腎水氣上行傍侵於肺故令大喘此皆難治曾氏治法原腫病之由標本之疾腎主元氣天一之水生焉肺主沖化地四之金屬焉腎為本而肺為標皆至陰以積水其為病也腎者胃之關鍵關鍵不利樞機不轉水乃不行滲於脈絡皮膚而為浮腫當推究內外所因而為施治兒大者憑脈以明虛實古方有十種論證短氣不得臥為心水兩脅緊痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水小便閉澀為胃水小腹急滿為小腸水然脈浮為風為虛沉伏為水病沉則脈絡虛伏則小便難即為正水脾脈虛大多作脾腫因循不治乃成水腫蓋脾屬土喜燥而惡濕常感濕氣濕喜傷脾血化為水土敗不能制水則停蓄不行留滯皮膚故作浮腫初得病時見眼胞早晨浮突至午後稍消以羌活散赤白痢疏解次醒脾散慢驚主之及間投南星腹皮散其脾冷困則燥以草果縮砂之類然此證夏與秋冬治之頗易惟春不然蓋四時之水無如春水泛溢兼肝木旺而脾土受克不能受水所以難療進退不常須徐徐調理取效若脾熱而困又以熱藥燥之雖火能生土亦可勝水奈何燥之太過土不敵火則熱愈甚而不食發熱煩渴醫者又進之以燥劑由此而面目轉浮致脾敗而手足背皆腫蓋手足背與臍凸即脾之外候有未經發表遽用下藥以瀉之則一瀉而腫消乃曰得瀉之力殊不知脾愈瀉而愈虛不逾旬月其腫如初此世人只知瀉腫為最而不求其十補勿一瀉之論法當隨四時用藥解表通利小便春以七寶散傷寒加麻黃桂枝赤茯苓水薑蔥煎服夏以五苓散驚加麻黃車前子薏苡仁秋以清肺飲嗽加羌活細辛商陸冬以沖和飲傷寒白朮生川烏赤小豆以上三藥並用水薑蔥煎次投滋潤救脾導水湯劑滲泄之乃為良法更以香陸胃苓丸赤蒼飲頓服自然獲安蓋內經云開鬼門發汗潔淨府利小便平治權衡以平為期此之謂也有初中便覺痰嗽氣喘小水不通正屬肺腎所主先服解表散咳嗽次以三白散為治餘證輕者投商陸丸故經曰其高者因而越之即湧吐之義也下者引而竭之即滲泄之義也凡得此病非一朝一夕之故不可以孟浪之藥求其速效以致虛脫如愈後再感外風滿面虛浮用排風湯驚癰鶴膝和解仍服前救脾湯劑免致反復飲食之忌惟鹽醬齏鮓濕面皆味鹹能溢水者並其他生冷毒物亦宜戒之重則半載輕者三月須脾胃平復腫消氣實然後於飲食中旋以燒鹽少投則其疾自不再作故劉氏曰治腫非易補養尤難所忌者切須詳審有經久不消者下浚川丸即效南星腹皮散主腫疾欲愈未愈之間脾胃虛慢氣促痰喘腹脹胸滿飲減精神困小便不利面色痿黃南星制一兩大腹皮淨洗焙乾生薑皮陳皮去白青皮去白桑白皮銼炒甘草扁豆炒去殼各半兩上碎每服二錢水一盞姜二片煎七分無時溫服香陸胃苓丸治腫疾日久不愈此藥大能實脾導水多服取效丁香去梗商陸赤小豆陳皮去白甘草炙各二兩蒼朮米泔水浸一宿去粗皮濾干銼片炒微黃色澤瀉去粗皮各二兩半赤茯苓去皮豬苓去皮白朮各一兩半肉桂去粗皮一兩厚朴去粗皮用生薑汁炙令香熟二兩上除丁香肉桂不過火余藥銼焙同二味為末用面微炒水浸透煮糊丸緑豆大每服三十丸至五十丸或七十七丸空心溫湯下兒小者丸作粟谷大吞服之粒數引子並如前法赤蒼飲主脾胃因虛受濕面貌浮黃或遍身作腫飲食減少氣不升降小便赤色肚膨脹咳嗽有痰及腫嘗服神效加草果仁炮過水薑棗煎投赤茯苓去皮蒼朮去粗皮米泔水浸一宿濾干銼片炒微黃各一兩半枳殼制一兩藿香和根半夏湯煮透銼焙乾淨香附紫蘇和梗厚朴去粗皮薑汁炙香熟陳皮去白各七錢半甘草炙一兩二錢上銼每服二錢水一盞生薑二片煎七分無時溫服三白散解初中腫疾四肢膚囊浮脹大小便不利皆因膀胱蘊熱風濕相乘白牽牛半生半炒杵碎桑白皮銼炒白朮木通去皮節陳皮去白甘草各半兩上碎每服二錢水一盞煎七分無時服商陸丸治水腫小便不通勿拘遠近商陸一兩淨黃連半兩上焙為末薑汁煮麵糊丸緑豆大每服三十丸至五十丸用溫紫蘇熟水空心下或溫蔥湯浚川丸治水腫及單腹滿脹氣促食減遍身面浮大戟芫花醋炒沉香檀香南木香檳榔蓬莪朮大腹皮洗焙乾桑白皮銼炒各半兩黑白牽牛曬研取生末一兩巴豆去殼膜心存油三十五粒上除牽牛末巴豆外前丸味內有沉香檀香木香檳榔不過火餘五味焙乾同沉香等為末就加牽牛末和勻巴豆碎切在乳鉢內極細杵入前藥末同再杵勻水煮麵糊丸麻仁大每服十七丸濃煎蔥湯候溫五更初空心下去水未盡停一日減用十三丸次減作九丸再減至七丸湯使下法如前證退即止仍投南星腹皮散如單腹腫甚能飲食氣壯者加甘遂末同丸取效仍忌有甘草藥餌相反演山翁治法受濕腫腳手面目虛浮食毒氣腫腹肚腎蠱脹急傷寒虛氣入腹腫瀉痢虛氣入腹腫此四種所患病不相同皆由虛得之受濕謂脾胃受濕冷久不克化氣浮四肢頭面皆腫食毒氣由脾胃傷之冷積毒氣停留胃脘致虛入腹作腫傷寒由下之太早乘虛入腹作腫瀉痢之久脾氣亦虛是以致腫以上宜平調胃氣補臟充實方可去腫先服四味理中無減半乾姜加白朮桑白皮同煎傷寒虛腫加枳實作喘加淡豆豉瀉痢虛腫服正氣調胃胃氣既壯以救生丹利之其腫即退再調補臟腑用觀音散即平復矣氣虛腫亦名氣蠱血虛腫亦名血蠱榮衛俱虛腫亦名氣血蠱小兒所患腫脹一門最為要急前人少有究竟然腫脹之作皆由榮衛不順臟腑怯弱壅滯三焦流注百脈表裡俱虛邪正相亂所以致受四大浮盛腹肚膨滿多由食毒得之飲食得之症傷得之飢飽得之積久不化故成斯病病由虛得或則妄亂通下因虛致虛根不得去疾加已盛是謂壞證危候智者怯而為辭庸者暴以攻擊二醫不同誠屬難治智者商之良者審之疑者塌之疑其病盛不可利只與塌其氣明者調之正榮衛也先調榮衛之順次服分氣飲子以散其滯斯病去矣榮衛飲子調補嬰孩氣血俱虛榮衛不順四肢頭面手足俱浮腫以至喘急者並宜服之川當歸熟乾地黃淨洗人參白茯苓川芎白朮甘草炙白芍藥枳殼炒別制黃耆蜜炙陳皮上件等分㕮咀每服二錢匕水一小盞煎至半盞去滓通口不拘時候議曰榮者血溫流行於脈衛者氣順調和於絡是故榮行脈中衛行脈外陰陽相安循環無止自幼至長不離呼吸無少滯礙其脈方調其氣乃順呼吸之間脈不應息氣有違滯流注經絡隱伏臟腑百病皆由茲始此方最良雖兒幼小並可與服以壯其根使血榮氣衛順且和矣腑寒臟虛溫且壯矣盈虧自然而平怯弱自然而正陰陽調均氣脈充實何病之有分氣飲子調理小兒腫脹作喘氣短促急坐臥不任四體浮腫飲食嘔逆神困喜睡五味子桔梗白茯苓甘草炙陳橘皮桑白皮草果去殼大腹皮白朮枳殼去穰切炒川當歸紫蘇蘇子半夏曲上等分㕮咀每服二大錢匕水一小盞生薑二小片棗子半個煎至半盞去滓通口不拘時候兼八味理中丸煎服以上宜用救生丹通利議曰清濁無混邪正不幹上焦得之清涼下部受之溫暖氣滯則少升降血虛則多流注雖是乳子呼吸一息其脈之至徐徐應指不違其數者亦同大人流行但隨小大受之短淺而已若也留滯其脈遲數即太過不及而病生焉善療治者鬱則分之逆則順之停則利之滯則降之調理之法先宜順氣大抵嬰孩氣順即易治此方分氣與分水穀之分者不同明者察之大效神功救生丹治小兒氣虛喘息四肢浮腫肚腹脹急沖滿脅肋乍熱乍寒或瀉或祕皆由久停虛積榮衛不順宜用推去其惡毒之氣雄黃另研硃砂各一分巴豆二十一粒去殼乾薑二錢上件用米醋一盞以巴姜就煮令乾去姜不用將巴出油和雄朱研勻雪糕搜丸如麻子大每一歲三丸並用酒浸赤芍藥以少許送下薛氏治法經曰至陰者腎水也少陰者冬脈也其本在腎其末在肺皆積水也又曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故胕腫腹大上為喘呼不得臥者標本俱病也丹溪云惟腎虛不能行水脾虛不能制水胃與脾合又胃為水穀之海因虛而不能傳化腎水泛濫反得以浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫也其狀目胞上下微起肢體重著喘咳怔忡股間清冷小便澀黃皮薄而光手按成窟舉手即滿是也古方有十種論證又有濕氣毒氣傷寒後瀉痢後氣血虛者之五種及疳氣症積鎖肚胸膈作膨蛔氣虛冷積者之七脹亦當詳之其受濕氣者由脾胃之氣敦阜四肢頭面皆腫也食毒者脾傷積毒停留於胃也傷寒下早者邪氣乘虛而入也瀉痢後者脾氣虛也皆宜先調胃氣吹可治腫其患七脹皆由血氣不足臟腑怯弱表裡俱虛邪正相亂以致四肢浮腫腹肚膨滿亦當先調榮衛分別陰陽治法宜補中行濕利小便凡有熱者水氣在表也可汗之身無熱者水氣在裡也宜下之腰以上腫宜利小便腰以下腫宜發汗此仲景之法也若遍身腫煩渴小便赤澀大便祕結此屬陽水遍身腫不渴大便溏泄小便清利此屬陰水陽水兼陽證者脈必浮數陰水兼陰證者脈必沉遲氣若陷下宜用二陳加升提之藥如腹脹少加木香調之若朝寬暮急屬陰虛朝用四物湯加參朮夕用加減腎氣丸朝急暮寬屬陽虛朝用六君子湯夕用加減腎氣丸朝暮皆急陰陽俱虛也用八珍湯主之真陽虛者朝用八味地黃丸夕用補中益氣湯若肚腹痞滿肢體腫脹手足並冷飲食難化或大便泄瀉呼吸氣冷者此真陽衰敗脾肺腎虛寒不能司攝而水泛行也急用加減腎氣丸否則不治惟調補脾土多有生者金匱加減腎氣丸熟地黃八兩乾山藥山茱萸各四兩澤瀉白茯苓牡丹皮各三兩肉桂附子炮車前子炒牛膝酒微炒各一兩上各另為末米糊丸小豆大每服三四十丸空心食前白湯下附雜方丹白文舉兒五歲身面皆腫尿多山梔炒桑皮炒各一錢黃芩二錢半白朮蘇梗各一錢半上㕮咀作三帖水一盞半煎至半盞食前溫服湯退腫散氣方赤小豆陳皮蘿蔔子甘草炙各半兩木香炮七分上為粗末薑棗煎服大小加減又方白朮炒木香炮甘草炙茴香炒青皮各半兩巴豆三十粒去膜同青皮炒去巴豆不用上為末米飲調下又方用錢氏益黃散加木香去丁香加蘿蔔子去訶子為末大小加減米飲調下集之八脾臟部下疳內經曰數食肥令人內熱數食甘令人中滿蓋其病因肥甘所致故命名曰疳若夫襁褓中之乳子與四五歲之孩提乳哺未息胃氣未全而穀氣尚未充也父母不能調將惟務姑息舐犢之愛遂令恣食肥甘與夫瓜果生冷及一切烹飪調和之味朝飧暮啖漸成積滯膠固以致身熱體瘦面色痿黃或肚大青筋蟲痛瀉利而諸疳之證作矣錢諸疳皆脾胃之病內亡津液之所作也因大病或吐瀉後醫又以藥吐下致脾胃虛弱亡失津液且小兒病疳皆愚醫之所壞病假如潮熱是一臟虛一臟實而內發虛熱也法當補母而瀉本臟則愈假令日中發潮熱是心虛熱也肝為心母法宜先補肝母肝實而後瀉心心得母氣則內平而潮熱自愈醫見潮熱妄謂其實乃以大黃牙硝輩諸冷藥利之利既多而不能禁則津液內亡漸成疳也又如癖病發作寒熱飲水脅下有形硬痛法當用藥漸消磨之醫反以巴豆硇砂輩快藥下之小兒易虛易實下之既過胃中津液耗損漸成疳瘦又有病傷寒五六日間有下證以冷藥下之太過致脾胃虛而津液少即便引飲不止而生熱也熱氣內耗肌肉外消他邪相干證變諸端亦成疳病又有吐瀉久病或醫妄下之其虛益甚津液煩躁亦能成疳也小兒病癖由乳食不消伏在腹中乍涼乍熱飲水不止或喘而嗽與潮熱相類若不早治必成勞疳以其有癖症則令兒不食致脾胃虛而發熱故引飲也飲多即蕩滌脾胃亡失津液不能傳化水穀其脈沉細益不能飲食致脾胃虛衰四肢不舉諸邪遂生羸瘦而成疳矣楊兒童二十歲以下其病為疳二十歲以上其病為癆疳與癆皆氣血虛憊腸胃受傷致之同出而異名也何者小兒臟腑嬌嫩飽則易傷乳哺飲食一或失常不為疳者鮮矣疳皆乳食不調甘肥無節而作也或嬰幼闕乳粥飯太早耗傷形氣則疳之根生或三兩晬後乳食稍多過飽無度則疳以傷得或恣食甘肥黏膩生冷咸醋以滯中脘則疳因積成或乳母寒暄失理飲食乖常喜怒房勞即與兒乳則疳因母患傳氣而入此非病家不能調適之過乎疳皆脾胃受病內無津液而作也有因吐瀉之後妄施吐下津液虛竭得之者有因潮熱大下利無禁約胃中焦燥得之者有因傷寒里證冷快太過渴引水漿變而生熱熱氣未散復於他邪得之者又有病癖寒熱脅下痛硬或者不能漸與消磨遽以硇巴峻決津液暴傷得之者此非醫家輕藥壤病之過乎疳之為候頭皮光急毛髮焦稀腮縮鼻乾口饞唇白兩眼昏爛揉鼻撏眉脊聳體黃鬥牙咬甲焦渴自汗尿白瀉酸肚脹腸鳴癖結潮熱酷嗜瓜果鹹酸炭米泥土而欲飲水者皆其候也肝疳亦名風疳亦名筋疳錢肝疳白膜遮睛筋疳瀉血而瘦湯肝疳眼白青眼睛澀癢聖惠搖頭揉目流汗遍身合面而臥面色青黃發竦頭焦筋青腦熱渾身瘡癬腹中積聚下痢頻多久而不痊轉甚羸瘦曾氏目生眵糞髮際左臉多青或白睛微黃瀉利夾水或如苔色心疳亦名驚疳錢氏面黃頰赤身壯熱湯氏口內生瘡聖惠渾身壯熱吐利無常頰赤面黃胸膈煩滿鼻乾心躁口舌生瘡痢久不痊多下膿血有時盜汗或乃虛驚楊氏小便赤澀五心皆熱曾氏咬牙舒舌愛飲冷水喜伏眠於地脾疳亦名食疳錢氏面黃腹大食泥土湯氏脾疳食不消胃疳多吐聖惠腹多筋脈喘促氣粗乳食不多心腹脹滿多啼咳逆面色痿黃骨立毛焦形枯力劣胸膈壅悶水穀不消口鼻常干情意不悅愛暗憎明腸胃不和利多酸臭曾氏愛食冷物引飲無度身面俱黃發稀作穗頭大項小腹脹腳弱間或釀瀉肌瘦目慢晝涼夜熱不思乳食錢氏又云肥疳即脾疳也身瘦虛黃干而有瘡其候不一種種異端今略舉之目澀或生白膜唇赤身干黃或黑喜臥冷地或食泥土身有瘡疥瀉青白黃沫水痢色變易腹滿身耳鼻皆有瘡髮鬢作穗頭大項細極瘦飲水皆其證也按此言脾疳證候多與余疳相濫蓋疳為脾經本病固應兼之肺疳亦名氣疳錢氏氣喘口鼻生瘡聖惠咳嗽氣逆皮毛乾焦饒涕多啼咽喉不利揉鼻咬甲壯熱憎寒唇邊赤癢腹內氣脹乳食漸稀大腸不調頻頻泄利糞中米出皮上粟生曾氏鼻下赤爛手足枯細口有腥氣右腮㿠白腎疳亦名急疳亦名骨疳錢氏腎疳極瘦身有瘡疥骨疳喜臥冷地湯氏齒爪黑聖惠肌骨消瘦齒齦生瘡寒熱作時口鼻乾燥腦熱如火腳冷如冰吐逆既增乳食減少瀉利頻並下部開張肛門不收疳瘡癢痛曾氏兩耳內外生瘡腳如鶴膝頭縫不合或未能行牙齒生遲其縫臭爛傳作走馬疳之類楊五臟疳傷大抵然爾析而論之曰五疳出蟲曰蛔疳曰脊疳曰腦疳曰乾疳曰疳渴曰疳瀉曰疳痢曰疳腫脹曰疳勞曰無辜疳曰丁奚曰哺露證狀非一可不舉宏撮要而條析之乎五疳出蟲者疳傷之源雖起於乳餔不調然臟腑停積已久莫不化而為蟲其蟲或如絲髮或如馬尾多出於頭項腹背之間黃白或赤者可醫青黑則難療也蛔疳者失乳飯早食肉太早或腸胃停蓄甜膩化為蛔蟲皺眉多啼嘔吐清沫腹中乍痛肚脹青筋唇口紫黑腸頭齒癢是也蛔雖食蟲蟲不可動從口鼻出者難治脊疳者蟲蝕脊膂身熱羸黃積中生熱煩溫下痢拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻齧爪甲是也腦疳者胎中素挾風熱生下乳哺越常頭皮光急滿頭餅瘡腦熱如火髮結如穗遍身多汗腮腫囟高是也臨産多欲亦然易損兒眼乾疳者瘦悴少血舌乾多啼其病在心目不轉睛乾啼少淚其病在肝身熱尿干手足清冷其病在腎聲焦皮燥大便乾結其病在肺搭口癡眠胸脘乾渴其病在脾總為五乾疳是也疳渴者臟中夙有疳氣加之乳母恣食五辛酒面炙爆使小兒心肺壅熱日則煩渴引水乳食不進夜則渴止是爾疳瀉者毛乾唇白額上青紋肚脹腸鳴泄下糟粕是爾勿用熱藥止之疳痢者挾受風寒暑濕或冷熱不調或停積宿滯水穀不聚頻下惡物是爾疳腫脹者虛中有積其毒與氣交併故令腹肚緊脹由是脾復受濕故令頭面腳手虛浮是爾法當磨積調氣疳勞者潮熱往來五心煩熱手足心及胸前熱而發瘡盜汗骨蒸嗽喘枯悴是爾或渴而復瀉飲水惡食肚硬如石面色如銀斷不可活無辜疳者腦後項邊有核如彈按之轉動軟而不疼其間有蟲如米粉不速破之則蟲隨熱氣流散淫蝕臟腑以致肢體癰瘡便利膿血壯熱羸瘦頭露骨高是爾針刺破膏藥貼或浣濯兒衣露於檐下為雌鳥落羽所汙兒著此衣蟲入皮毛亦致無辜之疾兒衣已曬須微火烘之其若手足極細項小骨高尻削體痿腹大臍突號哭胸陷或生谷癥是為丁奚虛熱來往頭骨分開翻食吐蟲煩渴嘔噦是為哺露丁奚哺露皆因脾胃久虛不能化水穀以榮血氣故肌肉消鑠腎氣不足復為風冷所傷使柴骨枯露亦有胎中受毒臟腑少血致之此皆無辜種類之疾病而至此不幾殆哉又有小兒久患腎疳內虛不食甚者天柱骨倒治法當用錢氏地黃丸加驅疳等劑仍與貼項強筋若不識證謂之五軟非也天柱骨倒凡有三種有吐瀉日久羸弱成者有肝膽伏熱面赤唇紅忽變此者有傷寒不及發表成者是皆風邪入肝以致筋絡舒弛吐瀉者當調胃氣肝熱者隨輕重以涼肝並與強筋貼項惟傷寒天柱骨倒者難療故並及之莊氏家傳小兒二十四候第一候瀉膿血日漸瘦是冷熱疳第二候腳細肚高胸前骨生愛吃泥土酸鹹日久通身黃時時吐逆下痢腹內疼痛是脾疳第三候鼻下赤爛愛揉眼兼血痢是肺疳乃因吃著承熱物或病奶所損心肺加之咳嗽更以服涼冷藥過多便上熱下冷漸漸昏沉日夜煩哭第四候皮虛皺面無顏色身上燥癢心煩第五候毛髮稀疏鼻生瘡是肺疳第六候頭生瘡毛髮稀焦是肝疳第七候牙變黃赤不定是腎疳第八候頭髮焦乾鼻下瘡生是肺疳第九候咬指甲毛髮作穗四肢沉重是心疳第十候肚上筋生齒蟲蝕是骨槽疳第十一候吐逆腹脹是胃疳又名奶疳第十二候齒斷臭爛面無顏色心不思食是脾疳又名口疳第十三候愛合面臥多睡如醉腹脹氣急蓋是因曾吃生肉如此腹內有蟲是心脾疳第十四候鼻內干痛口中臭氣齒根有鮮血是肝肺疳第十五候腳細肚高並肚上有青脈是脾疳第十六候非時生瘡愛吃冷水是熱疳第十七候皮膚上生粟子糞中米出是脾冷疳第十八候氣滿腹脹及口乾是心胃疳第十九候愛餐生米麵炭磚瓦是脾胃疳第二十候揉鼻揩眼及咬指甲愛飲水是肝渴疳第二十一候多寒熱愛臥不起是骨熱疳第二十二候愛飲水眼目不開是肝疳第二十三候肌體或熱或涼發渴無時是急疳第二十四候齒齦黑唇懶開開則赤是心疳積熱聖惠凡小兒疳在內眼澀腹脹痢色無常或如泔澱日漸羸瘦此候可療若鼻下赤爛自揉鼻頭上有瘡生痂痛癢漸漸流引繞於兩耳時時目赤頭髮稀疏腦皮光緊頭大項細肌體羸瘦亦可治也若唇口被蝕齒齦作五色或盡峭黑舌下有白瘡上齶有竅子口中時有臭氣齒齦漸染欲爛亦可治也若下部開張有時赤爛癢不可忍下痢無常亦可治也若疳蝕脊膂十指皆癢自咬指甲頭髮作穗脊骨如鋸有時腹脹有時下痢若急治之無不瘥也聖惠凡小兒肝藏疳若目睛帶青脈左脅下硬多吐涎沫眼角左右有黑氣所沖不可治也心藏疳若愛驚啼常好飲水便食辛味耳邊有脈舌上有黑靨者不可治也脾藏疳若肚大唇無血色人中平滿下痢無度水穀不消好吃泥土皮枯骨露不可治也肺藏疳若咳逆氣促多瀉白沫身上有斑生如粟米大色若黑者不可治也腎藏疳若愛食酸鹹飲水無度小便如乳牙齒青黑耳腦幹燥肩竦骨枯不可治也又五疳有五絶候一襯著腳中指底不覺疼二抱著手足垂軃無力三病未退遍身不暖四臟腑瀉青涎及沫不止五項筋舒展無力如此之候皆不可治也凡醫用藥切在審詳也潔疳者小兒病癖或久吐瀉醫者妄投轉過之藥小兒易為虛實致令胃虛而亡津液內發虛熱外消肌肉一臟虛則諸臟皆弱其病目胞腫腹脹痢色無常漸加瘦瘠久不痊可是腸胃有風積法當宣風散痘發熱導之後各依本臟補其母錢諸疳皆依本臟補其母及與治疳藥冷則木香丸熱則胡黃連丸主之疳在內目腫腹脹利色無常或沫青白漸瘦弱此冷證也使君子丸主之疳在外鼻下臭爛自揉鼻頭上有瘡不著痂漸繞耳生瘡治鼻瘡爛蘭香散諸瘡白粉散主之肝疳當補肝地黃丸主之心疳當補心安神丸主之脾疳當補脾益黃散主之腎疳當補腎地黃丸主之筋疳當補肝地黃丸主之肺疳當補脾肺益黃散主之骨疳當補腎地黃丸主之大抵疳病當辨冷熱肥瘦其初病者為肥熱疳久病者為瘦冷疳冷者木香丸熱者胡黃連丸冷熱之疳尤宜如聖丸疳瀉故小兒之臟腑柔弱不可痛擊大下必亡津液而成疳凡有可下量大小虛實而下之則不至為疳也初病津液少者當生胃中津液白朮散主之惟多則妙楊熱者涼之冷者溫之冷熱者溫涼之此其要也熱疳病多在外鼻下赤爛頭瘡濕癢五心煩熱掀衣氣粗渴引冷水煩躁臥地肚熱腳冷潮熱往來皆熱疳也冷疳病多在內利色無常其沫青白肢體軟弱目腫面黧又一證躁渴臥地似有熱狀惟飲食不進滑泄無已亦冷疳也其有瀉多膿血日加瘦弱此則謂之冷熱疳大抵疳之受病皆虛使然熱者虛中之熱冷者虛中之冷治熱不可妄表過涼治冷不可峻溫驟補故錢氏又曰小兒易為虛實脾虛不受寒溫服寒則生冷服溫則生熱當識此而勿誤是果非幼幼之網領乎上醫處此消積和胃滋血調氣隨順藥餌以扶之淡薄飲食以養之榮衛調和臟腑自然充實一或過焉君子未保其往也取積之法又當權衡積者疳之母由積而虛謂之疳極諸有積者無不肚熱腳冷須酌量虛實而取之若積而虛甚則先與扶胃使胃氣內充然後為之微利若積勝乎虛則先與利導才得一泄急以和胃之劑為之扶虛然取積雖當疏利如白豆蔻蘿蔔子縮砂蓬朮消積等輩亦不可無脅間癖痛亦虛中之積也先寒後熱飲水不食或因飲水以致喘嗽錢氏有癖為潮熱之說治法解散寒熱即與下癖合是而觀發作不同療治不一又可無權度於此哉曾大抵疳之為病皆因過餐飲食於脾家一臟有積不治傳之餘臟而成五疳之疾若脾家病去則餘臟皆安苟失其治日久必有傳變然脾家病宜蘆薈丸沉香檳榔丸積或水晶丹積烏犀丸積更察虛實療之有蟲者投使君子丸腹痛化蟲飲腹痛如心腹痛吐清水蟲自下多投二聖丸腹痛諸疳證皆宜用局方五疳保童丸或萬應丸常服化積治疳仍各投本臟調理之劑寧心用茯神湯驚悸調肝用耆歸湯調脾用參苓白朮散不乳食補肺用補肺散咳嗽補腎用調元散庶各得其宜則前證不致再作演山積是疳之母所以有積不治乃成疳候又有治積不下其積存而臟虛成疳尤重大抵小兒所患疳證泄瀉無時不作風候者何惟疳瀉名熱瀉其臟腑轉動有限所以不成風候雖瀉不風亦轉他證作渴虛熱煩躁下痢腫滿喘急皆疳候虛證古云疳虛用補虛是知疳之為疾不可更利動臟腑發作之初名曰疳氣腹大脹急名曰疳虛瀉痢頻併名曰疳積五心虛煩名曰疳熱毛焦發穗肚大青筋好吃異物名曰疳極受病傳臟已極熱發往來形體枯槁面無神采無血色名曰疳勞手足細小項長骨露尻臀無肉肚脹臍突名曰丁奚食加嘔噦頭骨分開作渴引飲蟲從口出名曰哺露此皆疳候又因多食生冷甘黏肥膩積滯中脘不化久亦成疳治疳之法量候輕重理其臟腑和其中脘順其三焦使胃氣溫而納食益脾元壯以消化則臟腑自然調貼令氣脈與血脈相參壯筋力與骨力俱健神清氣爽疳消蟲化漸次安愈若以藥攻之五臟疏卻腸胃下去積毒取出蟲子雖曰醫療即非治法蓋小兒臟腑虛則生蟲虛則積滯虛則疳羸虛則脹滿何更利下若更轉動腸胃致虛由虛成疳疳虛證候乃作無辜無辜之孩難救矣薛疳者干也因脾胃津液乾涸而患在小兒為五疳在大人為五勞總以調補胃氣為主後列諸方其證候龐雜不能名為何等疳者即於通治諸疳方內檢之若證候的與五疳等條下證候對者即檢本疳方分寒熱虛實擇而用之常須識此勿令誤也肝疳楊氏云肝疳者由乳食不調肝臟受熱所致也若乳母寒溫不調滋味不節或外感風寒內傷喜怒邪氣未散遽以乳兒多成風疳肝者眼之候上膈伏熱痰涎壅滯以致肝風入眼赤腫翳生眵淚爛眶痛癢揉擦昏暗雀盲甚至經月閣眼亦名疳眼外證搖頭揉目白膜遮睛眼青淚多頭焦發豎筋青腦熱甲癢筋攣燥渴汗多下痢瘡癬是也錢氏以地黃丸主之腎楊氏以天麻丸生熟地黃湯主之曾氏調肝用耆歸湯天麻丸治肝疳風疳疳眼青黛川黃連天麻五靈脂夜明砂微炒川芎蘆薈各二錢龍膽草防風蟬蛻去足各一錢半全蠍二枚焙麝香少許乾蟾頭炙焦三錢上為末豬膽汁浸糕丸麻子大每服十丸薄荷湯下生熟地黃湯治疳眼閉合不開內有朦霧生地黃熟地黃各半兩川芎赤茯苓枳殼炒杏仁水浸去皮川黃連半夏曲天麻地骨皮甘草炙當歸各二錢半上銼散每服二錢生薑三片黑豆十五粒水煎溫服耆歸湯治小兒稟賦素弱豆瘡出不快者及肝虛目視不明黃耆一兩蜜水塗炙當歸酒洗焙乾白芍藥川芎各半兩甘草三錢炙上件㕮咀每服二錢水一盞煎七分無時溫服張渙熊膽天麻丹治風疳羸瘦搖頭揉目百脈拘急天麻羌活真熊膽蟬殼使君子去殼胡黃連各一兩蘆薈乾蟾酥炙黃各半兩上件搗羅為細末粳米飯和如黍米大每服十粒煎荊芥湯下量兒大小加減烏蟾丹烏蛇酒浸去皮骨炙令黃乾蟾酥炙黃蛇蛻皮燒灰各一兩胡黃連半兩以上搗羅為細末次用真蘆薈麝香熊膽各二錢半並細研上件同拌勻以粟米飲和如黍米大每服十粒煎薄荷湯下乳前莊氏家傳治小兒風疳順肝氣進飲食蘆薈丸蘆薈一錢別研稱或只以皂角水磨草龍膽一兩淨洗銼焙乾稱上件藥一處搗羅為末用不蚛皂角三鋌以水二升挼汁用生絹濾去滓入銀器內慢火熬成膏入前二味藥調和得所丸如緑豆大每服三丸至五丸薄荷湯吞下漢東王先生家寶治小兒風疳氣攻項下生核子皂角膏方皂角大者一莖燒存性糯米一合炒黑色草烏頭二錢生黃皮一錢炒黑色上為末每用不拘多少以井華水調貼如未安須用水精丹取後用調氣觀音人參散等藥補仍再貼兼與疳藥相間服神妙觀音散補虛調胃氣進乳食止吐瀉久不進食白扁豆微炒石蓮肉炒去心人參焙各一分茯苓一錢半焙甘草炙香白芷綿黃耆捶碎用蜜水拌炙木香炒各一錢神麯二錢上為末每服嬰孩一字二三歲半錢四五歲一錢用水一藥注或半銀盞棗子半片煎十數沸服人參散補虛謂胃氣進乳食止吐瀉人參茯苓蓮肉去心炒各一分黃耆半兩捶蜜水拌炙甘草二錢炙上為末每服嬰孩一字二三歲半錢四五歲一錢以水一藥注或半銀盞入棗子半片煎十數沸服莊氏第六候頭生瘡毛髮稀焦是肝疳方肉豆蔻蟾灰全者各一個桔梗炮茯苓煨大黃煨各一兩龍腦麝香各一錢上為末軟飯丸如麻子大粟米飲下三丸只可兩服治小兒手足動眼目不開有時語笑或即嗔怒兼多驚手指甲青狀形似死妄稱天瘹通神丸茯苓龍齒各煨半兩鉛丹胡黃連各一分銀箔五片麝香一錢釣藤一兩煨上為末煉蜜丸麻子大每十丸米飲下莊氏第二十二候用此方第三風疳小兒手足拘攣眼目不開有時自笑或嗔怒驚叫手爪甲青狀似鬼形已似天瘹須服金箔茯苓散金箔五片茯苓牛膝胡黃連各一兩龍骨一分木香麝香各一錢上件為末每服一字米飲下日二服忌油膩心疳楊氏云由乳食不調心臟受熱所致也蓋其血氣未定乳哺有傷易生壅滯內有滯熱未得疏通故心神驚郁而作驚疳之候外證身體壯熱臉赤唇紅口舌生瘡胸膈煩悶小便赤澀五心皆熱盜汗發渴齧齒虛驚是也錢氏安神丸主之薛氏用安神丸以治心異功散以補脾楊氏以茯苓丸錢氏安神丸主之曾氏寧心用茯神湯硃砂安神丸治心疳怔忡心中痞悶硃砂四錢黃連生地黃各半兩生甘草二錢半蘭香葉二錢燒灰銅青輕粉各五分上為末干敷上茯苓丸治心疳驚疳茯神蘆薈琥珀黃連淨赤茯苓各三錢釣藤皮遠志肉薑製焙乾蝦蟆灰各二錢石菖蒲一錢麝香少許上為末粟米糊丸麻子大每服十丸薄荷湯下茯神湯治心氣不足虛而驚悸日常煩哭及嬰孩生下羸瘦多驚宜子母同服自然有效茯神去皮木根一兩人參去蘆當歸去蘆尾酒洗各半兩甘草炙二錢上件㕮咀每服二錢水一盞煎七分無時溫服有微熱煩躁入麥門冬去心同煎張渙參黃丹治驚疳挾熱夜臥驚悸乾蠍二十一個微炒天漿子一十四個乾者微炒人參胡黃連各一兩天竺黃半兩研以上為細末次入青黛硃砂各一分龍腦一錢並細研上件一處拌勻煉蜜和如黍米大每服十粒人參湯下量兒大小加減天竺黃丹天竺黃一兩細研晚蠶蛾微炒白殭蠶微炒川黃連各半兩以上搗羅為細末次用硃砂青黛麝香各一分並細研上件拌勻粳米飲和如黍米大每服七粒至十粒煎人參湯下量兒大小加減仙人水鑑治小兒驚疳硃砂丸五歲至十五歲並宜服之硃砂三錢研青黛一兩研黃連鬱金為末夜明砂用炒焦黑各半兩麝香熊膽用冷水一雞子多浸一宿各一錢上同研如粉次入浸熊膽水和為丸如緑豆大空心臨臥金銀薄荷湯下三丸至五丸切忌生冷油膩神效萬全方真珠散治小兒心疳體熱黃瘦真珠末麥門冬去心各半兩天竺黃金銀箔各研五十片臨和加入諸藥末內牛黃麝香各細研胡黃連甘草炙羚羊角屑川大黃炒當歸微炒硃砂雄黃茯神犀角屑各一分上搗羅為散每服以茵陳湯調半錢量兒大小服之朱氏治小兒肚大項小即是驚疳方釣藤甘草各二分人參栝蔞各一分上件為末以水一茶碗入藥二錢煎取六合去滓重煎溫服治五疳八痢心藏熱方蘆薈半兩研輕粉青黛香墨飛羅面各一錢使君子一個蝸牛五個和肉炒焦細研麝香半錢上為末研細滴水為丸芥子大生地黃汁化下一丸至二丸薄荷湯亦得莊氏第九候用此方麝香丸治小兒一切驚疳等病草龍膽胡黃連各半兩木香蟬蛻上頭足洗淨各一錢瓜蒂龍腦麝香牛黃各一錢並各細研上豬膽為丸如桐子及緑豆大驚疳或祕或瀉清米飲送下小兒五七粒至一二十粒眼疳豬肝湯下疳渴燖豬湯下豬肉湯下亦得驚風發搐眼上竄薄荷湯下一丸更水研一丸滴鼻中牙疳瘡口瘡研貼蟲痛苦楝根湯或白蕪荑湯送下百日內小兒大小便不通水研封臍中有蟲候乾漆麝香各少許併入生油一兩點溫水化下一大丸慢驚勿服睡驚丸治小兒一切驚疳食積風癇之證使君子五十個燒香墨棗大一塊金銀箔各七片膩粉二錢上先將使君子存性同墨研細次入金銀箔乳鉢內研次入膩粉並麝香少許研令極細稀糊丸如桐子大陰乾每服一丸薄荷湯磨下一歲以下半丸一名青金丹極效治小兒因吃著患熱病奶次腹痛並及驚風毒奶便乃下痢吐逆又名奶疳桃仁去皮尖炒胡黃連各半兩沉香硃砂別研各一分金箔五片上為末軟飯丸麻子大米飲下五丸奶汁下亦得莊氏第十一候用此方治小兒胃疳及進食方胡黃連蘆薈各一分肉豆蔻一個檳榔乾蟾炙各半個夜明砂半分炒硃砂麝香各半錢上為末煉蜜丸緑豆大一歲一丸米飲及乳汁下亦得如是疳盛次加二丸至三丸取下蟲屎為驗五日一服桃花丸治小兒心藏積熱生疳寒水石一兩用炭火燒熟研如面細硃砂半錢細研合和如桃花色上為末水浸蒸餅丸如粟米大冷水下三五丸服旬日自然安妙莊氏第二十四候用此方脾疳楊氏云由乳食不節脾胃受傷所致也或乳母恣食生冷肥膩或乳兒過傷或飯後與乳致吐或乳多眠久則變為乳癖腹脅結塊亦為奶疳外證面黃身熱肚大腳弱吐逆中滿乏力叫啼水穀不消泄下酸臭合面困睡減食吃泥是也錢氏益黃散主之楊氏以靈脂丸同益黃散主之薛氏用四味肥兒丸以治疳五味異功散以生土曾氏調脾用參苓白朮散不乳食益黃散見脾四味肥兒丸治嘔吐不食腹脹成疳或作瀉不止或食積脾疳目生雲翳口舌生瘡牙齦腐爛發熱瘦怯遍身生瘡又治小便澄白腹大青筋一切疳證黃連炒蕪荑神麯麥芽炒各等分上為末水糊丸桐子大每服一二十丸空心白滾湯送下靈脂丸治脾疳食疳白豆蔻仁麥糵炒五靈脂縮砂仁蓬朮煨青皮去穰橘紅使君子焙蝦蟆炙焦各二錢上為末米糊丸麻子大每服十丸米湯下神效換肌丸治脾疳肌瘦潮熱盜汗泄瀉糟粕頭大腹急川黃連炒鱉甲酒炙肉豆蔻煨使君子麵裹煨神麯炒麥芽炒各半兩訶子肉二錢半麝香五分上為末糊丸芥子大米湯下張渙木香煎治食疳不知飢飽積滯內停腹大腳細下痢無度南木香銼肉豆蔻去殼各一兩乾蟾二個酥炙胡黃連使君子去殼五靈脂各一兩以上搗羅為細末次用巴豆七個去皮心膜紙裹出油細研麝香一分細研上件同拌勻滴水於石臼中搗一二百下和如黍米大每服二粒至三粒溫生薑湯下乳食後看兒大小加減檳榔丹能食不生肌肉宜常服檳榔麵裹炮面干為度木香胡黃連各一兩代赭石一分研以上各搗羅為細末次用香墨燒存性細研麝香研細各一分上件通拌勻糯米飲和如黍米大每服十粒煎橘皮湯下食後量兒大小加減肉豆蔻丹肌瘦挾積常服尤佳肉豆蔻去殼使君子去殼青橘皮炒黃各一兩牽牛子炒黃一分以上搗羅為細末次入蘆薈一分研麝香一錢研上件一處拌勻用糯米飲和如黍米大每服十粒生薑湯下食後量兒大小加減聖惠木香丸治小兒食疳腹中多痛大腸或痢鼻癢乾瘦時有體熱木香胡黃連蟾頭炙令焦黃麝香蘆薈青黛雄黃各細研香墨熊膽各一分使君子半兩上件藥搗羅為末煉蜜和丸如緑豆大每服以粥飲下五丸量兒大小以意加減訶梨勒丸治小兒食疳水穀不消心腹脹滿好吃泥土肌體瘦弱訶梨勒皮三分肉豆蔻一枚去殼青黛麝香蘆薈硃砂各細研熊膽研入各一分上件藥搗羅為末都研令勻用酒煮粳米飯和丸如黍粒大每服以粥飲下三丸日二服量兒大小增減服之桃花散治小兒食疳腹脹桃花一分乾蟾塗酥炙令黃肉豆蔻去殼青黛細研赤芍藥紫筍茶各半兩上件藥搗細羅為散每服以溫粥飲調下半錢看兒大小臨時加減孔氏家傳治小兒脾疳方胡黃連使君子五味子檳榔各一錢南木香半錢上為末粟飯丸如緑豆大飯內與五七丸日三服大胡黃連丸錢氏治一切驚疳腹脹蟲動好吃泥土生米不思飲食多睡吼啀臟腑或瀉或祕肌膚黃瘦毛焦發黃飲水五心煩熱能殺蟲進飲食兼治瘡癬常服不瀉痢啀泥如切飲嘔聲胡黃連黃連苦楝子各一兩白蕪荑去扇半兩秋初三錢乾蟾頭燒存性研一分麝香另研一錢青黛另研一錢半蘆薈另研一分上先將前四味為細末豬膽汁和為劑每一丸如胡桃大入巴豆仁一枚置其中用油單紙一重裹之同米一升許蒸米熟為度入後四味為丸少入麵糊丸如麻子大與十丸或十五丸清米飲下食後臨臥日三服大蕪荑湯又名梔子茯苓湯治黃疸土色為熱為濕當小便不利今反利者知黃色為躁胃經中大熱發黃脫落知膀胱腎俱受土邪乃濕熱之證鼻下斷作瘡者土逆行營氣伏火也能乳者胃中有熱故也喜食土者胃氣不足面色黑者為寒為痹大便青屬寒褐色血黑色熱蓄血中間黃色腸胃有熱治法當滋營潤燥內除寒熱外致津液山梔黃連麻黃羌活柴胡茯苓各三分黃柏甘草炙各二分大蕪荑白朮各五分防風一分當歸四分上件銼如麻豆大作一服水一盞半煎至一盞去渣稍熱服食前治小兒脾疳面黃多睡手足浮腫方桑白皮焙漢防己焙人參茯苓胡黃連炮麝香各一分上為末煉蜜丸如麻子大用米飲下五丸一日二服莊氏第十候用此方莊氏第二候腳細肚高胸前骨生愛吃泥土酸鹹日久通身黃時時吐逆下痢腹內疼痛是脾疳宜服虎睛一對焙牛黃硃砂麝香各一分桔梗半兩煨上為末煉蜜丸生薑湯下三丸至五丸治小兒脾疳瀉血肚大氣喘方丁香白朮龍腦乾蠍胡黃連夜明砂炒各一分上為末軟飯丸米粒大蕪荑湯下治小兒通身黃瘦大小便結澀脾所召也漢防己炒甘草炙各一兩桑白皮木通木香各半兩檳榔一個胡黃連一分上為末每服一錢水七分盞生薑少許煎至五六分分溫二服莊氏第十五候用此方治小兒疳氣進飲食黃耆散黃耆五味子厚朴薑汁炙白朮蒼朮芍藥甘草炙陳橘皮乾薑乾蠍當歸各一兩木瓜二兩上為末每服半錢米飲調下丹小兒吃泥石膏黃芩陳皮茯苓甘草白朮上為散煎服經治小兒吃泥及䑋肚膩粉一分用沙糖搜丸如麻子大空心米飲下一丸瀉出土瘥䑋如掌切脹也莊氏第十九候愛餐生米麵炭磚瓦是脾胃疳蘆薈丸治小兒驚風五疳蘆薈胡黃連牛黃天竺黃草龍膽茯苓各半兩龍腦麝香人參川大黃雄黃各一分生犀屑二分上為末煉蜜丸緑豆大每服三丸薄荷湯下溫酒亦得化下亦無妨小兒脾疳常吃泥土日久遍身通黃醫人不識或呼為陰黃宜服虎睛丸虎睛一個牛黃二錢桔梗麝香胡黃連各一錢上件為末煉蜜為丸麻子大每服三丸食前米飲下日二服肺疳楊氏云由乳食不調壅熱傷肺所致也肺主乎氣鼻乃肺所通其氣不和則風濕乘虛客於皮毛入於血脈故鼻下兩傍赤癢瘡濕名為鼻疳其瘡不痛汁所流處隨即生瘡亦名疳䘌外證咳嗽喘逆壯熱惡寒皮膚粟生鼻瘡流涕咽喉不利頤爛吐紅氣脹毛焦泄痢頻並是也錢氏主補脾生肺以益黃散主之楊氏以清肺飲化䘌丸錢氏阿膠散主之薛氏用清肺飲以治肺益氣湯以生金曾氏用補肺散地黃清肺飲治肺熱疳䘌咳嗽氣逆多啼壯熱惡寒桑白皮炒半兩紫蘇北前胡防風赤茯苓黃芩當歸天門冬去心連翹桔梗生地黃甘草炙各二錢半上銼散每服二錢井水煎食後服次用化䘌丸化䘌丸蕪荑蘆薈青黛川芎白芷梢胡黃連川黃連蝦蟆灰各等分上為末豬膽汁浸糕糊丸麻子大每服二十丸食後臨臥杏仁煎湯下其鼻常用熊膽泡湯小筆蘸洗俟前藥各進數服卻用青黛當歸赤小豆瓜蒂地榆黃連蘆薈等分雄黃少許細末入鼻斂瘡補肺散治久患咳嗽肺虛氣促有痰噁心阿膠一兩半銼炒白茯苓馬兜鈴去老梗糯米各半兩杏仁二十一粒湯泡去皮尖甘草四錢炙上銼每服二錢水一盞煎七分無時溫服張渙麝香丹治小兒肺疳皮毛枯燥咳嗽上氣胡黃連一兩半夏半兩湯洗七遍紫蘇子微炒五味子各一分乾蟾一枚塗酥炙微黃以上搗羅為細末次用麝香細研蘆薈細研硃砂細研各一分上件一處拌勻以棗肉和如黍米大每服五粒至七粒米飲下量兒大小加減靈砂丹因嗽成疳最宜服之人參半兩去蘆甜葶藶研五靈脂胡黃連各一分以上搗羅為細末次用辰砂半兩細研麝香細研蘆薈細研杏仁麩炒去皮尖各一分上件一處拌勻以粳米飲和如黍米大每服十粒煎人參湯下量兒大小加減五靈脂丹久嗽恐成疳常服尤佳五靈脂半兩蟾頭一枚塗酥炙微黃蟬殼微炒款冬花各半兩以上搗羅為細末次用青黛細研雄黃細研各一分上件藥一處拌勻糯米飲和如黍米大每服十粒煎人參湯下不拘時候量兒大小加減萬全方治小兒肺疳不欲乳食時復腹痛胡黃連丸胡黃連當歸焙微炒訶梨勒皮木香各半兩青橘皮湯浸去白穰焙紫蘇子杏仁湯浸去皮尖麩炒微黃各一分麝香一錢研入上件搗羅為末用粟米飯和丸緑豆大每服三丸以粥飲下量兒大小加減張國材肺疳方真珠七十粒辰砂半錢人參甘草各二錢麝香半字輕粉五錢匕白附子一個上件先將人參甘草銼碎炒熟白附子炮碾末次研入真珠辰砂麝香輕粉勻畢每服半錢或一字用金銀薄荷煎湯調服日進一服食後只三服其肺疳立愈莊氏第三候鼻下赤爛愛揉眼兼血痢是肺疳乃因吃著乘熱物或病奶所損心肺加之咳嗽更以服涼冷藥過多便上熱下冷漸漸昏沉日夜煩哭龍腦硃砂各一分釣藤玄參各一兩胡黃連炮半兩麝香一錢上為末煉蜜丸如黃米大米飲下三丸至五丸治小兒頭項細心腹脹滿皮膚干皺毛髮焦黃鼻下赤爛口舌生瘡瀉痢不止日漸羸瘦大蟾一個去四足劈開腹去肚腸入胡黃連一兩和在內線縫合以濕紙三重裹用泥固濟四面令乾微火出陰氣更用炭三斤燒令通赤即焦候冷淨去泥土細研如粉麝香熊膽蘆薈各半兩上一處細研如泥麵糊丸如麻子大米飲下三丸乳汁亦得三歲以上加丸理小兒五疳八痢腹脹羸瘦頭髮焦乾口鼻生瘡黃連白蕪荑與黃連同炒焦夜明砂用水淘五次焙各一兩上為末豶豬膽汁和丸如緑豆大三丸至五丸不計時候麥門冬熟水下如久患疳氣服藥無效或腹脹氣促不能飲食米飲下取出疳蟲即瘥莊氏第八候用此方腎疳楊氏云由乳哺不調臟腑伏熱所致也凡甘味入於脾而動蟲蟲動則侵蝕臟腑遂使孩提心下擾悶若上蝕齒齦則口瘡出血齒色紫黑下蝕腸胃則下痢肛爛濕癢生瘡療治不早精髓消耗難以有瘳蟲者䘌也目為濕䘌多因疳傷久痢腸胃受濕得之狀如狐惑傷寒齒蝕之證或以走馬命名蓋齒屬腎腎主虛才受熱邪疳氣直奔上焦故以走馬為喻初作口氣名曰臭息次第齒黑名曰崩砂盛則齦爛名曰潰槽熱血迸出名曰宣露甚者齒皆脫落名曰腐根其根既腐縱得全活齒不復生外證腦熱肌削手足如冰寒熱時來滑泄肚痛口臭乾渴齒齦生瘡爪黑麵黧身多瘡疥是也錢氏地黃丸主之仍當於生脈散中多加黃耆以補肺曾氏用調元散調元散主稟受元氣不足顱囟開解肌肉消瘦腹大如腫致語遲行遲手足如分同神色昏慢齒生遲服之效乾山藥去黑皮五錢人參去蘆白茯苓去皮茯神去皮根白朮白芍藥熟地黃酒洗當歸酒洗黃耆蜜水炙各二錢半川芎甘草炙各三錢石膏上碎每服二錢水一盞姜二片棗一枚煎七分無時溫服如嬰孩幼嫩與乳母同服九味地黃丸治腎疳熟地黃四錢五分赤茯苓山茱萸肉川楝子當歸川芎牡丹皮山藥使君子肉二錢上為末蜜丸桐子大每服八十丸空心溫酒下張渙熊膽散治急疳蟲傷臟腑上蝕口齒生瘡赤爛世呼為走馬疳莨宕子炒令微黑蝦蟆灰白礬各半兩生硫黃一分以上搗羅為細末次用熊膽半兩細研麝香雄黃蘆薈各一分並細研上件藥一處拌勻為細末每服一字煎荊芥湯調下如有瘡處宜薄敷之如鼻癢即取少許逐日吹鼻中日三兩上熊膽膏截急疳病真熊膽半兩研蚺蛇膽為末蘆薈研牛黃研各一分龍腦麝香各一錢並研細上件藥都細研以井華水一小盞攪和勻以瓷器盛重湯慢火熬成膏每服一豆大薄荷湯化下兼塗患處立聖膏治急疳侵蝕人乳汁半合黃礬一栗大白礬一棗大石膽一豆大上件藥都研細以綿裹納乳汁中浸經一宿看汁有味慢火熬成膏每用少許塗於口裡如鼻中有瘡滴入少許若有腫處先以三稜針刺破除去血然後即塗此藥二金散治急疳毒盛砒霜一分麝香半兩上件藥先將砒霜去紙上炒過後入麝香同研令細每用一字以雞羽掠在瘡上日使三兩度隨時展去藥無令咽津治小兒腎疳並疝氣偏墜寒熱方沒藥炮甘草各二分硫黃木香炮胡黃連各一分上為末用蒸棗肉丸如麻子大蓯蓉湯下三丸可兩服莊氏第七候用此方通治五疳方五疳保童丸治小兒乳食不擇冷熱好餐肥膩恣食甘鹹臟腑不和生疳青黛苦楝根皮夜明砂五倍子蘆薈黃連龍膽草白蕪荑乾蟾各一分麝香少許蟬蛻去嘴爪一分豬膽大者五個拌諸藥焙上件粟米煮糊為丸如麻子大一歲兒三丸不拘時米飲下日三服忌豬肉大蘆薈丸治疳殺蟲和胃止瀉胡黃連黃連白蕪荑去扇蘆薈木香青皮白雷丸破開赤者不用鶴蝨微炒各半兩麝香二錢另研上為末粟米飯丸緑豆大每服一二十丸米飲下愚按前方肝脾疳積食積發熱目生雲翳或疳熱頸項結核或耳內生瘡肌體消瘦發熱作渴飲食少思肚腹膨脹或牙齦蝕落頰腮腐爛或陰囊玉莖生瘡或胸脅小腹作痛並效內青皮以龍膽草代之麝香不用尤效蘆薈丸曾氏主五疳八痢蛔蟲臟腑虛弱身體瘦悴頭髮焦疏腹脹青筋小便白濁渴水無度洞泄不時穀食難化遍身瘡疥神色乾燥此藥大能養胃壯氣止痢除蟲長肌南木香丁香各二錢半訶子去核取肉肉豆蔻各半兩使君子肉蘆薈各四錢棗子肉一兩薄切用瓦盛慢火焙乾上除使君子肉薄切於乳鉢內極細杵仍將前南木香等四味濕麵裹煨至香熟取出地上候冷去面銼焙同棗肉蘆薈為細末再入乳鉢同使君子肉杵勻煉蜜丸作麻仁大每服三十丸至五十五丸溫米湯送須是空心服之兒小米湯化服萬應丸治諸疳證胃口有熱飲食不進頭髮作穗面色痿黃五倍子去內蟲屑胡黃連青皮去白陳皮去白黃柏神麯麥芽淨洗焙乾三稜炮銼莪朮炮銼蕪荑檳榔龍膽草川楝子肉使君子各一兩上除檳榔不過火麥芽二味外餘十二味銼碎炒令微焦色候冷同前檳榔麥芽研為細末水煮麵糊丸麻仁大每服三十丸至五十丸或七十丸溫米清湯無時送下或空心兒小者丸粟谷大粒數下法同前博濟方至聖青金丹治小兒一十五種風疾五般疳氣變蒸寒熱便痢棗花糞腳細肚脹肚上青筋頭髮稀疏多吃泥土撏眉毛咬指甲四肢羸瘦疳蛔咬心瀉痢頻並饒驚多嗽疳蝕口鼻赤白瘡疳眼雀目悉皆能治青黛上細好者二分研良方三分雄黃二分研細良方二兩龍腦少許研局方一字硃砂一分研良方一錢膩粉一分良方一錢胡黃連二分良方二兩熊膽一分用溫水化入藥良方一錢白附子二枚良方一錢局方二錢蘆薈一分研良方一錢麝香半分研蟾酥一皂子大局方一字鉛霜少許良方皆同局方一字水銀一皂子大局方一錢同膩粉研不見星上件一十三味細研杵羅為末後再都入乳鉢內細研令勻用豶豬膽一枚取汁熬過浸蒸餅少許為丸如黃米大曝乾於瓷器內收密封或要旋取每服二丸各依湯使如後小兒患驚風天吊戴上眼睛手足搐搦狀候多端但取藥一丸用溫水化破滴入鼻中令嚏噴三五遍後眼睛自然放下搐搦亦定更用薄荷湯下二丸小兒久患五疳四肢瘦小肚高撏眉吃土咬指甲發稀疏肚上青筋粥飲下二丸小兒變蒸寒熱薄荷湯下二丸化破服小兒久患瀉痢米飲下二丸小兒久患疳蛔咬心苦楝子煎湯下二丸小兒患鼻下赤爛口齒疳蟲並口瘡等用兒孩子奶汁研二丸塗在患處小兒患疳眼雀目用白羊子肝一枚以竹刀批開納藥二丸在肝內以麻縷纏定用淘米泔水內煮令熟空腹吃仍令乳母常忌毒魚大蒜雞鴨豬肉等此藥若小兒常隔三兩日吃一服永無百病不染橫夭之疾凡有患但與服必有功效靈苑紅丸子治五疳肥孩兒郁李仁一百粒用溫水浸去皮尖坯子胭脂一分麝香半錢別研上先研郁李仁細爛次入胭脂麝香同研用粳米飯為丸如麻子大每服三丸至五丸一日三服用薄荷湯下量兒大小臨時加減丸數談氏蝦蟆丸治五疳羸瘦毛髮稀疏揉鼻咬甲好食泥土腹大頸細痢如泔澱乳食不消小便白濁緑礬半斤為末棗一升半去核上先用醋五升並礬煮棗熟後入黃連四兩訶子去核二兩使君子二兩夜明砂二兩干蝦蟆四個燒灰存性同搗碎入前藥內攪勻直到乾焦為度再杵羅為末棗肉丸如黍米大三四歲每服三十丸米飲下乳食前張渙夜明丹治五疳腹脹目澀多睡夜明砂一兩微炒胡黃連草龍膽苦楝根各半兩干蝦蟆五個燒存性併為細末後用蘆薈青黛麝香各細研一分上件一處拌勻粳米飯和丸如黍米大每服十粒米飲下不拘時候量兒大小加減劉氏金蟾丸治小兒五疳羸瘦合面臥地筋青腦熱吐瀉無度渾身壯熱口舌生瘡痢下膿血心腹脹滿喘促氣急乳食全少多啼嘔逆飲食不化或時憎寒多涕咳嗽鼻下赤爛十指皆癢蝕於唇齒生瘡出血肛門不收毛髮焦黃但是疳疾神效干蝦蟆五個燒灰胡黃連宣連鶴蝨肉豆蔻苦楝根白皮雷丸蘆薈蕪荑雄黃一分飛過上為末麵糊為丸緑豆大雄黃為衣每服十五丸飯飲下張氏香蟾丸治五疳殺蟲消肚膨止痛住瀉痢生肌膚干蝦蟆酥炙黃色大黃連洗去須蕪荑仁蘆薈上件等分為末豬膽麵糊為丸如桐子大每服四十粒用飯飲吞下不拘時一日二服至三服忌生冷宿食毒物莊氏五疳丸熊膽蕪荑去皮各一錢麝香一字胡黃連別杵為末一分大幹蟾用上截去膊銼碎入在瓶內鹽泥固濟以炭火燒通赤取出停一夜取藥研為細末稱一分上件先將蕪荑研極細次入麝香次入胡黃連蟾研末令勻傾出卻研熊膽以沸湯熔化再入前四味更研令勻糊為丸如緑豆大每服三四歲十丸四五歲十五丸米飲下食前服王氏保童丸治五疳消化宿滯進食長肌肥孩兒胡黃連草龍膽末炒紫色各半兩使君子木香蘆薈細研各一錢大麥糵半兩巴豆三七個去皮心同麥糵炒令糵紫色去巴豆不用以糵為末川苦楝一分炒紫色上為細末同研令細用醋糊為丸如緑豆大每服十粒至十五粒米飲下不計時候此藥大治小兒疳腹脹吳氏黃耆飲子治小兒五疳或傷脾腹脹發黃時時壯熱頭上虛汗日漸黃瘦或泄瀉綿黃耆一兩人參陳皮微炒不去白白茯苓白檳榔極大者甘草炙各半兩肉豆蔻一個小者上為粗末每服三錢水一大盞慢火煎至七分濾去滓時時與服溫吃趙氏家傳治小兒五疳退黃榮肌膚解積熱壓驚消飲進食使君子二十一個胡黃連半兩五靈脂蟾頭炙令焦各一分麝香半錢研蘆薈熊膽各研二錢上為末燒粟米飯為丸緑豆大每服二十丸米飲下治小兒五疳面色黃瘦身體壯熱吃乳食不能消化眼目澀痛及胸膈痰涎愛食酸鹹常多瀉痢胡黃連母丁香黃連微炒去毛蘆薈熊膽研各半兩麝香一分細研蟾頭一枚塗酥炙焦黃上為末用牛膽和丸緑豆大如患心藏疳煎蕪荑甘草湯下三丸食疳瀉血或赤白痢新汲水下三丸吐逆不止及水瀉生薑湯下眼疳羊子肝血與酒和看多少微煎下三丸莊氏第四候用此方脂連丸治五疳潮熱腹脹發焦胡黃連半兩五靈脂一兩上為末豶豬膽汁丸麻子大米飲下冷熱疳疳之新者為熱疳面黃臉赤骨熱盜汗鼻乾口臭唇焦煩渴心躁驚悸情意不樂若疳之久者為冷疳目腫腹脹便利不定瀉糞肥膩或似油珠煩渴黃瘦熱疳病多在外冷疳病多在內又有冷熱二證交互非新非久不內外因者木香丸治冷疳木香青黛另研檳榔肉豆蔻去皮各一分麝香另研一錢半續隨子一兩半炒蝦蟆三個先用繩系曬乾燒存性上末蜜丸如緑豆大每服三五丸至一二十丸薄荷湯下食前湯氏云小兒冷疳多渴好臥冷地煩躁啼叫飲食不進漸成羸瘦其候難明有若熱證但大便滑泄百藥不效是也因女子百藥俱試而無偶中者竟與錢氏木香丸不數服而愈自後凡有此證無不獲驗胡黃連丸治熱疳胡黃連黃連各半兩硃砂一分上上二物為細末研入硃砂末都填入豬膽內用淡漿於砂銚子內懸胎煮一飯時久取出研入蘆薈麝香各一分飯丸如麻子大每服五七丸至一二十丸米飲下食後一方加蝦蟆半兩不燒如聖丸治冷熱疳方見疳瀉無辜疳巢氏兒面黃髮直時壯熱飲食不生肌膚積經日月遂致死者謂之無辜言天上有鳥名無辜晝伏夜游洗濯小兒衣席露之經宿此鳥即飛從上過而取此衣與小兒著並席與小兒臥便令兒生此病聖惠小兒無辜腦後有核如彈丸捏之反下轉是也凡小兒有此物如禽獸舌下有禁蟲若不速去當損其命此核初生軟而不痛中有蟲如米粉得熱氣漸長大大則筋結定定即蟲隨血氣流散所有停留子母相生侵蝕臟腑肌肉作瘡或大便泄膿血致使小兒漸漸黃瘦頭大發立手足細弱從茲夭折也夫小兒無辜疳痢者大腹泄痢膿血毛髮皮膚枯槁肌體日漸瘦羸腸胃既虛痢無時節故名無辜疳痢也漢東王先生云小兒無辜疾者古云天上有一鳥名無辜因曬小兒衣物失取過夜遇此鳥過尿之令兒啼叫諸病所生日漸黃瘦者非也此蓋是八邪所傷得之其八邪者飢飽勞役風驚暑積謂之八邪久則令人日漸黃瘦吃食不長肌肉夜間多哭身上或發微微壯熱多渴吃食不知飢飽或生瘡癬是也朱氏八片錦歌孩子無辜氣多因母作為若人能慎護安得見尫羸驚薄成風疾暄寒作氣痿須交除病乳莫更著重衣吃食無令早能言不怕遲論中八不許胸起力頻微頭皮光哲哲毛髮薄離離肝壅侵雙眼脾黃入四肢渾身生癮疹遍體是瘡痍瀉痢無休歇憎寒少定時繡球全不顧竹馬豈能騎白暈眸中現清涎口畔垂鬥牙須咬甲舉手要撏眉夜夜餐瓜果朝朝食土泥胃傷腸肚脹肺盛喘何疑飲食無休歇耽眠似醉迷肥兒丸治小兒腦後項邊有物如彈子按之轉動軟而不痛名無辜疳久服神效胡黃連神麯炒麥糵各五錢檳榔三錢木香二錢肉豆蔻麵裹煨使君子肉各二錢半上為細末蒸餅丸如黍米大用米飲食遠服聖惠鱉甲散治小兒無辜疳項細肚大毛髮乾立作穗鱉甲三分塗醋炙黃去裙襴檳榔三顆沉香漏蘆牛蒡子微炒使君子赤芍藥訶梨勒皮甘草炙微赤銼各半兩上件搗羅為散每服一錢以水一小盞煎至五分去渣不計時候量兒大小分減溫服張渙蠍虎丹截疳祛毒乾蠍虎雄者微炙一枚蝸牛殼蘭香根澱花各一分以上搗羅為細末次入雄黃水磨者細研麝香細研各一分龍腦半分細研上件通拌勻煎米醋打白麵糊和如黍米大每服十粒煎脂麻湯下乳食後香甲湯截疳辟邪漏蘆一兩沉香銼牛蒡子微炒訶梨勒皮微炮安息香鱉甲塗酥炙黃去裙襴乳香研各半兩上件搗羅為細末同乳香拌勻每服一錢水八分入人參少許煎四分去滓放溫熱服量兒大小加減張渙玉粉散無辜疳痢定痢截疳胡粉一兩白龍骨水磨雄黃各研微炒楮木根白皮漏蘆白馬夜眼洗淨焙乾各半兩上件搗羅為細末都拌勻每服一字至半錢以雞卵清調下乳食前二肝丹治無辜疳痢不止地膽草菖蒲一寸九節者漏蘆各一兩胡黃連地榆各半兩以上搗羅為細末次用雞肝薄切豬肝同入鹽少許用諸藥煮肝熟各一兩上件同於石臼中搗一二百下成膏和丸如黍米大每服十粒麝香湯下食前量兒大小加減梅肉散治無辜疳渴利不止眼出障翳身體浮腫烏梅肉炒乾綿黃耆乾葛各一兩川黃連栝蔞根乾薑炮甘草炙各半兩上件搗羅為細末每服一錢水一盞煎至六分去滓放溫時時與服藍葉湯治無辜疳血痢不斷藍葉一兩地龍人參去蘆頭烏梅肉冬瓜仁黃連赤茯苓蝸牛殼微炒各半兩上件搗羅為細末每服一錢水一小盞煎至六分去滓溫服乳食前天靈丹治無辜疳痢久不瘥天靈蓋一個乾蟾一兩燒灰胡黃連莨菪子水淘去浮者炒令黑色各半兩砒霜一分同天靈蓋濕紙三五重裹膠泥固濟於大炭火上燒令通赤取出候冷以上都搗羅為細末次入麝香一分上件都拌勻軟飯和丸如黍米大每服五粒乳汁下量兒大小加減服之溫臟湯治小兒無辜疳痢久不止手足逆冷肉豆蔻去殼乾薑炮各一兩龍骨當歸厚朴去粗皮塗生薑汁炙令香熟各半兩附子一枚重半兩炮去皮臍茅香半分銼上件搗羅為細末每服一錢水八分一盞入生薑三片煎至五分去滓溫服乳食前朴附丹治無辜疳痢赤白相雜厚朴塗生薑汁炙令香熟訶梨勒皮麵裹炮各一兩附子一枚炮去皮臍龍骨烏梅肉赤石脂各半兩上件搗羅為細末煉蜜和丸如黍米大每服十粒米飲下乳食前人中白散治小兒無辜疳氣寒熱積滯不化腹肚脹痛人中白一分麝香半分蝦蟆塗酥炙焦蘆薈各半兩上件藥細研為散每日空心及晚後用熟水調下半錢服後當下惡物量兒大小加減服之硃砂丸治小兒一切無辜疳黃瘦腹痛或痢有蟲冷之與熱悉主之硃砂一分細研一方用三分菖蒲漏蘆各一兩雄黃一分細研一方用三分乾蟾一枚醋炙令黃麝香一兩細研一方用一分萬全方亦用一分上件藥搗羅為末都研令勻用粟米飯和丸如麻子大每服以粥飲化下二丸空心午後各一服隨兒大小以意加減決明子丸治小兒冷熱無辜疳或時驚熱或時夜啼大便青黃白汁頭熱身熱頭髮作穗四肢黃瘦不多食物用馬蹄決明子二兩搗羅為末煉蜜和丸如麻子大每於食後以熟水下三丸更量兒大小加減服之漏蘆散治小兒無辜疳肚脹或時瀉痢冷熱不調用漏蘆一兩搗細羅為散每以豬肝一兩散子一錢鹽少許斟酌以水煮熟空心頓服粥飲下漏蘆丸治小兒無辜疳痢羸弱不欲飲食及腹內蟲動作多吐清水漏蘆二兩豬肝爆干楮株根白皮銼各一兩上件藥搗羅為末煉蜜和搗一二百杵丸如彈子大每服以溫水研一丸不計時候量兒大小分減服之聖惠又方用地膽子一兩搗細羅為末每服一錢以豬肝一兩入鹽少許煮熟無時量兒大小分減食之治小兒無辜疳痢不止方上用沒石子二枚炒令赤黑色搗細羅為散以面半匙和作餅子爆熟卻研為末不計時候以粥飲調下半錢量兒大小加減服之外臺備急治小兒無辜疳痢方當歸龍骨黃連人參沒石子甘草炙各一兩上六味搗散蜜丸服三丸日再以瘥為度大小增減量之外臺救急療小兒瘦頭干無辜兼痢方上用馬齒莧搗絞汁服三合以瘥止子母祕録治小兒無辜痢赤白兼成疳方上用胡粉熟蒸熬令色變以飲服之傳驗治一歲至兩歲小兒無辜病方上用夜明砂熬搗為散任意拌飯並吃食與吃三歲號干無辜五疳出蟲方聖惠五疳久而不瘥則腹內有蟲肌體黃瘦下痢不止宜服藥出之則疳氣漸退其蟲狀如絲髮或如馬尾多出於腹背及頭項上若蟲色黃白及赤者可治青色者不可療也硃砂丸顱囟經治孩子疳痢辨蟲顏色定吉凶硃砂半石蓮大阿魏如硃砂大蝙蝠血三兩滴眉酥少許上細和少許口脂調先桃柳枝煎湯浴兒後看兒大小以緑豆大填兒臍中後用紙可臍中貼之用青衣蓋兒看蟲出來黃色輕青黑色重聖惠乾蟾丸治小兒五疳及驚風出蟲定生死乾蟾一枚五月五日者良蛇蛻皮一條火煆穀精草二兩花前藥同入罐子內以鹽泥固濟曬乾燒令通赤放冷研細胡黃連瓜蒂母丁香三味同為末牛黃龍腦硃砂雄黃蘆薈天竺黃麝香各一分青黛半兩上件藥都入乳鉢內研令極細用豶豬膽汁煎麵糊和丸如緑豆大一二歲兒以溫米泔半合化下五丸服藥後以桃柳湯浴兒著青衣蓋疳蟲當出衣上及眉毛鬢邊如細麩片子或如糝面塵毒黑色者難治黃白色易治仍宜粥飲下二丸日三服甚者半月內瘥麝香丸治小兒五疳瘦弱毛髮乾焦口鼻多癢有蟲麝香蘆薈粉霜硃砂各一分蟾酥一白豆許皂莢三寸燒灰蛇蛻皮五寸燒灰蝙蝠三個取血拌入藥末上件藥都細研以油熔蠟和丸如小豆大先以桃柳湯洗兒後用藥一丸塗於臍中上以醋面封之良久即蟲出黃白赤者易治黑者難療蘆薈丸治小兒五疳四肢乾瘦腹脹氣粗頻揉鼻眼宜服此出蟲蘆薈牛黃蟬殼各一分膩粉粉霜硫黃麝香各一錢田父一枚燒煙似絶便住青黛半兩巴豆十粒去皮心膜油蛇蛻皮一條燒灰上為極細末令勻以粳米飯丸如緑豆大每服以溫水下二丸良久煎桃柳水浴兒後以青衣蓋遍身當有蟲出白黃色者可治青黑者難治出蟲丸治小兒五疳久不瘥羸瘦極甚硃砂麝香牛黃蝸牛子炒夜明砂炒熊膽各一分蟾酥半錢上件藥都細研以麵糊和丸如緑豆大每服以溫水下三丸更別以水研一丸滴向鼻中得嚏五七聲良久當有蟲隨汗出立效乾蟾丸治小兒五疳出蟲乾蟾一枚燒灰天靈蓋灰半兩麝香半分蟬殼去足炒鱉甲酥炙黃焦去裙襴各一分上件藥為細末每用燒飯和丸如緑豆大二歲以下以蛤粉湯下一丸三歲已上至五歲二丸服藥後續以桃柳湯浴兒後用青衣蓋之當有蟲子出赤白者輕黑者重熊膽丸治小兒五疳出蟲熊膽硃砂麝香蚺蛇膽蜣螂炒瓜蒂各半兩上件藥為極細末入研了藥令勻用豶豬膽汁和丸如緑豆大先用桃柳湯浴兒了用粥飲下三丸以青衣蓋當有蟲出也定命散治五疳有蟲干蝦蟆一枚燒灰蛇蛻皮炒蟬殼各一分上件為極細末入麝香末半錢研勻但是一切疳至午時後以暖水調下半錢一二歲即服一字後煎桃柳湯放溫浴兒了便用青衣蓋當有蟲出即效青黛丸治五疳體熱乾瘦發立鼻癢有蟲不欲飲乳青黛蘆薈人中白各半兩豬牙皂角蟬殼各半分麝香一分胡黃連三分蟾涎人乳汁各少許上件為末五月五日午時修合以粽子肉棗肉及蟾涎乳汁丸如黍米大以桃柳湯浴兒後以米飲下三丸後著青衣裹兒看身上有蟲出青黑者不堪白黃赤者易瘥錢乙胡黃連麝香丸治疳氣羸瘦白蟲作胡黃連白蕪荑各一兩半麝香一錢黃連木香各半兩辰砂一分上末麵糊丸如緑豆大米飲下五七丸至三五歲可十五丸無時錢乙榆仁丸治疳熱瘦悴有蟲久服充肥榆仁黃連各一兩上為末用豬膽七枚破取汁與藥同和入碗內甑上蒸九日每日一次候日數足入研麝香半錢湯浸蒸餅和丸緑豆大每服五七丸至一二十丸米飲下蛔疳小兒食乳飯早食肉太早或腸胃停蓄甜膩化為蛔蟲皺眉多啼嘔吐清沫腹中作痛肚脹青筋唇口紫黑搖頭齒癢是也玉訣歌惡哭痰青蛔咬心涎生積冷痛難任每餐甜物並時果致得蟲生病轉深先用使君子散蘆薈丸取蛔後溫脾胃使君子散治小兒疳蛔使君子十個瓦上炒為末甘草膽汁浸一夕白蕪荑各一分苦楝子五個炮去核上末之每服一錢水煎服蘆薈丸治小兒疳蛔蘆薈安息香胡黃連枳殼麩炒各一錢使君子三七個炒蕪荑一分定粉一錢半麝香少許上末豶豬膽糊丸如緑豆大五七丸米飲吞下張渙三根散治蛔疳蟲動啼叫不止每至月初間尤甚狀如神祟貫衆根棠梨根醋石榴根各一兩栗刺故綿乾漆各半兩上件藥六味並燒灰存性搗羅為細末每服一錢用水八分煎四分去滓放溫服不拘時候除毒丹此方治蛔疳不瘥傳染兄弟姊妹鬼臼一兩去毛苦參銼青葙子草龍膽各半兩硫黃緋絹干蝦蟆白礬各一分上件藥並燒灰存性搗羅為細末煉蜜和如麻子大每服十粒磨沉香湯下量兒大小加減豬肚丹治小兒疳瘦盜汗多倦少力大便有蟲曾經大效川黃連揀淨胡黃連木香各一兩羌活蘆薈肉豆蔻鱉甲酥炙去裙襴白蕪荑各半兩上件搗羅為細末用豶豬肚一個洗刮令淨先以好香白芷二兩納肚中蒸極熟去白芷不用卻入諸藥縫合再蒸如泥取出同豬肚搗二三百下成膏丸如黍粟大每服十粒米飲下不拘時候量兒大小加減穀精丹治諸病下蟲如絲髮或如馬尾甚者便至夭傷穀精草三兩入餅子納鹽泥固濟用慢火煨通赤為度取出乾蟾三枚五月五日取者用酥炙黃皂莢三寸燒灰胡黃連瓜蒂母丁香各半兩以上搗羅為細末次入粉霜蘆薈麝香各一分並細研上件都拌勻用豬膽汁和如黍米大每服十粒米泔放溫下量兒大小加減桃柳湯服諸藥後用此法助之桃枝二兩柳枝二兩上件並銼碎以水兩大碗煎數沸通手浴兒甚佳浴兒畢用一青衣服蓋之疳蟲自出為驗小兒合地面無顏色啼聲乍高狀似心痛往往口乾發動有時醫人不識妄呼見祟不知小兒曾吃生肉肉化為蟲此方大效苦楝丸苦楝根鶴蝨硃砂各一兩檳榔三個麝香一錢上末麵糊丸如小豆大每服三丸白湯下日三服忌毒物下蟲丸治疳蛔諸蟲新白苦楝根皮酒浸焙緑包貫衆木香桃仁浸去皮焙蕪荑焙雞心檳榔各二錢鶴蝨炒一錢輕粉五分干蝦蟆炙焦三錢使君子五十取肉煨上為末麵糊丸麻子大每服一二十丸天明清肉汁下內加當歸川連各二錢五分脊疳蟲食脊膂身熱羸黃積中生熱煩渴下利拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻齧爪甲是也聖惠金蟾散治小兒脊疳頭大項細四肢黃瘦肚大胸高毛髮乾立蟾一枚大者塗酥炙令焦黃夜明砂微炒桃白皮樗根白皮地榆黃柏各銼訶梨勒煨用皮百合白蕪荑微炒人參去蘆頭川大黃銼碎微炒黃連去須各三分胡粉三錢丁香三七粒檳榔一分上件藥搗細羅為散每服用粥飲調下半錢日三服地骨皮丸治小兒脊疳漸漸黃瘦以手指擊之背如鼓響脊骨高是也此因奶熱所致地骨皮紫參黃耆銼川大黃銼碎微炒郁李仁湯浸去皮尖微炒各半兩龍膽去蘆頭子芩枳殼麩炒微黃去瓤木香豬苓去黑皮海蛤細研各一分上件藥搗羅為末煉蜜和丸如緑豆大每服以溫水研下五丸日三服量兒大小加減服之常得微利為效殺疳丸治小兒脊疳日漸羸瘦腹中有蟲沒石子瓜蒂鶴蝨並細研各半兩蟾頭炙令焦黃蘆薈青黛並細研各半兩麝香細研膩粉研入各一分上件藥搗羅為末以糯米飯和丸如黍米大每服以粥飲下五丸日三服量兒大小以意加減蘆薈丸治小兒脊疳腹內有蟲上攻背膂脊骨漸高肌體羸瘦蘆薈青黛硃砂麝香各細研熊膽研入胡黃連貫衆地龍微炒黃連去須蟬殼微炒去足雷丸各半兩蝦蟆一枚塗酥炙令焦黃上件藥搗羅為末用蝸牛肉研和丸如麻子大每服以粥飲下五丸日三服量兒大小增減服之青黛丸治小兒脊疳四肢瘦弱腹脹壯熱頭髮干疏時時煩渴脊骨如鋸青黛硃砂各細研夜明砂微炒定粉各一分蟾酥研入熊膽細研羚羊角屑犀角屑各半分黃連半兩去須麝香一錢細研上件藥搗羅為末用軟飯和丸如緑豆大每一歲以粥飲下二丸第五脊疳十指爪甲癢痛頭髮焦乾肚腹虛鳴脊骨如鋸時時下痢狀如青澱或膿或血硃砂丸天靈蓋炙一個柴胡白朮麝香各一錢檳榔一個上件棗肉為丸如麻子大每服三丸米飲棗湯下朱氏治小兒脊疳瀉血不止方定粉好棗十個搗碎頭髮少許剪碎上件為團磚襯火煆通赤細研米飲下半錢莊氏治小兒久下血不止謂之歷脊疳方用穿山甲米醋浸炙為末每服一錢米飲調下食空服腦疳胎中素挾風熱生下乳哺越常頭皮光急滿頭餅瘡腦熱如火髮結如穗遍身多汗腮腫囟高是也仙人水鑑小兒三歲以下多睡臥合面在地者便是腦中疳氣宜服此方黃葵花菊花釜下墨消石柏葉各等分上為散吹入鼻中永不合面臥地也吹鼻中有惡物似泥泄數條即便是腦中疳氣此是殺人之本小兒腦疳乳母宜服此方柏葉松葉黃葵花鼓子花鱉甲虎骨檳榔大黃各二兩上並生為末與醋三升煎膏丸如緑豆大每日空心飲下三丸效藥性論治小兒腦疳方上研蘆薈不以多少為細末每用少許吹鼻中殺腦疳鼻中癢聖惠牛黃丸治小兒腦疳身熱發枯牛黃蘆薈各細研熊膽研入胡黃連木香犀角屑各一分龍腦麝香各細研蟾酥研入各半分青黛細研半兩上件藥搗羅為末都研令勻以麵糊和丸如黃米大每服以溫水下五丸日三服量兒大小以意加減龍腦丸治小兒腦疳羸瘦煩熱龍腦麝香雄黃各一錢胡黃連末牛黃硃砂熊膽蘆薈干蝦蟆灰各一分上件藥都研令如粉以水化熊膽和丸如麻子大若硬更入糯米飯同丸每服用薄荷溫湯下三丸日三服量兒大小以意加減吹鼻龍腦散治小兒腦疳鼻塞頭痛眼目昏暗羞明怕日龍腦麝香各細研少許蝸牛殼炒令黃蝦蟆灰瓜蒂黃連去須細辛各一分上件藥搗細羅為散入瓷合內貯之每取少許吹於鼻中每日兩上用之治小兒合面臥地多睡或氣急面黃哭聲高叫或心痛口乾蓋是因曾吃生肉如此腹內有蟲方鶴蝨二分茯苓一兩煨木香一分苦楝根三兩檜株根半兩上先將二味根用水一斗煎成膏然後將三味為末搜和成丸黍粒大每服三五丸米飲下莊氏第十三候用此方第七腦疳鼻下赤爛身心煩躁鼻內生瘡頭髮自落日夜痛無休歇狀似鬼形安息丸安息香丁香胡黃連麝香雄黃各一錢肉豆蔻金銀箔各五片上末煉蜜丸如麻子大每服三丸米湯下龍膽丸治腦疳腦熱瘡龍膽草升麻苦楝根皮焙赤茯苓防風蘆薈油發灰各二錢青黛干黃連淨各三錢上為末豶豬膽汁浸糕糊丸麻子大薄荷湯下仍以蘆薈末入鼻乾疳身體壯熱或時憎寒舌澀口乾睡多盜汗皮膚枯燥發立毛焦乳食雖多肌肉消瘦四肢無力好睡昏昏日往月來轉加尫瘁是其候也瘦瘁少血舌乾多啼其病在心目不轉睛雖啼無淚其病在肝身熱尿干手足清冷其病在腎聲焦皮燥大便乾結其病在肺搭口癡眠胸脘乾渴其病在脾仙人水鑑獨治乾疳方天靈蓋生鱉甲波斯青黛黃鹽以上各一分陶隱居云北海黃鹽草粒粗以作魚鮓及咸菹上並同研令細日服一字空心熟水下若是濕疳不治乾疳治之不過三服神效聖惠天竺黃散治小兒乾疳心臟煩熱眼目赤澀皮膚乾燥夜多盜汗羸瘦不能乳食天竺黃半兩牛黃雄黃硃砂蘆薈麝香各細研蟾頭炙令焦黃胡黃連犀角屑木香甘草炙微赤銼釣藤各一分龍腦一錢細研上件藥搗細羅為散都研令勻每服以溫水調半錢日三服量兒大小以意加減治小兒乾疳體瘦煩熱眠臥不安方牛黃雄黃蘆薈青黛各細研丁香黃連去須熊膽研入蛇蛻皮灰天竺黃天漿子微炒犀角屑各一分胡黃連半兩蟾酥半錢研入麝香一錢細研上件藥搗羅為末更研令勻以煉蜜和丸如緑豆大每服以粥飲下三丸日三服量兒大小以意加減青黛丸治小兒乾疳肌體羸瘦皮毛乾焦發歇寒熱昏昏多睡青黛三分細研牛黃蘆薈硃砂麝香雄黃各細研胡黃連蛇蛻皮灰龍膽去蘆頭蟬殼微炒各一分蟾一枚塗酥炙焦黃上件藥搗羅為末都研令勻用麵糊和丸如黍米大每服以粥飲下三丸日三服量兒大小臨時增減牛黃丸治小兒乾疳煩渴壯熱皮膚枯燥日漸羸瘦牛黃半錢細研雄黃細研黃連去須蘆薈天竺黃各一分龍腦麝香各一錢細研甘草半分炙微赤銼上件藥搗羅為末都研令勻用糯米飯和丸如緑豆大每一歲以粥飲下一丸胡黃連丸治小兒乾疳瘦弱不能乳食發立腦幹肌體柴瘦胡黃連末半兩硃砂波斯青黛蘆薈各三分麝香一分蛇蛻皮一條燒灰蟾酥一杏仁大上件藥都研為末用豬膽一枚取法酒一盞和藥末都於銚子內熬如膏丸如緑豆大五歲至七歲以粥飲下五丸日三服三歲以下三丸青黛散治小兒乾疳日久不瘥骨立形枯諸治無效者青黛硃砂蘆薈地龍夜明砂各微炒干蝦蟆灰熊膽各一分麝香二分上件藥都細研為散每服半錢空心以粥飲調下更用少許藥吹入鼻中後以桃枝湯看冷熱浴兒衣蓋有蟲子出為效也牛黃丸治小兒乾疳體熱羸瘦心神煩躁少得眠臥牛黃細研硃砂細研水飛過子芩犀角屑各半兩麝香一分細研上件藥搗羅為末都研令勻以糯米飯和丸如麻子大每服用粥飲下三丸量兒大小增減服之按乾疳既是五臟之涸則當以人參白朮散加減八味丸之類補而濡之若專恃以上諸丸藥恐無愈理內疳聖惠云小兒乳食不消心腹虛脹眼目澀癢體熱皮枯腸胃不調痢下五色漸漸羸瘦蟲蝕肛腸日月彌深痢轉不止故號內疳錢氏云疳在內則目腫腹脹利色無常或沫青白漸瘦弱此冷證也宜使君子丸使君子丸治臟腑滑及疳瘦下痢腹脅脹滿不思乳食常服安蟲補胃消疳肥肌厚朴去粗皮薑汁塗炙半兩使君子去殼一兩麵裹煨陳皮去白一分甘草炙銼半兩訶子半兩半生半煨去核青黛半兩是兼驚及帶熱渴者宜此方如只臟腑不調不用青黛上為細末煉蜜和丸如小雞頭大每服一丸米飲化下兒生百日以上三歲以下服半丸乳汁化下元方無青黛東垣厚腸丸治小兒失乳以食飼之不能克化或生腹脹四肢瘦弱或利色無常陳皮半夏蒼朮人參各三分麥糵枳殼曲末各五分青皮厚朴各二分上為細末麵糊丸如麻子大每服二十丸溫湯送下忌飽食張渙金粟丹治腹大疳瘦好吃泥土泄利不調乾蟾五枚酥炙焦黃川黃連夏用二兩冬用一兩母丁香厚朴薑汁製草龍膽各一兩夜明砂微炒蟬殼洗訶子皮微炮各半兩以上搗羅為細末次用好硃砂細研水飛青黛研各一兩好麝香半兩研上件一處拌勻用煉蜜一半白麵糊一半和如黍米大每服十粒米飲下不拘時候量兒大小加減本事芎朴丸治小兒疳瘦瀉白水腹脹芎藭厚朴各一兩白朮半兩上為細末煉蜜丸如小彈子大每服一丸米飲化下三歲以下半丸小兒腹大泄瀉水穀不化吃食不知飢飽纍效神麯炒麥芽炒三稜青皮香附山楂厚朴甘草藿香枳實地黃砂仁黃連棗子各等分上為末白湯調下量兒加減聖惠木香丸治小兒內疳乳食不調心腹脹滿肌膚羸瘦下痢無常木香蟬殼微炒去足麝香細研黃連去須黃丹微炒熊膽研入夜明砂微炒乾蟾塗酥炙微焦各一分赤石脂半兩肉豆蔻一顆去殼田父半兩炙令微黃上件藥搗羅為末用水浸蒸餅丸如麻子大每服以溫粥飲下二丸量兒大小以意加減蘆薈丸治小兒內疳四肢羸瘦腹脹鼻癢皮膚乾燥下痢不常蘆薈雄黃各細研沒石子蟬殼微炒去足蛇蛻皮灰丁香熊膽研入各一分麝香細研蟾酥研入各一錢黃連半兩去須上件藥搗羅為末煉蜜和丸如黃米粒大每服以粥飲下三丸日三服別研一丸吹入鼻中量兒大小以意加減聖惠又收治疳痢麝香散治小兒內疳下痢不止肌體消瘦諸治未瘥麝香蘆薈各細研蛇蛻皮灰夜明砂微炒蝸牛殼黃連去須微炒沒石子各一分黃丹定粉各微炒一兩訶梨勒半兩煨用皮上件藥搗細羅為散都研令勻每服以粥飲調下半錢早辰午後各一服看兒大小加減服之胡粉丸治小兒內疳下痢不止昏沉多睡胡粉微炒青黛細研各半兩黃連末一兩微炒麝香一錢上件藥同研令細以豬膽一枚取汁和丸如黃米粒大不計時候以粥飲下五丸量兒大小以意加減談氏殊聖寶命丹治內疳皂角一兩炙令焦黑色去皮為末三分巴豆二七個去心膜細研新瓦上出油了用之雄雀兒糞二錢上細末以粟米飯丸緑豆大空心溫水下三丸外疳錢氏云疳在外則鼻下臭爛自揉鼻頭上有瘡不著痂漸繞耳生瘡今分走馬疳口齒疳鼻疳眼疳臚列諸方如下走馬疳走馬疳疳蝕之極也乃五臟蒸熱上攻甚即遍沿作崩砂候牙邊肉腫爛口內氣臭身微有潮熱吃食不得齒縫出鮮血常動搖似欲脫肉爛自漏落治之先以淡淡鹽湯洗口內即下紫金散摻之一日三次揩殺牙邊肉內蟲如大假甚即下秋霜散摻之然後將硃砂膏牛黃膏天竺黃散夾調理此茅先生法或以天竺黃散夾地黃膏亦好此惠眼法如此調理即安如調理不退先落齒一兩三個即死不治相次面光發腮漏見骨而殂形證論先與退脾肺風熱宜吃檳榔散五七服後用此藥貼齦上以大棗一個砒少許去棗核入砒在內燒灰存性臨臥時貼齦上數次效曾凡得此候多因氣虛受寒及有宿滯留而不去積溫成熱虛熱之氣上蒸或食甘酸鹹膩之物而脾雖喜甘積滯日久蘊熱上熏於口致齒焦黑爛間出清血血聚成膿膿臭成蟲侵蝕口齒甚致腮頰穿破乳食不便面色光浮氣喘熱作名走馬疳治之之法先去積熱用當歸散合三稜散水薑棗煎服次投蘆薈丸玉露飲及以溫鹽水灌漱或軟雞翎蘸鹽水拂洗略拭乾仍以燒鹽散內金散密陀僧散敷之若經久不愈者傳於唇之上下乃成崩砂證或穴發滿腮齒落骨露飲食減少氣促痰鳴必致危矣紫金散茅先生名黑鉛散治小兒走馬疳黃丹蛇床子炒令黑地龍炒令黑各半兩青礬一分煅過上末每服一字揩牙齦上一日三次揩秋霜散治小兒崩砂好砒半兩白礬四分上用水三分一盞先煎水令蟹眼沸來便下砒煆水乾為度即下白礬末同煆干為末取出入好麝香少許好坯子少許同拌合為末每使一字用鵝毛點拂牙齦上一日三四回拂即愈惠眼秋霜散治崩砂齒齦欲落粉霜砒霜白礬各一錢上為末用北艾一大團裹定上件藥末以石灰滲艾上後用碗盛發火燒盡細研以手捻少許揩齒上用鹽湯漱口燒時以盞子蓋定恐走了藥氣乳香丸治走馬牙疳如神乳香輕粉砒研各五分麝香少許上先將乳香研細入輕粉麝砒共再研勻用薄紙一韭葉闊去藥內按過揉紙少許丸如黃米大臨臥將藥填在患處至明則愈忌食醬醋鹽等物錢乙龍骨散治疳口瘡走馬疳砒霜蟾酥各一字粉霜半錢龍骨一錢定粉一錢半龍腦半字上先研砒粉極細次入龍骨再研次入定粉等同研每用少許敷之上方皆犯砒非極不用仙人水鑑治小兒走馬疳蟲透損骨者方上用天南星一枚當心剜作竅子安好雄黃一塊在內用大麥麵煨候雄黃熔作汁以盞子合定出火毒一宿去面研為末入好麝香少許掃在瘡上驗集驗方治小兒走馬疳上用蠶蛻紙不計多少燒成灰存性入麝香少許貼患處佳茅先生小兒崩砂方雞內金蘆薈白礬火煆乳香地龍麝香上各少許為末候小兒睡著以藥末摻牙齦上定命散治小兒走馬疳白礬緑礬各等分炒一大錢上同研勻用大麥面五錢蔞蔥一寸研爛將面同搜和軟硬得所為餅子將研勻者藥裹在中心用文武火燒存性於地坑內出火毒一宿又研如粉入鉛霜二錢同研令細每服一剜耳許揩牙上一二遍蟾灰散治小兒走馬疳干蝦蟆一個大者燒存性五倍子各一錢麝香少許上同研蜜水調塗齒根上未止更用之聖散子治小兒走馬疳膽礬龍膽草各一兩上同於瓦瓶中煅煙盡略存性貼瘡上生金散治小兒走馬疳天南星一個重一兩者緑礬一兩上先安排南星在乾地上用礬與南星同處四邊以灰火燒煙盡為度取出後研如粉入當門子一粒先含漿水洗貼之劉氏家傳李琬麝香散治小兒走馬急疳口臭牙齒損爛及攻蝕唇鼻腮頰纍治未效者可用此方麝香一錢真者黃柏一兩去皮杵末青黛半兩上好者雄黃一分飛研上件杵研極細如有患者先以綿纏箸擦卻齒上蝕損死肌以軟帛拭去惡血量瘡大小乾摻日夜五次用之或血盛並多不定者加定粉半兩同研用如前法黑神散龍膽草銼青膽礬上等分用甘鍋子一個先入膽礬在內次入龍膽草用鹽黃泥固濟留一眼子周迥用炭火燒至眼子上煙斷為度放冷取出研細入麝香少許如有患人看瘡內大小乾擦貼之立效牙疼乾擦牙根有鮮血出並腫爛牙擦之即愈孔氏無比散治小兒走馬疳麝香一分別研真蟾酥緑礬各半分膽礬沒藥各二分上四味一同用大磚一口鑿中心作竅穴子勿令透地便安四味藥在穴中周迥用紅著炭三斤燒過取出同麝香再研勻如有患者以雞翎微濕沾藥末掃於小兒齒上立效王氏手集治小兒走馬疳口鼻生瘡牙齦腫爛諸藥不能治者槲葉十片乾者麝香少許上以蘆薈為末水調塗葉上炙乾又塗又炙凡塗炙數遍為末瘡濕乾摻安師傳走馬疳藥方此疳齒中不住血出多上用蠶蛻紙燒灰止血時間令住若用地骨皮中嫩處為末貼之便永止曾氏燒鹽散治走馬疳牙根肉潰爛黑臭橡斗子不拘多少上每用大者兩個入鹽滿殼蓋作一合或五六個至十數個安在火內和鹽燒透取出地上以瓦碗蓋定存性候冷入麝香少許乳鉢內極細杵勻每以半錢塗搽患處常收用小瓦合盛貯勿使紙裹蓋能作潤內金散治牙根肉臭爛黑色有蟲作痛雞內金即雞膈內粗皮陰乾一兩白芷銅青各半兩麝香一字上前三味銼曬或焙為末仍以麝香乳鉢內同杵勻每用一字或半錢乾擦患處先用溫鹽水灌漱後敷藥密陀僧散治走馬疳齒焦黑爛密陀僧一兩輕粉五十帖麝香一字上件為細末同輕粉麝香乳鉢內杵勻每用半錢擦患處走馬牙疳神效方乾薑白礬棗子燒焦存性為末敷患處尿桶中白焙乾為末入冰片少許揩牙立效上自水鑑方以下不犯砒為妥治走馬牙疳用溺桶中白垢火煆過每一錢入銅緑三分麝香一分半敷之立愈紅鉛散治走馬疳緑礬不以多少色鮮明者入乾鍋用炭火燒鍋赤傾出以好酒灑拌勻再入鍋如此數遍色紅研作細末入麝香少許先以溫漿水洗漱淨用指蘸藥有疳處貼之演山蘭香散治小兒走馬疳牙齒潰爛以至崩砂出血齒落者輕粉一錢重蘭香子一錢末密陀僧半兩醋淬為末上研如粉敷齒及齦上立效議曰嬰孩受病證候多端良由氣鬱三焦疳分五臟內有腎經常虛得疳名之曰急以馬走為喻治療頗難此等一證初作口氣名曰臭息次第齒黑名曰崩砂盛則齦爛名曰潰槽又盛血出名曰宣露重則齒自脫落名曰腐根其根既腐何由理之今將祕方具述於後敷齒立效散鴨嘴膽礬一錢匙上煆紅研麝香少許上研勻每以少許敷牙齒齦上又一方用蟾酥一字加麝和勻敷之議曰血之流行者榮也氣之循環者衛也變蒸足後飲食之間深恐有傷於榮衛而作衆疾其或氣傷於毒血傷於熱熱毒攻之虛臟所受何臟為虛蓋小兒腎之一臟常主虛不可令受熱毒攻及腎臟傷乎筋骨惟齒受骨之餘氣故先作疾名曰走馬非徐徐而作所宜服藥甘露飲地黃膏化毒丹消毒飲其外證以前件立效散及麝酥膏敷之切忌與食熱毒之物此疳不同常證乃系無辜有作醫宜深究保全為上若用常方難擬愈活獨活飲子治腎疳臭息候天麻木香獨活防風麝香少許為細末研和入上各二錢重為末每服一錢匕小者半錢麥門冬熟水調下三黃散治腎疳崩砂候牛黃大黃生地黃木香青黛上等分為末每服一錢匕熟水調服人參散治腎疳潰槽候肉豆蔻炮胡黃連人參杏仁炒甘草炙上件各等分為末每服一錢匕小者只半錢溫熟水調服檳榔散治腎疳宣露候木香檳榔人參黃連甘草炙上等分為末每服一錢小者半錢熟水調服黃耆散治腎疳腐根候黃耆蜜炙牛黃人參天麻全蠍炒杏仁炒白茯苓川當歸生地黃洗熟乾地黃洗上等分為末每服一錢小者半錢匕煎天門冬熟水調服麥門冬亦得地骨皮散治腎疳齦齶牙齒肉爛腐臭鮮血常出生乾地黃半兩真地骨皮細辛各一分五倍子炒令焦二錢重上件為細末每用少許敷之頻有功效吃不妨議曰本經所載疳證有五謂五臟所受故得其名今述腎疳一臟有五證候者最為要急不可同常此疾共陳有五種候敷迅疾可畏乃知走馬之號不誣初發之時兒孩口臭上干胃口氣息臭郁漸進損筋齦肉生瘡或腫或爛其齒焦黑又進從牙槽內發作瘡疱破潰膿爛又進熱逼筋脈時時血出其熱注久牙齦腐壞槽寬齒脫六七歲孩落盡不復更生豈可治療今以妙方宜速與傳變而理不待疾作而後藥也茅先生硃砂膏治小兒驚積驚熱硃砂半兩硼砂馬牙硝各三錢真珠末一錢玄明粉二錢並別研龍腦麝香各一字上件各為末於一處拌和合用好單角起不久其藥自成膏如小兒諸般驚用藥一黃豆大常用金銀薄荷湯少許化開下如遍身潮熱用甘草煎湯下狂躁惡叫用生地龍自然汁化下一臘及一月日內小兒不便下藥可用藥使乳調塗在奶上令牙兒吃奶吮下茅先生牛黃膏治小兒膈熱及諸熱鎮心解毒川鬱金半兩用皂角三寸巴豆七粒水一碗銚內煮乾不用皂角巴豆馬牙硝甘草炙各半兩硃砂一錢硼砂寒水石各一分龍腦麝香二味隨意入上件為末煉蜜為膏芡實大每服一丸麥門冬熟水化下天竺黃散治小兒諸熱天竺黃川鬱金用皂角水煮乾茯苓去皮麥門冬各半兩蟬蛻去足全蠍去土十四個白殭蠶各十四個甘草一兩炙硃砂一分龍腦麝香隨意所入上件各淨洗研羅為末每服半錢一錢用蜜熟水調下三解牛黃散治小兒潮熱實熱白殭蠶全蠍去土炙防風白附子川黃芩桔梗川大黃甘草炙白茯苓人參川鬱金用皂角水煮乾上前件各等分為末各淨洗細研每服半錢一錢用薄荷蜜熟水調下惠眼地黃膏天竺黃散一名金朱飲子二方並見初生門重舌條形證論檳榔散檳榔大黃蒸青皮各二錢五分黑牽牛一錢木香少許炮為細末薄荷蜜水調下一錢當歸散潮熱三稜散宿食蘆薈丸本門通治條玉露飲積熱口齒疳聖惠云其候唇口癢痛牙齒峭黑舌上生瘡腦中乾熱齦肉赤爛頰腫齒疼熱毒熏蒸口多臭氣按此即走馬疳之輕而慢者聖惠形容似太過治法宜清胃散甘露飲內服外用五倍子炒黑緑礬燒紅人中白等分入米片少許揩牙或加檳榔末殺蟲亦得談氏殊聖治小兒大人牙疳諸惡瘡方黃丹飛過乳香白礬飛坯子胭脂各一錢輕粉麝香少許上件為細末看瘡大人臨時用藥先用漿水洗瘡淨上藥乾摻聚寶方黃礬散治大人小兒齒齦宣露骨槽風小兒急疳齦肉爛惡腫痛黃礬一兩研入甘鍋燒通赤生乾地黃梧桐律川升麻各半兩干蝦蟆頭二枚炙焦上五味為末每用半錢干貼良久吐津甘草水漱口一兩服立效一方用熟乾地黃及蟾頭燒灰劉氏家傳方治小兒口中疳瘡皆下部有蟲燒大麻子煙燻之莊氏家傳治小兒牙疳壞爛方百藥煎坯子胭脂上各等分為細末羅過貼患處吳氏家傳青霞散治小兒口齒疳蝦蟆一個燒灰甘草炙青黛各一分上研為細末更入真麝少許或兒滿口有瘡臭爛落下牙齒者以雞翎掃上立效凡用先以鹽湯漱口了干拭用安師傳治小兒口齒並喉齶疳瘡如白膜者用輕粉黃丹等分乳汁和塗瘡上即時如殼退下治小兒疳蝕動唇齒及瘡生方蟾頭一個大者燒灰麝香半錢上研勻如粉摻於瘡上立效治小兒唇口及齒根宣露牙齦生瘡臭爛方葶藶炒胡黃連各二錢黃丹半兩上為末每半錢於牙齦上貼之不得咽津莊氏第十二候用此祕方治牙疳腐爛及下疳瘡海巴白者二個赤者一個銀硃輕粉各五分海螵蛸一分真珠二分龍骨二分共為細末用冷茶漱淨將藥敷上鼻疳聖惠夫肺氣通於鼻鼻者肺之候若小兒乳食不調上焦壅滯令疳蟲上蝕於鼻也其候鼻中赤癢壯熱多啼皮毛乾焦肌膚消瘦咳嗽上氣下痢無常鼻下連唇生瘡赤爛故曰鼻疳也治小兒鼻下赤爛心煩躁鼻中生瘡漸漸轉多及身上焦躁日夜疼痛急治之方訶子二個豆蔻三個黃連六分防風半兩硃砂一分上為末飯丸麻子大每服荊芥湯下三丸湯氏五福化毒丹治䘌鼻清膈涼血玄參桔梗去蘆各一兩赤茯苓人參馬牙硝青黛甘草各一分麝香五分一方有龍腦五分上除麝香牙硝另研一處為末次和青黛等煉蜜丸如芡實大金銀箔為衣薄荷湯化下瘡疹餘毒磨生犀角水下上焦熱壅口齒鮮血宣露臭氣用生地黃汁化下食後澤瀉散治小兒肺積鼻內生瘡及鼻下赤爛川澤瀉川鬱金生甘草炙山梔子仁炒各一分上為末每服嬰孩一字二三歲半錢五七歲一錢甘草湯調下一日二服宜再用青金散敷之枇杷葉散自制治鼻疳赤爛枇杷葉去毛陰乾一兩山梔子半兩百部檳榔各二錢半上為細末每服三錢兒小者二錢更小一錢白湯調下田氏治法先用甘草白礬湯洗淨後摻蘆薈黃連黃柏末日三敷一方用米泔洗黃連末敷日三四次亦佳青金散銅青白礬生各一錢上為末每用少許敷鼻下錢乙蘭香散蘭香葉菜名燒灰二錢銅青半錢輕粉二字上為細末令勻看瘡大小干貼之張渙石膽散治鼻疳病疳蟲上蝕於鼻赤癢及連唇生瘡赤爛石膽一兩地龍一分洗淨頭髮燒灰莨菪子生用各半兩上件搗羅為細末入麝香一錢同研勻每服一字貼於瘡上吉氏家傳治鼻下赤爛疳方青黛一錢麝香少許熊膽末半錢上末睡時貼少許在鼻下朱氏家傳治小兒鼻下濕癢疳瘡方上用大棗一枚去核以白礬一塊納棗中文武火煆存性細研塗瘡如瘡干以麻油調塗聖惠吹鼻蟬殼散治小兒鼻疳癢蟬殼微炒青黛細研蛇蛻皮灰滑石麝香細研各等分上件藥搗細羅為散都研令勻每用緑豆大吹入鼻中日三用之疳蟲盡出錢氏白粉散治諸瘡烏賊魚骨末三匕白芨末二匕輕粉一匕上末先用清漿水洗拭過貼之眼疳龍木論治小兒疳眼外障此眼初患時皆因腦頭上有瘡或因經日多時瀉痢潛沖疼痛淚出難開膈間伏熱氣肝風入眼初患此疳時癢澀揉眉咬甲致令翳生赤腫疼痛淚出難開瞼硬白睛遮瞞怕日合面臥不喜抬頭此疾不宜燒灸頭面恐損眼也切忌點藥宜服殺疳散退翳丸聖惠論夫肝開竅於目目者肝之候若小兒內有疳氣肌體瘦羸而臟腑挾於風熱壅滯不得宣通因其乳食過多胸膈痰結邪熱之氣上攻於目則令腦熱目癢或赤爛生瘡或生障翳漸漸遮睛久而不瘥損於眼目故號眼疳也玉訣云此患先與涼膈後瀉肝次淋洗之即無誤也又云此患小兒肝熱宜瀉肝散蕤仁膏涼膈退熱又云小兒疳眼雀目斑瘡入眼者先與利膈退熱涼心經後與疳藥也龍木論殺疳散防風龍腦牡蠣白芷細辛五味子各二兩上為末每服一錢食後粥飲調下退翳丸黑參防風各一兩細辛石決明車前子各半兩桔梗黃芩各一兩半上為末煉蜜為丸梧桐子大空心茶下十丸玉訣瀉肝散木賊威靈仙紫參家菊花羌活蟬蛻去足大黃生甘草炙石決明各等分腦子少許上為末每用藥二錢豶豬肝一兩批開去膜摻藥在內線纏米泔煮熟嚼下蕤仁膏蕤仁四十九粒去皮出油腦子少許上研成膏用燈心點少許靈苑羚羊角丸治肝肺壅熱眼生胬肉赤脈澀痛及赤眼障翳睛疼癢痛羞明及小兒風疳爍陽眼神妙羚羊角屑曬乾脆為末甘草生白何首烏瓦松以紗絹內洗去土各一兩生乾地黃洗鬱金炮過用地上去火氣各二兩上件六味並細銼曝乾搗羅為細末煉蜜為丸如梧桐大每服十五丸用濃煎淡竹葉黑豆湯冷下食後臨臥服小兒丸如緑豆大每服七丸至十丸談氏殊聖退雲散治小兒疳眼咨啀饒啼不住草決明土瓜根大黃炮玄參各半兩甘草炙宣連砱砱石井泉石是研各一分上細為散每服一錢水一盞同煎至七分五度與吃張渙井泉石散治眼疳邪熱攻於眼目漸生翳障致損睛瞳井泉石一兩晚蠶砂夜明砂各微炒石決明甘菊花黃連去須各半兩上件搗羅為細末每服一錢用米泔一盞入生豬肝少許煎五分肝爛為度放溫時時服乳食後胡氏家傳豬膽黃連丸治小兒疳瘦大治肝疳作眼疾白膜遮睛諸藥不痊者胡黃連雄黃細研夜明砂細研各等分豬膽數個麝香少許不入膽煮上為末以豬膽汁調藥稀稠得所卻入元膽皮內以線緊繫口米泔水煮五七沸取出放冷先以麝香於乳鉢內研細卻入藥一處同研不用膽皮只取出藥候細用軟飯為丸如大麻子大每服十丸大者加至十五丸米飲吞下如疳氣盛須用陳米飲下治小兒肝藏風熱眼中不見物及有汗方石決明乳香各一分龍膽二分大黃半兩煨上為末每服兩錢用薄荷溫水調下莊氏第十六候用此方疳濕巢氏云疳濕之病多因久利脾胃虛弱腸胃之間蟲動侵蝕五臟使人心煩懊悶其上蝕者則口鼻齒齦生瘡其下蝕者則肛門傷爛皆難治或因久利或因臟熱嗜眠或好食甘美之食並令蟲動致生此病也聖惠夫小兒嗜食甘味多而動腸胃間諸蟲致令侵蝕臟腑此猶是䘌也凡食五味之物皆入於胃其氣隨其腑臟之味而歸之脾與胃為表裡俱象土其味甘而甘味柔潤於脾胃脾胃潤則蟲動蟲動則侵蝕成疳也但蟲因甘而動故名之為疳也若蟲蝕下部則肛門生瘡爛開急者數日便死宜速療之夫小兒乳食不節冷熱相乖傷於臟腑致疳氣也若脾胃虛弱則哺乳不消大腸虛寒遂變泄痢因其久痢不止腸胃俱虛為水濕所乘腹內蟲動侵蝕下部故名疳痢濕䘌也千金除熱結腸丸斷小兒熱下黃赤汁沫及魚腦雜血肛中瘡爛坐䘌生蟲黃連柏皮苦參鬼臼獨活橘皮芍藥阿膠各半兩上八味末之以藍汁及蜜丸如小豆日服五丸至十丸冬無藍汁可用藍子一合舂蜜和丸姜蜜湯千金治濕䘌生薑汁五合白蜜三合黃連三兩上三味以水二升別煮黃連取一升去滓納薑蜜更煎取一升二合五歲兒平旦空腹服四合日二杏仁湯千金治䘌杏仁五十枚苦酒二升鹽一合上三味和煮取五合頓服之小兒以意量服治蟲蝕下部方胡粉雄黃上二味各等分末著穀道中亦治小兒張渙桃白散治腸胃俱虛腹內蟲動侵蝕下部疳痢濕䘌桃木白皮黃柏蜜炙銼黃連去須炒各一兩蛇蛻皮半兩燒灰干蝸牛一分燒灰青州棗五十枚去核燒灰上件同搗羅為細末入定粉麝香各一分同研勻每服一字粥飲調下乳食前如聖丹乾蟾七枚燒灰蟬殼半兩蚺蛇膽大棗去核燒灰各一分以上搗羅為細末次用黃丹定粉麝香並細研各一分上件同拌勻用好醋一大盞都搗一二百下成膏如黍米大每服五粒至七粒米飲下量兒大小加減或化三兩粒塗患處若蟲出乃愈錢乙金華散治小兒一切濕瘡癬疳黃柏黃連各半兩併為細末黃丹一兩火飛輕粉一錢麝香一字別研上同研勻先以溫水洗後貼之化䘌丸治諸疳生蟲不時啼哭嘔吐清水肚腹脹痛唇口紫黑腸頭濕䘌蕪荑蘆薈青黛干川芎白芷梢胡黃連川黃連蝦蟆灰各等分上為末豬膽汁浸糕糊丸麻子大每服一二十丸食後臨臥杏仁煎湯下其鼻常用熊膽煎湯筆蘸洗俟前藥各進數服卻用青黛當歸赤小豆瓜蒂地榆黃連蘆薈雄黃為末入鼻瘡斂疳瘡聖惠夫小兒疳瘡生於面鼻上不癢不痛常有汁出汁所流處隨即成瘡亦生身上小兒多患之亦是風濕搏於血氣所以不癢不痛故名疳瘡也錢乙論疳在外鼻下赤爛自揉鼻頭上有瘡不著痂漸繞耳生瘡治鼻瘡爛蘭香散諸瘡白粉散二方並見鼻疳條主之張渙四珍丹治諸疳羸瘦毛髮焦黃口鼻生瘡干大蟾一枚去四足掰開腹入胡黃連半兩在腹內以線縫合用濕紙三兩重裹以泥四面固濟用木炭火燒令通赤為度放冷去泥搗為細末蘆薈半兩研麝香一分研上件都拌勻再研令細以白麵糊和如黍米大每服五粒至七粒粥飲下量兒大小加減熊膽膏治疳瘡不瘥熊膽蚺蛇膽蘆薈各半兩黃礬一分瓜州者良以上搗羅為細末次用麝香牛黃各一分龍腦一錢並細研上件細研勻以井華水三合攪勻盛銀器中重湯煮成膏每用少許塗患處治小兒一切疳毒有瘡方苦楝皮五斤銼七姑葉半兩銼甘草白礬各二兩蔥白十莖上粗搗令勻用水五斗煮五七沸旋旋添洗瘡處如久患只兩服立效談氏殊聖治小兒疳肥瘡多生頭上浸淫久不瘥及耳瘡等悉皆治之石緑白芷各等分上以生甘草水洗瘡敷藥自愈通治一切疳方銅壁山人曰凡治疳不必細分五疳但虛則補之熱則清之冷則溫之吐則治吐利則治利積則治積蟲則治蟲不出集聖丸一方加減用之屢試屢驗集聖丸蘆薈五靈脂夜明砂炒砂仁橘紅木香莪朮煨使君子肉各二錢川連川芎乾蟾炙各三錢當歸青皮各一錢半因於虛者加人參二錢白朮三錢去莪朮青皮因於熱者加龍膽草三錢去砂仁莪朮因於吐瀉下痢者加白朮二錢肉果煨訶肉各一錢五分去青皮莪朮因於積痛者加煨三稜川楝子肉小蘹香各二錢去當歸川芎因於瘧者加鱉甲醋炙三錢因於蟲者加白蕪荑一錢五分川楝子肉二錢去當歸川芎因於渴者加人參白朮各二錢去莪朮砂仁上為細末用雄豬膽汁二個和麵糊為丸看大小服米飲送下此方乃十全丹去檳榔白豆仁加黃連夜明砂砂仁不熱不寒補不致滯消不致耗至穩至妥疳積散治鬾乳病乳夾乳夾食大病之後飲食失調平居飲食過飽傷脾致成疳積面黃腹大小便色如米泔大便瀉黃酸臭頭皮乾枯毛髮焦穗甚至目澀羞明睛生雲翳形體骨立夜熱晝涼丁奚哺露等證並用主之厚朴厚而紫色有油者佳去粗皮切片生薑自然汁炒熟為末淨一兩廣陳皮去白為末八錢粉甘草去皮淨為末真蘆薈淨末各七錢蕪荑真孔林大而多白衣者佳去白衣殼淨末五錢青黛取顏料鋪中浮碎如佛頭青色者研淨末三錢百草霜乃山莊人家鍋底墨也淨末二錢旋覆花淨末一錢半上件勻和成劑用每一歲用藥一分用燈心湯早上空腹時調服服後病即愈當再用肥兒丸調理如脾氣未實用啓脾丸或大健脾丸如疳氣未盡用陳皮一兩白朮香三錢白茯苓五錢加好平胃散三錢陳米粥湯調服疳眼方用生雞肝一具不拘大小雄雌二三歲者只用半具外去衣內去筋膜研細如面入疳積散若干調極勻加好熟白酒厚薄相和隔湯頓溫熱空心通口服用甜麴酒少加熟白酒亦佳服至眼開翳散方止疳瀉痢紅白積滯用散子加黃連薑汁土炒肉果用濃燈心湯稍加熟蜜少許調服食積成疳砂仁湯調服集驗方治小兒疳氣不可療神效丹緑礬用火煆通赤取出用釅醋淬過復煆如此三次上細研用棗肉和丸如緑豆大溫水下日進二三服元和紀用經麝香丸主小兒疳瘦面黃發穗骨立減食肌熱驚癇疳蟲麝香研蘆薈研胡黃連末上等分研勻滴水丸黃米大一歲三丸三歲五丸至七丸人參湯下日三服無比奇效一方胡黃連四分餘二物各二分療疳痢溫瘧無比尤驗一名聖丸疳藥百數無如此者小兒癲癇驚風五疳三蟲服之立見功效蛔蟲作疾枯瘁久痢不住熱藥調護最難得法唯此若神經以四味飲黑散紫丸至聖散五加皮治不能行蜀脂飲並此麝香丸七方謂之育嬰七寶紫陽道士亦名保子七聖至寶方專為一書者此是也靈苑千金丸治小兒一切疳久服令兒肥壯無疾川楝子肉川芎各等分上同為末豬膽汁和杵為丸如麻子大量兒大小加減丸數每以飯飲吞下日二服常服三丸至五丸張氏家傳丸如緑豆大分五分用硃砂青黛白定粉光墨密陀僧名為五色丸非時進米飲下孔氏家傳治疳熱下蟲方同用臘月干豬膽膏為丸如干湯化動丸緑豆大十丸十五丸肉湯下疳蟲如發便看即見稍遲即化太醫局蘆薈丸治疳氣羸瘦面色痿黃腹脅脹滿頭髮作穗揉鼻咬甲好吃泥土痢色無定寒熱往來目澀口臭齒齦爛黑常服長肌退黃殺疳蟲進乳食干蝦蟆大皂角以上二味等分同燒存性為末每末一兩入後藥青黛二錢半研蘆薈研麝香研硃砂飛研各一錢上合研勻湯浸蒸餅為丸如麻子大三歲兒服二十丸不計時候溫米飲下量兒大小加減錢氏膽礬丸治疳消癖進食止瀉和胃遣蟲膽礬真者一錢為粗末緑礬真者二兩大棗十四個去核好醋一升以上四物同熬令棗爛和後藥使君子二兩去殼枳實去穰炒三兩黃連訶梨勒去核各一兩併為粗末巴豆二七枚去皮破之以上五物同炒令黑約三分干入後藥夜明砂一兩蝦蟆灰存五分性一兩苦楝根皮末半兩以上三物再同炒候乾同前四物杵羅為末卻同前膏和入臼中杵千下如未成更旋入熟棗肉亦不可多恐服之難化太稠即入溫水可丸即丸如緑豆大每服二三十丸米飲溫水下不拘時蝦蟆丸西京丁左藏肥孩兒常服得效干蝦蟆大者一枚泔浸三宿去腸肚頭爪淨洗酥炙令黃香陳皮去白二錢半胡黃連一兩鬱金蕪荑仁各半兩上為末於陶器內用豶豬膽汁和令稀稠得作於飯上蒸熟為度取出半日丸如緑豆大常服五七丸陳米飲下張氏神麯散治小兒諸般疳神麯陳橘皮不去白大黃紙裹炮熟芍藥各一錢二分半桔梗川芎厚朴薑汁製枳殼去穰麩炒白茯苓各二錢半人參一錢半甘草五錢炙上為細末每服一錢入姜一片如茶法煎服無時治小兒一切疳肌膚消瘦瀉痢不止口鼻生瘡水穀不化方蝦蟆灰存性白礬烏賊魚骨炙密陀僧各二錢半麝香一錢二分半上為末煉蜜丸如緑豆大溫水下三丸聖惠方同但麝香用半兩莊氏第五候用此方治小兒一切疳方莊氏第十四候用此方蟾頭一個炙膩粉豆豉蕪荑黃連各二錢半上為末軟粟米飯為丸麻子大早晚米飲下三丸又方莊氏第十七候用此方及香連丸蘆薈胡黃連硃砂青黛麝香各二錢半蟾酥少許上為末飯為丸如芥子大每服空心臨臥溫熟水下五七丸洪州張道人傳治小兒一十二種疳肝疳急疳風疳肉疳脊疳口疳腦疳食疳蛔疳脾疳腎疳心疳定生死有此候者取得蟲青者死黃者可治須服定命丹木香夜明砂麝香各一分蟬蛻三分胡黃連二錢金箔銀箔各五片上件為末米飯丸如麻子大空心米飲下三丸日三服忌鹹酸油膩第一肝疳小兒雖飲乳漸喜食肉尤愛酸鹹只服定命丹次服此藥肉豆蔻三個枳殼炒七錢半茯苓胡黃連各半兩大黃甘草丁香麝香各二錢上為末每服一字米飲下日兩服久者五服效演山使君檳榔丸治小兒食肉太早傷及脾胃水穀不分積滯不化疾作疳痢等候並宜服之肉豆蔻一個生檳榔一個宣連胡黃連陳皮青皮川楝肉炒蕪荑炒去皮神麯麥糵並炒木香夜明砂淘淨炒蘆薈川芎各一錢麝一字上件為末豶豬膽汁薄荷為丸如麻子大每服三五十丸溫飯飲下議曰積是疳之母所以有積不治乃成疳候又有治積不下其積存而臟虛成疳尤重大抵小兒所患疳證泄瀉無時不作風候者何惟疳瀉名熱瀉其臟腑轉動有限所以不成風候雖瀉不風亦轉它證作渴虛熱煩躁下痢腫滿喘急皆疳候虛證古云疳虛用補虛是知疳之為疾不可更利動臟腑發作之初名曰疳氣腹大脹急名曰疳虛瀉痢頻並名曰疳積五心虛煩名曰疳熱毛焦發穗肚大青筋好吃異物名曰疳極受病傳臟已極熱發往來形體枯槁面無神采無血色名曰疳勞手足細小項長骨露尻臀無肉肚脹臍突名曰丁奚食加嘔噦頭骨分開作渴引飲蟲從口出名曰哺露此皆疳候又因多食生冷甘肥黏膩積滯中脘不化久亦成疳治疳之法量候輕重理其臟腑和其中脘順其三焦使胃氣溫而納食益脾元壯以消化則臟腑自然調貼令氣脈與血脈相參則筋力與骨力俱健神清氣爽疳消蟲化漸次安愈若以藥攻之五臟疏卻腸胃下去積毒取出蟲子雖曰醫療即非治法蓋小兒臟腑虛則生蟲虛則積滯虛則疳羸虛則脹滿何可利下若更轉動腸胃致虛由虛成疳疳虛證候乃作無辜無辜之孩難救矣胡黃連丸治嬰兒一切疳候及一切虛痢他藥無功此藥極效胡黃連蘆薈草黃連肉豆蔻炮桂心人參硃砂使君子去殼木香釣藤龍齒白茯苓以上各一錢麝香一字研上件各生用為細末取豶豬膽二枚裂汁和末令勻卻入袋內盛之用線扎定湯煮半日取出切破袋子加莨菪子二錢黃丹一錢二味另研如粉入前藥和勻搗五百杵丸如緑豆大但是疳與痢用粥飲下五七丸子幼者三丸不吃粥飲乳頭令吮能治一十二種痢及無辜者功效非常議曰疳之疾危發由於漸痢之後逆傳自於延延久為逆初見其輕言之曰常後知其重告之無門是以痢疳皆由積毒嬌恣口腹因虛以致虛因害而傷害醫工見有此等自是憂疑病家欲得便蘇豈無性急更遷取活展轉逾深或疳極而腹下痢或熱盛而加作渴或煩躁四體虛浮或飲食一時嘔吐常方不能安愈快劑恐越傷和並宜服此肥肌丸治小兒一切疳氣肌瘦體弱神困力乏常服殺蟲消疳開胃進食黃連去須川楝肉炒川芎各半兩陳皮香附子各二錢半酒煮炒乾木香二錢上件為末水煮細麵糊為丸如麻子大每服三五十丸溫飯飲下議曰驚疳積痢各分證候用藥今有小兒患疳虛困又作痢疾二候相加最為惡重疳痢並行臟腑虛乏之極熱毒差重皆系積之久滯雖曰系積無積可療乃虛受之然謂其虛補之不及所見其證不得良方以何對治雖獲其方不審其候亦難療也良由脈與病同藥與證對醫工運巧扶而起之必得安樂胡黃連丸無以加矣肥肌良方亦佐勝焉疳熱漢東王先生論小兒發熱形瘦多渴吃食不長肌肉者謂之疳熱湯氏云疳熱當服進食丸方見癖磨積仍間服化蟲丸後服鱉甲散退熱次服肥兒丸疳瘦湯氏鱉甲散治疳勞骨熱鱉甲九肋者湯浸用童便塗炙黃耆蜜炙白芍藥各一兩生熟地黃地骨皮當歸人參去蘆各半兩上㕮咀每服二錢水半盞煎服化蟲丸治疳熱白蕪荑黃連神麯麥芽各炒等分上末糊丸如黍米大空心米飲下豬膽汁尤佳豬肚丸治骨蒸疳勞肌體黃瘦木香半兩黃連生地黃鱉甲九肋者湯浸用童便塗炙銀柴胡去蘆青皮各一兩上為末豬肚一枚入藥於內以線纏之於砂罐內懸胎煮熟取出細研豬肚為丸如麻子大米飲送下量大小加減不拘時服龍膽丸三因治疳病發熱龍膽草黃連使君子肉青皮各等分上為末豬膽汁和丸如桐子大每服三十丸臨臥熟水下量兒加減世烏犀丸治小兒疳熱腹內生蟲肚大手足疲弱丁奚尫羸此方治疳熱如神黑牽牛二兩使君子肉七錢半青皮二兩雷丸二錢半苦楝皮一方不用楝皮用蘆薈二錢半鶴蝨各半兩上同入鍋內炒焦為末麵糊丸黍米大三歲兒二十丸米飲下食前二丁丸治乳癖食癖疳熱白丁香半兩丁香密陀僧各一兩韶粉一錢硫黃三錢上為細末糊丸如小豆大三歲兒十丸日晡時米飲下飲乳者乳汁下次日當取下惡物熱即隨退加黃鶯屎一錢尤妙談氏殊聖金瓜丸治小兒疳熱身多壯熱黃瘦久服令肥黃連黃柏甘草微炮青皮各等分上為末入麝香少許用豶豬膽一枚入藥膽內線扎定入石器中漿水煮五七沸取出風吊一宿丸如緑豆大每服五七丸米飲下量兒加減玉訣方同外以硃砂為衣仍治脾疳博濟方同劉氏家傳方亦同云或添胡黃連若早晨服使君子丸晚服金瓜丸永無疾消食長肌肉莊氏家傳方同仍加夜明砂一味等分趙氏方亦同名涼疳藥長沙朱司理以為有神效蘆薈丸治小兒驚熱疳不思食蘆薈熊膽硃砂各二錢半青黛七錢半訶梨勒煨取肉三錢麝香一錢上為末糯米飯為丸如麻子大空心隨歲數與之用沙糖水咽下五七丸茅先生柴胡散治小兒疳熱四肢如柴不能起止柴胡知母貝母去心茯苓茯神乾葛甘草炙各等分上為末每服用小麥一匙頭藥一匙頭水一盞同煎六分去滓服六物黃芩湯治少小腹大短氣熱有進退食不安穀為之不化黃芩大青甘草炙麥門冬去心石膏碎各半兩桂皮三錢上每服三錢水一盞煎至七分去滓溫服莊氏青黛丸治疳熱青黛研一兩胡黃連宣連天竺黃研各半兩硃砂水飛二錢半麝香研一錢肉豆蔻二個牛黃半錢研乾蟾一枚端午日取者酒浸洗去腸肚塗酥炙黃上件除研藥外為末再同研勻緑豆粉煮糊丸如芥子大每服空心夜後熟水下三丸恐緑豆粉難和丸緑豆麵作糊亦得王氏使君子散治疳熱上用使君子不以多少曝乾為末空心米飲下大者一錢小者半錢取蟲出為度豬肚黃連丸直指治疳熱流注遍身瘡蝕或潮熱肚脹或渴用雄豬肚淨洗一具宣連淨五兩銼細水和潤納肚中線縫放五升粳米上蒸至爛入臼中加少蒸飯搗千杵丸小桐子大每服二十丸米飲下仍服調血清心之劑佐之凡兒病不出於疳則出於熱熱則生痰常須識此柴胡飲治骨蒸疳氣五心煩熱日晡轉盛口乾無味渴多身瘦胸滿痰緊小便黃色食減神昏北柴胡去蘆淨洗人參去蘆當歸酒洗黃芩赤芍藥甘草炙各一兩大黃生用桔梗去蘆銼炒北五味子去梗半夏湯煮透去滑各半兩上銼每服二錢水一盞烏梅一亞姜二片煎七分無時溫服疳勞即疳熱而骨蒸兼諸咳嗽盜汗等證是也湯氏鱉甲散豬肚丸皆對證之藥乾地黃煎顱囟治小兒疳勞肺氣熱咳嗽四肢漸瘦心脈干生地黃汁五兩酥生薑汁蜜各一兩鹿角膠半兩上先以地黃汁入鐺內慢火煎手不住攪約五六沸下酥又五六沸下蜜次下膠又下薑汁慢火煎後如稀餳即住火每食後兩度共與一匙頭忌諸毒物王先生雞肉煎丸治小兒十歲以上疳勞壯熱形瘦宣連去須二兩銀柴胡去蘆洗淨秦艽去土淨知母使君子肉子芩各一兩蕪荑去衣川鶴蝨各半兩上為末以黃雌雞一隻重一斤許籠之專以大麻子飼之至五日後宰去毛令淨於臀後開孔去腸肚淨洗拭乾入前藥末於雞腹內以線縫之取小甑先以黑豆鋪甑底厚三寸安雞在甑中四傍以黑豆圍裹上亦以黑豆蓋之自日出蒸至晚候溫冷取雞去腹中藥及筋骨頭翅以淨肉研勻和得所如干入酒麵糊為丸如大麻子及小緑豆大每服十丸十五二十丸以意加減空心臨臥麥門冬熟水吞下如小兒疳勞骨熱十五歲以上溫酒下忌豬肉張氏三和飲子治三焦膈塞五臟澀滯氣逆痰涎米食後惡涎太陽昏痛及治山嵐瘴氣吐逆不美飲食面色浮黃指甲青黑小兒疳勞吐乳及大人小兒久病乍安神氣未復寒熱往來並皆救療紫團人參三兩半洗銼甘草一兩半炙銼綿黃耆五兩酒浸一宿洗淨銼上件三味同入木臼內用木杵搗為粗散每服三大錢生薑三片水二盞棗三枚同煎八分去滓服不拘時候犀角散治小兒骨熱解毒銀州柴胡川大黃甘草炙川芎茯苓芍藥面葛桑白皮地骨皮山梔子仁黃芩貝母各半兩上為末每服一大錢水一盞入青蒿一枝小麥十粒煎七分溫溫服之大段有患更入麻黃連翹二味與前藥等分為末煎服之效莊氏第二十一候用此方鱉血煎治疳勞蕪荑柴胡川芎各一兩人參半兩使君子二十一枚去殼胡黃連宣黃連各七錢上用鱉血一盞吳茱萸一兩和二黃連淹一宿次早炒乾去茱萸並血用二連入余藥末粟米粉糊丸麻子大食前熟水下黃連丸治疳勞黃連半兩淨豶膽汁浸曬石蓮子栝蔞根杏仁湯浸去皮焙烏梅肉各二錢上為末牛膽汁浸糕糊丸麻子大煎烏梅姜蜜湯下疳渴聖惠天竺黃散治小兒疳多渴體熱煩躁少得睡臥天竺黃細研黃連去須馬牙硝梔子仁葛根銼各半兩甘草炙微赤銼牛黃細研款冬花紫菀洗去苗土犀角屑土瓜根各二錢半上件藥搗細羅為散都研令勻不計時候以蜜水調下半錢量兒大小加減服之治小兒疳熱煩渴不止方乾蟾頭二枚塗酥炙焦黃蝸牛殼微炒胡黃連栝蔞根各半兩上件藥搗細羅為散每服以竹葉湯調下半錢不計時候量兒大小臨時加減服之五膽丸聖惠治小兒渴疳豬膽狗膽牛膽鯽魚膽蝟膽以上各一枚上件藥四膽汁併入牛膽內在灶北後懸候稍干可丸即丸如黍米大每服以新汲水下二丸以飲水足為度空心午後各一服更量兒大小加減胡黃連散治小兒疳熱渴乾瘦胡黃連犀角屑各二錢半生地黃汁一合羊子肝一具研取汁麝香半錢細研蜜半合上件藥搗胡黃連犀角細羅為散入麝香研勻以羊肝汁地黃汁蜜等調令勻每服煎竹葉湯調下藥汁一茶匙量兒大小加減服之黃連丸治小兒疳熱煩渴黃連去須天竺黃牛黃各細研甘草炙微赤銼梔子仁款冬花葛根銼紫菀洗去苗犀角屑各二錢半川朴硝半兩竹瀝二合上件藥搗羅為末先用竹瀝拌和更入熟蜜和丸如緑豆大每服以新汲水研破五丸服之日四五服量兒大小加減聖惠又方上用蝸牛三五十枚淨盤內以物蓋令行即有似銀泥處以膩粉和揩取便丸之如黍米大不計時候以溫湯下二丸又方杏仁湯浸去皮尖雙仁二錢半膩粉一錢上件藥研杏仁如膏入膩粉相和令勻用麵糊和丸緑豆大空心以粥飲下三丸錢乙龍粉丸治疳渴草龍膽定粉微炒烏梅肉焙稱黃連各二分上為細末煉蜜丸麻子大米飲下一二十丸無時青香丸張氏治小兒疳渴引飲不休肌體羸劣胡黃連青黛硃砂鶴蝨各等分上為末豶豬膽汁和丸緑豆大每服三丸米飲下劉氏治小兒疳渴方豬胞一個大者甘草一兩寸斷劈破入胞內上以水一斗煮至三升去甘草將胞焙乾末之每服二錢或三錢熟水調下大人亦可服莊氏治小兒渴疳方上用蛤粉取生大鮎魚一尾以粉塗頂上刮下涎入粉同研丸雞頭大每服一丸更用活小鮎魚一尾水半盞浸涎水一藥注子化下一丸立止便與和氣散方見前一二服補之又方治疳渴不止井泉石又名石甘遂太陰玄精石馬牙硝上各等分為末入生硫黃少許每服半錢以生米泔水調下吉氏家傳方乾葛胡黃連甘草炙黑參麥門冬去心各等分上件為末每服一錢水半盞姜一片煎四分服治小兒疳渴常服五疳不生方干蝦蟆二枚長流水內刮去肚腸以法酒三升瓶內煮令爛去骨研如粉黃連淨四兩別為末硃砂一錢半麝香一錢研上先將蝦蟆膏與黃連末同研後更與麝香硃砂等研勻作丸如緑豆大每服十丸陳米飲下如患疳用黃蠟茶清下如難丸入些少酒麵糊不妨治小兒一切疳熱渴方蚧蝦蟆大者兩枚蝸牛蟲半升用井水淘洗淨為度然後用新瓦罐子一具入二物在內用鹽泥固濟了不得透風更進火燒令通赤候冷取出二物不用罐子大黃黃連各半兩麝香二錢半上為末麵糊丸如芥子大每服三丸至五丸米飲下莊氏第十六候用此方治小兒疳渴方人參乾葛黃芩柴胡甘草炮各二錢半上為末每服一錢水一盞煎五分去滓候冷分為五服每吃藥時更點鉛白霜寒水石共研一字服之方治疳莊氏第二十候先用此止渴疳嗽惠眼防己丸治疳嗽不止漢防己牽牛子馬兜鈴炒甜葶藶別研各等分上為末煮棗肉為丸如緑豆大每服十丸煎糯米飲下與溫肺散相間服溫肺散栝蔞根半兩甘草炙二錢半上為末每服一錢蜂蜜熟水調下小兒肺疳多是吃著熱米食及病奶傷損心肺便生喘嗽愚醫不辨冷熱以藥攻之變成黃腫漸覺昏沉宜服杏仁散杏仁十四粒甘草款冬花各二錢麝香胡黃連各一錢半夏湯泡九次半兩上件為末每服一字棗湯調下日進二服疳積茅其候面帶青黃色身瘦肚膨脹頭髮立身熱肚中微痛此因疳盛而傳為此候治之先用勻氣散醒脾散二方並見不乳食調理二日後下青金丹癖取下疳積再下勻氣醒脾散補常服保童丸一切疳即愈玉訣云疳氣腹脹潮熱先與調胃氣後與取虛積藥次服疳藥錢乙牛黃丸治小兒疳積雄黃研水飛天竺黃各二錢牽牛末一錢上同再研麵糊為丸粟米大每服三丸至五丸食後薄荷湯下兼治疳消積常服尤佳大者加丸數張渙褐丸子治小兒疳氣腹脹如鼓及奶癖食癖蘿蔔子一兩半炒黑牽牛一兩炒胡椒二錢半木香莪朮濕紙裹煨切作片子各半兩上為細末麵糊為丸黍米大每服二十丸煎仙人骨湯下換骨丹陳粟米一合陳橘皮銼青皮銼黑牽牛各半兩巴豆去殼二錢半上件一處同炒令焦黃色揀去巴豆不用卻入木香半兩為細末麵糊為丸黍米大每服十丸橘皮湯下莊氏參苓散治小兒因積成疳久致脾胃虛弱不思飲食人參茯苓川芎各一兩甘草芍藥黃耆各半兩青皮去白二錢半上為細末每服一錢水一小盞煎至五分去滓溫服香甲丸治小兒積疳潮熱盜汗羸瘦煩渴手足心熱服之皆效輕骨長肌蔡夢祥家壽翁苦黃瘦不食多汗喜叫哭服之效木香二錢半鱉甲去裙襴醋炙檳榔使君子肉柴胡去蘆黃連去須各半兩上為末豶豬膽汁和丸緑豆大每服二十丸日中臨臥米飲下久發潮熱多汗無力者服之即效趙氏青蒿丸療小兒久積疳氣日漸羸瘦面黃頭髮作穗好食土咬指甲捻鼻兼治骨蒸勞熱及取疳蟲退諸藏積熱小兒常服遍身香為效白檳榔一枚白蕪荑四十九個黃連去須十四莖夜明砂淘淨二錢半以上為末太陰玄精石麝香小蔥子炒硃砂各半錢蘆薈天竺黃青黛各一錢上將後七味同研細與前四味一處再研勻令極細取青蒿自然汁慢火熬濃仍用豶豬膽一枚取汁同搜藥丸如粟米大每服五丸至七丸並用米飲下釅醋湯亦得取疳蟲煎醋石榴湯下二十服取盡蟲吉氏治五疳傷積方蕪荑黃連各一兩神麯半兩使君子連殼十四個鶴蝨少許末之豬膽調麵糊為丸緑豆大每服十丸米飲下青金膏治疳積青黛硃砂蘆薈蟾酥各一錢麝香半錢蜣螂一枚蛇皮項後四寸上為末水化酥丸如粟米大每服兩丸倒流水送下又水化一丸注於鼻中須臾眉上白蟲出便安青難治豆蔻散治疳積或冷利腹大腳小身熱面無顏色肉豆蔻二個胡黃連一錢使君子四枚青黛楝根蕪荑厚朴薑汁炙甘草炙各半兩麝香少許夜明砂一錢半別研上末每服一錢或半錢蜜水或粥飲調下知母散治諸般疳積肚脹無時瀉痢或時壯熱狀如瘧疾大效知母青皮去白焙乾稱柴胡各二錢甘草炙紫參各三錢訶子煨熟用肉三枚上為細末每服一錢水五分煎至三分溫服有熱則退有痢則除有結則通正傳經驗檳榔丸治小兒疳病積氣成塊腹大有蟲等證其效如神檳榔一兩三稜燎去毛切醋炒蓬莪朮醋炒青皮去穰麩炒黃色陳皮去白雷丸乾漆炒煙盡麥糵面炒神麯炒黃色山楂肉各半兩鶴蝨略炒木香不見火甘草炙胡黃連各三錢蕪荑水洗淨二錢半良薑陳壁土炒二錢砂仁一錢上為細末醋糊為丸如緑豆大每服三五十丸空心淡薑湯下疳瀉茅先用青金丹癖取下疳積後用勻氣散不乳食香連散乳香散瀉調理瀉止服常服保童丸一切疳石壁經云疳瀉因不慎飲食或食交乳致然腹中有片子或如雞子又如三二指大所以作瀉糞出如糟毛髮硬面無光或青黃色目多仄視當分水穀乃須溫和藥和氣即愈若藥熱則作腫而死婁瀉而多食為蟲疳宜殺蟲藥瀉而少食為冷疳宜溫藥仙人水鑑粉霜丸治小兒疳一切瀉方粉霜白丁香各一錢巴豆二枚不出油上為末爛飯為丸如小緑豆大每服井華水下二丸錢乙二聖丸治小兒臟腑或好或瀉久不愈羸瘦成疳宜常服此方川黃連去須黃柏去粗皮各一兩上為細末將藥末入豬膽內湯煮熟丸如緑豆大每服二三十丸米飲下量兒大小加減頻服無時劉氏胡黃連飲子治小兒疳熱作瀉無時飲食進退面黃體黑日漸瘦悴胡黃連黃藥子人參甘草炙白朮微炒秦艽柴胡各等分上各味用淨㕮咀每服二錢匕水一盞嫩桃柳枝各七寸烏梅少許同煎八分去滓澄清分作兩分早食後少空一服臨臥再服以小便深赤為驗候小便清住藥便生肌膚能進食飲大抵小兒羸瘦並宜服此十五歲以下皆可服莊氏黃連丸治疳瀉疳痢黃連削淨洗干碾為末大蕪荑仁乳鉢研細各等分上二末一處和勻糯粟米相和煮稀粥為丸小緑豆大量兒大小三歲七丸至十丸三歲以上十五丸至二十丸空心陳米飲下日進三服錢乙如聖丸治冷熱疳瀉胡黃連白蕪荑去扇炒川黃連各二兩使君子一兩去殼稱麝香別研半錢干蝦蟆五枚銼酒熬膏上前藥為末用膏丸麻子大每服人參湯下二參歲者五七丸以上者十丸至十五丸無時博濟方胡黃連丸治小兒疳疾瀉痢胡黃連丁香密陀僧各半兩肉豆蔻一個檳榔一枚紅雪一兩訶子二枚以一枚煨一枚生用上件七味同研細入麝香二錢半和勻次入緑豆末少許同水和為丸如麻子大兒三歲以下一丸三歲以上五丸孩子腦疳鼻癢及赤爛黃連湯下脾虛羸瘦泄痢四肢虛腫青州棗湯下肝疳眼澀生瘡甘草湯下骨疳冷地臥愛食土紫蘇茶湯下常服米飲下肺疳上氣急喘橘皮湯下筋疳瀉血鹽湯下疳蟲及瀉無定生薑湯下香蔻丸治疳瀉黃連炒三錢肉豆蔻木香訶子肉煨砂仁茯苓各一錢上為末飯為丸麻子大米飲下錢氏木香丸治時時下利唇口青白木香青黛另研檳榔肉豆蔻去皮各二錢半麝香另研一錢半續隨子一兩半炒蝦蟆三個先用繩系曬乾燒存性上為末蜜丸如緑豆大每服三五丸至一二十丸薄荷湯下食前沒石子丸錢氏治泄瀉白濁及疳痢滑兒腹痛者木香黃連各二錢半沒石子一個豆蔻仁二個訶子肉三個上為細末飯和丸麻子大米飲下食前量兒加減聚寶方黃龍丸定小兒疳冷瀉硃砂研一錢龍腦半字研硫黃一兩雄黃二錢半上用甘鍋子一隻盛雄黃在內用盞一隻盛水半盞坐在鍋子上炭火燒甘鍋其藥飛在盞底上刮下與硃砂硫黃同研入腦子糯米粥丸如黃米大每服三丸食前椒湯下吉氏蘆薈丸治疳瀉不止不思飲食腹脹丁香肉豆蔻去皮木香銼各半兩上三味用麵裹慢火中煨熟為度取出去面入蘆薈一兩使君子肉半兩同為細末稀糊為丸如黍米大每服十丸至二十丸米飲下湯氏治休息痢及疳瀉痢遷延日月百藥俱試飲食不妨便利不止用雞子一枚打破熔黃蠟一塊如指大以雞子和炒空心吃盡百醫百效無不獲安本事方治小兒疳痢垂死者取益母草炙食之取足瘥止甚佳錢氏大蘆薈丸本門通治胡連麝香丸榆仁丸並見本門出蟲良方吳婆散治小兒疳瀉不止日夜不計遍數漸漸羸瘦桃根白皮黃柏蜜炙蕪荑去皮黃連微炒以上各二錢半厚朴薑汁炙木香檳榔丁香各一錢沒石子一錢半楝根白根一錢二分半上為末每服一字三歲以上半錢五六歲一錢用紫蘇木瓜米飲調下乳食前一日三服豫家小兒曾有患瀉百餘日瘦余皮骨萬方不瘥有監兵鍾離君見之曰何不服吳婆散立可瘥也乃求方合與兩三服便效又孫男亦疳瀉勢甚危困兩服遂定若病深者服一兩日間決瘥此藥若是疳瀉無不驗者藥性小溫暴熱瀉者或不相當丹溪治一富家子年十四歲面黃善啖易飢非肉不飽泄瀉一月來求治脈之兩手皆大怪不甚瘦倦以為濕熱當脾困而食少今反形健而多食且不渴豫意其疾必疳蟲作痢也取大便視之果蛔蟲所為適往他處有一小兒醫在側教其用治蟲藥治之禁其勿用去積藥約回途當為一看診而止痢也偶勿果至次年春夏之交其瀉復作腹不痛而口乾豫曰此去年治蟲而不治疳故也遂以去疳熱之藥濃煎白朮湯下三日而瀉止半月後偶過其家見其子甚瘦豫教以白朮為君芍藥為臣川芎陳皮黃連胡黃連入少蘆薈為丸白朮湯服之半月而止禁其勿食肉物三年當自愈斗門經治小兒疳瀉方上用赤石脂杵羅為末極細如面以粥飲調半錢服立瘥或以京芎等分同服更妙莊氏家傳治疳瀉久不瘥方赤石脂緑礬石灰各二兩硫黃半兩上研勻入罐子內燒令焰碧去火放冷取研每服一字或半錢煎小黃米飲放冷調下食前服又方使君子炮五倍子瓦上炒黃沒石子各等分上為末每服半錢陳米飲調下疳痢宮氣方解小兒疳熱疳痢殺蟲用青黛不以多少水研服外臺治疳痢曉夜無度者取樗根濃汁及粟米泔各一雞子殼許以竹筒吹入下部再度瘥治疳痢大孔開利不止以黃連末入麝香少許和勻以竹筒吹入圖經治疳痢以地榆單煮汁如飴糖與服便已孟詵療小兒疳痢方上用樗木根取白皮一握倉粳米五十粒蔥白一握甘草二寸炙豉二合以水一升煮取半升頓服之小兒以意服之枝葉與皮功用皆同聖惠治小兒疳痢不止下部癢青黛散青黛蟾灰胡粉微炒黃連去須微炒麝香細研各二錢半赤石脂半兩訶梨勒皮一兩微煨上件藥搗羅為散每服以乳汁調下半錢日三四服量兒大小加減殺疳丸治疳痢不止雄黃麝香牛黃蘆薈硃砂各細研龍骨燒令赤色密陀僧燒紅細研胡黃連各二錢半青黛半兩細研金箔十片細研肉豆蔻二枚去殼蟾酥一錢二分半熱水化如泥上件藥搗羅為末入研藥及蟾酥研令勻湯浸蒸餅和丸如黃米大每以溫水下三丸煎黃連苦參湯洗身上用青衣蓋出蟲便瘥白龍骨丸治疳痢不止白龍骨白石脂雞尿礬燒令汁盡黃連去須微炒胡粉微炒白茯苓阿膠搗碎炒令黃燥各半兩上搗羅為末煉蜜和丸如麻子大每服以粥飲下五丸日三四服量兒大小加減肉豆蔻丸治小兒疳痢不吃乳食四肢瘦弱肉豆蔻去殼一枚木香半兩人參去蘆頭訶子肉煨硃砂麝香並細研各二錢半上搗羅為末都研令勻用軟飯和丸如麻子大每服以米飲化下三丸日三四服量兒加減聖惠黃連散治小兒疳痢久不瘥肌肉消瘦面黃發焦啼叫不常胡黃連末白礬燒令汁盡白龍骨末各半兩胡粉微炒二錢半上件藥同細研為散一歲兒每服以米飲調下一字二歲每服半錢隨兒大小量病輕重加減蕪荑丸治小兒久疳痢不瘥蕪荑半兩末羊子肝一具上先以子肝切作片子以蕪荑末摻在肝內線纏合米泔中煮令熟搗爛糯米飯和丸如麻子大每以粥飲下五丸早晨晚後各一服量兒加減莊氏第一候瀉膿血日漸瘦是冷熱疳宜服八香丸方胡黃連一錢腦麝各半錢牛黃一錢二分半蘆薈一錢半蟾酥五捻子作塊者亦得白花蛇半兩酒浸去骨蠍稍二錢半上為細末豬膽丸如黃米大每服五丸米飲下如患甚仍用生米泔調作散半錢服日三服治小兒腸鳴瀉痢口鼻乾常有鮮血日夜疼方白朮炮硫黃各二錢半枳殼炒胡黃連當歸各半兩上為末每服半錢熟水調下張道人第二急疳小兒疳痢下赤色膿血下部脫肛雖有精神命在須臾但服此沉香丸方沉香人參蠍胡黃連乳香各一分龍骨甘草各三分上件棗肉為丸如麻子大每服三丸米飲下日二服久患七服效木香丸治疳痢黃連淨三錢木香紫厚朴薑製夜明砂隔紙炒各二錢訶子肉炒一錢上為末飯丸麻子大干艾生薑煎湯食前下疳痢腹痛白朮散治小兒疳痢腹脹㽲痛日夜三二十行白朮一兩微炒當歸地榆並銼微炒木香赤芍藥甘草炙半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減胡黃連丸治小兒疳痢腹痛不止胡黃連半兩沒藥木香各二錢半上件藥搗羅為末糯米飯和丸如緑豆大每服粥飲下五丸日三四服量兒大小加減疳腫脹治小兒五疳八痢及發焦黃肚脹手足瘦細肚上筋脈起揩眼鼻涕垂至口咬指甲或下部生瘡及大小便不通宜此療之蘆薈夜明砂炒蛇蛻灰黃牛角屑各一分蟾酥少許上為末更入麝香少許煉蜜丸如緑豆大每服三丸用米飲下服藥間仍用桃柳葉湯浴兒了將青皂衣蓋之更用藥一丸至二丸安兒臍中便著醋麵糊與青皂帛貼之候蟲出為度如無蟲但汗出為妙服藥三日後宜減一丸治小兒疳氣腹腫有似水氣方肉豆蔻一個木香炮麝香硃砂各一分胡黃連半兩煨上為末飯丸麻子大米飲下三五丸莊氏第十八候用此方吉氏家傳治疳肚如鼓方密陀僧風化灰各一錢黃丹半錢上為末以豬肉炙一片用藥半錢蘸上與吃如不會吃乳母嚼與御苑勻氣散治脾肺氣逆喘咳面浮胸膈痞悶小便不利桑白皮二兩淨陳皮一兩半桔梗炒甘草炙赤茯苓各一兩藿香半兩木通四兩姜水煎服疳後天柱倒詳腎部天柱倒條疳氣入陰漢東王先生家寶治小兒疳氣灌入陰黃亮色烏金膏通草黃皮大黃各二錢半燒上各燒存性為末每用一錢豶豬膽調成膏於陰上塗如未退煎蛇床子湯洗後再調塗之虛羸母氣不足則羸瘦肉極巢氏論小兒羸瘦不生肌膚皆為脾胃不和不能飲食故血氣衰弱不能榮於肌膚也挾熱者即溫壯身熱肌肉微黃其挾冷者即時時下利唇口青白小兒經諸大病或驚癇或傷寒或溫壯而服藥或吐利發汗病瘥之後氣血尚虛脾胃猶弱不能傳化穀氣以榮身體故虛羸也錢氏虛羸冷者木香丸主之夏月不可服如有證則少服之熱者胡黃連丸主之冬月不可服如有證則少服之虛羸與疳同治也木香丸胡黃連丸見疳條薛氏云更當審其形色察其見證如面赤多啼心之虛羸也面青目札肝之虛羸也耳前後或耳下結核肝經虛火也頸間肉裡結核食積虛熱也面黃痞滿脾之虛羸也面白氣喘肺之虛羸也目睛多白腎之虛羸也仍審相勝而藥之又寒熱二證不可不辨若腹痛瀉利清白不渴喜熱此屬寒證雖在夏月宜木香丸身熱煩躁瀉利焦黃作渴喜冷此屬熱證雖在冬月宜胡黃連丸皆舍時從證之治法也錢氏論用藥識證云鄭人齊郎中者家好收藥散施人其子忽臟熱齊自取青金膏三服並一服而餌之服畢至三更瀉五行其子因睡齊言子睡多亦驚又與青金膏一服又瀉二行加口乾而身熱齊言尚有微熱未盡又與青金膏其妻曰用藥十餘行未安莫生病否召錢氏曰已成虛羸先多煎白朮散時時服之後用香瓜丸十三日愈白朮散見渴木瓜丸見汗薛氏治一小兒十三歲面赤驚悸發熱形體羸瘦不時面白噯氣下氣時常停食服保和丸及清熱等藥余曰面赤驚悸心神怯也面白噯氣心火虛也大便下氣脾氣虛也此皆稟心火虛不能生脾土之危證前藥在所當禁者不信又服枳朮丸鎮驚等藥而諸證益甚大便頻數小腹重墜脫肛痰涎飲食日少余先用六君子湯為主佐以補心丸月餘飲食少進痰涎少止又用補中益氣湯送四神而愈畢姻後病復作墜時至仲冬面白或黧色手足冷喜食胡椒姜物腹中不熱脈浮按之微細兩尺微甚乃用八味丸元氣復而形氣漸充年至二十苦畏風寒面目赤色發熱吐痰唇舌赤裂食椒姜之物唇口即破痰熱愈甚腹中卻不熱診其脈或如無或欲絶此寒氣逼陽於外內真寒而外假熱也仍用八味丸而諸證頓愈一小兒八歲面常青色或時色亦日間目札夜睡咬牙二年餘矣服清肝降火之藥益甚形氣日羸求治於余曰肝主五色入心則赤自入則青蓋肝屬木而生風故肝氣為陽為火肝血為陰為水此稟肝腎精血不足虛火內動陰血益虛虛而生風風自火出故變面赤目札等證耳非外風也遂用地黃丸以滋腎水生肝木兩月目札咬牙悉止又三月許諸證尋愈而元氣亦充矣凡肝經之證若肝木實熱生風而自病或肺金實熱而剋木者宜用清肝降火之劑以瀉其邪氣若肝經風熱而目直等證用柴胡梔子散以清肝火加味四物湯以養肝血若腎虛而咬牙諸證用六君子湯以健脾土六味地黃丸以滋腎水則愈一小兒脾氣虛弱飲食停滯發熱作渴服瀉黃散不時下痢余先用保和丸二服而愈但不食噁心面青手冷又用六君柴胡升麻四劑面色痿黃食進手溫惟形體羸甚倦怠發熱小腹重墜肛門脫出用補中益氣湯加半夏肉豆蔻二劑而安凡脾胃之證若發熱作渴飲食喜冷或泄瀉色黃睡不露睛者屬形病俱實宜用瀉黃散疏導之若發熱口乾惡冷或泄瀉色白睡而露睛屬形病俱虛宜用異功散調補之若脾氣下陷者補中益氣湯寒水侮土者益黃散肝木克脾者六君加柴胡若目睛微動潮熱抽搐吐瀉不食宜用祕旨保脾湯凡小兒諸病先當調補脾胃使根本堅固則諸病自退非藥所能盡祛也一小兒五歲形氣虛羸睡中咬牙夜間遺尿日間頻數余以為稟腎氣不足用補中益氣湯加補骨脂地黃丸加鹿茸以補脾腎而痊畢姻後小便頻數作渴發熱日晡益甚恪服黃柏知母等藥以滋陰降火後患腎痿臥床年許余因考績北上仍用前藥喜其慎疾半載而痊一小兒年十一歲面白或赤足軟不能久行用地黃丸加鹿茸年許而瘥畢姻後兩目羞明兩足仍軟用前丸及補中益氣湯而痊後病復發增口渴足熱頭囟覺開視物覺大此腎虛瞳人散大而然也服前藥遠房事則愈因不自保終患腎痿而歿仲陽先生云此證屬腦髓不足不能榮養宜用地黃丸補之有至七八歲或十四五歲氣血既盛而自合若縱恣色欲戕賊真陰亦不能盡其壽矣一小兒形瘦不時咳嗽自用參蘇飲一劑更加喘急驚搐面白或黃余謂此稟脾肺不足而形氣虛羸因前劑峻利外邪雖去而肺氣益虛肺虛則宜補脾先用異功散加桔梗釣藤鉤一劑痰喘頓定乃去桔梗加半夏當歸再劑驚搐亦去又加酸棗仁治之而安年十五歲發熱痰盛作渴面赤形體羸瘦用地黃丸加五味子及補中益氣湯各百餘劑而形氣漸壯若認為陰火用黃柏知母等藥復傷生化之源其亦不治者矣一小兒五歲尚飲乳耳前後頸間至缺盆以手推尋其筋結小核如貫珠隱於肌肉之間小便不調面色青黃形氣羸瘦此稟母之肝火為患用九味蘆薈丸五味異功散加山梔柴胡與兒飲之又以加味逍遙散與母服之尋愈一小兒患虛羸耳出穢水左手尺關洪數而無力余為清肝補腎耳中雖愈脈未全斂畢姻後患瘵證誤服黃柏知母之類復傷元氣不勝寒暑勞役無日不病幾至危殆余大補脾腎滋養元氣而愈一小兒患證如前肢體消瘦面色痿黃大便酸臭此脾虛食積用四味肥兒丸五味異功散治之而愈一小兒九歲吞酸惡食肌體消瘦腹中作痛余謂食積虛羸也用保和丸而愈後腹中數痛皆服保和丸余曰此因脾胃虛而飲食所傷也當調補脾土以杜後患不信後腹痛喜按余用五味異功散二劑因未應自用平胃散等藥腹脹作痛余仍以異功散加木香四劑而愈若屢用攻伐之劑陰損元氣多致虛羸慎之參苓白朮散方見不乳食地黃丸加肉桂一兩名加減八味丸治小兒肝經虛熱血燥或風客淫氣而患瘰癧結核或四肢發搐眼目抽動痰涎上湧又治腎疳腦熱消瘦手足如冷寒熱往來滑瀉肚脹口臭乾渴齒齦潰爛爪黑麵黧遍身兩耳生瘡或兩耳出水或發熱自汗盜汗便血諸血失喑等證其功不可盡述即六味地黃丸方見腎臟補中益氣湯治中氣虛弱體疲食少或發熱煩渴等證人參黃耆各一錢白朮甘草陳皮各五分升麻柴胡各二分當歸八分上薑棗水煎空心午前服愚按前方若因藥克伐元氣虛損惡寒發熱肢體倦怠飲食少思或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱右寸關獨甚者宜用之凡久病或過服克伐之劑虧損元氣而虛證悉具者最宜前湯若母有脾胃不足之證或陰虛內熱致兒為患者尤宜用之八珍湯四物四君合用錢氏異功散治脾胃飲食少思吐瀉不食凡虛冷證先與數服以正胃氣即五味異功散見吐瀉愚按前方治脾胃虛弱吐瀉不食或驚搐痰盛或睡而露睛手足指冷或脾肺虛弱咳嗽吐痰或虛熱上攻口舌生瘡弄舌流涎若母脾胃虛兒患此證亦當服之外臺小品療四五歲兒因食及在胎中宿熱乳母飲食粗惡辛苦乳汁不起兒哺不為肌膚心腹痞滿痿黃瘦瘠四肢痿躄繚戾服之令充悅方芍藥十分炙令黃黃耆鱉甲炙人參各四分柴胡八分茯苓六分甘草炙乾薑各二分如熱以枳實代上八味搗篩蜜和為丸如大豆服五丸日二服忌如常法千金有大黃無黃耆云服一丸一歲以上乳服三丸七歲兒服十丸日二聖惠黃耆丸治小兒羸瘦體熱面色痿黃不欲乳食黃耆銼赤芍藥人參去蘆頭甘草炙微赤銼胡黃連各半兩麥門冬去心焙鱉甲塗醋炙微黃去裙襴各一兩柴胡去苗三分上件藥搗羅為末煉蜜和丸如麻子大不計時候以粥飲下五丸量兒大小以意加減秦艽丸治小兒羸瘦體熱心神煩悶小便赤黃秦艽去苗桑根白皮銼枳殼麩炒微黃去瓤地骨皮黃耆銼人參去蘆頭赤茯苓甘草炙微赤銼犀角屑各半兩龍膽去蘆頭一分柴胡三分去苗上件藥搗羅為末煉蜜和丸如緑豆大不計時候用粥飲下五丸更隨兒大小增減麥門冬丸治小兒雖食不著肌膚羸瘦骨熱小便赤黃麥門冬去心焙一兩人參去蘆頭黃耆銼青蒿子黃連去須桑根白皮銼枳殼麩炒微黃去穰地骨皮各半兩柴胡去苗三分上件藥搗羅為末煉蜜和丸如緑豆大不計時候以熟水研五丸服量兒大小以意加減燒黃瓜丸治小兒羸瘦體熱乳食全少黃瓜大者一枚陳橘皮湯浸去白瓤焙黃連去須各半兩鱉甲童子小便浸三宿炙微黃去裙襴胡黃連柴胡去苗各一兩上件藥搗細羅為散以黃瓜切開頭去瓤內藥末令滿以切下蓋子蓋之用香麥面和搜固濟可厚三分於煻灰火內燒令面焦黃為度取出去面放冷入麝香一錢都研和丸如緑豆大每服食前米飲下七丸更量兒大小以意加減大黃丸治小兒胃氣不調不嗜食不生肌肉大黃乾地黃茯苓當歸柴胡杏仁各三分上為末蜜丸麻子大飲下五丸日進三服豬肚丸解小兒肌熱時或泄瀉及有積滯不思飲食肌肉消瘦鱉甲一兩同童子小便並醋共一升熱浸炙盡為度白朮薯蕷各一兩胡黃連人參去蘆頭青橘皮紫菀去土桃仁湯浸去皮尖雙仁木香甘草炙各半兩柴胡去蘆頭一兩一分上件藥搗羅為末入在淨豬肚內系定煮令極爛為度出與藥同杵令黏丸如梧桐子大每服二十丸不計時候溫水飲下香甲丸治男子婦人童男室女氣血虛疏肌膚消瘦百節疼潮作溫五心煩熱四肢逆冷不思飲食中滿氣滯婦人經血凝澀建脾胃暢神氣充肌膚澤顏色柴胡生乾地黃京三稜各三分鱉甲醋煮黃神麯杏仁熟乾地黃麥糵炒各一兩牛膝木香薑黃當歸各半兩白朮川芎各一分上為細末白麵糊丸如梧桐子大每服十丸空心茶清下或米飲亦得上八方挾熱者宜之聖惠訶梨勒散治小兒羸瘦脾胃氣弱挾於宿食不欲乳食四肢不和訶梨勒皮陳橘皮湯浸去白瓤焙各半兩黃耆銼人參去蘆頭白朮藿香桂心白茯苓各一分甘草炙微赤銼半分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓溫服日三四服量兒大小以意加減溫脾散治小兒脾氣不和食少無力肌膚羸瘦訶梨勒皮人參去蘆頭各三分白朮木香黃耆銼白茯苓藿香陳橘皮湯浸去白瓤焙桔梗去蘆頭各半兩甘草炙微赤銼一分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓不計時候量兒大小增減溫服五香煎治小兒脾胃久虛吃食減少四肢羸瘦丁香沉香木香藿香白朮各一兩麝香三錢細研入白茯苓陳橘皮湯浸去白瓤焙黃耆銼各一兩訶梨勒皮甘草炙微赤銼各半兩上件藥搗篩為散以水五升慢火煎至一升以布絞汁卻入鍋內煎麝香及蜜三合生薑汁半合棗肉二十枚慢火熬成煎每服以粥飲調下半茶匙量兒大小以意加減上三方挾冷者宜之湯氏云小兒疳積其狀漸黃瘦拍背如鼓鳴脊骨如鋸乃積而生熱成疳也宜服蘆薈丸露星膏蘆薈丸龍膽草黃連蕪荑去皮先炒黃色次入前二味一處炒赤色各一兩上為末另入蘆薈一分和勻爛飯丸如黍米大三歲兒服三十丸空心米飲送下露星膏黃耆蜜水炙胡黃連地骨皮柴胡各等分上為末煉蜜丸如芡實大隔宿酒浸露一宿次日澄去酒薄荷湯浸服之錢氏橘連丸治疳瘦久服消食和氣長肌肉橘皮一兩黃連米泔浸一宿一兩半上為細末另研入麝香五分用豬膽七個分藥入膽內漿水煮候臨熟以針微刺破以熟為度煮粟米粥和丸如緑豆大每服十丸至二三十丸米飲下量兒加減無時海藏云黃連苦燥可以瀉脾火長肌肉二聖丸治小兒臟腑或好或瀉久不愈羸瘦宜常服黃連去須黃柏去粗皮各一兩上為細末入豬膽內重湯煮熟丸如緑豆大每服二三十丸米飲下量兒加減頻服無妨張渙金粟丹方見內疳條香蟾丹治肌瘦面黃胸高腳細乾蟾五枚水浸去骨用瓦藏瓶一枚頂頭上取開入蟾瓶內鹽泥固濟木炭火燒留一竅子以煙息為度取出地上放一宿出火毒胡黃連二兩蛇蛻皮一兩燒灰地龍半兩微炒天竺黃蟬殼各一分以上併為細末次入硃砂半兩細研麝香一分細研上件都一處研勻糯米飯和如黍米大每服十粒米飲下不拘時候量兒大小加減萬全方雷丸丹治小兒一切疳肚脹腹滿手腳枯細眼目口鼻生瘡身體壯熱痢下泔澱日漸羸瘦面無光澤雷丸生鶴蝨生使君子去殼生胡黃連微炒蘆薈研各半兩麝香半錢研入蟾一枚酒浸一宿慢火炙熟去皮足骨焙木香肉豆蔻各一分蕪荑一兩去皮微炒研入硃砂二錢研留少許為衣上件藥搗羅為末研合令勻用豶豬膽四個取汁傾入瓷盞中外以重湯煮過和杵為丸如黍米大每服五丸至七丸麥門冬熟水下早晨日午空心臨臥服孔氏神聖丸肥小兒疳藥常服永無腸臟之疾胡黃連去皮宣連去毛白蕪荑去皮木香蘆薈各一錢使君子二十枚上除蘆薈一味外五味銀器內用豬膽汁熬成膏後入蘆薈同丸如緑豆大每服五七粒空心日午臨臥米湯下神效豬肚丸治小兒疳熱而瘦柴胡黃連秦艽各一兩淨蕪荑二兩用瓦上爆干去殼取肉別為末臨時入用上用豬肚一個中庸者破開淨洗入前藥三味末於內以酒半瓶童子小便一升煮乾舂令得所放蕪荑末又舂勻丸如桐子大每服二十丸飲下王氏手集治小兒疳瘦大人五勞七傷方宣黃連半斤去須及蘆頭為細末豶豬肚一個去脂膜將黃連末穰在內縫合於三鬥米內蒸以米熟軟為度上件取出爛研丸如粟米大風乾隨兒大小加減日三服三歲兒每服五七丸至十丸大人服如桐子大每服二十丸空心米飲下趙氏斧捶丸治小兒疳久服肥白干蝦蟆一枚白礬膽礬緑礬各半兩四味同入罐子內炭火燒礬枯為度京三稜石三稜雞爪三稜萆薢鶴蝨雷丸淡蕪荑黑狗脊木香各半兩沒石子三枚使君子十枚蘆薈熊膽各一錢上為末醋煮乾棗取肉爛研入少麵糊和藥極熟丸如緑豆大每服七丸米飲下玉拄杖散治小兒疳瘦黃耆二兩白茯苓半兩人參白朮各一兩上為末以水一盞藥一錢煎七分溫服蘆薈丸治小兒諸疳羸瘦不生肌肉蘆薈木香紅芍藥沒石子各半兩使君子去殼胡黃連各二錢半肉豆蔻二錢人參一錢上為細末入麝香半錢別研令細與藥拌勻蜜水打麵糊為丸每服十五丸米飲下空心食前服吉氏益兒丸治小兒一切疳瘦夜多盜汗肌肉熱人參白朮茯苓柴胡去苗甘草炙陳皮去白鱉甲醋炙去裙襴京三稜濕紙裹煨香熟各等分上細末煉蜜丸如雞頭實大每服一丸米飲化食前日三服朱氏家傳肥兒丸白蕪荑去殼稱黃連去須神麯麥糵各等分上為末用豶豬膽煮糊丸如大麻子大每服三十丸食前米飲下張氏家傳莊氏家傳方皆同或治疳積或治疳瘦六味肥兒丸治疳多因缺乳食肉太早或患臟腑胃虛療諸般疳化蟲治黃瘦肚急消疳退疳熱可常服黃連局方加肉豆蔻陳皮去白局方去此用木香神麯炒局方有使君子麥糵炒各一兩局方加三稜蓬朮川楝肉一兩炒白蕪荑半兩局方去此用檳榔上為末神麯糊丸麻子大每服三十丸空心米飲吞下薛按前方又治脾疳飲食少思肌肉消瘦肚大頸細發稀成穗項間結核發熱作渴精神倦怠大便酸臭嗜食泥土或口鼻頭生瘡肚見青筋齧齒下利便白五疳用此丸加乾蟾一兩蘆薈五錢尤妙祕方肥兒丸消疳進食黃連五錢木香一錢神麯麥糵各一兩並炒使君肉煨肉豆蔻麵裹煨各五錢檳榔一枚蝦蟆一個白朮一兩上為末麵糊丸如粟米大空心米飲下量兒加減朱氏家傳治小兒脾疹疳瘦驚積方上用黃栝蔞一個去瓤用黃連末填滿蒸爛取出用朴硝末一錢蓋頭臨夜方取然後露一宿研爛為丸如小緑豆大每服五丸熟水下潔古云小兒疳病肌瘦血氣不足同大人勞瘵之疾治之按以潔古此論詳之不拘冷熱虛羸皆用四君子地黃丸與前藥相兼服為得也然有胸膈積瘀不受參朮地黃之補者先用清疳取積之藥然後補劑可施故備載諸方以俟採擇誠以病之變態多端非執一隅可以御百變若看方三年無病不治者鮮不以為繁雜矣針灸羸瘦不生肌膚胃腧灸一壯田小兒疳瘦於胸下骨尖上灸三壯次於脊下端尾翠骨尾上灸三壯小兒疳瘦脫肛體瘦渴飲形容瘦悴諸方不瘥者取尾翠骨上三寸骨陷中灸三壯小兒身羸瘦賁豚腹腫四肢懈惰肩背不舉章門二穴各灸七壯鶴節湯氏云小兒鶴節由稟賦不足血氣不榮肌肉瘦瘠則骨節皆露如鶴之足皆腎虛不生骨髓之故治法宜錢氏地黃丸加鹿茸牛膝地黃丸治頭囟不合體瘦骨露有如鶴膝皆腎虛不足並治腎疳天柱傾倒腎主骨也熟地黃洗焙八錢澤瀉洗二錢牡丹皮去心白茯苓各三錢山茱萸肉牛膝鹿茸酥炙山藥各四錢為末蜜丸梧子大三歲以下三二丸溫水空心化下丁奚疳脹異名巢氏云小兒丁奚病者由哺食過度而脾胃尚弱不能磨消故也哺食不消則水穀之精減損無以榮其氣血致肌肉消瘠其病腹大頸小黃瘦是也若久不瘥則變成谷癥傷飽哺露病一名丁奚三種大體相似輕重立名也真珠囊凡小兒或因吐而瀉久不瘥或病退不能行膝大腸紅號曰丁奚七歲以下號鼓棰風十五以下名鶴膝風蓋此並是風冷傷於腎所致腎主骨故也莊氏疳脹丁奚辨證云小兒腹大如有青筋見即曰疳脹也如無青筋乃名丁奚是因過飽傷食而得之曾丁奚者亦久積成疳之證皆因飲食過傷於脾胃脾胃虛不能磨化飲食飲食漸減無以生其氣血面白色慘潮熱往來腹大而多青筋手足如筒顱囟開解頸項小而身黃瘦先投萬應丸通治五疳次參苓白朮散不乳食早晨一服與養胃氣及醍醐散進食食後下烏犀丸積三粒至五粒助脾化食此即用迎奪之法間投醒脾散慢驚沉香檳榔丸木香莪朮丸宿食次第調理有渴瀉腹痛千金膏自好若脾氣稍和飲食漸進再以化癖丸積快活丸常服或用烏犀丸略下二三行勻氣散疝止補有寒熱往來柴胡飲疳熱主之腹脹投南星腹皮散水腫有餘熱麥芽柳枝煎湯調三解散潮熱有蟲下使君子丸腹痛斯疾得之非一朝一夕然施治之法亦須漸漸令其平復欲求速效則難矣凡雞酒羊面魚鮓甘甜生冷毒物宜忌之十全丹治丁奚哺露神效檳榔枳殼麩炒青皮陳皮三稜炒蓬朮炒砂仁各半兩丁香木香各一分香附一兩上為末神麯糊丸如黍米大空心食前米飲下百丸一方去香附砂仁丁香三稜枳殼加五靈脂白蔻使君子蘆薈蝦蟆川芎醍醐散治吐瀉後調和脾胃消進飲食及丁奚哺露虛熱煩渴氣逆心惡陳皮去白縮砂仁厚朴去粗皮銼碎薑汁浸一宿慢火焙乾麥芽洗淨焙乾烏梅和核各五錢良薑銼東壁土炒乾葛烏藥各二錢半草果仁炮二錢甘草炙三錢上碎每服二錢水一盞姜二片棗一枚鹽少許煎七分空心溫服快活丸治丁奚疳證皮膚瘦削骨露如柴肚大青筋小便白濁睡臥煩躁神氣昏沉常服健脾化積進食肥肌蒸餅一兩去頂剜空入青礬半錢重仍以碎餅屑緊塞上用水紙封定灰火中炮透取出候冷用之上件銼焙為末別以肥棗用米泔水浸經一宿飯上蒸少時去皮核用乳鉢爛杵如糊同前餅末亭分再杵勻丸麻仁大每服三十丸至五十丸溫米清湯無時送下兒小者亦以米湯化服其蒸餅不拘個數大約以一兩入青礬半錢重為定下常如前法制半斤作一料後人切勿以見方不重藥為誤余嘗屢試屢驗其餅如南饅頭樣者是也聖惠赤芍藥丸治小兒丁奚雖食不生肌肉腹大食不消化赤芍藥川大黃微炒鱉甲醋塗炙令黃去裙襴各三分桂心赤茯苓柴胡去苗上件藥搗羅為末煉蜜和丸如麻子大每服煎蜜湯下五丸日三服嬰孺芍藥丸治小兒百病有寒熱大腹食不消化不生肌肉痿痹芍藥茯苓大黃各五分柴胡四分鱉甲三分炙桂心二分人參一分一方二分上為末蜜丸三歲以下服三小豆大不知加之七八歲三桐子大不知加之苦腹堅大者加鱉甲一分渴者加栝蔞二分病甚者服二十日效已試大良一方有杏仁二兩人參三分張渙大麝香丹治小兒羸瘦腹大見青筋及丁奚等病麝香研硃砂細研水飛粉霜研各半兩五靈脂肉豆蔻仁乾蟾塗酥炙各一兩夜明砂白礬灰各半兩乾地龍炒一分干蜣螂七個去翅炙令黃熟上件搗羅為末與硃砂等同研勻細煉蜜和如黍米大每服三粒至五粒溫水下量兒大小加減服之初虞世治小兒腹如蜘蛛四肢瘦者用黑骨雞子破頂入蜘蛛一枚於內以濕紙糊竅用文武火煨熟去蜘蛛食其雞子纍效必數枚方愈肘後方搗生薤根以豬脂煎稍稍服或熟炙鼠肉哺之亦治哺露哺露湯哺露者因乳哺不消脾胃衰弱漸不能食血氣減損肌肉不榮柴骨羸露吸吸苦熱謂之哺露也宜麝香進食丸方見積癖曾哺露者亦由乳哺不節損於脾胃脾胃損而飲食減形容羸瘦則臟腑之氣不能宣通時間有熱謂之哺露此候與丁奚相去不遠但食多吐逆臟氣虛冷而泄瀉無度糞中有蟲治法同前丁奚證藥惟加養臟湯服之方見赤白痢聖惠人參丸治小兒哺露失衣當風濕冷水浴苦腹大時痢或寒熱如瘧不欲食縱食不生肌肉或不消化四肢羸瘦人參麥門冬去心焙半夏湯洗七遍去滑黃耆川大黃微炒白茯苓柴胡黃芩各三分訶梨勒煨用皮甘草炙微赤銼鱉甲塗醋炙令黃去裙襴各一兩芎藭半兩上件藥搗羅為末煉蜜丸如麻子大一二歲兒以粥飲下三丸四五歲五丸日三服量大小加減宿食食積寒熱痢傷寒論人病有宿食何以別之師曰寸口脈浮而大按之反澀故知有宿食當下之宜大承氣湯傷寒然同一發熱而傷食者惟肚腹之熱為甚且糞極酸臭夜間潮熱尤傷積之明驗也小兒宿食不消者胃納水穀而脾化之兒幼不知撙節胃之所納脾氣不足以勝之故不消也神麯麥芽之屬皆腐化之物昔腎已謂能傷胃中生髮之氣矣況進而三稜莪朮乎況又進而牽牛大黃巴豆乎脾氣一受傷於食再受傷於藥至於下之而氣已一脫矣所存幾何故夫克食之藥不可多用下積之藥尤不可不審其證之可下與不得不下而後用也錢氏論食不消脾胃冷故不能消化當補脾益黃散主之保和丸治飲食停滯胸膈痞滿噯氣吞酸或吐瀉腹痛加白朮一兩即大安丸神麯炒山楂半夏茯苓各一兩陳皮連翹蘿蔔子炒五錢上為末粥丸桐子大每服三十丸白湯送下愚按前方行氣克滯之劑若元氣無虧暴停乳食而致斯證者宜用此消導之若元氣虛弱而乳食所傷者必調補胃氣為主而佐以消導若乳食已消而作嘔者乃胃氣被傷當用異功散補之不宜仍用前藥重損胃氣治者審之木香大安丸木香二錢黃連陳皮白朮各三錢枳實山楂肉萊蔔子炒連翹神麯炒麥糵炒砂仁各一錢半上為末神麯糊為丸陳廩米湯下消食丸又名消乳丸治宿食不消砂仁陳皮炒三稜炒神麯炒麥芽炒各半兩香附炒一兩上末曲糊丸如麻子大食後白湯送下大小加減七聖丸三稜蓬朮川楝青皮陳皮芫花杏仁上件等分先用醋浸芫花一宿炒漸干次入蓬稜同炒赤色又入陳練等再同炒一處令微焦取出為末前藥如各半兩杏仁亦用半兩湯浸去皮尖雙仁不用細研入巴豆二十粒去油和勻醋糊丸如黍米大一歲兒常服二丸臨臥溫熱湯送下使日間所飧之物一夜而化永無疳疾能使黃瘦子頓作化生兒今之小兒可去巴豆只入杏仁名七聖丸是也三稜散主諸般停滯疳積發熱瀉痢酸醙水穀不化常服和脾胃進飲食長肌肉益神氣人參去蘆七錢半三稜炮銼淨香附各一兩半青皮去白益智仁陳皮去白枳殼去穰銼片麩炒神麯炒穀芽洗焙半夏制莪朮醋煮透濾干銼焙大黃半生半炮紫蘇去老梗各半兩甘草半生半炙一兩二錢上碎每服二錢水一盞姜三片倉米百粒煎七分無時溫服氣虛者加白茯苓一兩莪朮丸和脾益胃消進飲食寬膈快氣悅色清神莪朮炮銼三稜炮銼淨香附三味各四兩醇醋浸七日慢火煮乾再焙檳榔一兩薄銼生牽牛末一兩另研青木香去蘆穀芽淨洗焙乾青皮去白各半兩蓽澄茄丁香南木香各四錢上除檳榔丁香木香不過火及牽牛末餘七味銼焙仍同檳榔木香丁香為末臨入牽牛末和勻水煮麵糊丸緑豆大每服三十丸至五十丸無時用淡薑湯下溫茶溫酒皆好兒小者丸粟米大粒數下法如前丁香脾積丸三稜煨去皮毛莪朮去皮炒神麯炒各七錢青皮巴豆霜小蘹香炒陳皮各五錢丁香木香各三錢上為細末醋調神麯糊為丸如緑豆大每服五七丸生薑湯下三黃枳朮丸治傷肉濕面辛辣味厚之物致填塞悶亂不快枳實麩炒五錢黃連酒浸炒大黃濕紙裹煨白朮各一兩黃芩五錢上為末湯浸蒸餅為丸如緑豆大每服五十丸白湯下臨時量所傷多少加減服之聖惠訶梨勒散治小兒宿食不化少欲飲食四肢消瘦腹脅多脹訶梨勒皮三分人參白朮麥蘖炒令微黃陳橘皮去白檳榔各半兩甘草一分炙微赤上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減溫服日四五服朱氏木香丸治小兒氣開胃進食木香人參白茯苓青皮陳皮肉豆蔻各一分三稜一兩炮上為末麵糊丸麻子大每服十丸薑湯下朱氏洗心散治小兒乳食傷心作壯熱喘息不調咳嗽多睡甘草一錢生麥門冬一分半皂角半兩入沙糖塗酥炙後於盆下蓋良久出火毒方用上爛杵不羅每服二錢水一盞煎至八分作五服時時吃養脾丸人參白朮當歸川芎各一錢半木香青皮黃連陳皮各一錢砂仁山楂肉神麯炒麥芽炒各五分上為細末水調神麯糊丸如麻子大每服三五十丸陳倉米飲下食積寒熱薛小兒食積者因脾胃虛寒乳食不化久而成積其證至夜發熱天明覆涼腹痛膨脹嘔吐吞酸足冷肚熱喜睡神昏大便酸臭是也有前證而兼寒熱者名曰食積寒熱若食在胃之上口者吐之胃之下口者消之腹痛痞脹按之益痛者下之下後仍痛按之則止者補之夾食傷寒者先散之用參蘇飲熱甚便祕者先利之用大柴胡湯如無外感但只傷食不至於甚保和丸調之蓋脾為至陰之臟也故凡脾病者至夜必熱熱而兼寒則又見所勝者侮所不勝矣食未消者消之則寒熱自止食既消者補之則寒熱自痊若手足並冷喜熱飲食此中州虛寒也宜溫之大便欲去不去脾氣下陷也宜升之若夜間或侵晨泄瀉者脾腎俱虛也用四神丸瀉手足並熱作渴飲水者脾胃實熱也用瀉黃散脾大便祕結用大柴胡湯潮熱手足雖熱口不作渴大便不實者用白朮散渴仍參腹痛腹脹積痛積滯治之食積痢曾有食飽傷脾脾氣稍虛物難消化留而成積積敗為痢腹肚微痛先調胃氣次理積卻止痢則病根自除和中散吐瀉理虛養胃三稜散見前烏犀丸積助脾化積沉香檳榔丸積守中湯瀉進食止痢仍忌生冷黏膩等物不致復作千金治小兒食不知飢飽方用鼠屎二七枚燒為末服之痞結此痞在腹內與心下之痞不同楊痞者塞也結者實也熱氣蘊於胸膈之間留飲聚於腹脅之內於是榮衛不能流行臟腑不能宣通由脹滿而致痞結勢使然耳此熱實之證也時或發為壯熱聖惠甘遂散主之此藥治小兒痞結雖服湯藥時暫得利而滯實不去心下堅脹按之即啼內有伏熱諸候併成此疾宜疏利大便破結散氣後宜常服進食丸按進食丸有巴豆豈宜常服甘遂有大毒瀉水如決江河非十分壯實十分危急十分水氣三者俱備未可輕用今以為痞結主方謬矣薛痞癖既久飲食減少脾氣必虛久而不愈必先以固胃氣為主使養正則積自除若欲直攻其結不惟不能善消抑亦損其脾土脾土既虧必變證百出矣當參各類及隨見證而主治之一小兒患痞癖服檳榔蓬朮枳實黃連之類痞益甚余曰此脾經血虛痞也不可克伐遂用六君子加當歸數劑胃氣漸復諸證漸愈乃朝用異功散加升麻柴胡夕用異功散加當歸芍藥而愈一小兒患痞結服克滯之藥余謂屬形病俱虛當補中氣彼不信仍行克伐遂致虛火上炎齒齦蝕爛頷下結核余用大蕪荑湯及異功散加減用之而安一小兒患痞結久而四肢消瘦肚腹漸大寒熱嗜臥作渴引飲用白朮散為主佐以四味肥兒丸月餘諸證漸愈又以異功散加當歸並六味地黃丸又月餘而愈一小兒患痞結身熱如火病狀多端不可盡述朝用五味異功散夕用四味肥兒丸月餘諸證稍愈佐以地黃丸自能行立遂朝用地黃丸夕用異功散及蝦蟆丸數服而愈聖惠前胡散治小兒腹內痞結壯熱羸瘦多啼前胡川大黃各三分微炒枳殼炒微黃赤茯苓犀角屑郁李仁湯浸去皮微炒鱉甲塗醋炙令黃去裙襴各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓看兒大小分減溫服微利為度聖惠甘遂破結散甘遂煨二錢半令黃色青皮浸去白焙黃芩川大黃銼細煨各半兩上為粗末每服一錢水一小盞煎至六分去滓溫和服量大小加減得通利則止後以冷粥補之進食丸治乳食不消心腹脹滿壯熱喘粗嘔吐痰逆腹鳴泄瀉米穀不化或下痢赤白腹痛後重及食症乳癖痃氣痞結並皆治之小兒胸膈熱實腹內有留飲致令榮衛痞塞臟腑之氣不得宣通其病腹內氣結脹滿或壯熱是凡有此疾當疏利大便破結散氣巴豆霜一錢二分當歸米泔浸一宿炒硃砂代赭石煆醋淬七次枳殼炒木香各半兩麝香少許上為末麵糊為丸如麻子大一歲兒一丸溫米飲下更量虛實加減食後服治食積發熱羸瘦肚大青筋疳積肚疼哺露湯戶部張侍郎小娘子患此蘊積結聚已經年矣其候腹滿壯熱大小便閉不食諸醫皆作虛熱潮熱或作胃寒不食治然既不食大小便自然少又欲作疳熱治百藥俱試而無一中勢已窘迫招豫視之問曰合服何藥答曰當服甘遂大黃張驚駭曰前諸醫者皆用補劑此女不進食久矣不宜利動腸胃豫答曰信我者生逆我者死張曰更有無甘遂而次於此藥方者可否豫令即服大承氣湯二服而愈次日診之尚有餘滯積實其證必過數日而腹閉須服前藥始可除根數日後果再閉腹滿痞結再投此藥一服而痊上疏利大便例形氣俱實者宜之枳朮丸白朮四兩枳實二兩上為末荷葉包煨爛飯為丸桐子大每服四五十丸空心白滾湯下枳實理中丸枳實十六片麩炒茯苓人參白朮乾薑炮甘草炙各二兩上為末煉蜜和丸如龍眼大每服一丸熱湯化下連進二三服胸中豁然渴者加栝蔞根一兩自汗者加牡蠣二兩煆過下利亦加快膈湯理胸膈不快飲食少進亦能順氣和中消導宿滯人參去蘆青皮去白縮砂仁烏藥良薑制香附子甘草炙各一兩為細末每一錢溫鹽湯空心調服參朮陷胸湯人參白朮茯苓橘紅半夏各一錢栝蔞全用細切帶濕三錢黃連甘草各五分上用水一鍾半生薑三片棗一個煎七分溫服潔古云飲食不進四君子加薑棗煎積漢東王先生家寶小兒積病可醫者九面上虛腫是積積者是脾之所繫脾主身之肌肉故應面故知是脾積其脾系土土無正形故早晚浮腫不定多則早浮其睡則脾不磨上面作腫若病後此證則是虛中積宜用調脾消積行氣等藥面合地臥是積何以合地其受積在脾是冷積何以知之其脾好土故知在脾其冷者屬陰故知傷冷硬食得之宜下熱積氣藥耳腹脹是積其積在肺何以知之其肺主於氣才當受積其氣便冷腹脹滿氣急故知在肺如腹脹先宜調氣後轉轉後更宜調氣小便如油是積其積在小腸何以知之其積受於脾脾當傳心心不受觸則入小腸小腸是心之府故知在小腸則節其水道小便如米泔油相似也發黃是積是積氣傷心心主血脈蔭遍身毛髮被積氣所幹則發黃故知是積傷心宜下空心散及取積藥此人必時復發熱也赤白痢是積其積在肺受傳大腸及有外傷冷而得何以知之其肺主西方庚辛金其色白後赤則是外邪故知肺傳大腸則為赤白痢也宜取後調氣兩眼黃赤睛青是積其積在肝何以知之肝主東方甲乙木色青卻被積氣所幹即黃赤睛青者眼屬五臟肝是其主肝若受積故令眼睛青是肝受積若傳膽其人口苦不要吃物宜涼藥退之遍身虛腫是積其積不在臟只在腑何以知之為其積曾取後被藥發動即不在臟故出皮膚之間為腫也只宜下取虛中積藥然後補之多瀉白糞是積是受冷積在脾何以知之脾主化受冷積在脾冷滑而瀉白糞故知在脾宜先轉後熱藥補之積病不可醫者六喘急是肺積肺主氣其喘急則肺絶其人當面白全無血色故不可醫也面黑是腎積其人面黑者是腎絶也人當不辨好惡眼直無光只得一日而死也吐熱氣是榮積其不醫者是血絶不可治也血主心心不能管故出熱氣不止耳手腳心生瘡是衛積衛者氣也胃氣不生故手足生瘡若衛絶則氣不回只得半日也噁心吐乾嘔是胃積何以不醫胃主化食其胃熱則惡吐故不治其人必食乳不化不食亦干吐嘔面色青黃無血色也瀉久住又瀉是積咬脾爛何以知其脾爛其人當瀉白糞為食不消住了卻放糞赤黑而死即知脾爛不可治寶鑑論小兒五積為臟氣不行蓄積一處不動故曰積夫心為伏梁在臍上上攻其心下攻胃口脾為痞氣在胃口上橫之肝為肥氣在臍之左邊肺為息賁在臍之右畔腎為賁豚在臍下各有變動非食之所成乃氣積也臟屬陰故在一處而不動也聚謂六腑之氣留聚也腑屬陽陽氣運轉不停故其聚不定一處發而腹痛積聚之候皆面黃瘦劣咨啀不生肌肉發立或肌體浮腫腹急多困多為水氣真珠囊虛中積候凡驚中虛積者謂因驚取復驚發動是也所下糞青穢凡虛中有積者因傷食而瀉又吐如此漸虛其病未瘥故曰虛積也又虛中之積有積而頻頻取轉卻取轉不著致其積尚伏故亦曰虛中積若驚積取下則糞隨驚青如是食積即糞成塊子凡疳中虛積者因疳病轉瀉虛而疳不退故虛中爾所取下糞里白色也曾凡嬰孩所患積證皆因乳哺不節過餐生冷堅硬之物脾胃不能克化積停中脘外為風寒所襲或因夜臥失蓋致頭疼面黃身熱眼胞微腫腹痛膨脹足冷肚熱喜睡神昏飲食不思或嘔或噦口噫酸氣大便醙臭此為陳積所傷如覺一二日先以百傷飲外感發表次當歸散潮熱水姜煎服溫動積滯方下烏犀丸六聖丸重與寬利後用勻氣散疝調補湯凡有積滯須辨虛實況孩兒虛瘦長短黑白南北古今不同不可一概論也豫今之法實者可服進食丸虛而微白芨疳瘦者宜服肥兒丸即三因肥兒丸見腹脹條薛初患元氣未損之時或腹脹作痛大小便不利者先用白餅子或木香檳榔丸下之下後以白朮散或五味異功散和之渴加乾葛吐加半夏下而熱不退或作嘔作瀉飲食不思此脾胃俱傷也用六君子湯手足指冷喜飲熱湯此脾胃虛寒也前方加炮薑木香面色黃白目無精光脾肺俱虛也用四君子加柴胡升麻腹痛泄利下垂或小便不利者用四逆散發熱晡熱或瀉未已脾氣下陷也潮熱口渴大便不調欲變疳證也並用補中益氣湯佐以肥兒丸經云邪之所湊其氣必虛留而不去其病乃實必以調脾為主而以消導佐之古人所謂養正積自除正此意也千金紫雙丸治小兒身熱頭痛食飲不消腹中脹滿或小腹絞痛大小便不利或重下數起小兒無異疾惟飲食過度不知自止哺乳失節或驚悸寒熱惟此丸治之不瘥更可重服小兒欲下是其蒸候哺食減少氣息不快夜啼不眠是腹內不調悉宜用此丸不用他藥數用神驗千金不傳方臣億等詳序例中凡云服紫丸者即前變蒸篇中四味者是也云服紫丸不下者服赤丸赤丸瘥駛病重當用之方中並無赤丸而此用硃砂者又力緊於紫丸疑此即赤丸也巴豆去皮蕤核仁去皮各十八銖甘草炙五銖牡蠣火煆赤黃蠟各八銖甘遂硃砂各二銖麥門冬去心十銖上八味以湯熟洗巴豆研新布絞去油別搗甘草甘遂牡蠣麥門冬下篩訖研蕤核仁令極熟乃內散更搗二千杵藥燥不能相丸更入少蜜足之半歲兒服如荏子一雙一歲二歲兒服如半麻子一雙三四歲者服如麻子二丸五六歲者服如麻子大二丸七歲八歲服如小豆二丸九歲十歲微大於小豆二丸常以雞鳴時服之至日出時不下者投粥飲數合即下丸皆雙出也下甚者飲以冷粥即止茅先生青金丹小兒諸積病悉主之滑石末白丁香羅過天南星各二錢匕青黛羅過平錢滿挑二錢輕粉重二錢水銀稱二錢先以錫二錢於銅銚內熔化便下水銀拌和勻傾出於地冷用川巴豆去皮心膜七十二個無缺損者井華水浸一宿懸當風處吹乾爛研上前件藥同拌合用軟飯為丸如小緑豆大巴豆不出油依形證用湯使下傷寒後取積淡煎蔥湯吞下取疳蟲用牛肉炙汁下驚風肚中緊硬面青黑金銀薄荷蔥湯吞下因傷看肚中及腹皮上微熱肚脹夜間作熱似疳又不是疳面青黃色眼微黃此腹中有積用皂角子二七粒灰火煨過用水一盞煎至半盞下有積作瀉魚鮓湯下氣積炒蘹香湯下凡下此藥周歲十四丸三歲十八丸七歲二十四丸量大小加減下須是四更初下至天明通下積來盡時可依形證候下藥補之臨吃此藥恐先吐下些小涎來亦不妨萬靈丸主小兒諸積依形證用之木香黃連蓬莪朮各半分陳橘皮青橘皮各去瓤一分檳榔一錢半重者一枚上為末每匕藥一錢用巴豆一粒去心膜用醋煮巴豆一枚煮藥令巴豆紫色用杏仁一枚去皮尖燈火上煆留性二味都研用醋麵糊為丸如小緑豆大每服五丸七丸十丸薄荷薑湯吞下錢乙消積丸丁香九枚縮砂仁十二枚烏梅肉三個焙巴豆二枚去皮油心膜上為細末麵糊丸黍米大三歲以上三五丸以下三二丸溫水下無時紫霜丸消積聚巴豆去油心膜杏仁去皮尖各二十一個代赭石一錢研細水飛上為細末飯丸如粟米大每服三五丸至十丸煎皂角仁湯下無時兒小者減之真珠丸取小兒虛中一切積聚驚涎宿食乳癖治大小便澀滯療腹脹行滯氣木香白丁香真者丁香末輕粉各半錢留少許為衣白滑石末二錢巴豆十四粒水浸一宿研極膩上為末研勻濕紙裹燒粟米飯丸麻子大一歲一丸八九歲以上至十五歲服八丸炮皂子煎湯放冷下挾風熱難動者先服涼藥一服乳癖者減丸數隔日臨臥一服消堅丸消乳癖及下交奶又治痰熱膈實取積硇砂末巴豆霜輕粉各一錢黃明膠末五錢細墨少許水銀沙子兩皂子大上同研細末少入麵糊為丸如麻子大倒流水下一歲兒服一丸食後白餅子治小兒腹中有癖不食但飲乳是也滑石輕粉半夏湯洗焙乾南星各一錢為末巴豆二十四粒去皮膜水一升煮水盡為度上研勻巴豆後入衆藥以糯米飯為丸如小緑豆大捏作餅子兒三歲以上三五餅三歲以下一二餅蔥白湯下臨臥服張渙萬靈丹治小兒脾胃久不和挾積服溫熱藥皆不效此藥神妙肉桂川黃連蓬莪朮各一兩肉豆蔻仁檳榔陳橘皮去白焙乾木香丁香各半兩以上搗羅為細末次用巴豆去皮心膜杏仁麩炒去皮尖二件並燈上燒灰存性各二七個上件同再搗拌勻滴水丸黍米大每服未周晬一粒二三歲二粒三四歲三粒五七歲五粒十歲以上七粒用生薑湯放冷下乳食後久積或乳癖並宜常服剪紅丸磨癖積殺諸蟲進飲食神效男女老幼皆可服孕婦勿服乾漆炒煙盡紫芫花醋拌炒各一錢巴豆七粒去皮膜心不去油斑蝥七枚去頭足翅炒研時塞兩鼻孔上為丸醋糊丸梧桐子大用紅砂包紅線縛定剪下來每服一丸同後藥服之南木香雷丸三稜生莪朮生百部微炒各半兩貝母檳榔大黃生各一兩使君子肉四十九枚半生半炒牽牛生半斤取頭末三兩半為細末用皂角十錠捶碎山茵陳一兩苦楝根皮二兩水四五碗砂鍋內慢火煎至一小碗將前末搜為丸梧子大日乾小兒粟米大每服二錢半重各隨後證改湯使引下五更初服忌葷腥生硬油膩物此方與諸方甚異毋忽小兒齁䶎喘急咳嗽桑白皮湯下取寸白蟲煎石榴根湯下腳氣腫不可行木瓜湯或蜜水下取蛔蟲苗蟲沙糖水下小兒一切諸證蜜水或沙糖水下酒痢酒積百藥煎湯下婦人血脈不行淡醋紅花湯送下婦人血蠱蔥白湯下腸風下血煎山梔子湯下大小便不通淡醋湯下食積氣塊諸證用溫蜜水溫茶湯下真方五色丸子治小兒一切所傷痰涎壅塞胸膈不利乳食不消變生癖積脅肋片硬按之疼痛及治一切急慢驚風發搐痰涎壅塞青丸子青黛別研南星薑製各半兩巴霜半錢紅丸子硃砂水飛半夏薑製各半兩巴霜半錢黃丸子大黃煨鬱金各半兩巴霜半錢白丸子白附子生寒水石煅各半兩巴霜半錢黑丸子五靈脂炒全蠍炒各半兩巴霜半錢上前五色藥各另研為細末入巴霜半錢同勻麵糊丸粟米大一歲服五丸乳汁送下量大小加減或薑湯下急驚金銀薄荷湯慢驚生薑全蠍湯下積丸治乳食傷積心腹脹滿氣粗壯熱或瀉或嘔丁香二十粒縮砂仁二十枚使君子肉五枚烏梅巴豆肉不去油各三枚上為末爛飯丸麻子大每服三丸陳皮湯下五珍丸治酒食積通用青皮乾薑燒存性蓬朮五靈脂各一兩巴豆肉去半油一錢上為細末粳米飯丸麻子大每服三五丸米湯下局方進食丸治乳食不化心胸脹滿疳積肚疼木香炮枳殼去白炒當歸代赭石各五錢硃砂另研三錢巴豆去油膜一錢麝香另研五分上為細末麵糊丸如黍米大一歲二丸量兒大小加減米飲送下六聖丸曾氏治諸積和胃大能主氣厚腸消疳快膈莪朮炮銼淨黃連陳皮去白白姜炮各五錢南木香二錢半上除木香不見火餘四味銼焙同木香為末每一錢重巴豆三粒去殼膜心存油碎切入乳鉢細研同前藥再研勻醋煮麵糊丸麻仁大每服十五粒至二十五粒或三十五粒五更空心淡薑湯下利三五行勻氣散止補方見疝常服助脾化積進食消疳臨睡以淨湯或湯酒下三粒及五粒每次止丸藥末三錢淨巴豆九粒為則不可多合久則味散烏犀丸曾氏主諸積滯夾驚夾風溫胃調脾消進飲食吐逆醋餿氣面黃肌瘦不拘孩兒生後歲月遠近並宜可投烏犀即皂角銼三寸長皮灰火中見青煙起為度取出地上瓦盆蓋定存性冷用七錢硫黃白姜各三錢半陳皮去白川烏炮去皮臍各五錢巴豆去殼膜心存油七十七粒上先研硫黃細除巴豆外餘四味同焙為末卻薄切巴豆細研同前五味藥末杵勻用粳米飯包作一大粽子小瓦瓶盛水熟煮候冷取出沙鉢內爛杵細布兜緊絞出如稠糊安在別器內以藥末亭分同杵細軟丸粟粒大取諸積每服十五丸或五丸或二十一丸至三十三丸並用淡薑湯泡冷飯取汁小盞五更初空心送下通利三五行以勻氣散止補治積吐有醋餿氣每服三丸至五丸用淡薑湯入米醋少許候溫空心下水晶丹曾氏治驚積食積蟲積腹脹煩啼心惡食減面黃並宜通利此藥有頑積驚重風緊涎多熱極乃可服非常用之劑及急驚後風痰未盡免生癡疾宜再投南星銼作小塊湯煮少時半夏湯泡去滑各三錢滑石四錢輕粉五十帖淨蕪荑二百片巴豆五十粒去殼湯泡七次又去心膜作兩半水煮少時曬乾碎切上前三味焙為末拌和輕粉外蕪荑巴豆同碎切在乳鉢內細杵入前藥末再拌勻如烏犀丸內製糊丸麻仁大每服十五丸至二十五丸或三十五丸糯米湯泡蔥白取汁小盞五更初空心下過三五行進勻氣散調補下風痰淡薑湯空心服聚寶方聖餅子取一切積及虛中積下風涎藥取病甚穩全不搜攪輕粉粉霜各四錢石燕子大者二枚先為細末延胡索大者二十八個為末上四味同研勻滴水和丸如大棋子大仍放厚陰乾每服一餅先用熟水浸軟冷漿水調下臨臥更深服後急漱口此藥只取積滯並不損氣更臨時加減若下驚積則每料更入硃砂生龍腦各一錢重小兒一餅作四服或便捏成小餅子吉氏追魂散治果子傷積白丁香輕粉官桂去粗皮各三錢上為末冷水調下半錢睡時服來日取下所傷物用異功散煎紫蘇木瓜湯調三服和氣異功散方見吐瀉沉香檳榔丸和脾助胃進食清神寬胸快膈順氣調中悅顏色壯筋骨理面帶痿黃肌膚瘦弱過食生果停寒在裡乳癖腹脹作疼及吐利瘧腫瘥後諸疳蟲積沉香檳榔檀香南木香丁皮三稜炮銼神麯炒莪朮炮麥芽洗炒厚朴刮去粗皮薑汁炙蒼朮米泔浸銼炒黃使君肉銼瓦上焙乾青皮陳皮各去白縮砂仁益智仁淨香附枳殼去穰麩炒燥良薑制各半兩甘草炙一兩半上除前五味不見火餘十五味銼焙仍同沉香等為末水煮麵糊丸麻仁大每服三十丸至五十丸溫米湯無時送下兒小不能吞咽煉蜜丸如芡實大每以一丸至二丸溫湯化服集驗蓬朮丸治乳食不化心腹脹滿一切所傷三稜莪朮並煨淨陳皮淨香附炒蘿蔔子炒各半兩砂仁淨青皮淨枳殼麩炒胡黃連蘆薈各三錢胡椒二錢半上細末糊丸黃米大每三十丸加至四五十丸溫米飲下日三二服忌生冷硬物乳積其候但是吐下乳來有酸臭氣因啼叫未已遽與乳吃停滯不化而得茅先生先用丁香散吐瀉調胃後下牛黃丸取下奶積後下勻氣散不乳食常服健脾散不乳食即愈聖惠乳癖之候面色青黃發歇壯熱吐乳多睡口內生瘡漸漸黃瘦腹內結塊不散由乳母食飲無常醉飽過度便即乳兒或乳母偏臥一向乳兒不能回轉兒亦睡著乳滯偏於脅下因茲結聚成塊而痛者是也聖惠京三稜散治乳癖結實或有滯惡停積不化令兒日漸羸瘦面色痿黃春夏多發不欲乳食京三稜川大黃微炒檳榔鱉甲赤茯苓各半兩枳殼麩炒微黃二錢半上搗羅為散每服一錢水一小盞煎至五分去滓分為二服日三四服逐下惡物為度張渙三稜散治小兒乳癖結實不瘥京三稜炮銼赤茯苓當歸洗焙乾鱉甲醋炙黃去裙各一兩枳殼麩炒去穰木香白朮各半兩上搗羅細末每服一錢水一盞入生薑七片煎至五分去滓放溫時時與服聖惠化癖丸治乳癖結塊久不消化諸藥無效巴豆霜半兩膩粉硃砂各一錢研黃鷹糞二錢半硇砂雄雀糞各一字上件都研如粉用糯米飯和丸如黍米大一歲兒每服空心煎皂莢仁湯下二丸取下惡物為度丁香化癖散丹溪治乳癖白丁香密陀僧硫黃以上各二錢硇砂五分輕粉少許上研細末每一歲兒服五分男病女乳調女病男乳調出下黑糞為度後用通膈丸泄之二丁丸見疳門疳熱條青礞石丸治證同前硫黃三錢青礞石五靈脂鍋底黑各一錢半白丁香一錢去土為末米飯丸緑豆大捻餅子每服二十餅溫水下玉訣銀白散生胃氣取下後宜服此方人參茯苓甘草炙白朮麥麵炒白扁豆去皮藿香葉上各等分末一錢紫蘇湯調下張氏治小兒奶癖方用芫花一兩醋浸三日淨洗大黃半兩為末入蒜一斤同藥末研爛勻男左女右用藥塗在乳母手心尉擦癖上如聞得患人口中出藥氣即時取了立效董氏家傳治小兒奶癖極效方紫河車二兩寒食麵三兩上同為細末每用一匙許水調塗足心病在左塗左病在右塗右塗於紅帛上縛之良久其病大便中下去救人多矣大便盡洗去孔氏家傳治小兒奶癖方上用密陀僧不拘多少研極細以大蒜自然汁調稠稀得所塗於有奶脾處據其大小周遍又不可塗之太過須臾候兒口中有蒜氣息即是藥透子細以手揉之覺奶脾似消及五六分即用溫漿水洗去切須量度不可令消盡恐藥毒損氣也如未消藥先干即以溫水潤之談氏殊聖治月里孩兒奶癖方紫河車草人參各等分上為末用好醋調拍成餅子如大錢大如左畔有癖者藥貼左畔腳心用緋帛扎干後見效左右一般使藥食積肚硬而熱於他處或瀉或嘔因飲食過飽飽後即睡而得茅先生用牛黃丸取積後用勻氣散調理常服萬靈丸即愈錢氏消積丸真珠丸方見前快膈消食丸砂仁淨陳皮三稜莪朮神麯麥糵各半兩淨香附子另炒一兩為末糊丸如麻子大食後白湯下看輕重卻用下積藥一方加制枳殼氣積其候面色黃白不進食腹痛夭矯啼叫利如蟹渤此因榮衛不和二氣乖忤日久得之茅先生用萬靈丸勻氣散醒脾散建脾散相夾調理祕録治小兒氣癖取三稜汁作羹粥以米麵為之與乳母食每日取一棗大與兒吃亦得作粥與羹熱食之治小兒十歲以下及新生百日無問癇熱無辜痃癖等皆理之妙不可言中脾積面黃如土色或面帶虛浮臍上微痛肚皮熱飲食減少才食便言臍上及腹中痛所食不化頭微熱此因先食硬物或冷物所傷在脾治之先下青金丸見前取下脾中積後用勻氣散醒脾散調理常服健脾散萬靈丸即愈驚積曾有時時泄清水如生米汁是受傷而復有積煩悶啾唧常以生嗔名為驚積先解驚後理積解驚五苓散或百解散理積三稜散或烏犀丸及三解散炒神麯生薑煎湯調服醒脾散沉香檳榔丸寧驚化積壯氣和胃仍節冷乳自然平治莊氏紫金丸治大人小兒因驚積聚黏滑毒物在脾胃纍曾用藥取不下變成虛中積大人吃食吐逆心腹脹滿夜有虛汗日漸瘦惡用薑棗湯下七丸婦人血氣米飲下五丸至七丸小兒驚積體熱困重目不開用黃連甘草桃仁薄荷湯化膩粉一字許下一歲上三歲下三丸小兒只可一丸二丸蠍梢三七個犀角末銀末硃砂各一錢上研極細末用水麵糊為丸緑豆大依前湯使莊氏軟金丸治驚疳下積聚青黛膩粉胡黃連麝香各二錢半寒食麵三錢使君子三個天漿子三七個上七味研勻滴水丸梧桐子大每服一丸用金銀薄荷湯化下劉氏桃紅散治小兒驚積疳積常服進食面如桃花馬牙硝硃砂茯苓人參各等分上末之二歲服二字一歲一字三歲亦二字四五歲三字新汲水入少蜜調下蜜水約盞內三分許湯氏云驚癖須用礞石藥方可治之虛中積其候渾身微熱不思飲食昏昧神緩抱著一似睡未覺肚熱足冷者多因吐瀉大病及攻擊之後而得此候茅先生先用青金丸取積後用勻氣醒脾散調理常服萬靈丸保童丸即愈王先生靈砂丹下虛中積臟腑虛滑泄瀉久經取轉裡急後重久積惡痢暴瀉久不止神效通明硇砂一錢顆塊辰砂通明有牆壁者二錢半各細研上二味袞研極細用黃蠟半兩先於盞內熔化入去皮全巴豆三七粒煎候巴豆紫色為度漉豆出細研入前二味再研勻於黃蠟內三分取一再熔成汁傾藥入內急攪令勻刮入瓷合收之每服暴瀉惡痢旋絶三丸如緑豆大濃煎艾湯先呷三五口然後吞下水瀉冷水吞下如取積每服三丸如梧桐子大濃煎甘草湯放冷吞下臨臥服其久積藥隨積下其小可不動便安按既是虛即不宜用峻劑取積仍須用四君子益黃散之類相兼服之實積其候大便不通風毒瘡癤喉閉痄腮咽中涎響茅先生先用奪命散急驚吐下熱涎後用勻氣散醒脾散調理常服牛黃膏天竺黃散並實熱鎮心丸即愈積痛仲陽云積痛口中氣溫面色黃白目無精光或白睛多及多睡畏食或大便酸臭者當磨積而痛自除宜下積丸甚者白餅子下之後和胃氣用白朮散渴小沉香丸感應丸治之又有食積肚痛有熱者芍藥甘草湯腹痛加乾葛吐者加半夏生薑或加枳實亦效小沉香丸和中順氣進食消痰砂仁蓬朮各四錢煨香附子去毛炒一兩八錢舶上丁香皮二兩四錢沉香六錢甘松去土三兩六錢益智仁微炒一兩二錢甘草炙一兩四錢上為細末湯浸蒸餅丸如桐子大每服三十或四十丸食後溫薑湯下或嚼破更妙積寒熱良方妙香丸治小兒虛中積潮發寒熱心腹脹滿疼痛辰砂一兩牛黃生龍腦麝香各二錢半金箔十四片粉霜膩粉各一錢黃蠟二兩巴豆肥者一百二十粒上丸如彈子大量虛實加減龍腦漿水下夜半後服臟虛即以龍腦米飲下每服三丸如小豆欲藥勢緩即按令扁疾堅者加至十丸皆以針刺作數孔以行藥力小兒取積丸如緑豆治小兒吐逆尤效此藥最下胸中煩及虛積嬰孺治小兒自下後得寒熱血結成癖氣在左脅下或寒飲或冷食積聚氣動胸心留熱不下食飲暗瘦宜先服少飲子散氣下食後服紫雙丸去宿積自充溢也飲子方柴胡茯苓人參白朮鱉甲醋塗炙香熟各半兩上切如豆大水二升煮五合空心分溫三四服相去如人行一二里久再服食粥將息痃癖茅先生論小兒生下五個月日上至七歲有結癖在腹成塊如梅核大來去或似卵大常叫疼痛者亦分數類在左脅下痛者名痃氣在右脅下痛者名癖氣下蓬莪朮散夾建脾飲不乳食與服即愈如見面黑眼直視瀉黑血鼻口冷手足冷不進食者死錢氏論小兒病癖由乳食不消伏在腹中乍涼乍熱飲水或喘嗽與潮熱相類不早治必成疳以其有癖故令兒不食致脾胃虛而熱發故引飲過多即蕩滌腸胃亡失津液胃不能傳化水穀其脈沉細益不食脾胃虛衰四肢不舉諸邪遂生鮮不瘦而成疳矣論癖為潮熱云曹宣德子三歲面黃時發寒熱不欲食而飲水及乳不止衆醫以為潮熱用牛黃丸麝香丸不愈及以止渴乾葛散服之反吐錢曰當下白餅子見前後補脾乃以消積丸磨之見前此乃癖也後果愈何以故不食但飲水者食伏於管內不能消致令發寒服止渴藥吐者以藥沖脾故也下之即愈仁齊曰癖者血膜包水側僻於脅旁時時作痛也惟癖為能發潮為能生寒熱故瘧家中脘多蓄黃水日久而復結癖寒熱不已有是疾者以此小兒臟腑和平榮衛調暢則津液自然流通縱使多飲水漿不能為病惟乳哺失調三焦關隔以致水飲停滯腸胃不能宣通如冷氣搏之則結聚而成癖輕者用積滯木香丸重者用取癖丸曾氏曰嬰兒始生稟賦未完失於襁褓之不謹乳哺之不節外為六淫侵襲內因五臟氣虛冷積久停於脾不能克化結成癖鬼突於脅下或左或右俗曰龜𤹔其疾皆因積滯蘊作致有寒熱或腹肚疼痛或晝涼夜熱治療之法氣實者亦須溫正胃氣後用烏犀丸或水晶丹下之如過二三次即以稀粥略止候所作形證消盡方投補益之劑氣虛者先與調脾胃固真元神色稍正飲食進多如前法下之若太虛甚用三稜散化癖丸漸消之順適陰陽以平為期然先補後瀉行迎奪之法則取去陳寒冷積若面黃唇白發豎肌瘦乃為虛極不可輕下但徐徐用藥消化調理為上若兒小者更令乳母常服藿香飲使藥從乳過亦少助也茅先生蓬莪朮散主小兒痃氣一切氣疾蓬莪朮青橘皮益智各半兩木香二錢半糯米一兩上為末每服一大錢用陳米飲調下日進四服聖惠鱉甲散用鱉甲一枚塗醋炙令黃去裙襴上搗細羅為末每服一錢以童子小便一小盞煎至五分量兒大小分減服之日三服神效化癖丸曾氏主癖結氣塊在脅之間日久不化乍寒乍熱腑臟不調米穀不消哽氣喘促胸腹滿悶及理丁奚哺露南木香陳皮去白莪朮炮銼三稜炮銼青皮巴豆九粒去皮膜心微炒去巴豆枳殼去穰麩炒檳榔七味各半兩白朮丁香二味各二錢細辛燒存性四錢上除木香檳榔丁香不過火餘七味焙同前三味為末曲糊丸作麻仁大每服十五丸至二十一丸清米湯空心下有寒熱往來以柴胡飲間服忌油膩生冷木香丸治吐乳瀉乳其氣酸臭由啼叫不已以乳與兒停滯不化是為乳積肚硬熱渴吐瀉由飲食無度過飽即睡是為食積腹痛啼叫利如蟹渤由觸忤其氣榮衛不和淹延日久是為氣積瘧後肚內結癖成塊木香蓬朮砂仁青皮去白硃砂研細代赭石研各二錢大丁香川巴豆肉紙壓去油各一錢上為細末和勻飛白麵糊為丸麻子大每服二三丸乳傷乳汁下食傷米飲下取癖丸峻劑非實積危甚不用甘遂微炒芫花炒牽牛半炒半生研取末辣桂蓬朮青皮去穰木香桃仁浸去皮炒五靈脂各二錢上為細末入去油巴豆一錢研和十分細飛麵糊丸麻子大每服一二丸姜蜜煎湯灌下泄後冷粥補仍和胃挨癖丸治乳癖谷癥腹中塊痛木香青皮去穰蓬朮代赭石火煆醋淬細研生地黃各三錢巴豆壓去油盡一錢上為細末醋麵糊丸麻子大每服二丸食後擦姜泡湯下外臺必效療大人小兒癖方上取車下李仁微湯退去皮及雙仁與乾麵相半搗之為餅如猶干和淡水如常搜面大小一如病人手掌為兩餅微炙使黃勿令至熟空肚食一枚當快利如不利更食一枚或飲熱粥汁即利以快利為度至午後利不止即以醋飯止之利後當虛病未盡者量力一二日更盡一服以病盡為限小兒亦以意量之不得食酪及牛馬肉無不效但病重者李仁與面相半輕者以意減之後服者亦任量力頻試瘥神效聖惠前胡丸治小兒癖氣腹痛前胡桔梗各去蘆赤芍藥赤茯苓枳殼川大黃當歸郁李仁去皮微炒各半兩鱉甲一兩炙令黃上件搗羅為末煉蜜和丸如緑豆大三歲兒每服空心以粥飲化破五丸服量兒大小加減嬰孺治小兒閃癖身體壯熱頻服冷藥冷氣漫心成癖下焦又冷腸結大便難方茯苓川芎鱉甲炙枳殼炙芍藥各二分柴胡四分上銼以水一大升三合煎至三合空心為二服去如人行五六里再服忌莧子朱氏知母丸治小兒腹痛不調兼癖氣知母六分鱉甲炙四分牡蠣枳殼麩炒各三分大黃十二分紙裹煨熟上件為末蜜丸如緑豆大米飲下五丸大人以意分減服治七八歲兒多睡或時壯熱日加羸瘦身雖不痛有時痢膿嘔逆不食是癖氣之候其疾似瘧疾人多不識此患方柴胡黃芩各一分枳殼炒兩片甘草知母芍藥各二分大訶梨勒煨取皮一個小者用二個上件為末水一盞煎服針灸小兒癖氣久不瘥者灸中脘一穴章門二穴各七壯章門在大橫外直臍季脅肋端側臥曲上足伸下足舉臂取之中脘在上脘下一寸臍上四寸居心蔽骨與臍之中從𩩲骭下取病人四指定穴並炙臍後脊骨中二七壯無不驗渴潔古論渴有三種一者實熱積於心脾煩躁大渴引飲宜白虎湯謂不因吐瀉大病忽然而作二者因久病或取轉過度致脾虛引飲宜白朮散三者因患濕熱病熱結膀胱小便不利大渴引飲有表裡證者宜五苓散主之百問云小兒唇紅如丹即發渴紅甚焦黑則危篤若三焦虛煩作渴者用三黃湯傷寒後唇口焦者用白虎湯竹葉湯瀉痢作渴者用四苓散之類常治暑積心脾煩渴引飲者用白虎湯下利脾虛作渴用七味白朮散熱結膀胱小便祕渴者用五苓散上焦虛熱者用四君子湯膏粱積熱者用清胃散脾胃積熱者用瀉黃散中氣虛熱者用異功散腎水虛熱者用六味丸其餘疳證發熱各詳本證胎稟所致者當各審其因若誤用寒涼降火脾胃復傷則腹脹而為敗證矣實熱白虎湯發熱三黃湯黃芩黃連黃柏各等分上水煎服聖惠黃連散治小兒心肺積熱渴不止咽喉干痛黃連去須射干川升麻白茯苓麥門冬去心焙玄參甘草炙微赤銼桑根白皮黃芩各半兩上件藥搗粗羅為散每服一錢以水一小盞入青竹葉七片煎五分去渣入蜜半合更煎一兩沸放溫時時與兒呷之麥門冬散治小兒心肺熱壅口渴不止麥門冬去心梔子仁犀角屑知母甘草炙黃芩各半兩上為散每服一錢水一盞入竹葉七片煎五分不計時候服亦可量兒大小分減服聖惠銀飲子治小兒熱渴不止銀五兩石膏寒水石蠶蛹繭各二兩上件藥以水三升入銀石三味煎至一升去銀石次下蛹繭煎至七合去渣每服半合不計時候溫溫服之量兒大小加減栝蔞根散治小兒熱渴不止煩悶栝蔞根三分黃芩知母各半兩上件藥搗羅為散每服一錢以水一小盞入小麥粟米一百粒煎至五分去渣不計時候溫服量兒大小以意加減又方栝蔞根三分黃芩半兩小麥半合上件以水三盞煎取一盞去渣不計時服量兒大小加減又方生葛汁竹瀝各二合上件汁相和令勻不拘時服半合量兒大小加減茅先生胡黃連散治小兒諸渴及疳渴解諸般熱胡黃連麥門冬乾葛玄參甘草炙枇杷葉炙去毛上各等分為末每服一錢水七分一盞生薑一片同煎五分後放蜜三五滴同煎至四分溫服虛熱聖惠蘆根散治小兒壯熱不止蘆根黃耆人參甘草炙麥門冬知母各半兩上件粗羅為散每服一錢以水一小盞入竹葉七片粟米一百粒煎至五分去渣不計時候溫服量兒之大小以意加減嬰孺麥門冬湯治小兒夏天服藥大下後胃中虛熱渴欲飲水麥門冬甘草龍骨各四分枳實黃芩茯苓人參各三分上以水四升煮取一升半為三服服此湯後渴不瘥取水芹煮濃汁飲之間湯服之甚者恣意與之服蘆根飲子治小兒壯熱渴兼吐不止生蘆根切五合淡竹青皮人參各八分桔梗五分知母十分粟米三合上以水五升煮之一升半量兒大小與之服栝蔞湯治小兒熱渴或吐下後虛熱渴栝蔞五分黃芩三分知母蘆根各二分生米二合麥門冬三合上切以水五升煮二升如飲漿水度服之脾虛錢氏白朮散人參切去頭白朮木香白茯苓去皮甘草銼炒藿香葉各一兩乾葛二兩銼上為粗末每服一錢至二錢水一盞煎至五分溫服如飲水者多煎與之無時海藏云治發渴四君子加乾葛枇杷葉先以棗湯煮過炙乾用各等分入木瓜少許同煎服亦治虛渴法也濕熱五苓散方見驚小方脈論小兒渴病吃水太多腹脹泄瀉此病得之心藏熱心與小腸合小腸亦受熱小腸既熱其氣上行奔胃口致孩子吃水其水待奔小腸被小腸氣熱滲泄不及轉入大腸如治之先下淋藥後下涼心藏藥然後止渴乃效按此亦五苓散證也小方脈論治渴先下淋藥方鬱金滑石各一兩旱蓮子半兩上件為末每服半錢煎蔥湯調下急進三服涼心藥小方脈論欲止渴次涼心藏藥方烏賊魚骨海浮石各一兩蒲黃炒半兩上末每半錢用枇杷葉煎湯下黃疸錢乙論黃相似云身皮目皆黃者黃病也身疼膊背強大小便澀一身盡黃面目指爪皆黃小便如屋塵色看物皆黃渴者難治此黃疸也二證多病於大病後別有一證不因病後身微黃者胃熱也大人亦同又有面黃腹大食土渴者脾疳也又有自生而身黃者胎疸也古書云諸疸皆熱也深黃者是也若淡黃兼白者胃怯胃不和也難知云色如熏黃乃濕病也一身盡痛色如橘子黃者黃病也身不痛干黃燥也小便自利四肢不沉重渴而引飲者梔子柏皮湯濕黃脾也小便不利四肢沉重似渴不欲飲者大茵陳湯大便自利而黃者茵陳梔子黃連三物湯往來寒熱一身盡黃者小柴胡加梔子湯潔古云陽黃則大小便赤澀身熱是脾土與心火相搏為陽病法當先利小便後下大便陰黃則清便自調面目及身黃四肢冷是脾虛不能制腎水當用益黃散下使君子丸益黃散方見脾使君子丸方見疳凡治黃病腹脹當用茵陳蒿湯調下五苓散若欲利小便去大黃欲利大便則加大黃之類有陽證可服謂面赤飲水者是也湯氏云身疼膊背疼大小便澀皮膚面目齒爪皆黃小便如屋塵色利者易治澀者難治宜服五苓散加茵陳煎湯調又宜服導赤散加茵陳煎或身熱宜服小柴胡湯甚者服承氣湯曾凡黃病者不可一概而論標本不同證治亦異乃脾胃氣虛感受濕熱鬱於腠理淫於皮膚蘊積成黃熏發於外故有此證或脾胃虛弱內因症癖攻之而成然疳瀉亦主皮黃髮豎肚大青筋肌肉消瘦外無色澤身必發黃此又本於疳病而作致有是證治法若感濕熱而得身黃如煙燻之色以㕮咀五苓散加麻黃水姜煎投汗之即愈或用茵陳蒿湯調下五苓散亦好若得於疳癖者其形如黃土相類以醒脾散慢驚化癖丸積醒脾快胃磨積理疳胃氣既和飲食倍進運化精微榮養百骸灌溉臟腑五色各見於本部精華乃形於面貌其黃自除薛經曰中央黃色入通於脾故黃疸者脾之色也夫人身之神貴於藏而默用見於外則內虛矣其證皆因脾氣有虧運化失職濕熱留於肌膚發而為疸錢仲陽所謂身痛背強二便澀滯遍身面目爪甲皆黃是也小便褐色者難治療法宜固脾為先如專用克伐寬中淡泄利水之藥則鮮有不至危者矣若初生及百日半年之間不因病而身黃者胃熱胎黃也腹大食土為脾疳兼作渴飲冷者用瀉黃散脾小便不利者茵陳湯病後發黃肢體浮腫者用白朮散渴清便自調肢冷嗜臥者益黃散脾身淡黃白者調中丸腹痛及補中益氣湯虛熱加茵陳身熱膈滿肌膚面目皆黃者加減瀉黃散辨其所以若閉目壯熱多哭不已大小便赤澀口中熱氣者乃妊娠厚味胎毒之候也母子並服生地黃湯胎黃仍忌酒面五辛熱物設不自慎誤傷脾土急則變為驚風吐瀉緩則肢體浮腫小便不利眼目障閉多成疳疾矣又有脾虛發黃者當於脾胃中求之陽黃諸方茵陳湯治陽明病發熱汗出者此為熱越不能發也但頭汗出身無汗齊頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃傷寒七八日身黃如橘色小便不利腹微滿者宜此茵陳蒿嫩者一兩大黃三錢半梔子大者三枚上銼散以水一大盞先煎茵陳減半次納二味煎八分去滓溫服日三服小便當利如皂角汁狀色正赤一宿腹減黃從小便中去也量大小加減梔子柏皮湯治傷寒身黃髮熱梔子八枚黃柏一兩甘草半兩炙上銼散每服二錢水一盞煎六分去滓溫服犀角散治小兒黃疸一身盡黃犀角鎊一兩茵陳乾葛升麻龍膽草生地黃各半兩寒水石七錢半上銼散水煎服一方治小兒忽發黃面目皮肉盡黃葛根搗汁和蜜服連翹赤小豆湯治小兒傷寒發黃身熱麻黃去節連翹甘草生薑赤小豆生梓白皮各二兩杏仁四十一個大棗十二枚上銼散白水煎又一方生小麥苗搗汁服之立效羅謙甫治一小兒季夏身體蒸熱胸膈煩滿皮膚如漬橘之黃眼中白睛亦黃筋骨痿弱不能行立此由季夏之熱加以濕氣而蒸熱搏於經絡入於骨髓使臟氣不平故脾遂乘心濕熱相合而成此疾也蓋心火實則身體蒸熱胸膈煩滿脾濕勝則皮膚如漬橘之黃有餘之氣必乘己所勝而侮不勝是腎肝受邪而筋骨痿弱不能行立內經言脾熱者色黃而肉蠕動又言濕熱成痿信哉斯言也所謂子能令母實實則瀉其子也蓋脾土退其本位腎水得復心火自平矣又內經曰治痿獨取於陽明正謂此也加減瀉黃散主之加減瀉黃散方此藥退脾土復腎水降心火黃連茵陳各五分黃柏黃芩山梔茯苓各三分澤瀉二分上㕮咀都作一服水一盞煎至六分去滓稍熱服食後一服減半待五日再服而良愈經云土位之主其瀉以苦又云脾苦濕急食苦以燥之故用黃連茵陳之苦寒除濕熱為君腎欲堅急食苦以堅之所以黃柏之苦辛寒強筋骨為臣濕熱成煩以苦瀉之故以黃芩山梔子之苦寒止煩滿為佐濕淫於內以淡泄之故以茯苓澤瀉之甘淡利小便導濕為使也張渙蘆根湯治黃病蘆根一兩銼茵陳山梔子黃芩甘草四味各半兩上件搗羅為細末每服一錢水八分入薄荷三葉煎至五分去滓放溫服子芩散治黃病黃芩枯蔞根茯神各一兩甘草胡黃連各半兩上件為細末每服一錢水八分煎五分去滓溫服茵陳湯治小兒發黃等病身如橘色山茵陳山梔子仁各一兩川大黃川芒硝木通寒水石各半兩上煎服法同前三黃散治小兒黃疸川大黃銼微炒一兩黃芩黃連去須各半兩上煎法同前食後服雙連丹治疸病川黃連去須胡黃連各一兩上件搗羅為細末用黃瓜一枚去穰留一小蓋子入二藥末後以蓋子蓋定用麵裹慢火燒令面焦去面搗熟如緑豆大每服七粒至十粒溫水下量兒大小以意加減陰黃諸方當歸散見悲哭門夜啼條當歸丸治小兒冷熱不調大便青黃心腹多痛或腹中氣滿或時嘔逆不欲飲食加枳殼尤妙當歸白芍藥人參川芎各三錢甘草炙白朮各半兩上為末水煮麵糊為丸如麻子大三歲兒每服十丸粥飲下日三服量大小加減冷甚加陳皮小半夏湯治黃疸小便色不異欲自利腹滿而喘者不可除熱熱去必噦半夏湯洗七次上銼散每服三錢水一盞姜十片煎七分去滓溫服滲濕茯苓滲濕湯治小兒黃疸寒熱嘔吐而渴欲飲水身體面目俱黃小便不利不得安臥不思飲食茯苓五分澤瀉三分茵陳六分豬苓黃芩山梔黃連防己白朮蒼朮陳皮青皮枳殼各二錢上㕮咀水煎徐徐溫服消食消食丸治小兒脾胃不和常服寬中快氣消乳食正顏色縮砂仁陳皮三稜蓬朮神麯炒麥芽炒香附子米泔浸炒枳殼檳榔烏梅各半兩丁香二錢半上為末麵糊丸緑豆大食後紫蘇湯下二三十丸丹溪治小兒吐瀉黃疸方三稜蓬朮青皮陳皮神麯麥芽黃連甘草白朮茯苓各等分上為末溫熟水調服若傷乳食吐瀉加山楂時氣吐瀉加滑石發熱加薄荷和胃淡黃白者胃不和也平胃散不乳食調中丸腹痛渴者白朮散渴搐鼻瓜蒂散治小兒忽發心滿堅硬腳手心熱變為黃疸不急治則殺人瓜蒂七枚赤小豆七粒秫米七粒上為末用一字吹兩鼻內令黃水出余末盡水調服之得吐出黃水即愈一方瓜蒂一兩赤小豆四兩為末每一錢溫湯調服服後即臥當吐清黃汁為效虛者不宜服千金翼秦王九疸散兼治大人小兒方胃疸食多喜飲梔子仁主之心疸煩心心中熱茜根主之腎疸唇乾葶藶子主之熬脾疸尿赤出少惕惕恐栝蔞主之膏疸飲水尿多秦椒瓜蒂主之椒汁膏一作肺舌疸渴而數便鍾乳主之肉疸小便白凝水石主之髓疸目深多嗜臥牡蠣澤瀉主之肝疸胃熱飲多水激肝白朮主之上一十一味等分隨病所在加半搗篩為散飲服五分匕日三稍稍加至方寸匕兒小者量與之黑疸千金翼治大人小兒黃疸變成黑疸醫所不能治方上用土瓜根搗汁一升頓服之病當從小便出小兒分減服葛氏亦治小兒四歲發黃者千金冀治大人小兒黃黑等疸方當歸三兩桂心六兩干棗十七枚去核麥門冬一升大黃一兩茵陳黃芩黃耆一本無乾薑茯苓芍藥黃連石膏碎人參甘草各二兩上十五味㕮咀以水一斗煮取三升半分四服小兒分減服千金翼赤苓散主黑疸身皮大便皆黑通治大人小兒赤小豆三十枚茯苓女萎各六銖雄黃一銖瓜丁四銖甘草二銖上六味以水三升煮豆茯苓取八合搗四味為散和半錢匕服之須臾當吐吐則愈亦主一切黃小兒服半字匕滯頤巢氏論滯頤之病是小兒多涎唾流出漬於頤下此由脾冷液多故也脾之液為涎脾氣冷不能收制其津液故冷涎流出滯漬於頤也按內經云舌縱涎下皆屬於熱而此專屬脾冷亦一偏之見張渙處冷熱各二方為得之然以流出為冷不流出為熱恐亦未確張渙溫脾丹治脾冷病丁香木香各一兩半夏一兩用生薑六兩同搗細炒令黃青橘皮白朮乾薑微炒各半兩上件搗羅為細末煉蜜和如黍米大每服十粒米飲下量兒大小加減溫胃散治脾冷流涎丁香一兩肉豆蔻半夏白礬水浸炒黃白朮乾薑甘草人參去蘆頭各半兩上件搗羅為細末每服一錢水八分入生薑二片煎五分去滓溫服食前金朱丹治脾熱多涎金箔二十片研硃砂細研水飛半夏湯浸七遍取末天南星牛膽制取末各一兩白茯苓取末石膏細研水飛各半兩上件都拌勻再細研用生薑自然汁和如黍米大每服十粒煎人參湯下乳後牛蒡丹牛蒡子一兩鬱金川朴硝枳殼麩炒去穰皂子炒黃各半兩上件搗羅為細末用生薑汁打白麵糊和如黍米大每服十粒煎人參湯吞下量兒大小加減千金治小兒口中涎出方以白羊屎納口中又方以東行牛口中沫塗口中及頤上又方桑白汁塗之瘥大小便不通翰林待詔楊大鄴問小兒大小便祕澀者為何答曰乳食失度使之四大不調滋味有貪遂乃五臟受病甘甜聚食鹹酸滯涎食滯留結於胃腸風壅漬癖於心肺氣脈不順水穀不行雖不逆於上焦即祕結於下部小兒不知疼痛莫說因由驚啼叫以頻頻但怒脹而不乳不知孩兒痛刺連臍則面色青黃但按脈息與治若不見病源只依外變用藥安能克效百問調理嬰孩傷寒體熱頭目昏沉不思飲食夾驚夾食寒熱大小便閉澀不通煩躁作渴冷汗妄流夾積傷滯膈滿脹急青黃體瘦日夜大熱及療傷風傷暑驚癇客忤腎藏疳氣等熱並宜脫甲散主之傷寒亦可服大連翹湯痘便祕加大黃神芎治小兒驚風積熱大小便澀滯其效尤速又掩臍法用連根蔥一莖不洗帶泥土生薑一塊淡豆豉二十一粒鹽二匙同研爛捏餅烘熱掩臍中以綿扎定良久氣透自通不然再換一劑神芎丸治風熱壅滯頭目昏眩口舌生瘡牙齒疳蝕或遍身瘡疥咬牙驚惕怔忡煩躁多渴或大小便澀滯或積熱腹滿驚風潮搐並皆治之大黃生黃芩各二兩生牽牛末一兩滑石四兩黃連薄荷葉川芎各半兩上為細末滴水丸桐子大每服四五十丸食後溫水下一方加蒲黃止血證用錢氏郁李仁丸治襁褓小兒大小便不通並驚熱痰實欲得溏動者郁李仁去皮川大黃去粗皮取實者銼酒浸半日控干炒為細末各一兩滑石半兩研細上先將郁李仁研成膏和大黃滑石丸如黍米大量大小與之以乳汁或薄荷湯下食前犀角丸治小兒風熱痰實面赤大小便祕澀三焦邪熱腑臟蘊毒疏導極穩生犀末一分人參去須切枳實去瓤炙檳榔各半兩黃連一兩大黃二兩酒浸切片以巴豆去皮一百個貼在大黃上紙裹飯上蒸三次切炒令黃焦去巴豆不用上為細末煉蜜和丸如麻子大每服一二十丸臨臥熟水下未動加丸數亦治大人孕婦無損惠眼芍藥散治大小便下藥不通者芍藥大黃甘草炙當歸朴硝各一分上為末每服一大錢水一盞瓦器中煎至半盞去滓服即通吉氏治大小便不通方甘草節炮槐花洗各一兩上件末每服一錢茶半錢湯點下又方滑石一大錢燈心一握上以水二碗煎至一盞溫服子母祕録用蜂房燒末酒服一錢日再掩臍法海螄四十九個蔥根帶土七個黑豆七個鹽少許握宣丸治小兒便難燥結或服澀藥腹脹悶亂命在須臾可用此丸不移時大小便自利巴豆一錢半硫黃良薑附子檳榔甘遂各等分上為細末粟米飯和丸如緑豆大用椒湯洗小兒男左女右手握之用綿裹定看行數多少置藥洗去不用即止千金灸法小兒大小便不通灸兩口吻各一壯大便不通百問小兒大便祕乃是肺家有熱在裡流入大腸以致祕結不通乃實熱也當以四順清涼飲熱加柴胡熱甚者加山梔黃芩流利之其表裡俱熱者面黃頰赤唇燥口乾小便赤澀大便焦黃無汗者先解表以柴胡散傷寒汗之解後大便祕或肚疼者以清涼飲大柴胡湯承氣湯並熱皆可下之積熱者神芎丸尤妙薛因乳母或兒膏粱積熱及六淫七情鬱火傳兒為患者用清邪解鬱之劑稟賦怯弱早近色欲大便難而小便牽痛者用滋補肺腎之劑褚氏遺書云男子精未滿而御女以通其精則四體有不滿之處異日有難狀之疾老人陰已痿而思色以降其精則精不出而內敗精已耗而復竭之則大小便牽痛如淋今童子即有此患益見今人所稟與古人大徑庭矣人之氣血厚薄既殊而醫之用藥療法又豈可泥執古方而無加減之變乎一小兒食粽停滯大便不通痛不可忍手足發搐用大柴胡湯調酒麴末一錢下滯穢甚多作嘔不食用五味異功散加升麻柴胡而愈一小兒大便不通審乳母飲食厚味所致用清胃散以治母熱兒間飲以一二匙而愈後乳母感寒腹痛食姜酒之物兒大便祕結兼便血仍用清胃散每日數匙而愈一小兒因乳母暴怒大便不通兒亦患之兼用加味小柴胡湯先用保和丸二服後用五味異功散加升麻柴胡兒日飲數匙並愈聖惠芎黃散治小兒大便不通腹脅妨悶芎藭半兩川大黃銼微炒郁李仁湯浸去皮微炒各三分上件藥搗細羅為散每服一錢以溫水半盞調服量兒大小以意分減以利為度張渙兼治大小便不通張鋭雞峰方用麻子以水研汁飲之
