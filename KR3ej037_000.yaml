front:
  text: 自序醫家以幼科為最難謂之啞科謂其疾痛不能自陳說也稱黃帝之言曰吾不能察其幼小為別是一家料理耳吾獨謂不然夫幼小者精神未受七情六欲之攻臟腑未經八珍五味之漬投之以藥易為見功猶膏粱之變難窮而藜藿之腹易效也何謂難乎然古今輯是科書未有能善者如心鑑之蕪穢類萃之粗略新書則有古無今百問則掛一漏萬皆行於世未足為幼科準繩也故吾輯為是編而麻痘一門尤加詳焉平生聚麻痘書百數十家率人所寶祕千金不傳者然多猥陋不足採擇益可以見世之無具眼矣或曰夫人之病無論男女長幼未有能越五臟者也子於它科不分五臟而獨幼科分之何居曰正以精神未受七情六欲之攻臟腑未經八珍五味之漬獨有臟氣虛實勝乘之病耳粗工不能精究而臆指之曰此為內傷此為外感此為痰此為驚此為熱妄投湯丸以去病為功使輕者重重者死亦有不重不死幸而得愈者然已傷其真元夭其天年矣吾之獨分五臟以此也大中丞沈太素公從大梁寄余俸金百以助刻費而是書稿適成遂鳩工刻之又逾年始竣因序而識之使後之人有考焉時萬曆三十五年在丁未夏五十又三日念西居士王肯堂宇泰甫書
