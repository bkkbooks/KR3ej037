body:
  text: 集之一初生門證治通論錢氏論五臟所主心主驚實則叫哭發熱飲水而搐虛則臥而悸動不安肝主風實則目直大叫呵缺項急頓悶虛則前綱目作咬牙多缺氣熱則外生氣溫則內生綱目外生內生下皆有風字脾主困實則困睡身熱飲水虛則吐瀉生風肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣腎主虛無實也惟瘡疹腎實則變黑陷更當別虛實證假如肺病又見肝證前牙多呵缺者易治肝虛不能勝肺故也若目直大叫哭項急頓悶者難治蓋肺久病則虛冷肝強實而反勝肺也視病之新久虛實虛則補母實則瀉子五臟病肝病哭叫目直呵缺頓悶項急心病多叫哭驚悸手足動搖發熱飲水脾病困睡泄瀉不思飲食肺病悶亂哽氣長出氣氣短喘急腎病無精光畏明體骨重潔熱則從心寒則從腎嗽而氣上從肺風從肝瀉從脾假令瀉兼嗽又氣上乃脾肺病也宜瀉白益黃散合而服之脾苦濕肺苦燥氣上逆也其症見瀉又兼面色黃腸鳴呦呦者宜服理中湯瀉而嘔者宜服茯苓半夏湯如瀉而渴熱多者宜服黃芩厚朴湯不渴而熱少者宜服白朮厚朴湯其他五臟若有兼症皆如此類推之更詳後論四時推移用藥五臟相勝肝病秋見一作日晡肝勝肺也肺怯不能勝肝當補脾治肝益脾者母能令子實也補脾益黃散治肝瀉青丸主之肺病春見一作早辰肺勝肝也肝怯故受病當補肝腎治肺補肝腎地黃丸治肺瀉白散主之肝病見秋木旺肝勝肺也宜補肺瀉肝輕者肝病退重者唇白而死肺病見春金旺肺勝肝也當瀉肺輕者肺病退重者目淡青必發驚更有赤者當搐海藏云為肝怯故目淡青色也心病見冬火旺心勝腎也當補腎治心輕者心病退重者下竄不語腎怯虛也腎病見夏水勝火腎勝心也當瀉腎輕者腎病退重者悸動當搐脾病見四旁皆仿此治之順者易治逆者難治脾怯當面目赤黃五臟相反隨證治之婁右五臟相勝病隨時令乃錢氏擴充內經臟氣法時論之旨實發前人所未發者也假如肝病見於春及早晨乃肝自病於本位也今反見於秋及日晡肺之位知肺虛極肝往勝之故當補脾肺瀉肝也余仿此潔肝勝肺則肝病身熱發搐又見肺虛喘而氣短病見於申酉戌時是肝真強也內經云受所制而不能制謂之真強法當補脾肺而瀉肝導赤散瀉黃散主之劉宗厚云此皆五臟相勝病機不離五行生剋制化之理者蓋小兒初生襁褓未有七情六欲只是形體脆弱血氣未定臟腑精神未完所以有臟氣虛實勝乘之病但世俗不審此理往往遇是率指為外感內傷而用藥致枉死者多矣悲夫錢氏論時有脫略幸而潔古補之今特參附誠無窮之惠也潔古論五臟五邪相乘補瀉大法五臟子母虛實鬼賊微正若不達旨意不易得而入焉在前者為實邪子能令母實拒賊傷於母其子又引母所克者妻來相助故曰實邪也在後者為虛邪母引子之鬼賊至由母能使子虛也內經云子能令母實母能令子虛此之謂也妻來乘夫為微邪夫來乘妻為賊邪法當瀉鬼補本臟本臟自病為正邪當虛則補之實則瀉之內經云滋苗者必固其根伐下者必枯其上逆其根伐其本則敗其真矣心主熱自病或大熱瀉心湯主之實則煩熱黃連瀉心湯主之虛則驚悸生犀散主之肺乘心微邪喘而壯熱瀉白散主之肝乘心虛邪風熱煎大羌活湯下大青丸主之脾乘心實邪泄瀉身熱瀉黃散主之腎乘心賊邪恐怖惡寒安神丸主之肺主燥自病則喘嗽燥則潤之實則喘而氣盛瀉白散主之虛則喘而少氣先益黃散後阿膠散主之心乘肺賊邪熱而喘嗽先地黃丸中導赤散後阿膠散主之肝乘肺微邪惡風眩冒昏憒嗽羌活膏主之腎乘肺實邪憎寒嗽清利百部丸主之脾乘肺虛邪體重吐痰泄瀉嗽人參白朮散主之肝主風自病則風搐拘急肝苦急急食甘以緩之佐以酸苦以辛散之實則風搐力大瀉青丸主之虛則風搐力小地黃丸主之心乘肝實邪壯熱而搐利驚丸涼驚丸主之肺乘肝賊邪氣盛則前伸呵缺微搐法當瀉肺先補本臟補肝地黃丸主之瀉肺瀉白散主之脾乘肝微邪多睡體重而搐先當定搐瀉青丸主之搐止再見後證則別立法治之腎乘肝虛邪憎寒呵缺而搐羌活膏主之脾主濕自病則泄瀉多睡體重昏倦脾苦濕急食苦以燥之實則泄瀉赤黃睡不露睛瀉黃散主之虛則泄瀉色白睡露睛白朮散主之肝乘脾賊邪風瀉而嘔茯苓半夏湯主之心乘脾虛邪壯熱體重而瀉羌活黃芩蒼朮甘草湯主之肺乘脾實邪能食不大便而嘔吐嗽煎檳榔大黃湯下葶藶丸腎乘脾微邪惡寒泄瀉理中丸之類主之腎主寒自病則足脛寒而逆人之五臟惟腎無實小兒瘡疹變黑陷則是腎實水克退心火心乘腎微邪內熱不惡寒桂枝湯主之肺乘腎虛邪喘嗽皮澀寒百部丸主之肝乘腎實邪拘急氣搐身寒理中丸主之脾乘腎賊邪體重泄瀉身寒理中丸主之凡五臟虛弱是自己正令不行乃鬼賊之所克害常補本臟之正氣假令肺病喘嗽時於初春見之法當補腎見於夏救肺見於秋瀉肺見於冬補心瀉本臟又名寒嗽大抵五臟各至本位即氣盛不可更補到所克位不可更瀉五臟補瀉法錢凡病先虛或已經下有合下者必先實其母後瀉其子也假令肺虛而痰實此可下之證先當益脾後方瀉肺也瀉青丸又名瀉肝丸錢氏謂肝無補法故無補肝藥王海藏以四物湯內加防風羌活等分為細末煉蜜丸名補肝丸又以瀉青丸去梔子大黃名鎮肝丸治肝虛導赤散瀉丙小腸瀉心湯瀉丁心安神丸治心虛疳熱神思恍惚海藏八物定志丸補心正藥益黃散又名補脾散海藏云此劑補脾以燥濕東垣云治胃中寒濕嘔吐腹痛瀉利清白之聖藥也瀉黃散又名瀉脾散海藏云瀉脾熱阿膠散又名補肺散海藏云杏仁本瀉肺非若人參天門冬麥門冬之類也瀉白散又名瀉肺散海藏云治肺熱骨蒸自汗用此直瀉之梔子黃芩亦瀉肺當以氣血分之地黃丸即金匱八味丸去桂附海藏云治腎虛解顱即魃病也治脈毛而虛錢氏謂腎無瀉法故無瀉腎藥海藏瀉腎丸治脈洪而實即前地黃丸熟地改生地去山茱萸是也此治左手本部脈若右尺洪實以鳳隨丹瀉之詳見五臟各門總論察色古稱望而知之謂之神而小兒醫號為啞科脈來駛疾難於指下分明尤以察色為要故首敘之夫嬰兒惟察其面部必有五色以知病源人身五體以頭為首首中有面面中有睛睛中有神神者目中光彩是也隱顯橫衝應位而見以應五臟五色者青黃赤白黑五臟之色心赤肝青脾黃肺白腎黑五臟所主病證蘊於內必形色見於外故小兒有病先觀其本部形色以論其五行生剋吉凶形色若不相應然後聽聲切脈錢面上證左腮為肝合左手關位肝膽之分應於風木為初之氣右腮為肺合右手寸脈肺與大腸之分應於燥金為五之氣額上為心合左手寸口心與小腸之分應於君火為二之氣鼻為脾合右手關脈脾胃之分應於濕土為四之氣頦為腎合左手尺下腎與膀胱之分應於寒水為終之氣赤者熱也黃者積也白者寒也青黑者痛也隨證治之永類鈐方云青色者為驚積不散欲發風候紅赤色者為熱為痰積壅盛驚悸煩躁增進黃色者亦為熱為食積症傷欲作疳候或作痞癖若神思昏沉其候潮熱氣粗困倦或嘔噦或瀉痢白色為寒為肺氣不利大腸滑泄欲作吐利黑色者為痛所傳不煩變證即為逆候榮衛失序為疾危惡全嬰方云左頰屬肝東方之位春見微青者平深青者病白色者絶赤色主身熱拘急肝熱生風青黑色主驚悸腹痛淺赤色主潮熱夜間發日中歇唇紅焦燥脈必緊數右頰屬肺西方之位居右秋見微白者平深白者病赤色者絶淺色主潮熱或大便堅而氣粗壅嗽青白色主咳嗽噁心青色主風入肺時時咳嗽青黑色主驚風欲發或肚疼盤腸內吊額上屬心南方之位火性炎上故居上夏見微赤者平深赤者病黑色者絶赤色主心經有風熱心躁驚悸睡臥不安青黑色主心中有邪驚風腹疼手足瘛瘲而啼叫青黑甚主心腹疼黃色主驚疳骨熱渴皮毛乾燥夜多盜汗頭髮焦黃鼻上屬脾中央之位故居中而四季見微黃者平深黃者病青色者絶赤色主身熱不思乳食深黃色主小便不通鼻孔乾燥氣粗鼻衄夜間多哭淡白色主泄瀉食不化青色主吐乳口鼻乾燥大小便不利下頦屬腎北方之位水性潤下故居下冬見微黑者平深黑者病黃色者絶赤色主膀胱與腎為表裡有熱則水道不利故小便癃閉永類鈐方肝部所主睛中瞳人內藏其神外究五輪眶䀭屬脾熱即生眵兩眥總心熱痛如針白屬肺家熱赤生砂黃屬肝臟昏瞀翳障中心瞳人腎熱不明眼忽眨竄發風發驚心部所主顴面臉頰皆屬心位黑即沉困青即驚悸赤心發風白即疳氣虛黃衛積浮腫氣逆心絶何因大叫數聲過關不叫必作鴉聲加熱驚讝散熱清心脾部所主唇口見病人中承漿四圍上下合口脾鄉開口屬心心脾有熱唇裂舌瘡三焦積熱唇紅如血深紅重渴鵝口慕口木舌重舌脾肺熱就口內噴臭脾腎氣寒色如死肝大驚一嚇口乾唇白常時積驚漸必傳心心氣不足令兒煩哭何知脾絶指甲皆黑目無神光定難用藥五種撮口驚風更惡不治證肺部所主鼻準兩孔並連山根大小二眥肺部所存鼻孔黑煤即肺經焦黑煤如墨肺經即絶鼻中赤癢疳盛蛔長或瀉白涕腦寒困寐或流清涕傷風喜睡肺熱鼻塞因息吹得或感風寒亦閉關隔鼻爛即疳鼻臭積熱腎部所主耳穴之前名曰耳花耳孩名輪輪里名廓輪廓焦黑腎家虛熱其黑如炭腎絶死旦耳門生瘡衛積非常耳中膿出腎熱疳極臭名聤耳膿汁不止瘡癢如烈其候虛熱忽聽不聰心腎氣壅常作哄哄熱氣上攻或如蟲刮榮虛衛熱耳輪如冰更看耳後有紅絲麻痘相侵耳輪紅熱傷寒是則熱極內痛腫氣相攻清心涼膈關竅通塞兒孩兩腎常虛無病切莫攻擊補更無益潔肝病面白肺病面赤脾病面青腎病面黃心病面黑若肝病驚搐而又加面白痰涎喘急之類此皆難治余仿此推之假令春分前風寒也宜用地黃羌活防風或地黃丸及瀉青丸相間服之春分後風熱也宜用羌活防風黃芩或瀉青丸導赤散下之立夏後熱也宜用三黃丸導赤散夏至後濕熱也宜用導赤散瀉黃散合而服之或黃芩人參木香之類秋分後用瀉白散立冬後用地黃丸主之謂腎不受瀉也薛青主驚積不散欲發風候紅主痰積驚悸黃者食積症傷欲作疳癖白主泄瀉水穀更欲作吐黑主臟腑欲絶印堂青主初患驚瀉紅主大驚夜啼黑主客忤山根青主二次驚瀉後發躁黑黃甚者死年壽平陷主夭青主發熱生驚黑主利死紅主躁死微黃曰平黃甚曰霍亂承漿青主食時被驚黃主吐逆亦主血利黑主驚風面眼黑睛黃主有熱白睛黃主食積疳白睛青主驚風黑睛黃主傷寒眉上青吉忽紅主煩躁夜啼黃主霍亂久病紅者死風氣二池青主風候紫主吐逆或發熱黃主吐逆赤主煩躁夜啼兩顴赤主肺有客熱兩太陽青主二次受驚青自太陽入耳者死紅主血淋兩臉青主客忤黃主痰溢赤主風熱兩頰赤主傷寒兩頤青主吐蟲兩金匱青主第三次驚風黑繞口二日死青連目入耳七日死兩風門紅主風熱黑主疝青主水驚黑從眉入耳即日死唇黑不食者死面青眼青肝病面赤心病面白肺病面黃脾病面黑腎病額間赤色主心經有熱煩躁驚悸若飲水或叫哭屬本經實熱用瀉心散以清心火微赤困臥驚悸熱渴飲湯屬虛熱用祕旨安神丸以生心血青黑主驚風腹痛或瘛瘲啼叫用五味異功散加木香柴胡釣藤鉤補脾肝青黑主心腹作痛此寒水乘心用益黃散微黃主驚疳用安神丸左臉青或兼赤主肝經風熱項強頓悶目札瘛瘲用柴胡清肝散色微赤倏熱咬牙屬虛熱用地黃丸青黑主肝克脾而驚搐腹痛用六君子加薑桂微赤主潮熱血虛心躁先用祕旨安神丸次用地黃丸右臉赤主風邪氣粗咳嗽發熱飲水為實熱用瀉白散若哽氣出氣唇白氣短屬虛熱用五味異功散若脾熱所傳用清胃散心火所刑用人參平肺散淡赤主潮熱心躁或大便堅祕用宣明柴胡飲子以疏導如潮熱未止更用釣藤飲以清肝色青白主咳嗽噁心先用惺惺散解表邪健脾土更以六君子湯調補中氣色青黑主驚風腹痛盤腸內釣用六君釣藤鉤平肝補脾鼻微黃為平赤主脾胃實熱身熱飲水乳食如常用瀉黃散清熱理脾微赤主脾經虛熱身涼飲湯乳食少思用五味異功散補中健脾色深黃主小便不通鼻中乾燥氣粗衄血乃脾熱傳於肺腎先用濟生犀角地黃湯後用地黃丸色淡白乃脾虛泄瀉乳食不化用六君子湯調補中氣青色主脾土虛寒肝木所勝用五味異功散加木香炮姜溫中平肝黑為死候頦間色赤主腎與膀胱氣滯熱結而小便不通用五苓散以分利鼻準微黃兼右腮微赤乃脾肺燥熱不能化生腎水用黃芩清肺飲膀胱陰虛陽無所生用滋腎丸若頦間微赤乃膀胱陽虛陰無所化用六味地黃丸若小腹脹滿或陰囊腫脹屬陰虛濕熱壅滯用六味丸加車前牛膝脾肺氣虛不能通調水道者亦用前藥其小便赤色久而尿血亦屬肝腎氣虛有熱用六味地黃丸如不應則用補中益氣湯益脾肺生肝腎若小便後出白津或莖中作痛屬肝經濕熱先用龍膽瀉肝湯後用六味地黃丸印堂青黑主腹痛夜啼此脾氣虛寒也脾為至陰故夜間腹痛而啼用釣藤飲色淡白主泄瀉乳食不化屬脾氣虛弱用五味異功散加木香人中黃主傷乳胃逆青主下利乳食不化噯氣酸腐此脾虛停滯先用大安丸消食後用異功散健脾黑主蛔蟲咬痛唇色白主吐涎嘔逆或吐血便血乃脾氣虛弱不能攝涎統血歸源急用六君子湯色赤乾燥而皺者主脾經熱渴大便不通煩熱不寐先以清胃散治其熱次以四君黃連山梔調其脾黃主食積泄瀉乳食不化以六君子湯健脾色赤兼白主衄血乃脾肺虛熱不能攝血歸源用聖濟犀角地黃湯清熱補血用四君子湯以補脾氣如久不應用麥門冬散或人參安胃散口畔色黃主脾經積熱用清胃散久病用四味肥兒丸以治疳熱唇口抽動主驚熱不安用異功散加山梔釣藤鉤補脾平肝若口流涎唇色紫乃脾氣虛寒用異功散加炮薑木香若腹中痛口吐涎乃蟲作痛先用蕪荑散後用調中丸不吐涎是積痛也用異功散手足厥冷用理中湯加烏梅溫補中氣而痛自止或吐後或大便去後而痛止者先用下積丸後用異功散白主失血死青主驚風死黑色繞口者不治耳後微赤此少陽經風熱用柴胡飲子清肝生血微黃主睡中驚悸咬牙用四君子加芎歸升麻以調理脾氣耳乾燥主骨疳蒸熱作渴盜汗用地黃丸若小便後出白津或玉莖癢痛屬肝經濕熱先用龍膽瀉肝湯後用地黃丸若稟賦腎氣不足或早近女色致小便澀滯或作痛如淋者急用地黃丸補中益氣湯滋其化源或大小便去後穀道牽痛者其虛尤甚用前丸加牛膝車前肉桂如手足逆冷或畏寒少食陽氣虛寒也急加附子多可得生大抵多因稟賦臟氣不平或乳食寒暑失節或妊娠乳母飲食起居六淫七情所致若初病元氣無虧乳食如常發熱壯熱二便祕結作渴飲水睡不露睛者悉屬形病俱實當治邪氣若病久元氣已虧食少發熱口乾飲湯嘔吐泄瀉肢體畏寒而露睛者悉屬形病俱虛當補正氣更宜審胎氣之虛實臟腑之相勝而治之庶無誤矣錢目內證赤者心熱導赤散主之淡紅者心虛熱生犀散主之青者肝熱瀉青丸主之淺淡者補之黃者脾熱瀉黃散主之無精光者腎虛地黃丸主之如見面目浮腫主久咳嗽乃脾受疳積也凡小兒唇白主吐涎嘔逆吐血便血唇紅渴飲煩躁如久渴瀉唇紅者是虛證也不可用涼藥唇黃主脾受積後發腫唇口紫及吐涎者主蟲痛不吐涎者是積痛唇口四畔黃如橘主口臭乃脾之積熱也唇青主血虛脾寒為冷所乘蓋唇主脾土木來剋土知脾弱不能食也凡小兒舌乾舌白舌燥舌胎舌黃舌赤腫皆主大便不通或通利必色焦黃如舌裂舌上芒刺舌上出血皆熱極陽毒也舌上生瘡心脾有熱舌卷主驚久患瀉利舌黑必潤不可認為熱蓋久病上焦虛熱故也久瀉痢舌黑者必死聽聲重實聲重實雄聲體熱為三焦氣壅在心脾傷風咳嗽喉咽痛結澀腸中糞出遲悲焦聲聲悲焦有燥恐怖欲生風重濁聲沉靜疳攻必耳聾啼哭聲但哭無啼只是驚多啼不哭痛分明聲輕顫嗄風癇病速緩聲頻吐瀉成㘂煎聲㘂煎煩躁病難安燥促聲音為感寒語短氣微尿主澀長遲聲細痢多般遲緩聲語短聲遲緩腸鳴泄瀉頻嗄聲多不響風熱肺家因脈法候兒脈當以大指按三部一息六七至為平和八九至為發熱五至為內寒脈弦為風癇沉緩為傷食促急為虛驚弦急為氣不和沉細為冷浮為風大小不勻為惡候為鬼祟浮大數為風為熱伏結為物聚單細為疳勞凡腹痛多喘嘔而脈洪者為有蟲沉而遲潮熱者胃寒也溫之則愈訣曰小兒脈緊風癇候沉緩食傷多嘔吐弦急因知氣不和急促急驚神不守冷則沉細風則浮牢實大便應祕久腹痛之候緊而弦脈亂不治安可救變蒸之時脈必亂不治自然無過繆單細疳勞洪有蟲大小不勻為惡候脈沉而遲有潮熱此必胃寒來內冠瀉利脈大不可醫仔細酌量宜審究云岐子云未及五歲不可視聽者未可別脈五歲以上方可以脈別浮沉遲數按錢氏論又不拘五歲上下也脈應雜病諸數脈為熱屬腑諸遲脈為冷屬臟陽數脈主吐逆不吐必發熱陰微脈主泄瀉不瀉必盜汗沉數脈寒熱寒多熱少亦主骨蒸熱緊數脈寒熱熱多寒少又主骨熱急則驚癇沉緊脈心腹痛短數同亦主咳嗽沉細脈乳食不化亦主腹痛下痢沉伏脈為積聚亦主霍亂微緩脈乳不化泄瀉沉緩亦同微澀脈瘛瘲筋攣微急脈寒熱唾血浮滑脈宿食不消亦主咳嗽浮緊脈疳氣耳聾浮弦脈頭疼身熱緊滑脈吐血惡心脈急數驚癇不驚者疳淋肝脈急甚顛癇風癇痰涎流液肺脈浮實鼻塞並大小便不通關脈緊滑主蛔蟲尺脈沉亦主蛔尺脈微細溏泄冷痢乳食不化尺脈微澀便血無血者必盜汗脈過寸口入魚際主遺尿審脈逆順驚搐脈浮數順沉細逆身溫順肢冷逆夜啼脈微小順洪大逆身冷逆心腹痛沉細順浮大逆身溫順肢冷逆傷寒脈洪弦順沉細逆浮大順微伏逆汗後脈沉細順洪緊逆困睡順狂躁逆溫病脈洪大順沉細逆身熱順腹痛逆咳嗽脈滑浮順沉細逆身溫順肢冷逆霍亂脈浮洪順遲微逆身溫順肢冷逆吐哯脈浮大順沉細逆身溫順肢冷逆泄瀉脈緩小順浮大逆身溫順肢冷逆諸痢脈沉細順浮大逆身溫順肢冷逆諸渴脈洪數順微細逆身溫順肢冷逆諸腫脈浮大順沉細逆臟實順腸泄逆腹脹脈浮大順虛小逆臟實順泄瀉逆痰喘脈滑大順沉細逆身溫順肢冷逆寒熱脈緊數順沉細逆倦怠順強直逆疳勞脈緊數順沉細逆臟實順脾泄逆蟲痛脈緊滑順浮大逆身溫順唇青逆諸失血沉細順浮數逆身溫順發熱逆中惡腹脹緊細順浮大逆身熱順身冷逆黃疸脈浮大順沉細逆腹寬順泄瀉逆火疸脈浮洪順沉細逆身熱順身冷逆錢仲陽云小兒之脈氣不和則弦急傷食則沉緩虛驚則促急風則浮冷則沉細脈亂者不治水鏡訣云陰陽運合男女成形已分九竅四肢乃生五臟六腑部分既別逆順難明若憑寸口之浮沉必乃橫亡於孩子須明虎口辨別三關消詳用藥始無差誤未至三歲看虎口食指第一節名風關脈初見易治第二節名氣關脈見病深難治第三節名命關脈見死不治三關青是四足驚赤是水驚黑是人驚紫色瀉利黃色雷驚三關通度是極驚之症必死或青或紅有紋如線一直者是乳食傷脾必發驚熱左右一樣者是驚與積齊發有三條或散是肺生風痰或似齁䶎聲有赤是傷寒及嗽如紅火是瀉紅黑相兼主下痢青多白痢紅多赤痢紫色相兼加渴虎口脈紋亂主胃氣不和青是驚與積青黑髮慢驚脈入掌乃內釣指紋曲里風盛彎外食積此論三歲以上之法若三歲以下更用一指按高骨乃分三關定其息數呼吸八至為平脈九至不安十至危困浮主風沉遲主虛冷實主有熱緊主癲癇洪主熱盛沉緩主虛瀉微遲有積有蟲遲澀主胃脘不和沉主乳食難化沉細主乳食停滯緊弦主腹中熱痛牢實主大便祕沉而數者骨中有熱弦長是肝膈有風緊數乃驚風為患四肢掣顫浮洪乃胃口有熱沉緊主腹痛有寒虛濡者有氣又主慢驚芤主大便利血四歲以下用一指袞轉尋三部以關為準七八歲移指少許九歲次第依三關部位尋取十一十二歲亦同十四十五歲依大方脈部位診視凡看脈先定浮沉遲數陰陽冷熱沉遲為陰浮數為陽更兼看部位青主驚風白主虛瀉赤主痰熱黑色病甚黃主脾疳以此相參察病治療庶無誤矣全幼心鑑云小兒半歲之際有病當於額前眉端髮際之間以名中食三指曲按之兒頭在左舉右手在右舉左手食指為上中指為中名指為下三指俱熱主感風邪鼻塞氣粗發熱咳嗽若三指俱冷主外感風寒內傷飲食發熱吐瀉若食中二指熱主上熱下冷名中二指熱主夾驚之疾食指熱主胸滿食滯又當參辨脈形主之流珠形主飲食所傷內熱欲吐或腸鳴自利煩躁啼哭用助胃膏消飲食分陰陽若食消而病仍作用香砂助胃膏以補脾胃環珠形主脾虛停食胸膈脹滿煩渴發熱用五味異功散加山楂枳實健脾消食後用六君子湯調養中氣長珠形主脾傷飲食積滯肚腹作痛寒熱不食先用大安丸消其積滯次以異功散健其脾氣來蛇形主脾胃濕熱中脘不利乾嘔不食此疳邪內作先用四味肥兒丸治疳後用四君子湯補脾去蛇形主脾虛食積吐瀉煩渴氣短喘急不食困睡先用六君子湯加枳實健脾消積次以七味白朮散調補胃氣弓反里形主感冒寒邪哽氣出氣驚悸倦怠四肢稍冷小便赤色咳嗽吐涎先用惺惺散助胃氣祛外邪後以五味異功散加茯苓當歸養心血助胃氣若外邪既解而驚悸指冷脾氣受傷也宜用七味白朮散補之若悶亂氣粗喘促哽氣者難治脾虛甚故也弓反外形主痰熱心神恍惚夾驚夾食風癇痰盛先以天麻防風丸祛外邪又用五味異功散調中氣槍形主風熱生痰發搐先用抱龍丸如未應用牛黃清心丸若傳於脾肺或過用風痰之藥而見一切諸症者專調補脾胃魚骨形主驚痰發熱先用抱龍丸治之如未應屬肝火實熱少用抑青丸以清肝隨用六味丸以補肝或發熱少食或痰盛發搐乃肝木克脾土用六君子湯加柴胡補脾土以制肝木水字形主驚風食積胸膈煩躁頓悶少食或夜啼痰盛口噤搐搦此脾胃虛弱飲食積滯而木剋土也先用大安丸消導飲食次以六君釣藤鉤補中清肝若已服消食化痰等劑而病不愈者用四君升麻柴胡釣藤鉤升補脾氣平制肝木針形主心肝熱極生風驚悸頓悶困倦不食痰盛搐搦先用抱龍丸祛風化痰次用六君子加釣藤鉤平肝實脾透關射指形主驚風痰熱聚於胸膈乃脾肺虧損痰邪乘聚先用牛黃清心丸清脾肺化痰涎次用六君子湯加桔梗山藥補脾土益肺金透關射甲形主驚風肝木剋制脾土之敗症急用六君木香釣藤鉤官桂溫補脾土未應即加附子以回陽氣多得生者嘗聞古人云小兒為芽兒如草之芽水之漚蓋因臟腑脆嫩口不能言最難投劑當首察面色而知其所屬次驗虎口以辨其所因實為治法之簡要也流珠只一點紅色環珠差大長珠圓長以上非謂圈子總皆紅脈貫氣之如此來蛇即是長珠散一頭大一頭尖去蛇亦如此分上下朝故曰來去角弓反張向里為順向外為逆槍形直上魚骨分開水字即三脈並行針形即過關一二粒米許射甲命脈向外透指命脈曲里雖然余常治之亦有不專執其形脈而投劑者蓋但有是症即服是藥而亦多驗死證凡小兒囟腫囟陷汗出不流如珠如油舒舌出口舌腫發驚瀉黑黯血髮直如麻皮膚無血色此心絶也並壬癸曰死病重啼哭無淚及病不哭下淚爪甲青黑眼深如陷舌卷囊縮發搐目斜連唇口動手如抱頭之狀或腳面直素問云其華在爪其充在筋肝絶也並庚卒日死人中滿人中黑唇縮反張唇焦枯燥唇乾紫黑唇不蓋齒血腫尿血舌縮或卷鼻孔開張齒禁冷涎如油嘬口如囊面如土色四肢逆冷如濕石之狀吃乳不收瀉糞赤黑脾絶也並甲乙日死有熱咽湯水並藥食喉中鳴是胃脆直不能蔭肺此證醫書少有蓋纍曾試之有驗並死不治目直青鮮氣喘不回吃食噎嗽痰涎塞口喉中鳴響鼻塞不通鼻乾黑燥肺脹胃膈頭汗四肢冷此肺絶也並丙丁日死面黑神昏眼黑眼腫目無光彩耳輪青黃焦枯疳牙齒落發疏黃燥皮膚黑燥驚風咬乳戛齒泄屁黑色繞口此腎絶也並戊己日死小兒死證十五候眼上赤脈下貫瞳人囟門腫起兼及作坑鼻乾黑燥肚大青筋目多直視睹不轉睛指甲黑色忽作鴉聲虛舌出口齧齒咬人魚口氣急啼不作聲蛔蟲既出必是死形用藥速救十無一生小兒病困汗出如珠著身不流者死小兒病其頭髮皆上逆者必死小兒病而囟陷其口唇乾目皮反口中氣出冷手足四垂其臥如縛掌中冷皆不治小兒中風熱喘鳴肩息脈緩則生急則死小兒痢疾脈浮大而腹痛者必死乳子病熱脈懸小手足溫則生寒則死襁褓千金論云小兒用父故絮著衣女用母故衣勿使新綿切不可過厚恐令兒壯熱生瘡發癇皆自此始巢氏云兒始生肌膚未成不可暖衣則令筋骨緩弱宜時見風日若都不見風日則令肌膚脆軟便易傷損嬰兒若常藏在幃幕之內重衣溫暖譬如陰地草木不見風日軟脆不任風寒嬰兒皆當以故絮著衣莫用新綿也天氣和暖無風之時令母將抱日中嬉戲數見風日則令血凝氣剛肌肉硬密堪耐風寒不致疾病嬰兒又當習薄衣之法當從秋習之不可以春夏卒減其衣則令兒中風寒嬰兒冬月但當著夾衣及衲衣之類極寒即漸加以舊綿人家多愛子乃以綿衣過厚適所以為害也已嬰兒又當消息無令汗出汗出則致虛損便受風寒晝夜寤寐皆當戒之初生兒出月必須人襁褓襁褓之道必須得宜如春夏之月乃萬物生長之時宜教令地臥使之不逆生長之氣如秋冬之月乃萬物收藏之時宜就溫暖之處使之不逆收藏之氣然後血凝氣和則百病無自而入矣丹溪曰人生十六歲以前血氣俱盛如日方升如月將圓惟陰常不足養之之道不可不謹童子不衣裘帛煎哲格言具在人耳裳下體之服帛溫暖甚於布者也裘皮服溫軟甚於帛者也蓋下體主陰得寒涼則陰易長得溫暖則陰暗消是以下體不與綿絹夾厚溫暖之服恐妨陰氣實為確論乳哺湯氏曰小兒乳哺須要得法乳者你也哺者食也乳後不得便與食哺後不得便與乳小兒脾胃怯弱乳食相併難以克化周歲以上必成乳癖食癖於腹中作疼作熱疳病從此起也丹溪曰血氣俱盛食物易消故食無時然腸胃尚脆而窄若稠黏乾硬酸鹹甜辣一切魚肉水果濕面燒炙煨炒俱是發熱難化之物皆宜禁絶只與熟菜白粥非惟無病且不縱口可以養德此外生栗味鹹乾柿性涼可為長陰之助然栗太補柿太澀俱為難化亦宜少與婦人無知惟務姑息畏其啼哭無所不與積成痼疾雖悔何及所以富貴驕養有子多病逮至成人筋骨柔弱有食則不能忌口以自養居喪則不能食素以盡禮小節不謹大義亦虧可不慎歟至於乳母尤宜謹節飲食下咽乳汁便通情欲中動乳脈便應病氣到乳汁必凝滯兒得此乳疾病立至不吐則瀉不瘡則熱或為口糜或為驚搐或為夜啼或為腹痛病之初來其溺必少便須詢問隨證治母母安亦安可消息於未形也乳兒法凡乳母血氣為乳汁也五情善惡悉血氣所生宜戒喜怒一切禁忌不用狐臭癭瘻氣嗽病者及身體疥癬頭瘡發少緊唇耳聾音啞齆鼻癇病等方可乳兒夏中盛熱時乳母浴後或兒啼不可與你能使兒成胃毒秋成赤白痢浴後可令定息良久熱燥乳之故無患也聶氏曰盛啼不可食乳恐氣逆不順聚而為逆亦能成驚風也千金論曰凡乳兒不可過飽飽則溢而成嘔吐若乳來多猛取出挼後再乳切須乳時合先令捏去宿熱乳然後乳之如乳母欲臥寐當以臂枕之令乳與兒頭平母欲睡著時即奪其乳恐其不知飽足亦成嘔吐父母交合之間兒臥於側或驚起不可乳兒蓋氣亂未定必能殺兒也巢氏云小兒啼未定氣息不調母不可以乳飲蓋恐乳不得下停滯胸膈則為嘔吐也顱囟經曰夏不去熱乳令兒嘔吐冬不去寒乳令兒泄瀉復痢尤不可不謹夜間乳兒母起身坐抱兒喂之每清早欲飲乳皆須捏去宿乳乳汁勿投於地蟲蟻食之令乳無汁可沃東壁上佳乳令兒病證喜乳涎喘生驚孫兆云令兒上氣顛狂亦令兒生痰喘息或生驚怒乳疝氣腹脹千金翼云怒乳令兒疝氣扁鵲云女子則腹脹寒乳你片不化史記華他論云乳氣寒虛冷令故便青而啼千金翼云令兒咳嗽熱乳面黃不食千金翼云令兒嘔吐張氏云熱乳傷損肺氣令兒龜胸氣乳吐瀉腹脹寶鑑云令兒面黃白乳哺減少夜啼哯乳病乳能生諸疾令兒黃瘦骨蒸盜汗咨煎夜哭孫氏云病乳則致虛羸及生諸疾壅乳吐逆生痰靈祕云壅乳成痰涎涎壅生驚寶鑑云壅乳成奶癖又吐逆生痰鬾乳腹急藏冷寶鑑云腹急而瀉胸行皆熱夜啼肌瘦一如積塊醉乳恍惚多驚千金翼云令小兒熱腹急痛扁鵲云醉淫隨亂乳兒恍惚多驚淫乳必發驚癇寶鑑云乳母淫佚情亂乳兒令吐瀉身熱啼叫如鴉不治以上乳急欲乳兒能生諸病不可不忌也凡喜怒氣亂未定乳兒則成吐瀉腹痛疳黃不食寒熱壅積不散乳兒則成痰癖涎嗽肺脹龜胸醉淫喘乳多發驚癇聖惠方云醉淫喘乳能殺小兒聖濟經論乳者夏不欲熱熱則致吐逆冬不欲寒寒則致下痢母不欲怒怒則令上氣顛狂母不欲醉醉則令身熱腹滿母方吐下而乳則致虛羸母有積熱而乳則變黃不能食新房而乳則瘦悴交脛不能行大抵乳食不便則生疾病哺兒法肘後云兒初生三日應開腹助穀神碎米濃作飲如乳酪與兒大豆許數令咽之頻與三豆許三七日可哺千金云兒哺早不勝穀氣令頭面體生瘡愈而復發又尫弱難養三十日後雖哺勿多不嗜食強與之不消復生病哺乳不進腹有痰癖四物紫丸微下之節哺數日自愈寶鑑云兒五十日可哺如棗核百日彈丸早晚二哺莫抱檐下澡浴當風解衣哭未斷而乳冒冷而哺又不可在神佛驢馬畔各房異戶之親諸色物器並不可觸犯之害子性為驚癇經云三歲未滿勿食雞肉子腹生蟲錢乙云兒多因愛惜過當三兩歲猶未飲食致脾胃虛弱平生多病半年後宜煎陳米稀粥粥面時時與之十月後漸與稠粥爛飲以助中氣自然易養少病惟忌生冷油膩甜物等外臺崔氏初哺兒法以平定成日醜寅辰巳酉日大吉男忌戊巳日女忌丙丁日斷乳法小兒年至四五歲當斷乳而不肯斷者宜用畫眉膏斷乳之道方可漸與肉食則無疳癖之患畫眉膏山梔參個燒存性雄黃少硃砂上為極細末入生麻油輕粉各少許調勻候兒睡著濃抹於兩眉上醒來便不食乳未效再用加黃丹一錢雜將護法萬全論田婦護兒絶無他疾譬之草木生於深山大澤容易合抱至於異果奇材縱加培養間有不秀實者豈貴賤異哉兒數見風日即血凝氣剛肌肉硬密堪耐風寒以田舍兒較之相似田氏曰大凡小兒過暖生熱熱極生風提抱生癰喂飼生癖最宜慎之張渙曰乳母須每日三時摸兒項後風池若壯熱者即須尉之使微汗即愈諺云戒養小兒謹護風池風池在頸項筋兩轅之邊有病乃治之疾微切不可妄針灸亦不用輒吐下所以然者針灸傷兒經絡吐下傷動臟腑故也嬰兒暑中常令在稍涼處乳母勿禁新水即不宜多嬰兒春夏間有疾不可亂有動下使下焦虛上焦熱變成大病矣嬰兒須看稟受南北之殊蓋地土寒溫不同故也嬰兒生後兩滿月即目瞳子成能笑識人乳母不得令生人抱之及不令見非常之物嬰兒百晬任脈生能反復乳母當存節喜怒適其寒溫嬰兒半晬尻骨已成乳母當教兒學坐嬰兒二百日外掌骨成乳母教兒地上匍匐嬰兒三百日臏骨成乳母教兒獨立嬰兒周晬膝骨已成乳母教兒行步上件並是定法蓋世之人不能如法存節往往抱兒過時損傷筋骨切宜戒之為吉羅謙甫曰一小兒五月間因食傷冷粉腹中作痛遂於市藥鋪中贖得神芎丸服之臍腹漸加冷疼時發時止逾七八年不已因思古人云寒者熱之治寒以熱良醫不能廢其繩墨而更其道也據所傷之物寒也所攻之藥亦寒也重寒傷胃其為冷痛可知矣凡人之脾胃喜溫而惡冷況小兒血氣尚弱不任其寒故陽氣潛伏寒毒留連久而不除也治病必先其本當用和中養氣之藥以救前失服之月餘方愈嗚乎康子饋藥孔子拜而受之以未達不敢嘗此保生之重者也奈何常人拱默而令切脈以謂能知病否且脈者人之血氣附行經絡之間熱勝則脈疾寒勝則脈遲實則有力虛則無力至於所傷何物豈能別其形象乎醫者不可不審其病源而主家亦不可不說其病源且此子之父不以病源告醫而求藥於市鋪中發藥者亦不審病源而以藥付之以致七八年之病皆昧此理也孫真人云未診先問最為有準東坡云只圖愈疾不欲困醫二公之語其有功於世大矣初生薛小兒在胎稟陰陽五行之氣以生臟腑百骸藉胎液以滋養受氣既足自然生育分娩之時口含血塊啼聲一出隨即咽下而毒伏於命門遇天行時氣久熱或飲食停滯或外感風寒驚風發熱等因發為瘡疹須急於未啼時用軟帛裹指挖去其血用黃連豆豉朱蜜甘草解之後雖出痘亦輕矣有咽入即時腹脹嘔吐短氣不乳者用茯苓丸治之但黃連性寒若稟母氣膏粱積熱者宜服若滋味淡薄胎氣元弱者又不宜用其硃砂固能解毒恐金石鎮墜不若只以牛黃分許蜜調與吮為佳世多用犀角解毒丸其胎氣虛寒虛弱者反傷脾胃生氣甚致不育又有嬰兒因其難産或冒風寒而垂危者切不可便斷臍帶急烘綿絮包抱懷中急以胎衣置火中煨燒更用大紙捻於臍帶上往來燎之使暖氣入腹須臾氣復自蘇尤戒洗浴恐腠理不密元氣發泄而外邪乘之也拭口法嬰兒新産出胎急以綿裹指揩拭兒口中舌上惡血穢露謂之玉銜若啼聲一發即入腹成百病又看舌下若連舌有膜如石榴子若啼不出聲不轉速以指爪摘斷之或用葦刀子割之微有血出即活若舌下血出多者以燒亂髮灰同豬脂少許和塗之聖惠云看齒根有黃筋兩條以葦刀割斷點豬乳佳如兒口難開先點豬乳兒上下唇與齒齦連處皆有一筋牽引若上唇筋緊即生上煉下唇筋緊即生下煉上煉生瘡滿頭或眉間如癬狀瘙癢不已復流黃汁至處生瘡下煉起腰背漸至四肢患亦如上若疾甚不治或頭面上下相通纍年不輕又夭折或成大病是唯每日早辰拭口佳浴兒法兒生三日以桑槐榆桃柳各取嫩枝三寸長者二三十節煎湯看冷熱入豬膽汁二三枚浴之浴湯用豬膽益母草不生瘡疥用金銀虎頭骨麝丹砂辟惡氣客忤驚癇用桃梅李楮根葉解體熱溫壯之病須浴時煮湯須不冷不熱於無風密室浴之勿令久浴訖以粉摩之或以光粉蚌粉撲身辟邪吉紀用經浴法寅卯酉日吉壬午丁未癸巳凶不能上三日勿犯下三日三日五日七日浴小兒洗浴不可先斷臍帶候洗了方斷不致水濕傷臍可免臍風臍瘡等證用清油調發灰敷臍洗兒不可用水打濕臍帶斷臍法千金云臍不得以刀割隔單衣咬斷以暖氣呵七遍即纏結所留帶致兒足趺上斷訖連臍帶中多有蟲急剔撥去不爾入臍成疾臍當長六寸長則傷肌短則傷臟不以時斷及挼汁不盡暖氣漸微即生寒令兒臍風寶鑑論斷臍若用剪刀先於懷中令暖又水入臍多天釣痛苦啼叫面青黑臍傷動令久不幹傷外風即口噤不可救灸臍法聖惠云兒生一宿抱近明無風處看臍上有赤脈直上者即於脈盡頭灸三壯赤散無患矣裹臍法千金論治白練令柔軟方四寸新綿厚半寸與帛等合之裹臍調其緩急急則吐哯二十日乃解若十許日怒啼必衣中有刺或臍燥刺腹當更裹臍冬時須閉戶下帳然火令溫暖換衣亦然仍以溫粉粉之服藥下胎毒法心鑑曰古方書言兒始生落草服汞粉硃砂白蜜黃連欲下胎毒今人率承用之不知今人稟受攝養與古人不同其藥乃傷脾敗陽之藥若與兒服後必生異證只宜用淡豆豉煎濃汁與三五口其毒自下又能助養脾氣消化乳食然古人之法終不可湮沒今人用之而效者多或不至如心鑑所云者今次第列於左方張渙云嬰兒初生第一日才斷臍䙀袍訖看兒形色若面紅潤色赤啼聲響快者宜用汞粉法良久有臍糞便下為佳次用甘草法次用朱蜜法臨時更看形色若面色多青白啼聲不響即不須服次用牛黃法古方又有黃連法韭汁法豬乳法等在人看兒寒熱怯壯擇所宜而用之爾甘草法用好原州甘草中指一節許拍碎以水二蜆殼煎一蜆殼以綿纏蘸令兒吮之若吐出惡汁為佳若服一蜆殼不吐即不須更服不問嬰兒虛實寒熱皆須服之肘後方吐後更與兩服吐止須盡一合薛氏預以甘草細切少許臨産時以綿裹沸湯盞內覆溫收生之際以軟綿裹指蘸甘草汁拭其口次用黃連法朱蜜法黃連法集驗方初生兒惡汁留胸膈壅塞易生蘊熱驚癇瘡癤用好肥黃連數塊槌碎綿裹如奶頭狀湯內浸成黃汁拈托一二點兒口中惡汁自下乳食便美未盡用空綿別浸黃連後以朱蜜間與之海藏方淨黃連一錢水一盞預先煎下待兒生未出聲時便用灌下以去腹中惡物臍屎兼解胎中蘊積熱毒終身不生瘡又去臍風等病韭汁法本草云兒初生與韭根汁灌之即吐出惡水聖惠方甘草後暖水浸韭子汁塗兒唇上干又塗數次止不令入口朱蜜法好硃砂一大豆許細研水飛煉赤蜜一蜆殼看稀稠和成膏每用一豆大乳汁化下時時滴口中三日內止三粒臨時更看形色若面色多青白啼聲不響即不須服牛黃法千金方朱蜜竟與牛黃不獨益肝膽除熱定精神止驚辟惡氣又除百病張渙法真牛黃一塊好蜜煉熟和成膏每服一豆大乳汁化時時滴口中形色不實者不宜多服若嬰兒胎熱或身體黃色宜多服之汞粉法張渙方兒紅潤色赤啼聲響快者用汞粉半錢旋旋令兒吮之良久有臍糞便下為佳寶鑑銀粉抹口舌上下左右兩頰然後飼朱蜜豬乳法嬰兒初生至滿月內常時時旋取豬乳滴口中佳豬兒飲母次便提後腳離乳急捋之即得臍帶法用本兒落下臍帶瓦上焙燥為末入辰砂黃連甘草各末五分和勻蜜拌做三五次塗乳母乳上俟兒吞之必使一日夜吞盡次日惡毒皆從大便而出日後不但痘疹稀疏竟有不出痘者俟臍帶落下即便制服在六七日之間為妙其辰砂必須研極細末以甘草湯飛過任服無害此方一以解毒一以補養蓋臍帶乃有生初之河車也繫於母之命門兩腎之所主乃以腎補腎腎既充足即不受邪故無他日變黑歸腎之證亦無囟門不合之疾生一兒即得一兒真保生第一良法藏衣法即胞衣崔氏云兒衣清水洗勿令沙土草汙又清酒洗之仍內錢一文在衣中盛新瓶內青綿裹瓶口密蓋置便宜處三日後依月吉地向陽高燥處入地三尺埋之瓶上土厚一尺七寸須牢築令兒長壽智慧若不謹為豬狗食令顛狂蟲蟻食令病惡瘡犬鳥食令兵死近社廟令見鬼近深水汙池令溺死近故灶令驚惕近井傍令聾盲棄道路街巷令絶嗣當門戶令聲不出耳聾著水流下令青盲棄火里令生爛瘡著林木頭令自絞死此忌須慎每於天德月空處埋之正月天德在丁月空在丙壬余詳官本歷日若遇反支宜掛宅外福德上向陽高燥處待過月然後依法埋藏吉甲乙日生丙丁日藏丙丁日生戊巳日藏戊巳日生庚辛日藏庚辛日生壬癸日藏吉剎頭法集驗方云小兒初剃頭俱不擇日皆於滿月日剃之蓋風俗所尚前産婦未得出房於滿月即與兒俱出謂胎髮穢惡有觸神灶令小兒不安故於此日必剃頭而出凡剃頭就溫暖避風處仍剃後須以杏仁三枚去皮尖研碎入薄荷三葉再同研卻入生麻油三四滴膩粉拌和頭上擦以避風邪免生瘡疥熱毒其後小兒亦宜此法附方海百壽散小兒初生未滿月已里用之者老無瘡疥黃連一兩硃砂一錢上水煎令老母拭去口涎淨灌下余藥傾盆中浴兒遍身搽妙顱囟兒初生日與平和飲子指迷兒生三日後與母服人參茯苓甘草升麻各二錢五分水一盞煎一合半時時與之乳母忌油膩滿月及百晬如時冷加白朮熱加硝各半錢生下胎疾月內不測諸病總論千金論曰芽兒出腹骨肉未斂肌肉未成猶尚是血血凝則堅而成肌肉也又云如水上之泡草頭之露夫初生一臘之內天地八風之邪豈能速害良由在胎之時母失愛護或勞動氣血相干或坐臥飢飽相役飲酒食肉冷熱相制恐怖驚撲血脈相亂蘊毒於內損傷胎氣故降生之後有胎熱胎寒胎肥胎怯胎驚胎黃諸證生焉外因浴洗拭口斷臍灸囟之不得法或繃𫃠驚恐乳哺寒溫之乖其宜致令噤口臍風鎖肚不乳等證病患致此亦難救療坐視其斃良可哀憫故黃帝云吾不能察其幼小謂別是一家調理耳用藥者必明消息形候審定生死察病患之淺深知藥性之寒溫而後庶乎少失也初生輒死千金兒初生輒死視兒口中懸癰前上齶有胞者翼云赤胞以指甲摘取頭決令潰去血勿令血入咽入咽殺兒慎之不能啼三因云小兒初生氣絶不能啼者必是難産或冒寒所致急以綿絮包裹抱懷中未可斷臍帶且將胞衣置爐炭中燒之仍捻大紙條蘸油點火於臍帶下熏之蓋臍帶連兒火熏時有火氣由臍入腹更以熱醋湯蕩洗臍帶須臾氣回啼哭如常方可洗浴了即斷臍帶嬰兒哭遲者以蔥白細鞭背上即啼水鑑方云胎風生下不能啼須使園中小葉葵搗取汁調熊膽末才交入口免傾危看舌下法見前兒生下地即不啼哭不能吞乳奄奄如死者急看喉間懸癰前齶上有一泡用指摘破以帛拭去惡血勿令咽下即能通聲吞乳眼不開兒生眼閉口開常呻吟因受胎熱用涼五臟藥天竹黃散方見重舌及與母吃復以竹筒煎湯洗眼小兒初生眼閉者由産母食熱物毒物致成斯疾治法當以熊膽少許蒸水洗眼上一日七次如三日不開用生地黃湯服仍須乳母服山茵陳湯凡初生小兒須洗令淨若洗不淨則穢汁浸漬於眼眥中使眼赤爛至長不瘥生地黃湯治初生小兒眼不開乾地黃赤芍藥川芎當歸去蘆栝蔞根甘草上為細末少許用燈心煎湯調抹入口中速服四聖散治嬰孩胎受熱毒生下兩目不開燈心黃連秦皮木賊棗子各半兩上㕮咀每服二錢水一盞煎七分澄清去滓無時頻洗兩目自開洗眼方黃連秦皮燈心大棗各等分上用竹筒煎湯不乳謂初出胞胎而不吮乳也嬰兒初出胎時其聲未發急以手拭其口令惡血淨盡不得下咽即無他病若拭口不全惡穢入腹則令腹滿氣短不能吮乳或産母取冷過度胎中受寒致令兒腹痛也宜用茯苓丸及木香檳榔散治之茯苓丸赤伏苓川黃連去須枳殼炒上等分為末煉蜜丸桐子大每服一丸乳汁調下治穢惡入腹令兒嘔吐不乳方木香乾薑生茯苓甘草酸木瓜丁香各等分上為粗末一捻水煎綿蘸滴與之外臺方乳兩合蔥白一寸煎一兩沸去蔥吃即乳聖惠人參丸人參龍膽黃連馬牙硝甘草炙微赤枳實麩炒微黃各二兩上搗羅為細末煉蜜丸如桐子乳汁研二丸灌口中日四五服瘥硃砂丸治三歲以下胃口閉不吃乳硃砂牛黃麝香丁香甘草炙微赤人參各一分犀角黃耆石膏細研水飛五靈脂各半兩上搗羅研勻蜜丸如緑豆熟水下三丸日四五服灸法兒生二七日內不吮奶多啼者客風中臍循流心脾灸承漿在下唇稜下宛宛中次灸頰車在耳下頰骨後炷如雀屎各七壯此非灸不療兒喉中鳴咽乳不利灸旋璣三壯在天突下一寸陷者中吐不止錢初生下吐因穢惡下咽故也用木瓜丸主之凡初生急須拭淨口中否則啼聲一發穢物咽下致生諸病田月里生嘔先用硃砂丸下之如利後用朱沉煎墜其邪氣使穢物自下而不嘔也錢木瓜丸木瓜麝香膩粉木香檳榔各等分上同研細末麵糊丸如小黃米大每服一二丸甘草水下無時薛芽兒初生之患多因乳母不慎七情不節厚味傳兒為病當審其因以調治其母前所用之藥恐臟腑脆嫩不能勝受用者審之聖惠藿香散治兒生至半月嘔逆不止藿香紫菀洗去苗土各一分甘草炙赤半兩麥門冬三分去心焙桂心半分上為散每服一錢水一盞煎五分去滓溫綿點滴口中不小便小兒初生不尿者多因在胎時母恣食啖熱毒之氣流入胎中兒飲其血是以生而臍腹腫脹如覺臍四旁有青黑氣色及口撮即不可救也如未有青黑色不飲乳者宜服蔥乳湯蔥乳湯蔥白三四寸四破之以乳汁半盞煎灌一方蔥生用搗爛人乳拌入兒口內再與乳吮咽下即通豆豉膏黑豆一勺田螺十九個蔥一大把上搗爛芭蕉汁調貼臍下按觀丹溪治鄭廉使之子患淋病乃因父服下部熱藥遺毒在胎留於子之命門而然以紫雪和黃柏末為丸投之下如黍如粟者碗許而安則初生不尿症其當審因而處治不言可知也不大便俗名鎖肚由胎中受熱熱毒壅盛結於肛門閉而不通無復滋潤所以如此至若第三日不通急令婦人以溫水漱口吸咂兒前後心並臍下手足心共七處凡四五次仍以輕粉半錢蜜少許溫水化開時時將少許服之以通為度如更不通即是肛門內合當以物透而通之金簪為上玉簪次之須刺入二寸許以蘇合香丸納入孔中糞出為快若肚腹膨脹不能乳食作呻吟聲至於一七難可望其生也田氏治法先用硬蔥針紝肛門如大便不下後用牛黃散方見喘送硃砂丸一時自見大小便不通小兒初生腹脹欲絶大小便不通亦如前法吸咂胸前背心手足心臍下七處以紅赤色為度須臾自通垂癰千金云小兒出腹六七日後其血氣收斂成肉則口舌喉頰裡清淨也若喉里舌上有物如蘆籜盛水狀者若懸癰有脹起者可以綿纏長針留刃處如粟米許大以刺決之令氣泄去青黃赤血汁也一刺之止消息一日未消者來日又刺之不過三刺自消盡余小小未消三刺亦止自然得消也有著舌下如此者名重舌有著頰裡及上齶如此者名重齶有著齒齦上者名重齦皆刺去血汁也刺後用鹽湯洗拭急用如聖散或一字散摻刷如聖散鉛霜真牛黃太陰玄精石硃砂水飛曝乾上四味各研極細稱准各二錢五分拌勻入白龍腦五分再研勻每用藥抄一字至半錢止摻兒口中時時用一字散硃砂硼砂各半錢龍腦朴硝各一字上為極細末用蜜調少許鵝翎蘸刷口內咽下無妨重舌巢氏云心候於舌而主血脾絡脈又出舌下心火脾土二臟子母也有熱即血氣俱盛其狀附舌下近舌根形如舌而短名重舌指爪摘斷及葦刀子割法見前拭口法條惠眼鵝口重舌重齶口瘡皆上焦熱因受胎時大受極熱急以雞內金為末乾摻口內及硃砂膏地黃膏輪流摻之仍服天竺黃散地黃膏鬱金皂莢水煮乾切焙豆粉各半兩甘草一分炙馬牙硝研一錢生地黃汁蜂蜜對合熬成膏和藥每服兩皂子大香熟水含化或鵝翎掃口內金朱飲治驚壯熱傷寒伏熱上焦虛熱重舌口鼻生瘡致赤眼方本名天竺黃散川鬱金銼皂莢水煮乾細者如膽狀佳天竺黃甘草炙馬牙硝各半兩硃砂一分研蟬殼十四個水洗去土麝香少許上為末每服半錢至一錢蜜湯調下重齦重齶千金治法總前垂癰門刺去血汁後鹽湯洗拭一字散塗刷法同前條茅先生云心熱壅滯先用硃砂膏見驚積門塗舌上後用牛黃膏見膈熱門聖惠牛黃散一方無前三味有玄明粉牛黃白龍腦硃砂各一分鉛霜半兩太陰玄精石一兩上細研為散先於腫處以針鈹破出血鹽湯洗拭口後摻藥神效口中有蟲外臺療兒吃奶不穩七日以來壯熱顏色赤鼻孔黃恐作撮口及牙關蟲似蝸牛亦似黃頭白蚌螺用竹瀝半合和少許牛黃服瘥又豬肉拭口即蟲出噤風巢氏云兒口內忽結聚生舌上如黍不能取乳名噤由在胎熱入臟心偏受熱聖惠初生兒須防三病一撮口二著噤三臍風皆急病著噤尤甚過一臘方免牙關緊急吃乳不穩啼聲漸小口吐涎沫茅有閉眼人見大小便通以為冷熱所得不知病在喉舌狀亦極重善救療者十不得三四依將護法防於事先必無此患但有此證急看兒上齶有點子先以指甲輕輕刮破次服定命散辰砂全蠍散之類如口噤不開服諸藥不效者生南星去皮臍研為極細末龍腦少許合和用指蘸生薑汁於大牙根上擦之立開凡臍風撮口噤風三者雖異其受病之源則一也大抵裡氣鬱結壅閉不通並宜服煎豆豉汁與吃取下胎毒千金云小兒初生其氣高盛若有微患即須下之若不時下則成大疾難為療矣紫霜丸量而與之定命散治初生兒口噤不乳蟬蛻二七枚去嘴腳全蠍二七個去毒上為極細末入輕粉少許和研用乳汁乳遠調化服辰砂全蠍散治初生兒口噤辰砂水飛半錢全蠍頭尾全去毒二十枚炙硼砂龍腦麝香各一字上為極細末用乳母唾調塗口唇里及牙齒上或用豬乳少許調入口內紫霜丸方見變蒸張渙立聖散治妊娠之時母服熱藥過多或食炙爆熱物等致令嬰兒初生下口噤不乳口舌上瘡如黍粟大口孜啀多啼名曰口噤干蜘蛛一個去口足以新竹火上炙取油一蜆殼許浸一宿炙令焦取末乾蠍稍七個為末膩粉末一錢上件並同研極細每服一字乳汁調時時滴口中千金治口噤赤者心噤白者肺噤雞糞白棗大綿裹水一合煮二沸分再服聖惠用豆大三枚水下又雀糞四枚末之著乳頭飲兒大十枚外臺著噤病在咽如麻豆許令兒吐沫不乳水銀如黍與服下咽便愈以意量之不過小麻子許事急用食療茶莓研汁灌口中死亦生生下濕莖端三葉花黃子赤似覆盆子聖惠川椒一兩搜麵裹三角肉樣燒黃熟以綿蓋兒口掐去尖如箸頭使椒氣入口效未覺再作蜈蚣方治小兒口噤不開不能吮乳赤腳蜈蚣半條去足炙令焦為末麝香少許上以豬乳和之蓋豬乳能獨主小兒口噤不開蜘蛛方治小兒口噤不開不能吮乳蜘蛛一枚去足及口炙令焦細研用豬乳一合和為三服徐徐灌之神妙入麝香治牙疳極好牛涎方取東行牛口沫塗小兒口及額上即效治噤搐鼻法用鬱金藜蘆瓜蒂為末水調搐之茅先生云兒生一百二十日內犯風噤病同著噤因母受胎有疾故受毒氣生來血氣未調又被風邪所擊致之治法先與奪命散吐風涎見急慢驚門後下醒脾散一見胃氣不和門一見慢脾風門夾勻氣散與服見胃氣不和門又下雄朱散見赤白痢夾硃砂膏見急驚常服即愈如手提拳噤口不開死鵝口巢氏云兒初生口裡白屑滿舌上如鵝之口故名由在胎受穀氣盛心脾熱氣熏發於口治用發纏指頭蘸井花水揩拭之睡時黃丹煅出火氣摻於舌上如用前法其舌上白屑不脫可煮栗荴汁令濃以綿纏指頭拭之若春夏無栗荴可煮栗木皮如用井花水法簡要用牙硝細研於舌上摻之日三五度祕録用桑白皮汁和胡粉敷之雞䏶胵黃皮燒末水和服張渙保命散治嬰兒初生七日內胎毒者其舌上有白屑如米連舌下有膜如石榴子大令兒語不發名曰鵝口病白礬燒灰硃砂水飛各二錢半馬牙硝半兩上各研極細再同研每服一字取白鵝糞以水攪取汁調塗舌上頷頰內未用藥時先以手指纏亂髮揩拭舌上垢然後使藥敷之茅先生論兒喉中壅一塊肉瘤閉卻為喉痹身大熱舌硬不轉為木舌口開滿口黃如膏名鵝口三候皆熱甚生風風壅熱毒至此為實熱先用三解牛黃散見實熱門微與通吐惡涎後用勻氣散見胃氣不和門及用天竺黃散見重舌門夾牛黃膏見發熱門與服愈如喉響似鋸及眼視面青黑不奶食死候撮口外證舌強唇青聚口撮面面目黃赤氣息喘急啼聲不出飲乳有妨若口出白沫而四肢冷者不可救療其或肚脹青筋吊腸卵疝內氣引痛皆腸胃鬱結不通致之治法貴乎疏利辰砂膏是也初生一臘乃免七日也千金云小兒初出腹骨肉未斂肌肉猶是血也血凝乃堅成肌肉耳其血沮敗不成肌肉則使面目繞鼻口左右悉黃而啼閉目聚口撮面口中乾燥四肢不能伸縮者皆是血脈不斂也多不育若有如此者皆宜與龍膽湯也龍膽湯方治嬰孩小兒胎驚月內氣盛發熱臍風撮口壯熱龍膽草釣藤柴胡去蘆黃芩炒桔梗去蘆炒赤芍藥炒茯苓去皮甘草炙各五錢蜣螂二枚去翅足炙大黃一分紙裹煨上合研為極細末用棗去核煎或加防風去蘆麥門冬去心以導心熱食前調服張渙云嬰兒胎氣挾熱亦因母有邪熱傳染或生下洗浴當風襁褓失度致令嬰兒啼聲不出乳哺艱難名曰撮口不開病七日之內尤甚急風散主之急風散方蛇蛻皮微炒釣藤乾蠍稍各一分搗羅為細末硃砂一分細研水飛好麝香真牛黃各半錢並研極細上件都拌勻再研為細末每服一字取竹瀝一兩點同乳汁調下辰砂殭蠶散治初生撮口辰砂水飛半錢殭蠶真的去絲嘴炒一錢蛇蛻皮炒一錢麝香研半錢上為極細末少許用蜜調敷唇口撮風散治小兒撮口赤腳蜈蚣半條炙釣藤二錢半硃砂直殭蠶焙全蠍稍各一錢麝香一字上為末每服一字取竹瀝調下竹瀝解熱極好辰砂膏辰砂三錢硼砂馬牙硝各一錢五分玄明粉二錢全蠍真珠末各一錢麝香一字上為末和棗同好單包起自然成膏每服一字或一豆許治諸驚用金銀薄荷湯下潮熱甘草湯下月內嬰兒用乳汁調敷奶上令吮下臍風鎖口方金頭蜈蚣一個蠍稍五個直殭蠶七個瞿麥半錢上為末每一字吹入鼻中啼則可用薄荷湯調下一字然後服千金龍膽湯朱銀丸殭蠶方直殭蠶二枚去嘴略炒為末調敷唇口中甘草方治小兒撮口取吐甘草一錢上煎服令吐出痰涎即以豬乳點入口中即瘥臍風千金有臍風臍濕臍瘡三者皆因斷臍後為風濕傷而成夫風入臍臍腫腹脹四肢不利多啼不能乳甚者發搐為臍風腫濕經久不幹為臍濕風濕相搏令臍生瘡久不瘥為臍瘡有一不已入於經脈多變為癇癇成作癇治臍風者謂斷臍之後被水濕風冷所乘風濕之氣入於臍而流入心脾遂令肚腹脹滿臍腫身體重著四肢柔直日夜多啼不能吮乳甚則發為風搐若臍邊青黑撮口不開是為內搐不治爪甲黑者即死其或熱在胸堂伸縮努氣亦令臍腫宜千金龍膽湯主之方見前條錢氏云小兒洗浴拭臍不幹風入作瘡令兒撮口甚者是脾虛胃氣不和宜調氣益黃散主之方見脾部類萃云宜先用控痰飲吐風痰次用益脾散和脾又用辰砂膏利驚即愈或手足攣拳噤口不開者不治曾氏法先投劫風膏次以五苓散加寬氣飲入薑汁蔥白燈心煎湯調服與解風痰及用一字金煎荊芥湯或薄荷湯調抹口內證輕即快如稟賦充實發熱有痰驚搐投黑白飲溫蜜湯空心調下微泄似茶褐色二三行進白芍藥湯水薑棗煎服常用此法亦妙若臍凸音迭肚緊微有青色口撮不開肝風盛而脾土受制不可施治凡有此候百無一治縱使得安亦非長壽控痰散蠍尾銅青各半錢硃砂一錢膩粉一字麝香少許上為末每服一字臘茶清調下先吐風痰然後和胃或用前甘草方吐痰隨輕重用益脾散白茯苓人參草果煨木香濕紙裹煨甘草陳皮厚朴薑製紫蘇子炒各等分上為末每服一錢薑棗水煎辰砂膏方見前宣風散治初生兒因斷臍後外傷風濕唇青口撮多啼不乳口出白沫全蠍二十一個頭尾全去毒用無灰酒少許塗炙為末麝香一小字別研上研為極細末用半字金銀煎湯或麥門冬去心煎湯調化食遠服防風散治初生兒臍風防風去蘆羌活黃耆當歸川白芷甘草各半錢上為極細末少許用燈心麥門冬去心煎湯調化不拘時候服劫風膏治急慢驚搐臍風撮口牙關緊閉痰涎壅盛咽喉腫痛葳靈仙去蘆一兩半細銼焙研為末上用皂莢三兩去皮弦槌損挪溫水一碗絹濾過慢火熬若稀糊入醇醋半兩再熬三五沸去火候冷用前藥末亭分乳鉢內杵勻丸芡實大先用鹽梅肉擦牙根次以此膏一丸或二丸溫白湯濃調抹入左右牙關內即開續進別藥熬時得瓦器為上銀器尤佳及解風痰壅盛淡薑湯調化無時少與含咽咽喉腫痛溫茶清調下或薄荷湯五苓散寬氣飲俱驚一字金治初生嬰孩一七之外欲成臍風撮口及卒中急慢驚風牙關緊閉壅上痰涎殭蠶炒去絲葳靈仙去蘆各四錢明白礬生用二錢細辛去葉一錢甘草生用二錢半上銼焙為末每服一字至半錢薑汁沸湯調勻以指抹入牙關內治卒中急慢驚證口噤不開用鹽梅湯調擦上下牙根二處黑白飲治臍風氣實者及急驚壯熱發搐黑牽牛半生半炒白牽牛半生半炒大黃生用陳皮去白檳榔各半兩甘草炙三錢玄明粉二錢上除檳榔不過火餘五味或曬或焙仍合檳榔為末同玄明粉入乳鉢內再杵勻每服半錢至一錢溫蜜湯調化空心投服或無時此藥新合最妙久則效遲白芍藥湯方見疝張渙封臍散治嬰兒初生因乳母不謹洗浴水入臍中或兒尿在䙀袍之內濕氣傷於臍中或解脫風冷邪氣所乘令兒臍腫多啼不能乳哺名臍風病宜急用此好川當歸半兩洗焙乾天漿子三個微炒亂髮一錢燒灰存性上件同搗羅為細末入麝香一字拌勻用藥一字至半錢敷臍中時時用三因小兒初生一七日內忽患臍風撮口百無一效坐視其死良可憫也有一法世罕知者凡患此證看兒齒齦上有小泡子如粟米狀以溫水蘸熟帛裹指輕輕擦破即開口便安不藥神效小兒初生臍風撮口諸藥不效者灸然谷穴在內踝前起大骨下陷中可灸三壯針入三分不宜見血立效臍風目上插刺絲竹空臍腫灸腰對臍骨節間三壯炷如麥臍風撮口在百日內多不治臍濕嬰兒臍中腫濕經久不瘥若至百日即危急宜速療之顱囟經治臍濕方枯礬龍骨為末入麝少許拭臍乾用避風絳帛灰敷臍中干蝦蟆牡蠣各一枚燒灰細研少許敷臍中日三兩上瘥封臍散甑帶灰亂髮灰白姜灰紅帛灰四灰不得夾別灰南星白蘞當歸頭赤小豆五倍子血竭龍骨赤石脂煅海螵蛸百草霜胭脂各半錢上合研為極細末濕干敷干則清油塗忌生水浴臍又方紅綿灰黃牛糞灰龍骨發灰干胭脂各半錢上為極細末濕乾摻干清油塗臍又方治臍內出水汁不幹當歸頭去蘆一錢綿縛臍帶燒灰一錢或舊綿上為極細末入麝香一小字同研少許乾摻臍錢乙檗墨散黃柏釜下墨亂髮灰各等分上為細末每用少許敷之張渙胡粉散胡粉乾薑燒灰白石脂燒存性上各等分研極細再同研勻用藥一字至半錢敷臍中時時用莊氣臍大如栗虛腫而軟疼用竹瀝塗日數上消兒臍濕淹破屋爛草為末頻摻效臍瘡巢氏曰因浴兒水入臍中或尿濕䙀袍致臍中受濕腫爛成瘡或解脫為風邪所襲入於經絡則成風癇若臍腫不幹久則發搐肘後干蝦蟆燒灰敷日三四佳聖惠有枯礬異功散治臍中瘡龍骨煅薄荷葉蛇床子各二錢輕粉半錢上為極細末少許乾摻臍龍骨散治臍中瘡龍骨煅輕粉各半錢黃連去須一錢半上為極細末少許乾摻臍治兒滿月啼叫臍中出血用白石脂炒研極細末乾摻治兒因剪臍傷於外風致臍瘡不幹方白明礬煅龍骨煅各半錢上研為極細末乾摻張渙金黃散治臍瘡久不瘥風氣傳於經絡變為癇疾川黃連二錢半胡粉龍骨燒灰各一錢上各另研復合研為細末每用少許敷臍中時時用預防初生兒臍風著噤撮口最為急證十難救一預治之法宜時用軟帛包指拭口中牙齦上有筋兩條便用葦刀輕輕割斷以豬乳點黃連去須半錢豆豉二十四粒甘草一寸蔥白二寸上用童子小便煎綿蘸拭口中抱兒嚮明看臍上有赤脈直上便赤脈頭上灸三壯者生臍突初生之兒有熱在胸堂則頻頻伸引厄厄作聲努脹其氣抑入根本之中所以臍突腫亦虛大可畏無識之夫將謂斷臍不利而使之然者非也此由胎中母多驚悸或恣食熱毒之物所致宜對症與藥其熱自散其臍歸本不必以藥敷之恐反為害曾氏曰臍突一證又非臍風此亦因初生洗浴系臍不緊穢水侵入於內産後旬日外臍忽光浮如吹捻動微響間或驚悸作啼治用白芍藥湯加薏苡仁水煎空心溫服次以外消散塗貼自然平復白芍藥湯見疝外消散治嬰孩初生旬日外臍突或痛或不痛痛則啼聲不已及療小兒因感濕熱搏致陰器膚囊浮腫大黃牡蠣各半兩朴硝二錢上前二味銼焙為末仍入朴硝乳鉢內同杵勻抄一錢或二錢取田螺淨洗再以水半碗活過一宿去螺用水調塗腫處即消其螺仍放水中勿害之昔賢有曰殺生救生去生遠矣物命雖微亦可戒也治陰器膚囊腫車前子煎湯候冷調敷二豆散治嬰孩小兒臍突腫赤小豆不去皮豆豉天南星去皮臍白蘞各一錢上為極細末半錢用芭蕉自然汁調敷臍四傍一日一次二日二次若得小腑下白即安胎驚小兒壯熱吐哯心神不寧手足抽掣身體強直眼目反張是胎驚風證胎驚者以妊婦調攝乖常飲酒嗜欲忿怒驚撲母有所觸胎必感之或外挾風邪有傷於胎故子乘母氣生下即病也其候月內壯熱翻眼握拳噤口咬牙身腰強直涎潮嘔吐搐掣驚啼腮縮囟開或頰赤或面青眼合凡胎風眼合不可誤作慢脾妄用溫藥其有搭眼噤口之類亦此一種之所發也視其眉間氣色赤而鮮碧者可治若黯青黑者不治虎口指紋曲入里者可治反出外者不治先宜解散風邪利驚化痰調氣及貼囟法甚則以朱銀丸利之若面青拳搐用保命丹通治急慢驚釣藤散方見慢驚全蠍散方見偏風口噤之類大抵小兒臟腑脆弱不可轍用銀粉鎮墜之劑如遇此候急取豬乳細研牛黃麝香各少許調抹入口中仍服導赤散以瀉肝之子即愈矣石壁經歌未出胎中一月來母驚成患子臨胎腰直哭時先口撮面青拳搐縮雙腮眼閉咬牙筋脈急受氣時若陰氣弱胎易驚落肉消甚陽氣弱胎難驚落手足細肌肉瘦皆不盡天年若日月滿因驚落口撮腮臉起鼻塞口噤勿作驚治微汗次治驚調氣乳母服調氣藥兒貼囟任喚千聲眼不開退卻風涎為治療涎去驚邪自不回失治則目瞑先治驚則吐瀉秋夏必脾風初見勿作脾風治恐汗不出生別候鳳髓烏犀丸次生銀丸並急慢驚門錢白日內發搐真者不過三兩次必死假者頻發不為重真者內生驚癇假者外傷風冷蓋血氣未實不能勝任乃發搐也欲知假者口中氣出熱治之可發散大青膏主之可用塗囟法田月里生驚急取豬乳細研辰砂牛黃各少許調抹口中神效乳母服防風通聖散三劑其驚自消鬥小兒未滿月驚搐似中風欲死者用辰砂以新汲水濃磨汁塗五心上最效湯治胎癇驚風皆可服全蠍頭尾全者用生薄荷葉包外以麻線纏火上炙燥為末別研生朱麝香各少許煎麥門冬湯調下薛一小兒患胎驚諸藥不應用紫河車研爛如泥每用錢許乳化服之更以十全大補湯加釣藤鉤漏蘆與母服兩月餘舉發漸輕服年餘舉發漸稀服年餘不再發至出痘後復發取紫河車研爛入糯米粉丸小豆大每服百丸以乳送下服二具全瘥畢姻又發仍用前丸及十全大補湯六味丸加當歸黃耆肉桂五味子年餘喜其能遠帷幕得痊後因勞役更作又用前丸及十全大補等藥不應用大劑獨參湯服數斤然後舉發稍緩乃用人參二兩附子一錢數服頓止仍用前藥間用獨參湯而痊一小兒患胎驚用紫河車丸及十全大補湯及釣藤膏而愈畢姻後復發用大劑獨參湯六味丸加五味子黃耆當歸煎服半載舉發稍輕年餘不再發後每勞役怒氣仍發即用前藥隨愈又傷寒愈後復作虛症悉具莫能名狀用紫河車二具獨參煎湯十餘斤而痊後患傷風咳嗽咽乾內熱用六味地黃丸料加五味子煎服及十全大補湯而痊獨活湯治胎驚發散風邪獨活羌活各一分檳榔天麻麻黃去節甘草各半分上銼散每服半錢煎服於內加南星末蜜調下可貼囟用驅風散胡黃連二錢半全蠍去毒焙犀角天竺黃麻黃去節各半錢麝香一字上為細末用乳汁調化食遠服上二方發散之劑實有表證方可用之青金丸治嬰孩小兒解散胎熱化痰涎鎮驚邪人參去蘆天麻煨茯神去皮木白附子炮牛膽南星炒各二錢甘草炙一錢半青黛一錢硃砂水飛半錢麝香一字上為極細末煉白蜜丸如梧桐子大用釣藤皂莢子煎湯研化不拘時候服太乙散治芽兒胎驚病瘥亦宜常服天漿子去殼微炒南星白附子各微炮天麻防風茯苓各二錢全蠍硃砂各一錢麝香少許上為末每服半錢乳汁化下張渙方天漿蠍稍各二十一個防風天麻硃砂各半兩麝香一錢無茯苓白朮參蠍散治小兒胎驚定心神天漿子天竺黃人參硃砂全蠍天麻蟬蛻各等分麝香少許上為末煉蜜丸桐子大每服一丸金銀湯下豬乳膏治小兒諸驚胎癇全蠍一個焙琥珀硃砂少許上為末每服一字麥門冬煎湯調下朱銀丸治小兒胎風壯熱痰盛翻眼口噤取下胎中蘊受之毒亦治驚積但量與之水銀一錢蒸棗研如泥白附子一錢半全蠍南星硃砂各一錢天漿子蘆薈牛黃各半兩鉛霜半錢和水銀煅研腦一字麝香少許直殭蠶炒七個上為末煉蜜丸桐子大薄荷湯化下張渙聖星丹諸癇皆宜服之曾經大效天南星一般大者四十九個端午取活蠍四十九個瓦器盛鹽泥固濟吊靜室中臘日取出揀南星蠍蜇著處有小竅子者其餘不用只將蠍蜇南星以酒浸一宿焙研細末次用牛黃麝香龍腦各一錢研細辰砂細研水飛二錢半上件再一處研勻薑汁和桐子大服一粒至二粒人參薄荷湯化下白金散治諸癇潮發不省者白殭蠶半兩湯洗炒微黃搗羅為細末次用天竺黃二錢五分牛黃一錢麝香龍腦各半錢細研拌勻每服半錢薑汁調放溫灌之烏金膏治胎癇潮發頻並烏梢蛇一條取淨肉酒浸一宿焙蠶紙一張燒灰蟬殼全蠍硃砂飛各半兩金箔二十片龍腦麝香各半錢上各取細末研勻蜜和如皂子每服一粒人參薄荷湯化下天南星煎治胎癇潮發遲省天南星微炮白附子白花蛇酒浸去皮骨炙黃各一兩乾蠍炒天麻各半兩以上搗羅為細末用好酒兩大盞慢火熬不住手攪以酒盡為度次用硃砂細研水飛半兩膩粉二錢五分牛黃麝香龍腦各半錢細研入膏內和如皂子每服一粒竹瀝化下無時祛風散治胎癇多啼叫胡黃連半兩全蠍犀角天竺黃麻黃去節各二錢五分上各取細末和勻每服半錢入麝一字乳汁調下鐵粉散驚風面赤口乾大便不利尤宜服錢粉半兩鬱金牛黃真珠胡黃連各二錢五分各研細拌勻每服一字溫蜜湯調下羌活膏治胎癇昏困不省羌活獨活各一兩天麻全蠍人參去蘆白殭蠶微炒各半兩烏蛇肉一兩酒浸一宿焙上搗羅為細末煉蜜和膏每服皂子大麝香荊芥湯化下麝香膏治胎癇不得安臥麝香研牛黃研白附子蠶蛾微炒白殭蠶微炒各二錢五分全蠍二十一個上取淨末更研細蜜和膏如皂子每服一粒人參荊芥湯化下胎癇曾胎癇者因未産前腹中被驚或母食酸鹹過多或為七情所汨致傷胎氣兒生百日內有者是也發時心不寧面微黃氣逆痰作目上視身反張啼聲不出先用參蘇飲和解次以不驚丹或琥珀抱龍丸間投輕則可愈重者難全參蘇飲發熱不驚丹驚琥珀抱龍丸驚胎風小兒初生其身有如湯潑火傷者此皆乳母過食膏粱所致也其母宜服清胃散方見雜病牙齒門及逍遙散方見女科虛勞門以清其氣血兒亦飲數滴可也有身無皮膚而不焮赤者皆由産母脾氣不足也用粳米粉敷之焮赤發熱者皆由産母胃中火盛也用石膏敷之經謂脾主肌肉肺主皮毛故知病脾肺也如腦額生瘡者火土相合遂成濕熱下流攻擊腎水也難治如腳上有瘡者陰虛火盛也此不滿五歲而斃如未滿月而撮口握拳腰軟如隨者此肝腎中邪勝正弱所致也三日內必不治如男指向里女指向外尚可治眉紅亦不可治可治者用全蠍散方見口噤釣藤散方見慢驚等類治之若因大病虧損胃氣而諸臟虛弱所致者用補中益氣湯方見虛羸錢氏地黃丸方見腎臟若面唇赤色正屬腎水不足肝經陰虛火動而內生風熱爾當滋腎水以制陽光其身軟者內稟氣不足肌肉未堅也常參五軟而施治之聖惠所云胎風原與胎驚混濫故此不取胎熱兒在胎中母多驚悸或因食熱毒之物降生之後旬日之間兒多虛痰氣急喘滿眼閉目赤目胞浮腫神困呵缺呢呢作聲遍體壯熱小便赤色大便不通時復驚煩此因胎中受熱或誤服溫劑致令熱蓄於內熏蒸胎氣故有此證若經久不治則鵝口重舌木舌赤紫丹瘤自此而生宜先以木通散煎與母服使入於乳令兒飲之通心氣解煩熱然後以四聖散溫洗兩目目開進地黃膏天竺黃散及牛蒡湯當歸散亦令母服凡有胎疾不可求速效當先令乳母服藥使藥過乳漸次解之百無一失若即以涼藥攻之必生他病乳母仍忌辛辣酒面庶易得安不致反覆生地黃湯湯氏治小兒在胎時因母有熱或恣飧酒面熱毒之物傳於胎中令兒生下面赤眼閉身體壯熱哭聲不止口熱如湯乃胎熱之候也生地黃赤芍藥川芎當歸栝蔞根上件等分㕮咀每服半兩水一盞煎六分産婦亦可服以些少抹入兒口中木通散主小兒上膈熱小府閉諸瘡丹毒母子同服木通地萹蓄各半兩大黃甘草赤茯苓各三錢瞿麥滑石山梔子車前子黃芩各二錢半上水一鍾燈心三莖或入薄荷同煎釀乳法豬苓去黑皮澤瀉赤茯苓去皮天花粉茵陳生甘草生地黃山梔去殼上銼散用水煎食後令乳母捏去宿乳卻服此藥甘豆湯治小兒胎熱甘草一錢黑豆二錢淡竹葉七莖上㕮咀用水一鍾入燈心七莖煎不拘時候服四聖散主芽兒胎受熱毒生下兩目不開燈心黃連秦皮木賊棗子各半兩上水一鍾煎澄清去滓無時起洗兩目自開後服地黃膏地黃膏治胎熱山梔仁緑豆粉各一兩半粉草六錢上為末用生地黃爛杵一兩半和好蜜一兩半以薄瓦器盛在銅銚中煮成膏如稀糊相似候冷停分入前藥末同在乳鉢內再研勻芡實大每以半丸麥門冬湯化服天竺黃散見口瘡牛蒡湯見咽喉當歸散見潮熱清胃散見雜病牙齒門薛氏治胎熱用此胎寒嬰兒初生百日內覺口冷腹痛身起寒栗時發戰栗曲足握拳晝夜啼哭不已或口噤不開名曰胎寒其證在胎時母因腹痛而致産經云胎寒多腹痛亦有産婦喜啖甘肥生冷時果或胎前外感風寒暑濕治以涼藥內傷胎氣則生後昏昏多睡間或哯乳瀉白若不早治必成慢驚慢脾凡有此候宜以沖和飲當歸散合和水煨姜煎服使之微泄泄行進勻氣散調補泄止氣勻神安痛定手足舒伸次用參苓白朮散以養胃氣白芍藥湯去其寒濕乳母宜節生冷飲食庶易瘥也又有手足稍冷唇面微青額上汗出不顧乳食至夜多啼頗似前證但無口冷寒戰名曰臟寒其疾夜重日輕腹痛腸鳴泄瀉清水間有不泄者此證亦在百日內有之皆因臨産在地稍久冷氣侵逼或以涼水參湯洗兒或斷臍帶短而又結縛不緊為寒氣所傷如此宜以白芍藥湯及沖和飲加鹽炒茴香茱萸水姜煎服並乳母同服湯小兒胎中有寒生下不能將護再傷於風其候面色青白四肢逆冷手足顫動口噤不開乃胎寒之故或寒乘虛入臟作腹疼盤腸內吊治法詳寒腹痛條沖和飲當歸散方見潮熱白芍藥湯見疝勻氣散見疝參苓白朮散異功散薛氏治胎寒用此胎肥胎怯錢氏曰胎實面紅目黑睛多者善笑胎怯面黃目黑睛少白睛多者多哭更別父母肥瘦肥不可生瘦瘦不可生肥也胎肥者生下肌肉厚遍身血色紅滿月以後漸漸羸瘦目白睛粉紅色五心煩熱大便難時時生涎浴體法主之天麻二錢蠍尾去毒硃砂各五分烏蛇肉酒浸焙乾為末白礬各三錢麝香一字青黛三錢上研勻每用三錢水三碗桃枝一握並葉五七枝同煎至十沸溫熱浴之勿浴背大連翹飲治胎熱臍風小便不通及諸般瘡毒連翹瞿麥荊芥木通赤芍藥當歸防風柴胡滑石蟬殼甘草炒各一錢山梔子黃芩各半錢上為末每服二錢加紫草水煎熱甚加大黃更詳證加減薛氏曰胎肥乃受母胃熱所致兒用浴體法以疏通其腠理乳母服大連翹飲胎怯者生下面無精光肌肉薄大便白水身無血色時時哽氣多噦目無精采亦宜以浴體法主之初虞世曰母氣不足則羸瘦而肉薄父精不足則解顱眼白多胎黃小兒生下遍體面目皆黃狀如金色身上壯熱大便不通小便如梔汁乳食不思啼哭不止此胎黃之候皆因乳母受濕熱而敷於胎也凡有此證母子皆宜服地黃湯及地黃飲子有生下百日及半周不因病後身微黃者胃熱也若自生而身黃者胎疸也經云諸疸皆熱色深黃者是也犀角散主之若淡黃兼白者胃怯也白朮散主之生地黃湯治小兒生下胎黃生地黃赤芍藥川芎當歸栝蔞根各等分上㕮咀每服半兩水煎乳母服時時少抹入兒口中地黃湯生地黃赤芍藥天花粉赤茯苓去皮川芎當歸去蘆豬苓澤瀉甘草茵陳各等分上銼散用水煎食前服地黃飲子治小兒生下滿身面目皆黃狀如金色或面赤身熱眼閉不開大便不通小便如梔子汁滿身生瘡生地黃赤芍藥各二錢羌活去蘆當歸去蘆甘草一錢上為極細末用燈心煎湯食前服乳母宜服仍忌酒面五辛之物犀角散治小兒胎黃一身盡黃犀角茵陳栝蔞根升麻煨甘草龍膽草生地黃寒水石煅等分上㕮咀用水煎不拘時候服胎赤田氏云月里生赤肌膚如赤丹塗者先用牛黃散托裡續用藍葉散塗外乳母服清涼飲子三大劑牛黃散或即牛黃奪命散方見喘門清涼飲方見腹痛張渙云嬰兒初生須洗目令淨若洗不淨則穢汁浸漬於眼眥中使瞼赤爛至長大不瘥者名曰胎赤宜用二金散曾純陽之子始生旬月忽兩目俱紅弦爛澀癢成翳此因在胎為母感受風熱傳於心肝而得先以百解散加當歸散水薑燈心煎服次導赤散及牛蒡湯加黃連木賊蟬殼水煎服自效有因難産胎氣頗澀轉側差緩其血壓於兒首遂至濺血滲下盛則灌注其眼不見瞳人輕則外胞腫赤上下弦爛若投涼藥必寒臟府宜與生地黃湯主之百解散方見驚搐當歸散導赤散方見心臟牛蒡湯方見喉痹二金散方黃連去須黃柏各一錢上搗為粗末以乳汁浸一宿焙乾每用少許以新綿裹用荊芥湯浸放溫熱時時洗之真金散治小兒初生洗眼不淨則穢汁浸漬於眼眥中使瞼赤爛至長不瘥母食熱物熱藥名曰胎赤黃連去須黃柏當歸赤芍藥各一錢杏仁去皮尖半錢上銼散乳汁浸一宿曬乾為極細末用生地黃汁調一字頻頻點眼新綿裹荊芥湯浸溫時時洗浴母服洗心散洗心散甘草生當歸麻黃芍藥白朮荊芥穗大黃煨各半錢上為極細末用生薑薄荷煎湯調化食遠服生地黃湯見眼不開集之二肝臟部肝錢肝主風實則目直大叫呵缺項急頓悶虛則咬牙多缺氣熱則外生氣溫則內生肝病哭叫目直視呵缺頓悶項急外生感風呵缺頓悶口中氣熱當發散大青膏主之若能食飲水不止當大黃丸微下之余不可下肝熱手尋衣領及亂捻物瀉青丸主之壯熱飲水喘悶瀉白散主之肝有風目連札不搐得心熱則搐治肝瀉青丸治心導赤散肝有熱目直視不搐得心熱則搐治肝瀉青丸治心導赤散肝有風甚身反折強直不搐心不受熱也當補腎治肝補腎地黃丸治肝瀉青丸凡病或新或久皆引肝風風動而上於頭目目屬肝風入於目上下左右如風吹不定兒不能任故目連札也若熱入於目牽其筋脈兩眥俱緊不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相搏故也潔古曰肝主謀勇熱則尋衣捻物目連札直視不能轉視或極則身反強直折皆風熱也目者肝之竅屬木木性急故如是肝病秋見一作日晡肝強勝肺肺怯不能勝肝當補脾肺治肝益脾者母令子實故也補脾益黃散治肝瀉青丸主之肝病春見一作早晨肺勝肝當補腎肝治肺臟肝怯者受病也補肝腎地黃丸治肺瀉白散主之五臟相勝輕重肝病見秋木旺肝勝肺也宜補肺瀉肝輕者肝病退重者唇白而死婁五臟相勝病隨時令乃錢氏擴充內經藏氣法時論之旨實發前人所未發者也假如肝病見於春及早晨乃肝自病於本位也今反見於秋及日晡肺之位知肺虛極肝往勝之故當補脾肺瀉肝也余仿此潔肝主風自病則風搐拘急急食甘以緩之佐以酸苦以辛散之實則風搐力大瀉青丸主之虛則風搐力小地黃丸主之心乘肝實邪壯熱而搐利驚丸涼驚丸主之肺乘肝賊邪氣盛則前伸呵缺微搐法當瀉肺先補本臟補肝地黃丸主之瀉肺瀉白散主之脾乘肝微邪多睡體重而搐先當定搐瀉青丸主之搐止再見後證則別立法治之腎乘肝虛邪增寒呵缺而搐羌活膏主之劉凡肝得病必先察其肺腎兩臟根其病之所起然後審其肝家本臟之虛實方可治療然腎者肝之母金者木之賊今肝之得病若非腎水之不能相生必是肺金之鬼來相攻擊不得不詳審而求之故其來在肺先治其肺攻其鬼也其來在腎先補其腎滋其根也然後審其肝家本臟之虛實而寒溫之薛若肝經實熱而外生風者宜用大青膏散之若既服而前證仍作或益甚者此邪氣已去而脾氣虧損也宜用異功散加芎歸補之若肝經虛熱或因克伐而內生風者宜用異功散地黃丸補之若風邪入臟能食飲冷大便祕結者此邪氣內實也宜用大黃丸下之若既下而食少飲湯或腹作脹者此脾氣內虛也宜用白朮散補之氣血素弱或因病後或服攻伐之劑而手尋衣領咬牙呵缺目淡青者乃肝經虛甚也急用地黃丸以補腎肝哽氣短氣長出氣乃肺經虛甚也急用異功散以補脾肺若申酉時叫哭直視呵缺頓悶項急驚悸手足搖動發熱飲水者此風火相搏而勝肺金也用柴胡梔子散以治肝火生肝血用異功散補脾土生肺金若唇白者為脾絶不治海肝苦急急食甘以緩之草草肝欲散急食辛以散之川芎以辛補之細辛以酸瀉之芍藥肝虛以生薑陳皮之類補之虛則補其母腎者肝之母也以熟地黃柏補腎如無他證錢氏地黃丸補之補肝丸四物湯內加防風羌活等分為細末煉蜜為丸是也鎮肝丸即瀉青丸去梔子大黃是也治肝虛錢氏補腎地黃丸肝實以白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心瀉青丸錢氏又名瀉肝丸當歸去蘆焙龍膽焙川芎山梔子仁川大黃濕紙裹煨羌活防風去蘆各等分上為末煉蜜和丸芡實大每服半丸至一丸煎竹葉湯同沙糖溫水化下薛前方足厥陰經解散肌表疏通內熱之藥也若大便祕結煩渴飲冷飲食如常者屬形病俱實宜用此以瀉之若大便調和煩渴飲冷目淡青色屬病氣實而形氣虛宜用抑肝散平之若大便不實作渴飲湯飲食少思肢體倦怠者屬形病俱虛宜用地黃丸補之抑肝散治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹少食睡臥不安軟柴胡甘草各五分川芎八分當歸白朮炒茯苓釣藤鉤各一錢上水煎子母同服如蜜丸名抑青丸大青膏方見驚搐大黃丸方見腹脹異功散方見吐瀉白朮散方見渴柴胡梔子散方見諸熱利驚丸涼驚丸羌活膏三方俱見驚搐洗心散驚婁驚搐一也而有晨夕之分表裡之異身熱力大者為急驚身冷力小者為慢驚仆地作聲醒時吐沫者為癇頭目仰視者為天吊角弓反張者為痙而治各不同也臟腑旺時補瀉法錢因潮熱發搐在寅卯辰時者此肝用事之時也身體壯熱目上視手足動搖口內生熱涎項頸強急此肝旺也當補腎治肝補腎地黃丸方見腎部治肝瀉青丸方見肝部薛寅卯辰時搐而發熱作渴飲冷便結屬肝膽經虛熱用柴芍參苓散作渴引飲自汗盜汗屬肝膽經血虛用地黃丸口吻流涎屬肝木克脾土用六君子湯一小兒寅卯時發熱痰搐服抱龍丸而愈後復患因自用前藥更加咳嗽氣喘不時發搐面赤或青黃或浮腫或流涎余謂咳嗽氣喘乃脾肺氣虛不時發搐乃木乘土位面青而黃赤乃肝助心脾浮腫流涎乃脾氣虛弱用益智丸以補心神補中益氣湯以養脾肺頓愈錢因潮熱發搐在巳午未時者此心用事之時也心惕目上視白睛赤色牙關緊急口內涎生手足動搖此心旺也當補肝治心治心導赤散涼驚丸補肝地黃丸廣親宅七太尉方七歲潮熱數日欲愈錢謂父二大王曰七使潮熱將安八使預防驚搐王怒曰但使七使愈勿言八使病錢曰八使過來日午間即無苦也次日午前果作搐急召錢治之三日而愈蓋預見其目直視而腮赤必肝心俱熱更坐石杌子乃欲就冷此熱甚也又肌膚素肥盛而本實其脈急促故發搐克言午時者自寅至午皆心肝用事之時治之乃瀉心肝補腎自安矣薛巳午未時發搐若兼作渴飲水屬風火相搏以地黃丸補肝導赤散涼驚丸治心若作渴飲湯體倦不乳土虛而木旺也用地黃丸以補腎六君子湯以補脾一小兒巳午時搐熱驚悸發時形氣倦怠而黃懶食流涎飲湯此心火虛而不能生脾土也不信自服涼心之藥更加吐瀉睡而露睛幾成慢脾風用六君薑桂佐以地黃丸而愈一小兒七歲驚搐發熱不已巳午未時益甚形氣殊倦熱定飲湯此心脾氣虛朝用補中益氣湯加益智仁夕用六君當歸釣藤鉤尋愈後飲食過多復作吐瀉或治以保和丸反加寒熱發搐此脾土復傷而肝木所侮也用六君柴胡寒熱止而飲食進但午未時仍泄用補中益氣湯加茯苓半夏釣藤鉤而全錢因潮熱發搐在申酉戌時者此肺用事之時也不甚搐而喘目微斜視身熱如火睡露睛手足冷大便淡黃水是肝旺當補脾益黃散方見脾部治肝瀉青丸治心導赤散潔古云脾病肝強法當補脾恐木賊害宜先瀉心肝以挫其強而後補脾為當徐氏子三歲病潮熱每日西則發搐身微熱而目微斜露睛四肢冷而喘大便微黃請錢與李同治錢問李曰病何搐也李曰有風何身熱微溫曰四肢所作何目斜睛露曰搐則目斜何肢冷曰冷厥心內熱曰何喘曰搐之甚也曰何以治之曰涼驚丸鼻中灌之必搐止錢又問曰既謂風病溫壯搐引目斜露睛內熱支冷及搐甚而喘並以何藥治之李曰皆此藥也錢曰不然搐者心肝實也身微熱者日西肺用事之時也肺主身溫今且熱者肺虛也目微邪露睛者肝肺相乘勝也四肢冷者脾虛也肺若虛甚則脾母亦弱木氣乘脾四肢即冷治之當先補脾肺用益黃散阿膠散得脾虛證退然後治其心肝用瀉青丸導赤散涼驚丸治之九日愈薛申酉戌時微搐而喘目微斜身似熱睡而露睛大便淡黃屬脾肺虛熱用異功散手足逆冷或喘瀉不食屬脾肺虛寒用六君炮薑木香久病而元氣虛者用六君子六味丸二藥主之錢因潮熱發搐在亥子丑時者此腎用事之時也不甚搐而臥不穩身體溫壯目睛緊斜視喉中有痰大便銀褐色乳食不消多睡不省當補脾治心補脾益黃散治心導赤散涼驚丸潔古云皆因大病後脾胃虛損多有此疾薛亥子丑時微搐身熱目睛緊斜吐瀉不乳厥冷多睡屬寒水侮土用益黃散未應用六君薑桂表裡錢傷風發搐因傷風后得之口中氣出熱呵缺頓悶手足動搖當發散大青膏主之小兒生來怯弱者多此病也潔傷風發搐因傷風而得之證同大人傷風寒痰之類當辨有汗無汗陰陽二證用大青膏小續命之類開發則愈大青膏陰證小續命陽證也薛傷風發搐口氣不熱肢體倦怠用異功散補脾土釣藤飲清肝木若因風邪內郁發熱而變諸證者當理肺金清風邪若外邪既解而內證未除當理肺補脾若肺經虧損而致驚搐等證者當補脾肺以平肝心則驚搐自止矣一小兒月內發搐鼻塞乃風邪所傷以六君子湯加桔梗細辛子母俱服更以蔥頭七莖生薑一片細擂攤紙上合置掌中令熱急貼囟門少頃鼻利搐止大青膏天麻末一分白附子末生一錢半青黛一錢研蠍尾去毒生末烏蛇稍肉酒浸焙乾取末各半錢硃砂研天竺黃研上同再研細生蜜和成膏每服半皂子大至一皂子大月中兒粳米大同牛黃膏溫薄荷水化一處服之五歲以上同甘露散服之小續命湯方見中風錢傷食發搐因傷食後得之身體溫多唾多睡或吐不思乳食而發搐當先定搐搐退白餅子方見癖下之後服安神丸方見心臟潔傷食發搐謂不因他證忽然而搐此因飲食過度致傷脾胃故兒多睡多吐不思飲食脾胃既虛引動肝風則發搐當先定其搐如羌活防風煎下瀉青丸後用白餅子下其食漸漸用調中丸方見腹痛異功散方見吐瀉養其氣薛停食發搐嘔吐乳食者宜用消食丸若食既消而前證仍作或變他證者脾土傷而肝木乘之也用六君子加釣藤鉤以健脾平肝消食丸方見傷食垣外物驚宜鎮平之以黃連安神丸若氣動所驚宜寒水石安神丸婁外物驚者元氣本不病故治以黃連安神之苦寒氣動驚者不因外物驚元氣自有病故治以寒水石安神之甘寒也黃連安神丸黃連淨酒炒一錢半硃砂細研水飛生地黃當歸各一錢甘草炙五分上為極細末蒸餅和丸如黃米大每服十丸津下寒水石安神丸即錢氏安神丸方見心臟鎮心丸涼心經治驚熱痰盛甜硝白者人參去蘆取末各一兩甘草炙寒水石燒各一兩半乾山藥白者白茯苓各二兩硃砂一兩龍腦麝香各一錢三味俱研上為末熟蜜丸如雞頭大如要紅入坯子胭脂二錢即染胭脂溫水化下半丸至一二丸食後急慢驚總論小兒急慢驚風古謂陰陽癇也急者屬陽陽盛而陰虧慢者屬陰陰盛而陽虧陽動而躁疾陰靜而遲緩皆因臟腑虛而得之虛能發熱熱則生風是以風生於肝痰生於脾驚出於心熱出於肝而心亦熱以驚風痰熱合為四證搐搦掣顫反引竄視為八候凡眨眼搖頭張口出舌唇紅臉赤面眼唇青及瀉皆青髮際印堂青筋三關虎口紋紅紫或青者皆驚風候也大抵肝風心火二者交爭必挾心熱而後發始於搐故熱必論虛實證先分逆順治則有後先蓋實熱為急驚虛熱為慢驚慢驚當無熱其發熱者虛也急驚屬陽用藥以寒慢驚屬陰用藥以溫然又必明淺深輕重進退疾徐之機故曰熱論虛實者此也男搐左視左女搐右視右男眼上竄女眼下竄男握拇指出外女握拇指入里男引手挽左直右曲女引手挽右直左曲凡此皆順反之則逆亦有先搐左而後雙搐者但搐順則無聲搐逆則有聲其指紋彎弓入里者順反外者逆出入相半者難痊故曰證分逆順者此也陽病陰脈陰病陽脈亦為反凡熱盛生痰痰盛生驚驚盛生風風盛發搐治搐先於截風治風先於利驚治驚先於豁痰治痰先於解熱其若四證俱有又當兼施並理一或有遺必生他證故曰治有先後者此也綱領如此若分三者言之暴烈者為急驚沉重者為慢驚至重者肝風木之克脾土則為慢脾風矣婁急驚證屬木火土實也木實則搐而力大目上目札所謂木太過曰發生其動掉眩癲癇是也火實則身熱面赤土實則不吐瀉睡合睛故其治法合涼瀉而用涼驚丸利驚丸之類慢驚證屬木火土虛也木虛則搐而力小似搐而不甚搐經所謂木不及曰委和其病搖動注恐是也謂手足搐動腹注泄心恐悸也火虛則身冷口氣冷土虛則吐瀉睡露睛故其治法合溫補而用羌活膏益黃散有熱者用東垣黃耆益黃散其東垣非錢氏羌活膏治慢驚者謂土虛泄瀉火木乘之謂手掌與腹俱熱之證若火木土俱虛而搖動恐悸注瀉手腹冷者非羌活膏不能治之丹小兒驚風有二急驚屬痰熱宜涼瀉慢驚屬脾虛所主多死宜溫補急驚用降火下痰丸養血藥作湯下之慢驚當補脾兼用硃砂安神丸清米湯下更於血藥中求之如四物四君東垣黃耆益黃散之類世以一藥通治之甚妄急驚急驚之候亦曰真搐牙關緊急壯熱涎潮竄視反張搐搦顫動唇口眉眼眨引頻並口中氣冷臉赤唇紅大小便黃赤其脈浮數洪緊此內挾實熱外感風邪心家受熱積驚肝家生風發搐肝風心火二臟交爭血亂氣並痰涎壅盛百脈凝滯關竅不通風氣蕃盛無所發泄故暴烈也又有搐搦反張斜視而牙關不緊口無痰涎而氣熱未可直指以為驚風恐是傷風傷寒夾食夾驚疹痘等證此即錢氏假搐之說又各依本證施治矣又急驚搐搦不可把握但扶持之否則風癇逆入經絡遂使手足拘攣成廢疾錢急驚因聞大聲或大驚而後發搐發過則如故此無陰也當下利驚丸主之急驚本因熱生於心身熱面赤引飲口中氣熱大小便黃赤劇則發搐蓋熱甚則風生風屬肝此陽盛陰虛也故利驚丸主之以除其痰熱不可用巴豆及溫藥大下之恐搐虛熱不消也小兒熱痰客於心胃因聞大聲非常則動而驚搐矣若熱極雖不聞聲及驚亦自發搐閻氏云急驚內有熱即生風又或因驚而發則目上連札潮涎搐搦身體與口中氣皆熱及其發定或睡起即了了如故此急驚證也當其搐勢漸減時與鎮心治熱之藥一二服如麝香丸鎮心丸抱龍丸辰砂丸紫雪之類候驚勢已定須臾以藥下其痰熱如利驚丸軟金丹桃枝丸之類利下痰熱心神安寧即愈潔古云急驚者陽證也俱府受病熱痰客於心肺是少陽相火旺經云熱則生風因聞大聲而作蓋謂東方震卦得火氣而發搐火本不動焰得風而動當用利驚丸導赤散瀉青丸地黃丸搐止宜服安神丸垣治驚大忌防風丸防風辛溫之藥必殺人何也辛散浮溫熱者火也能令母實助子之氣盛皆殺人也如因驚而瀉青色先鎮肝以硃砂之類勿用寒涼之藥大禁涼驚丸風木旺必克脾胃當先實其土後瀉其子丹急驚風發熱口噤手足心伏熱痰嗽痰喘並用湧法重則用瓜蒂散輕則用苦參赤小豆末以酸齏汁調服候少定用通聖散蜜丸服之間以桑樹上桑牛陰乾研末調服以平其風桑牛比楊牛則色白黃者是又以北薄荷葉寒水石各一兩青黛白殭蠶辰砂各一錢全蠍二枚豬牙皂角槐角各五分併為末燈心湯和乳汁灌之角弓反張目直視因驚而致宜南星半夏入薑汁竹瀝灌之更灸印堂初驚用防風導赤散生乾地黃川木通防風甘草等分用竹葉三錢煎服須用寧神膏麥門冬去心天竹黃茯神硃砂各一兩麝香一錢各搗研極細煉蜜和捏作小餅子臨臥薄荷湯化下一夜一餅老醫常言小兒驚搐多是熱證若先便用驚風藥白附子全蠍殭蠶川烏之類便是壞證後有醫幼科者只用導赤散加地黃防風進三服導去心經邪熱其搐便止次服寧神膏神效從孫道潤幼時患驚搐甚危延京口諸有名幼科醫療之益困篤其祖易庵兄求方於余以是授之二服立愈自後常以救人無不效者恐人忽易故著之曾急驚之論前代書所不載惟曰陽癇大概失所愛護或抱於當風或近於熱地晝則食多辛辣夜則衾蓋太厚鬱蒸邪熱積於心傳於肝再受人物驚觸或跌撲叫呼雷聲鼓樂雞鳴犬吠一切所驚未發之時夜臥不穩困中或笑或哭齧齒咬乳鼻額有汗氣促痰喘忽爾悶絶目直上視牙關緊急口噤不開手足搐掣此熱甚而然況兼面紅脈數可辨蓋心有熱而肝有風二臟乃陽中之陽心火也肝風也風火陽物也風主乎動火得風則煙焰起此五行之造化二陽相鼓風火相搏肝藏魂心藏神因熱則神魂易動故發驚也心主乎神獨不受觸遇有驚則發熱熱極生風故能成搐名曰急驚治之之法先以五苓散加黃芩甘草水煎或百解散發表次通心氣木通散三解散疏滌肝經安魂退熱牛蒡湯防風湯主之驚風既除之後輕者投半夏丸重者下水晶丹與之去痰免成癡疾但不可用大寒涼藥治之熱去則寒起亢則害承乃制若倉卒之間驚與風證俱作只用五苓散加辰砂末薄荷湯調服少解其證蓋五苓散內有澤瀉導小便心與小腸為表裡小腸流利心氣得通其驚自減內有桂木得桂則枯是以能抑肝之氣其風自停況佐以辰砂能安神魂兩得其宜大略要解熱涼心肝後惟可用平和湯散調理稍熱之劑則難用醫者宜審之愚嘗感慨諸人每見驚風搐作不明標本混為一證遽然全用金石腦麝蜈蠶蛇蠍大寒搜風等劑投之耗傷真氣其證愈甚多致弗救殊不知驚生於心風生於肝搐始於氣是為三證其驚與風首已詳及然所謂蓄氣而成搐陳氏之論最為明理但未著其方余於此證則用寬氣飲治之只以枳殼枳實為主蓋其氣也四時平和則身安一息壅滯則疾作況小兒啼哭不常其氣蘊蓄內則不能升降外則無由發泄輾轉經時亦能作搐善醫者審察病源從而療之萬無一失更辨陰陽虛實不可輕忽若陽實證煎五和湯調三解散主之此急驚有搐之類若陰虛證煎固真湯調寬氣飲治之此慢驚有搐之類若暴感此證未別陰陽虛實先用五苓散和寬氣飲及少加寬熱飲三藥合用薑汁沸湯調灌即解大抵治搐之法貴以寬氣為妙氣順則搐停此自然之理大凡幼稚欲令常時驚悸不作在乎腎臟和平故戴氏曰治驚不若補腎謂心屬火火性燥得肝風則煙焰起致生驚悸補腎則水升火降邪熱無侵雖有肝風不生驚駭其法當於申時進補腎地黃丸一服或琥珀抱龍丸用申時者蓋水生於申佐之以藥則腎水得平心火不炎自無驚矣鈐方治法大要用藥有次序有輕重通關以後且與截風定搐風搐既定卻下痰熱理為至當若患在痰熱未有驚風只可退熱化痰不可妄投驚風藥蓋藥中多用寒涼恐引痰熱入經絡凡病在熱不可妄治痰止當解表病在驚不可妄治風蓋驚由痰熱得只可退熱化痰而驚自止病在痰不可便治驚急須退熱化痰病在風不可便治搐蓋風由驚作只可利驚化痰其風自散若也有搐須用截風散驚至妙之道若治驚而痰不化熱亦不退驚安得自止化其痰熱若不退風亦不散痰安得去是知不治之治所以治之之謂歟急驚初傳風搐得定而痰熱一泄又須急與和胃定心之劑若搐定而痰熱無多則但用輕藥消痰除熱可也然急驚雖當下切不可過用寒涼及水銀輕粉巴豆芒硝等蕩滌太驟或當劑之皆不得已但使疾去即止或不當用而用或可用而過焉由此遂成慢驚矣且如只下痰熱不必太驟但斟酌處用大黃一品足矣且急驚證源在於去肝風降心火幼幼書以為至要之說也薛急驚之候牙關緊急壯熱涎湧竄視反張搐搦顫動口中氣熱頰赤唇紅脈浮洪數者此肝經血虛火動生風蓋風生則陰血愈散陰火愈熾火動則肺金愈虧肝木愈盛宜滋肝血養脾氣若屢服祛風化痰瀉火辛散之劑便宜認作脾虛血損急補脾土若風火相搏抽搐目瞤筋急痰盛者用四物湯以生肝血加釣藤鉤山梔仁以清肝火更用四君子以補脾六味丸以滋腎若肺金剋木而兼呵缺者用瀉白散以泄肺邪地黃丸以益肝血若邪入肝則用柴胡清肝散加龍膽草亦可邪入心用梔子清肝散加炒黃連亦通邪入腎用六味地黃丸邪入肺用地骨皮散邪入脾用六君子加柴胡山梔若不養肝血不補脾氣純用祛風化痰之藥不已則脾益虛血益損邪氣延綿必傳慢驚矣初有痰熱未有驚風先且解表祛肝風降心火和劑香蘇散解肌加乾葛見傷寒太陽症參蘇飲解驚風煩悶痰熱作搐咳嗽氣逆脾胃不和人參去蘆紫蘇和梗前胡去蘆乾葛半夏赤茯苓去皮各七錢半枳殼陳皮去白桔梗銼炒甘草各五錢鈐方去人參加川芎上銼每服二錢水一鍾姜二片煎七分無時溫服人參羌活散治初作急驚散風邪除風熱羌活獨活柴胡川芎人參甘草炙白茯苓各一兩前胡桔梗地骨皮天麻酒浸焙各半兩枳殼一兩麩炒上㕮咀每服一錢水半盞姜一片薄荷一葉棗半個煎服疹痘未發亦可服直指方每服三字末紫蘇薄荷湯調搐制緊急者去節麻黃煎湯調或惺惺散加荊芥防風亦可免得遽施腦麝惺惺散除風熱及傷寒時氣瘡疹發熱白茯苓淨細辛桔梗栝蔞根人參甘草炙白朮川芎各等分上為末每服一錢水半盞姜一片薄荷三葉同煎湯氏細辛減半獨活湯治胎驚發散風邪羌活獨活各一分檳榔天麻麻黃去節甘草炙各半分上銼散每服半錢水煎於內加南星末蜜調可貼囟門木通散治小兒肝心有熱驚悸用此藥瀉肝風降心火利驚熱羌活山梔子各二錢大黃煨木通赤茯苓甘草各一錢上銼碎每服二錢入紫蘇葉些少用水一盞煎至五分不拘時服已風丹祛風退驚天竹黃細研防風釣藤各一兩白殭蠶干全蠍白附子各半兩上為細末煉蜜和如芡實大每服一粒至二粒麝香荊芥湯化下加味導赤散生地黃上木通上防風中甘草中山梔子中薄荷葉下麥門冬中入燈心草竹葉水煎仁齊犀角湯治心驚熱盛犀角防風木通赤茯苓桑白皮炒甘草炙各等分上銼細每三字水煎服急驚初傳且可通關定驚搐諸風搐搦關竅不通痰涎潮塞氣實使之先用蘇合香丸以姜自然汁浸薄荷湯調與服使氣下則痰下關竅自通通關散治小兒驚風搐搦關竅不通南星炮殭蠶炒各一錢麝香一字豬牙皂角二定赤腳蜈蚣一條炙上為末以手點薑汁蘸藥少許擦牙或用物引滴入藥兩三點涎自出口自開皂角略燒存性為末嚏驚散半夏一錢豬牙皂角半錢上為末用一豆許用管子吹入鼻立醒茅先生奪命散銅青硃砂各二錢膩粉半錢麝香少許蠍尾十四個去針上為末每服半錢薄荷臘茶清調下此治天釣臍風客忤卒死撮口鵝口木舌喉痹胙腮風壅吐涎後依證調理錢氏涼驚丸草龍膽防風青黛各三錢釣藤二錢黃連五錢牛黃麝香龍腦各一字麵糊丸粟米大每服三五丸金銀湯下局方天麻防風丸治小兒驚風身熱喘粗多睡驚悸手足搐搦精神昏憒天麻防風人參各一兩甘草硃砂雄黃各二錢半蠍尾炒殭蠶炒各半兩牛黃麝香各一錢上為末煉蜜丸櫻桃大硃砂為衣每一丸薄荷湯化下三因方治陽癇驚風熱證面赤身熱發搐直視牙緊蘆薈白附子甘草各二錢胡黃連硃砂各一錢膩粉麝香各半錢蠍稍殭蠶炒各七個金箔七片赤腳娛蚣一條炙上為末二歲以上服半錢金箔薄荷湯下全嬰方睡紅散治小兒急慢驚風手足搐搦目瞪神昏牛黃硼砂腦子真珠水銀砂子各半錢青黛蠍尾炒京墨燒南星半夏同上薑製一宿蛇含石淬各一錢金銀箔各十片麝香一字烏蛇尾並項下七寸酒浸一宿取出去皮骨炙一錢上為末三歲一字薄荷湯下按此治風熱痰藥通關透肌骨之劑也非風邪下陷者不可輕用定搐散治小兒急驚定搐赤腳蜈蚣大者一條酒浸炙麻黃去節南星炮白附子直殭蠶炒羌活代赭石醋煆淬七次蠍稍川薑黃各二錢硃砂一錢上為末每服一字荊芥紫蘇煎湯調下如搐不止加烏蛇肉順搐散解男右女左搐不順者枳殼制釣藤去鉤荊芥羌活防風去蘆甘草各半兩上碎每服二錢水一盞順切姜二片煎七分無時溫服或入薄荷同煎瀉青丸治竄視發搐痰熱龍膽草焙梔子仁大黃煨羌活防風各一錢川芎一錢半上為末煉蜜丸梧子大每一丸煎竹葉泡薄荷湯調下錢氏有當歸羅氏鎮肝丸治小兒急驚風目直上視抽搐昏亂不省人事是肝經風熱也此方瀉青之變天竹黃研生地黃當歸竹葉草龍膽川芎大黃煨羌活防風各二錢半上為細末煉蜜丸如雞頭大每服二丸沙糖水化下先服此後服天麻散凡欲下之須當審問前人已下未下或曾經吐瀉否已下及吐瀉者不可再下但驅風化痰消熱而已大約痰熱十分且泄其三之二下劑中須用枳殼菖蒲寬心通氣之類佐之急驚急在一時治不可緩緩則候加深若一時體認不明又不可妄施藥餌急驚既已傳截風定搐次第風驚已定而痰熱下劑有三初且輕下又稍重下又加重下之劑下後和胃助氣而後定志寧神驅風鎮驚防其再發若下後諸證猶存未易痊愈更勿再下當作慢驚推詳急驚輕下法防風湯治風熱痰壅大便不通防風羌活枳實各半兩川芎甘草炙大黃煨各二錢半銼末每服三字薑棗煎小柴胡湯加枳殼防風最利風熱解血熱免用銀粉巴硝重劑一方加大黃少許宣風散疏導風熱驚風痰熱四證俱備者極效雞心檳榔二個甘草橘紅各半兩黑牽牛取末二兩半生半炒上為末每服半錢蜜湯調下定命丹治急驚天吊撮口通利痰熱全蠍七個天麻南星炮白附子各二錢半硃砂青黛各一錢半輕粉麝香各半錢龍腦一字上為末粟米糊丸緑豆大每一丸荊芥薄荷湯調下先研半丸吹入鼻中疏風散治驚風痰熱四證俱盛檳榔陳皮去白各二錢牽牛大黃略煨各三錢上為末每服半錢生蜜調下演山加朴硝一錢保嬰方大黃黑牽牛白牽牛三味各半生半熟檳榔各半兩細末蜜湯調痰多加輕粉演山治四證已作八候未具截風丹全蠍去毒炒殭蠶炒白附子炮南星炮天麻各二錢半硃砂一錢赤足蜈蚣一條酒炙麝香