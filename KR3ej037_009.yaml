body:
  text: 卷之九肺臟部腎臟部肺錢肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣肺病悶亂哽氣長出氣氣短喘急肺熱手掐眉目鼻面甘桔湯主之肺盛復有風冷胸滿短氣氣急喘嗽上氣當先散肺後發散風冷散肺瀉白散大青膏主之肺只傷寒則不胸滿肺虛熱唇深紅色治之散肺虛熱少服瀉白散肺臟怯唇白色當補肺阿膠散主之若悶亂氣粗喘促哽氣者難治肺虛損故也脾肺病久則虛而唇白脾者肺之母也母子皆虛不能相營故名曰怯肺主唇白而澤者吉白如枯骨者死此以唇診肺之法也唇白色者肺臟怯也阿膠散主之若手尋衣領及亂捻物者肝熱也宜瀉青丸手掐眉目鼻面者肺熱也宜甘桔湯之類是也肺病見春金旺肺勝肝也當瀉肺輕者肺病退重者目淡青必發驚更有赤者當搐海藏云為肝怯故目淡青也潔肺主燥自病則喘嗽燥則潤之實則喘而氣盛瀉白散主之虛則喘而少氣先益黃散後阿膠散主之心乘肺賊邪熱而喘嗽先地黃丸中導赤散後阿膠散主之肝乘肺微邪惡風眩冒昏憒嗽羌活膏主之腎乘肺實邪憎寒嗽清利百部丸主之脾乘肺虛邪體重吐痰泄瀉嗽人參白朮散主之劉凡肺之得病必先觀心脾二臟之虛實若心火爍金即當先抑心氣後吃肺藥若心氣和即便看脾脈若脾氣虛冷即不能相生而肺家生氣不足則風邪易感故患肺寒者皆脾虛得之若脾氣盛實則亦痞隔中焦而大腸與肺表裡不能相通夫中焦熱隔則肺與大腸不通其熱毒之氣必上蒸於肺而生痰故患肺熱者多脾實得之心氣盛者瀉之脾氣虛者益之脾氣實者通之然後隨其肺之寒熱以治之故有抑心氣益脾氣通肺氣三藥若診其脈氣心脾兩臟俱和而肺自生疾則但察肺家虛實而治之薛肺經鬱熱用瀉白散肺氣自虛用四君子湯外邪所乘用參蘇飲心火炎燥用人參平肺散中焦實痞用大承氣湯脾不能生肺用異功散夫肺氣盛者肺中之邪氣盛也其脈右寸必浮而有力宜用瀉白散以瀉之若肺虛而有熱者執肺熱還傷肺之說而不用人參則誤矣仍參其證治之海肺苦氣上逆急食苦以瀉之訶子皮一作黃芩肺欲收急食酸以收之白芍藥以酸補之五味子以辛瀉之桑白皮肺虛以五味子補之如無他證錢氏補肺阿膠散主之虛則補其母脾乃肺之母以甘草補脾阿膠散錢氏又名補肺散阿膠一兩半麩炒黍黏子炒香甘草炙各二錢半馬兜鈴半兩焙杏仁七個去皮尖炒糯米一兩炒上為末每服一二錢水一盞煎至六分食後溫服海杏仁本瀉肺非若人參天門冬麥門冬之補也當以意消息之薛前方乃通治肺金之劑經云虛則補其母若前藥未應當用五味異功散以補脾海肺實以桑白皮瀉之如無他證以瀉白散主之實則瀉其子腎乃肺之子以澤瀉瀉腎瀉白散錢氏又名瀉肺散桑白皮細銼炒黃地骨皮洗去土焙各一兩甘草炒半兩上件為末每服一二錢水一中盞入粳米百粒同煎至六分食後溫服海治肺熱骨蒸自汗宜用此直瀉之用山梔黃芩方能瀉肺但當以氣血分之甘桔湯方見咽喉大青膏羌活膏俱見驚搐百部丸方見咳嗽人參白朮散方見痘渴四君子湯方見雜病虛勞參蘇飲雜病發熱人參平肺散雜病咳嗽咳嗽內經曰五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也五臟之咳久乃移於六腑又病機式要云咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而為痰也咳嗽謂有聲有痰也因傷肺氣動於脾濕故咳而嗽也又生氣通天論云秋傷於濕冬必咳嗽大抵素秋之氣宜清而肅反動之則氣上衝而為咳嗽甚則動於脾濕而為痰也蓋風乘肺者日夜無度汗出頭痛痰涎不利熱乘肺者急喘而嗽面赤潮熱手足寒冷小兒多有之火乘肺者咳嗽上壅㖒唾出血甚者七竅血溢燥乘肺者氣壅不利百節內痛頭面汗出寒熱往來皮膚乾燥細瘡燥癢大便秘澀涕唾稠黏寒乘肺者或因形寒飲冷冬月坐臥濕地或受冷風春秋之氣或因外感夏是火氣炎上最重秋是濕熱傷肺冬是風寒外來也宜各隨其證而治之錢氏法夫嗽者肺感微寒八九月間肺氣大王病嗽者必實非久病也其證面赤痰盛身熱法當以葶藶丸下之若久者不可下也十一月十二月嗽者乃傷風嗽也風從背脊第三椎肺俞穴入也當以麻黃湯汗之有熱證面赤飲水涎熱咽喉不利者宜兼甘桔湯治之若五七日間其證身熱痰盛唾黏者以褊銀丸下之有肺盛者咳而後喘面腫欲飲水有不飲水者其身即熱以瀉白散瀉之若傷風咳嗽五七日無熱證而但嗽者亦葶藶丸下之後用下痰藥有肺虛者咳而哽氣時時長出氣喉中有聲此久病也以阿膠散補之痰盛者先實脾後以褊銀丸微下之涎退即補肺補肺如上法有嗽而吐水或青淥水者以百祥丸下之有嗽而吐痰涎乳食者白餅子下之有嗽而咯膿血者乃肺熱食後服甘桔湯久嗽者肺亡津液阿膠散補之咳而痰實不甚喘而面赤時飲水者可褊銀丸下之治嗽大法盛即下之久即補之更量虛實以意增損杜氏子五歲自十一月病嗽至三月未止始得嗽而吐痰乃外風寒蓄入肺經令肺病嗽而吐痰風在肺中故也宜以麻黃散輩發散後用涼藥壓之即愈時醫與珠粉丸半夏丸褊銀丸諸法下之其肺即虛而嗽甚至春三月間尚未愈召錢視之其候面青而光嗽而喘促哽氣又時時長出氣錢曰病困十已八九然所以面青而光者肝氣旺也春三月者肝之位肺衰之時也嗽者肺之病肺自十一月至三月肺即虛痿又妄下之脾肺子母俱虛復為肝所勝此為逆也故嗽而喘促哽氣長出氣也錢急與瀉青丸瀉之後與阿膠散實肺次日面青而不光錢又用補肺而嗽如前又與瀉肝未已而又加肺虛唇白如練錢曰此病必見不可治之何者肝太旺而肺虛絕肺病不得時而肝勝之今三瀉肝而肝病症不退三補肺而肺病尤虛此不久生故言死也此證病於秋者十救三四春夏者十難救一果大喘而死京東轉運使李公有孫八歲病嗽而胸滿短氣醫者言肺經有熱用竹葉湯牛黃膏各二服治之三日加喘錢氏曰此肺氣不足復有寒邪即使喘滿當補肺脾勿服涼藥李曰醫已用竹葉湯牛黃膏錢曰何治也醫曰退熱退涎錢曰何熱所作曰肺經熱而生嗽嗽久不除生涎錢曰本虛而風寒所作何熱也若作肺熱何不治其肺而反調心蓋竹葉湯牛黃膏治心藥也醫有慚色錢治愈東都張氏孫九歲病肺熱他醫以犀珠龍麝生牛黃治之一月不愈其證嗽喘悶亂飲水不止全不能食錢氏用使君子丸益黃散張曰本有熱何以又行溫藥他醫用涼藥攻之一月尚無效錢曰涼藥久則寒不能食小兒虛不能食當補脾候飲食如故即瀉肺經病必愈矣服補脾藥二日其子欲飲食錢以瀉白散瀉肺遂愈十分張曰何以不虛錢曰先實其脾然後瀉肺故不虛也潔古法肺之生病而成嗽大抵秋冬則實春夏則虛更詳五臟兼見之證以辨虛實若實則面赤飲水身熱痰涎盛涕唾稠黏咽乾不利喘嗽面腫吐食皆當先補脾益黃散後瀉肝瀉青丸若咯膿血是肺痿也用清肺散治之若虛則面白脫色氣少不語喉中有聲唾痰清利法當阿膠散補之若亡津液用白朮散主之嗽而兩脅痛者屬肝經用小柴胡湯發熱咳而嘔苦水者屬膽經用黃芩半夏生薑湯咳而喉中如梗者屬心經用甘桔湯咳而失氣者屬小腸用芍藥甘草湯咳而右脅痛者屬脾經用升麻湯咳而嘔長蟲者屬胃經用烏梅丸咳而喘息吐血者屬肺經用麻黃湯咳而遺屎者屬大腸用赤石脂湯咳而腰背痛甚則咳涎者屬腎經用麻黃附子細辛湯咳而遺尿者屬膀胱用茯苓甘草湯咳而腹滿不欲食面腫氣逆者屬三焦用異功散吐瀉曾氏法咳嗽者固有數類但分冷熱虛實隨證疏解初中時未有不因感冒而傷於肺內經曰肺之令人咳何也岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣得從其合故難經云形寒飲冷則傷肺使氣上而不下逆而不收沖壅咽膈淫淫如癢習習如梗是令嗽也乍暖脫著暴熱遇風邪氣侵於皮膚肺先受之而為咳嗽若初得時面赤唇紅氣粗發熱嗽來痰鳴此是傷風壅痰作嗽用清肺飲五拗湯及小柴胡湯羌活散傷寒皆可解表次青木香湯陰腫有小兒汗出未乾遽爾戲水亦致傷風咳嗽外證眼胞微浮額汗痰鳴亦宜清肺飲瀉肺湯與之疏風化痰解利邪熱小柴胡湯亦可若嗽日久津液枯耗肺經虛矣肺為諸臟華蓋臥開而坐合所以臥則氣促坐則稍寬乃因攻肺下痰之過名為虛嗽聲連不斷喉中痰鳴氣息欲絕嗽罷則吐白沫或乾嘔此肺虛而氣不順也面唇皆白而慘嗽過額上多汗哽氣長出乳食減少致脾虛而胃亦虛宜其有吐投茯苓厚朴湯吐及藿香飲不乳食次溫脾潤肺理中湯吐瀉加杏仁北五味子水煎服蓋此藥補脾而益肺藉土氣以生金則自愈矣或嗽而頰紅有紫黯色於理中湯內再加乾薑為用亦良法也有脾虛亦能作嗽當投補劑用醒脾散慢驚茯苓厚朴湯吐令脾氣實然後間以清肺飲煎服疏解肺經風寒及藿香飲助脾養胃亦救子益母之法也有一證咳嗽至極時頓嘔吐乳食與痰俱出盡方少定此名風痰壅盛肝木克脾土宜以白附飲吐投之即效薛氏法若咳嗽流涕外邪傷肺也先用參蘇飲喘嗽面赤心火刑肺也用人參平肺散及六味地黃丸腎嗽而吐青綠水肝木乘脾也用異功散加柴胡桔梗嗽而吐痰乳脾肺氣傷也用六君子加桔梗若嗽唾膿痰者熱蘊於肺而成肺癰也用桔梗湯見肺癰凡風邪外傷法當表散而實腠理其用下藥非邪傳於內及胃有實熱者不宜輕用面色白脈短澀者肺之本證也易治面色赤脈洪數者火刑金也難治發表麻黃湯治太陽證頭疼發熱身痛惡風無汗喘滿脈浮緊八九日不解當發汗汗已煩悶瞑目者必衄衄乃解所以然者陽氣重故也甘草半兩麻黃去節一兩半桂枝一兩杏仁去皮三十五個上每服三錢水煎三拗湯治感冒風邪鼻塞聲重語音不出或傷風頭疼目眩四肢拘倦咳嗽多痰胸滿氣短麻黃不去節杏仁不去皮尖甘草生用上各等分銼散每服三錢水一盞生薑三片煎至六分去滓溫服取汗為度一方加荊芥桔梗嗽甚加五味子細辛各減半又方麻黃去節杏仁去皮尖甘草炙名三和湯治喘嗽尤妙加減在乎活法有熱加前胡傷風加荊芥有痰加半夏加減三拗湯麻黃去根節三錢水煮去沫焙乾桂枝二錢杏仁七個去皮尖炒黃另研如膏甘草炙一錢上為粗末入杏膏拌勻每服一錢水六分煎至四分去滓溫服無時以汗出為度量大小加減若自汗者不宜服之五拗湯治感風濕及形寒飲冷痰嗽咳逆連聲不已麻黃不去根節杏仁不去皮尖荊芥不去梗桔梗蜜水拌炒各五錢甘草二錢半上每服二錢水一盞煎七分無時溫服百部丸治小兒肺寒壅嗽微喘有痰百部炒麻黃去節各三兩杏仁四十枚去皮尖微炒研入上為末煮熟棗子丸如皂子大溫水下二三丸無時日三四服此本方也仲景加松子仁五十個蜜丸更加胡桃肉含化大妙一方加甘草二錢九寶飲治小兒嗽是肺臟感寒須表散卻服嗽藥麻黃去節薄荷大腹皮紫蘇各半兩陳皮杏仁去皮尖桑白皮炙肉桂枳殼各二錢半甘草一錢半上銼散每服二錢生薑烏梅煎服冷證去薄荷熱證去陳皮桂華蓋散治肺感寒邪咳嗽上氣胸膈煩悶項背拘急聲重鼻塞頭目昏眩痰氣不利麻黃去節紫蘇子隔紙炒桑白皮蜜炙杏仁去皮尖炒赤茯苓去皮陳橘皮去白各半兩甘草炙二錢上銼散每服二錢水半盞煎至三分去滓量大小加減食後溫服金沸草散治傷風化痰頭目昏痛頸項強急往來寒熱肢體煩疼胸膈滿痰涎不利咳嗽喘滿涕唾稠黏及治時行寒疫壯熱惡風荊芥四兩前胡