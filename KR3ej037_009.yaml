閉汗不通或涼或熱坐臥生煩雄黃紅亮者二錢半白藥去黑皮川烏炮裂去皮臍草烏炮裂去皮天麻明亮者川芎五味各半兩上除雄黃外餘五味銼焙同雄黃為末驚風痰壅每服半錢或一錢用薑汁茶清調下發汗水薑蔥薄荷同煎並投三服取效如意膏治痰喘氣促咳嗽連聲不已冷熱二證皆可投半夏炮裂南星炮裂二味各一兩半上二味為末以生薑汁和勻捻作小餅如錢樣用慢火炙乾再為末復取薑汁如前經兩次炙乾仍焙為末煉蜜丸芡實大每服一丸至二丸仍用姜蜜湯無時化服有熱以薄荷湯下雄黃丹治小兒齁䶎喘滿咳嗽心胸煩悶傷熱蠲毒雄黃硃砂各一錢另研杏仁十四粒炒巴豆七粒豆豉淡者二十一粒上杏巴豉三味用米醋半盞乾薑一片指大煮令乾研成膏皂角一寸蜜炙焦先去子與皮法制牛膽一分同雄朱與杏膏研細和勻麵糊為丸如麻子大每一歲兒五丸壯者七丸二歲十丸淡生薑湯下玉訣貝母丸治小兒齁䶎貝母天南星薑汁製人參茯苓甘草炙白附子各等分皂角子七枚炮末之煉蜜丸小豆大每服五七丸薄荷湯吞下油袞丸治小兒齁䶎及蟲積雷丸五靈脂各一分巴豆十五粒取霜上末之滴水丸每三五丸麻油滾過井水吞下惠眼內金丸治小兒齁䶎咳嗽雞內金雌黃細研水飛過去水露三日方使半夏生延胡索各等分上為末棗肉為丸如小豆大周歲三丸至四丸燈心湯下吉氏家傳治奶齁方天竺黃蚌粉炒上件等分研勻蜜調塗奶頭上與吃腦子散治小兒傷風咳嗽不住兼治瘕呷大黃一分鬱金二錢上件二味先以豬牙皂角煮一復時取切片子焙乾為末次入粉霜腦子各少許再同研令勻每服一字沙糖水調下量兒肥瘦加減用之嗽聲不出聖惠杏仁煎治小兒咳嗽聲不出杏仁湯浸去皮尖入水一大盞研濾取汁二兩酥蜜各一合上件藥先以杏仁汁於鐺中以重湯煮減去半入酥蜜又湯煮二十沸卻入貝母紫菀末各一分甘草末半分更煎攪如餳收瓷器中每服以清粥飲下半錢日三服夜一服嗽止為度量兒大小加減又方貝母半兩煨牛黃細研一錢甘草炙一分上件藥搗細羅為散每服以溫水調下半錢日三四服量兒大小加減又方麥門冬去心焙杏仁去皮尖麩炒黃甘草炙貝母煨款冬花各一分紫菀去土半兩上件藥搗細羅為散每服以乳汁調下半錢日三四服量兒大小加減以意又方杏仁一兩去皮尖雙仁以水一中盞研絞取汁紫菀半兩末上以杏仁汁並紫菀末入蜜一合同煎如膏每服以清粥飲調下半茶匙量兒大小加減驚膈嗽小兒患驚風驚止而嗽作謂之驚膈嗽茅先生下金杏丸夾勻氣散與服金杏丸杏仁去皮尖甜葶藶漢防己馬兜鈴去皮上等分為末用蜜為丸小豆大每服十丸用麥門冬熟水吞下茅先生亦於前咳嗽門中已有此方為各有牽引不可除故兼存之勻氣散桔梗去蘆頭淨洗干五兩甘草二兩縮砂仁蘹香洗陳橘皮各一兩白姜一分上為末每服半錢一錢用霜木瓜煎湯調下如無即用紫蘇鹽煎湯下久嗽聖惠栝蔞煎治小兒久嗽不止心神煩悶栝蔞一顆熟者去仁以童子小便一升相和研絞取汁酥一兩甘草生一分為末蜜二兩上件藥以銀鍋子中慢火煎如稀餳每服以清粥飲調下半錢日四五服量兒大小加減不灰木散治小兒嗽久不止不灰木牛糞火燒通赤貝母煨令黃甘草炙微赤以上各半兩上件藥搗粗羅為散每服一錢以新汲水一小盞點生油一二滴打令散煎至五分去滓分溫二服日四服量兒大小加減桑白皮煎治小兒經時不瘥及傷肺見血桑根白皮東引者切五合白狗肺一具切甘草茯苓升麻貝母各十二分芍藥杏仁炒各十分李根白皮切四分款冬花麥門冬去心各六分黃芩十一分淡竹青皮八分蜜地黃汁各一升上以水一斗煮及三升去滓下杏膏地黃汁蜜微火上煎不住攪至二升三合綿濾絞汁二三歲兒一合溫服之日進三服夜三合知母散治大人小兒久嗽不止痰吐喘悶氣噎知母貝母柴胡黃耆炙紫菀洗馬兜鈴杏仁研去皮尖半夏白礬水煮乾為度桑白皮炙白礬研款冬花各等分上為細末每服一錢水七分盞同煎三分去滓時時服或生薑自然汁煮糊為丸每服五七丸生薑湯下貝母散治小兒久咳嗽氣急貝母煨杏仁去皮炒麥門冬去心款冬花各一分紫菀半兩上為末用乳汁調下半錢喘素問通評虛實論帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死曾小兒喘疾重於咳嗽然有虛實冷熱之分不可概舉實熱者投清肺飲嗽加五和湯裡熱水薑蔥煎及瀉肺湯嗽碧玉丸為治經云喘急多因氣有餘蓋肺主氣故也虛冷者投枳實湯水姜煎並如意膏補肺散坎離湯自效此肺虛感風氣不升降致有是證及用定喘飲常驗不拘冷熱皆可服涎壅失音二聖散主之薛喘急之證有因暴驚觸心者有因寒邪壅盛者有因風邪外客者有因食鹹酸痰滯者有因膏粱積熱熏蒸清道者然喘與氣急有輕重之別喘則欲言不能隘於胸臆氣急但息短心神迷悶耳治法因驚者用雄朱化痰定喘丸佐以天麻定喘飲寒傷肺氣者用小青龍湯風邪傷肺者用三拗湯加減之食鹹酸傷肺者啖以生豆腐熱傷肺氣者當涼肺定喘哮喘喉聲如鋸者梅花飲兼用半夏丸前證多因脾肺氣虛腠理不密外邪所乘真氣虛而邪氣實者為多若已發則散邪為主未發則補脾為主設概攻其邪則損真氣逕補其肺則益其邪凡喘嗽之證若小便不利則必生脹脹則必生喘要分標本先後先喘而後脹者主於肺先脹而後喘者主於脾蓋肺金司降外主皮毛肺朝百脈通調水道下輸膀胱肺既受邪則失降下之令故小便漸短致水溢皮膚而生脹滿此則喘為本而脹為標也治當清金降火為主而行水次之脾土惡濕而主肌肉土能剋水若脾土受傷不能制水則水濕妄行浸漬肌肉水既上溢則邪反侵肺氣不能降而生喘矣此則脹為本而喘為標也治當實脾行水為主而清金次之苟肺證而用燥脾之藥則金燥而喘愈甚脾病而用清金之藥則脾寒而脹益增觀其證若中氣虛弱者用六君子湯中氣虛寒者前方加炮姜鬱結氣滯者用歸脾湯加柴胡山梔肝木克脾土者用六君柴胡山梔肺氣壅滯者用紫蘇飲加白朮食鬱壅滯者用養胃湯加木香肺中伏熱水不能生而喘者用黃芩清肺飲及五淋散脾肺虛弱不能通調水道者用補中益氣湯及六味丸膏粱厚味脾肺積熱而喘者用清胃散及滋腎丸心火刑金不能生水者用人參平肺散亦用滋腎丸腎水虧虛火爍金小便不利者用六味丸及補中益氣湯肝木乘脾不能相制而喘者用六君柴胡升麻脾胃虛寒臍凸腹脹者用八味地黃丸脾腎虛寒不能攝水如蠱脹者用加減腎氣丸凡虧損足三陰而致喘脹或二便不調及牽引作痛者俱用六味八味加減腎氣等丸治之仍參傷風咳嗽證錢氏論肺盛復有風冷云胸滿短氣氣急喘嗽上氣當先散肺後發散風冷散肺瀉白散肺發散風冷大青膏主之吐瀉肺只傷寒則不胸滿潔古云肺實則喘而氣盛瀉白散瀉白散肺清肺飲嗽五和湯裡熱碧玉丸治痰嗽氣喘胸滿飲食減少睡不得寧煩躁有熱青黛明白礬生用天南星生用滑石四味各二錢半輕粉五十帖全蠍十五尾去尖毒巴豆四十九粒去殼膜心存油碎切入乳缽極細杵上除輕粉巴豆外餘五味或曬或焙為末仍入前二味同在乳缽杵勻薑汁煮糯米粉為糊丸粟殼大每服七丸至九丸或十一丸用淡薑湯空心投熱甚者薄荷湯下或不拘時錢氏論肺藏怯云唇白色當補肺阿膠散主之方見本門若悶亂氣粗喘促哽氣者難治肺虛損故也脾肺病久則虛而唇白脾者肺之母也母子皆虛不能相營故名曰怯肺主唇唇白而澤者吉白如枯骨者死補肺散治久患咳嗽肺虛氣促有痰噁心阿膠一兩半銼炒白茯苓馬兜鈴去老梗糯米三味各半兩杏仁二十一粒湯泡去皮尖甘草四錢炙上銼每服二錢水一盞煎七分無時溫服坎離湯治虛喘晝輕夜重食減神昏蓽澄茄石菖蒲各一錢白朮白茯苓去皮南木香草上各二錢甘草炙半夏湯煮透濾仍銼焙乾紫蘇子略炒杵碎草上四錢上銼每二錢水一盞煎七分溫服無時聖惠杏仁煎治小兒咳嗽心煩喘粗杏仁湯浸去皮尖雙仁麩炒微黃天門冬去心寒食麵各一兩蜜酥各一合生地黃汁一大盞貝母半兩微炒上件煎貝母及天門冬至五分便研絞取汁入杏仁膏等同熬如稀餳每服用溫水調下半錢已來量兒大小以意加減八味理中丸治小兒心肺不和息數脈急上下不升降中膈痞滿郁隘胸臆坐臥煩悶神情不樂飲食不下人參甘草炙白朮乾薑枳實制炒白茯苓五味子去梗桑白皮去赤皮上件等分為細末煉蜜為丸小指頭大每服一丸淡豆豉五粒水一小盞煎至半去豉通口服不拘時候張渙蟬殼湯治小兒肺氣不利病白朮五味湯治小兒咳嗽氣逆上喘二方並見咳嗽聚寶方平氣散治小兒氣不和定喘和氣補虛思食人參白茯苓百合甘草炙白朮桔梗各等分上六味為末每服一錢水八分生薑少許同煎至五分溫服熱實云岐云小兒結熱上氣喘者四順清涼飲子寒實佚痰實丹溪云痰嗽痰喘並用湧法吐之重劑瓜蒂散輕劑苦參赤小豆末須蝦齏汁調服生白丸治小兒痰涎不利上喘咳嗽白附子新羅者天南星各半兩半夏一兩上為末用生薑汁打麵糊為丸如綠豆大每服二十丸至三十丸生薑湯下量大小加減枳實湯主傷風傷寒胸滿氣促咳嗽不活食多夾痰吐出枳實去瓤銼片麩炒微黃赤茯苓去皮各半兩甘草六錢半夏七錢湯煮透濾仍銼焙乾桔梗七錢半銼炒上件㕮咀每服二錢水一盞姜三片煎七分無時如意膏見前齁䶎半夏丸治肺氣不調咳嗽喘滿痰涎壅塞心下堅滿及風痰嘔吐噁心涕唾稠黏白礬一兩半焙半夏三兩湯泡七次生薑汁製一宿上為末生薑自然汁丸赤豆大每服十丸薑湯下經驗後方大人小兒定喘化痰上用豬蹄四十九個淨洗控干每個指甲內半夏白礬各一字入罐子內封閉勿令煙出火煅通赤去火細研入麝香一錢人有上喘咳嗽用糯米飲下小兒半錢至妙驚大效雄朱化痰定喘丸治小兒因驚發喘逆觸心肺暴急張口虛煩神困雄黃硃砂各一錢研蟬蛻全蠍炒地龍白殭蠶天南星白附子炮各二錢半輕粉半錢上為末麵糊丸如麻子大每服三十丸薄荷茶清送下食後服天麻定喘飲治小兒喘嗽驚風天麻防風羌活甘草人參桔梗白朮川芎半夏曲各等分上銼散每服二錢水一盞麥門冬十四粒煎至七分食後服有熱去白朮加芍藥枳殼風邪傷肺三拗湯嗽紫蘇飲子治肺受風寒喘熱痰嗽紫蘇葉桑白皮青皮五味子杏仁麻黃甘草炙陳皮各二分人參半夏各三分上姜三片水煎溫服寒邪傷肺小青龍湯嗽麻黃杏子甘草石膏湯治傷寒發汗後不可更行桂枝湯汗出而喘無大熱下後喘亦治麻黃二兩去節湯泡去黃汁焙乾秤杏仁二十五個去皮尖石膏四兩研甘草一兩炙上銼散每服二錢水小盞煎六分去滓溫服金匱要略小青龍加石膏湯治大人小兒肺脹咳而上氣煩躁而喘脈浮者心下有水麻黃去節三兩千金四兩芍藥桂枝細辛各三兩千金各二兩甘草炙乾薑各三兩半夏半升洗五味子半升千金一升石膏二兩碎上九味㕮咀以水一斗先煮麻黃減一升去上沫內諸藥煮取三升去滓強服一升羸者減之日三服小兒服四合食鹹酸傷肺佚雜方吉氏治小兒傷冷氣喘涎多方栝蔞一個大者開一蓋子阿膠一分沙糖半兩上件將二味投入栝蔞內以蓋子依舊封著白紙都糊入飯甑蒸兩遍傾出隨兒大小約多少冷服真珠散治小兒氣喘多涎真珠末生犀角鎊各半錢香附子四錢龍腦少許上為末每服半銅錢煎桃仁湯調下嬰兒一字一歲以下者半錢茅先生小兒諸喘氣急方海螵蛸黑牽牛末牡蠣馬兜鈐去皮上各秤二錢為末拌勻每服抄一錢用鯽魚淡煮湯調下又方海螵蛸牡蠣火煆上等分為末每服一錢用淡生薑湯調下喉間有聲千金射干湯治小兒咳嗽喘急如水雞聲射干麻黃紫菀甘草生薑各半兩半夏三錢桂心二錢大棗十五枚上銼散每服二錢水一盞半煎入蜜少許服梅花飲子治小兒驚潮五臟積熱上焦蘊熱手足心熱喉中多痰涎面色或紅或白嗞呀鼻流清涕氣急肝肺壅熱目赤咳嗽或被人驚夜啼不安或傷寒漸安尚有餘熱亦宜服化痰退熱硼砂馬牙硝芒硝人參各一兩甘草半兩梅花腦子辰砂麝香各一字上八味為末以瓷器收貯遇有此證麥門冬湯調下氣喘咳嗽桑白皮湯下常服薄荷湯調下失音二聖散治風痰壅閉語音不出氣促喘悶手足動搖似搐非搐訶子十枚大者半生半炙去核大腹皮淨洗焙乾五錢上銼每服二錢水一盞煎七分無時溫服通治定喘飲治夾風痰喘氣促不拘冷熱二證人參去蘆頭麻黃不去根節防己去黑皮訶子去核半夏湯洗去滑甘草六味各五錢上銼每服二錢水一盞姜二片煎七分無時溫服總治十六般哮嗽出本事方阿膠銼炒馬兜鈴甘草炙半夏薑汁浸三日杏仁去皮尖各一兩人參半兩上銼散每服二錢水一盞隨病湯使煎至七分臨臥食後服湯使於後心嗽面赤或汗流加乾葛煎肝嗽眼中淚出入烏梅一個糯米十四粒煎脾嗽不思飲食或噁心入生薑二片煎胃嗽吐逆吐酸水入蚌粉煎膽嗽令人不睡用藥半錢茶清調下肺嗽上氣喘急入桑白皮煎膈嗽出痰如丸塊生薑自然汁調藥嚥下勞嗽秦艽末同煎冷嗽天晚嗽甚蔥白三寸同煎血嗽連頻不住當歸末棗子同煎暴嗽涕唾稠黏入烏梅生薑煎產嗽背甲痛甘草三寸黃蠟少許煎氣嗽肚疼脹滿青皮同煎哮喘聲如拽鋸入半夏二個同煎腎嗽時復三兩聲入黃耆白飴糖煎以上十六般嗽疾依法煎服無不效驗馬脾風暴喘而脹滿也田氏云暴喘俗傳為馬脾風也大小便哽宜急下之用牛黃奪命散後用白虎湯平之馬脾風在百日內者不治牛黃奪命散治小兒肺脹喘滿胸膈起急兩脅扇動陷下作坑兩鼻竅張悶亂嗽喝聲嗄而不鳴痰涎潮塞俗云馬脾風若不治死在旦夕白牽牛黑牽牛各一兩半生半熟川大黃檳榔各一兩上為細末三歲兒每服二錢冷漿水調下涎多加膩粉少許無時加蜜少許無價散治風熱喘促悶亂不安俗謂之馬脾風辰砂二錢半輕粉五錢甘遂麵裹者焙乾一錢半上為細末每服一字用溫漿水少許入滴油一點挑藥在上沉下去卻以漿水灌之立效又一法小兒喘脹俗謂之馬脾風又謂之風喉者以草莖量病兒手中指里近掌紋至中指尖截斷如此二莖自乳上微斜直立兩莖於稍盡頭橫一莖兩頭盡頭點穴灸三壯此法多曾見愈悲哭萬全方小兒有驚啼有夜啼有軀啼夫驚啼者由風邪乘心臟腑生熱熱則精神不定睡臥不安故驚啼夜啼者臟冷也夜則陰盛陰盛相感痛甚於晝故令夜啼一云有犯觸禁忌亦令兒夜啼可作法術斷之其軀啼者由腹中痛甚兒身軀張氣蹙而啼也又有胎寒而啼者此兒在胎時已受病也其狀腸胃虛冷不消乳哺腹脹下痢顏色青白而時或啼叫是也薛悲哭者肺之聲淚者肝之液也若六脈弦緊者先以溫湯漬其身取汗次以涼膈散之類清其內熱此張子和治法如此若因乳母怒火遺熱於肝肝火炎熾反侮肺金金木相擊故悲哭有聲者宜用六君柴胡山梔以補脾清肝用六味丸以壯水生木有因驚風過服祛風燥血之藥而致者有因吐瀉內亡津液而致者及稟父腎陰不足不能生肝者治各審之若小兒忽然大啼作聲丹溪謂必死此稟腎陰不足虛火炎上故也用六味丸多有生者仍參覽夜啼客忤驚啼重舌口瘡天釣內釣等證錢氏蟬花散治驚風夜啼咬牙咳嗽及療咽喉壅痛蟬花和殼白殭蠶直者酒炒熟甘草炙各一分延胡索半分上為末一歲一字四五歲半錢蟬殼湯下本事方治小兒拗哭龍齒散龍齒蟬殼去翅足泥土釣藤有鉤子者羌活茯苓人參各等分上為末每服一大錢煎六分去渣溫熱服子和治一小兒悲苦彌日不休兩手脈弦而緊戴人曰心火甚則乘肺肺不受其屈故哭肺主悲王太僕云心爍則痛甚故爍甚悲亦甚先令浴以溫湯漬形以為汗也肺主皮毛汗出則肺熱散浴止而啼亦止矣仍命服涼膈散加當歸桔梗以竹葉生薑朴硝同煎服瀉膈中之邪熱驚啼謂於眠睡里忽然啼而驚覺也錢氏云小兒驚啼邪熱乘心也當安心安神丸主之方見心臟乳香丸治驚風內釣腹痛驚啼乳香半錢沒藥沉香各一錢蠍稍十四枚雞心檳榔一錢半上為末煉蜜丸桐子大每服二丸菖蒲釣藤湯調下木香丸治證同前乳香沒藥全蠍各半錢釣藤舶上蘹香木香各一錢上先將乳香沒藥另研次入諸藥末和畢取大蒜少許研細和丸桐子大每服二丸釣藤湯下張渙嬰兒眠臥著忽啼哭驚覺面赤口舌乾狀若神祟即非夜啼乃風熱邪氣乘於心臟名曰驚啼宜用牛黃膏方常服除胎熱牛黃好牡蠣煆粉各一分人參甘草炙各半兩以上併為細末次入辰砂雄黃各一分並細研水飛龍腦半錢上件諸藥一處研細勻煉蜜和成膏如雞頭實大每服半粒至一丸薄荷湯化下乳食後青雲散石蓮心一分天南星炮殭蠶取直者全蠍鬱金皂角煮各一錢半雄黃一錢粉霜半錢上件為末每服一字半錢看大小蜜湯調下聖惠犀角散治小兒驚啼犀角屑釣藤升麻黃芩甘草炙各一分人參三分上㕮咀每服一錢水一盞煎至五分量兒服之羚羊角散羚羊角屑黃芩犀角屑甘草炙茯神各一分麥門冬半兩上件藥搗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減服之龍齒散治小兒驚啼煩熱眠臥不安龍齒麥門冬各半兩白芍藥川升麻川大黃炒甘草炙各一分上件藥㕮咀每服一錢以水一小盞煎至五分去渣溫溫服量小兒大小加減服之柏子仁散治小兒驚啼狀如物刺亦治躽啼柏子仁一兩搗細羅為散上件藥一二歲兒每服一字用粥飲調服三四歲兒每服半錢一日三四服量兒大小加減治小兒五邪驚啼悲傷鯪鯉甲燒之作灰以酒或水和服方寸匕出本草仙人水鑑兒生下多驚啼聲噎庸醫云是氣急此誤人命宜使此方收取黃葵四月花陰乾搗散入馬牙黃連四分加黃柏四味神方力莫加上以冷水調下一字至一錢服之立效嬰孺治小兒夜睡忽驚啼不識母母喚之搖頭方上小兒忽驚啼不識母者是夢中見母棄之去謂母實故啼去但令人抱坐於暗中令母從外把大火入來喚之即止所以然者謂母去還來也此方天下未之知隱居效方一法寫天心二字於囟門上寫泥丸二字于丹田上躽啼巢氏云小兒在胎時其母將養傷於風冷邪氣入胞傷兒臟腑故兒生之後邪猶在兒腹內邪動與正氣相搏則腹痛故兒躽張蹙氣而啼釣藤膏治小兒乾啼後躽方見腹痛張渙嬰兒在胎之時其母將養一切不如法及取涼飲冷過度冷氣入兒腸胃使胎氣不強致生下羸弱多病俯仰多啼名曰躽啼宜用養臟湯方川當歸一兩沉香丁香白朮桂心川芎各半兩上件搗羅為細末每服一錢水八分入生薑二片煎至四分去渣放溫時時滴兒口中嬰孺黃耆散治少小胎寒腹痛躽啼黃耆當歸芎藭乾薑各四分甘草三分黃芩六分銖上為末二十日兒用乳汁和一胡豆大一日三夜一五十日兒一小豆大百日二小豆大藥溫中無毒若無黃耆可闕也兒生便服使寒氣不得生亦不吐服之期年止服妙若寒氣㽲痛啼不可忍以水煮飲之如服理中丸法服藥補益之可數十倍節度無苦劉氏治胎氣弱陰陽不調晝夜躽啼不已好乳香水中坐乳缽細研沒藥細研木香薑黃各四錢木鱉子二十個去殼上先將後三味同為細末次研入上二味煉蜜和成劑收之每一歲兒可服半皂子大余以意加減煎釣藤湯化下無時次用魏香散魏香散蓬莪朮半兩濕紙裹煨真阿魏一錢上先用溫水化阿魏浸蓬莪朮一晝夜切焙乾為末每服半錢煎紫蘇米飲空心調下躽啼稍愈服開胃丸開胃丸白朮木香蓬莪朮人參當歸各半兩白芍藥一分上為細末湯浸炊餅為丸如黍米大每服五七丸空心食前煎麝香湯下白朮當歸煎丸治胎寒腹痛遇夜啼叫身體躽張有如癇狀吐哯不止大便酸臭乳食雖多不生肌膚白朮當歸木香上等分為細末煉蜜為丸如桐子大每服一丸煎木香湯化下六神散治腹痛啼哭面青口中冷氣四肢亦冷曲腰而啼或大便泄瀉及不吮乳人參山藥白朮各半兩甘草二錢茯苓扁豆炒各一兩上為末每服二錢姜二片棗一枚煎服一方用當歸白芍藥人參各二錢半甘草桔梗陳皮各一錢為散每服二錢水煎時時服夜啼三因小兒夜啼有四證一曰寒二曰熱三曰重舌口瘡四曰客忤寒則腹痛而啼面青白口有冷氣腹亦冷曲腰而啼此寒證也熱則心躁而啼面赤小便赤口中熱腹暖啼時或有汗仰身而啼此熱也若重舌口瘡要吮乳不得口到乳上即啼身額皆微熱急取燈照口若無瘡舌必重也客忤者見生人氣忤犯而啼也各隨證治之曾夜啼者有驚熱夜啼有心熱夜啼有寒疝夜啼有誤觸神只夜啼此四者詳具於後驚熱者為衣衾太厚或抱於極暖處久坐致生煩悶邪熱攻心心主神神亂則驚心與小腸為表裡故啼泣而遺溺者是也治法退熱鎮心則自安矣用百解散急驚牛蒡湯咽喉三解散潮熱主之心熱者見燈愈啼面紅多淚無燈則稍息蓋火者陽物也心熱遇火兩陽相搏才有燈而啼甚故經曰火疾風生乃能雨此其義也宜涼心安神用百解散或五苓散俱驚加黃芩甘草水煎服次牛蒡湯咽喉三解散潮熱及琥珀抱龍丸驚為治有遇黃昏後至更盡時哭多睡少有啼聲不已直到天明乃胎中受寒遇夜則陰勝而陽微故腰曲額汗眼中無淚面瑩白而夾青伏臥而啼入盤腸內吊之證名為寒疝治法去宿冷溫下焦白芍藥湯疝烏梅散腹痛及沖和飲傷寒加鹽炒茱萸茴香水姜煎服及釣藤膏亦佳誤觸神只者面色紫黑氣鬱如怒呼時若有恐懼及睡中驚惕兩手抱母大哭不休此誤觸禁忌神只而得或因惡祟所侵蓋嬰孩目有所睹口不能言但驚哭無時指紋俱隱故玉環集云忽然兩手形無見定知唐突惡神靈治法先解其表宜百解散驚次驅邪鎮心用蘇合香丸客忤琥珀抱龍丸驚投之自效演山王氏舉水鏡先生云天蒼蒼地王王小兒夜啼疏客堂又云啼而不哭是煩哭而不啼是躁無辜賦云夜多啼而似祟凡初生兒日夜煩啼如有祟或謂熱在心驚藥與疏利或謂寒停臟腑與服溫暖醫者察而治之乃善也若兒啼哭胸堂仰突首反張不喜見燈者心經有熱宜疏利服三黃丸或洗心散加燈心麥門冬子良若兒啼哭頭低身曲眼閉肚緊者臟腑留寒宜與溫之胃風湯加黃耆煎效若不識證候但以蟬蛻二七枚全者去大腳為末加硃砂一字蜜調塗於吻立效薛夜啼有二曰脾寒曰心熱也夜屬陰陰勝則脾臟之寒愈盛脾為至陰喜溫而惡寒寒則腹中作痛故曲腰而啼其候面青白手腹俱冷不思乳食是也亦曰胎寒用釣藤散若見燈愈啼者心熱也心屬火見燈則煩熱內生兩陽相搏故仰身而啼其候面赤手腹俱暖口中氣熱是也用導赤散若面色白黑睛少屬腎氣不足至夜陰虛而啼也宜用六味丸若兼泄瀉不乳脾腎虛弱也用六神散若兼吐瀉少食脾胃虛寒也用六君炮木香大便不化食少腹脹脾氣虛弱也用異功散心血不足者秘旨安神丸木火相搏者柴胡梔子散肝血不足者地黃丸大抵此證或因吐瀉內亡津液或稟賦腎陰不足不能滋養肝木或乳母恚怒肝火侮金當用六君子湯補脾土以生肺金地黃丸壯腎水以滋肝木若乳母鬱悶而致者用加味歸脾湯乳母暴怒者加味小柴胡湯乳母心肝熱搏柴胡梔子散仍宜參客忤驚啼覽之心鑑治小兒一百二十日內夜啼用蟬蛻四十九個去前截用後截為末分四服釣藤湯調灌之普濟蟬花散治小兒夜啼不止狀若鬼祟用蟬蛻下半截為末一字薄荷湯入酒少許調下或者不信將上半截為末前湯調下即復啼也古人立方莫知其妙寒夜啼錢乙論夜啼云脾藏冷而痛也當與溫中藥及以法禳之花火膏主之花火膏取燈火一顆塗乳上令兒吮之錢氏當歸丸凡小兒夜啼者臟寒而腹痛也面青手冷不吮乳者是也宜此方當歸白芍藥人參各一分甘草炙半分桔梗陳橘皮不去白各一錢上為細末水煎半錢時時少與服又有熱痛亦啼叫不止夜發麵赤唇焦小便黃赤與三黃丸人參湯下三黃丸方見實熱張渙萬金散治嬰兒藏寒稟氣怯弱或多囟解面色青白遇夜多啼甚者煩悶狀若神祟亦由觸犯禁忌所致此名曰夜啼宜用此方沉香銼丁香人參五味子當歸各一兩赤芍藥白朮各半兩桂心一分上件搗羅為細末每服一錢用淡溫漿水一小盞煎至五分放溫時時滴兒口中立效田氏五味子散治小兒夜啼及腹痛至夜輒劇狀似鬼祟五味子當歸赤芍藥白朮各半兩茯神陳皮桂心甘草炙各二錢半上為粗末水煎量兒大小加減釣藤膏治百日內嬰孩面青腹痛夜啼及周歲以上者盤腸內吊諸疝氣疾釣藤和鉤玄胡索當歸酒洗粉草炙乳香各五錢肉桂去粗皮二錢麝香一字上前四味焙乾桂不過火同為末乳香蒻葉裹熨斗盛火熨透候冷入乳缽同麝細杵後入前藥末再杵勻煉蜜丸芡實大每用一丸至二丸白湯空心化服釣藤飲治小兒夜啼乃臟冷也陰盛於夜則冷動冷動則為陰極發躁寒盛作疼所以夜啼不歇也釣藤散主之治驚啼加蟬蛻防風天麻釣藤鉤茯神茯苓川芎當歸木香甘草白芍藥各一錢上為末每服一錢薑棗略煎服其或心熱而煩啼必有臉紅舌白小便赤澀之證釣藤飲去木香加硃砂末一錢研和每服一錢木通湯調下或銼散煎服亦可聖惠乳頭散治小兒夜啼不止腹中痛黃耆銼甘草炙當歸赤芍藥木香上各等分搗細羅為散每服取少許著乳頭上因兒吃乳服之蒜乳丸治腹痛夜啼方見腹痛熱夜啼錢氏云三黃丸治腹熱痛熱痛腰不曲肢不冷也夜啼面赤唇焦便赤用人參湯吞下方見裡熱吉氏硃砂膏治諸驚啼夜啼硃砂人參白茯苓甘草各一錢腦麝各少許上末蜜為丸每服一塊如皂子大金銀薄荷湯下安神散治一應驚啼犀角雄黃人參車前子各半兩茯苓一兩上五味為末每服一錢桃仁湯下三因燈花散治熱證心躁夜啼以燈花三四顆研細用燈心煎湯調塗口中以乳汁送下日三服無燈花用燈心燒灰亦妙又一法燈花七枚硼砂一字辰砂少許研細蜜調抹唇上立安茅先生抹唇膏主小兒夜啼蟬殼一個去足燈花兩朵硃砂少許上為末如小兒夜啼遇夜用雞冠血調藥抹兒上下兩唇即止夾硃砂膏與服丹溪治小兒夜啼人參二錢半黃連一錢半甘草炙五分竹葉二十片生薑一片上水煎服澹寮龍齒散方見前即本事龍齒散但無羌活小兒夜啼黃連薑汁炒甘草竹葉燈心煎服口瘡重舌夜啼三因蒲黃散真蒲黃微炒紙鋪地上出火氣上研細每抄些少摻舌下時時摻之更以溫水蘸熟帛裹指輕輕按掠之按罷摻藥牡蠣散方見口瘡客忤夜啼治客忤夜啼法用本家廚下燒殘火柴頭一個以火焦頭為上朱書云吾是天上五雷公將來作神將能收夜啼鬼一縛永不放急急如太上老君律令敕書了勿令兒知立在床下倚床前腳里立之男左女右效黃土散治小兒卒客忤灶中黃土蚯蚓屎各等分上研勻和水塗兒頭上及五心良禳厭法千金治夜啼方上以妊娠時食飲偏所思者物哺兒即效外臺必效小兒夜啼方以日未出時及日午時仰臥於臍上橫文中屏氣以朱書作血字其夜即斷聲效陳藏器余云井口邊草主小兒夜啼著母臥席下勿令母知子母秘錄治小兒夜啼甑帶懸戶上孟詵小兒夜啼取干牛糞如手大安臥席下勿令母知子母俱吉集驗方仙人杖小兒驚癇及夜啼安身伴睡良日華子云豬窠內有草治小兒夜啼安席下勿令母知日華子云烏雌雞翼治小兒夜啼安席下勿令母知聖惠方上臍下書甲字瘥又方取樹孔中草著戶上立止又方以車輞盜安母臥床下勿令母知又方取荒廢井中敗草懸戶上良又方取牛糞灰安母臥下勿令母知又治小兒夜啼符法三道此符左右手中貼之此符臍中貼之貼房門上嬰孺治小兒夜啼法上令母脫去上衣只著中衣跪宅四角曰西方白帝東方青帝南方赤帝北方黑帝中央黃帝乞斷某甲夜啼荷恩之日奉還酒脯隨意所用還法安五畔置中庭四角故四角四畔中央一畔啟顙瞻五帝說曰今日奉還隨意所咒愿之劉氏方治小兒夜啼寫若以色見我以音聲求我是人行邪道不能見如來燒灰吞之男左一本女右一本灸法寶鑑灸幼宮三壯又灸中指甲後一分萬全方灸小兒夜啼上燈啼雞鳴止者灸中指甲後一分中衝穴一壯炷如小麥大喑薛經云舌者音聲之機也喉者音聲之關也小兒卒然無音者乃寒氣客於會厭則厭不能發發不能下致其門闔不制故無音也若咽喉音聲如故而舌不能轉運言語則為舌喑此乃風冷之邪客於脾之絡或中於舌下廉泉穴所致也蓋舌乃心之苗心發聲為言風邪阻塞經絡故舌不能轉運也若舌本不能轉運言語而喉中聲嘶者則為喉喑此亦為風冷所客使氣道不通故聲不得發而喉無音也然或風痰阻塞或因心經氣虛或因脾之脈絡受風或因風痰滯於脾之絡或因脾氣不足或胃中清氣不升皆足以致喑大抵此證亦有稟父腎氣不足不能言者有乳母五志之火遺兒熏閉清道不能言者或兒病津液耗損會厭乾涸不能言者或腎氣不充虛火上炎傷肺不能言者有驚風中風不能言者若遺熱與津液耗者用七味白朮散清氣不升者用補中益氣湯稟腎不足與虛火傷肺者用六味地黃丸若仰首咳嗽肢體羸瘦目白睛多或兼解顱呵欠咬牙等證悉屬腎虛非地黃丸不能救也卒失音巢氏云喉嚨者氣之道路喉厭者聲音之門戶有暴寒氣客於喉厭得寒即不能發聲故卒然失音也不能語者語聲不出非牙關噤也病後喑錢氏論腎怯失音相似病吐瀉及大病後雖有聲而不能言又能咽藥此非失音為腎怯不能上接於陽故也補腎地黃丸腎主之失音乃卒病耳吉氏家傳治小兒患後聲不出酸棗仁去殼一錢白茯苓半錢硃砂二錢上件為末蜜丸如豆大每服一丸人參湯下聖惠雞頭丸見舌驚退而喑漢東王先生通關散治小兒驚風並退只是聲啞不能言上以天南星炮為末每服嬰孩半字或一字三五歲半錢八九歲一錢豶豬膽汁調下令孩兒吃咽入喉中便能言語集驗方治小兒驚退而啞不能言語木通銼防風去蘆川升麻羚羊角屑桂心以上各半兩甘草炙二錢半上件藥搗為粗散每服一錢水一小盞煎至五分去滓入竹瀝少許更煎一兩沸不計時候量兒大小加減服之集驗又方臘月牛膽釀天南星不拘多少上研細每服半字薄荷湯調下臨臥服兒大者服一字至半錢癇瘥而喑巢氏病源小兒發癇瘥後六七歲不能語候風癇發之狀口眼相引或目睛上搖或手足瘛瘲或脊背強直或頸項反折屈搐如數皆由以兒當風取涼乳哺失節之所為也而癇發瘥後不能語者是風癇因兒衣厚汗出以兒乘風取涼太過為風所傷得之其初發之狀屈指如數然後發瘛瘲是也心之聲為言開竅於口其癇發雖止風冷之氣猶滯心之絡脈使心氣不和其聲不發故不能言也千金大補心湯治小兒癇瘥後風冷留滯於心絡使心氣不和語聲不發黃芩附子炮去皮臍各一兩甘草茯苓桂心各三兩石膏半夏遠志肉各四兩生薑六兩大棗二十枚飴糖一斤乾地黃阿膠麥門冬各三兩上件藥㕮咀每服一大撮入前飴糖半匙許水一盞半煎半盞服之中風失音聖惠治小兒中風失音不語舌根強硬方陳醬汁半合人乳二合上件藥相和合令勻少少與兒服之張渙竹瀝膏治小兒中風失音不語牙關緊急竹瀝依法旋取生地黃取汁蜜各半合以上攪勻桂心為末石菖蒲一寸九節者取末各一兩上件都一處調勻慢火熬成膏硬軟得所如皂子大每服一粒取梨汁化下救生菖陽湯治小兒中風昏石菖蒲天麻生烏蛇肉全蠍白殭蠶附子炮去皮臍羌活人參白附子各半兩上為粗末每服三錢水兩盞生薑五片薄荷五葉煎至一盞濾去渣溫熱時時與服醒脾散治小兒驚搐後不語甘草炙一錢冬瓜子防風各半兩人參一分上件為細末每服一錢用水一盞入竹葉數片燈心少許同煎至七分去滓食後溫服臨睡傷寒失音茅先生傷寒失音語不得方金毛狗脊甘草等分上為末每服一錢用黃蠟一塊指頭大水六分同煎四分服集驗方治小兒傷寒失音不能語桂指面大上含桂口中漸漸聲音如舊鼻張渙按小兒肺氣通於鼻氣為陽若氣受風寒停滯鼻間則成鼻塞氣寒使津液不收則多涕若冷氣久不散膿涕結聚使鼻不聞香臭則成齆鼻若挾熱則鼻乾皆妨害乳食薛巢氏云鼻乃肺之竅皮毛腠理乃肺之主此因風邪客於肺而鼻塞不利者宜用消風散或用蔥白七莖入油膩粉少許擂攤絹帛上掌中護溫貼囟門因驚僕氣散血無所羈而鼻衄者用異功散加柴胡山梔左臉青而兼赤者先用柴胡清肝散後用地黃丸上臉赤乃肺大腸實熱也用瀉白散鼻色赤乃脾胃實熱也用瀉黃散微赤乃脾經虛熱也用異功散加升麻柴胡色深黃用濟生犀角地黃湯後用楊氏地黃散淡白色用六君子湯頦間色赤用四物湯加山梔赤甚用五淋散小便赤色用六味丸補中益氣湯唇色白用六君子湯久不愈用麥門冬飲子若初病元氣未虧乳食如常發熱壯熱二便秘結作渴飲水臥不露睛者悉屬形病俱實當治邪氣若病久元氣已虧食少發熱口乾飲湯嘔吐泄瀉肢體畏寒臥而露睛者悉屬形病俱虛當補正氣為要鼻塞演山凡產牙兒三朝五日六晨一臘忽然鼻塞吻乳不能開口呼吸者多是乳母安睡之時不知持上兒子鼻中出息吹著兒囟或以水浴洗用水溫冷不避風邪所以致兒鼻塞宜與通關膏敷之消風散服之或有驚悸作熱杜薄荷散與服通關膏用白殭蠶豬牙皂角荊芥香附子川芎細辛等分為末蔥白同研敷囟至妙消風散治胎熱胎寒兼治諸風上攻頭目昏痛項背拘急肢疼目眩旋暈鼻塞多嚏皮膚頑麻癢瘡癮疹小兒虛風茯苓川芎羌活荊芥穗防風去蘆藿香殭蠶炒蟬蛻去嘴爪甘草炙厚朴制陳皮去白各等分上為末每服五分茶清調下薄荷湯亦可急慢驚風乳香荊芥湯調下或加雄黃名雄風散薄荷湯治鼻塞不通及夾驚傷寒極熱變蒸薄荷葉五錢羌活全蠍麻黃去節甘草殭蠶炒各一錢天竺黃白附子各二錢半煨上為末薄荷湯調下熱極生風加竹瀝少許一方有柴胡臺芎桔梗茯苓無全蠍殭蠶天竺白附張渙辛夷膏辛夷葉一兩洗焙乾細辛木通香白芷木香各半兩以上搗羅為細末次用杏仁一分湯浸去皮尖研上件用羊髓豬脂各二兩同諸藥相和於石器中慢火熬成膏赤黃色放冷入龍腦麝香各一錢拌勻每用少許塗鼻中若乳下嬰兒奶母吹著兒囟鼻塞者只塗囟上張雞峰方治囟開不合鼻塞不通上以天南星大者一枚微炮為末以淡醋調塗緋帛上以貼囟上炙熱手頻熨之莊氏治小兒鼻塞方上以槐葉為末用乳母唾調厚塗囟上吉氏蔥涎膏治兒生三五日鼻塞氣急飲乳之時啼叫不止蔥葉豬牙皂角為末去皮各七條上爛研同皂角末成膏貼囟門上瘥齆鼻聖惠龍腦散治小兒鼻齆不聞香臭龍腦半錢細研瓜蒂十四枚赤小豆三十粒黃連三大莖去須上件藥搗細羅為散入龍腦研令勻每夜臨臥時以綠豆大吹入鼻中每用有少許清水出為效張渙清肺膏治齆鼻病瓜蒂半兩附子一枚炮去皮臍赤小豆細辛甘草各一分以上搗羅為細末上件入龍腦一錢研勻煉蜜和丸綿裹納鼻中隨鼻之大小上二方前一方有熱者宜之後一方有寒者宜之鼻流清涕聖惠夫肺氣通於鼻若其藏為風冷所傷冷隨氣乘於鼻故使液涕不收也夫津液涕唾得熱則乾燥得冷則流溢也張渙菊花散治鼻塞多涕等病甘菊防風前胡各一兩細辛桂心各半兩甘草一分上件搗羅為細末每服半錢研入乳香少許煎荊芥湯調下乳後聖惠菊花散治小兒腦戶傷於風冷鼻內多涕精神昏悶甘菊花白朮細辛白茯苓甘草炙微赤銼防風人參並去蘆各一分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓不計時候量兒大小以意分減溫服萬全方芎藭散治證同前芎藭半兩甘菊花白朮防風人參細辛白茯苓甘草炙各一分上件藥搗羅為散每服一錢以水一盞生薑少許煎至五分去滓溫服鼻乾無涕聖惠夫小兒肺臟壅滯有積熱上攻於腦則令腦熱也又肺氣通於鼻主於涕若其臟有熱則津液乾燥故令無涕也聖惠木通散治小兒腦熱無涕口乾心躁眠臥不安木通銼麥門冬去心焙川升麻各半兩知母犀角屑甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃各一分梔子仁三枚上件藥搗羅為粗散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服張渙犀角升麻散治腦熱肺壅鼻乾病犀角屑一兩川升麻馬牙硝黃連各半兩以上搗羅為細末次用硃砂細研水飛半兩牛黃龍腦各一分研細上件搗羅為細末每服半錢溫蜜湯調下乳食後萬全方麥門冬丸治小兒心肺壅熱腦幹無涕時有煩躁麥門冬去心焙一兩龍腦細研半分甘草炙牛黃研入各一分黃連赤茯苓犀角屑粉霜硃砂馬牙硝各研生乾地黃子芩各半兩上件藥搗羅為末入研了藥都研令勻每服半錢以溫蜜湯調下鼻有息肉千金冀論曰凡人往往有鼻中肉塞眠食皆不快利得鼻中出息而俗方亦眾而用之皆無成效惟見本草云雄黃主鼻中息肉此言不虛但時人不知用雄黃之法醫者生用故致困斃曾有一人患鼻不得喘息余以成煉雄黃日內一大棗許大過十日肉塞自出當時即得喘息更不重發其煉雄黃法在千金冀仙丹方中具有之宜尋求也期有神驗千金治小兒鼻塞生息肉方通草細辛各一兩上二味搗末取藥如豆著綿纏頭納鼻中日二千金冀治鼻中息肉塞鼻不得喘息方取細辛以口濕之屈頭納鼻中傍內四畔多著日十易之滿二十日外以葶藶一兩松蘿半兩上二味搗篩以綿裹薄如棗核大納鼻中日五六易之滿二十日外以吳白礬上上者二兩瓦坯里相合令置窯中燒之待瓦熟取搗篩以面脂和如棗核大納鼻中日五六易盡更和不得頓和二十日外乃瘥慎行作勞及熱食並蒜面百日千金翼治齆鼻有息肉不聞香臭方瓜蒂細辛各半兩上二味為散絮裹豆大塞鼻中須臾即通鼻赤丹溪治小兒赤鼻雄黃黃丹各等分用無根水調敷或用菖蒲半葉酒蒸為末調服解食毒無根水者天落雨水用碗盛之者是也薛氏云鼻色赤乃脾胃實熱也用瀉黃散微赤乃脾經虛熱也用異功散加升麻柴胡色深黃用濟生犀角地黃湯後用楊氏地黃散淡白色用六君子湯楊氏地黃散治榮中有熱肺壅鼻衄生地黃赤芍藥當歸身川芎各等分上每服二三錢水煎熟入蒲黃少許春夏衄入地黃汁蒲黃各少許秋冬衄用車前子汁少許龜胸錢肺熱脹滿攻於胸膈即成龜胸又乳母多食五辛亦成張乳母乳兒常捏去宿乳夏常洗乳淨捏去熱乳若令兒飲熱乳損傷肺氣胸高脹滿令兒胸高如龜乃名龜胸曾此候因風痰停飲聚積心胸再感風熱肺為諸臟華蓋居於膈上水氣泛溢則肺為之浮日久凝而為痰停滯心胸兼以風熱內發其外證唇紅面赤咳嗽喘促致胸骨高如覆掌名曰龜胸治法寬肺化痰利膈以除肺經痰飲先用五苓散和寬氣飲入薑汁蔥湯調服次清肺飲雄黃散碧玉丸如意膏為治若投前藥愈而復作傳變目睛直視痰涎上湧兼以發搐則難治矣薛龜胸龜背多因小兒元氣未充腠理不密風邪所乘或痰飲鬱結風熱交攻而致法當調補血氣為主而以清熱消痰佐之若因乳母膏粱厚味者當以清胃散治其母子亦服少許聖惠大黃丸治龜胸肺熱壅滯心膈滿悶川大黃七錢半微炒天門冬焙百合杏仁麩炒微黃木通桑白皮甜葶藶隔紙炙紫川朴硝各五錢上為細末蜜丸如綠豆大不時溫水研五丸量兒大小加減幼科類萃去朴硝加百合石膏張百合丹即大黃丸加減百合一兩川朴硝杏仁湯浸去皮尖桑根白皮木通川大黃天門冬去心各半兩上為極細末煉蜜和如黍米大每服十粒米飲送下量兒大小加減曾五苓散見驚寬氣飲見驚清肺飲見咳嗽雄黃散見驚碧玉丸見咳嗽如聖膏見喘丹治小兒龜胸方蒼朮黃柏酒炒芍藥酒炒陳皮防風山楂威靈仙加當歸又利後加生地黃上為末煉蜜丸食後溫水下外治法龜尿摩胸骨上瘥灸法田氏取兩乳前各一寸五分上兩行三骨罅間六處各三壯炷如麥春夏從下灸上秋冬從上灸下莊氏取九家灰一斗盛簸箕中令兒合面印胸跡於龜胸從上當中及兩邊令三姓人同下火各於灰上灸三壯棄灰河流或水中龜背聖惠坐兒稍早為客風吹脊風氣達髓使背高如龜雖有藥方多成痼疾以灸法為要錢兒生下客風入脊逐於骨髓即成龜背治之以龜尿點節骨取尿之法當安龜在蓮葉上後用鏡照之其尿自出以物盛之張嬰兒生後一百八十日始髇骨成方能獨坐若強令兒坐之太早即客風寒吹著兒背及脊至骨傳入於髓使背高如龜之狀以松藥丹療之張松藥丹治龜背病松花洗焙乾枳殼去瓤麩炒獨活防風去蘆叉各一兩川大黃炮前胡麻黃去根節桂心各半兩上為細末煉蜜和如黍米大每服十粒粥飲下量兒大小加減聖惠麻黃丸多芍藥少前胡一方多檳榔訶皮一方無松花有當歸煮麵糊丸名枳殼防風丸聖惠灸法當灸第三椎骨節下兩旁各一寸半肺俞穴又第五椎骨節下兩旁各一寸半心俞穴又第七椎骨節下兩旁各一寸半膈俞穴以小兒中指節為一寸艾炷如小麥大三五壯即止此法累用十有一二得效亦無全效之功顱囟經云符殿直之孫紹熙辛亥春灸即效世龜背在百日內不治脫肛曾肺與大腸為表裡肛者大腸之門肺實熱則閉結不通肺虛寒則腸頭出露有因痢久裡急後重努力肛開為外風所吹或伏暑作瀉腸滑不禁或稟賦怯弱易於感冷亦致大腸虛脫凡小兒所患瀉痢皆因暑濕風熱乘脾胃虛而得蓋風屬木木勝則制土土主脾胃虛而受制又濕喜傷脾因虛受濕不能分別清濁水穀交雜則為洞泄洞泄既久大腸亦虛大腸乃手陽明燥金而土虛不能生金金氣既虛則傳送之道亦虛又為風冷所襲故肛門脫而不收法宜補脾溫胃使金得受母之益而氣實宜藿香飲不乳食勻氣散疝平胃散不乳食主之次則內投固腸之劑用健脾飲不乳食養臟湯痢服餌外以敷貼之法用伏龍肝散敷之及萆麻膏貼囟門使引氣上令其自收如收盡仍以水洗去其膏及有邪熱積滯於大腸未經疏滌亦成此疾其肛門色紅而軟肺脈浮數右手指紋紫見身微有熱時或煩躁先投清肺飲嗽疏解次用薄荷散蟠龍散為治間服萬安飲亦佳薛巢氏云實熱則大便秘結虛寒則肛門脫出此多因吐瀉脾氣虛肺無所養故大腸之氣虛脫而下陷也用補中益氣或四君子為主若脫出緋赤或作痛者血虛而有熱也用補中益氣湯佐以四物牡丹皮微者或作痛者氣虛而有熱也佐以四君牡丹皮大凡手足指熱者屬胃氣熱手足指寒者屬胃氣寒湯氏方治脫肛大腸自糞門出宜用蔥湯熏洗令軟款款送上此因瀉利得之者亦可服瀉利之藥然後用槐花等藥又有用一味五倍子煎湯入朴硝熏洗而縮者又有用真蒲黃碾極細以豬脂拌勻敷肛門上而入者全嬰方用澀腸散兼有痔證腫痛者用黃丹滑石等分井水調塗即消並用鉛白霜半錢片腦半字好酒調敷腫處甚佳黃連解毒湯亦可服用苦參湯洗亦效亦有密陀僧白礬腦子末之敷上更用荊芥防風等項洗之用生栝蔞根者效內服張渙蕪荑丹治小兒久痢頻並大腸虛冷肛門脫出白蕪荑微炒鱉甲塗酥炙黃去裙襴蝸牛皮炙令焦黃磁石燒醋蘸七遍細研水飛各一兩蚺蛇膽黃連去須微炒各半兩上件搗羅為末用軟飯和丸如黍米大每服十粒粥飲下量兒大小加減乳食前妙應散莨菪子淘去浮者炒令黑色天台烏藥各半兩以上搗羅為細末次入白麵一分龍腦半錢上件都拌勻每服一字蜜湯調下乳食前曾氏薄荷散治陽證脫肛薄荷和梗骨碎補去毛各半兩金罌刺根七錢半甘草二錢半上銼碎每服二錢水一盞入無灰酒大匙煎七分空心溫服或無時聚寶方象豆丸治諸痢脫肛榏藤子一名象豆出廣南山林間如通草藤紫黑上一味為末每服二錢血痢熱酒調下三服必效白痢傾打破取仁子碎碾銀器中慢火炒黃褐色碾細羅一兩遍後若帶白時再炒褐色為末宿蒸餅湯浸卻握乾和丸豌豆大略焙乾每服十五丸至二十丸倉米飲溫下空心食前服痢瘥即止蟲毒五痔小兒脫肛並可為末酒調下立愈茅先生方用破故紙一兩於瓦上焙乾為末每服一字或半錢米飲調下吳茱萸末亦可嬰孺用黃連黃柏二味為末蜜丸桐子大飲下三丸日三四服莊氏用干蓮蓬焙乾為末米飲調下一二錢湯氏治大腸虛弱肛門脫下方龍骨訶子煨去核各一兩沒石子大者二枚罌粟殼去核醋塗炙二錢上為末白湯點服仍用蔥湯熏洗令軟款款以手托入用新磚瓦燒紅以醋澆之氣上即用腳布疊數重壓定使熱氣上透不可過熱令病者以臀坐於布上如覺布溫逐旋減之以常得溫熱為度並常服前藥潔古五倍子散治小兒脫肛五倍子地榆各等分上為細末每服半錢或一錢空心米飲調下外治錢氏赤石脂散治小兒因痢後努躽氣下推出肛門不入躽於建反用力努腹也真赤石脂伏龍肝各等分上為細末每用五分敷肛頭上頻用按入曾氏蟠龍散治陽證脫肛乾地龍蟠如錢樣者佳略去土一兩風化朴硝二錢上銼焙研為細末仍和勻朴硝每以二錢至三錢肛門濕潤干塗或乾燥用清油調塗先以見毒消荊芥生蔥煮水候溫浴洗輕與拭乾然後敷藥伏龍肝散治陰證脫肛伏龍肝一兩鱉頭骨一具百藥煎二錢半上三味焙研為末每用一錢至三錢濃煎紫蘇湯候溫和清油調塗患處並如前法浴洗拭乾方上藥治小兒脫肛用五倍子為末量多少摻患處以物襯手揉入切忌食發風毒物脫肛治法用蒲黃一兩豬脂二兩煉豬脂和蒲黃成膏塗腸頭上即縮入水聖散治小兒脫肛不收用浮萍草不以多少杵為細末干貼患處澀腸散治小兒久痢大腸頭脫出不收訶子炮赤石脂龍骨各等分上為末臘茶少許和藥摻腸頭上絹帛揉入又治痢米湯調又方治脫肛五倍子焙為末入茶依前方用勝雪膏治隨腸番花鼠奶等痔熱痛不可忍或已成瘡者並皆治之片腦風化硝上件各半字用好酒少許研成膏子塗之隨手輒愈治大人小兒脫肛不收方連翹不以多少洗淨為細末先以鹽水洗後用藥末時時干敷脫肛上立瘥蓖麻膏治暴患脫肛蓖麻子一兩上件爛杵為膏捻作餅子兩指寬大貼囟上如陰證脫肛加生附子末蔥蒜同研作膏依前法貼之朱氏家傳治小兒脫肛方上用磁母石以石碾為末麵糊為丸如綠豆大熟水下五七丸後以磨刀水洗脫肛處立效脫肛用東北方陳壁泥土湯泡先洗下後熏上保生信效治久病腸風痔漏腸出不收至有出數寸者苦楚良極小兒久瀉痢亦名此疾上先用五倍子四兩以水五升煎湯一兩沸投入朴硝四兩通手淋洗至水冷即止若覺熱痛即津唾調熊膽塗之痛即止當漸收甚者不過淋洗三五次收盡竊詳此藥朴硝能軟五倍子能收二物相須以為用也或更以干蜘蛛末摻之乘熱以軟帛搵入尤妙摻蜘蛛者與葛氏方同九籥衛生療小兒脫肛方香附子荊芥穗各等分上同為粗末每用三匙水一大碗煎十數沸淋渫苦參湯治脫肛並痔枳殼黃連大黃甘草荊芥苦參赤芍藥黃芩各等分上銼散每用五錢以車前子茅草同煎熏洗小兒脫肛瀉血秋深不痊灸龜尾一壯炷如小麥大脊端窮骨也小兒脫肛者灸臍中三壯小兒脫肛久不瘥及風癇中風角弓反張多哭言語不擇發無時節盛即吐沫者取百會一穴灸七壯在鼻直入髮際五寸頂中央旋毛中可容豆炷如小麥大肛癢薛小兒肛癢或嗜甘肥大腸濕熱壅滯或濕毒生蟲而蝕肛門若因濕熱壅滯用四味肥兒丸疳大便秘結者用清涼飲裡熱蟲蝕肛門先用化䘌丸後用四味肥兒丸外以雄黃散納肛內若因病不食蟲無所養而食臟食肛者其齒齦無色舌上盡白四肢倦怠其上唇內有瘡唾血如粟心內懊憹此蟲在上食臟若下唇內有瘡此蟲在下蝕肛門若蝕肛透內者不治諸蟲惟上半月頭向上可用藥追之望後頭向下令患者聞烹食香味蟲頭即向上矣後用藥追之一兒嗜膏粱甘味患疥瘡余謂當禁其厚味急用清胃之藥以治其積熱不從乃用敷藥以治其外更肛門作癢發熱瘡益甚肌體骨立飲食少思遂用九味蘆薈丸疳五味異功散吐瀉加柴胡升麻尋愈一兒肛門作癢耳前後結小核如貫珠隱於肌肉之間小便不調面色青此稟母之肝火為患用九味蘆薈丸為主佐以五味異功加山梔柴胡又以加味逍遙散虛熱加漏蘆與母服而愈一兒十三歲肛門作癢或脫出或大便血遍身生瘡發熱作渴腹大青筋用大蘆薈丸五味異功散其瘡漸愈佐以補中益氣湯熱渴漸止肛門悉愈又用異功散為主佐以補中益氣湯虛熱加吳茱萸所制黃連治之而血愈一兒十五歲兩目白翳遍身似疥非疥肛門作癢晡熱口渴形體骨立余以為肝疳之證也用六味地黃丸而痊後陰莖作癢小便澄白服蟠蔥散肛門腫痛服大黃等藥肛門脫出作癢不可忍雜用降火之藥不應下唇內生小白瘡余以為蟲蝕肛門用九味蘆薈丸而愈一小兒肛門作癢誤以為痔服槐角丸等藥肢體消瘦鼻下濕爛下唇內生瘡此蟲食下部也先用化䘌丸二服乃用五味異功散四劑卻用大蕪荑湯疳四味肥兒丸而痊一兒七歲飲食過多即作瀉面青黃色服峻利克劑余謂當節飲食健脾胃為善不信後牙齦赤爛肛門作癢服清熱之劑腹痛膨脹復請欲用前劑余曰此元氣虧損虛火上炎也仍不信後腮間黑腐余曰此脾氣太虛肉死而不知痛也明矣後雖信余已不救矣若初用五味異功散健脾胃為主佐以大蘆薈丸四味肥兒丸清脾濕熱豈有不治之理哉後之患者審之一小兒肛門作癢屬大腸經風熱用槐角丸而愈一小兒肛門連陰囊癢出水淋漓屬肝經濕熱也用龍膽瀉肝湯九味蘆薈丸治之並愈一小兒嗜甘肥肛門作癢發熱作渴雜用清熱之劑腹脹少食鼻下生瘡余謂脾胃濕熱生蟲也不信後下唇內生瘡先用四味肥兒丸諸證漸愈又用大蕪荑湯治之而痊化䘌丸治諸疳生蟲不時啼哭嘔吐清水肚腹脹痛唇口紫黑腸頭濕䘌蕪荑青黛蘆薈蝦蟆燒灰川芎白芷胡黃連各等分上各另為末豬膽浸糕丸如麻子大每服一二十丸食後並臨臥杏仁湯下雄黃散治走馬疳並痘毒疳蟲蝕肛門雄黃銅綠各二錢上為末摻瘡上腎錢腎主虛無實也惟瘡疹腎實則黑陷兒本虛怯由胎氣不成則神不足目中白睛多其顱則解囟開面色㿠白此皆難養縱長不過八八之數若恣色欲不及四旬而亡或有因病而致腎虛者非也又腎氣不足則下竄蓋骨重惟欲墜下而身縮也腎者陰也腎虛則畏明皆宜補腎地黃丸主之心氣熱則上竄宜導赤散腎氣虛則下竄宜地黃丸是也腎病見夏水勝火腎勝心也當治腎輕者腎病退重者悸動當搐潔腎主寒自病則足脛寒而逆人之五臟惟腎無實小兒瘡疹變黑陷則是腎實水克退心火心乘腎微邪內熱不惡寒桂枝湯主之肺乘腎虛邪喘嗽皮澀寒百部丸主之肝乘腎實邪拘急氣搐身寒理中丸主之脾乘腎賊邪體重泄瀉身寒理中丸主之劉五行之中惟有腎之一臟母盛而子反受邪何則肺屬金射於皮毛所主者氣腎屬水主於骨髓所藏者精氣之輕浮能上而不能下精之沉重能下而不能上此物性之自然今肺之盛蓋熱之作也熱上蒸於肺則不能下生於腎而腎受邪矣急服涼藥解之使肺氣清和而後可此腎病必先求之於肺若肺臟安和而腎忽然受病者不過脾之濕相刑于腎而生疾所以有解肺熱去脾邪兩藥若脾肺兩臟俱和而腎自生疾亦察其本臟而治之薛下竄等證足不喜覆者蓋腰以下皆腎所主乃心氣下行於腎部也法用地黃丸壯腎水以制心火若因脾肺虛而不能生腎水者用補中益氣湯六味地黃丸以滋化源其瘡疹黑陷乃腎虛而邪氣實也尤當用地黃丸地黃丸錢氏熟乾地黃八錢山茱萸肉乾山藥各四錢澤瀉牡丹皮白茯苓去皮各三錢上為末煉蜜和丸如桐子大三歲以下一二至三丸空心溫水化下垣或問錢氏地黃丸補腎又曰補肝何也曰然手厥陰心主包絡足厥陰肝經俱治在下焦經云不足者滋其化原故肝腎之病同一治法此地黃丸補二經之意也海藏云若加五味為腎氣丸此滋肺之源以生腎水薛前丸治腎肝血虛燥熱作渴小便淋秘痰氣上壅或風客淫氣瘰癧結核或四肢發搐眼目瞤動或咳嗽吐血頭目眩暈或咽喉燥痛口舌瘡裂或自汗盜汗便血諸血或稟賦不足肢體瘦弱解顱失音或畏明下竄五遲五軟腎疳肝疳或早近女色精血虧耗五臟齊損凡屬腎肝諸虛不足之證宜用此以滋化原其功不可盡述海腎實須澤瀉瀉之腎本無實不可瀉錢氏止有補腎地黃丸無瀉腎之藥治脈洪而實錢氏地黃丸加生地黃去山茱萸是也此治左手本部脈實若右尺洪實以鳳髓丹瀉之鳳髓丹方見雜病遺精門解顱囟陷囟填總論萬全方云小兒有解顱候有囟不合候有囟陷候此三者大同而小異也解顱者謂小兒年長囟應合而不合頭顱開解也腎主骨髓而腦為髓海腎氣不成則髓海不足故骨縫開解也其囟不合與囟陷雖因臟腑有熱熱氣上衝致囟或不合或陷然亦本於腎氣不足也薛腎主骨骨氣實則腦髓充而囟早合骨脈盛而齒早生腎氣怯則腦髓虛而囟不合此由父母精血不足宜用地黃丸補之若在乳下當兼補其母更以軟帛緊束其首使其易合皆虛火上衝當調補脾腎為善囟填囟陷亦因所稟腎氣不足及乳哺失宜脾胃虧損所致夫脾主肌肉氣逆上衝而為填脹元氣下陷而為囟陷也並用補中益氣湯地黃丸及用狗頭骨炙黃為末以雞子清調敷囟門亦有瀉利氣血虛脾胃不能上充者亦用前法若手足並冷前湯加薑桂未應虛寒甚也急加附子緩則多致不救張渙嬰兒解顱囟不合囟填囟陷下不平皆由腎經虛熱宜用封囟散方蛇蛻皮一兩燒灰細研防風川大黃濕紙裹炒煨存性白芨各半兩上件碾為細末入青黛半兩同研勻每用半錢以豶豬膽汁調勻用一紙囟子攤之四邊回合各留少白紙用淡生醋麵糊貼囟上不住以溫水潤動一伏時換解顱囟不合初虞世云父精不足則解顱眼白多錢解顱生下而囟不合腎氣不成故也長必少笑更有目白睛多㿠白色瘦者多愁少喜也余見腎虛湯解顱者囟大頭縫不合如開解故曰解顱此由腎氣不成故也云云見前總論凡得此者不過千日其間亦有數歲者乃廢人也人之無腦髓如木無根古人雖有良方吾所以不錄者勞而無功也亦不可束手待斃宜依錢氏補腎萬一有可生之理錢氏補腎如地黃丸加鹿茸之類是曾凡得此候不及千日之內間有數歲者偶因他疾攻激遂成廢人若氣色精明能飲食者多服調元散補腎地黃丸旬月內頗見效者次第調理或有可治若投藥後如故亦難療矣田解顱治法宜用生地散丹小兒解顱乃是母氣血虛與熱多耳用四君子四物有熱加酒炒黃連生甘草煎服外以綿束緊用白蘞末敷之錢氏地黃丸見前並鶴節條天南星散治囟開不合鼻塞不通天南星大者微泡去皮為細末米醋塗調緋帛上貼囟上炙手頻熨之立效調元散主稟受元氣不足顱囟開解肌肉消瘦腹大如腫致語遲行遲手足如筒神色昏慢齒生遲服之效乾山藥去黑皮五錢人參去蘆白茯苓去皮茯神去皮木白朮白芍藥熟地黃酒洗當歸酒洗黃耆蜜水炙各二錢半川芎甘草炙二味各三錢石菖蒲二錢上碎每服二錢水一盞姜二片棗一枚煎七分無時溫服如嬰兒幼嫩與乳母同服張渙玉乳丹治嬰兒頭骨應合而不合頭縫開解鍾乳粉依古法制煉者柏子仁別研熟乾地黃依法蒸焙者當歸洗焙乾各半兩防風銼補骨脂淨揀微炒各一分或加黃耆茯苓上件除別研者碾為細末次入鍾乳粉等拌勻煉蜜和如黍米大每服十粒煎茴香湯下乳食前嬰孺方狗腦丸治小兒腦長喜搖頭解顱狗腦一個犲漆即五加皮甘草炙白朮防風鐘乳石乾地黃各一分牛黃二分上以狗腦丸小豆大一歲飲下二丸日再未知加之又云兒囟常令暖冷即病死小兒錮囟藥芍藥粉上取黃雌雞臨兒囟上刺其冠以血滴囟上血止以芍藥粉敷之使血不見一日立瘥治小兒解顱虎骨方虎骨敗龜板不灰木乳香各半兩上為末用生豬血於手心內調塗在頭縫開處以舊綿子包裹七日第八日以蔥湯水洗去前藥再用此藥塗之經年者已減一分又歇三日方再用藥塗之又服參苓散人參茯苓白附子炮羌活甘草炙芍藥白朮水煮各一分犀角屑京芎藿香後三味減半上為末每服半錢水一盞用少金銀同薄荷三葉煎至三分溫服通驚氣千金治小兒囟開不合方防風一兩半柏子仁白芨各一兩上三味末之以乳和敷囟上十日知二十日愈日一莊氏家傳方治腦縫不合山茵陳一兩車前子百合各半兩上為末用烏牛乳汁調塗腳及腦縫上用帛子裹頭三日一換五上必效王氏封囟散治囟開不合頭縫開張囟開崎陷咳嗽鼻塞柏子仁防風天南星各四兩上為細末每用一錢以豬膽汁調勻稀稠得所攤在緋絹帛上看囟子大小剪貼一日一換不得令乾時時以湯潤動三辛散三因治小兒骨應合而不合頭骨開也名曰解顱細辛桂心各半兩乾薑七錢半上為末以薑汁和敷顱上貼之兒面赤即愈又方用蛇蛻炒焦為末用豬頰車中髓調敷頂上日三四度曾有人作頭巾裹遮護之久而自合亦良法也灸法臍上臍下各五分各灸三壯灸瘡未發先合囟陷巢氏云小兒臟腑有熱渴引水漿致成泄利久則血氣虛弱不能上充腦髓故囟陷如坑不能平滿也聖濟用當歸散方見腹痛地黃丸見前曾囟陷者虛之極也胃氣虛寒則囟陷慢驚中有之胃寒脾困吐瀉者為虛極急以金液丹固真湯俱慢驚及諸救元等藥治之外則貼以烏附膏有後枕陷者其證尤重治法以囟陷藥同不效亦為難療此大虛極百無一活耳烏附膏理囟門陷綿川烏生用綿附子生用各五錢雄黃二錢上件為末用生蔥和根葉細切爛杵入前藥末同煎空心作成膏貼陷處聖惠生乾地黃散治小兒臟腑壅熱氣血不榮致囟陷不平者生乾地黃二兩烏雞骨一兩酥塗炙令黃上搗細羅為末不計時候以粥飲調下半錢又治小兒囟陷方上取豬牙車骨髓煎如膏塗囟上良又方以狗頭骨炙令黃搗羅為末以雞子清調塗又方以天靈蓋炙令黃搗羅為末以生油調塗千金小兒囟陷灸臍上下各半寸及鳩尾骨端又足太陰各一壯囟填囟填者囟門腫起也脾主肌肉乳哺不常飢飽無度或寒或熱乘於脾家致使臟腑不調其氣上衝為之填脹囟突而高如物堆起自汗出毛髮黃而短是也若寒氣上衝則牢𩊅音昂履頭也腫硬如履頭突起熱氣上衝即柔軟又小兒脅下有積者咳且啼而氣上逆者啼甚久其氣未定因而乳之者肝氣盛風熱上衝者皆能令囟填當一一審其因而治之寒者溫之熱者涼之氣上逆者和而降之肝氣盛者瀉青為主熱證里多大連翹湯表多柴胡散虛者以補中益氣湯送下地黃丸神而明之存乎其人言不盡意曾世言囟腫皆以為熱殊不知有陰陽二證切宜詳辨堅硬為陰紅軟為陽故嬰孩寶書云寒氣上衝則牢𩊅熱氣上衝則柔軟正比之謂若陰證以勻氣散理中湯主之陽證用玉露飲當歸散防風湯為治玉環集歌曰囟門腫起定為風此候應須也不中或若加坑如盞足七日之間命必終石壁經歌曰積聚脾中熱不通致令面赤口唇紅胸高夜嗽多䐜脹休使流傳肺有風喉里作聲涎上壅囟門腫起熱來沖但教涼膈安靈腑能使三朝速有功積有冷熱皆能作腫冷則糞白或酸臭氣衝人亦有蟲出其食物皆不能化腹脹滿而多困喉中亦鳴也熱則使多渴其糞赤面色亦黃赤口內臭氣亦蟲出各看其證候調治且須分水穀去積並調氣冷則溫脾胃熱則去其熱化涎止渴囟隱則冷也腫則熱也積熱囟虛腫宜將時氣門中三十六種除濕散濃煎桑白皮湯下形證論云肺熱生風涎鳴囟腫將白丁香膏一二服或南星丸一二服便退秘要指迷論方凡小兒生下一月日內或囟門腫此乃受胎熱氣即用黃柏膏塗於足心湧泉穴如陷即用半夏膏塗手心此乃嬰兒腎流受冷氣邪干心致令病生黃柏半夏皆為末皆冷水調貼行遲巢兒自變蒸至能言隨日數血脈骨節備髕骨成即能行骨是髓養稟生氣血不足者髓不充強故骨不成數歲不能行張凡兒生至周歲三百六十日膝骨成乃能行近世小兒多因父母氣血虛弱故令胎氣不強骨氣軟弱筋脈無力不能行步麝茸丹主之曾經大效湯小兒稟受血氣不足者則髓不滿骨故軟弱而不能行腎主髓治法當用錢氏補腎地黃丸加鹿茸五加皮麝香則髓生而骨強自然行矣外甥黃知錄之子三歲不能行遂合此方服之有驗張麝茸丹治數歲不能行麝香別研茄茸酥炙黃生乾地黃虎脛骨酥塗炙黃當歸洗焙乾黃耆銼上件各一兩為細末用羊髓四兩煮爛和成膏如黍米大每服十粒摩沉香湯下乳食前日三服錢羚羊角丸治小兒腎虛或病後筋骨弱五六歲不能行宜補益肝腎羚羊角尖細而節密者錯取末虎脛骨敲破塗酥炙黃生乾地黃焙酸棗仁去皮稈炒白茯苓各半兩桂去皮取有味處不見火防風去蘆頭切焙當歸同上黃耆切焙各二錢半上同為細末煉蜜和成劑每服一皂子大兒大者加之食前溫水化下日三四服久服取效聖惠生乾地黃丸治兒十歲不行生地黃當歸焙防風酸棗仁微炒赤茯苓黃耆芎藭羚羊角羌活甘草炙微赤桂心各等分上搗羅蜜丸如綠豆大食前溫酒下十丸量兒加減虎骨散虎脛骨酒炙生乾地黃酸棗仁酒浸去皮炒香辣桂去皮白茯苓去皮防風去蘆叉當歸去蘆川芎牛膝酒浸去蘆各等分上為極細末每服一錢半以粥飲調次入好酒二滴再調食前服日二一方用煉蜜丸如黍米大木瓜湯下三因五加皮散治小兒三歲不能行者由受氣不足體力虛怯腰脊腳膝筋骨軟足故不能行用真五加皮為末粥飲調次入好酒少許每服一慄殼許日三服效一方五加皮二錢半木瓜一錢二分半為極細末用粥飲入酒二滴調服寶鑑兒骨熱肺脈寒長不能行顱囟兒自小傷抱腳纖細無力行立不得或骨熱疳勞肌肉消瘦宜服柴胡飲柴胡鱉甲米醋塗炙黃知母桔梗枳殼去穰麩炒玄參升麻上件各等分細銼三歲以下藥半兩水五合煎二合分二服空心食前後忌毒物服後澡浴澡浴方苦參茯苓皮蒼朮桑白皮白礬各半兩蔥白少許上銼沸水二升浸藥一兩通與兒浴溫處避風千金治數歲不行方葬家未開戶盜食與哺日三便行翼云未閉戶嬰孺就墓門中哺寶鑑灸兩足踝各三壯良方左經丸治筋骨諸疾手足不隨不能行步運動草烏頭生肉白者去皮臍木鱉去殼白膠香五靈脂各三兩半當歸一兩斑蝥去翅足一百枚少醋煮熟上為末黑豆去皮生杵粉一斤醋糊丸雞頭實大酒磨下一丸不曾針灸傷筋絡者四五丸必效十歲兒一丸分三服此藥能通榮衛導經絡專治心腎肝三經服後小便少淋澀乃其驗也按此方非內有汙血痼積不宜用丁時發治大人小兒銼骨行步艱難腳無力續命丹防風乳香蔓荊子牛膝麻黃羚羊角酸棗仁草烏頭去皮沒藥白朮茯苓各二錢半天麻酒煮胡麻炒當歸續斷各半兩川烏頭去皮黃耆各四錢蒺藜一錢二分半上為細末蜜丸小彈大每服一丸煎酒細嚼一日三五服用後洗藥服藥三日方洗草烏頭當歸地龍木鱉子紫貝草椒目蔥須荊芥各一兩為末煎湯露腳指甲從上淋洗次用熏法熏藥方柴胡草烏頭赤小豆吳茱萸羌活晚蠶砂各一兩末黑豆三升熱水泡少頃去黑豆入前藥煮盆盛熏銼閃處令出骨中汗齒遲齒者骨之所終而髓之所養也小兒稟受腎氣不足不能上營而髓虛不能充於骨又安能及齒故齒久不生也地黃丸主之一小兒三歲言步未能齒髮尤少體瘦艱立發熱作渴服肥兒丸不應余曰此腎虛疳證也蓋肥兒丸脾胃經之藥久服則腎益虛其疳益甚不信牙發漸落令用地黃丸加鹿茸五味子半載而元氣壯健一小兒體瘦腿細行步艱辛齒不堅固發稀短少用六味地黃丸補中益氣湯年餘諸證悉愈形體壯實張渙香附丹治齒不生大香附子揀淨刮去皮沉香各一兩雄鼠糞燒灰乾蟾燒灰檳榔各半兩上件搗羅為細末用羊髓四兩煮爛和成膏如黍米大每服十粒麝香湯下量兒大小加減湯氏芎黃散治小兒齒不生大川芎生地黃各半兩山藥當歸甘草炙各一分上焙為末熱湯調服或時以藥末擦齒齦千金翼方溺坑中竹木主小兒齒不生正旦刮塗之即生外臺小品又方取雌鼠屎三七枚以一枚拭齒根處盡此止二十一日齒當生雌鼠屎頭尖是也千金同楊氏產乳方用三十枚仍云雌糞用兩頭丸者是聖惠治小兒齒不生或因落不生方上取牛糞中黑豆二七枚小開去頭上皮以此豆頭開處注齒根上時時用之當效也發遲巢氏云足少陰為腎之經其華在發小兒有稟性少陰之血氣不足即發疏薄不生亦有因頭瘡而禿落不生者皆由傷損其血血氣損少不能榮於發也苣勝丹方張渙治發不生當歸洗焙乾生乾地黃芍藥各一兩以上搗羅為細末次用苣蕂一合研胡粉半兩細研上件同研勻煉蜜和如黍米大每服十粒煎黑豆湯下兼化塗搽頭上無妨量兒大小加減千金治少小頭不生髮以楸葉搗取汁敷頭上立生又方燒鯽魚灰末以醬汁和敷千金冀治發薄不生方先以醋泔清洗禿處以生布揩令火熱臘月豬脂並細研鐵生煎三沸塗之日三遍本草甑氣水主長毛髮以物於炊飯時承取沐頭令髮長密黑潤不能多得朝朝梳小兒頭漸漸覺有益好小兒白禿發不生搗榆皮末苦酒調塗聖惠生髮神效黑豆膏治小兒腦疳頭髮連根作穗子脫落不生兼瘡白禿髮不生者並用生髮黑豆苣蕂各三合訶黎勒皮一兩上件藥搗羅為末以水拌令勻內於竹筒中以亂髮塞口用煻灰內煨取油貯於瓷器中先以米泔皂莢湯洗頭拭乾塗之日再用十日發生又方葛根末豬脂羊脂各二兩上件藥入銚子內以慢火熬成膏收於瓷閤中每取一錢塗摩頭上日再用不過五七度效香薷煎治小兒白禿不生髮燥痛陳香薷二兩胡粉一兩豬脂半兩上件藥以水一大盞煎香薷取汁三分去滓入胡粉豬脂相和令勻塗於頭上日再用之聖惠治小兒頭禿不生髮苦癢蔓菁散上取蔓菁子搗為末以豬脂調塗於禿處佳又方貫眾燒灰細研油調敷又方麻子一升熬黑壓取脂敷頭上良又方鹽湯洗過生油和蒲葦灰敷之雁脂熊白桃葉汁皆可塗雞子黃熬取汁塗發黃巢氏云足少陰腎經其血氣華於發若血氣不足則不能潤悅於發故發黃也錢氏曰小兒長大不行行則腳細齒久不生生則不固發久不生生則不黑皆屬氣血虛也宜大劑補之千金冀發黃方臘月豬脂和羊屎灰蒲灰等分敷之三日一為取黑止又方以醋煮大豆爛去豆煎令稠塗發又方熊脂塗髮梳之散頭床底伏地一食頃即出形盡當黑用之不過一升安師傳治小兒發黃極妙方破故紙不計多少銀石器中熳火炒熟為細末用地黃汁煎成膏和為丸綠豆大每服十五二十丸鹽湯送下食前齒齒痛清胃散治胃火牙痛或連頭面升麻五分生地黃牡丹皮黃連炒當歸各三分上水煎服加柴胡山梔即加味清胃散愚按前方治脾胃實火作渴口舌生瘡或唇口腫痛齒齦潰爛焮連頭面或惡寒發熱或重舌馬牙吐舌流涎等證子母並宜服之若因脾胃氣虛寒涼克伐或虛熱上行口舌生瘡弄舌發熱飲食少思或嘔吐困睡大便不實流涎齦爛者用五味異功散張渙藁本散治卒齒痛藁本白附子川芎莽草各半兩並搗羅為細末次用青黛蘆薈麝香各一錢研細上件都再研勻每用一字塗揩患處雄黃丸治小兒牙齒黑蛀氣息疼痛雄黃二錢麝香半錢上為細末軟飯和為梃子安在牙內齒縫出血外臺肘後用蚯蚓糞水和作團以火燒令極赤末之如粉以臘月豬脂和敷齒齦上日三即瘥茅先生治小兒牙宣齒縫出血方苦參末一兩白礬灰一錢上為末一日三次揩牙上立驗也張銳雞峰方治齒間血出上以苦竹葉不以多少水濃煎取汁入鹽少許寒溫得所含之冷即吐了又方上用童子小便半升分為三兩次含之冷即吐了莊氏麝香散治小兒唇口臭爛齒齦宣露麝香雄黃生蘆薈白龍骨各一錢密陀僧二錢石膽半兩生乾蟾一枚重半兩者入瓶燒存性上合研令極勻細先用綿子纏箸頭上以鹽礬漿水輕輕洗過然後上藥齒齦腫痛千金冀方生地黃獨活各三兩上二味切以酒漬一宿含之又方常以白鹽末封齒齦上日三夜二又方扣齒三百下日一夜二即終身不發至老不病齒又治齒牙根搖欲落方上以生地黃大者一寸綿裹著牙上嚼咽汁汁盡去之日三即愈可十日含之更不發也又齒根腫方松葉一握鹽一合好酒三升上三味煎取一升含之治齒根空腫痛困斃無聊賴方獨活四兩酒三升上二味於器中漬之煻火煨之令暖稍稍沸得半去滓熱含之不過四五度又方燒松柏槐枝令熱柱病齒孔須臾蟲綠枝出又治牙齦疼痛方杏仁一百枚去皮尖及雙仁者鹽末方寸匕上二味以水一升煮令沫出含之味盡吐卻更含不過再三瘥養生必用治小兒牙方牛蒡子炒香一分乳香一錢上為末入白麵少許溫水調塗又方用大硼砂研細水化雞羽掃齲齒巢氏云手陽明足太陽之脈併入於齒風氣入其經脈與血氣相搏齒即腫痛膿汁出謂之風齲千金翼治齒齲方上切白馬懸蹄可孔塞之不過三度聖惠方用夜眼聖惠蝦蟆散治小兒齒痛風齲連腮微腫干蝦蟆一枚青黛細研柑子皮細辛白雞糞薰黃以上各一分麝香細研乾薑炮裂銼各半分上件藥搗細羅為散都研令勻以薄綿裹少許納齲齒孔中日一易之又方白附子藁本細辛芎藭莽草以上各一兩上件藥搗細羅為散以薄綿裹少許著齲齒上治小兒齲齒風疼及蟲蝕疼痛方干蝦蟆一枚燒灰青黛一分蘆薈半分上件藥同研令細以生地黃熬作膏塗於齒上治小兒風齲齒痛及蟲蝕疼痛黑爛方青黛細研雞糞白燒灰藁本細辛雄黃細研各一分麝香少許細研上件藥搗羅令細同研令勻旋取少許敷於齒上又方以郁李根白皮五兩銼以水一大盞半煎取一盞熱含冷吐之當吐蟲出又方以皂莢炙去皮子搗末取少許著齒痛上瘥又方以松柏脂捏銳如錐柱齲孔內須臾齲蟲緣松脂出即瘥又方以雞舌香半兩以水一中盞煎至六分去滓熱含冷吐蚛齒千金翼治蟲蝕齒疼痛方上閉氣細書曰南方赤頭蟲飛來入某姓名裂齒里今得蠍蟲孔安置耐居上急急如律令小箋紙內著屋柱北邊蠍蟲孔中取水一杯禹步如禁法還誦上文以水沃孔以淨黃土泥之勿令泄氣永愈又治蟲蝕齒根肉黑方上燒腐棘取瀦塗之十遍雄黃末敷即愈若齒黑者以松木灰揩之細末雄黃塗齦百日日再塗之七日慎油豬肉神效又治齒蚛方上以檐一枚令病人蹲坐橫檐於膝上引兩手尋使極住手伸中指灸中指頭檐上三壯兩頭一時下火病人口誦咒曰啖牙蟲名字鶻莫啖牙莫啖骨灸人亦念之又治裂齒方上以腐棘針二百枚以水二升煮取一升含漱之日四五瘥止又方取死曲蟮末敷痛處即止日華子治小兒風蚛牙方上濃煎郁李仁水含之聚寶黃龍散治齒齦疳蝕有竅子不合者龍實龍骨中有之深黃或淡黃土蠍色緊掬人舌者是白礬灰蝸牛殼南粉牛黃各一錢上五味為末每用少許貼竅子內時時用之齒落久不生千金方上以牛屎中大豆二七枚小開豆頭以注齒根處數度即生經驗方治小兒大人多年牙齒不生上用黑豆三十粒牛糞火內燒令煙盡細研入麝香少許一處研勻先以針挑不生齒處令血出用末少許揩不得見風忌酸鹹物聖惠治齒落久不生方上取路旁遺卻稻粒於齒落處點三七下其齒自生神效靈苑治大人小兒生齒神驗方上用雄雌雞糞各十四顆焙乾同研如粉入麝香少許仍先以針挑破損齒腳下血出將散子敷之年高者不過二十日生年少者十日不計傷損及少自退落並再生頰車蹉閃千金治失欠頰車蹉閃不合方上用一人以手指牽其頤以漸推之則復入矣推當疾出指恐誤齧傷人指也又方消蠟和水敷之又方治牙車急口眼根引舌不轉方牡蠣熬伏龍肝附子炮去皮礬石燒上四味等分末之以白酒和為泥敷其上干則易之取瘥止千金灸法失欠頰車蹉灸背第五椎一日二七壯滿三日未瘥灸氣衝二百壯胸前喉下甲骨中是亦名氣堂又灸足內踝上三寸宛宛中或三寸五分百壯三報此三陰交穴也耳張渙小兒耳中諸病由風入於腦停積於手太陽之脈則令耳聾風與濕相搏則兩耳生瘡又兒稍大見月初生以手指之則耳下生瘡者名月蝕瘡又乳母與兒洗浴誤令水入耳中水濕停積搏於血氣蘊結成膿謂之聤耳薛耳者心腎之竅肝膽之經也心腎主內症精血不足肝膽主外證風熱有餘或聾聵或虛鳴者稟賦虛也或脹痛或膿癢者邪氣客也稟賦不足宜用六味地黃丸腎肝經風熱宜用柴胡清肝散若因血燥用梔子清肝散發熱未應佐以六味丸間服九味蘆薈丸疳若因腎肝疳熱朝用六味丸夕用蘆薈丸若因食積內熱用四味肥兒丸疳若因乳母膏粱積熱而致者宜加味清胃散齒痛脾經鬱結而致者加味歸脾湯驚悸肝經怒火而致者加味逍遙散虛熱皆令乳母服之兼與其兒少許不可專於治外不惟閉塞耳竅抑亦變生他證延留日久遂成終身之聵矣慎之寶鑑歌云太陽入耳損聽聰氣滯時多耳必聾鳴是風並氣相系痛應腦戶有邪風腎熱鬱蒸聤耳患日深疼痛出稠膿不有稠膿非此患只因滴水入其中耳聾巢氏云手太陽之經入於耳內頭腦有風入乘其脈與氣相搏故令耳聾聖惠治小兒風熱兩耳聾鳴方遠志去心甘草炙微赤銼柴胡去苗菖蒲各一分磁石三分搗碎水淘去赤汁麥門冬去心焙半兩上搗細羅為散每服以蔥白湯調下半錢日二服量兒大小以意加減張渙通鳴散治耳聾菖蒲一寸九節者遠志去心各一兩柴胡去苗麥門冬去心防風各半兩細辛甜葶藶各一分以上搗羅併為細末次入磁石一分搗碎水淘去赤汁杏仁二七個湯浸去皮尖研上件都研勻每服半錢煎蔥白湯調下日二乳後聖惠細辛膏治小兒耳聾或因腦熱或因水入或因吹著並宜用此細辛防風去蘆頭川大黃銼微炒黃芩各一分川椒去目十粒蠟半兩上件藥細銼用清麻油三合煎藥紫色濾過下蠟候消為膏每日三度用一大豆大點於耳中聖惠治小兒耳聾不瘥方甜葶藶杏仁湯浸去皮鹽各等分上件藥搗研如膏以少許豬脂和合煎令稠以綿裹如蕤核大塞耳中日一易之又方松脂菖蒲末烏油麻各半兩上件藥相和搗熟綿裹如一紅豆大塞耳日一易又方菖蒲末一分杏仁湯浸去皮尖研如泥半兩上相和研令乳入每用少許綿裹內耳中日一易又方上取蔥白於煻灰中煨令熟以蔥白頭納耳中日三易又方蓖麻子去皮十枚棗肉七枚同搗如膏每取蕤核大綿裹少許塞耳中日一易又方上搗芥子令爛以人乳和綿裹少許塞耳中日一易之麝香散治沉耳麝香少許白礬一錢火煅五倍子二錢上件為末紙捻子點入耳中少許耳鳴巢氏云邪氣與正氣相搏故令耳鳴久即邪氣停滯遂成聾也菖烏散治小兒耳自鳴日夜不止菖蒲烏頭炒各四分上為末綿裹內耳中日再耳中痛千金翼治耳疼痛方附子炮去皮菖蒲上二味等分裹塞之耳瘡證治見心部瘡瘍條聤耳巢氏云耳宗脈之所聚腎氣之所通小兒腎臟盛而有熱者熱氣上衝於耳津液壅結即生膿汁亦有因沐浴水入耳內而不傾瀝令盡水濕停積搏於血氣蘊結成熱亦令膿汁出皆為之聤耳久不瘥即變成聾也張渙紅藍花散治聤耳久不瘥紅藍花洗焙乾黃柏銼各一兩烏魚骨黃芩各半兩以上搗羅為細末吹用雄黃水磨細研半兩麝香一分研細上件都研勻細以綿纏搵藥塞耳中日再換田氏紅玉散治小兒膿耳枯白礬干胭脂麝香各一錢上同研勻先以綿裹杖子捻淨摻之湯氏龍黃散治小兒停耳汁出不止枯白礬龍骨末黃丹炒各半兩麝香一錢上同研細先以綿杖子搌膿水盡用散一字半分為兩處吹入耳內日二次丹停耳硫黃末敷之日一夜一妙秘要用蛐蟮灰末吹入立效有瘡者敷之孫真人方同薛氏云諸外治方但可治腑證之輕者若系肝經風熱血燥等證必依前方論內服合宜之藥外用此以收膿濕亦無不可若專泥攻而失內治誤矣百蟲入耳詳見雜病準繩五軟五軟者頭軟項軟手軟腳軟肌肉軟口軟是也無故不舉頭腎疳之病項脈軟而難收治雖暫瘥他年必再發手軟則手垂四肢無力亦懶抬眉若得聲圓還進飲食乃慢脾風候也尚堪醫治肌肉軟則肉少皮寬自離吃食不長肌肉可服錢氏橘連丸虛羸莫教瀉利頻並卻難治療腳軟者五歲兒不能行虛羸腳軟細小不妨榮衛但服參耆等藥並服錢氏地黃丸腎長大自然肌肉充滿口軟則虛舌出口陽盛更須堤防必須治膈卻無妨唇青氣喘則難調治也薛夫頭軟者臟腑骨脈皆虛諸陽之氣不足也乃天柱骨弱腎主骨足少陰太陽經虛也手足軟者脾主四肢乃中州之氣不足不能營養四肢故肉少皮寬飲食不為肌膚也口軟者口為脾之竅上下齦屬手足陽明陽明主胃脾胃氣虛舌不能藏而常舒出也夫心主血肝主筋脾主肉肺主氣腎主骨此五者皆因稟五臟之氣虛弱不能滋養充達故骨脈不強肢體痿弱原其要總歸於胃蓋胃水穀之海為五臟之本六腑之大源也治法必先以脾胃為主俱用補中益氣湯以滋化源頭項手足三軟兼服地黃丸凡此證必須多服二藥仍令壯年乳母飲之兼慎風寒調飲食多能全形曾戴氏論五軟證名曰胎怯良由父精不足母血素衰而得誠哉是言以愚推之有因母血海久冷用藥強補有孕者有受胎而母多疾者或其父好色貪酒氣體虛弱或年事已邁而後見子有日月不足而生者或投墮胎之劑不去而竟成孕者徒爾耗傷真氣苟或有生譬諸陰地淺土之草雖有發生而暢茂者少又如培植樹木動搖其根而成者鮮矣由是論之嬰孩怯弱不耐寒暑縱使成人亦多有疾爰自降生之後精髓不充筋骨痿弱肌肉虛瘦神色昏慢才為六淫所侵便致頭項手足身軟是名五軟治法用調元散補腎地黃丸漸次調養日久乃安若投藥不效亦為廢人有小兒體肥容壯不為瘦瘁忽然項軟傾倒此名下竄皆因肝腎氣虛客邪侵襲風府傳於筋骨故成斯疾蓋肝主乎筋腎主乎骨筋骨俱弱則項軟垂下無力又名天柱倒與五軟相類不遠治同前藥吳江史萬湖子七歲患吐瀉囟目頓陷天柱骨倒兼面赤色先用補中益氣湯加附子一劑吐瀉止而諸證愈又用錢氏地黃丸料煎服頓安一小兒七歲夏間過食生冷之物早間患吐瀉面赤作渴手足並熱項軟囟陷午後面色頓白手足並冷脈微欲絕急以六君子湯加附子一劑諸證頓退囟頂頓起而安小兒元氣易虛易實故雖危證若能速用對病之藥亦可回生者一小兒九歲因吐瀉後項軟面白手足並冷脈微細飲食喜熱余先用六君子湯加肉桂五劑未應更加炮姜四劑諸證稍愈面色未復尺脈未起佐以八味丸月餘面色微黃稍有胃氣矣再用前藥又月餘飲食略增熱亦大減乃朝用補中益氣湯食前用八味丸又月餘元氣漸復飲食舉首如常又月餘而肌肉充盛諸病悉愈一小兒十二歲瘧疾後項軟手足冷飲食少思粥湯稍離火食之即腹中覺冷用六君子湯加肉桂乾薑飲食漸加每飲食中加茴香胡椒之類月餘粥食稍可離火又用前藥百劑飲食如常手足不冷又月餘其首能舉後飲食停滯患吐瀉項仍痿軟朝用補中益氣湯夕用六君子湯及加減八味丸兩月餘而項復舉畢姻後眼目昏花項骨無力頭自覺大用八味丸補中益氣湯三月餘元氣復而諸證退後每入房勞役形氣殊倦盜汗發熱服後二藥即愈一小兒十五歲手足痿軟齒不能嚼堅物內熱晡熱小便澀滯如淋服分利之劑小便如淋服滋陰之劑內熱益甚服燥濕之劑大便重墜余謂此稟腎氣不足早犯色欲所致故精血篇云男子精未滿而御女以通其精五臟有不滿之處異日有難狀之疾老人陰已痿而思色以降其精則精不出而內敗小便澀痛如淋若陰已耗而復竭之則大小便牽痛愈痛則愈便愈便則愈痛正謂此也遂朝用補中益氣湯夕用六味丸加五味子煎服各三十餘劑諸證漸愈後夢遺諸證復作手足時冷痰氣上急用十全大補湯加減八味丸料各八劑二便稍利手足稍溫仍用前二藥三月餘元氣漸復飲食如常又飲食停滯吐瀉腹痛按之不疼此脾胃受傷也用六君子湯加木香肉豆蔻治之其吐未已左尺右關二脈輕診浮大按之如無經云腎開竅於二陰用五味子散四服大便頓止後又傷食咽酸作瀉大便重墜朝用補中益氣湯夕用六君子湯加木香乾薑而痊一老年得子四肢痿軟而惡風寒見日則喜余令乳母日服加減八味丸三次十全大補湯一劑兼與其子年餘肢體漸強至二周而能行一小兒五歲稟父腿軟不便於行早喪天真年至十七畢姻後腿軟頭囟自覺開大喜其自謹寓居道舍遂朝服補中益氣湯夕用地黃丸料加五味子鹿茸煎服年餘而健一小兒項軟服前二藥而愈畢姻後患解顱作渴發熱以二藥作大劑煎熟代茶恣飲兩月餘而渴熱減年餘而顱囟合又年餘而肢體強若非慎疾雖藥不起天柱倒王先生云小兒久患疳疾體虛久不進飲食患來日久諸候退只是天柱骨倒醫者不識謂之五軟候須進金靈散生筋散形證論歌天柱才倒道難醫算來此病非心脾若患先須因吐瀉不曾調氣至尫羸大患傷寒無汗脈鳳髓經此一句云卻被傷寒無浮脈定應妙藥療他遲無此卒然生此患又兼不辨四肢肥身軟難堪頭似石面紅唇赤臉如緋此病多應傷腎熱後來因熱病相隨此兩句在鳳髓經即云此患只應傷膽熱後來伏熱又相隨肝受熱風天柱倒但將涼藥與維持貼須性熱筋方緩立見溫和請莫疑吐瀉項軟唯調氣傷寒柱倒不須醫此或傷寒或吐或瀉乘虛邪毒透入肝脈熱邪所侵是致令筋軟長或手足軟而不解舉或項頸軟而不解舉若有前證即須涼膈若吐瀉則先調胃氣貼項並服涼肝膽藥不可太熱亦恐過冷金靈散上用白殭蠶不拘多少直者去絲炒為末每服半錢一錢薄荷酒調下一日三服更須用生筋散貼之生筋散木鱉子三個蓖麻子三十個上各取肉同研每用一錢許津唾調貼急抱揩項上令熱貼之四十八候貼項藥方川烏頭白芷地龍五靈脂赤小豆各等分上末生薑自然汁與酒同調貼在項上更服竹茹散竹茹散菊花三錢黃芩人參各一錢大黃半兩甘草二錢上為末竹葉煎湯下三十六種貼項藥方草烏頭赤小豆各等分上為末薑汁調攤帛子上貼經宿項立起貼頭起項膏吉氏治小兒肝熱膽冷頭項軟倒川烏末肉桂末蕓薹子天南星蓖麻子各一錢黃丹炒一錢匕上大蒜一頭煨熟去皮乳缽內研和藥細每用一錢入米醋和勻貼項上一日許狼毒丸吉氏治小兒膽熱肝風天柱倒折宜服此藥更用前起頭貼項藥狼毒酒浸焙白附子大附子尖天麻防風羌活以上各一分硃砂地龍去土各一錢麝香半字上為細末法酒煮糊為丸如小豆大每服七丸至十五丸用黑豆薄荷湯入酒一滴吞下五硬五硬者仰頭取氣難以動搖氣壅作痛連於胸膈腳手心冷而硬此陽氣不營於四末也經曰脾主四肢又曰脾主諸陰今手足冷而硬者獨陰無陽也故難治若肚筋青急者木乘土位也急用六君子湯加炮薑肉桂柴胡升麻以復其真氣若系風邪當參驚風治之此證從肝脾二臟受患當補脾平肝仍參急慢驚風門治之百問云如審系風證依中風治之必有回生之理小續命湯加減小續命湯治中風不省人事涎鳴反張失音厥冷麻黃去節人參黃芩川芎芍藥甘草炙杏仁去皮尖炒漢防己官桂去皮各半兩防風七錢半附子炮去皮臍七錢半上除附子杏仁外搗為粗末次入二味夾和每一錢薑棗煎食前服有熱去附子官桂減半經云諸暴強直皆屬於風故收此方非的風證勿用寒熱往來凡寒熱往來無定期其有定期者瘧也巢氏曰風邪外客於皮膚而痰飲內漬於腑臟致令血氣不和陰陽更相乘克陽勝則熱陰勝則寒陰陽之氣為邪所乘邪與正相干陰陽交爭時發時止則寒熱往來也全生指迷論曰若其人翕翕如熱淅淅如寒無有時度支節如解手足痠疼頭目昏暈此由榮衛虛弱外為風邪相乘搏於陽則發熱搏於陰則發寒久不治成勞宜荊芥散又曰若寒熱如瘧不以時度腸滿膨脝起則頭暈大便不通或時腹痛胸膈痞悶此由宿谷停留不化結於腸間氣道不舒陰陽交亂宜備急丸經曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒寒熱往來此乃陰陽相勝也故寒氣並於陰則發寒陽氣並於陽則發熱寸口脈微為陽不足陰氣上入陽中則惡寒尺脈弱為陰不足陽氣下入陰中則發熱陽不足則先寒後熱陰不足則先熱後寒陰陽不歸其分則寒熱交爭也又上盛則發熱下盛則發寒陽盛則乍熱陰盛則乍寒陰陽相勝虛實不調故邪氣更作而寒熱往來或乍寒乍熱也少陽膽者肝之府界乎太陽陽明之間半表半裡之分陰陽之氣易於相乘故寒熱多主肝膽經證以小柴胡湯加減調之若只見寒熱起居如常久而不愈及大病後元氣未復悉屬陰虛生熱陽虛生寒宜用八珍湯虛羸補之甚者十全大補湯汗有食積為病亦令寒熱用保和丸宿食消之若兼嘔吐泄瀉用六君子湯吐瀉厥冷飲熱人參理中丸瀉作渴不止七味白朮散渴食積既消而寒熱尚作者肝邪乘脾所勝侮所不勝也用異功散吐瀉加柴胡山梔其瘧證寒熱詳見瘧門湯食積寒熱如瘧渴瀉氣急要合地臥此候先當取下積只用平胃散次常服進食丸平胃散見不乳食進食丸見積錢曹宜德子三歲面黃時發寒熱不欲食而飲水及乳不止眾醫以為潮熱用牛黃丸不愈及以止渴乾葛散服之反吐錢曰當以白餅子下之後補脾乃以消積丸磨之此乃解也後果愈何以故不食但飲水者食伏於脾內不能消化致令發寒熱用止渴藥吐者藥沖脾故也故下之即愈子和高巡檢子八歲病熱醫者皆為傷冷治之以熱藥欲飲冰水禁而不與內水涸竭煩躁轉生前後皆閉口鼻俱干寒熱往來咳嗽時作遍身無汗又欲灸之適遇戴人戴人責其母曰重裀厚被暖炕紅爐兒已不勝其熱尚可灸乎其母謝以不明戴人令先服人參柴胡飲子遂連進數服下爛魚腸之類臭氣異常渴欲飲水聽其所欲冰雪冷水連進數杯節次又下三四十行大熱方去又與通膈丸牛黃丸復下十餘行兒方大痊前後約五十餘行略計所用冰雪水飲計一斛向灸之當何如哉太醫局小柴胡湯治大人小兒傷寒溫熱病身熱惡風頸項強急胸滿脅痛嘔噦煩渴寒熱往來身面皆黃小便不利大便秘硬或過經未解或潮熱不除及瘥後勞復發熱頭痛婦人傷風頭痛煩熱經血適斷寒熱如瘧發作有時及產後傷風頭痛煩熱並宜服之柴胡去蘆頭秤半斤黃芩人參去蘆頭秤甘草炙各三兩半夏湯洗七次焙乾秤二兩半上五味同為粗末每服三大錢以水一盞半入生薑五片棗一枚擘破同煎至七分濾去滓稍熱服不拘時小兒分作二服更量大小加減張渙秦艽湯治小兒寒熱往來秦艽去苗鱉甲醋炙微黃去裙襴各一兩川大黃銼碎微炒麻黃去根節各半兩竹茹甘草炙各一分上件搗羅為粗散每服一錢水一盞入蔥白二寸同煎至五分去滓溫服量兒大小加減人參前胡散人參去蘆頭前胡柴胡去苗各一兩桔梗地骨皮甘草炙半夏湯洗七遍焙乾各半兩上件搗羅為細末每服一大錢水一小盞入生薑二片煎至半盞去滓放溫服量兒大小加減芍藥湯赤芍藥一兩黃芩當歸銼