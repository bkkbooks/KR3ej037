下為經水小兒飲交乳且病況其大分已榮於胎而乳汁之漓可知能無使兒病乎則又何鬼神之咎為也千金炙伏翼熟嚼哺兒而懷妊者帶伯勞鳥毛白馬眼不能滋榮氣血乃徒剝裂禽獸海藏云生者為相繼死者為傳屍有脈而無氣謂之屍厥有氣而無脈謂之行屍丁奚露哺客忤無辜四異病也陽易陰易百合狐惑四奇病也龍膽湯治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣吐哯者若已能進哺中滿食不消壯熱及變蒸不解中客人鬼氣並諸驚癇方悉主之龍膽草柴胡黃芩桔梗釣藤皮甘草炙茯苓芍藥各二錢半蜣螂二枚大黃一兩上為銼散以水一升煮取五合為一劑十歲以下小兒皆可服若兒生一日至七日分一合為三服八日至十五日分一合半為三服十六日至二十日分二合為三服二十日至三十日分三合為三服皆以得下為止此劑為出腹嬰兒所作若日月長大者亦依此為例必知客忤及有鬾氣者可加人參當歸各二錢半一百日兒加一錢一字二百日兒加二錢半一歲加半兩余藥皆仿此聖惠甘草散治小兒中鬾面色白赤而復變青者如醉色故復發作面赤若青黑色繞口不治覺病候晚者死覺之早者所中邪氣未入臟腑又微引乳者可服此甘草炙微赤銼龍骨赤茯苓牡蠣燒為粉生乾地黃黃芩桂心各一分當歸半兩銼微炒上件藥搗粗羅為散每服一錢以水一小盞入淡竹葉七片煎至五分去滓入白蜜一錢更煎一兩沸量兒大小以意加減溫服日三四服大黃丸治小兒中鬾挾實川大黃銼碎微炒白蘚皮甘草炙微赤各半兩犀角屑黃芩赤茯苓赤芍藥各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小加減日三四服張渙虎骨丹治被鬾病虎頭骨微炙鬼臼去毛草龍膽鬼箭各一兩琥珀白膠香各半兩上件搗羅為細末煉蜜和丸如黍米大每服十粒乳香湯下量兒大小加減客忤巢氏云小兒中客忤者是小兒神氣軟弱忽有非常之物或未經識見之人觸之與兒神氣相忤而發病謂之客忤也亦名中客又名中人其狀吐下青黃白色水穀解離腹痛反倒天矯面變易五色其狀似癇但眼不上插耳其脈弦急數者是也若失時不治久則難治若乳母飲酒過度醉及房勞喘後乳者最劇能殺兒也其脈急數者宜與龍膽湯下之加人參當歸各如龍膽秤分等多少也千金論少小所以有客忤病者是外人來氣息忤之一名中人是為客忤也雖是家人或別房異戶雖是乳母及父母或從外還衣服經履鬼神粗惡暴氣或牛馬之氣皆為忤也執作喘息乳氣未定者皆為客忤凡小兒衣布帛綿中不得有頭髮履中亦爾白衣青帶青衣白帶皆令中忤凡非常人及諸物從外來亦驚小兒致病欲防之法諸有從外來人及異物入戶當將兒避之勿令見若不避者燒牛屎令常有煙氣置戶前則善小兒中客為病者無時不有此病也而秋初一切兒皆病者豈一切兒悉中客邪幼兒所以春冬少病秋夏多病者秋夏小兒陽氣在外血脈嫩弱秋初夏末晨夕時有暴冷小兒嫩弱其外則易傷暴冷折其陽陽結則壯熱胃冷則下痢故夏末秋初小兒多壯熱而下痢未必悉是中客及鬾也若治少小法夏末秋初宜候天氣溫涼有暴寒卒冷者其少小則多患壯熱而下痢也慎不可先下之皆先殺毒後下之耳小兒中客急視其口中懸癰左右當有青黑腫脈核如麻豆大或赤或白或青如此便宜用針速剌潰去之亦可爪摘決之並以綿纏釵頭拭去血也少小中客之病吐下青黃赤白汁腹中痛及反倒偃側喘似癇狀但目不上插少睡耳面變五色其脈弦急若失時不治小久則難治矣欲療之方用豉數合水拌令濕搗熟丸如雞子大以摩兒囟上足心各五六遍畢以丸摩兒心及臍上下行轉摩之食頃破視其中當有細毛即擲丸道中痛即止真珠散治客忤驚風鬼疰驚邪痰熱心舍不寧精神不定心常怔忡睡中驚跳時或咬牙五心煩熱有汗兼喘面赤舌白呵欠煩渴小便赤瀉或吐利黃沫常服辟邪安神真珠海螵蛸滑石各一錢白茯苓人參白附子甘草炙全蠍麝香腦子另研各五錢生珠另研一錢金箔三十片銀箔二十片上末和勻半錢煎燈心麥門冬湯入蜜少許調服日午臨臥各一譚氏殊聖治客忤方忽爾連連哭不休渾身壯熱脈如鉤驚啼不得冤神鬼客忤傷心不自由犀角雄黃相共搗桃符煎水看稀稠人參茯苓車前子丸吃三服請不憂安神丸生犀末半錢雄黃研人參茯苓車前子各一分上為末取桃白皮一兩桃符一兩二味以水三升同煎至一升去滓更煎成膏和前藥丸如麻子大每服三丸芍藥湯下又方小兒哽氣築心連喘息多愁胃口涎唯有此疾宜早治為緣客忤氣相煎看看病狀醫難效速取真珠散半錢龍腦生犀香附子小兒餐了保身安真珠散真珠末四錢生犀末二錢香附子末一錢龍腦半字上同研每服一字桃仁湯調下乳母忌生冷油膩一切毒物半月張渙辟邪膏嬰兒血氣未實皆神氣軟弱除父母及乳養之常照管外不可令見生人及抱往別房異戶及不可見牛馬獸畜等其父母家人之類自外及寅夜行歸家亦不可見兒恐經履鬼神粗惡暴氣若犯人令兒吐下青黃赤白水穀解離其狀似發癇者但眼不上戴脈不弦急名曰客忤凡斷乳小兒亦有中惡卒暴者亦宜服此藥立至蘇省降真香銼白膠香沉香虎頭骨微炒鬼臼去毛草龍膽人參白茯苓上件各半兩搗羅為細末次入水磨雄黃半兩細研水飛次研麝香一錢都拌勻煉蜜和如雞頭大每服一粒煎乳香湯化下及別丸如彈子大用綠絹袋子盛令兒衣服上帶之仍臥內常燒神妙田客忤因而驚忤者治法用灶中黃土研二兩雞子一枚去殼二件相和入少許水調先以桃柳枝湯浴兒後將此藥塗五心及頂門上陳無擇法用灶中黃土蚯蚓屎等分如此法塗之治卒客忤噤口不能言細辛桂心等分納口中效元和紀用經療小兒客忤搗菖蒲汁納口中又生艾汁納口中又磨刀水三四滴妙又用好墨搗篩和水溫服半錢匕中人忤茅先生小兒生下犯人噤候面青黑合兩眼閉吐逆不下乳此候因生下來不免外人看問或有腋氣或因婦人月假不淨或外人帶邪神觸著生下來夾故乳哺使觸異氣之物氣血未就又被風邪擊致此所治者先用硃砂膏方見驚積門中乳上吮下後用鎮心丸驚夾腥脾散不乳食與服即愈如見不下乳眼視肚硬死候大凡初生下兒子家中人不見不可便與外人入房看問人家各有神只又恐婦人腋氣及月假不淨觸著恐中客忤此即是養兒之法千金方剪取驢前膊胛上旋毛大如彈子大以乳汁煎之令毛消藥成著乳頭上飲之下喉即愈又燒母衣帶三寸併發合乳汁服之又取牛鼻津服之又取牛口沫敷乳頭飲之治少小見人來不佳腹中作聲者三物燒發散方用向來者人囟上發十莖斷兒衣帶少許合燒灰細末和乳飲兒即愈中馬忤千金論曰凡諸乘馬行得馬汗氣臭未盥洗易衣裝而便向兒邊令兒中馬客忤兒卒見馬來及聞馬鳴驚及馬上衣物馬氣皆令小兒中馬客忤慎護之特重一歲兒也其狀腹痛吐下青黃白色水穀解離甚者致夭千金治小兒中馬客忤法中客中人皆可用用粉為丸如豉法摩兒手足心及心頭臍上下行轉摩之咒曰摩家公摩家母摩家子兒苦客忤從我始扁鵲雖良不如善唾良咒訖棄丸道中又法取一刀橫灶上解兒衣發其心腹訖翼發作撥取刀持向兒咒之唾輒以刀擬向心腹啡啡音非出唾貌煌煌日出東方背陰向陽葛公葛公不知何公冀云葛公葛母不知何公子來不視去不顧過與生人忤梁上塵天之神戶下土鬼所經大刀環犀對灶君二七唾客愈兒驚唾啡啡每唾以刀擬之咒當三遍乃畢用豉丸亦如上法五六遍訖取此丸破視其中有毛棄丸道中人馬客忤即愈矣簡要濟眾治小兒中馬毒客忤取馬尾於兒面前燒令兒咽煙氣日燒之瘥為度又方取馬口角沫塗兒口中效中惡巢氏云小兒中惡者是鬼邪之氣卒中於人也無問大小若陰陽順理榮衛平調神守強則邪不干正若精氣衰弱則鬼毒惡氣中之其狀先無他病卒然心腹刺痛悶亂欲死是也凡中惡腹大而滿脈緊大而浮者死緊細而微者生余勢不盡停滯臟腑之間更發後變為疰也治法先下蘇合香丸未醒以皂角末搐鼻次服沉香降氣湯加人參茯苓又能辟邪客忤亦宜服蘇合香丸治傳屍骨蒸諸項勞瘵順氣化痰卒暴心痛鬼魅瘧疾霍亂吐瀉赤白下痢小兒驚搐蘇合香油五錢入安息香膏內安息香一兩另為末用無灰酒半升熬膏丁香青木香白檀香沉香蓽茇香附米訶子煨取肉烏犀鎊屑硃砂研水飛各一兩薰陸香片腦研各五錢麝香七錢半上為細末用安息香膏入煉蜜和劑丸如芡實大空心用沸湯化下小兒一丸老人四丸酒下亦可用蠟紙裹一丸彈子大用緋絹袋盛常帶之一切邪神不敢近去腦名麝香蘇合丸治一切邪神及胸膈噎塞腸中虛鳴宿食不消餘證並同沉香降氣湯降真香沉香白膠香虎脛骨酥炙人參鬼箭草龍膽各五錢上為末次入雄黃五錢麝香一錢煉蜜丸乳香湯化下又令兒帶及燒臥內尤妙葛氏肘後救卒死或先病痛或常居寢臥奄忽而絕皆是中惡救之方上取蔥黃心刺其鼻男左女右入七八寸小兒量度之若使目中血出佳扁鵲法同是後吹耳條中葛言此云刺鼻故別為一法又方上令二人以衣壅口吹其兩耳極則易人可以筒吹之並捧其肩上側身遠之莫臨死人上又方上以蔥葉刺耳耳中鼻中血出者莫怪無血難治有血是候時當捧兩手忽放之須臾死人目當舉手撈人言痛乃止又男刺左鼻女刺右鼻中令入七八寸余大效小兒量度之亦治自縊死此與扁鵲方同又方上以綿漬好酒中須臾置死人鼻中手按令汁入鼻中並持其手足莫令驚又方上視其上唇裡弦有白如黍米大以針決去之又方上以小便灌其面數回即能語此扁鵲法也又方上末皂莢如大豆吹其兩鼻中嚏則氣通矣又方上割雄雞頸取血以塗其面干復塗並以灰營死人一周又方以管吹下部令數人互吹之氣通則活千金治卒忤方此病即今人所謂中惡者與卒死鬼擊亦相類為治皆參取而用之上鹽八合以水三升煮取一升半二服得吐即愈備急方云治鬼擊若小便不通筆頭七枚燒作灰末和服之即通聖惠桃奴散治小兒中惡心腹堅脹疼痛顏色青黑大便不通桃奴五枚甘草一分炙微赤銼麝香細研一錢杏仁二十枚湯浸去皮尖雙仁麩炒微黃桔梗去蘆頭赤芍藥黃芩柴胡去苗川升麻川大黃銼微炒鬼臼去毛各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服以利為度量兒大小心意加減聖惠鬼箭羽散治小兒中惡心堅強卒痛欲困鬼箭羽真珠末各一分羚羊角屑桔梗去蘆頭川朴硝川升麻赤芍藥柴胡去苗黃芩各半兩桃仁十枚湯浸去皮尖雙仁麩炒微黃川大黃一兩銼微炒上制服法同前聖惠雄黃丸治小兒中惡心痛闢除邪氣雄黃細研真珠末各半兩麝香牛黃各細研一錢巴豆二十粒去皮膜心研紙裹壓出油上件藥都研令勻入棗瓤及煉蜜和丸如粟米大每服以薄荷湯下三丸量兒大小加減服之嬰孺鬼箭羽湯治小兒中惡心腹堅強卒痛欲困鬼箭羽三分硃砂一分羚羊角屑桔梗鬼臼朴硝湯成下各半分升麻芍藥柴胡各五分黃芩六分大黃八分桃仁四十九個炒去皮尖上以水四升煮一升二合二歲兒為四分更量兒大小與服之葛氏肘後灸法以繩圍其死人肘腕男左女右畢伸繩從背上大椎度以下又從此灸橫行各半繩此法三灸各三即起又令爪其病人人中取醒不起者卷其手灸下文頭隨年壯又灸鼻中三壯也又灸頤下宛宛中名承漿穴十壯大效又灸兩足大指爪甲聚毛中七壯此華陀法一云三七壯又灸臍中百壯也卒死巢氏云小兒卒死者是三虛而遇賊風故無病倉卒而死也三虛者乘年之衰一也逢月之空二也失時之和三也有人因此三虛復為賊風所傷使陰氣偏竭於內陽氣阻隔於外而氣壅閉陰陽不通故暴絕而死也若腑臟未竭良久乃蘇亦有兼挾鬼神氣者皆須邪退乃生也凡中客忤及中惡卒死而邪氣不盡停蓄心腹久乃發動多變成疰也茅先生卒死候眼合嚌齒遍身如綿軟面青黑口鼻冷此候因本生下而遍身熱或因有驚患醫人一向退熱不曾下得驚積及奶積遂積聚被邪氣至此上前件三個候都來一般只是要辨元初受患根源治之急下奪命散與吐下風涎醒後便下勻氣散二服補除後下硃砂膏鎮心丸與服如有伏熱來時即下大附散與調理二三日安樂前件三個形候只是此一般調理上件疾見鴉聲上啼偏搐汗如珠不得睡眼障淚出死候不治金匱要略治小兒卒死而吐利不知是何病方上以馬屎一團絞取汁灌之無濕者水煮乾者取汁葛氏肘後救卒死而壯熱者上用礬石半斤水一升半煮消以漬腳令沒踝又方救卒死而目閉者上用騎牛臨面搗薤汁灌之耳中又方救卒死而四肢不收屎便者上取牛洞一升溫酒灌口中洞者稀糞也千金卒死無脈無他形候陰陽俱竭故也上用牽牛臨鼻上二百息牛舐必瘥牛不肯舐著鹽汁塗面上即牛肯舐又方上炙熨斗熨兩脅下備急方云又治屍厥治魘死不自覺者方上用慎燈火勿令人手動牽牛臨其上即覺若卒不能語取東門上雞頭末之以酒服治卒魘死方上搗韭汁灌鼻孔中劇者灌兩耳張仲景云灌口中治鬼不悟方上末伏龍肝吹鼻中又方上末皂莢如大豆許吹鼻中嚏則氣通起死人集驗方云治中惡聖惠治小兒卒死方上取女青末半錢用牛乳汁調服之又方上燒豶豬糞水解取汁服之又方上以苦參醋煮汁少許納口中即蘇水煮亦得又酒煮爛棺木板取汁服少許又方上煎鹽湯令極咸以物拗口開灌之令入腹即活又方以熱湯和灰厚擁身上逡巡即蘇嬰孺治小兒不知所病便死絕方上取雄雞冠臨兒口上割血滴入口下即活肘後灸法卒死而四肢不收屎便者灸心下一寸臍上三寸臍下四寸各一百壯兒小者隨年千金治卒死針間使各百餘息又灸鼻下人中一名鬼客廳肘後方云又治屍厥鬼持巢氏云小兒神氣軟弱精爽微羸而神魂被鬼所持錄其狀不覺有餘疾直爾痿黃多大啼喚口氣常臭是也嬰童寶鑑小兒鬼持歌云小兒氣弱命中衰魂魄多應被鬼持其候痿黃多哭地不須用藥可求師鬼氣歌云鬼氣皮膚里相傳臟腑間腫虛如水病瘛瘲似驚癇熱發渾身澀心攣痛所攢小兒還有此服藥急須看圖經治鬼持方上用虎睛爪並指骨毛以系小兒臂上辟惡鬼外臺深師五邪丸療邪狂鬼魅妄言狂走恍惚不識人此為鬼忤當得殺鬼丸方丹砂雄黃各別研龍骨馬目毒公鬼箭各五兩鬼臼二兩赤小豆三兩芫青一枚桃仁百枚去皮尖熬別研上九味搗下篩細絹篩合諸藥拌令勻調後納蠟和之大如彈丸絳囊盛之係臂男左女右小兒系頭合藥勿令婦人雞犬見之所服蜜和丸如梧子大一服三丸日三服忌五辛生血物疰病屍疰蠱疰巢氏云疰之言住也謂其風邪鬼氣留人身內也人無問大小若血氣虛衰則陰陽失守風邪鬼氣因而客之留住肌肉之間連滯腑臟之內或皮膚掣動遊易無常或心腹刺痛或體熱皮腫沉滯至死死又疰易旁人故為疰也小兒不能觸冒風邪多因乳母解脫之時不避溫涼暑濕或抱持出入早晚其神魂軟弱而為鬼氣所傷故病也千金治小兒疰方上用灶中灰鹽等分相和熬熨之千金太乙備急散主卒中惡客忤五屍入腹鬼刺鬼痱及中蠱疰吐血下血及心腹卒痛腹滿傷寒陰毒病六七日方雄黃芫花桂心各二兩丹砂蜀椒各一兩藜蘆巴豆各一分附子炮裂去皮臍五分野葛三分上九味巴豆別治如脂余合治下篩以巴豆合和更搗令勻調以銅器中密貯之勿泄有急疾水服一字匕可加至半錢匕老小半之痛在頭當鼻衄在膈上吐在膈下利在四肢當汗出此之所為如湯沃雪手下皆愈秘之非賢不傳千金治疰病相染易及霍亂中惡小兒客忤長病方獺肝一具雄黃莽草丹砂鬼臼犀角巴豆各一兩麝香二分大黃牛黃各一兩蜈蚣一條上十一味末之蜜丸空腹服如麻子大二丸加至三丸以知為度屍疰巢氏云屍疰者是五屍之中一屍疰也人無問小大腹內皆有屍蟲屍蟲為性忌惡多接引外邪共為患害小兒血氣衰弱者精神亦羸故屍疰因而為病其狀沉嘿不的知病之處或寒熱淋漓涉引歲月遂至於死死又疰易旁人故名之為屍疰也張渙論小兒亦有疰病與大人所病無異久後疰易旁人傳染骨肉如屍疰蠱毒之類是也外臺張仲景治大人小兒飛屍走馬湯方巴豆去心皮熬杏仁去皮尖各二枚上二味取綿纏捶令極碎投熱湯二合捻取白汁服之須臾瘥未瘥更一服老小量之通療鬼擊有屍疰者常蓄此藥用驗忌野豬肉蘆筍備急同聖惠木香散治小兒屍疰心腹滿脹疼痛不可忍木香鬼箭羽桔梗去蘆頭當歸銼微炒紫蘇莖葉各半兩檳榔三分上件藥搗羅為粗散每服一錢以水一小盞入生薑少許煎至五分去滓不計時候溫服更量兒大小加減服之犀角散治小兒屍疰及中惡諸病皆主之犀角屑川升麻木香川大黃銼碎微炒桑根白皮銼檳榔各半兩麝香一錢細研桃仁二七枚湯浸去皮尖雙仁麩炒微黃上件藥搗細羅為散每服以溫水調下半錢日四五服更量兒大小加減服之張渙雌黃丹治屍疰病雌黃雄黃各細研川大黃慢火炮黑鬼臼去毛各一兩桃仁三十個湯浸去皮尖研白頭翁半兩以上併為細末次用麝香一分另研巴豆十粒去皮心膜紙裹壓去油上件都研勻以羊脂五兩熔和諸藥成膏服如黍米大三粒至五粒荊芥湯冷下量兒大小加減立效湯川大黃炮銼干桃柳葉洗焙乾各一兩梔子仁赤芍藥各半兩以上搗羅為細末次用硃砂細研水飛一兩麝香別研雄黃別研各一分上件都拌勻每服一錢蜜湯調下量兒大小加減蠱疰巢氏云人聚蛇蟲雜類以器皿盛之令相啖食餘一存者即名為蠱能變化或隨飲食入腹食人五臟小兒有中者病狀與大人老子無異則心腹刺痛懊悶急者即死緩者涉歷歲月漸深羸困食心臟盡利血心臟爛乃至死死又疰易旁人故為蠱疰也外臺範汪療大人小兒蠱疰百病癥瘕積聚酸削骨肉大小便不利卒忤遇惡風臚脹腹滿淋水轉相注殫門盡戶延及男女外孫醫所不能療更生十七物紫參丸方紫參人參半夏湯洗藜蘆代赭石桔梗白薇肉蓯蓉各三分石膏大黃牡蠣熬丹參各一分蝦蟆燒灰烏頭炮各四分狼毒七分附子炮五分巴豆七十枚去心皮熬上件藥搗篩蜜和為丸以飲下如小豆一丸日三服老小以意減之蜂蠆所螫以塗其上神良忌豬羊肉冷水一方無蝦蟆有乾薑四分聖惠羚羊角散治小兒中蠱腹內堅如石面目青黃小便淋瀝變易無常羚羊角屑蘘荷各一兩梔子仁七枚赤芍藥牡丹皮黃連去須各一分犀角屑半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更量兒大小加減又方敗鼓皮三分炙令黃苦參銼蘘荷根各一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更量兒大小加減服之升麻散治小兒初中蠱毒川升麻桔梗去蘆頭栝蔞根各半兩上搗羅為粗散每服一錢以水一小盞煎至五分去滓溫服日四五服量兒大小加減雄黃散治小兒飛蠱狀如鬼氣者宜服雄黃麝香各細研犀角末各半兩上件藥都研令勻每服以溫水調下半錢匕日四五服量兒大小加減治小兒五種蠱毒悉主之方上搗馬兜鈴根細羅為散每服一錢以水一小盞煎五分去滓空腹頓服當時隨吐蠱出未快吐即再服又方上用敗鼓皮一片燒灰細研為粉空心以粥飲調服一錢病人須臾當呼蠱主姓名病便愈又方上用薺苨一兩搗羅為末以粥飲調下一錢甚效量兒大小加減服之治小兒畏忌中蠱欲死方上用甘草半兩生銼以水一中盞煎至五分去滓分為二服當吐蠱出若平生預防蠱者宜熟炙甘草煮汁服之即內消不吐神效治小兒中蠱毒令腹內堅痛面目青黃淋露骨立病變無常方上用桃株寄生二兩搗細羅為散如茶點服之日四五服又方上用麝香半錢細研空腹以溫水調服即吐出蠱毒未效再服治小兒中蠱下血欲死方上取生赤雌雞翅下血服之立效又方上搗青藍汁頻頻與半合服嬰孺雄黃丸治小兒疰病諸蠱魅精氣入心入腹刺痛黃瘦骨立雄黃雌黃各四分丹砂野丈人徐長卿各三分大黃五分麝香三棗大羚羊角屑五分上為末以青羊脂和丸百日兒酒服黍大三丸日進二服或豆大亦可張渙雄麝散專治蠱毒病雄黃水磨者細研麝香別研羚羊角屑赤芍藥敗鼓皮炙黃各一兩馬兜鈴根薺苨鬼臼去毛各半兩以上除雄黃麝香外搗羅為細末上件八味都一處拌勻研細每服半錢濃煎甘草湯調下食前麝犀湯犀角屑鬼箭安息香水磨雄黃細研各一兩苦參牡丹皮各半兩以上搗羅為細末次用麝香半兩細研上件都拌勻每服一錢水一大盞煎至五分去滓放溫時時服
